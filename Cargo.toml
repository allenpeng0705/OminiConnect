[workspace]
resolver = "2"
members = [
    # Panda core (forked)
    "panda/crates/panda-pdk",
    "panda/crates/panda-config",
    "panda/crates/panda-proxy",
    "panda/crates/panda-server",
    "panda/crates/panda-wasm",
    # Panda Wasm plugins
    "panda/crates/wasm-plugin-sample",
    "panda/crates/wasm-plugin-ssrf-guard",
    # OminiConnect value layer
    "omini_connect/oauth_vault",
    "omini_connect/schema_registry",
    "omini_connect/connectors/feishu",
    "omini_connect/connectors/dingtalk",
    "omini_connect/connectors/wechatwork",
    "omini_connect/connectors/maton",
    "omini_connect/wasm_policies",
    "omini_connect/audit_logger",
    "omini_connect/sdk",
    "omini_connect/skills",
    "omini_connect/hybrid_inference",
    "omini_connect/portal",
    "dashboard",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["OminiConnect contributors"]
license = "MIT OR Apache-2.0"
