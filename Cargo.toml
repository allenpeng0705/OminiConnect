[workspace]
resolver = "2"
members = [
    # Panda core (forked)
    "panda/crates/panda-pdk",
    "panda/crates/panda-config",
    "panda/crates/panda-proxy",
    "panda/crates/panda-server",
    "panda/crates/panda-wasm",
    # Panda Wasm plugins
    "panda/crates/wasm-plugin-sample",
    "panda/crates/wasm-plugin-ssrf-guard",
    # OmniConnect value layer
    "omni/oauth_vault",
    "omni/schema_registry",
    "omni/connectors/feishu",
    "omni/connectors/dingtalk",
    "omni/connectors/wechatwork",
    "omni/wasm_policies",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["OmniConnect contributors"]
license = "MIT OR Apache-2.0"
