<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" width="560" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Logo icon group -->
  <g transform="translate(16, 10)">
    <!-- Background rounded square -->
    <rect width="100" height="100" rx="20" fill="url(#bg)"/>

    <!-- Gateway/Router symbol - stylized O with entrance -->
    <g transform="translate(50, 50)">
      <!-- Outer gateway ring -->
      <circle cx="0" cy="0" r="38" fill="none" stroke="url(#gatewayGrad)" stroke-width="4" stroke-dasharray="18 6"/>

      <!-- Inner gateway entrance (router port) -->
      <circle cx="0" cy="0" r="26" fill="none" stroke="url(#nodeGrad)" stroke-width="3"/>

      <!-- Entry arrows suggesting router/gateway -->
      <g fill="url(#nodeGrad)">
        <polygon points="0,-42 -5,-36 5,-36"/>
        <polygon points="42,0 36,-5 36,5"/>
        <polygon points="0,42 -5,36 5,36"/>
        <polygon points="-42,0 -36,-5 -36,5"/>
      </g>

      <!-- AI Neural network nodes inside -->
      <!-- Central AI brain node -->
      <circle cx="0" cy="0" r="9" fill="url(#nodeGrad)"/>
      <circle cx="0" cy="0" r="5" fill="#1E1B4B"/>
      <circle cx="0" cy="0" r="3" fill="url(#nodeGrad)"/>

      <!-- Surrounding neural nodes -->
      <g fill="#fff">
        <circle cx="-16" cy="-12" r="4"/>
        <circle cx="16" cy="-12" r="4"/>
        <circle cx="-20" cy="6" r="4"/>
        <circle cx="20" cy="6" r="4"/>
        <circle cx="-12" cy="20" r="4"/>
        <circle cx="12" cy="20" r="4"/>
      </g>

      <!-- Neural connections -->
      <g stroke="url(#nodeGrad)" stroke-width="1.5" fill="none" opacity="0.6">
        <line x1="-16" y1="-12" x2="16" y2="-12"/>
        <line x1="16" y1="-12" x2="20" y2="6"/>
        <line x1="20" y1="6" x2="12" y2="20"/>
        <line x1="12" y1="20" x2="-12" y2="20"/>
        <line x1="-12" y1="20" x2="-20" y2="6"/>
        <line x1="-20" y1="6" x2="-16" y2="-12"/>
        <line x1="-16" y1="-12" x2="0" y2="0" stroke-dasharray="2 2"/>
        <line x1="16" y1="-12" x2="0" y2="0" stroke-dasharray="2 2"/>
        <line x1="-20" y1="6" x2="0" y2="0" stroke-dasharray="2 2"/>
        <line x1="20" y1="6" x2="0" y2="0" stroke-dasharray="2 2"/>
      </g>

      <!-- AI sparkles -->
      <g fill="#06B6D4">
        <circle cx="-28" cy="-24" r="2"/>
        <circle cx="28" cy="-24" r="2"/>
      </g>
    </g>
  </g>

  <!-- Text group -->
  <g transform="translate(130, 0)">
    <!-- Brand name -->
    <text x="0" y="52" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" fill="#1F2937">OminiConnect</text>

    <!-- Tagline -->
    <text x="2" y="82" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400" fill="#6B7280">A universal API gateway for AI agents</text>
  </g>
</svg>
