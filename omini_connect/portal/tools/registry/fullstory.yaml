- slug: fullstory_list_recordings
  name: List Recordings
  description: |
    Retrieve a list of session recordings with filtering options.
  provider: fullstory
  endpoint: /v1/recordings
  method: GET
  scopes:
    - recordings:read
  tags:
    - recordings
  input_schema:
    type: object
    description: Parameters for listing recordings
    properties:
      limit:
        type: integer
        description: "Maximum number of recordings to return (default 50)"
      offset:
        type: integer
        description: "Offset for pagination"
      user_id:
        type: string
        description: "Filter recordings by user ID"
    required: []

- slug: fullstory_get_recording
  name: Get Recording
  description: |
    Retrieve a specific session recording by its ID.
  provider: fullstory
  endpoint: /v1/recordings/{recording_id}
  method: GET
  scopes:
    - recordings:read
  tags:
    - recordings
  input_schema:
    type: object
    description: Parameters for getting a recording
    properties:
      recording_id:
        type: string
        description: "Unique identifier of the recording"
    required:
      - recording_id

