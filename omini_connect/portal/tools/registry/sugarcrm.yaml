# SugarCRM Tools - Allowlist
# Curated subset of SugarCRM REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. sugarcrm_list_accounts      - List all accounts
# 2. sugarcrm_get_account       - Get account details
# 3. sugarcrm_create_account    - Create a new account
# 4. sugarcrm_list_contacts     - List all contacts
# 5. sugarcrm_get_contact       - Get contact details
# 6. sugarcrm_create_contact    - Create a new contact
# 7. sugarcrm_list_leads        - List all leads
# 8. sugarcrm_get_lead          - Get lead details
# 9. sugarcrm_list_opportunities - List all opportunities
# 10. sugarcrm_get_opportunity  - Get opportunity details

- slug: sugarcrm_list_accounts
  name: List Accounts
  description: |
    List all accounts/companies in SugarCRM. Filter by industry, territory, or account type.
  provider: sugarcrm
  endpoint: /Accounts
  method: GET
  scopes:
    - read
  tags:
    - accounts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      filter:
        type: array
        description: "Filter expressions"
      fields:
        type: string
        description: "Fields to include (comma-separated)"
      max_results:
        type: integer
        description: "Max results (default 20, max 1000)"
        default: 20
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: sugarcrm_get_account
  name: Get Account
  description: |
    Get detailed information about a specific account including contacts, opportunities, and activities.
  provider: sugarcrm
  endpoint: /Accounts/{id}
  method: GET
  scopes:
    - read
  tags:
    - accounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      id:
        type: string
        description: "Account ID"
    required:
      - id

- slug: sugarcrm_create_account
  name: Create Account
  description: |
    Create a new account/company. Set name, industry, phone, website, and address.
  provider: sugarcrm
  endpoint: /Accounts
  method: POST
  scopes:
    - write
  tags:
    - accounts
    - create
  input_schema:
    type: object
    description: Parameters for creating an account
    properties:
      name:
        type: string
        description: "Account name"
      industry:
        type: string
        description: "Industry type"
      phone:
        type: string
        description: "Phone number"
      website:
        type: string
        description: "Website URL"
      billing_address_street:
        type: string
        description: "Billing street address"
      billing_address_city:
        type: string
        description: "Billing city"
      billing_address_state:
        type: string
        description: "Billing state"
      billing_address_postalcode:
        type: string
        description: "Billing postal code"
      billing_address_country:
        type: string
        description: "Billing country"
    required:
      - name

