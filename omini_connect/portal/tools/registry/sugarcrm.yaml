- slug: sugarcrm_create_contact
  name: Create Contact
  description: |
    Create a new contact. Set first name, last name, email, phone, and account association.
  provider: sugarcrm
  endpoint: /Contacts
  method: POST
  scopes:
    - write
  tags:
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone_work:
        type: string
        description: "Work phone"
      phone_mobile:
        type: string
        description: "Mobile phone"
      account_id:
        type: string
        description: "Associated account ID"
      title:
        type: string
        description: "Job title"
    required:
      - last_name

