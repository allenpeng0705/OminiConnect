- slug: livechat_more_list_conversations
  name: List Conversations
  description: |
    Retrieve a list of conversations from your LiveChat account.
    Supports filtering by state, date range, and pagination.
  provider: livechat_more
  endpoint: /v3.5/conversations
  method: GET
  scopes:
    - conversations--read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      state:
        type: string
        description: "Filter by state: active, pending, archived (default active)"
        enum: [active, pending, archived]
        default: active
      date_from:
        type: string
        description: "Start date in ISO 8601 format"
      date_to:
        type: string
        description: "End date in ISO 8601 format"
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page (max 100)"
        default: 20
    required: []

- slug: livechat_more_get_conversation
  name: Get Conversation
  description: |
    Get details of a specific conversation including messages, metadata, and participants.
  provider: livechat_more
  endpoint: /v3.5/conversations/{conversation_id}
  method: GET
  scopes:
    - conversations--read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: string
        description: "Conversation ID (path parameter)"
    required:
      - conversation_id

- slug: livechat_more_create_conversation
  name: Create Conversation
  description: |
    Create a new conversation. Typically used for initiating a chat with a visitor or sending a message to a specific user.
  provider: livechat_more
  endpoint: /v3.5/conversations
  method: POST
  scopes:
    - conversations--write
  tags:
    - conversations
    - create
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      user_id:
        type: string
        description: "User ID to start the conversation with"
      session_id:
        type: string
        description: "Session ID for the conversation"
      message:
        type: object
        description: "Initial message object with type and content"
        properties:
          type:
            type: string
            description: "Message type"
            enum: [text]
          content:
            type: string
            description: "Message text content"
    required:
      - user_id

- slug: livechat_more_list_visitors
  name: List Visitors
  description: |
    Retrieve a list of visitors currently on your website or recently visited.
    Useful for monitoring active users and their browsing behavior.
  provider: livechat_more
  endpoint: /v3.5/visitors
  method: GET
  scopes:
    - visitors--read
  tags:
    - visitors
    - read
  input_schema:
    type: object
    description: Parameters for listing visitors
    properties:
      state:
        type: string
        description: "Visitor state: online, offline, or all"
        enum: [online, offline, all]
        default: all
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

