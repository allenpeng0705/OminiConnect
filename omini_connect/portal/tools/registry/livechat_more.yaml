- slug: livechat_more_get_report
  name: Get Report
  description: |
    Retrieve reports on chat performance, agent activity, or goal metrics.
    Supports various report types and date ranges.
  provider: livechat_more
  endpoint: /v3.5/reports
  method: GET
  scopes:
    - reports--read
  tags:
    - reports
    - read
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      type:
        type: string
        description: "Report type: chats, agents, goals"
        enum: [chats, agents, goals]
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      agent_id:
        type: string
        description: "Filter by agent ID"
    required:
      - type
      - date_from
      - date_to

