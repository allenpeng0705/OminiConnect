# Gebruder Weiss Tools - Allowlist
# Curated subset of Gebruder Weiss API for AI agent use.
# OAUTH2_CC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gebruder_weiss_list_shipments      - List shipments
# 2. gebruder_weiss_get_shipment       - Get shipment details
# 3. gebruder_weiss_list_orders        - List orders
# 4. gebruder_weiss_get_order          - Get order details
# 5. gebruder_weiss_list_tracking      - List tracking events
# 6. gebruder_weiss_track_shipment     - Track shipment
# 7. gebruder_weiss_list_pickups       - List pickups
# 8. gebruder_weiss_create_pickup      - Create pickup request
# 9. gebruder_weiss_list_addresses     - List addresses
# 10. gebruder_weiss_estimate_rate     - Get shipping estimate

- slug: gebruder_weiss_list_shipments
  name: List Shipments
  description: |
    List all shipments in the system.
  provider: gebruder-weiss
  endpoint: /shipments
  method: GET
  scopes:
    - read
  tags:
    - shipments
    - list
    - logistics
  input_schema:
    type: object
    description: Parameters for listing shipments
    properties:
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: gebruder_weiss_get_shipment
  name: Get Shipment
  description: |
    Get detailed information about a specific shipment.
  provider: gebruder-weiss
  endpoint: /shipments/{shipmentId}
  method: GET
  scopes:
    - read
  tags:
    - shipments
    - read
  input_schema:
    type: object
    description: Parameters for getting a shipment
    properties:
      shipmentId:
        type: string
        description: "Shipment ID"
    required:
      - shipmentId

