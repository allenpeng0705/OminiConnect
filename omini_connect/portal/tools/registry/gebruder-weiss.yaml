- slug: gebruder_weiss_list_pickups
  name: List Pickups
  description: |
    List scheduled pickup requests.
  provider: gebruder-weiss
  endpoint: /pickups
  method: GET
  scopes:
    - read
  tags:
    - pickups
    - list
  input_schema:
    type: object
    description: Parameters for listing pickups
    properties: {}

- slug: gebruder_weiss_create_pickup
  name: Create Pickup
  description: |
    Create a new pickup request.
  provider: gebruder-weiss
  endpoint: /pickups
  method: POST
  scopes:
    - write
  tags:
    - pickups
    - create
  input_schema:
    type: object
    description: Parameters for creating a pickup
    properties:
      address:
        type: string
        description: "Pickup address"
      date:
        type: string
        description: "Pickup date (YYYY-MM-DD)"
      shipmentId:
        type: string
        description: "Associated shipment ID"
    required:
      - address
      - date

- slug: gebruder_weiss_list_addresses
  name: List Addresses
  description: |
    List saved addresses in the address book.
  provider: gebruder-weiss
  endpoint: /addresses
  method: GET
  scopes:
    - read
  tags:
    - addresses
    - list
  input_schema:
    type: object
    description: Parameters for listing addresses
    properties: {}

- slug: gebruder_weiss_estimate_rate
  name: Estimate Rate
  description: |
    Get shipping rate estimate for a route.
  provider: gebruder-weiss
  endpoint: /rates
  method: POST
  scopes:
    - read
  tags:
    - rates
    - shipping
  input_schema:
    type: object
    description: Parameters for estimating a rate
    properties:
      origin:
        type: string
        description: "Origin postal code"
      destination:
        type: string
        description: "Destination postal code"
      weight:
        type: number
        description: "Shipment weight"
    required:
      - origin
      - destination
