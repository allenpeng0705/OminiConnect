- slug: drift_get_campaign
  name: Get Campaign
  description: |
    Get a specific campaign by ID. Returns full campaign details including targeting, messaging, and scheduling.
  provider: drift
  endpoint: /campaigns/{id}
  method: GET
  scopes:
    - campaign_read
  tags:
    - campaigns
    - marketing
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID (path parameter)"
    required:
      - id

- slug: drift_get_report
  name: Get Report
  description: |
    Get analytics report for Drift conversations and campaigns.
    Returns metrics including conversation volume, response times, and conversion rates.
  provider: drift
  endpoint: /reports/{type}
  method: GET
  scopes:
    - analytics_read
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      type:
        type: string
        description: "Report type: conversations, campaigns, overview"
        enum: [conversations, campaigns, overview]
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - type
