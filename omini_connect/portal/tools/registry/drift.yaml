- slug: drift_list_campaigns
  name: List Campaigns
  description: |
    List all campaigns in your Drift workspace. Returns campaign names, statuses, and targeting rules.
  provider: drift
  endpoint: /campaigns
  method: GET
  scopes:
    - campaign_read
  tags:
    - campaigns
    - marketing
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by status: active, paused, all"
        enum: [active, paused, all]
        default: all
      limit:
        type: integer
        description: "Results limit"
        default: 25
      offset:
        type: integer
        description: "Offset for pagination"
