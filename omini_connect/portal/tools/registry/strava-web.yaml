# Strava (Web) Tools - Allowlist
# Curated subset of Strava (Web) API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_athlete                              - Get current athlete profile
# 2. list_activities                          - List athlete activities
# 3. get_activity                             - Get activity details
# 4. list_clubs                               - List athlete clubs
# 5. get_club                                 - Get club details
# 6. list_gear                                - List athlete gear
# 7. get_segment_efforts                      - Get segment efforts
# 8. list_zones                               - List athlete zones
# 9. get_stats                                - Get athlete statistics
# 10. upload_activity                          - Upload activity data

- slug: get_athlete
  name: Get Athlete
  description: |
    Get the current authenticated athlete's Strava profile. Returns athlete ID, name, bio, and profile picture.
  provider: strava-web
  endpoint: /athlete
  method: GET
  scopes: []
  tags:
    - athlete
    - profile
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_activities
  name: List Activities
  description: |
    List all activities for the authenticated Strava athlete. Returns activity types, distances, durations, and dates.
  provider: strava-web
  endpoint: /activities
  method: GET
  scopes: []
  tags:
    - activities
    - fitness
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_activity
  name: Get Activity
  description: |
    Get detailed information about a specific Strava activity including distance, pace, elevation, and heart rate data.
  provider: strava-web
  endpoint: /activities/{id}
  method: GET
  scopes: []
  tags:
    - activities
    - fitness
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_clubs
  name: List Clubs
  description: |
    List all clubs the authenticated Strava athlete belongs to. Returns club names, member counts, and locations.
  provider: strava-web
  endpoint: /clubs
  method: GET
  scopes: []
  tags:
    - clubs
    - social
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_club
  name: Get Club
  description: |
    Get detailed information about a specific Strava club including member count, activity feed, and group rides.
  provider: strava-web
  endpoint: /clubs/{id}
  method: GET
  scopes: []
  tags:
    - clubs
    - social
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_gear
  name: List Gear
  description: |
    List all gear (bikes, shoes) for the authenticated Strava athlete. Returns gear names, distances, and retirement status.
  provider: strava-web
  endpoint: /gear
  method: GET
  scopes: []
  tags:
    - gear
    - equipment
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_segment_efforts
  name: Get Segment Efforts
  description: |
    Get all efforts on a specific Strava segment. Returns athlete times, rankings, and effort dates.
  provider: strava-web
  endpoint: /segments/{id}/all_efforts
  method: GET
  scopes: []
  tags:
    - segments
    - fitness
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_zones
  name: List Zones
  description: |
    List all training zones for the authenticated Strava athlete. Returns heart rate and power zones with ranges.
  provider: strava-web
  endpoint: /zones
  method: GET
  scopes: []
  tags:
    - zones
    - fitness
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_stats
  name: Get Stats
  description: |
    Get detailed statistics for a Strava athlete including totals, personal records, and weekly summaries.
  provider: strava-web
  endpoint: /athletes/{id}/stats
  method: GET
  scopes: []
  tags:
    - stats
    - analytics
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: upload_activity
  name: Upload Activity
  description: |
    Upload activity data to Strava from a fitness device or application. Returns upload status and activity ID.
  provider: strava-web
  endpoint: /uploads
  method: POST
  scopes: []
  tags:
    - activities
    - upload
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

