# Wiza Tools - Allowlist
# Curated subset of Wiza API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wiza_list_people           - List all people/contacts
# # 2. wiza_get_person           - Get person details
# # 3. wiza_enrich_person           - Enrich person data
# # 4. wiza_list_companies           - List all companies
# # 5. wiza_get_company           - Get company details
# # 6. wiza_enrich_company           - Enrich company data
# # 7. wiza_search_people           - Search for people
# # 8. wiza_lookup_email           - Lookup email by person data
# # 9. wiza_list_verifications           - List email verifications
# # 10. wiza_verify_email           - Verify an email address

- slug: wiza_list_people
  name: List People
  description: |
    List all people/contacts
  provider: wiza
  endpoint: /v1/people
  method: GET
  scopes:
    - read
  tags:
    - wiza
  input_schema:
    type: object
    description: Parameters for list people
    properties: {}
    required: []

- slug: wiza_get_person
  name: Get Person
  description: |
    Get person details
  provider: wiza
  endpoint: /v1/people/{id}
  method: GET
  scopes:
