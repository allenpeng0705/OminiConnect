# Wakatime Tools - Allowlist
# Curated subset of Wakatime API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wakatime_get_current_user           - Get current user info
# # 2. wakatime_list_summaries           - Get time tracking summaries
# # 3. wakatime_list_all_time_since_today           - Get all time tracked since today
# # 4. wakatime_list_leaders           - Get leaderboard data
# # 5. wakatime_list_goals           - List all goals
# # 6. wakatime_get_goal           - Get goal details
# # 7. wakatime_list_projects           - List all projects
# # 8. wakatime_list_entities           - List coded entities by date range
# # 9. wakatime_get_stats           - Get coding statistics
# # 10. wakatime_list_heartbeats           - List heartbeat data

- slug: wakatime_get_current_user
  name: Get Current User
  description: |
    Get current user info
  provider: wakatime
  endpoint: /api/v1/users/current
  method: GET
  scopes:
    - read
  tags:
    - wakatime
  input_schema:
    type: object
    description: Parameters for get current user
    properties: {}
    required: []

