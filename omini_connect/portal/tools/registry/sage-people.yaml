- slug: sage-people_list_leave_requests
  name: List Leave Requests
  description: |
    Retrieve a list of leave requests.
  provider: sage-people
  endpoint: /v1/leave-requests
  method: GET
  scopes:
    - leave:read
  tags:
    - leave
    - hr
    - requests
  input_schema:
    type: object
    description: Parameters for listing leave requests
    properties:
      limit:
        type: integer
        description: "Number of requests"
        default: 50
      status:
        type: string
        description: "Filter by status: pending, approved, denied"
    required: []

- slug: sage-people_create_leave_request
  name: Create Leave Request
  description: |
    Create a new leave request.
  provider: sage-people
  endpoint: /v1/leave-requests
  method: POST
  scopes:
    - leave:write
  tags:
    - leave
    - hr
    - requests
    - create
  input_schema:
    type: object
    description: Parameters for creating a leave request
    properties:
      personId:
        type: string
        description: "Person ID"
      leaveType:
        type: string
        description: "Type of leave"
      startDate:
        type: string
        description: "Start date"
      endDate:
        type: string
        description: "End date"
    required:
      - personId
      - leaveType
      - startDate

