# Fathom Tools - Allowlist
# Curated subset of Fathom API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fathom_list_teams           - List teams
# 2. fathom_get_team            - Get team details
# 3. fathom_list_meetings       - List meetings
# 4. fathom_get_meeting        - Get meeting details
# 5. fathom_list_clips         - List video clips
# 6. fathom_get_clip           - Get clip details
# 7. fathom_list_highlights     - List highlights
# 8. fathom_get_summary        - Get meeting summary
# 9. fathom_list_messages     - List messages
# 10. fathom_search_transcript - Search transcript

- slug: fathom_list_teams
  name: List Teams
  description: |
    List all teams in the account.
  provider: fathom
  endpoint: /external/v1/teams
  method: GET
  scopes: []
  tags:
    - teams
    - organization
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: fathom_get_team
  name: Get Team
  description: |
    Get details of a specific team.
  provider: fathom
  endpoint: /external/v1/teams/{id}
  method: GET
  scopes: []
  tags:
    - teams
    - organization
    - read
  input_schema:
    type: object
    description: Parameters for getting team
    properties:
      id:
        type: string
        description: "Team ID"
    required:
      - id

- slug: fathom_list_meetings
  name: List Meetings
  description: |
    List all meetings.
  provider: fathom
  endpoint: /external/v1/meetings
  method: GET
  scopes: []
  tags:
    - meetings
    - video
    - read
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      team_id:
        type: string
        description: "Filter by team ID"
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required: []

