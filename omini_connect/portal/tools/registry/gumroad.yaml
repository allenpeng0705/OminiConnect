- slug: gumroad_list_webhooks
  name: List Webhooks
  description: |
    List all configured webhooks in your Gumroad account.
    Returns webhook details including URL and events.
  provider: gumroad
  endpoint: /v1/webhooks
  method: GET
  scopes:
    - read
  tags:
    - webhooks
    - list
  input_schema:
    type: object
    description: Parameters for listing webhooks
    properties: {}
    required: []

- slug: gumroad_create_webhook
  name: Create Webhook
  description: |
    Create a new webhook for Gumroad events.
    Set URL and event types to receive.
  provider: gumroad
  endpoint: /v1/webhooks
  method: POST
  scopes:
    - write
  tags:
    - webhooks
    - create
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      url:
        type: string
        description: "Webhook URL"
      events:
        type: array
        description: "Event types to subscribe"
    required:
      - url
