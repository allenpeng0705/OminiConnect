# Gumroad Tools - Allowlist
# Curated subset of Gumroad API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gumroad_list_products         - List products
# 2. gumroad_get_product           - Get product details
# 3. gumroad_list_sales            - List sales
# 4. gumroad_get_sale              - Get sale details
# 5. gumroad_list_customers        - List customers
# 6. gumroad_get_customer          - Get customer details
# 7. gumroad_list_subscribers      - List subscribers
# 8. gumroad_get_subscriber        - Get subscriber details
# 9. gumroad_list_webhooks         - List webhooks
# 10. gumroad_create_webhook       - Create a webhook

- slug: gumroad_list_products
  name: List Products
  description: |
    List all products in your Gumroad account including names, prices, and publication status. Returns product metadata with pagination for inventory management.
  provider: gumroad
  endpoint: /v1/products
  method: GET
  scopes:
    - read
  tags:
    - products
    - list
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: gumroad_get_product
  name: Get Product
  description: |
    Retrieve detailed information about a specific product including full description, pricing tiers, and sales statistics. Returns product configuration and revenue metrics.
  provider: gumroad
  endpoint: /v1/products/{product_id}
  method: GET
  scopes:
    - read
  tags:
    - products
    - read
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      product_id:
        type: string
        description: "Product ID"
    required:
      - product_id

- slug: gumroad_list_sales
  name: List Sales
  description: |
    List all sales transactions in your Gumroad account with optional product filtering. Returns sale records including product, customer email, and payment amount.
  provider: gumroad
  endpoint: /v1/sales
  method: GET
  scopes:
    - read
  tags:
    - sales
    - list
  input_schema:
    type: object
    description: Parameters for listing sales
    properties:
      product_id:
        type: string
        description: "Filter by product ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: gumroad_get_sale
  name: Get Sale
  description: |
    Retrieve detailed information about a specific sale including customer details, product purchased, and payment information. Returns the complete sale transaction record.
  provider: gumroad
  endpoint: /v1/sales/{sale_id}
  method: GET
  scopes:
    - read
  tags:
    - sales
    - read
  input_schema:
    type: object
    description: Parameters for getting a sale
    properties:
      sale_id:
        type: string
        description: "Sale ID"
    required:
      - sale_id

- slug: gumroad_list_customers
  name: List Customers
  description: |
    List all customers in your Gumroad account with pagination support. Returns customer email addresses and purchase history summaries.
  provider: gumroad
  endpoint: /v1/customers
  method: GET
  scopes:
    - read
  tags:
    - customers
    - list
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: gumroad_get_customer
  name: Get Customer
  description: |
    Retrieve detailed information about a specific customer including their complete purchase history and subscription status. Returns the full customer profile with transaction records.
  provider: gumroad
  endpoint: /v1/customers/{customer_id}
  method: GET
  scopes:
    - read
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: string
        description: "Customer ID"
    required:
      - customer_id

- slug: gumroad_list_subscribers
  name: List Subscribers
  description: |
    List all subscribers for your Gumroad products with optional product filtering. Returns subscriber details including plan type and billing cycle.
  provider: gumroad
  endpoint: /v1/subscribers
  method: GET
  scopes:
    - read
  tags:
    - subscribers
    - list
  input_schema:
    type: object
    description: Parameters for listing subscribers
    properties:
      product_id:
        type: string
        description: "Filter by product ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: gumroad_get_subscriber
  name: Get Subscriber
  description: |
    Retrieve detailed information about a specific subscriber including subscription details and payment history. Returns subscriber profile with billing information.
  provider: gumroad
  endpoint: /v1/subscribers/{subscriber_id}
  method: GET
  scopes:
    - read
  tags:
    - subscribers
    - read
  input_schema:
    type: object
    description: Parameters for getting a subscriber
    properties:
      subscriber_id:
        type: string
        description: "Subscriber ID"
    required:
      - subscriber_id

- slug: gumroad_list_webhooks
  name: List Webhooks
  description: |
    List all configured webhooks in your Gumroad account including notification URLs and subscribed event types. Returns webhook configuration for integration management.
  provider: gumroad
  endpoint: /v1/webhooks
  method: GET
  scopes:
    - read
  tags:
    - webhooks
    - list
  input_schema:
    type: object
    description: Parameters for listing webhooks
    properties: {}
    required: []

- slug: gumroad_create_webhook
  name: Create Webhook
  description: |
    Create a new webhook endpoint to receive Gumroad event notifications with specified URL and event subscriptions. Returns the created webhook with its identifier for management.
  provider: gumroad
  endpoint: /v1/webhooks
  method: POST
  scopes:
    - write
  tags:
    - webhooks
    - create
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      url:
        type: string
        description: "Webhook URL"
      events:
        type: array
        description: "Event types to subscribe"
    required:
      - url
