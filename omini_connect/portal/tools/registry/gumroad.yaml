# Gumroad Tools - Allowlist
# Curated subset of Gumroad API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gumroad_list_products         - List products
# 2. gumroad_get_product           - Get product details
# 3. gumroad_list_sales            - List sales
# 4. gumroad_get_sale              - Get sale details
# 5. gumroad_list_customers        - List customers
# 6. gumroad_get_customer          - Get customer details
# 7. gumroad_list_subscribers      - List subscribers
# 8. gumroad_get_subscriber        - Get subscriber details
# 9. gumroad_list_webhooks         - List webhooks
# 10. gumroad_create_webhook       - Create a webhook

- slug: gumroad_list_products
  name: List Products
  description: |
    List all products in your Gumroad account.
    Returns product details including name, price, and status.
  provider: gumroad
  endpoint: /v1/products
  method: GET
  scopes:
    - read
  tags:
    - products
    - list
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: gumroad_get_product
  name: Get Product
  description: |
    Get detailed information about a specific product.
    Includes product description, price, and sales stats.
  provider: gumroad
  endpoint: /v1/products/{product_id}
  method: GET
  scopes:
    - read
  tags:
    - products
    - read
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      product_id:
        type: string
        description: "Product ID"
    required:
      - product_id

- slug: gumroad_list_sales
  name: List Sales
