# Renovate Tools - Allowlist
# Curated subset of Renovate bot API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. renovate_list_repositories       - List repositories with Renovate
# 2. renovate_get_repository        - Get repository configuration
# 3. renovate_list_pull_requests    - List pull requests
# 4. renovate_get_pull_request     - Get PR details
# 5. renovate_get_config           - Get Renovate config
# 6. renovate_update_config        - Update Renovate config
# 7. renovate_list_branches        - List update branches
# 8. renovate_get_branch           - Get branch details
# 9. renovate_create_branch       - Create update branch
# 10. renovate_get_repository_status - Get repository status

- slug: renovate_list_repositories
  name: List Repositories
  description: |
    Retrieve all repositories configured with Renovate in the organization.
    Returns repository names, IDs, and configuration status for each repo.
    Use this to discover repositories managed by Renovate for dependency updates.
  provider: renovate
  endpoint: /api/repositories
  method: GET
  scopes:
    - renovate_read
  tags:
    - repositories
  input_schema:
    type: object
    description: Parameters for listing Renovate repositories
    properties:
      org:
        type: string
        description: "Organization name"
      include_pull_requests:
        type: boolean
        description: "Include active pull requests (default: true)"
    required:
      - org

- slug: renovate_get_repository
  name: Get Repository
  description: |
    Retrieve detailed configuration and status for a Renovate repository.
    Returns the complete repository configuration with update schedules and rules.
    This provides repository details for understanding update policies.
  provider: renovate
  endpoint: /api/repositories/{repoName}
  method: GET
  scopes:
    - renovate_read
  tags:
    - repositories
  input_schema:
    type: object
    description: Parameters for getting repository details
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
    required:
      - repo_name

- slug: renovate_list_pull_requests
  name: List Pull Requests
  description: |
    Retrieve all Renovate-managed pull requests for repositories with status information.
    Returns PR numbers, titles, branches, and merge status for each PR.
    Use this to track dependency update PRs and their review status.
  provider: renovate
  endpoint: /api/pull-requests
  method: GET
  scopes:
    - renovate_read
  tags:
    - pull_requests
  input_schema:
    type: object
    description: Parameters for listing Renovate pull requests
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
      status:
        type: string
        description: "Filter by status (open, closed, merged)"
      limit:
        type: integer
        description: "Maximum number of results (default: 100)"
    required:
      - repo_name

- slug: renovate_get_pull_request
  name: Get Pull Request
  description: |
    Retrieve details about a specific Renovate pull request including files changed.
    Returns the complete PR data with dependency updates and commit details.
    This provides PR details for code review and merge decisions.
  provider: renovate
  endpoint: /api/pull-requests/{prNumber}
  method: GET
  scopes:
    - renovate_read
  tags:
    - pull_requests
  input_schema:
    type: object
    description: Parameters for getting pull request details
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
      pr_number:
        type: integer
        description: "Pull request number"
    required:
      - repo_name
      - pr_number

- slug: renovate_get_config
  name: Get Config
  description: |
    Retrieve the Renovate configuration for a repository including presets and rules.
    Returns the complete configuration with package rules and schedule settings.
    Use this to understand the update policy for a repository.
  provider: renovate
  endpoint: /api/repositories/{repoName}/config
  method: GET
  scopes:
    - renovate_read
  tags:
    - config
  input_schema:
    type: object
    description: Parameters for getting Renovate config
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
    required:
      - repo_name

- slug: renovate_update_config
  name: Update Config
  description: |
    Update the Renovate configuration for a repository with new settings.
    Returns the updated configuration confirming changes were applied.
    This modifies the update policy and schedule for dependency updates.
  provider: renovate
  endpoint: /api/repositories/{repoName}/config
  method: PUT
  scopes:
    - renovate_write
  tags:
    - config
  input_schema:
    type: object
    description: Parameters for updating Renovate config
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
      config:
        type: object
        description: "Renovate configuration object"
        properties:
          extends:
            type: array
            items:
              type: string
            description: "Configuration presets to extend"
          package_rules:
            type: array
            description: "Package-specific rules"
          schedule:
            type: string
            description: "Update schedule (e.g., 'at any time')"
    required:
      - repo_name
      - config

- slug: renovate_list_branches
  name: List Branches
  description: |
    Retrieve all branches managed by Renovate for a repository with status.
    Returns branch names, last commit dates, and update status for each branch.
    Use this to discover pending updates and track branch lifecycle.
  provider: renovate
  endpoint: /api/repositories/{repoName}/branches
  method: GET
  scopes:
    - renovate_read
  tags:
    - branches
  input_schema:
    type: object
    description: Parameters for listing Renovate branches
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
      limit:
        type: integer
        description: "Maximum number of results"
    required:
      - repo_name

- slug: renovate_get_branch
  name: Get Branch
  description: |
    Retrieve details about a specific Renovate-managed branch including commits and files.
    Returns the complete branch data with update contents and status.
    This provides branch details for understanding pending dependency updates.
  provider: renovate
  endpoint: /api/repositories/{repoName}/branches/{branchName}
  method: GET
  scopes:
    - renovate_read
  tags:
    - branches
  input_schema:
    type: object
    description: Parameters for getting branch details
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
      branch_name:
        type: string
        description: "Branch name"
    required:
      - repo_name
      - branch_name

- slug: renovate_create_branch
  name: Create Branch
  description: |
    Create a new Renovate-managed branch for dependency updates with custom rules.
    Returns the created branch with its name and initial configuration.
    This initiates a new dependency update outside the regular schedule.
  provider: renovate
  endpoint: /api/repositories/{repoName}/branches
  method: POST
  scopes:
    - renovate_write
  tags:
    - branches
  input_schema:
    type: object
    description: Parameters for creating Renovate branch
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
      package_rules:
        type: array
        description: "Rules for dependency updates"
      branch_name:
        type: string
        description: "Desired branch name"
      commit_message:
        type: string
        description: "Custom commit message"
    required:
      - repo_name

- slug: renovate_get_repository_status
  name: Get Repository Status
  description: |
    Retrieve the overall Renovate status for a repository including pending updates.
    Returns dashboard state, branch count, and PR statistics for the repository.
    Use this to get a summary of Renovate activity and pending changes.
  provider: renovate
  endpoint: /api/repositories/{repoName}/status
  method: GET
  scopes:
    - renovate_read
  tags:
    - status
  input_schema:
    type: object
    description: Parameters for getting repository status
    properties:
      repo_name:
        type: string
        description: "Full repository name (org/repo)"
    required:
      - repo_name