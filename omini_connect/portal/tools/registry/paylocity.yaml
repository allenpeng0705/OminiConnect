# Paylocity Tools - Allowlist
# Curated subset of Paylocity API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. paylocity_list_employees        - List employees
# 2. paylocity_get_employee          - Get employee details
# 3. paylocity_list_payroll_runs     - List payroll runs
# 4. paylocity_get_payroll_run       - Get payroll run details
# 5. paylocity_list_time_entries     - List time entries
# 6. paylocity_list_departments      - List departments
# 7. paylocity_list_jobs             - List jobs/positions
# 8. paylocity_list_benefits          - List benefit plans
# 9. paylocity_list_pay_groups       - List pay groups
# 10. paylocity_get_company_info     - Get company information

- slug: paylocity_list_employees
  name: List Employees
  description: |
    List all employees in the organization.
  provider: paylocity
  endpoint: /v1/employees
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      departmentId:
        type: string
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: paylocity_get_employee
  name: Get Employee
  description: |
    Get detailed information about a specific employee.
  provider: paylocity
  endpoint: /v1/employees/{employeeId}
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

- slug: paylocity_list_payroll_runs
  name: List Payroll Runs
  description: |
    List all payroll runs for the organization.
  provider: paylocity
  endpoint: /v1/payroll/runs
  method: GET
  scopes: []
  tags:
    - payroll
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payroll runs
    properties:
      status:
        type: string
        description: "Filter by status"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: paylocity_get_payroll_run
  name: Get Payroll Run
  description: |
    Get detailed information about a specific payroll run.
  provider: paylocity
  endpoint: /v1/payroll/runs/{runId}
  method: GET
  scopes: []
  tags:
    - payroll
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payroll run
    properties:
      runId:
        type: string
        description: "Payroll run ID"
    required:
      - runId

