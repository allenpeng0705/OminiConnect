  provider: outreach
  endpoint: /api/v2/sequences
  method: GET
  scopes:
    - sequences.read
  tags:
    - sequences
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for listing sequences
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
