- slug: outreach_get_sequence
  name: Get Sequence
  description: |
    Get detailed information for a specific sequence including its steps, target audience settings, and performance statistics. Returns sequence data for campaign optimization.
  provider: outreach
  endpoint: /api/v2/sequences/{sequenceId}
  method: GET
  scopes:
    - sequences.read
  tags:
    - sequences
    - sales engagement
    - read
