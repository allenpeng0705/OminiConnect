- slug: outreach_add_prospect_to_sequence
  name: Add Prospect to Sequence
  description: |
    Add a prospect to an Outreach sequence with optional scheduled date.
  provider: outreach
  endpoint: /api/v2/sequenceenrollments
  method: POST
  scopes:
    - sequences.write
  tags:
    - sequences
    - sales engagement
    - write
  input_schema:
    type: object
    description: Parameters for adding prospect to sequence
    properties:
      prospect_id:
        type: string
        description: "The prospect ID"
      sequence_id:
        type: string
        description: "The sequence ID"
      scheduled_at:
        type: string
        description: "Schedule date (ISO 8601 format)"
    required:
      - prospect_id
      - sequence_id

