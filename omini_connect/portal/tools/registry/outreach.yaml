# Outreach Tools - Sales Engagement Platform
# Curated subset of Outreach API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. outreach_list_prospects           - List prospects
# 2. outreach_get_prospect            - Get prospect details
# 3. outreach_create_prospect         - Create a prospect
# 4. outreach_list_sequences          - List sequences
# 5. outreach_get_sequence             - Get sequence details
# 6. outreach_add_prospect_to_sequence - Add prospect to sequence
# 7. outreach_list_templates           - List email templates
# 8. outreach_get_template              - Get template details
# 9. outreach_list_calls               - List calls
# 10. outreach_get_call                 - Get call details

- slug: outreach_list_prospects
  name: List Prospects
  description: |
    List all prospects including their names, email addresses, companies, and current pipeline stages. Returns prospect records for sales pipeline management and follow-up planning.
  provider: outreach
  endpoint: /api/v2/prospects
  method: GET
  scopes:
    - prospects.read
  tags:
    - prospects
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for listing prospects
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
        description: "Filter expression (e.g., stage='Qualified')"
    required: []

- slug: outreach_get_prospect
  name: Get Prospect
  description: |
    Get detailed information for a specific prospect including contact details, company information, and recent engagement activities. Returns prospect data for personalized outreach planning.
  provider: outreach
  endpoint: /api/v2/prospects/{prospectId}
  method: GET
  scopes:
    - prospects.read
  tags:
    - prospects
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for getting a prospect
    properties:
      prospect_id:
        type: string
        description: "The prospect ID"
    required:
      - prospect_id

- slug: outreach_create_prospect
  name: Create Prospect
  description: |
    Create a new prospect with contact information including name, email, phone, and company details. Returns the created prospect with their unique identifier for tracking.
  provider: outreach
  endpoint: /api/v2/prospects
  method: POST
  scopes:
    - prospects.write
  tags:
    - prospects
    - sales engagement
    - write
  input_schema:
    type: object
    description: Parameters for creating a prospect
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company:
        type: string
        description: "Company name"
      title:
        type: string
        description: "Job title"
    required:
      - email

- slug: outreach_list_sequences
