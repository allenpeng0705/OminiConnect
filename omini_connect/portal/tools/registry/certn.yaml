- slug: certn_create_background_check
  name: Create Background Check
  description: |
    Create a new background check for an applicant.
  provider: certn
  endpoint: /api/v2/applicants/{applicantId}/background-checks
  method: POST
  scopes: []
  tags:
    - background-checks
    - create
  input_schema:
    type: object
