# Workpath Tools - Allowlist
# Curated subset of Workpath API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. workpath_list_employees           - List all employees
# # 2. workpath_get_employee           - Get employee details
# # 3. workpath_list_goals           - List all goals
# # 4. workpath_get_goal           - Get goal details
# # 5. workpath_create_goal           - Create a new goal
# # 6. workpath_list_reviews           - List all performance reviews
# # 7. workpath_get_review           - Get review details
# # 8. workpath_list_teams           - List all teams
# # 9. workpath_get_team           - Get team details
# # 10. workpath_list_activities           - List all activities

- slug: workpath_list_employees
  name: List Employees
  description: |
    List all employees
  provider: workpath
  endpoint: /employees
  method: GET
  scopes:
    - read
  tags:
    - workpath
  input_schema:
    type: object
    description: Parameters for list employees
    properties: {}
    required: []

- slug: workpath_get_employee
