# Quickbooks-Sandbox Tools - Allowlist
# Curated subset of QuickBooks Online REST API for AI agent use.
# Sandbox environment for testing.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. quickbooks-sandbox_list_customers    - List customers
# 2. quickbooks-sandbox_get_customer      - Get customer details
# 3. quickbooks-sandbox_create_customer   - Create a customer
# 4. quickbooks-sandbox_list_invoices     - List invoices
# 5. quickbooks-sandbox_get_invoice       - Get invoice details
# 6. quickbooks-sandbox_create_invoice    - Create an invoice
# 7. quickbooks-sandbox_list_items       - List items/products
# 8. quickbooks-sandbox_get_item         - Get item details
# 9. quickbooks-sandbox_list_payments    - List payments
# 10. quickbooks-sandbox_get_company_info - Get company information

- slug: quickbooks-sandbox_list_customers
  name: List Customers
  description: |
    Retrieve a list of all customers in your QuickBooks sandbox company.
  provider: quickbooks-sandbox
  endpoint: /v3/company/{companyId}/query
  method: GET
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - customers
    - accounting
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      companyId:
        type: string
        description: "QuickBooks company ID"
      query:
        type: string
        description: "Query string (default: SELECT * FROM Customer)"
        default: SELECT * FROM Customer
      limit:
        type: integer
        description: "Number of results (default 100)"
        default: 100
    required:
      - companyId

- slug: quickbooks-sandbox_get_customer
  name: Get Customer
  description: |
    Get details of a specific customer by ID.
  provider: quickbooks-sandbox
  endpoint: /v3/company/{companyId}/customer/{customerId}
  method: GET
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - customers
    - accounting
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      companyId:
        type: string
        description: "QuickBooks company ID"
      customerId:
        type: string
        description: "The customer ID"
    required:
      - companyId
      - customerId

- slug: quickbooks-sandbox_create_customer
  name: Create Customer
  description: |
    Create a new customer in your QuickBooks sandbox.
  provider: quickbooks-sandbox
  endpoint: /v3/company/{companyId}/customer
  method: POST
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - customers
    - accounting
    - create
  input_schema:
    type: object
    description: Parameters for creating a customer
    properties:
      companyId:
        type: string
        description: "QuickBooks company ID"
      DisplayName:
        type: string
        description: "Customer display name"
      GivenName:
        type: string
        description: "First name"
      FamilyName:
        type: string
        description: "Last name"
      PrimaryEmailAddr:
        type: object
        description: "Email address object"
    required:
      - companyId
      - DisplayName

