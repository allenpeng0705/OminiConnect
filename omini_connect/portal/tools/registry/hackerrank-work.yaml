# HackerRank Work Tools - Allowlist
# Curated subset of HackerRank for Work API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. hackerrank_list_candidates     - List candidates
# 2. hackerrank_get_candidate      - Get candidate details
# 3. hackerrank_list_tests         - List tests
# 4. hackerrank_get_test           - Get test details
# 5. hackerrank_list_jobs         - List jobs
# 6. hackerrank_get_job            - Get job details
# 7. hackerrank_list_interviews    - List interviews
# 8. hackerrank_get_interview      - Get interview details
# 9. hackerrank_list_users         - List users
# 10. hackerrank_get_user          - Get user details

- slug: hackerrank_list_candidates
  name: List Candidates
  description: |
    Retrieve all candidates in your HackerRank for Work account with pagination.
    Returns candidate names, emails, and application status.
  provider: hackerrank-work
  endpoint: /x/api/v3/users
  method: GET
  scopes:
    - read
  tags:
    - candidates
    - list
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      offset:
        type: integer
        description: "Offset"
        default: 0
    required: []

- slug: hackerrank_get_candidate
  name: Get Candidate
  description: |
    Retrieve a specific candidate with their assessments, interviews, and history.
    Returns full candidate profile including evaluation results.
  provider: hackerrank-work
  endpoint: /x/api/v3/users/{id}
  method: GET
  scopes:
    - read
  tags:
    - candidates
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      id:
        type: integer
        description: "Candidate ID"
    required:
      - id

