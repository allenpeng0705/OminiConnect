- slug: clover_list_merchants
  name: List Merchants
  description: |
    Retrieve a list of all merchants associated with the Clover account.
  provider: clover
  endpoint: /merchants
  method: GET
  scopes:
    - merchant
  tags:
    - merchants
  input_schema:
    type: object
    description: Parameters for listing merchants
    properties:
      limit:
        type: integer
        description: "Maximum number of merchants to return"
    required: []
- slug: clover_get_merchant
  name: Get Merchant
  description: |
    Retrieve details of a specific merchant by ID.
  provider: clover
  endpoint: /merchants/{merchant_id}
  method: GET
  scopes:
    - merchant
  tags:
    - merchants
  input_schema:
    type: object
    description: Parameters for getting a merchant
    properties:
      merchant_id:
        type: string
        description: "The unique identifier of the merchant"
    required:
      - merchant_id
- slug: clover_list_orders
  name: List Orders
  description: |
    Retrieve a list of all orders for a merchant.
  provider: clover
  endpoint: /merchants/{merchant_id}/orders
  method: GET
  scopes:
    - orders:read
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      merchant_id:
        type: string
        description: "The unique identifier of the merchant"
      limit:
        type: integer
        description: "Maximum number of orders to return"
      offset:
        type: integer
        description: "Number of orders to skip for pagination"
    required:
      - merchant_id
- slug: clover_get_order
  name: Get Order
  description: |
