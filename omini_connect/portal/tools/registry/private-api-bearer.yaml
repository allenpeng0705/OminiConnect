- slug: private_bearer_search
  name: Search
  description: |
    Search resources by query.
  provider: private-api-bearer
  endpoint: /search
  method: GET
  scopes: []
  tags:
    - search
  input_schema:
    type: object
    description: Parameters for searching
    properties:
