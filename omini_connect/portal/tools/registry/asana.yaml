# Asana Tools - Allowlist
# Curated subset of Asana REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. asana_list_tasks           - List tasks
# 2. asana_get_task             - Get task details
# 3. asana_create_task          - Create a new task
# 4. asana_update_task          - Update a task
# 5. asana_list_projects        - List projects
# 6. asana_get_project          - Get project details
# 7. asana_list_teams           - List teams
# 8. asana_get_team             - Get team details
# 9. asana_list_portfolios      - List portfolios
# 10. asana_get_portfolio       - Get portfolio details

- slug: asana_list_tasks
  name: List Tasks
  description: |
    List tasks in Asana with optional filtering by project, assignee, completion status, or due date. Returns task names, IDs, assignees, and due dates.
    Use this to find and manage work items across your organization.
  provider: asana
  endpoint: /api/1.0/tasks
  method: GET
  scopes:
    - task:read
  tags:
    - tasks
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      project:
        type: string
        description: "Project GID to filter by"
      assignee:
        type: string
        description: "Assignee user GID"
      completed:
        type: boolean
        description: "Filter by completed status"
      due_on:
        type: string
        description: "Due date filter (YYYY-MM-DD)"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required: []

- slug: asana_get_task
  name: Get Task
  description: |
    Get detailed information about a specific Asana task by its ID. Returns the task name, description, assignee, due date, and completion status.
    This provides complete task details for tracking and management.
  provider: asana
  endpoint: /api/1.0/tasks/{task_gid}
  method: GET
  scopes:
    - task:read
  tags:
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for getting a task
    properties:
      task_gid:
        type: string
        description: "Task GID"
    required:
      - task_gid

- slug: asana_create_task
  name: Create Task
  description: |
    Create a new task in an Asana project or workspace with name, description, assignee, and due date. Returns the created task with its unique ID.
    This adds new work items to your project management workflow.
  provider: asana
  endpoint: /api/1.0/tasks
  method: POST
  scopes:
    - task:write
  tags:
    - tasks
    - create
  input_schema:
    type: object
    description: Parameters for creating a task
    properties:
      name:
        type: string
        description: "Task name"
      projects:
        type: array
        items:
          type: string
        description: "Project GIDs to add task to"
      assignee:
        type: string
        description: "Assignee user GID"
      notes:
        type: string
        description: "Task description"
      due_on:
        type: string
        description: "Due date (YYYY-MM-DD)"
    required:
      - name

- slug: asana_update_task
  name: Update Task
  description: |
    Update an existing Asana task with new name, description, assignee, due date, or completion status. Returns the updated task confirming the changes.
    This modifies existing tasks to keep work organized and current.
  provider: asana
  endpoint: /api/1.0/tasks/{task_gid}
  method: PUT
  scopes:
    - task:write
  tags:
    - tasks
    - update
  input_schema:
    type: object
    description: Parameters for updating a task
    properties:
      task_gid:
        type: string
        description: "Task GID"
      name:
        type: string
        description: "New name"
      notes:
        type: string
        description: "New description"
      assignee:
        type: string
        description: "New assignee GID"
      completed:
        type: boolean
        description: "Mark as completed (true/false)"
      due_on:
        type: string
        description: "New due date (YYYY-MM-DD)"
    required:
      - task_gid

- slug: asana_list_portfolios
  name: List Portfolios
  description: |
    List all portfolios in an Asana workspace. Returns portfolio names, IDs, colors, and project counts. Filter by color or owner to find specific portfolios.
    Use this to get an overview of multiple projects across your organization.
  provider: asana
  endpoint: /api/1.0/portfolios
  method: GET
  scopes:
    - portfolio:read
  tags:
    - portfolios
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing portfolios
    properties:
      workspace:
        type: string
        description: "Workspace GID"
      color:
        type: string
        description: "Filter by color"
      owner:
        type: string
        description: "Filter by owner user GID"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required: []

- slug: asana_get_portfolio
  name: Get Portfolio
  description: |
    Get detailed information about a specific Asana portfolio by its ID. Returns the portfolio name, color, projects, and metrics overview.
    This provides comprehensive portfolio data for executive-level tracking.
  provider: asana
  endpoint: /api/1.0/portfolios/{portfolio_gid}
  method: GET
  scopes:
    - portfolio:read
  tags:
    - portfolios
    - read
  input_schema:
    type: object
    description: Parameters for getting a portfolio
    properties:
      portfolio_gid:
        type: string
        description: "Portfolio GID"
    required:
      - portfolio_gid

- slug: asana_list_projects
  name: List Projects
  description: |
    List all projects in an Asana workspace. Returns project names, IDs, statuses, and team associations. Filter by team or archived status to find specific projects.
    This discovers available projects for work tracking and collaboration.
  provider: asana
  endpoint: /api/1.0/projects
  method: GET
  scopes:
    - project:read
  tags:
    - projects
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      workspace:
        type: string
        description: "Workspace GID"
      team:
        type: string
        description: "Team GID"
      archived:
        type: boolean
        description: "Include archived projects"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required:
      - workspace

- slug: asana_get_project
  name: Get Project
  description: |
    Get detailed information about a specific Asana project by its ID. Returns the project name, description, status, team, and member information.
