- slug: prospeo_list_campaigns
  name: List Campaigns
  description: |
    List all campaigns.
  provider: prospeo
  endpoint: /campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - marketing
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: prospeo_get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific campaign.
  provider: prospeo
  endpoint: /campaigns/{campaignId}
  method: GET
  scopes: []
  tags:
    - campaigns
    - marketing
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaignId:
        type: string
        description: "Campaign ID"
    required:
      - campaignId
