- slug: prospeo_get_domain_info
  name: Get Domain Info
  description: |
    Get information about a domain.
  provider: prospeo
  endpoint: /domain
  method: POST
  scopes: []
  tags:
    - domain
    - lookup
  input_schema:
    type: object
    description: Parameters for getting domain info
    properties:
      domain:
        type: string
        description: "Domain name"
    required:
