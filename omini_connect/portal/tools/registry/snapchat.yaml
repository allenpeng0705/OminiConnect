- slug: snapchat_create_ad
  name: Create Ad
  description: |
    Create a new ad within a campaign.
  provider: snapchat
  endpoint: /v1/ads
  method: POST
  scopes:
    - snapchat-marketing-api
  tags:
    - ads
    - create
  input_schema:
    type: object
    description: Parameters for creating an ad
    properties:
      campaignId:
        type: string
        description: "Campaign ID"
      name:
        type: string
        description: "Ad name"
      ad_type:
        type: string
        description: "Ad type (SNAP_AD, STORY, FILTER, etc.)"
      creative:
        type: object
        description: "Ad creative object"
    required:
      - campaignId
      - name
      - ad_type

