- slug: snapchat_get_ad
  name: Get Ad
  description: |
    Get detailed information about a specific ad.
  provider: snapchat
  endpoint: /v1/ads/{adId}
  method: GET
  scopes:
    - snapchat-marketing-api
  tags:
