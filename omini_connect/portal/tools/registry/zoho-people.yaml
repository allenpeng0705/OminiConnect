# Zoho People Tools - Allowlist
# Curated subset of Zoho People API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_people_list_employees           - List all employees
# # 2. zoho_people_get_employee           - Get employee details
# # 3. zoho_people_create_employee           - Create a new employee
# # 4. zoho_people_update_employee           - Update employee details
# # 5. zoho_people_list_attendance           - List attendance records
# # 6. zoho_people_record_attendance           - Record attendance entry
# # 7. zoho_people_list_leaves           - List all leave requests
# # 8. zoho_people_create_leave           - Create a leave request
# # 9. zoho_people_list_departments           - List all departments
# # 10. zoho_people_list_shifts           - List all shifts

- slug: zoho_people_list_employees
  name: List Employees
  description: |
    List all employees
  provider: zoho-people
  endpoint: /api/v1/employees
  method: GET
  scopes:
    - read
  tags:
    - zoho-people
  input_schema:
    type: object
    description: Parameters for list employees
    properties: {}
    required: []

- slug: zoho_people_get_employee
  name: Get Employee
  description: |
    Get employee details
  provider: zoho-people
  endpoint: /api/v1/employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - zoho-people
  input_schema:
    type: object
    description: Parameters for get employee
    properties: {}
    required: []

