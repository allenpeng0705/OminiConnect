# Braintree (Sandbox) Tools - Allowlist
# Curated subset of Braintree API for AI agent use.
# OAuth2 via Nango.
# Sandbox environment at https://api.sandbox.braintreegateway.com
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. braintree_sandbox_list_transactions  - List transactions
# 2. braintree_sandbox_get_transaction  - Get transaction details
# 3. braintree_sandbox_create_transaction - Create transaction
# 4. braintree_sandbox_void_transaction - Void transaction
# 5. braintree_sandbox_refund_transaction - Refund transaction
# 6. braintree_sandbox_list_customers  - List customers
# 7. braintree_sandbox_get_customer   - Get customer details
# 8. braintree_sandbox_create_customer - Create customer
# 9. braintree_sandbox_list_subscriptions - List subscriptions
# 10. braintree_sandbox_get_subscription - Get subscription details

- slug: braintree_sandbox_list_transactions
  name: List Transactions
  description: |
    List all transactions in sandbox.
  provider: braintree-sandbox
  endpoint: /v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - payments
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      merchantAccountId:
        type: string
        description: "Filter by merchant account"
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: braintree_sandbox_get_transaction
  name: Get Transaction
  description: |
    Get details for a specific transaction.
  provider: braintree-sandbox
  endpoint: /v1/transactions/{transactionId}
  method: GET
  scopes: []
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID"
    required:
      - transactionId

- slug: braintree_sandbox_create_transaction
  name: Create Transaction
  description: |
    Create a new transaction (sale or authorization).
  provider: braintree-sandbox
  endpoint: /v1/transactions"
  method: POST
  scopes: []
  tags:
    - transactions
    - create
  input_schema:
    type: object
    description: Parameters for creating a transaction
    properties:
      amount:
        type: number
        description: "Transaction amount"
      paymentMethodNonce:
        type: string
        description: "Nonce from client SDK"
      merchantAccountId:
        type: string
        description: "Merchant account ID"
      orderId:
        type: string
        description: "Order ID"
    required:
      - amount
      - paymentMethodNonce

- slug: braintree_sandbox_void_transaction
  name: Void Transaction
  description: |
    Void an existing transaction.
  provider: braintree-sandbox
  endpoint: /v1/transactions/{transactionId}/void"
  method: PUT
  scopes: []
  tags:
    - transactions
    - void
  input_schema:
    type: object
    description: Parameters for voiding a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID to void"
    required:
      - transactionId

- slug: braintree_sandbox_refund_transaction
  name: Refund Transaction
  description: |
    Refund a transaction.
  provider: braintree-sandbox
  endpoint: /v1/transactions/{transactionId}/refund"
  method: PUT
  scopes: []
  tags:
    - transactions
    - refund
  input_schema:
    type: object
    description: Parameters for refunding a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID to refund"
      amount:
        type: number
        description: "Refund amount (optional, full if not specified)"
    required:
      - transactionId

