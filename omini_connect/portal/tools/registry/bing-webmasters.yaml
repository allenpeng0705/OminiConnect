# Bing Webmasters Tools - Allowlist
# Curated subset of Bing Webmasters API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bing_get_site_info        - Get site info
# 2. bing_list_sites          - List verified sites
# 3. bing_add_url             - Submit a URL for indexing
# 4. bing_get_crawl_info      - Get crawl information
# 5. bing_list_keywords       - List keywords
# 6. bing_get_keyword_stats   - Get keyword statistics
# 7. bing_list_pages          - List indexed pages
# 8. bing_get_page_stats     - Get page statistics
# 9. bing_list_sitemaps      - List sitemaps
# 10. bing_submit_sitemap     - Submit a sitemap

- slug: bing_get_site_info
  name: Get Site Info
  description: |
    Get information about a verified site.
  provider: bing-webmasters
  endpoint: /api/sites/{siteUrl}
  method: GET
  scopes: []
  tags:
    - sites
    - info
  input_schema:
    type: object
    description: Parameters for getting site info
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
    required:
      - siteUrl

- slug: bing_list_sites
  name: List Sites
  description: |
    List all sites verified in Bing Webmasters.
  provider: bing-webmasters
  endpoint: /api/sites
  method: GET
  scopes: []
  tags:
    - sites
    - directory
  input_schema:
    type: object
    description: Parameters for listing sites
    properties: {}
    required: []

- slug: bing_add_url
  name: Add URL
  description: |
    Submit a URL for indexing in Bing.
  provider: bing-webmasters
  endpoint: /api/url
  method: POST
  scopes: []
  tags:
    - urls
    - indexing
  input_schema:
    type: object
    description: Parameters for submitting a URL
    properties:
      siteUrl:
        type: string
        description: "Site URL"
      url:
        type: string
        description: "URL to submit"
    required:
      - siteUrl
      - url

- slug: bing_get_crawl_info
  name: Get Crawl Info
  description: |
    Get crawl information for a site.
  provider: bing-webmasters
  endpoint: /api/crawlinfo/{siteUrl}
  method: GET
  scopes: []
  tags:
    - crawl
    - seo
  input_schema:
    type: object
    description: Parameters for getting crawl info
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
    required:
      - siteUrl

- slug: bing_list_keywords
  name: List Keywords
  description: |
    List keywords for a site with traffic data.
  provider: bing-webmasters
  endpoint: /api/keywords/{siteUrl}
  method: GET
  scopes: []
  tags:
    - keywords
    - seo
  input_schema:
    type: object
    description: Parameters for listing keywords
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Keywords per page"
        default: 20
    required:
      - siteUrl

- slug: bing_get_keyword_stats
  name: Get Keyword Stats
  description: |
    Get detailed statistics for a keyword.
  provider: bing-webmasters
  endpoint: /api/keywords/{siteUrl}/stats
  method: GET
  scopes: []
  tags:
    - keywords
    - stats
  input_schema:
    type: object
    description: Parameters for getting keyword stats
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
      keyword:
        type: string
        description: "Keyword to get stats for"
    required:
      - siteUrl
      - keyword

- slug: bing_list_pages
  name: List Pages
  description: |
    List indexed pages for a site.
  provider: bing-webmasters
  endpoint: /api/pages/{siteUrl}
  method: GET
  scopes: []
  tags:
    - pages
    - indexing
  input_schema:
    type: object
    description: Parameters for listing pages
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Pages per page"
        default: 20
    required:
