- slug: bing_get_page_stats
  name: Get Page Stats
  description: |
    Get statistics for a specific page.
  provider: bing-webmasters
  endpoint: /api/pages/{siteUrl}/{pageUrl}
  method: GET
  scopes: []
  tags:
    - pages
    - stats
  input_schema:
    type: object
    description: Parameters for getting page stats
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
      pageUrl:
        type: string
        description: "Page URL (URL-encoded)"
    required:
      - siteUrl
      - pageUrl

- slug: bing_list_sitemaps
  name: List Sitemaps
  description: |
    List all sitemaps for a site.
  provider: bing-webmasters
  endpoint: /api/sitemaps/{siteUrl}
  method: GET
  scopes: []
  tags:
    - sitemaps
    - seo
  input_schema:
    type: object
    description: Parameters for listing sitemaps
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
    required:
      - siteUrl

- slug: bing_submit_sitemap
  name: Submit Sitemap
  description: |
    Submit a sitemap for a site.
  provider: bing-webmasters
  endpoint: /api/sitemaps/{siteUrl}
  method: POST
  scopes: []
  tags:
    - sitemaps
    - seo
  input_schema:
    type: object
    description: Parameters for submitting a sitemap
    properties:
      siteUrl:
        type: string
        description: "Site URL (URL-encoded)"
      sitemapUrl:
        type: string
        description: "Sitemap URL"
    required:
      - siteUrl
      - sitemapUrl
