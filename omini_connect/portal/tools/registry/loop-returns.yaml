- slug: loop_create_exchange
  name: Create Exchange
  description: |
    Create an exchange for a return.
  provider: loop-returns
  endpoint: /v1/exchanges
  method: POST
  scopes: []
  tags:
    - exchanges
    - create
  input_schema:
    type: object
    description: Parameters for creating an exchange
    properties:
      return_id:
        type: string
        description: "Return ID"
      new_item_id:
        type: string
        description: "New item ID to exchange for"
      quantity:
        type: integer
        description: "Quantity"
        default: 1
    required:
      - return_id
      - new_item_id

