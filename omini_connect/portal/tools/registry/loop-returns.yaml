# Loop Returns Tools - Allowlist
# Curated subset of Loop Returns API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. loop_list_returns          - List all returns
# 2. loop_get_return            - Get return details
# 3. loop_create_return         - Create a return
# 4. loop_update_return         - Update a return
# 5. loop_list_policies         - List return policies
# 6. loop_get_policy            - Get policy details
# 7. loop_list_customers        - List customers
# 8. loop_get_customer           - Get customer details
# 9. loop_create_exchange       - Create an exchange
# 10. loop_list_reasons          - List return reasons

- slug: loop_list_returns
  name: List Returns
  description: |
    List all returns in Loop Returns.
    Filter by status, date, customer, or order.
  provider: loop-returns
  endpoint: /v1/returns
  method: GET
  scopes: []
  tags:
    - returns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing returns
    properties:
      status:
        type: string
        description: "Filter by status (pending, approved, rejected, received)"
      customer_id:
        type: string
        description: "Filter by customer ID"
      order_id:
        type: string
        description: "Filter by order ID"
      from_date:
        type: string
        description: "Filter from date (ISO 8601)"
      to_date:
        type: string
        description: "Filter to date (ISO 8601)"
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: loop_get_return
  name: Get Return
  description: |
    Get detailed information about a specific return.
  provider: loop-returns
  endpoint: /v1/returns/{returnId}
  method: GET
  scopes: []
  tags:
    - returns
    - read
  input_schema:
    type: object
    description: Parameters for getting a return
    properties:
      returnId:
        type: string
        description: "Return ID"
    required:
      - returnId

- slug: loop_create_return
  name: Create Return
  description: |
    Create a new return request.
  provider: loop-returns
  endpoint: /v1/returns
  method: POST
  scopes: []
  tags:
    - returns
    - create
  input_schema:
    type: object
    description: Parameters for creating a return
    properties:
      order_id:
        type: string
        description: "Original order ID"
      customer_id:
        type: string
        description: "Customer ID"
      reason:
        type: string
        description: "Return reason"
      items:
        type: array
        description: "Items to return"
        properties:
          item_id:
            type: string
          quantity:
            type: integer
    required:
      - order_id
      - customer_id

- slug: loop_update_return
  name: Update Return
  description: |
    Update an existing return request.
  provider: loop-returns
  endpoint: /v1/returns/{returnId}
  method: PUT
  scopes: []
  tags:
    - returns
    - update
  input_schema:
    type: object
    description: Parameters for updating a return
    properties:
      returnId:
        type: string
        description: "Return ID"
      status:
        type: string
        description: "New status"
      internal_note:
        type: string
        description: "Internal note"
    required:
      - returnId

