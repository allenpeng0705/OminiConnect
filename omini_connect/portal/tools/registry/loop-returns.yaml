- slug: loop_create_exchange
  name: Create Exchange
  description: |
    Create an exchange for a return to replace items with new products.
    Returns the created exchange with its unique ID and confirmation.
    This provisions a new exchange for customer replacement requests.
  provider: loop-returns
  endpoint: /v1/exchanges
  method: POST
  scopes: []
  tags:
    - exchanges
    - create
  input_schema:
    type: object
    description: Parameters for creating an exchange
    properties:
      return_id:
        type: string
        description: "Return ID"
      new_item_id:
        type: string
        description: "New item ID to exchange for"
      quantity:
        type: integer
        description: "Quantity"
        default: 1
    required:
      - return_id
      - new_item_id

