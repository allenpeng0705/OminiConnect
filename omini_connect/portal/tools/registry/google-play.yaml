# Google Play Tools - Allowlist
# Curated subset of Google Play Developer API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_play_list_apps           - List apps
# 2. google_play_get_app            - Get app details
# 3. google_play_list_reviews       - List reviews
# 4. google_play_get_review          - Get review details
# 5. google_play_list_subscriptions - List subscriptions
# 6. google_play_get_subscription    - Get subscription details
# 7. google_play_list_orders         - List orders
# 8. google_play_get_order          - Get order details
# 9. google_play_list_refunds       - List refunds
# 10. google_play_list_reviews_response - List review responses

- slug: google_play_list_apps
  name: List Apps
  description: |
    List apps in Google Play Console.
  provider: google-play
  endpoint: /androidpublisher/v3/applications
  method: GET
  scopes:
    - https://www.googleapis.com/auth/androidpublisher
  tags:
    - play
    - apps
    - list
  input_schema:
    type: object
    description: Parameters for listing apps
    properties: {}

- slug: google_play_get_app
  name: Get App
  description: |
    Get details about an app.
  provider: google-play
  endpoint: /androidpublisher/v3/applications/{package_name}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/androidpublisher
  tags:
    - play
    - apps
    - read
  input_schema:
    type: object
    description: Parameters for getting an app
    properties:
      package_name:
        type: string
        description: "App package name"
    required:
      - package_name

