# Semrush Tools - Allowlist
# Curated subset of Semrush API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_projects                             - List all Semrush projects
# 2. get_domain_analytics                     - Get domain analytics data
# 3. get_keyword_analytics                    - Get keyword analytics
# 4. get_backlinks                            - Get backlink data
# 5. get_traffic_analytics                    - Get traffic analytics
# 6. get_position_tracking                    - Get position tracking data
# 7. get_analytics_overview                   - Get analytics overview
# 8. get_competitors                          - Get competitor analysis
# 9. get_link_build                           - Get link building opportunities
# 10. get_social_media                         - Get social media analytics

- slug: get_projects
  name: Get Projects
  description: |
    List all SEO projects in Semrush associated with the account. Returns project names, URLs, creation dates, and tracking status for campaign management.
  provider: semrush
  endpoint: /management/v1/projects
  method: GET
  scopes: []
  tags:
    - projects
    - seo
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_domain_analytics
  name: Get Domain Analytics
