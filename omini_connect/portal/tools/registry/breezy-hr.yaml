# Breezy HR Tools - Allowlist
# Curated subset of Breezy HR API for AI agent use.
# TWO_STEP auth via Nango (email + password login).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. breezy_list_positions        - List positions
# 2. breezy_get_position        - Get position details
# 3. breezy_list_candidates     - List candidates
# 4. breezy_get_candidate       - Get candidate details
# 5. breezy_list_interviews     - List interviews
# 6. breezy_get_interview      - Get interview details
# 7. breezy_list_members        - List team members
# 8. breezy_get_member          - Get member details
# 9. breezy_list_offer_docs    - List offer documents
# 10. breezy_get_offer         - Get offer details

- slug: breezy_list_positions
  name: List Positions
  description: |
    List all job positions in Breezy HR.
  provider: breezy-hr
  endpoint: /v3/positions
  method: GET
  scopes: []
  tags:
    - positions
    - jobs
  input_schema:
    type: object
    description: Parameters for listing positions
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, draft"
        default: open
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: breezy_get_position
  name: Get Position
  description: |
    Get details for a specific position.
  provider: breezy-hr
  endpoint: /v3/positions/{positionId}
  method: GET
  scopes: []
  tags:
    - positions
    - read
  input_schema:
    type: object
    description: Parameters for getting a position
    properties:
      positionId:
        type: string
        description: "Position ID"
    required:
      - positionId

