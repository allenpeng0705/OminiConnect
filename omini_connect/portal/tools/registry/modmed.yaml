# ModMed Tools - Allowlist
# Curated subset of ModMed API for AI agent use.
# TWO_STEP via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. modmed_list_patients          - List patients
# 2. modmed_get_patient            - Get patient details
# 3. modmed_list_appointments     - List appointments
# 4. modmed_get_appointment       - Get appointment details
# 5. modmed_list_practices        - List practices
# 6. modmed_get_practice          - Get practice details
# 7. modmed_list_providers        - List providers
# 8. modmed_get_provider          - Get provider details
# 9. modmed_list_medical_records  - List medical records
# 10. modmed_get_record          - Get medical record details

- slug: modmed_list_patients
  name: List Patients
  description: |
    List all patients in ModMed.
    Filter by name, DOB, or practice.
  provider: modmed
  endpoint: /ema/api/v1/patients
  method: GET
  scopes: []
  tags:
    - patients
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing patients
    properties:
      search:
        type: string
        description: "Search by name or patient ID"
      practice_id:
        type: string
        description: "Filter by practice ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: modmed_get_patient
  name: Get Patient
  description: |
    Get details of a specific patient.
  provider: modmed
  endpoint: /ema/api/v1/patients/{patientId}
  method: GET
  scopes: []
  tags:
    - patients
    - read
  input_schema:
    type: object
    description: Parameters for getting a patient
    properties:
      patientId:
        type: string
        description: "Patient ID"
    required:
      - patientId

