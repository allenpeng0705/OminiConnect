- slug: sharpspring_list_campaigns
  name: List Campaigns
  description: |
    Retrieve a list of all marketing campaigns.
  provider: sharpspring
  endpoint: /campaigns
  method: GET
  scopes:
    - campaigns_read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by campaign status (active, paused, completed)"
      page:
        type: integer
        description: "Page number for pagination"
    required: []

- slug: sharpspring_get_campaign
  name: Get Campaign
  description: |
    Retrieve detailed information for a specific campaign by ID.
  provider: sharpspring
  endpoint: /campaigns/{id}
  method: GET
  scopes:
    - campaigns_read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

- slug: sharpspring_create_campaign
  name: Create Campaign
  description: |
    Create a new marketing automation campaign.
  provider: sharpspring
  endpoint: /campaigns
  method: POST
  scopes:
    - campaigns_write
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      name:
        type: string
        description: "Name of the campaign"
      description:
        type: string
        description: "Description of the campaign"
      status:
        type: string
        description: "Initial status of the campaign"
    required:
      - name

- slug: sharpspring_list_contacts
  name: List Contacts
  description: |
    Retrieve a paginated list of all contacts in the marketing system.
  provider: sharpspring
  endpoint: /contacts
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of records per page"
    required: []

- slug: sharpspring_get_contact
  name: Get Contact
  description: |
    Retrieve detailed information for a specific contact by ID.
  provider: sharpspring
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: sharpspring_create_contact
  name: Create Contact
  description: |
    Create a new contact in the marketing automation system.
  provider: sharpspring
  endpoint: /contacts
  method: POST
  scopes:
    - contacts_write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name of the contact"
      last_name:
        type: string
        description: "Last name of the contact"
      email:
        type: string
        description: "Email address of the contact"
    required:
      - first_name
      - last_name
      - email

