- slug: freshsales_list_contacts
  name: List Contacts
  description: |
    Retrieve a paginated list of contacts from Freshsales CRM.
  provider: freshsales
  endpoint: /crm/sales/contacts
  method: GET
  scopes:
    - crm.contacts.read
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      filter:
        type: string
        description: "Filter type: all, walk_in, cold_call, marketing"
      sort_by:
        type: string
        description: "Field to sort by"
      sort_order:
        type: string
        description: "asc or desc"
      per_page:
        type: integer
        description: "Number of results per page (default 20)"
      page:
        type: integer
        description: "Page number for pagination"
    required: []

- slug: freshsales_get_contact
  name: Get Contact
  description: |
    Retrieve detailed information for a specific contact by ID.
  provider: freshsales
  endpoint: /crm/sales/contacts/{id}
  method: GET
  scopes:
    - crm.contacts.read
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: freshsales_create_contact
  name: Create Contact
  description: |
    Create a new contact in Freshsales CRM.
  provider: freshsales
  endpoint: /crm/sales/contacts
  method: POST
  scopes:
    - crm.contacts.write
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name of the contact"
      last_name:
        type: string
        description: "Last name of the contact"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      mobile:
        type: string
        description: "Mobile number"
    required:
      - first_name
      - last_name

