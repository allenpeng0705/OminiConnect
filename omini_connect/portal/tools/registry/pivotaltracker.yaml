- slug: pivotaltracker_list_iterations
  name: List Iterations
  description: |
    List all iterations in a project.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/iterations
  method: GET
  scopes: []
  tags:
    - iterations
    - agile
    - list
  input_schema:
    type: object
    description: Parameters for listing iterations
    properties:
      projectId:
        type: string
        description: "Project ID"
      limit:
        type: integer
        description: "Number of iterations to return"
        default: 10
    required:
      - projectId

