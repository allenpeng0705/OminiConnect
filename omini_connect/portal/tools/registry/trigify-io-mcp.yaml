# Trigify Tools - Allowlist
# Curated subset of Trigify API for AI agent use.
# MCP OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. trigify_list_campaigns           - List all marketing campaigns
# # 2. trigify_get_campaign           - Get campaign details
# # 3. trigify_create_campaign           - Create a new campaign
# # 4. trigify_list_leads           - List all leads
# # 5. trigify_get_lead           - Get lead details
# # 6. trigify_create_lead           - Create a new lead
# # 7. trigify_list_automations           - List automation workflows
# # 8. trigify_trigger_automation           - Trigger an automation
# # 9. trigify_list_templates           - List message templates
# # 10. trigify_send_message           - Send a message to a lead

- slug: trigify_list_campaigns
  name: List Campaigns
  description: |
    List all marketing campaigns
  provider: trigify-io-mcp
  endpoint: /api/campaigns
  method: GET
  scopes:
    - read
  tags:
    - trigify-io-mcp
  input_schema:
    type: object
    description: Parameters for list campaigns
    properties: {}
    required: []

- slug: trigify_get_campaign
  name: Get Campaign
  description: |
    Get campaign details
  provider: trigify-io-mcp
  endpoint: /api/campaigns/{id}
  method: GET
  scopes:
    - read
  tags:
    - trigify-io-mcp
  input_schema:
    type: object
    description: Parameters for get campaign
    properties: {}
    required: []

- slug: trigify_create_campaign
  name: Create Campaign
