- slug: ramp_create_expense
  name: Create Expense
  description: |
    Create a new expense record.
  provider: ramp
  endpoint: /v1/expenses
  method: POST
  scopes:
    - expenses:write
  tags:
    - expenses
    - finance
    - create
  input_schema:
    type: object
    description: Parameters for creating an expense
    properties:
      amount:
        type: number
        description: "Expense amount"
      currency:
        type: string
        description: "Currency code (e.g., USD)"
        default: USD
      merchantName:
        type: string
        description: "Merchant name"
      description:
        type: string
        description: "Expense description"
      employeeId:
        type: string
        description: "Employee ID"
      date:
        type: string
        description: "Expense date (ISO 8601)"
    required:
      - amount
      - merchantName

