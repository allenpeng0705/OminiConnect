# xAI Tools - Allowlist
# Curated subset of xAI API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. xai_get_model           - Get model information
# # 2. xai_list_models           - List available models
# # 3. xai_create_chat_completion           - Create a chat completion
# # 4. xai_create_completion           - Create a text completion
# # 5. xai_create_embedding           - Create embeddings
# # 6. xai_get_usage           - Get API usage statistics
# # 7. xai_list_files           - List uploaded files
# # 8. xai_upload_file           - Upload a file
# # 9. xai_get_file           - Get file details
# # 10. xai_delete_file           - Delete a file

