- slug: cloudbeds_list_reservations
  name: List Reservations
  description: |
    Retrieve a list of all reservations in the property.
  provider: cloudbeds
  endpoint: /reservations
  method: GET
  scopes:
    - reservations:read
  tags:
    - reservations
  input_schema:
    type: object
    description: Parameters for listing reservations
    properties:
      property_id:
        type: string
        description: "The unique identifier of the property"
      start_date:
        type: string
        description: "Filter reservations from this date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "Filter reservations until this date (YYYY-MM-DD)"
      limit:
        type: integer
        description: "Maximum number of reservations to return"
    required:
      - property_id
- slug: cloudbeds_get_reservation
  name: Get Reservation
  description: |
    Retrieve details of a specific reservation by ID.
  provider: cloudbeds
  endpoint: /reservations/{reservation_id}
  method: GET
  scopes:
    - reservations:read
  tags:
    - reservations
  input_schema:
    type: object
    description: Parameters for getting a reservation
    properties:
      reservation_id:
        type: string
        description: "The unique identifier of the reservation"
    required:
      - reservation_id
- slug: cloudbeds_create_reservation
  name: Create Reservation
  description: |
    Create a new reservation in the property.
  provider: cloudbeds
  endpoint: /reservations
  method: POST
  scopes:
    - reservations:write
  tags:
    - reservations
  input_schema:
    type: object
    description: Parameters for creating a reservation
    properties:
      property_id:
        type: string
        description: "The unique identifier of the property"
      guest_id:
        type: string
        description: "The unique identifier of the guest"
      room_id:
        type: string
        description: "The unique identifier of the room"
      check_in:
        type: string
        description: "Check-in date (YYYY-MM-DD)"
      check_out:
        type: string
        description: "Check-out date (YYYY-MM-DD)"
    required:
      - property_id
      - guest_id
      - room_id
      - check_in
      - check_out
