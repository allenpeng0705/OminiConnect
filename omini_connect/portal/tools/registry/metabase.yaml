  input_schema:
    type: object
    description: Parameters for listing dashboards
    properties:
      limit:
        type: integer
        description: "Maximum number of dashboards to return"
        default: 100
    required: []

- slug: metabase_get_dashboard
  name: Get Dashboard
  description: |
    Get detailed information about a specific dashboard including cards, tabs, and parameters.
  provider: metabase
  endpoint: /api/dashboard/{dashboard_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - dashboard
    - read
  input_schema:
    type: object
    description: Parameters for getting a dashboard
    properties:
      dashboard_id:
        type: integer
        description: "Dashboard ID (required)"
    required:
      - dashboard_id

- slug: metabase_get_pulse
  name: Get Pulse
  description: |
    Get detailed information about a pulse (scheduled report/subscription) including schedule and recipients.
  provider: metabase
  endpoint: /api/pulse/{pulse_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - pulse
    - read
  input_schema:
    type: object
    description: Parameters for getting a pulse
    properties:
      pulse_id:
        type: integer
        description: "Pulse ID (required)"
    required:
      - pulse_id
