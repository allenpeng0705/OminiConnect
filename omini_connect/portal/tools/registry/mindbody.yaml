- slug: mindbody_list_classes
  name: List Classes
  description: |
    List all classes in Mindbody.
    Filter by location, date, or instructor.
  provider: mindbody
  endpoint: /public/v6/classes
  method: GET
  scopes: []
  tags:
    - classes
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing classes
    properties:
      location_id:
        type: integer
        description: "Filter by location ID"
      start_date:
        type: string
        description: "Start date (ISO 8601)"
      end_date:
        type: string
        description: "End date (ISO 8601)"
      staff_id:
        type: integer
        description: "Filter by instructor"
    required: []

- slug: mindbody_get_class
  name: Get Class
  description: |
    Get details of a specific class.
  provider: mindbody
  endpoint: /public/v6/classes/{classId}
  method: GET
  scopes: []
  tags:
    - classes
    - read
  input_schema:
    type: object
    description: Parameters for getting a class
    properties:
      classId:
        type: integer
        description: "Class ID"
    required:
      - classId

- slug: mindbody_list_clients
  name: List Clients
  description: |
    List all clients in Mindbody.
    Filter by search term or status.
  provider: mindbody
  endpoint: /public/v6/clients
  method: GET
  scopes: []
  tags:
    - clients
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      search_text:
        type: string
        description: "Search by name or email"
      limit:
        type: integer
        description: "Max results"
        default: 50
    required: []

- slug: mindbody_get_client
  name: Get Client
  description: |
    Get details of a specific client.
  provider: mindbody
  endpoint: /public/v6/clients/{clientId}
  method: GET
  scopes: []
  tags:
    - clients
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      clientId:
        type: string
        description: "Client ID"
    required:
      - clientId
