# Mindbody Tools - Allowlist
# Curated subset of Mindbody API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. mindbody_list_locations       - List locations
# 2. mindbody_get_location        - Get location details
# 3. mindbody_list_staff          - List staff members
# 4. mindbody_get_staff           - Get staff details
# 5. mindbody_list_services       - List services
# 6. mindbody_get_service         - Get service details
# 7. mindbody_list_classes        - List classes
# 8. mindbody_get_class           - Get class details
# 9. mindbody_list_clients        - List clients
# 10. mindbody_get_client        - Get client details

- slug: mindbody_list_locations
  name: List Locations
  description: |
    List all Mindbody locations.
  provider: mindbody
  endpoint: /public/v6/site/locations
  method: GET
  scopes: []
  tags:
    - locations
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing locations
    properties: {}
    required: []

- slug: mindbody_get_location
  name: Get Location
  description: |
    Get details of a specific Mindbody location.
  provider: mindbody
  endpoint: /public/v6/site/locations/{locationId}
  method: GET
  scopes: []
  tags:
    - locations
    - read
  input_schema:
    type: object
    description: Parameters for getting a location
    properties:
      locationId:
        type: integer
        description: "Location ID"
    required:
      - locationId

- slug: mindbody_list_staff
  name: List Staff
  description: |
    List all staff members in Mindbody.
    Filter by location or service.
  provider: mindbody
  endpoint: /public/v6/staff/staffmembers
  method: GET
  scopes: []
  tags:
    - staff
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing staff
    properties:
      location_id:
        type: integer
        description: "Filter by location ID"
    required: []

- slug: mindbody_get_staff
  name: Get Staff
  description: |
    Get details of a specific staff member.
  provider: mindbody
  endpoint: /public/v6/staff/staffmembers/{staffId}
  method: GET
  scopes: []
  tags:
    - staff
    - read
  input_schema:
    type: object
    description: Parameters for getting a staff member
    properties:
      staffId:
        type: integer
        description: "Staff ID"
    required:
      - staffId

- slug: mindbody_list_services
  name: List Services
  description: |
    List all services (classes, appointments) in Mindbody.
  provider: mindbody
  endpoint: /public/v6/services
  method: GET
  scopes: []
  tags:
    - services
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing services
    properties:
      location_id:
        type: integer
        description: "Filter by location ID"
    required: []

- slug: mindbody_get_service
  name: Get Service
  description: |
    Get details of a specific service.
  provider: mindbody
  endpoint: /public/v6/services/{serviceId}
  method: GET
  scopes: []
  tags:
    - services
    - read
  input_schema:
    type: object
    description: Parameters for getting a service
    properties:
      serviceId:
        type: integer
        description: "Service ID"
    required:
