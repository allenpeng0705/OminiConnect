- slug: salesforce_more_list_cases
  name: List Cases
  description: |
    Retrieve a list of all support cases in Salesforce with status and priority filtering.
    Returns case IDs, subjects, status, priority, and created dates for each case.
    Use this to discover support cases and track customer issues.
  provider: salesforce_more
  endpoint: /services/data/v59.0/sobjects/Case
  method: GET
  scopes:
    - cases.read
  tags:
    - cases
  input_schema:
    type: object
    description: Parameters for listing cases
    properties:
      limit:
        type: integer
        description: "Maximum number of cases to return (default 50, max 200)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      status:
        type: string
        description: "Filter by case status (e.g., New, Open, Closed)"
      priority:
        type: string
        description: "Filter by priority (e.g., Low, Medium, High, Critical)"
    required: []

- slug: salesforce_more_get_case
  name: Get Case
  description: |
    Retrieve detailed information for a specific case by ID including description and resolution details.
    Returns the complete case data with all associated information.
    This provides full case data for support management and resolution tracking.
  provider: salesforce_more
  endpoint: /services/data/v59.0/sobjects/Case/{case_id}
  method: GET
  scopes:
    - cases.read
  tags:
    - cases
  input_schema:
    type: object
    description: Parameters for getting a case
    properties:
      case_id:
        type: string
        description: "Unique identifier of the case"
    required:
      - case_id

- slug: salesforce_more_create_case
  name: Create Case
  description: |
    Create a new support case in Salesforce with subject, description, and priority.
    Returns the created case with its unique ID and confirmation.
    This logs a new customer issue for tracking and resolution.
  provider: salesforce_more
  endpoint: /services/data/v59.0/sobjects/Case
  method: POST
  scopes:
    - cases.write
  tags:
    - cases
  input_schema:
    type: object
    description: Parameters for creating a case
    properties:
      subject:
        type: string
        description: "Subject/title of the case"
      description:
        type: string
        description: "Detailed description of the case"
      status:
        type: string
        description: "Initial status (default: New)"
      priority:
        type: string
        description: "Priority level (Low, Medium, High, Critical)"
      account_id:
        type: string
        description: "ID of the associated account"
    required:
      - subject
      - description

- slug: salesforce_more_update_case
  name: Update Case
  description: |
    Update an existing support case in Salesforce with new status, priority, or resolution.
    Returns the updated case confirmation with modified fields.
    This modifies case information for status tracking and resolution management.
  provider: salesforce_more
  endpoint: /services/data/v59.0/sobjects/Case/{case_id}
  method: PATCH
  scopes:
    - cases.write
  tags:
    - cases
  input_schema:
    type: object
    description: Parameters for updating a case
    properties:
      case_id:
        type: string
        description: "Unique identifier of the case"
      status:
        type: string
        description: "Updated status"
      priority:
        type: string
        description: "Updated priority"
      resolution:
        type: string
        description: "Resolution description"
    required:
      - case_id

