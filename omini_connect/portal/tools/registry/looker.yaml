- slug: looker_run_look
  name: Run Look
  description: |
    Run a Look look and get results.
  provider: looker
  endpoint: /looks/{lookId}/run
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - looks
    - execute
  input_schema:
    type: object
    description: Parameters for running a look
    properties:
      lookId:
        type: string
        description: "Look ID"
      format:
        type: string
        description: "Output format: json, csv, html (default json)"
        enum: [json, csv, html]
        default: json
    required:
      - lookId

- slug: looker_get_query
