# Listrak Tools - Allowlist
# Curated subset of Listrak API for AI agent use.
# OAUTH2_CC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. listrak_list_contacts         - List contacts
# 2. listrak_get_contact           - Get contact details
# 3. listrak_add_contact           - Add a contact
# 4. listrak_update_contact        - Update a contact
# 5. listrak_list_schemas         - List schemas
# 6. listrak_get_schema          - Get schema details
# 7. listrak_list_segments       - List segments
# 8. listrak_get_segment         - Get segment details
# 9. listrak_list_email_campaigns - List email campaigns
# 10. listrak_get_email_campaign  - Get email campaign details

- slug: listrak_list_contacts
  name: List Contacts
  description: |
    List all contacts in your Listrak account with pagination. Returns contact IDs, email addresses, names, and custom field values for each contact.
  provider: listrak
  endpoint: /email/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: listrak_get_contact
  name: Get Contact
  description: |
    Retrieve details about a specific Listrak contact by their ID. Returns the contact's name, email, phone number, and all custom field data and segment memberships.
  provider: listrak
  endpoint: /email/contacts/{contact_id}
  method: GET
  scopes: []
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contact_id:
        type: integer
        description: "Contact ID"
    required:
      - contact_id

- slug: listrak_add_contact
  name: Add Contact
  description: |
    Add a new contact to your Listrak account with email and personal information. Returns the created contact with their unique ID and confirmation.
  provider: listrak
  endpoint: /email/contacts
  method: POST
  scopes: []
  tags:
    - contacts
    - create
    - write
  input_schema:
    type: object
    description: Parameters for adding a contact
    properties:
      email:
        type: string
        description: "Email address"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - email

- slug: listrak_update_contact
  name: Update Contact
  description: |
    Update an existing Listrak contact's information and custom field values. Returns the updated contact confirming all modified field values.
  provider: listrak
  endpoint: /email/contacts/{contact_id}
  method: PUT
  scopes: []
  tags:
    - contacts
    - update
    - write
  input_schema:
    type: object
    description: Parameters for updating a contact
    properties:
      contact_id:
        type: integer
        description: "Contact ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - contact_id

- slug: listrak_list_schemas
  name: List Schemas
  description: |
    List all contact schemas in your Listrak account defining custom field structures. Returns schema names, IDs, and field definitions for each schema.
  provider: listrak
  endpoint: /email/schemas
  method: GET
  scopes: []
  tags:
    - schemas
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing schemas
    properties: {}
    required: []

- slug: listrak_get_schema
  name: Get Schema
  description: |
    Retrieve details about a specific Listrak contact schema by its ID. Returns the schema name, field definitions, and validation rules for each custom field.
  provider: listrak
  endpoint: /email/schemas/{schema_id}
  method: GET
  scopes: []
  tags:
    - schemas
    - read
  input_schema:
    type: object
    description: Parameters for getting a schema
    properties:
      schema_id:
        type: integer
        description: "Schema ID"
    required:
      - schema_id

- slug: listrak_list_segments
  name: List Segments
  description: |
    List all contact segments in your Listrak account for targeted messaging. Returns segment names, IDs, and member counts for each segment.
  provider: listrak
  endpoint: /email/segments
  method: GET
  scopes: []
  tags:
    - segments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing segments
    properties: {}
    required: []

- slug: listrak_get_segment
  name: Get Segment
  description: |
    Retrieve details about a specific Listrak segment by its ID. Returns the segment name, description, member count, and filtering criteria.
  provider: listrak
  endpoint: /email/segments/{segment_id}
  method: GET
  scopes: []
  tags:
    - segments
    - read
  input_schema:
    type: object
    description: Parameters for getting a segment
    properties:
      segment_id:
        type: integer
        description: "Segment ID"
    required:
      - segment_id

- slug: listrak_list_email_campaigns
  name: List Email Campaigns
  description: |
    List all email campaigns in your Listrak account with pagination. Returns campaign names, IDs, statuses, and scheduled or sent timestamps for each campaign.
  provider: listrak
  endpoint: /email/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing email campaigns
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: listrak_get_email_campaign
  name: Get Email Campaign
  description: |
    Retrieve details about a specific Listrak email campaign by its ID. Returns the campaign subject, content, recipient count, and delivery statistics.
  provider: listrak
  endpoint: /email/campaigns/{campaign_id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting an email campaign
    properties:
      campaign_id:
        type: integer
        description: "Campaign ID"
    required:
      - campaign_id
