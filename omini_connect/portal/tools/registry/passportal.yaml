- slug: passportal_create_password
  name: Create Password
  description: |
    Create a new password entry.
  provider: passportal
  endpoint: /api/v2/passwords
  method: POST
  scopes:
    - passwords:write
  tags:
    - passwords
    - credentials
    - create
  input_schema:
    type: object
    description: Parameters for creating a password
    properties:
      site_id:
        type: integer
        description: "Site ID"
      name:
        type: string
        description: "Password name"
      username:
        type: string
        description: "Username"
      password:
        type: string
        description: "Password"
    required:
      - site_id
      - name

