# Lucid SCIM Tools - Allowlist
# Curated subset of Lucid SCIM API for AI agent use.
# API_KEY via Nango (SCIM token).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lucid_scim_list_users       - List all users (SCIM)
# 2. lucid_scim_get_user         - Get user details (SCIM)
# 3. lucid_scim_create_user      - Create a new user (SCIM)
# 4. lucid_scim_update_user      - Update a user (SCIM)
# 5. lucid_scim_delete_user      - Delete a user (SCIM)
# 6. lucid_scim_list_groups      - List all groups (SCIM)
# 7. lucid_scim_get_group        - Get group details (SCIM)
# 8. lucid_scim_create_group     - Create a group (SCIM)
# 9. lucid_scim_update_group     - Update a group (SCIM)
# 10. lucid_scim_delete_group    - Delete a group (SCIM)

- slug: lucid_scim_list_users
  name: List Users (SCIM)
  description: |
    List all user accounts in your Lucid organization via SCIM API with optional filtering and pagination. Returns user IDs, names, emails, and active status for each user.
  provider: lucid-scim
  endpoint: /v2/Users
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM users
    properties:
      filter:
        type: string
        description: "Filter expression (e.g., userName eq 'john@example.com')"
      startIndex:
        type: integer
        description: "Starting index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results to return"
        default: 100
    required: []

- slug: lucid_scim_get_user
  name: Get User (SCIM)
  description: |
    Get detailed information about a specific Lucid user by their SCIM ID. Returns the user's name, email, role, and active status.
  provider: lucid-scim
  endpoint: /v2/Users/{id}
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

- slug: lucid_scim_create_user
  name: Create User (SCIM)
  description: |
    Create a new user account in Lucid via SCIM API. Specify the username, name, and email address. Creates the user and returns the new user record.
  provider: lucid-scim
  endpoint: /v2/Users
  method: POST
  scopes: []
  tags:
    - scim
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      emails:
        type: array
        description: "Email addresses"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName

- slug: lucid_scim_update_user
  name: Update User (SCIM)
  description: |
    Update an existing Lucid user account via SCIM API. Modify the username, name, or active status. Returns the updated user record confirming all changes.
  provider: lucid-scim
  endpoint: /v2/Users/{id}
  method: PUT
  scopes: []
  tags:
    - scim
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      active:
        type: boolean
        description: "Whether user is active"
    required:
      - id

- slug: lucid_scim_delete_user
  name: Delete User (SCIM)
  description: |
    Delete a user account from Lucid via SCIM API. Permanently removes the user and their access to the organization.
  provider: lucid-scim
  endpoint: /v2/Users/{id}
  method: DELETE
  scopes: []
  tags:
    - scim
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

- slug: lucid_scim_list_groups
  name: List Groups (SCIM)
  description: |
    List all groups in your Lucid organization via SCIM API with optional filtering and pagination. Returns group IDs, display names, and member counts for each group.
  provider: lucid-scim
  endpoint: /v2/Groups
  method: GET
  scopes: []
  tags:
    - scim
    - groups
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM groups
    properties:
      filter:
        type: string
        description: "Filter expression"
      startIndex:
        type: integer
        description: "Starting index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results to return"
        default: 100
    required: []

- slug: lucid_scim_get_group
  name: Get Group (SCIM)
  description: |
    Get detailed information about a specific Lucid group by its SCIM ID. Returns the group display name, description, and member list.
  provider: lucid-scim
  endpoint: /v2/Groups/{id}
  method: GET
  scopes: []
  tags:
    - scim
    - groups
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM group
    properties:
      id:
        type: string
        description: "Group ID (SCIM id)"
    required:
      - id

- slug: lucid_scim_create_group
  name: Create Group (SCIM)
  description: |
    Create a new group in Lucid via SCIM API. Specify the display name and optional member list. Creates the group and returns it with its unique ID.
  provider: lucid-scim
  endpoint: /v2/Groups
  method: POST
  scopes: []
  tags:
    - scim
    - groups
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM group
    properties:
      displayName:
        type: string
        description: "Group display name"
      members:
        type: array
        description: "List of member user IDs"
    required:
      - displayName

- slug: lucid_scim_update_group
  name: Update Group (SCIM)
  description: |
    Update an existing Lucid group via SCIM API. Modify the display name or member list. Returns the updated group confirming all changes.
  provider: lucid-scim
  endpoint: /v2/Groups/{id}
  method: PUT
  scopes: []
  tags:
    - scim
    - groups
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM group
    properties:
      id:
        type: string
        description: "Group ID (SCIM id)"
      displayName:
        type: string
        description: "Group display name"
      members:
        type: array
        description: "List of member user IDs"
    required:
      - id

- slug: lucid_scim_delete_group
  name: Delete Group (SCIM)
  description: |
    Delete a group from Lucid via SCIM API. Permanently removes the group and its member associations.
  provider: lucid-scim
  endpoint: /v2/Groups/{id}
  method: DELETE
  scopes: []
  tags:
    - scim
    - groups
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM group
    properties:
      id:
        type: string
        description: "Group ID (SCIM id)"
    required:
      - id
