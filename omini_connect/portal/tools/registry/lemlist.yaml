# lemlist Tools - Allowlist
# Curated subset of lemlist API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lemlist_get_team            - Get team info
# 2. lemlist_list_campaigns      - List campaigns
# 3. lemlist_get_campaign       - Get campaign details
# 4. lemlist_list_leads         - List leads
# 5. lemlist_add_lead           - Add a lead
# 6. lemlist_update_lead        - Update a lead
# 7. lemlist_list_unsubscribed  - List unsubscribed leads
# 8. lemlist_list_blacklisted   - List blacklisted leads
# 9. lemlist_list_stats         - Get stats
# 10. lemlist_get_campaign_stats - Get campaign stats

- slug: lemlist_get_team
  name: Get Team Info
  description: |
    Get your Lemlist team information including team name, owner details, and subscription plan.
    Returns the authenticated team's account details and current subscription status.
  provider: lemlist
  endpoint: /api/team
  method: GET
  scopes: []
  tags:
    - team
    - read
    - auth
  input_schema:
    type: object
    description: Parameters for getting team info
    properties: {}
    required: []

- slug: lemlist_list_campaigns
  name: List Campaigns
  description: |
    List all email campaigns in your Lemlist account. Returns campaign names, IDs, statuses, target audience sizes, and scheduled dates for each campaign.
  provider: lemlist
  endpoint: /api/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: lemlist_get_campaign
  name: Get Campaign
  description: |
    Get detailed information for a specific Lemlist campaign by its ID. Returns campaign name, status, settings, configured steps, and performance statistics.
  provider: lemlist
  endpoint: /api/campaigns/{campaign_id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
    required:
      - campaign_id

- slug: lemlist_list_leads
  name: List Leads
  description: |
    List all leads enrolled in a specific Lemlist campaign. Returns lead names, email addresses, activation status, and last activity timestamps for each lead.
  provider: lemlist
  endpoint: /api/campaigns/{campaign_id}/leads
  method: GET
  scopes: []
  tags:
    - leads
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
    required:
      - campaign_id

- slug: lemlist_add_lead
  name: Add Lead
  description: |
    Add a new lead to a Lemlist campaign with first name, last name, and email address. Creates the lead and returns the created lead record with its unique ID.
  provider: lemlist
  endpoint: /api/campaigns/{campaign_id}/leads
  method: POST
  scopes: []
  tags:
    - leads
    - create
    - write
  input_schema:
    type: object
    description: Parameters for adding a lead
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
    required:
      - campaign_id
      - email

- slug: lemlist_update_lead
  name: Update Lead
  description: |
    Update an existing lead in a Lemlist campaign. Modify the lead's first name, last name, or other properties. Returns the updated lead record confirming all changes.
  provider: lemlist
  endpoint: /api/campaigns/{campaign_id}/leads/{lead_id}
  method: PUT
  scopes: []
  tags:
    - leads
    - update
    - write
  input_schema:
    type: object
    description: Parameters for updating a lead
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
      lead_id:
        type: string
        description: "Lead ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - campaign_id
      - lead_id

- slug: lemlist_list_unsubscribed
  name: List Unsubscribed Leads
  description: |
    List all leads who have unsubscribed from your Lemlist campaigns. Returns lead names, email addresses, and unsubscription timestamps for each unsubscribed lead.
  provider: lemlist
  endpoint: /api/unsubscribed
  method: GET
  scopes: []
  tags:
    - leads
    - unsubscribed
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing unsubscribed leads
    properties: {}
    required: []

- slug: lemlist_list_blacklisted
  name: List Blacklisted Leads
  description: |
    List all leads that have been blacklisted in your Lemlist account. Returns lead names, email addresses, and reasons for blacklisting for each blocked lead.
  provider: lemlist
  endpoint: /api/blacklisted
  method: GET
  scopes: []
  tags:
    - leads
    - blacklisted
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing blacklisted leads
    properties: {}
    required: []

- slug: lemlist_list_stats
  name: Get Stats
  description: |
    Get overall email marketing statistics for your Lemlist account. Returns total lead counts, emails sent, open rates, click rates, and unsubscription counts for your campaigns.
  provider: lemlist
  endpoint: /api/stats
  method: GET
  scopes: []
  tags:
    - stats
    - read
  input_schema:
    type: object
    description: Parameters for getting stats
    properties: {}
    required: []

- slug: lemlist_get_campaign_stats
  name: Get Campaign Stats
  description: |
    Get detailed email marketing statistics for a specific Lemlist campaign. Returns emails sent, open counts, click counts, reply rates, and bounce counts for the campaign.
  provider: lemlist
  endpoint: /api/campaigns/{campaign_id}/stats
  method: GET
  scopes: []
  tags:
    - campaigns
    - stats
    - read
  input_schema:
    type: object
    description: Parameters for getting campaign stats
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
    required:
      - campaign_id
