- slug: oracle_list_customers
  name: List Customers
  description: |
    Retrieve a list of all customers in the Oracle ERP system.
  provider: oracle
  endpoint: /crm/v4/customers
  method: GET
  scopes:
    - crm.customer.read
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Maximum number of customers to return (default 50, max 200)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      search:
        type: string
        description: "Search term to filter customers by name or email"
    required: []

- slug: oracle_get_customer
  name: Get Customer
  description: |
    Retrieve detailed information for a specific customer by ID.
  provider: oracle
  endpoint: /crm/v4/customers/{customer_id}
  method: GET
  scopes:
    - crm.customer.read
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: string
        description: "Unique identifier of the customer"
    required:
      - customer_id

- slug: oracle_list_orders
  name: List Orders
  description: |
    Retrieve a list of all orders in the Oracle ERP system.
  provider: oracle
  endpoint: /om/v4/orders
  method: GET
  scopes:
    - om.order.read
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Maximum number of orders to return (default 50, max 200)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      status:
        type: string
