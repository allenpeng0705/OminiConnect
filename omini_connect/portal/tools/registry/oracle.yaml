    type: object
    description: Parameters for getting an order
    properties:
      order_id:
        type: string
        description: "Unique identifier of the order"
    required:
      - order_id

- slug: oracle_create_order
  name: Create Order
  description: |
    Create a new order in the Oracle ERP system.
  provider: oracle
  endpoint: /om/v4/orders
  method: POST
  scopes:
    - om.order.write
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      customer_id:
        type: string
        description: "ID of the customer placing the order"
      line_items:
        type: array
        description: "Array of order line items"
        items:
          type: object
          properties:
            product_id:
              type: string
            quantity:
              type: integer
            unit_price:
              type: number
      notes:
        type: string
        description: "Optional notes for the order"
    required:
      - customer_id
      - line_items

