# Typefully Tools - Allowlist
# Curated subset of Typefully API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. typefully_list_threads           - List all threads
# # 2. typefully_get_thread           - Get thread details
# # 3. typefully_create_thread           - Create a new thread
# # 4. typefully_update_thread           - Update an existing thread
# # 5. typefully_delete_thread           - Delete a thread
# # 6. typefully_publish_thread           - Publish a thread to Twitter
# # 7. typefully_list_drafts           - List all drafts
# # 8. typefully_get_analytics           - Get thread analytics
# # 9. typefully_get_profile           - Get user profile
# # 10. typefully_share_thread           - Share a thread

