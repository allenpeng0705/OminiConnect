# Supportbee Tools - Allowlist
# Curated subset of Supportbee API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. supportbee_list_tickets       - List tickets
# 2. supportbee_get_ticket        - Get ticket by ID
# 3. supportbee_create_ticket     - Create a new ticket
# 4. supportbee_list_customers     - List customers
# 5. supportbee_get_customer       - Get customer by ID
# 6. supportbee_list_agents        - List agents
# 7. supportbee_get_agent          - Get agent by ID
# 8. supportbee_list_labels        - List labels
# 9. supportbee_get_label          - Get label by ID
# 10. supportbee_get_team_settings  - Get team settings

- slug: supportbee_list_tickets
  name: List Tickets
  description: |
    List all tickets with optional filtering.
    Returns ticket details including subject, status, and assignee.
  provider: supportbee
  endpoint: /tickets
  method: GET
  scopes:
    - read
  tags:
    - tickets
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      status:
        type: string
        description: "Filter by status: open, pending, resolved, all"
      assignee_id:
        type: integer
        description: "Filter by assignee agent ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: supportbee_get_ticket
  name: Get Ticket
  description: |
    Get detailed information about a specific ticket.
    Includes messages, comments, and metadata.
  provider: supportbee
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - read
  tags:
    - tickets
    - read
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: integer
        description: "Ticket ID"
    required:
      - id

- slug: supportbee_create_ticket
  name: Create Ticket
  description: |
    Create a new ticket with subject, customer, and content.
    Set priority and assignee.
  provider: supportbee
  endpoint: /tickets
  method: POST
  scopes:
    - write
  tags:
    - tickets
    - create
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      subject:
        type: string
        description: "Ticket subject"
      requester_email:
        type: string
        description: "Requester email address"
      requester_name:
        type: string
        description: "Requester name"
      content:
        type: string
        description: "Ticket content/message body"
      priority:
        type: integer
        description: "Priority: 1=low, 2=normal, 3=high"
        default: 2
      assignee_id:
        type: integer
        description: "Assignee agent ID"
    required:
      - subject
      - requester_email

