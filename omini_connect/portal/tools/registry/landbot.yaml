# landbot Tools - Allowlist
# Curated subset of the Landbot API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. landbot_list_conversations - List all conversations
# 2. landbot_get_conversation   - Get a specific conversation
# 3. landbot_create_conversation - Create a new conversation
# 4. landbot_list_leads         - List all leads
# 5. landbot_get_lead           - Get a specific lead
# 6. landbot_export_leads       - Export leads data
# 7. landbot_list_settings      - List all settings
# 8. landbot_get_setting        - Get a specific setting
# 9. landbot_update_setting    - Update a setting
# 10. landbot_get_analytics     - Get analytics data

- slug: landbot_list_conversations
  name: List Conversations
  description: |
    List all chatbot conversations in your Landbot account. Returns conversation IDs, statuses, associated bots, and last activity timestamps for each conversation.
  provider: landbot
  endpoint: /conversations
  method: GET
  scopes:
    - conversations:read
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status (open, closed, archived)"
      bot_id:
        type: string
        description: "Filter by bot ID"
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of results per page"
    required: []

- slug: landbot_get_conversation
  name: Get Conversation
  description: |
    Get detailed information about a specific Landbot conversation by its ID. Returns conversation history, message threads, customer information, and bot responses.
  provider: landbot
  endpoint: /conversations/{id}
  method: GET
  scopes:
    - conversations:read
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      id:
        type: string
        description: "Unique identifier of the conversation"
    required:
      - id

- slug: landbot_create_conversation
  name: Create Conversation
  description: |
    Create a new conversation thread in Landbot for automated or manual chatbot interactions. Specify the bot and customer to start a new conversation flow.
  provider: landbot
  endpoint: /conversations
  method: POST
  scopes:
    - conversations:write
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      bot_id:
        type: string
        description: "ID of the bot to associate with"
      customer_id:
        type: string
        description: "ID of the customer"
      channel:
        type: string
        description: "Channel type (web, whatsapp, etc.)"
    required:
      - bot_id
      - customer_id

- slug: landbot_list_leads
  name: List Leads
  description: |
    List all leads captured by your Landbot chatbots. Returns lead contact information, source bot IDs, submission timestamps, and conversion status.
  provider: landbot
  endpoint: /leads
  method: GET
  scopes:
    - leads:read
  tags:
    - leads
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      bot_id:
        type: string
        description: "Filter by bot ID"
      start_date:
        type: string
        description: "Filter by start date (ISO 8601)"
      end_date:
        type: string
        description: "Filter by end date (ISO 8601)"
      page:
        type: integer
        description: "Page number for pagination"
    required: []

- slug: landbot_get_lead
  name: Get Lead
  description: |
    Get detailed information about a specific Landbot lead by their ID. Returns contact information, chatbot interaction history, submitted data, and conversion tracking.
  provider: landbot
  endpoint: /leads/{id}
  method: GET
  scopes:
    - leads:read
  tags:
    - leads
  input_schema:
    type: object
    description: Parameters for getting a lead
    properties:
      id:
        type: string
        description: "Unique identifier of the lead"
    required:
      - id

- slug: landbot_export_leads
  name: Export Leads
  description: |
    Export lead data from your Landbot account in CSV or JSON format. Download lead data for external analysis, CRM integration, or backup purposes.
  provider: landbot
  endpoint: /leads/export
  method: POST
  scopes:
    - leads:read
  tags:
    - leads
    - exports
  input_schema:
    type: object
    description: Parameters for exporting leads
    properties:
      bot_id:
        type: string
        description: "ID of the bot to export leads from"
      format:
        type: string
        description: "Export format (csv, json)"
      date_from:
        type: string
        description: "Start date for export filter"
      date_to:
        type: string
        description: "End date for export filter"
    required:
      - bot_id
      - format

- slug: landbot_list_settings
  name: List Settings
  description: |
    List all configuration settings for your Landbot chatbots. Returns settings for bot behavior, integrations, notifications, and channel configurations.
  provider: landbot
  endpoint: /settings
  method: GET
  scopes:
    - settings:read
  tags:
    - settings
  input_schema:
    type: object
    description: Parameters for listing settings
    properties:
      bot_id:
        type: string
        description: "Filter by bot ID"
    required: []

- slug: landbot_get_setting
  name: Get Setting
  description: |
    Retrieve a specific Landbot chatbot setting value by its key name. Returns the current configuration value for bot behavior or integration settings.
  provider: landbot
  endpoint: /settings/{key}
  method: GET
  scopes:
    - settings:read
  tags:
    - settings
  input_schema:
    type: object
    description: Parameters for getting a setting
    properties:
      key:
        type: string
        description: "Setting key name"
      bot_id:
        type: string
        description: "Bot ID to get setting for"
    required:
      - key

- slug: landbot_update_setting
  name: Update Setting
  description: |
    Update a specific Landbot chatbot configuration setting. Modify bot behavior, integrations, or notification preferences programmatically.
  provider: landbot
  endpoint: /settings/{key}
  method: PUT
  scopes:
    - settings:write
  tags:
    - settings
  input_schema:
    type: object
    description: Parameters for updating a setting
    properties:
      key:
        type: string
        description: "Setting key name"
      value:
        type: string
        description: "New value for the setting"
      bot_id:
        type: string
        description: "Bot ID to update setting for"
    required:
      - key
      - value

- slug: landbot_get_analytics
  name: Get Analytics
  description: |
    Retrieve engagement analytics and performance metrics for your Landbot chatbots. Returns conversation counts, user satisfaction scores, and conversion rates.
  provider: landbot
  endpoint: /analytics
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
  input_schema:
    type: object
    description: Parameters for getting analytics
    properties:
      bot_id:
        type: string
        description: "Bot ID to get analytics for"
      start_date:
        type: string
        description: "Start date (ISO 8601)"
      end_date:
        type: string
        description: "End date (ISO 8601)"
      metrics:
        type: array
        description: "Specific metrics to retrieve"
    required:
      - bot_id
      - start_date
      - end_date
