# Tremendous Tools - Allowlist
# Curated subset of Tremendous API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tremendous_list_campaigns           - List all campaigns
# # 2. tremendous_get_campaign           - Get campaign details
# # 3. tremendous_create_campaign           - Create a new campaign
# # 4. tremendous_list_orders           - List all orders
# # 5. tremendous_get_order           - Get order details
# # 6. tremendous_create_order           - Create a new order for payouts
# # 7. tremendous_list_recipients           - List all recipients
