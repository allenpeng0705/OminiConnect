- slug: confluence_list_attachments
  name: List Attachments
  description: |
    List all attachments on a Confluence page. Returns attachment metadata and download URLs.
  provider: confluence
  endpoint: /wiki/api/v2/pages/{pageId}/attachments
  method: GET
  scopes:
    - read:content
  tags:
    - attachments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing attachments
    properties:
      pageId:
        type: string
        description: "The page ID (numeric)"
      limit:
        type: integer
        description: "Maximum number of results"
      cursor:
        type: string
        description: "Pagination cursor for next page"
    required:
      - pageId

- slug: confluence_get_attachment
  name: Get Attachment
  description: |
    Get detailed information about a specific attachment including filename, size, and media type.
  provider: confluence
  endpoint: /wiki/api/v2/attachments/{attachmentId}
  method: GET
  scopes:
    - read:content
  tags:
    - attachments
    - read
  input_schema:
    type: object
    description: Parameters for getting an attachment
    properties:
      attachmentId:
        type: string
        description: "The attachment ID (numeric)"
    required:
