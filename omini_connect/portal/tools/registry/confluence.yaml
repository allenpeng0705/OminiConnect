- slug: confluence_get_comment
  name: Get Comment
  description: |
    Get detailed information about a specific comment including body and metadata.
  provider: confluence
  endpoint: /wiki/api/v2/comments/{commentId}
  method: GET
  scopes:
    - read:content
  tags:
    - comments
    - read
  input_schema:
    type: object
    description: Parameters for getting a comment
    properties:
      commentId:
        type: string
        description: "The comment ID (numeric)"
