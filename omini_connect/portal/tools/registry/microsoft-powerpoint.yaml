      - slideId

- slug: powerpoint_get_shape
  name: Get Shape
  description: |
    Get details of a specific shape on a slide.
  provider: microsoft-powerpoint
  endpoint: /v1.0/me/drive/items/{itemId}/presentation/slides/{slideId}/shapes/{shapeId}
  method: GET
  scopes:
    - Files.Read
  tags:
    - powerpoint
    - shapes
    - read
  input_schema:
    type: object
    description: Parameters for getting a shape
    properties:
      itemId:
        type: string
        description: "Presentation item ID"
      slideId:
        type: string
        description: "Slide ID"
      shapeId:
        type: string
        description: "Shape ID"
    required:
      - itemId
      - slideId
      - shapeId

- slug: powerpoint_create_slide
  name: Create Slide
  description: |
    Create a new slide in a presentation.
  provider: microsoft-powerpoint
  endpoint: /v1.0/me/drive/items/{itemId}/presentation/slides
  method: POST
  scopes:
    - Files.ReadWrite
  tags:
    - powerpoint
    - slides
    - create
  input_schema:
    type: object
    description: Parameters for creating a slide
    properties:
      itemId:
        type: string
        description: "Presentation item ID"
      layoutId:
        type: string
        description: "Slide layout ID to use"
      position:
        type: integer
        description: "Position to insert slide (0-based index)"
    required:
      - itemId

- slug: powerpoint_delete_slide
  name: Delete Slide
  description: |
    Delete a slide from a presentation.
  provider: microsoft-powerpoint
  endpoint: /v1.0/me/drive/items/{itemId}/presentation/slides/{slideId}
  method: DELETE
  scopes:
    - Files.ReadWrite
  tags:
    - powerpoint
    - slides
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a slide
    properties:
      itemId:
        type: string
        description: "Presentation item ID"
      slideId:
        type: string
        description: "Slide ID to delete"
    required:
      - itemId
      - slideId

- slug: powerpoint_update_slide
  name: Update Slide
  description: |
    Update content on a slide.
  provider: microsoft-powerpoint
  endpoint: /v1.0/me/drive/items/{itemId}/presentation/slides/{slideId}
  method: PATCH
  scopes:
    - Files.ReadWrite
  tags:
    - powerpoint
    - slides
    - update
  input_schema:
    type: object
    description: Parameters for updating a slide
    properties:
      itemId:
        type: string
        description: "Presentation item ID"
      slideId:
        type: string
        description: "Slide ID"
      title:
        type: string
        description: "Slide title"
    required:
      - itemId
      - slideId

- slug: powerpoint_list_themes
  name: List Themes
  description: |
    List available themes for presentations.
  provider: microsoft-powerpoint
  endpoint: /v1.0/me/drive/root/children
  method: GET
  scopes:
    - Files.Read
  tags:
    - powerpoint
    - themes
    - list
  input_schema:
    type: object
    description: Parameters for listing themes
    properties:
      $filter:
        type: string
        description: "Filter for theme files"
    required: []
