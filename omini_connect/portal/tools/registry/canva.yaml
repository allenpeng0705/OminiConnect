# Canva Tools - Allowlist
# Curated subset of the Canva Connect API for AI agent use.

# === TOOL LIST ===
# 1. canva_list_designs          - List designs
# 2. canva_get_design            - Get a specific design
# 3. canva_create_design         - Create a new design
# 4. canva_list_folders         - List folders
# 5. canva_get_folder            - Get a specific folder
# 6. canva_create_folder         - Create a new folder
# 7. canva_list_assets           - List assets
# 8. canva_upload_asset          - Upload an asset
# 9. canva_list_users            - List users in team
# 10. canva_get_user             - Get a specific user

- slug: canva_list_designs
  name: List Designs
  description: |
    Retrieve all visual designs in the user's Canva account with pagination support. Returns design titles, thumbnails, creation dates, and edit URLs.
  provider: canva
  endpoint: /v1/designs
  method: GET
  scopes:
    - design:content:read
  tags:
    - designs
    - content
  input_schema:
    type: object
    description: Parameters for listing designs
    properties:
      folder_id:
        type: string
        description: "Filter by folder ID"
      continuation:
        type: string
        description: "Pagination continuation token"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required: []

- slug: canva_get_design
  name: Get Design
  description: |
    Retrieve detailed information about a specific design by its unique ID. Returns the title, thumbnail URL, creation date, edit URL, and design type.
  provider: canva
  endpoint: /v1/designs/{designId}
  method: GET
  scopes:
    - design:content:read
  tags:
    - designs
    - read
  input_schema:
    type: object
    description: Parameters for getting a design
    properties:
      designId:
        type: string
        description: "Design ID (path parameter)"
    required:
      - designId

- slug: canva_create_design
  name: Create Design
  description: |
    Create a new visual design with a specified design type and optional title in the Canva editor. Returns the created design with its unique ID and edit URL.
  provider: canva
  endpoint: /v1/designs
  method: POST
  scopes:
    - design:content:write
  tags:
    - designs
    - create
  input_schema:
    type: object
    description: Parameters for creating a design
    properties:
      title:
        type: string
        description: "Design title"
      design_type:
        type: object
        description: "Design type specification (required)"
        properties:
          type:
            type: string
            description: "Design type name (e.g., social_media_post, presentation)"
          name:
            type: string
            description: "Design type name"
      folder_id:
        type: string
        description: "Folder ID to create the design in"
    required:
      - design_type

- slug: canva_list_folders
  name: List Folders
  description: |
    Retrieve all folders in the user's account or within a specific parent folder. Returns folder names, IDs, and creation dates.
  provider: canva
  endpoint: /v1/folders
  method: GET
  scopes:
    - folder:read
  tags:
    - folders
    - organization
  input_schema:
    type: object
    description: Parameters for listing folders
    properties:
      folder_id:
        type: string
        description: "Parent folder ID to list subfolders from"
      continuation:
        type: string
        description: "Pagination continuation token"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required: []

- slug: canva_get_folder
  name: Get Folder
  description: |
    Retrieve detailed information about a specific folder by its unique ID. Returns the folder name, parent folder, creation date, and item count.
  provider: canva
  endpoint: /v1/folders/{folderId}
  method: GET
  scopes:
    - folder:read
  tags:
    - folders
    - read
  input_schema:
    type: object
    description: Parameters for getting a folder
    properties:
      folderId:
        type: string
        description: "Folder ID (path parameter)"
    required:
      - folderId

- slug: canva_create_folder
  name: Create Folder
  description: |
    Create a new folder to organize designs with an optional parent folder for hierarchy. Returns the created folder with its unique ID.
  provider: canva
  endpoint: /v1/folders
  method: POST
  scopes:
    - folder:write
  tags:
    - folders
    - create
  input_schema:
    type: object
    description: Parameters for creating a folder
    properties:
      name:
        type: string
        description: "Folder name (required)"
      parent_folder_id:
        type: string
        description: "Parent folder ID to create folder within"
    required:
      - name

- slug: canva_list_assets
  name: List Assets
  description: |
    Retrieve all assets uploaded to Canva including images, videos, and other files with pagination support. Returns asset names, types, and URLs.
  provider: canva
  endpoint: /v1/assets
  method: GET
  scopes:
    - asset:read
  tags:
    - assets
    - content
  input_schema:
    type: object
    description: Parameters for listing assets
    properties:
      continuation:
        type: string
        description: "Pagination continuation token"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required: []

- slug: canva_upload_asset
  name: Upload Asset
  description: |
    Upload a new image, video, or file asset to Canva for use in designs. Returns the uploaded asset with its unique ID and URL.
  provider: canva
  endpoint: /v1/assets
  method: POST
  scopes:
    - asset:write
  tags:
    - assets
    - upload
  input_schema:
    type: object
    description: Parameters for uploading an asset
    properties:
      name:
        type: string
        description: "Asset name (required)"
      content:
        type: string
        description: "Base64 encoded file content or URL to asset"
      mime_type:
        type: string
        description: "MIME type of the asset (e.g., image/png, video/mp4)"
      folder_id:
        type: string
        description: "Folder ID to upload the asset to"
    required:
      - name
      - content
      - mime_type

- slug: canva_list_users
  name: List Users
  description: |
    Retrieve all users in a Canva team with pagination support. Returns user names, emails, and team roles.
  provider: canva
  endpoint: /v1/users
  method: GET
  scopes:
    - team:read
  tags:
    - users
    - team
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      continuation:
        type: string
        description: "Pagination continuation token"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required: []

- slug: canva_get_user
  name: Get User
  description: |
    Retrieve detailed information about a specific user by their unique ID. Returns the user name, email, avatar URL, and team role.
  provider: canva
  endpoint: /v1/users/{userId}
  method: GET
  scopes:
    - team:read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID (path parameter)"
    required:
      - userId
