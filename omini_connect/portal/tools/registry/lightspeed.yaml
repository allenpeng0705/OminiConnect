- slug: lightspeed_list_transactions
  name: List Transactions
  description: |
    List all transactions (sales) in Lightspeed Retail POS. Filter by date, register, and employee.
  provider: lightspeed
  endpoint: /api/v2/Sale.json
  method: GET
  scopes:
    - read_sales
  tags:
    - transactions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      saleDate:
        type: string
        description: "Filter by date (YYYY-MM-DD)"
      registerID:
        type: integer
        description: "Filter by register ID"
      employeeID:
        type: integer
        description: "Filter by employee ID"
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
    required: []

