# JumpCloud Tools - Allowlist
# Curated subset of JumpCloud API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jumpcloud_list_users        - List users
# 2. jumpcloud_get_user         - Get user details
# 3. jumpcloud_list_groups      - List user groups
# 4. jumpcloud_get_group       - Get group details
# 5. jumpcloud_list_devices     - List devices
# 6. jumpcloud_get_device      - Get device details
# 7. jumpcloud_list_applications - List applications
# 8. jumpcloud_list_policies    - List policies
# 9. jumpcloud_list_directories - List directories
# 10. jumpcloud_list_sso_applications - List SSO applications

- slug: jumpcloud_list_users
  name: List Users
  description: |
    List all users in JumpCloud. Returns user names, email addresses, and account status including creation dates for each user.
  provider: jumpcloud
  endpoint: /api/users
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      skip:
        type: integer
        description: "Skip for pagination"
        default: 0
    required: []

- slug: jumpcloud_get_user
  name: Get User
  description: |
    Retrieve details about a specific JumpCloud user by their ID. Includes account information, group memberships, and system associations.
  provider: jumpcloud
  endpoint: /api/users/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

