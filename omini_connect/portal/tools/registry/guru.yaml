- slug: guru_get_suggestions
  name: Get Suggestions
  description: |
    Retrieve suggested cards or collections based on context.
  provider: guru
  endpoint: /suggestions
  method: GET
  scopes:
    - read
  tags:
    - suggestions
  input_schema:
    type: object
    description: Options for getting suggestions
    properties:
      query:
        type: string
        description: "Query text to get suggestions for"
    required: []

- slug: guru_search_cards
  name: Search Cards
  description: |
    Search for cards in Guru by keyword or phrase.
  provider: guru
  endpoint: /search
  method: GET
  scopes:
    - read
  tags:
    - search
  input_schema:
    type: object
    description: Search parameters
    properties:
      q:
        type: string
        description: "Search query string"
      collection_id:
        type: string
        description: "Limit search to specific collection"
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      page_size:
        type: integer
        description: "Number of results per page (default: 30, max: 100)"
    required:
      - q

- slug: guru_share_card
  name: Share Card
  description: |
    Share a card with specific users or groups.
  provider: guru
  endpoint: /cards/{id}/share
  method: POST
  scopes:
    - share
  tags:
    - cards
  input_schema:
    type: object
    description: Parameters for sharing a card
    properties:
      id:
        type: string
        description: "Card ID"
      user_ids:
        type: array
        items:
          type: string
        description: "List of user IDs to share with"
      group_ids:
        type: array
        items:
          type: string
        description: "List of group IDs to share with"
      message:
        type: string
        description: "Optional message to include with the share"
    required:
      - id
