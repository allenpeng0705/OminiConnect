# Shopify Partner Tools - Allowlist
# Curated subset of Shopify Partner API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_products                            - List all products
# 2. get_product                              - Get product details
# 3. list_orders                              - List all orders
# 4. get_order                                - Get order details
# 5. list_customers                           - List customers
# 6. get_customer                             - Get customer details
# 7. list_fulfillments                        - List fulfillments
# 8. create_fulfillment                       - Create fulfillment
# 9. list_inventory                           - List inventory levels
# 10. get_shop                                 - Get shop details

- slug: list_products
  name: List Products
  description: |
    List all products
  provider: shopify-partner
  endpoint: /products.json
  method: GET
  scopes: []
  tags:
    - products
    - ecommerce
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

