# Roam-scim Tools - Allowlist
# Curated subset of Roam Research SCIM API for AI agent use.
# SCIM via Nango (user provides SCIM token/URL).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. roam-scim_list_users          - List all users
# 2. roam-scim_get_user            - Get user details
# 3. roam-scim_create_user        - Create a user
# 4. roam-scim_update_user        - Update a user
# 5. roam-scim_delete_user        - Delete a user
# 6. roam-scim_list_groups        - List all groups
# 7. roam-scim_get_group          - Get group details
# 8. roam-scim_create_group       - Create a group
# 9. roam-scim_update_group       - Update a group
# 10. roam-scim_delete_group     - Delete a group

- slug: roam-scim_list_users
  name: List Users
  description: |
    Retrieve a list of all users in Roam Research via SCIM.
  provider: roam-scim
  endpoint: /v2/users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - scim
    - provisioning
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Number of users to return"
        default: 50
      filter:
        type: string
        description: "SCIM filter expression"
    required: []

- slug: roam-scim_get_user
  name: Get User
  description: |
    Get details of a specific user by ID.
  provider: roam-scim
  endpoint: /v2/users/{userId}
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - scim
    - provisioning
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "The user ID"
    required:
      - userId

- slug: roam-scim_create_user
  name: Create User
  description: |
    Create a new user in Roam Research via SCIM.
  provider: roam-scim
  endpoint: /v2/users
  method: POST
  scopes:
    - users:write
  tags:
    - users
    - scim
    - provisioning
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      userName:
        type: string
        description: "Unique username"
      emails:
        type: array
        description: "Email addresses"
      name:
        type: object
        description: "User name object"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName
      - emails

- slug: roam-scim_update_user
  name: Update User
  description: |
    Update an existing user via SCIM.
  provider: roam-scim
  endpoint: /v2/users/{userId}
  method: PUT
  scopes:
    - users:write
  tags:
    - users
    - scim
    - provisioning
    - update
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      userId:
        type: string
        description: "The user ID"
      userName:
        type: string
        description: "Updated username"
      emails:
        type: array
        description: "Updated emails"
      name:
        type: object
        description: "Updated name"
      active:
        type: boolean
        description: "Active status"
    required:
      - userId

- slug: roam-scim_delete_user
  name: Delete User
  description: |
    Delete a user from Roam Research via SCIM.
  provider: roam-scim
  endpoint: /v2/users/{userId}
  method: DELETE
  scopes:
    - users:write
  tags:
    - users
    - scim
    - provisioning
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      userId:
        type: string
        description: "The user ID to delete"
    required:
      - userId

