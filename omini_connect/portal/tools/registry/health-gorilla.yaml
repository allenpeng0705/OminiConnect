- slug: health_gorilla_list_patients
  name: List Patients
  description: |
    Retrieve a list of all patients in the healthcare system.
  provider: health-gorilla
  endpoint: /patients
  method: GET
  scopes:
    - read
  tags:
    - patients
  input_schema:
    type: object
    description: Filter and pagination options for listing patients
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      page_size:
        type: integer
        description: "Number of patients per page (default: 30, max: 100)"
      search:
        type: string
        description: "Search by patient name or ID"
    required: []

- slug: health_gorilla_get_patient
  name: Get Patient
  description: |
    Retrieve details of a specific patient by ID.
  provider: health-gorilla
  endpoint: /patients/{id}
  method: GET
  scopes:
    - read
  tags:
    - patients
  input_schema:
    type: object
    description: Parameters for getting a specific patient
    properties:
      id:
        type: string
        description: "Patient ID"
    required:
      - id

- slug: health_gorilla_create_patient
  name: Create Patient
  description: |
    Create a new patient record in the healthcare system.
  provider: health-gorilla
  endpoint: /patients
  method: POST
  scopes:
    - write
  tags:
    - patients
  input_schema:
    type: object
    description: Patient creation parameters
    properties:
      first_name:
        type: string
        description: "Patient first name"
      last_name:
        type: string
        description: "Patient last name"
      date_of_birth:
        type: string
        format: date
        description: "Date of birth (YYYY-MM-DD)"
      gender:
        type: string
        description: "Gender: male, female, other"
      email:
        type: string
        description: "Patient email address"
      phone:
        type: string
        description: "Patient phone number"
      address:
        type: object
        description: "Patient address object"
    required:
      - first_name
      - last_name
      - date_of_birth

