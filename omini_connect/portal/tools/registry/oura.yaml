# Oura Tools - Allowlist
# Curated subset of Oura Ring API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. oura_list_sleep                 - List sleep data
# 2. oura_get_sleep                 - Get sleep details
# 3. oura_list_activity            - List activity data
# 4. oura_get_activity             - Get activity details
# 5. oura_list_readiness           - List readiness data
# 6. oura_get_readiness            - Get readiness details
# 7. oura_list_workouts            - List workouts
# 8. oura_get_workout              - Get workout details
# 9. oura_list_tags                - List tags
# 10. oura_get_user_info          - Get user info

- slug: oura_list_sleep
  name: List Sleep
  description: |
    List sleep data from Oura Ring.
  provider: oura
  endpoint: /v2/usercollection/sleep
  method: GET
  scopes:
    - daily
  tags:
    - health
    - sleep
    - wellness
  input_schema:
    type: object
    description: Parameters for listing sleep data
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []

- slug: oura_get_sleep
  name: Get Sleep
  description: |
    Get detailed sleep information for a specific date.
  provider: oura
  endpoint: /v2/usercollection/sleep
  method: GET
  scopes:
    - daily
  tags:
    - health
    - sleep
    - read
  input_schema:
    type: object
    description: Parameters for getting sleep data
    properties:
      date:
        type: string
        description: "Date (YYYY-MM-DD)"
    required:
      - date

