- slug: canva_scim_list_service_provider
  name: List Service Provider
  description: |
    Get the SCIM service provider configuration.
  provider: canva-scim
  endpoint: /v2/ServiceProviderConfig
  method: GET
  scopes: []
  tags:
    - configuration
    - scim
  input_schema:
    type: object
    description: No parameters
    properties: {}
    required: []
