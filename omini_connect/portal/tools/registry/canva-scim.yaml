- slug: canva_scim_update_group
  name: Update Group
  description: |
    Update an existing group.
  provider: canva-scim
  endpoint: /v2/Groups/{id}
  method: PUT
  scopes: []
  tags:
    - groups
    - update
  input_schema:
    type: object
    description: Parameters for updating a group
    properties:
      id:
        type: string
        description: "Group ID"
      displayName:
        type: string
        description: "New group name"
      members:
        type: array
        items:
          type: object
        description: "Updated member list"
