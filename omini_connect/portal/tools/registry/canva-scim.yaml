# Canva SCIM Tools - Allowlist
# Curated subset of the Canva SCIM API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. canva_scim_list_users            - List users
# 2. canva_scim_get_user              - Get user details
# 3. canva_scim_create_user           - Create a user
# 4. canva_scim_update_user           - Update a user
# 5. canva_scim_delete_user           - Delete a user
# 6. canva_scim_list_groups           - List groups
# 7. canva_scim_get_group             - Get group details
# 8. canva_scim_create_group          - Create a group
# 9. canva_scim_update_group          - Update a group
# 10. canva_scim_list_service_provider - List service provider config

- slug: canva_scim_list_users
  name: List Users
  description: |
    List all users in the Canva organization.
  provider: canva-scim
  endpoint: /v2/Users
  method: GET
  scopes: []
  tags:
    - users
    - scim
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      filter:
        type: string
        description: "SCIM filter expression"
      startIndex:
        type: integer
        description: "Pagination start index"
        default: 1
      count:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: canva_scim_get_user
  name: Get User
  description: |
    Get details of a specific user.
  provider: canva-scim
  endpoint: /v2/Users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: canva_scim_create_user
  name: Create User
  description: |
    Create a new user in the organization.
  provider: canva-scim
  endpoint: /v2/Users
  method: POST
  scopes: []
  tags:
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "Name object with givenName and familyName"
      emails:
        type: array
        items:
          type: object
        description: "Email addresses"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName

- slug: canva_scim_update_user
  name: Update User
  description: |
    Update an existing user.
  provider: canva-scim
  endpoint: /v2/Users/{id}
  method: PUT
  scopes: []
  tags:
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      id:
        type: string
        description: "User ID"
      name:
        type: object
        description: "Name object"
      active:
        type: boolean
        description: "Whether user is active"
    required:
      - id

- slug: canva_scim_delete_user
  name: Delete User
  description: |
    Delete a user from the organization.
  provider: canva-scim
  endpoint: /v2/Users/{id}
  method: DELETE
  scopes: []
  tags:
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: canva_scim_list_groups
  name: List Groups
  description: |
    List all groups in the organization.
  provider: canva-scim
  endpoint: /v2/Groups
  method: GET
  scopes: []
  tags:
