# Greenhouse Basic Tools - Allowlist
# Curated subset of Greenhouse API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. greenhouse_list_candidates     - List candidates
# 2. greenhouse_get_candidate      - Get candidate details
# 3. greenhouse_list_jobs         - List jobs
# 4. greenhouse_get_job            - Get job details
# 5. greenhouse_list_applications  - List applications
# 6. greenhouse_get_application    - Get application details
# 7. greenhouse_list_interviews    - List interviews
# 8. greenhouse_get_interview      - Get interview details
# 9. greenhouse_list_offers        - List offers
# 10. greenhouse_list_scorecards    - List scorecards

- slug: greenhouse_list_candidates
  name: List Candidates
  description: |
    List all candidates in Greenhouse.
    Returns candidate details including name, email, and social links.
  provider: greenhouse-basic
  endpoint: /candidates
  method: GET
  scopes:
    - read
  tags:
    - candidates
    - list
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: greenhouse_get_candidate
  name: Get Candidate
  description: |
    Get detailed information about a specific candidate.
    Includes profile, applications, and activity.
  provider: greenhouse-basic
  endpoint: /candidates/{id}
  method: GET
  scopes:
    - read
  tags:
    - candidates
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      id:
        type: integer
        description: "Candidate ID"
    required:
      - id

