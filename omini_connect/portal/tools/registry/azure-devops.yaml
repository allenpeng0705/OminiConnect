- slug: azure_devops_list_builds
  name: List Builds
  description: |
    List build definitions and recent builds.
  provider: azure-devops
  endpoint: /{project}/_apis/build/builds
  method: GET
  scopes: []
  tags:
    - builds
    - ci-cd
  input_schema:
    type: object
    description: Parameters for listing builds
    properties:
      project:
        type: string
        description: "Project name or ID"
      definitionId:
        type: integer
        description: "Filter by build definition"
      top:
