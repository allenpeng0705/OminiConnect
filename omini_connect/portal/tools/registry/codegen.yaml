# Codegen Tools - Allowlist
# Curated subset of the Codegen API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. codegen_list_organizations           - List organizations
# 2. codegen_get_organization            - Get organization details
# 3. codegen_list_sources               - List sources
# 4. codegen_get_source                 - Get source details
# 5. codegen_list_events               - List events
# 6. codegen_get_event                 - Get event details
# 7. codegen_list_segments             - List segments
# 8. codegen_get_segment               - Get segment details
# 9. codegen_list_users               - List users
# 10. codegen_get_user                - Get user details

- slug: codegen_list_organizations
  name: List Organizations
  description: |
    List all organizations in Codegen, returning organization IDs, names, and account status.
  provider: codegen
  endpoint: /v1/organizations
  method: GET
  scopes: []
  tags:
    - organizations
    - analytics
  input_schema:
    type: object
    description: Parameters for listing organizations
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: codegen_get_organization
  name: Get Organization
  description: |
    Get details of a specific Codegen organization including settings, sources, and user count.
  provider: codegen
  endpoint: /v1/organizations/{id}
  method: GET
  scopes: []
  tags:
    - organizations
    - read
  input_schema:
    type: object
    description: Parameters for getting an organization
    properties:
      id:
        type: string
        description: "Organization ID"
    required:
      - id

