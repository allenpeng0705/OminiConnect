# Cloudentity Tools - Allowlist
# Curated subset of the Cloudentity API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cloudentity_list_users                - List users
# 2. cloudentity_get_user                 - Get user details
# 3. cloudentity_create_user              - Create a user
# 4. cloudentity_delete_user              - Delete a user
# 5. cloudentity_list_applications        - List applications
# 6. cloudentity_get_application          - Get application details
# 7. cloudentity_create_application      - Create an application
# 8. cloudentity_list_authorizations     - List authorizations
# 9. cloudentity_get_authorization       - Get authorization details
# 10. cloudentity_list_identities       - List identities

- slug: cloudentity_list_users
  name: List Users
  description: |
    List all users in the tenant, returning user IDs, usernames, email addresses, and current status.
  provider: cloudentity
  endpoint: /admin/users
  method: GET
  scopes: []
  tags:
    - users
    - identity
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: cloudentity_get_user
  name: Get User
  description: |
    Get details of a specific user including their profile information, assigned roles, and permissions.
  provider: cloudentity
  endpoint: /admin/users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: cloudentity_create_user
  name: Create User
  description: |
    Create a new user in the tenant, specifying the username, email address, and password.
  provider: cloudentity
  endpoint: /admin/users
  method: POST
  scopes: []
  tags:
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      username:
        type: string
        description: "Username"
      email:
        type: string
        description: "Email address"
      password:
        type: string
        description: "Password"
    required:
      - username
      - email

- slug: cloudentity_delete_user
  name: Delete User
  description: |
    Delete a specific user from the tenant, removing their access and associated permissions.
  provider: cloudentity
  endpoint: /admin/users/{id}
  method: DELETE
  scopes: []
  tags:
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

