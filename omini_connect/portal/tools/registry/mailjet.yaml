- slug: mailjet_list_stats
  name: List Statistics
  description: |
    Get email statistics from Mailjet.
  provider: mailjet
  endpoint: /v3/REST/message
  method: GET
  scopes: []
  tags:
    - statistics
    - read
  input_schema:
    type: object
    description: Parameters for listing statistics
    properties:
      from_ts:
        type: integer
        description: "From timestamp"
      to_ts:
        type: integer
        description: "To timestamp"
      limit:
        type: integer
        description: "Max results"
        default: 50
    required: []
