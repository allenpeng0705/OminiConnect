- slug: teamwork_list_projects
  name: List Projects
  description: |
    Retrieve a list of all projects in Teamwork.
  provider: teamwork
  endpoint: /projects.json
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
  input_schema:
    type: object
    description: Query parameters for listing projects
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of projects per page"
      status:
        type: string
        description: "Filter by project status (active, on hold, completed)"
    required: []

- slug: teamwork_get_project
  name: Get Project
  description: |
    Retrieve details of a specific project by ID.
  provider: teamwork
  endpoint: /projects/{projectId}.json
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
  input_schema:
    type: object
    description: Path parameters for getting a project
    properties:
      projectId:
        type: string
        description: "The unique ID of the project"
    required:
      - projectId

- slug: teamwork_create_project
  name: Create Project
  description: |
    Create a new project in Teamwork.
  provider: teamwork
  endpoint: /projects.json
  method: POST
  scopes:
    - projects:write
  tags:
    - projects
  input_schema:
    type: object
    description: Body parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      description:
        type: string
        description: "Project description"
      status:
        type: string
        description: "Project status (active, on hold, completed)"
      startDate:
        type: string
        description: "Project start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "Project end date (YYYY-MM-DD)"
    required:
      - name

- slug: teamwork_list_tasks
  name: List Tasks
  description: |
    Retrieve a list of tasks, optionally filtered by project.
  provider: teamwork
  endpoint: /tasks.json
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Query parameters for listing tasks
    properties:
      projectId:
        type: string
        description: "Filter tasks by project ID"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of tasks per page"
      status:
        type: string
        description: "Filter by task status (open, completed)"
    required: []

- slug: teamwork_get_task
  name: Get Task
  description: |
    Retrieve details of a specific task by ID.
  provider: teamwork
  endpoint: /tasks/{taskId}.json
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Path parameters for getting a task
    properties:
      taskId:
        type: string
        description: "The unique ID of the task"
    required:
      - taskId

- slug: teamwork_create_task
  name: Create Task
  description: |
    Create a new task in a project.
  provider: teamwork
  endpoint: /tasks.json
  method: POST
  scopes:
    - tasks:write
  tags:
    - tasks
  input_schema:
    type: object
    description: Body parameters for creating a task
    properties:
      projectId:
        type: string
        description: "Project ID to create the task in"
      name:
        type: string
        description: "Task name"
      description:
        type: string
        description: "Task description"
      dueDate:
        type: string
        description: "Task due date (YYYY-MM-DD)"
      assignedTo:
        type: string
        description: "User ID to assign the task to"
    required:
      - projectId
      - name

