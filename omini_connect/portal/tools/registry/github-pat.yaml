# GitHub PAT Tools - Allowlist
# Curated subset of GitHub API for AI agent use.
# API_KEY via Nango (Personal Access Token).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. github_pat_list_repos         - List repositories
# 2. github_pat_get_repo          - Get repository details
# 3. github_pat_list_issues       - List issues
# 4. github_pat_get_issue         - Get issue details
# 5. github_pat_list_pulls        - List pull requests
# 6. github_pat_get_pull          - Get pull request details
# 7. github_pat_list_comments     - List issue comments
# 8. github_pat_create_comment    - Create issue comment
# 9. github_pat_list_labels       - List labels
# 10. github_pat_list_milestones  - List milestones

- slug: github_pat_list_repos
  name: List Repositories
  description: |
    List repositories the authenticated user has access to.
  provider: github-pat
  endpoint: /user/repos
  method: GET
  scopes:
    - read
  tags:
    - repos
    - list
  input_schema:
    type: object
    description: Parameters for listing repositories
    properties:
      type:
        type: string
        description: "Filter by type (all, owner, member)"
        default: owner
      per_page:
        type: integer
        description: "Results per page"
        default: 30
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: github_pat_get_repo
  name: Get Repository
  description: |
    Get detailed information about a repository.
  provider: github-pat
  endpoint: /repos/{owner}/{repo}
  method: GET
  scopes:
    - read
  tags:
    - repos
    - read
  input_schema:
    type: object
    description: Parameters for getting a repository
    properties:
      owner:
        type: string
        description: "Repository owner"
      repo:
        type: string
        description: "Repository name"
    required:
      - owner
      - repo

- slug: github_pat_list_issues
  name: List Issues
  description: |
    List issues in repositories the user has access to.
  provider: github-pat
  endpoint: /issues
  method: GET
  scopes:
    - read
  tags:
    - issues
    - list
  input_schema:
    type: object
    description: Parameters for listing issues
    properties:
      state:
        type: string
        description: "Filter by state (open, closed, all)"
        default: open
      repo:
        type: string
        description: "Filter by repository (owner/repo)"
    required: []

- slug: github_pat_get_issue
  name: Get Issue
  description: |
    Get detailed information about a specific issue.
  provider: github-pat
  endpoint: /repos/{owner}/{repo}/issues/{issue_number}
  method: GET
  scopes:
    - read
  tags:
    - issues
    - read
  input_schema:
    type: object
    description: Parameters for getting an issue
    properties:
      owner:
        type: string
        description: "Repository owner"
      repo:
        type: string
        description: "Repository name"
      issue_number:
        type: integer
        description: "Issue number"
    required:
      - owner
      - repo
      - issue_number

- slug: github_pat_list_pulls
  name: List Pull Requests
  description: |
    List pull requests in a repository.
  provider: github-pat
  endpoint: /repos/{owner}/{repo}/pulls
  method: GET
  scopes:
