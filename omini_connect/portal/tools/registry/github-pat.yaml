- slug: github_pat_list_comments
  name: List Issue Comments
  description: |
    List comments on an issue or pull request.
  provider: github-pat
  endpoint: /repos/{owner}/{repo}/issues/{issue_number}/comments
  method: GET
  scopes:
    - read
  tags:
    - comments
    - list
  input_schema:
    type: object
    description: Parameters for listing comments
    properties:
      owner:
        type: string
        description: "Repository owner"
      repo:
        type: string
        description: "Repository name"
      issue_number:
        type: integer
        description: "Issue or PR number"
    required:
      - owner
      - repo
      - issue_number

- slug: github_pat_create_comment
  name: Create Issue Comment
  description: |
    Create a comment on an issue or pull request.
  provider: github-pat
  endpoint: /repos/{owner}/{repo}/issues/{issue_number}/comments
  method: POST
  scopes:
    - write
  tags:
    - comments
    - create
  input_schema:
    type: object
    description: Parameters for creating a comment
    properties:
      owner:
        type: string
        description: "Repository owner"
      repo:
        type: string
        description: "Repository name"
      issue_number:
        type: integer
        description: "Issue or PR number"
      body:
        type: string
        description: "Comment text"
    required:
      - owner
      - repo
      - issue_number
      - body

