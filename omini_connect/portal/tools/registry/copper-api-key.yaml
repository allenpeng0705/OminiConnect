  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      page_size:
        type: integer
        description: "Number of results per page (default 20, max 200)"
        default: 20
      page_number:
        type: integer
        description: "Page number"
        default: 1
      status:
        type: string
        description: "Filter by status: open, completed"
    required: []

- slug: copper_api_key_get_task
  name: Get Task
  description: |
    Get details of a specific task by ID including assignee and due date.
  provider: copper-api-key
  endpoint: /v1/tasks/{id}
  method: GET
  scopes: []
  tags:
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for getting a task
    properties:
      id:
        type: integer
        description: "Task ID"
    required:
      - id
