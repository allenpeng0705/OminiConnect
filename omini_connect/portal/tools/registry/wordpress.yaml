# WordPress Tools - Allowlist
# Curated subset of WordPress API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wordpress_get_current_user           - Get current authenticated user
# # 2. wordpress_list_sites           - List all sites for the user
# # 3. wordpress_get_site           - Get site details
# # 4. wordpress_list_posts           - List posts on a site
# # 5. wordpress_get_post           - Get post details
# # 6. wordpress_create_post           - Create a new post
# # 7. wordpress_update_post           - Update an existing post
# # 8. wordpress_delete_post           - Delete a post
# # 9. wordpress_list_comments           - List comments on a site
# # 10. wordpress_list_media           - List media library items

- slug: wordpress_get_current_user
  name: Get Current User
  description: |
    Get current authenticated user
  provider: wordpress
  endpoint: /me
  method: GET
  scopes:
    - read
  tags:
    - wordpress
  input_schema:
    type: object
    description: Parameters for get current user
    properties: {}
    required: []

- slug: wordpress_list_sites
  name: List Sites
  description: |
