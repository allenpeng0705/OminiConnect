- slug: recruitcrm_create_interview
  name: Create Interview
  description: |
    Schedule a new interview.
  provider: recruitcrm
  endpoint: /interviews
  method: POST
  scopes:
    - interviews:write
  tags:
    - interviews
    - recruitment
    - scheduling
    - create
  input_schema:
    type: object
    description: Parameters for creating an interview
    properties:
      candidateId:
        type: string
        description: "Candidate ID"
      jobId:
        type: string
        description: "Job ID"
      scheduledTime:
        type: string
        description: "Interview time (ISO 8601)"
      interviewType:
        type: string
        description: "Type: phone, video, onsite"
    required:
      - candidateId
      - jobId
      - scheduledTime
