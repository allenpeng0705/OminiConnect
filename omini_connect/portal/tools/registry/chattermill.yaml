# Chattermill Tools - Allowlist
# Curated subset of the Chattermill API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. chattermill_list_projects           - List projects
# 2. chattermill_get_project            - Get project details
# 3. chattermill_list_reviews           - List reviews
# 4. chattermill_get_review             - Get review details
# 5. chattermill_list_themes            - List themes
# 6. chattermill_get_theme              - Get theme details
# 7. chattermill_list_reports           - List reports
# 8. chattermill_get_report             - Get report details
# 9. chattermill_list_comments          - List comments
# 10. chattermill_create_comment        - Create a comment

- slug: chattermill_list_projects
  name: List Projects
  description: |
    Retrieve all projects in the Chattermill account with pagination support. Returns project names, IDs, and review counts.
  provider: chattermill
  endpoint: /v1/projects
  method: GET
  scopes: []
  tags:
    - projects
    - analytics
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: chattermill_get_project
  name: Get Project
  description: |
    Retrieve detailed information about a specific project by its unique ID. Returns the project name, description, and review count.
  provider: chattermill
  endpoint: /v1/projects/{id}
  method: GET
  scopes: []
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      id:
        type: integer
        description: "Project ID"
    required:
      - id

- slug: chattermill_list_reviews
  name: List Reviews
  description: |
    Retrieve all reviews in a specific project with optional filtering by date or rating. Returns review IDs, texts, ratings, and sentiment scores.
  provider: chattermill
  endpoint: /v1/reviews
  method: GET
  scopes: []
  tags:
    - reviews
    - analytics
  input_schema:
    type: object
    description: Parameters for listing reviews
    properties:
      project_id:
        type: integer
        description: "Project ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required:
      - project_id

- slug: chattermill_get_review
  name: Get Review
  description: |
    Retrieve detailed information about a specific review by its unique ID. Returns the review text, rating, and sentiment score.
  provider: chattermill
  endpoint: /v1/reviews/{id}
  method: GET
  scopes: []
  tags:
    - reviews
    - read
  input_schema:
    type: object
    description: Parameters for getting a review
    properties:
      id:
        type: integer
        description: "Review ID"
    required:
      - id

- slug: chattermill_list_themes
  name: List Themes
  description: |
    Retrieve all themes extracted from reviews in a specific project. Returns theme names, IDs, and associated sentiment scores.
  provider: chattermill
  endpoint: /v1/projects/{projectId}/themes
  method: GET
  scopes: []
  tags:
    - themes
    - analytics
  input_schema:
    type: object
    description: Parameters for listing themes
    properties:
      projectId:
        type: integer
        description: "Project ID"
    required:
      - projectId

- slug: chattermill_get_theme
  name: Get Theme
  description: |
    Retrieve detailed information about a specific theme by its unique ID. Returns the theme name, associated reviews, and sentiment breakdown.
  provider: chattermill
  endpoint: /v1/themes/{id}
  method: GET
  scopes: []
  tags:
    - themes
    - read
  input_schema:
    type: object
    description: Parameters for getting a theme
    properties:
      id:
        type: integer
        description: "Theme ID"
    required:
      - id

- slug: chattermill_list_reports
  name: List Reports
  description: |
    Retrieve all reports generated for a specific project. Returns report IDs, types, statuses, and generation dates.
  provider: chattermill
  endpoint: /v1/projects/{projectId}/reports
  method: GET
  scopes: []
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for listing reports
    properties:
      projectId:
        type: integer
        description: "Project ID"
    required:
      - projectId

- slug: chattermill_get_report
  name: Get Report
  description: |
    Retrieve detailed information about a specific report by its unique ID. Returns the summary statistics, sentiment analysis, and key insights.
  provider: chattermill
  endpoint: /v1/reports/{id}
  method: GET
  scopes: []
  tags:
    - reports
    - read
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      id:
        type: integer
        description: "Report ID"
    required:
      - id

- slug: chattermill_list_comments
  name: List Comments
  description: |
    Retrieve all comments on a specific review with pagination support. Returns comment texts, author names, and timestamps.
  provider: chattermill
  endpoint: /v1/reviews/{reviewId}/comments
  method: GET
  scopes: []
  tags:
    - comments
    - collaboration
  input_schema:
    type: object
    description: Parameters for listing comments
    properties:
      reviewId:
        type: integer
        description: "Review ID"
    required:
      - reviewId

- slug: chattermill_create_comment
  name: Create Comment
  description: |
    Add a new comment to a specific review with text content. Returns the created comment with its unique ID.
  provider: chattermill
  endpoint: /v1/reviews/{reviewId}/comments
  method: POST
  scopes: []
  tags:
    - comments
    - create
  input_schema:
    type: object
    description: Parameters for creating a comment
    properties:
      reviewId:
        type: integer
        description: "Review ID"
      content:
        type: string
        description: "Comment content"
    required:
      - reviewId
      - content
