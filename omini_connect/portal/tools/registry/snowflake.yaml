  tags:
    - table
    - list
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      database:
        type: string
        description: "Database name (required)"
      schema:
        type: string
        description: "Schema name (required)"
      like:
        type: string
        description: "Filter tables by name pattern"
    required:
