# Smartlead.ai Tools - Allowlist
# Curated subset of Smartlead.ai API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_campaigns                           - List all campaigns
# 2. get_campaign                             - Get campaign details
# 3. list_leads                               - List leads in campaign
# 4. add_lead                                 - Add lead to campaign
# 5. get_lead                                 - Get lead details
# 6. list_sequences                           - List email sequences
# 7. get_sequence                             - Get sequence details
# 8. list_templates                           - List email templates
# 9. get_stats                                - Get campaign stats
# 10. get_activity                             - Get email activity

- slug: list_campaigns
  name: List Campaigns
  description: |
    List all campaigns
  provider: smartlead-ai
  endpoint: /v1/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - email
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_campaign
  name: Get Campaign
  description: |
