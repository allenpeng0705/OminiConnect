# Smartlead.ai Tools - Allowlist
# Curated subset of Smartlead.ai API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_campaigns                           - List all campaigns
# 2. get_campaign                             - Get campaign details
# 3. list_leads                               - List leads in campaign
# 4. add_lead                                 - Add lead to campaign
# 5. get_lead                                 - Get lead details
# 6. list_sequences                           - List email sequences
# 7. get_sequence                             - Get sequence details
# 8. list_templates                           - List email templates
# 9. get_stats                                - Get campaign stats
# 10. get_activity                             - Get email activity

- slug: list_campaigns
  name: List Campaigns
  description: |
    List all email campaigns in Smartlead.ai. Returns campaign names, statuses, lead counts, and creation dates.
  provider: smartlead-ai
  endpoint: /v1/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - email
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific campaign including its settings, schedule, and assigned leads.
  provider: smartlead-ai
  endpoint: /v1/campaigns/{id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - email
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_leads
  name: List Leads
  description: |
    List all leads in a Smartlead.ai campaign. Returns lead names, email addresses, statuses, and engagement information.
  provider: smartlead-ai
  endpoint: /v1/campaigns/{id}/leads
  method: GET
  scopes: []
  tags:
    - leads
    - crm
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: add_lead
  name: Add Lead
  description: |
    Add a new lead to a Smartlead.ai campaign. Sets the lead email address and assigns them to the campaign.
  provider: smartlead-ai
  endpoint: /v1/campaigns/{id}/leads
  method: POST
  scopes: []
  tags:
    - leads
    - crm
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_lead
  name: Get Lead
  description: |
    Get detailed information about a specific lead including their contact details, campaign history, and engagement metrics.
  provider: smartlead-ai
  endpoint: /v1/leads/{id}
  method: GET
  scopes: []
  tags:
    - leads
