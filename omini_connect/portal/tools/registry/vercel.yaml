- slug: vercel_get_secret
  name: Get Secret
  description: |
    Retrieve details of a specific environment secret.
  provider: vercel
  endpoint: /v9/secrets/{secretName}
  method: GET
  scopes:
    - read
  tags:
    - secrets
    - read
  input_schema:
    type: object
    description: Parameters for getting a secret
    properties:
      secretName:
        type: string
        description: "Name of the secret to retrieve"
      teamId:
        type: string
        description: "Team ID the secret belongs to"
    required:
      - secretName
