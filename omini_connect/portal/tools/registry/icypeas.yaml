# Icypeas Tools - Allowlist
# Curated subset of Icypeas API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. icypeas_email_search          - Email search
# 2. icypeas_get_profile           - Get profile details
# 3. icypeas_list_campaigns       - List campaigns
# 4. icypeas_get_campaign         - Get campaign details
# 5. icypeas_list_enrichments    - List enrichments
# 6. icypeas_get_enrichment       - Get enrichment details
# 7. icypeas_list_leads           - List leads
# 8. icypeas_get_lead             - Get lead details
# 9. icypeas_list_stats           - List statistics
# 10. icypeas_list_credits         - List credits

- slug: icypeas_email_search
  name: Email Search
  description: |
    Search for professional email addresses using name, company domain, or company name. Returns verified email addresses with confidence scores and verification status.
  provider: icypeas
  endpoint: /email-search
  method: POST
  scopes:
    - write
  tags:
    - email
    - search
  input_schema:
    type: object
    description: Parameters for email search
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      domain:
        type: string
        description: "Company domain"
      company_name:
        type: string
        description: "Company name"
    required:
      - domain

- slug: icypeas_get_profile
  name: Get Profile
  description: |
    Get a detailed person profile by email including professional details and social links. Returns name, title, company, location, and social media profiles.
  provider: icypeas
  endpoint: /profile
  method: GET
  scopes:
    - read
  tags:
    - profile
    - read
  input_schema:
    type: object
    description: Parameters for getting a profile
    properties:
      email:
        type: string
        description: "Email address"
    required:
      - email

- slug: icypeas_list_campaigns
  name: List Campaigns
  description: |
    List all outreach campaigns in your Icypeas account. Returns campaign names, statuses, lead counts, and performance metrics.
  provider: icypeas
  endpoint: /campaigns
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: icypeas_get_campaign
  name: Get Campaign
  description: |
    Get a specific Icypeas campaign by ID with detailed performance metrics. Returns campaign statistics including sent, opened, replied, and conversion rates.
  provider: icypeas
  endpoint: /campaigns/{id}
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

