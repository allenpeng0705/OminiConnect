# SharePoint Online (v1) Tools - Allowlist
# Curated subset of SharePoint Online (v1) API for AI agent use.
# Auth mode: TWO_STEP.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_sites                               - List SharePoint sites
# 2. get_site                                 - Get site details
# 3. list_drives                              - List document libraries
# 4. list_files                               - List files in drive
# 5. get_file                                 - Get file metadata
# 6. download_file                            - Download file content
# 7. upload_file                              - Upload a file
# 8. create_folder                            - Create a folder
# 9. delete_file                              - Delete a file or folder
# 10. list_permissions                         - List item permissions

- slug: list_sites
  name: List Sites
  description: |
    List all SharePoint Online sites. Returns site names, URLs, descriptions, and storage usage information.
  provider: sharepoint-online-v1
  endpoint: /sites
  method: GET
  scopes: []
  tags:
    - sites
    - sharepoint
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_site
  name: Get Site
  description: |
    Get detailed information about a specific SharePoint site including its description, web template, and access permissions.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}
  method: GET
  scopes: []
  tags:
    - sites
    - sharepoint
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_drives
  name: List Drives
  description: |
    List all document libraries in a SharePoint site. Returns library names, descriptions, and storage quotas.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives
  method: GET
  scopes: []
  tags:
    - drives
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_files
  name: List Files
  description: |
    List all files in a SharePoint document library. Returns file names, sizes, creation dates, and last modified information.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/root/children
  method: GET
  scopes: []
  tags:
    - files
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_file
  name: Get File
  description: |
    Get metadata for a specific file in SharePoint including its size, creation date, modified date, and author information.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/items/{file_id}
  method: GET
  scopes: []
  tags:
    - files
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: download_file
  name: Download File
  description: |
    Download the content of a file from SharePoint. Returns the binary content of the file for local storage or processing.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/items/{file_id}/content
  method: GET
  scopes: []
  tags:
    - files
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: upload_file
  name: Upload File
  description: |
    Upload a file to a SharePoint document library. Creates a new file with the provided content in the specified location.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/root/children
  method: POST
  scopes: []
  tags:
    - files
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_folder
  name: Create Folder
  description: |
    Create a new folder in a SharePoint document library. Sets the folder name and location within the document library.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/items/{parent_id}
  method: POST
  scopes: []
  tags:
    - folders
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: delete_file
  name: Delete File
  description: |
    Delete a file or folder from SharePoint. Removes the item from the document library and moves it to the recycle bin.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/items/{file_id}
  method: DELETE
  scopes: []
  tags:
    - files
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_permissions
  name: List Permissions
  description: |
    List all permissions for a SharePoint file or folder. Returns user and group access levels including read, edit, and full control.
  provider: sharepoint-online-v1
  endpoint: /sites/{site_id}/drives/{drive_id}/items/{file_id}/permissions
  method: GET
  scopes: []
  tags:
    - permissions
    - security
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

