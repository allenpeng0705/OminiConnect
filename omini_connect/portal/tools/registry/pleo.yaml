# Pleo Tools - Allowlist
# Curated subset of Pleo API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pleo_list_users                  - List users
# 2. pleo_get_user                    - Get user details
# 3. pleo_list_cards                  - List cards
# 4. pleo_get_card                    - Get card details
# 5. pleo_list_transactions           - List transactions
# 6. pleo_get_transaction             - Get transaction details
# 7. pleo_list_expenses               - List expenses
# 8. pleo_get_expense                 - Get expense details
# 9. pleo_list_receipts              - List receipts
# 10. pleo_get_company               - Get company info

- slug: pleo_list_users
  name: List Users
  description: |
    List all users in the organization.
  provider: pleo
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - team
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties: {}
    required: []

- slug: pleo_get_user
  name: Get User
  description: |
    Get detailed information about a specific user.
  provider: pleo
  endpoint: /v1/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - team
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

