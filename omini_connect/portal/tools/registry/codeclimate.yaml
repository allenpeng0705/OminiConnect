# Code Climate Tools - Allowlist
# Curated subset of the Code Climate API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. codeclimate_list_repos                - List repositories
# 2. codeclimate_get_repo                 - Get repository details
# 3. codeclimate_get_user                 - Get user details
# 4. codeclimate_list_issues             - List issues
# 5. codeclimate_get_issue               - Get issue details
# 6. codeclimate_get_snapshot            - Get snapshot details
# 7. codeclimate_list_comments           - List comments
# 8. codeclimate_create_comment          - Create a comment
# 9. codeclimate_list_badges            - List badges
# 10. codeclimate_get_analysis          - Get analysis results

- slug: codeclimate_list_repos
  name: List Repositories
  description: |
    List all repositories in your organization.
  provider: codeclimate
  endpoint: /repos
  method: GET
  scopes: []
  tags:
    - repos
    - dev-tools
  input_schema:
    type: object
    description: Parameters for listing repositories
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: codeclimate_get_repo
  name: Get Repository
  description: |
    Get details of a specific repository.
  provider: codeclimate
  endpoint: /repos/{id}
  method: GET
  scopes: []
  tags:
    - repos
    - read
  input_schema:
    type: object
    description: Parameters for getting a repository
    properties:
      id:
        type: string
        description: "Repository ID"
    required:
      - id

- slug: codeclimate_get_user
  name: Get User
  description: |
    Get details of a specific user.
  provider: codeclimate
  endpoint: /user
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: No parameters
    properties: {}
    required: []

- slug: codeclimate_list_issues
  name: List Issues
  description: |
    List all issues for a repository.
  provider: codeclimate
  endpoint: /repos/{repoId}/issues
  method: GET
  scopes: []
  tags:
    - issues
    - quality
  input_schema:
    type: object
    description: Parameters for listing issues
    properties:
      repoId:
        type: string
        description: "Repository ID"
      filter:
        type: string
        description: "Filter by type (complexity, duplication, security)"
    required:
      - repoId

