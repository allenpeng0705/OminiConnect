- slug: codeclimate_create_comment
  name: Create Comment
  description: |
    Create a new comment on an issue.
  provider: codeclimate
  endpoint: /issues/{issueId}/comments
  method: POST
  scopes: []
  tags:
    - comments
    - create
  input_schema:
    type: object
    description: Parameters for creating a comment
    properties:
      issueId:
        type: string
        description: "Issue ID"
      body:
        type: string
        description: "Comment body"
    required:
