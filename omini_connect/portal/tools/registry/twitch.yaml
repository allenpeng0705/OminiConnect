# Twitch Tools - Allowlist
# Curated subset of Twitch API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. twitch_get_users           - Get user information
# # 2. twitch_get_follows           - Get list of users following a broadcaster
# # 3. twitch_list_videos           - List videos for a user
# # 4. twitch_get_video           - Get video details
# # 5. twitch_get_streams           - Get stream information
# # 6. twitch_get_channel_info           - Get channel information
# # 7. twitch_update_channel           - Update channel settings
# # 8. twitch_get_subscriptions           - Get channel subscribers
# # 9. twitch_get_moderators           - Get channel moderators
# # 10. twitch_create_clip           - Create a clip from a broadcast

- slug: twitch_get_users
  name: Get Users
  description: |
    Get user information
  provider: twitch
  endpoint: /helix/users
  method: GET
  scopes:
    - user:read
  tags:
    - twitch
  input_schema:
    type: object
    description: Parameters for get users
    properties: {}
    required: []

