# Gong OAuth Tools - Allowlist
# Curated subset of Gong API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gong_oauth_list_calls          - List calls
# 2. gong_oauth_get_call           - Get call details
# 3. gong_oauth_list_transcripts   - List call transcripts
# 4. gong_oauth_list_scorecards   - List scorecards
# 5. gong_oauth_get_scorecard     - Get scorecard details
# 6. gong_oauth_list_users        - List users
# 7. gong_oauth_get_user           - Get user details
# 8. gong_oauth_list_teams        - List teams
# 9. gong_oauth_get_team           - Get team details
# 10. gong_oauth_list_workspace_stats - List workspace stats

- slug: gong_oauth_list_calls
  name: List Calls
  description: |
    List calls recorded in Gong.
  provider: gong-oauth
  endpoint: /v2/calls
  method: GET
  scopes:
    - calls.read
  tags:
    - calls
    - list
  input_schema:
    type: object
    description: Parameters for listing calls
    properties:
      from_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      to_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      page_size:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: gong_oauth_get_call
  name: Get Call
  description: |
    Get detailed information about a call.
  provider: gong-oauth
  endpoint: /v2/calls/{call_id}
  method: GET
  scopes:
    - calls.read
  tags:
    - calls
    - read
  input_schema:
    type: object
    description: Parameters for getting a call
    properties:
      call_id:
        type: string
        description: "Call ID"
    required:
      - call_id

