- slug: companycam_upload_photo
  name: Upload Photo
  description: |
    Upload a photo to a project.
  provider: companycam
  endpoint: /v2/projects/{projectId}/photos
  method: POST
  scopes: []
  tags:
    - photos
    - upload
  input_schema:
    type: object
    description: Parameters for uploading a photo
    properties:
      projectId:
        type: string
        description: "Project ID"
      url:
        type: string
        description: "Photo URL"
      name:
        type: string
        description: "Photo name"
    required:
      - projectId
      - url

