# CompanyCam Tools - Allowlist
# Curated subset of the CompanyCam API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. companycam_list_projects              - List projects
# 2. companycam_get_project               - Get project details
# 3. companycam_create_project            - Create a project
# 4. companycam_list_photos              - List photos
# 5. companycam_get_photo                - Get photo details
# 6. companycam_upload_photo             - Upload a photo
# 7. companycam_list_notes               - List notes
# 8. companycam_create_note             - Create a note
# 9. companycam_list_members            - List project members
# 10. companycam_get_company            - Get company info

- slug: companycam_list_projects
  name: List Projects
  description: |
    List all projects in your CompanyCam account.
  provider: companycam
  endpoint: /v2/projects
  method: GET
  scopes: []
  tags:
    - projects
    - productivity
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: companycam_get_project
  name: Get Project
  description: |
    Get details of a specific project.
  provider: companycam
  endpoint: /v2/projects/{id}
  method: GET
  scopes: []
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      id:
        type: string
        description: "Project ID"
    required:
      - id

- slug: companycam_create_project
  name: Create Project
  description: |
    Create a new project.
  provider: companycam
  endpoint: /v2/projects
  method: POST
  scopes: []
  tags:
    - projects
    - create
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      description:
        type: string
        description: "Project description"
    required:
      - name

- slug: companycam_list_photos
  name: List Photos
  description: |
    List all photos in a project.
  provider: companycam
  endpoint: /v2/projects/{projectId}/photos
  method: GET
  scopes: []
  tags:
    - photos
    - media
  input_schema:
    type: object
    description: Parameters for listing photos
    properties:
      projectId:
        type: string
        description: "Project ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required:
      - projectId

- slug: companycam_get_photo
  name: Get Photo
  description: |
    Get details of a specific photo.
  provider: companycam
  endpoint: /v2/photos/{id}
  method: GET
  scopes: []
  tags:
