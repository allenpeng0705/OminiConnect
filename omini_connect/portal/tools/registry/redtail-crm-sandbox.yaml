# Redtail-Crm-Sandbox Tools - Allowlist
# Curated subset of Redtail CRM API for AI agent use.
# Sandbox environment for testing.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. redtail-crm-sandbox_list_contacts     - List all contacts
# 2. redtail-crm-sandbox_get_contact      - Get contact details
# 3. redtail-crm-sandbox_create_contact    - Create a contact
# 4. redtail-crm-sandbox_list_activities   - List all activities
# 5. redtail-crm-sandbox_create_activity   - Create an activity
# 6. redtail-crm-sandbox_list_tasks        - List all tasks
# 7. redtail-crm-sandbox_create_task       - Create a task
# 8. redtail-crm-sandbox_list_events       - List calendar events
# 9. redtail-crm-sandbox_create_event      - Create an event
# 10. redtail-crm-sandbox_get_calendar      - Get calendar view

- slug: redtail-crm-sandbox_list_contacts
  name: List Contacts
  description: |
    Retrieve a list of all contacts in your Redtail CRM sandbox.
  provider: redtail-crm-sandbox
  endpoint: /contacts
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
    - crm
    - sandbox
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of contacts to return"
        default: 50
      search:
        type: string
        description: "Search term for contacts"
    required: []

- slug: redtail-crm-sandbox_get_contact
  name: Get Contact
  description: |
    Get details of a specific contact.
  provider: redtail-crm-sandbox
  endpoint: /contacts/{contactId}
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
    - crm
    - sandbox
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contactId:
        type: string
        description: "The contact ID"
    required:
      - contactId

- slug: redtail-crm-sandbox_create_contact
  name: Create Contact
  description: |
    Create a new contact in the sandbox.
  provider: redtail-crm-sandbox
  endpoint: /contacts
  method: POST
  scopes:
    - contacts:write
  tags:
    - contacts
    - crm
    - create
    - sandbox
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
    required:
      - firstName
      - lastName

