- slug: redtail-crm-sandbox_create_activity
  name: Create Activity
  description: |
    Create a new activity log entry.
  provider: redtail-crm-sandbox
  endpoint: /activities
  method: POST
  scopes:
    - activities:write
  tags:
    - activities
    - crm
    - create
    - sandbox
  input_schema:
    type: object
    description: Parameters for creating an activity
    properties:
      contactId:
        type: string
        description: "Contact ID"
      type:
        type: string
