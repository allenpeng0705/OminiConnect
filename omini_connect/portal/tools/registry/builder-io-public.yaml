- slug: builder_io_public_search_content
  name: Search Content
  description: |
    Search across Builder.io content.
  provider: builder-io-public
  endpoint: /api/v1/search
  method: GET
  scopes: []
  tags:
    - search
    - content
  input_schema:
    type: object
    description: Parameters for searching content
    properties:
      query:
        type: string
        description: "Search query"
      model:
        type: string
        description: "Filter by model ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required:
      - query

