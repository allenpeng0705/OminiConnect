    - read
  input_schema:
    type: object
    description: Parameters for getting a model
    properties:
      modelId:
        type: string
        description: "Model ID"
    required:
      - modelId

- slug: builder_io_public_list_entries
  name: List Entries
  description: |
    List content entries for a model.
  provider: builder-io-public
  endpoint: /api/v1/entries/{modelId}
  method: GET
  scopes: []
