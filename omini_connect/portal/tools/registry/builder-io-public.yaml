# Builder.io (Public) Tools - Allowlist
# Curated subset of Builder.io Content API for AI agent use.
# API_KEY auth via Nango (public key - read only).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. builder_io_public_list_pages     - List pages
# 2. builder_io_public_get_page      - Get page content
# 3. builder_io_public_list_models     - List content models
# 4. builder_io_public_get_model      - Get model details
# 5. builder_io_public_list_entries   - List content entries
# 6. builder_io_public_get_entry      - Get entry details
# 7. builder_io_public_get_site_info  - Get site information
# 8. builder_io_public_search_content - Search content
# 9. builder_io_public_get_model_json - Get model JSON schema
# 10. builder_io_public_list_namespaces - List content namespaces

- slug: builder_io_public_list_pages
  name: List Pages
  description: |
    List all pages in Builder.io (public).
  provider: builder-io-public
  endpoint: /api/v1/pages
  method: GET
  scopes: []
  tags:
    - pages
    - content
  input_schema:
    type: object
    description: Parameters for listing pages
    properties:
      limit:
        type: integer
        description: "Max pages to return"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: builder_io_public_get_page
  name: Get Page
  description: |
    Get content for a specific page.
  provider: builder-io-public
  endpoint: /api/v1/pages/{pageIdOrPath}
  method: GET
  scopes: []
  tags:
    - pages
    - read
  input_schema:
    type: object
    description: Parameters for getting a page
    properties:
      pageIdOrPath:
        type: string
        description: "Page ID or URL path"
    required:
      - pageIdOrPath

- slug: builder_io_public_list_models
  name: List Models
  description: |
    List all content models in Builder.io.
  provider: builder-io-public
  endpoint: /api/v1/models
  method: GET
  scopes: []
  tags:
    - models
    - schema
  input_schema:
    type: object
    description: Parameters for listing models
    properties: {}
