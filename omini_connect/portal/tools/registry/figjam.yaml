- slug: figjam_list_teams
  name: List Teams
  description: |
    List all teams in the workspace with their member counts and board counts.
  provider: figjam
  endpoint: /teams
  method: GET
  scopes:
    - teams:read
  tags:
    - teams
    - workspace
  input_schema:
    type: object
    description: Parameters for listing teams
    properties:
      per_page:
        type: integer
        description: "Results per page (default 20)"
        default: 20
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: figjam_get_team
  name: Get Team
  description: |
    Get details of a specific team including name, description, members, and boards.
  provider: figjam
  endpoint: /teams/{id}
  method: GET
  scopes:
    - teams:read
  tags:
    - teams
    - read
  input_schema:
    type: object
    description: Parameters for getting a team
    properties:
      id:
        type: string
        description: "Team ID"
    required:
      - id

- slug: figjam_list_comments
  name: List Comments
  description: |
    List all comments on a specific board including author, timestamp, and resolved status.
  provider: figjam
  endpoint: /boards/{board_id}/comments
  method: GET
  scopes:
    - comments:read
  tags:
    - comments
    - board
  input_schema:
    type: object
    description: Parameters for listing comments
    properties:
      board_id:
        type: string
        description: "Board ID"
      resolved:
        type: boolean
        description: "Filter by resolved status"
      per_page:
        type: integer
        description: "Results per page (default 50)"
        default: 50
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required:
      - board_id
