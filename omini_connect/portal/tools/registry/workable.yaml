# Workable Tools - Allowlist
# Curated subset of Workable API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. workable_list_jobs           - List all job postings
# # 2. workable_get_job           - Get job details
# # 3. workable_list_candidates           - List all candidates
# # 4. workable_get_candidate           - Get candidate details
# # 5. workable_create_candidate           - Create a new candidate
# # 6. workable_list_applications           - List job applications
# # 7. workable_get_application           - Get application details
# # 8. workable_list_offices           - List all offices
# # 9. workable_list_departments           - List all departments
# # 10. workable_list_interviews           - List scheduled interviews

- slug: workable_list_jobs
  name: List Jobs
  description: |
    List all job postings
  provider: workable
  endpoint: /spi/v3/jobs
  method: GET
  scopes:
    - read
  tags:
    - workable
  input_schema:
    type: object
    description: Parameters for list jobs
    properties: {}
    required: []

- slug: workable_get_job
  name: Get Job
  description: |
    Get job details
  provider: workable
  endpoint: /spi/v3/jobs/{shortcode}
  method: GET
  scopes:
    - read
  tags:
    - workable
  input_schema:
    type: object
    description: Parameters for get job
