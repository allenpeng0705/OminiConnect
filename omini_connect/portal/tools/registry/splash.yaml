- slug: splash_list_events
  name: List Events
  description: |
    Retrieve all events created in Splash for the authenticated organization.
  provider: splash
  endpoint: /api/events
  method: GET
  scopes:
    - events:read
  tags:
    - events
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      status:
        type: string
        description: "Filter by status (draft, published, archived)"
      limit:
        type: integer
        description: "Maximum number of events to return (default: 50)"
      offset:
        type: integer
        description: "Number of events to skip for pagination"
    required: []

- slug: splash_get_event
  name: Get Event
  description: |
    Retrieve detailed information about a specific event including times, location, and settings.
  provider: splash
  endpoint: /api/events/{event_id}
  method: GET
  scopes:
    - events:read
  tags:
    - events
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      event_id:
        type: string
        description: "The unique identifier of the event"
    required:
      - event_id

- slug: splash_create_event
  name: Create Event
  description: |
    Create a new event in Splash with details like name, timing, location, and branding.
  provider: splash
  endpoint: /api/events
  method: POST
  scopes:
    - events:write
  tags:
    - events
  input_schema:
    type: object
    description: Parameters for creating an event
    properties:
      name:
        type: string
        description: "The name/title of the event"
      start_at:
        type: string
        description: "Start datetime in ISO 8601 format"
      end_at:
        type: string
        description: "End datetime in ISO 8601 format"
      timezone:
        type: string
        description: "Timezone (e.g., America/New_York)"
      address:
        type: string
        description: "Street address of the event venue"
      city:
        type: string
        description: "City name"
      country:
        type: string
        description: "Country code (e.g., US)"
      event_type:
        type: string
        description: "Type of event (in_person, virtual, hybrid)"
      capacity:
        type: integer
        description: "Maximum number of guests allowed"
    required:
      - name
      - start_at

- slug: splash_list_guests
  name: List Guests
  description: |
    Retrieve all guests for a specific event with their RSVP and attendance status.
  provider: splash
  endpoint: /api/events/{event_id}/guests
  method: GET
  scopes:
    - guests:read
  tags:
    - guests
  input_schema:
    type: object
    description: Parameters for listing guests
    properties:
      event_id:
        type: string
        description: "The unique identifier of the event"
      rsvp_status:
        type: string
        description: "Filter by RSVP status (pending, going, not_going)"
      check_in_status:
        type: string
        description: "Filter by check-in status (checked_in, not_checked_in)"
    required:
      - event_id

- slug: splash_get_guest
  name: Get Guest
  description: |
    Retrieve detailed information about a specific guest including their RSVP details.
  provider: splash
  endpoint: /api/guests/{guest_id}
  method: GET
  scopes:
    - guests:read
  tags:
    - guests
  input_schema:
    type: object
    description: Parameters for getting a guest
    properties:
      guest_id:
        type: string
        description: "The unique identifier of the guest"
    required:
      - guest_id

- slug: splash_invite_guest
  name: Invite Guest
  description: |
    Create or update a guest record and send an invitation for a specific event.
  provider: splash
  endpoint: /api/events/{event_id}/guests
  method: POST
  scopes:
    - guests:write
  tags:
    - guests
  input_schema:
    type: object
    description: Parameters for inviting a guest
    properties:
      event_id:
        type: string
        description: "The unique identifier of the event"
      email:
        type: string
        description: "Email address of the guest"
      first_name:
        type: string
        description: "First name of the guest"
      last_name:
        type: string
        description: "Last name of the guest"
      send_invite:
        type: boolean
        description: "Whether to send an invitation email immediately"
    required:
      - event_id
      - email

- slug: splash_send_invite
  name: Send Invite
  description: |
    Send or resend an invitation email to a specific guest for an event.
  provider: splash
  endpoint: /api/guests/{guest_id}/send_invite
  method: POST
  scopes:
    - guests:write
  tags:
    - guests
  input_schema:
    type: object
    description: Parameters for sending an invite
    properties:
      guest_id:
        type: string
        description: "The unique identifier of the guest"
    required:
      - guest_id

- slug: splash_list_templates
  name: List Templates
  description: |
    Retrieve all email or page templates available in Splash for event communications.
  provider: splash
  endpoint: /api/templates
  method: GET
  scopes:
    - templates:read
  tags:
    - templates
  input_schema:
    type: object
    description: Parameters for listing templates
    properties:
      template_type:
        type: string
        description: "Filter by type (email, page, invitation)"
    required: []

- slug: splash_get_template
  name: Get Template
  description: |
    Retrieve the content and settings of a specific template.
  provider: splash
  endpoint: /api/templates/{template_id}
  method: GET
  scopes:
    - templates:read
  tags:
    - templates
  input_schema:
    type: object
    description: Parameters for getting a template
    properties:
      template_id:
        type: string
        description: "The unique identifier of the template"
    required:
      - template_id

- slug: splash_get_event_analytics
  name: Get Event Analytics
  description: |
    Retrieve analytics and metrics for an event including views, RSVPs, and attendance data.
  provider: splash
  endpoint: /api/events/{event_id}/analytics
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
  input_schema:
    type: object
    description: Parameters for getting event analytics
    properties:
      event_id:
        type: string
        description: "The unique identifier of the event"
    required:
      - event_id
