# Envoy Tools - Allowlist
# Curated subset of the Envoy API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. envoy_list_visitors        - List all visitors
# 2. envoy_get_visitor          - Get details of a specific visitor
# 3. envoy_create_visitor        - Create a new visitor
# 4. envoy_list_employees       - List all employees
# 5. envoy_get_employee          - Get details of a specific employee
# 6. envoy_list_devices         - List all devices
# 7. envoy_get_device           - Get details of a specific device
# 8. envoy_list_places          - List all places
# 9. envoy_get_place            - Get details of a specific place
# 10. envoy_list_events         - List all events

- slug: envoy_list_visitors
  name: List Visitors
  description: |
    List all visitors in the workplace system.
    Returns visitor records including name, email, host, and check-in status.
  provider: envoy
  endpoint: /visitors
  method: GET
  scopes:
    - visitors:read
  tags:
    - visitors
    - workplace
  input_schema:
    type: object
    description: Parameters for listing visitors
    properties:
      date_from:
        type: string
        description: "Filter by start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "Filter by end date (YYYY-MM-DD)"
      status:
        type: string
        description: "Filter by status: expected, checked_in, checked_out"
      per_page:
        type: integer
        description: "Results per page (default 50)"
        default: 50
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: envoy_get_visitor
  name: Get Visitor
  description: |
    Get details of a specific visitor including contact info, host, and visit history.
  provider: envoy
  endpoint: /visitors/{id}
  method: GET
  scopes:
    - visitors:read
  tags:
    - visitors
    - read
  input_schema:
    type: object
    description: Parameters for getting a visitor
    properties:
      id:
        type: string
        description: "Visitor ID"
    required:
      - id

- slug: envoy_create_visitor
  name: Create Visitor
  description: |
    Create a new visitor record and optionally send an invitation email.
  provider: envoy
  endpoint: /visitors
  method: POST
  scopes:
    - visitors:write
  tags:
    - visitors
    - create
  input_schema:
    type: object
    description: Parameters for creating a visitor
    properties:
      first_name:
        type: string
        description: "Visitor first name"
      last_name:
        type: string
        description: "Visitor last name"
      email:
        type: string
        description: "Visitor email address"
      host_id:
        type: string
        description: "Employee ID of the host"
      scheduled_at:
        type: string
        description: "Expected arrival time (ISO 8601)"
      send_email:
        type: boolean
        description: "Send invitation email to visitor (default true)"
        default: true
    required:
      - first_name
      - last_name
      - email
      - host_id

