# QuickBooks Tools - Allowlist
# Curated subset of the QuickBooks Online API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. quickbooks_list_customers       - List customers in the account
# 2. quickbooks_get_customer         - Get a specific customer
# 3. quickbooks_create_customer      - Create a new customer
# 4. quickbooks_list_invoices        - List invoices
# 5. quickbooks_get_invoice          - Get a specific invoice
# 6. quickbooks_create_invoice       - Create a new invoice
# 7. quickbooks_list_payments        - List payments
# 8. quickbooks_get_payment          - Get a specific payment
# 9. quickbooks_list_accounts        - List accounts
# 10. quickbooks_get_account         - Get a specific account

- slug: quickbooks_list_customers
  name: List Customers
  description: |
    List all customers in the QuickBooks Online company.
    Returns customer details including name, email, phone, and billing address.
  provider: quickbooks
  endpoint: /v3/company/{company_id}/query
  method: GET
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - customers
    - accounting
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      company_id:
        type: string
        description: "QuickBooks Company ID (path parameter)"
      query:
        type: string
        description: "SQL-like query (e.g., SELECT * FROM Customer MAXRESULTS 100)"
        default: "SELECT * FROM Customer MAXRESULTS 100"
      minorversion:
        type: string
        description: "API minor version"
    required:
      - company_id

- slug: quickbooks_get_customer
  name: Get Customer
  description: |
    Get details of a specific customer by their ID.
    Returns full customer information including contact details and metadata.
  provider: quickbooks
  endpoint: /v3/company/{company_id}/customer/{customer_id}
  method: GET
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      company_id:
        type: string
        description: "QuickBooks Company ID"
      customer_id:
        type: string
        description: "Customer ID"
      minorversion:
        type: string
        description: "API minor version"
    required:
      - company_id
      - customer_id

- slug: quickbooks_create_customer
  name: Create Customer
  description: |
    Create a new customer in QuickBooks Online.
    Include name and optional email, phone, and billing/shipping addresses.
  provider: quickbooks
  endpoint: /v3/company/{company_id}/customer
  method: POST
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - customers
    - create
  input_schema:
    type: object
    description: Customer creation parameters
    properties:
      company_id:
        type: string
        description: "QuickBooks Company ID"
      DisplayName:
        type: string
        description: "Customer display name (required)"
      PrimaryEmailAddr:
        type: object
        description: "Email address object {Address: 'email@example.com'}"
      PrimaryPhone:
        type: object
        description: "Phone object {FreeFormNumber: '555-1234'}"
      BillAddr:
        type: object
        description: "Billing address object"
      ShipAddr:
        type: object
        description: "Shipping address object"
      GivenName:
        type: string
        description: "First name"
      FamilyName:
        type: string
        description: "Last name"
    required:
      - company_id
      - DisplayName

