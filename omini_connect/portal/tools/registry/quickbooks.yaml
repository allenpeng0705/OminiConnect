- slug: quickbooks_get_invoice
  name: Get Invoice
  description: |
    Get details of a specific invoice by its ID.
    Returns full invoice information including line items, totals, and status.
  provider: quickbooks
  endpoint: /v3/company/{company_id}/invoice/{invoice_id}
  method: GET
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      company_id:
        type: string
        description: "QuickBooks Company ID"
      invoice_id:
        type: string
        description: "Invoice ID"
      minorversion:
        type: string
        description: "API minor version"
    required:
      - company_id
      - invoice_id

- slug: quickbooks_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice in QuickBooks Online.
    Include customer, line items, and optional due date and terms.
  provider: quickbooks
  endpoint: /v3/company/{company_id}/invoice
  method: POST
  scopes:
    - com.intuit.quickbooks.accounting
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Invoice creation parameters
    properties:
      company_id:
        type: string
        description: "QuickBooks Company ID"
      Line:
        type: array
        description: "Array of line items objects"
      CustomerRef:
        type: object
        description: "Customer reference {value: 'customer_id', name: 'Customer Name'}"
      DocNumber:
        type: string
        description: "Invoice number"
      TxnDate:
        type: string
        description: "Transaction date (YYYY-MM-DD)"
      DueDate:
        type: string
        description: "Due date (YYYY-MM-DD)"
    required:
      - company_id
      - Line
      - CustomerRef

