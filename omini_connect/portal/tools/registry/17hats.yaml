# 17hats Tools - Allowlist
# Curated subset of 17hats CRM API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. 17hats_list_clients         - List all clients
# 2. 17hats_get_client          - Get client details
# 3. 17hats_create_client       - Create a new client
# 4. 17hats_list_projects       - List all projects
# 5. 17hats_get_project         - Get project details
# 6. 17hats_create_project     - Create a new project
# 7. 17hats_list_tasks          - List all tasks
# 8. 17hats_get_task            - Get task details
# 9. 17hats_list_invoices       - List all invoices
# 10. 17hats_get_invoice        - Get invoice details

- slug: 17hats_list_clients
  name: List Clients
  description: |
    List all clients in 17hats CRM.
    Filter by name, email, or status.
  provider: 17hats
  endpoint: /clients
  method: GET
  scopes:
    - clients:r
  tags:
    - clients
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      search:
        type: string
        description: "Search by name or email"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: 17hats_get_client
  name: Get Client
  description: |
    Get detailed information about a specific 17hats client.
  provider: 17hats
  endpoint: /clients/{id}
  method: GET
  scopes:
    - clients:r
  tags:
    - clients
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      id:
        type: string
        description: "Client ID"
    required:
      - id

- slug: 17hats_create_client
  name: Create Client
  description: |
    Create a new client in 17hats CRM.
    Set name, email, phone, and company details.
  provider: 17hats
  endpoint: /clients
  method: POST
  scopes:
    - clients:w
  tags:
    - clients
    - create
  input_schema:
    type: object
    description: Parameters for creating a client
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company:
        type: string
        description: "Company name"
    required:
      - first_name
      - last_name

