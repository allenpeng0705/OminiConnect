- slug: 17hats_create_project
  name: Create Project
  description: |
    Create a new project in 17hats CRM.
    Set title, client, description, and timeline.
  provider: 17hats
  endpoint: /projects
  method: POST
  scopes:
    - projects:w
  tags:
    - projects
    - create
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      client_id:
        type: string
        description: "Client ID"
      description:
        type: string
        description: "Project description"
      status:
        type: string
        description: "Project status"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      due_date:
        type: string
        description: "Due date (YYYY-MM-DD)"
    required:
      - name
      - client_id

