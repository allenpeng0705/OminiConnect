    properties:
      PathPrefix:
        type: string
        description: "Filter by path prefix"
      MaxItems:
        type: integer
        description: "Max items to return"
        default: 20
    required: []

- slug: aws_iam_get_role
  name: Get Role
  description: |
    Get details for a specific IAM role including trust policy.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
