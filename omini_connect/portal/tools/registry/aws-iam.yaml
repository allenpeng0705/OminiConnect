  input_schema:
    type: object
    description: Parameters for getting a policy
    properties:
      PolicyArn:
        type: string
        description: "Policy ARN"
    required:
      - PolicyArn

- slug: aws_iam_list_account_aliases
  name: List Account Aliases
  description: |
    List account aliases associated with the AWS account.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - account
    - alias
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []
