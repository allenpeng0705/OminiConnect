- slug: aws_iam_list_policies
  name: List Policies
  description: |
    List all managed policies in the account.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - policies
    - iam
  input_schema:
    type: object
    description: Parameters for listing policies
    properties:
      Scope:
        type: string
        description: "Policy scope: Local, AWS, or All"
        default: Local
      MaxItems:
        type: integer
        description: "Max items to return"
        default: 20
    required: []

- slug: aws_iam_get_policy
  name: Get Policy
