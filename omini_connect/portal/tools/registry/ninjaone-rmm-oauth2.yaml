- slug: ninjaone_run_script
  name: Run Script
  description: |
    Run an automation script on a device.
  provider: ninjaone-rmm-oauth2
  endpoint: /v1/devices/{deviceId}/scripts/{scriptId}/run
  method: POST
  scopes:
    - scripts:execute
  tags:
    - rmm
    - scripts
    - automation
  input_schema:
    type: object
    description: Parameters for running a script
    properties:
      deviceId:
        type: integer
        description: "Device ID"
      scriptId:
        type: integer
        description: "Script ID"
      parameters:
        type: object
        description: "Script parameters"
    required:
      - deviceId
      - scriptId

