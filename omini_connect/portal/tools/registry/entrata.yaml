# Entrata Tools - Allowlist
# Curated subset of Entrata API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. entrata_list_properties        - List properties
# 2. entrata_get_property           - Get property details
# 3. entrata_list_units             - List units
# 4. entrata_get_unit               - Get unit details
# 5. entrata_list_tenants           - List tenants
# 6. entrata_get_tenant             - Get tenant details
# 7. entrata_list_leases            - List leases
# 8. entrata_get_lease              - Get lease details
# 9. entrata_list_work_orders       - List work orders
# 10. entrata_create_work_order     - Create work order

- slug: entrata_list_properties
  name: List Properties
  description: |
    List all properties in the account.
  provider: entrata
  endpoint: /api/v1/properties
  method: GET
  scopes: []
  tags:
    - properties
    - real estate
    - read
  input_schema:
    type: object
    description: Parameters for listing properties
    properties: {}
    required: []

- slug: entrata_get_property
  name: Get Property
  description: |
    Get details of a specific property.
  provider: entrata
  endpoint: /api/v1/properties/{id}
  method: GET
  scopes: []
  tags:
    - properties
    - real estate
    - read
  input_schema:
    type: object
    description: Parameters for getting property
    properties:
      id:
        type: integer
        description: "Property ID"
    required:
      - id

- slug: entrata_list_units
  name: List Units
  description: |
    List units for a property.
  provider: entrata
  endpoint: /api/v1/properties/{propertyId}/units
  method: GET
  scopes: []
  tags:
    - units
    - real estate
    - read
  input_schema:
    type: object
    description: Parameters for listing units
    properties:
      propertyId:
        type: integer
        description: "Property ID"
    required:
      - propertyId

