    required: []

- slug: entrata_create_work_order
  name: Create Work Order
  description: |
    Create a new maintenance work order.
  provider: entrata
  endpoint: /api/v1/workorders
  method: POST
  scopes: []
  tags:
    - workorders
    - maintenance
    - create
  input_schema:
    type: object
    description: Parameters for creating work order
    properties:
      property_id:
        type: integer
        description: "Property ID"
      unit_id:
        type: integer
        description: "Unit ID"
      description:
        type: string
        description: "Work order description"
      priority:
        type: string
        description: "Priority (low, medium, high, emergency)"
    required:
      - property_id
      - description
