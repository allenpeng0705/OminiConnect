# dayforce Tools - Allowlist
# Curated subset of the Dayforce HCM API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. dayforce_list_employees        - List employees in the organization
# 2. dayforce_get_employee          - Get a specific employee by employee number
# 3. dayforce_create_employee       - Create a new employee record
# 4. dayforce_list_time_entries     - List time entries for employees
# 5. dayforce_get_time_entry        - Get a specific time entry
# 6. dayforce_list_requests         - List requests (time off, leave, etc.)
# 7. dayforce_get_request           - Get a specific request
# 8. dayforce_approve_request       - Approve a pending request
# 9. dayforce_list_org_units       - List organizational units
# 10. dayforce_get_org_unit         - Get a specific organizational unit

- slug: dayforce_list_employees
  name: List Employees
  description: |
    List all employees in the Dayforce organization with optional filtering.
    Returns employee details including name, employee number, department, and status.
  provider: dayforce
  endpoint: /Employees
  method: GET
  scopes:
    - employees:read
  tags:
    - employees
    - hr
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      country:
        type: string
        description: "Country code for data formatting (e.g., US, CA)"
      state:
        type: string
        description: "State code for filtering"
      city:
        type: string
        description: "City name for filtering"
      postalCode:
        type: string
        description: "Postal code for filtering"
      hireDateFrom:
        type: string
        description: "Filter by hire date from (ISO 8601 format)"
      hireDateTo:
        type: string
        description: "Filter by hire date to (ISO 8601 format)"
      isActive:
        type: boolean
        description: "Filter by active status"
      department:
        type: string
        description: "Filter by department name"
      limit:
        type: integer
        description: "Maximum number of results to return"
        default: 50
      skip:
        type: integer
        description: "Number of results to skip for pagination"
        default: 0
    required:
      - xTenantContextId

- slug: dayforce_get_employee
  name: Get Employee
  description: |
    Get details of a specific employee by their employee number including personal info, employment details, and organizational hierarchy.
  provider: dayforce
  endpoint: /Employees/{employeeNumber}
  method: GET
  scopes:
    - employees:read
  tags:
    - employees
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      employeeNumber:
        type: string
        description: "Employee number (required)"
      country:
        type: string
        description: "Country code for data formatting"
    required:
      - xTenantContextId
      - employeeNumber

- slug: dayforce_create_employee
  name: Create Employee
  description: |
    Create a new employee record in Dayforce with personal details, employment information, and organizational assignment.
  provider: dayforce
  endpoint: /Employees
  method: POST
  scopes:
    - employees:write
  tags:
    - employees
    - create
  input_schema:
    type: object
    description: Parameters for creating an employee
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      employeeNumber:
        type: string
        description: "Employee number (must be unique)"
      firstName:
        type: string
        description: "Employee first name"
      lastName:
        type: string
        description: "Employee last name"
      personalEmail:
        type: string
        description: "Personal email address"
      workEmail:
        type: string
        description: "Work email address"
      hireDate:
        type: string
        description: "Hire date (ISO 8601 format)"
      department:
        type: string
        description: "Department name"
      jobTitle:
        type: string
        description: "Job title"
      reportsTo:
        type: string
        description: "Manager's employee number"
    required:
      - xTenantContextId
      - firstName
      - lastName

- slug: dayforce_list_time_entries
  name: List Time Entries
  description: |
    List time entries for employees with optional filtering by date range, employee, or approval status.
    Time entries track hours worked, breaks, and overtime.
  provider: dayforce
  endpoint: /TimeEntries
  method: GET
  scopes:
    - time:read
  tags:
    - time_entries
    - time
  input_schema:
    type: object
    description: Parameters for listing time entries
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      employeeNumber:
        type: string
        description: "Filter by specific employee"
      startDate:
        type: string
        description: "Start date for range (ISO 8601 format)"
      endDate:
        type: string
        description: "End date for range (ISO 8601 format)"
      isApproved:
        type: boolean
        description: "Filter by approval status"
      country:
        type: string
        description: "Country code"
      limit:
        type: integer
        description: "Maximum number of results"
        default: 50
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
    required:
      - xTenantContextId

- slug: dayforce_get_time_entry
  name: Get Time Entry
  description: |
    Get details of a specific time entry by its ID including hours worked, break time, and approval status.
  provider: dayforce
  endpoint: /TimeEntries/{entryId}
  method: GET
  scopes:
    - time:read
  tags:
    - time_entries
    - read
  input_schema:
    type: object
    description: Parameters for getting a time entry
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      entryId:
        type: string
        description: "Time entry ID (required)"
      country:
        type: string
        description: "Country code"
    required:
      - xTenantContextId
      - entryId

- slug: dayforce_list_requests
  name: List Requests
  description: |
    List requests such as time off, leave of absence, or other HR requests with optional filtering.
    Returns request details including type, status, dates, and approver information.
  provider: dayforce
  endpoint: /Requests
  method: GET
  scopes:
    - requests:read
  tags:
    - requests
    - hr
  input_schema:
    type: object
    description: Parameters for listing requests
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      employeeNumber:
        type: string
        description: "Filter by specific employee"
      requestType:
        type: string
        description: "Filter by request type (e.g., TimeOff, LeaveOfAbsence)"
      status:
        type: string
        description: "Filter by status (e.g., Pending, Approved, Denied)"
      startDate:
        type: string
        description: "Start date for range"
      endDate:
        type: string
        description: "End date for range"
      country:
        type: string
        description: "Country code"
      limit:
        type: integer
        description: "Maximum number of results"
        default: 50
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
    required:
      - xTenantContextId

- slug: dayforce_get_request
  name: Get Request
  description: |
    Get details of a specific request by its ID including type, dates, status, and approval history.
  provider: dayforce
  endpoint: /Requests/{requestId}
  method: GET
  scopes:
    - requests:read
  tags:
    - requests
    - read
  input_schema:
    type: object
    description: Parameters for getting a request
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      requestId:
        type: string
        description: "Request ID (required)"
      country:
        type: string
        description: "Country code"
    required:
      - xTenantContextId
      - requestId

- slug: dayforce_approve_request
  name: Approve Request
  description: |
    Approve a pending request (time off, leave, etc.) in the Dayforce system.
    The request must be in Pending status to be approved.
  provider: dayforce
  endpoint: /Requests/{requestId}/Approve
  method: POST
  scopes:
    - requests:write
  tags:
    - requests
    - approve
  input_schema:
    type: object
    description: Parameters for approving a request
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      requestId:
        type: string
        description: "Request ID to approve (required)"
      comments:
        type: string
        description: "Optional approval comments"
      country:
        type: string
        description: "Country code"
    required:
      - xTenantContextId
      - requestId

- slug: dayforce_list_org_units
  name: List Organizational Units
  description: |
    List all organizational units in the Dayforce hierarchy such as departments, locations, or cost centers.
    Organizational units define the structure of the company for HR and payroll purposes.
  provider: dayforce
  endpoint: /OrganizationalUnits
  method: GET
  scopes:
    - organization:read
  tags:
    - org_units
    - organization
  input_schema:
    type: object
    description: Parameters for listing organizational units
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      unitType:
        type: string
        description: "Filter by unit type (e.g., Department, Location, CostCenter)"
      parentUnitId:
        type: string
        description: "Filter by parent unit ID for hierarchy traversal"
      country:
        type: string
        description: "Country code"
      limit:
        type: integer
        description: "Maximum number of results"
        default: 50
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
    required:
      - xTenantContextId

- slug: dayforce_get_org_unit
  name: Get Organizational Unit
  description: |
    Get details of a specific organizational unit including its name, type, parent unit, and metadata.
  provider: dayforce
  endpoint: /OrganizationalUnits/{unitId}
  method: GET
  scopes:
    - organization:read
  tags:
    - org_units
    - read
  input_schema:
    type: object
    description: Parameters for getting an organizational unit
    properties:
      xTenantContextId:
        type: string
        description: "Tenant context ID (required)"
      unitId:
        type: string
        description: "Organizational unit ID (required)"
      country:
        type: string
        description: "Country code"
    required:
      - xTenantContextId
      - unitId
