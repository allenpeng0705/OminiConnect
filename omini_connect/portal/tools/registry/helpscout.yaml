# Help Scout Tools - Allowlist
# Curated subset of Help Scout API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. helpscout_list_conversations  - List conversations
# 2. helpscout_get_conversation    - Get conversation details
# 3. helpscout_create_conversation  - Create a new conversation
# 4. helpscout_list_mailboxes      - List mailboxes
# 5. helpscout_get_mailbox         - Get mailbox details
# 6. helpscout_list_customers      - List customers
# 7. helpscout_get_customer        - Get customer details
# 8. helpscout_list_reports        - List reports
# 9. helpscout_get_report          - Get report details
# 10. helpscout_list_workflows      - List workflows

- slug: helpscout_list_conversations
  name: List Conversations
  description: |
    List all Help Scout conversations with optional filtering by status or mailbox. Returns conversation subjects, statuses, assignees, and customer information.
  provider: helpscout
  endpoint: /conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status: active, all, archived, spam, trash"
      mailboxId:
        type: integer
        description: "Filter by mailbox ID"
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      count:
        type: integer
        description: "Results per page (default 20, max 100)"
        default: 20
    required: []

- slug: helpscout_get_conversation
  name: Get Conversation
  description: |
    Get a specific Help Scout conversation by ID with all messages and customer details. Returns the full conversation thread including message parts and attachments.
  provider: helpscout
  endpoint: /conversations/{conversation_id}
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: integer
        description: "Conversation ID"
    required:
      - conversation_id

- slug: helpscout_create_conversation
  name: Create Conversation
  description: |
    Create a new conversation in Help Scout with subject, customer, mailbox, and initial message. Returns the created conversation with its assigned ID and thread.
  provider: helpscout
  endpoint: /conversations
  method: POST
  scopes:
    - write
  tags:
    - conversations
    - create
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      subject:
        type: string
        description: "Conversation subject"
      customerId:
        type: integer
        description: "Customer ID"
      mailboxId:
        type: integer
        description: "Mailbox ID"
      assigneeId:
        type: integer
        description: "Assignee user ID"
      status:
        type: string
        description: "Status: active, pending, snoozed"
        default: active
      body:
        type: string
        description: "Initial message body"
    required:
      - subject
      - customerId
      - mailboxId

