- slug: eventbrite_list_events
  name: List Events
  description: |
    Retrieve a list of all events for the authenticated organization.
  provider: eventbrite
  endpoint: /v3/organizations/{organization_id}/events/
  method: GET
  scopes:
    - event:read
  tags:
    - events
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      organization_id:
        type: string
        description: "The Eventbrite organization ID"
      status:
        type: string
        description: "Filter by status (live, started, ended, canceled, draft)"
      expand:
        type: string
        description: "Comma-separated list of fields to expand (venue, ticket_classes)"
    required:
      - organization_id

- slug: eventbrite_get_event
  name: Get Event
  description: |
    Retrieve detailed information about a specific event by ID.
  provider: eventbrite
  endpoint: /v3/events/{event_id}/
  method: GET
  scopes:
    - event:read
  tags:
    - events
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      event_id:
        type: string
        description: "The unique identifier of the event"
      expand:
        type: string
        description: "Comma-separated list of fields to expand (venue, ticket_classes, organizers)"
    required:
      - event_id

- slug: eventbrite_create_event
  name: Create Event
  description: |
    Create a new event under the specified organization with timing and venue details.
  provider: eventbrite
  endpoint: /v3/organizations/{organization_id}/events/
  method: POST
  scopes:
    - event:write
  tags:
    - events
  input_schema:
    type: object
    description: Parameters for creating an event
    properties:
      organization_id:
        type: string
        description: "The Eventbrite organization ID"
      name:
        type: string
        description: "The name/title of the event"
      description_html:
        type: string
        description: "HTML description of the event"
      start_utc:
        type: string
        description: "Start datetime in UTC ISO 8601 format"
      end_utc:
        type: string
        description: "End datetime in UTC ISO 8601 format"
      currency:
        type: string
        description: "Currency code (e.g., USD, EUR)"
      online_event:
        type: boolean
        description: "Whether the event is online"
      venue_id:
        type: string
        description: "ID of an existing venue to use"
    required:
      - organization_id
      - name
      - start_utc
      - end_utc
      - currency

