# WebinarJam Tools - Allowlist
# Curated subset of WebinarJam API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. webinarjam_list_webinars           - List all webinars
# # 2. webinarjam_get_webinar           - Get webinar details
# # 3. webinarjam_list_registrants           - List all registrants for a webinar
# # 4. webinarjam_register           - Register a participant
# # 5. webinarjam_list_attendees           - List attendees for a webinar
# # 6. webinarjam_send_broadcast           - Send a broadcast message
# # 7. webinarjam_get_dashboard           - Get webinar dashboard data
# # 8. webinarjam_list_recordings           - List webinar recordings
# # 9. webinarjam_get_poll_results           - Get poll results for a webinar
# # 10. webinarjam_get_replay           - Get replay URL for a webinar

- slug: webinarjam_list_webinars
  name: List Webinars
  description: |
    List all webinars
  provider: webinarjam
  endpoint: /webinars
  method: GET
  scopes:
    - 
  tags:
    - webinarjam
  input_schema:
    type: object
    description: Parameters for list webinars
    properties: {}
    required: []

