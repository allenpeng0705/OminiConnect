- slug: discourse_list_categories
  name: List Categories
  description: |
    List all forum categories in the Discourse community with optional filtering. Returns category names, descriptions, color codes, and topic counts for organizing discussions.
  provider: discourse
  endpoint: /categories.json
  method: GET
  scopes:
    - read
  tags:
    - categories
  input_schema:
    type: object
    description: Parameters for listing categories
    properties: {}

- slug: discourse_get_category
  name: Get Category
  description: |
    Retrieve detailed information about a specific Discourse category including its description, color scheme, permissions settings, and recent topic activity.
  provider: discourse
  endpoint: /c/{id}/show.json
  method: GET
  scopes:
    - read
  tags:
    - categories
  input_schema:
    type: object
    description: Parameters for getting a category
    properties:
      id:
        type: integer
        description: "The category ID"
    required:
      - id

- slug: discourse_list_posts
  name: List Posts
  description: |
    List recent posts across the Discourse forum with optional filtering by category or topic. Returns post content previews, author information, and timestamps for engagement tracking.
  provider: discourse
  endpoint: /posts.json
  method: GET
  scopes:
    - read
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for listing posts
    properties:
      topic_id:
        type: integer
        description: "Filter by topic ID"
      category:
        type: string
        description: "Filter by category slug"
      page:
        type: integer
        description: "Page number for pagination"

- slug: discourse_get_post
  name: Get Post
  description: |
    Retrieve detailed information about a specific Discourse post including its full content, author profile, creation timestamp, and any embedded media or links.
  provider: discourse
  endpoint: /posts/{id}.json
  method: GET
  scopes:
    - read
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for getting a post
    properties:
      id:
        type: integer
        description: "The post ID"
    required:
      - id

- slug: discourse_create_post
  name: Create Post
  description: |
    Create a new discussion post in a Discourse topic or start a new topic thread. Returns the created post with its unique identifier and creation timestamp.
  provider: discourse
  endpoint: /posts.json
  method: POST
  scopes:
    - write
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for creating a post
    properties:
      topic_id:
        type: integer
        description: "The topic ID to post in"
      title:
        type: string
        description: "Title for new topic"
      raw:
        type: string
        description: "The post content"
      category:
        type: string
        description: "Category slug for new topic"
    required:
      - raw

- slug: discourse_list_users
  name: List Users
  description: |
    List all registered users in the Discourse community with optional filtering by status. Returns usernames, email addresses, join dates, and trust levels for each user account.
  provider: discourse
  endpoint: /admin/users/list/{flag}.json
  method: GET
  scopes:
    - read
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      flag:
        type: string
        description: "User type: active, new, staff, suspended"
        default: active
      filter:
        type: string
        description: "Search filter for username or email"
      page:
        type: integer
        description: "Page number"

- slug: discourse_get_user
  name: Get User
  description: |
    Retrieve detailed information about a specific Discourse user including their profile bio, statistics, badge count, and recent activity summary.
  provider: discourse
  endpoint: /u/{username}.json
  method: GET
  scopes:
    - read
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      username:
        type: string
        description: "The username"
    required:
      - username

- slug: discourse_list_groups
  name: List Groups
  description: |
    List all user groups in the Discourse community with optional filtering by type. Returns group names, member counts, and visibility settings for organizing users.
  provider: discourse
  endpoint: /groups.json
  method: GET
  scopes:
    - read
  tags:
    - groups
  input_schema:
    type: object
    description: Parameters for listing groups
    properties:
      type:
        type: string
        description: "Filter by type: public, private, automatic"

- slug: discourse_get_group
  name: Get Group
  description: |
    Retrieve detailed information about a specific Discourse group including member list, permission settings, and group description or bio.
  provider: discourse
  endpoint: /groups/{id}.json
  method: GET
  scopes:
    - read
  tags:
    - groups
  input_schema:
    type: object
    description: Parameters for getting a group
    properties:
      id:
        type: integer
        description: "The group ID"
    required:
      - id

- slug: discourse_list_notifications
  name: List Notifications
  description: |
    List all notifications for the authenticated Discourse user with optional pagination. Returns notification types, related post information, and read status for each alert.
  provider: discourse
  endpoint: /notifications.json
  method: GET
  scopes:
    - read
  tags:
    - notifications
  input_schema:
    type: object
    description: Parameters for listing notifications
    properties:
      limit:
        type: integer
        description: "Maximum number of notifications to return"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
