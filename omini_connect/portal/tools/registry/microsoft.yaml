# Microsoft Tools - Allowlist
# Curated subset of Microsoft Graph API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. microsoft_list_users        - List all users
# 2. microsoft_get_user          - Get user details
# 3. microsoft_list_groups      - List groups
# 4. microsoft_get_group        - Get group details
# 5. microsoft_list_messages    - List messages (email)
# 6. microsoft_get_message      - Get message details
# 7. microsoft_list_calendars   - List calendars
# 8. microsoft_get_calendar_event - Get calendar event
# 9. microsoft_list_files        - List OneDrive files
# 10. microsoft_get_file        - Get file details

- slug: microsoft_list_users
  name: List Users
  description: |
    List all users in the organization via Microsoft Graph.
    Filter by department, role, or search query.
  provider: microsoft
  endpoint: /v1.0/users
  method: GET
  scopes:
    - User.Read.All
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      $filter:
        type: string
        description: "OData filter expression"
      $search:
        type: string
        description: "Search query"
      $top:
        type: integer
        description: "Max results"
        default: 50
      $select:
        type: string
        description: "Fields to select"
    required: []

- slug: microsoft_get_user
  name: Get User
  description: |
    Get detailed information about a specific user.
  provider: microsoft
  endpoint: /v1.0/users/{userId}
  method: GET
  scopes:
    - User.Read.All
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID or email"
      $select:
        type: string
        description: "Fields to select"
    required:
      - userId

