# Workday Adaptive Planning (Basic) Tools - Allowlist
# Curated subset of Workday Adaptive Planning (Basic) API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. workday_list_plans           - List all planning plans
# # 2. workday_get_plan           - Get plan details
# # 3. workday_list_instances           - List all planning instances
# # 4. workday_get_instance           - Get instance details
# # 5. workday_list_sheets           - List all planning sheets
# # 6. workday_get_sheet           - Get sheet details
# # 7. workday_get_data           - Get planning data
# # 8. workday_set_data           - Set planning data
# # 9. workday_list_dimensions           - List all dimensions
# # 10. workday_list_levels           - List all levels in the hierarchy

- slug: workday_list_plans
  name: List Plans
  description: |
    List all planning plans
  provider: workday-adaptive-planning-basic
  endpoint: /v1/plans
  method: GET
  scopes:
    - read
  tags:
    - workday-adaptive-planning-basic
  input_schema:
    type: object
    description: Parameters for list plans
    properties: {}
    required: []

- slug: workday_get_plan
  name: Get Plan
  description: |
    Get plan details
  provider: workday-adaptive-planning-basic
