- slug: pipedrive_list_pipelines
  name: List Pipelines
  description: |
    Retrieve all sales pipelines and their stages from Pipedrive.
    Use to see available pipelines and stage definitions.
  provider: pipedrive
  endpoint: /v1/pipelines
  method: GET
  scopes:
    - pipelines:read
  tags:
    - pipelines
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing pipelines
    properties:
      start:
        type: integer
        description: "Pagination start value"
        default: 0
      limit:
        type: integer
        description: "Number of results per page"
        default: 50
      include_inactive:
        type: string
        description: "Include inactive pipelines (yes/no)"
        default: "no"
    required: []

- slug: pipedrive_get_pipeline
