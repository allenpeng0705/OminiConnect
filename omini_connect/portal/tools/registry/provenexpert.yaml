# ProvenExpert Tools - Allowlist
# Curated subset of ProvenExpert API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. provenexpert_get_rating_summary    - Get rating summary
# 2. provenexpert_list_ratings         - List ratings
# 3. provenexpert_get_rating           - Get rating details
# 4. provenexpert_list_reviews        - List reviews
# 5. provenexpert_get_review           - Get review details
# 6. provenexpert_get_profile         - Get profile info
# 7. provenexpert_list_competitors    - List competitors
# 8. provenexpert_get_statistics      - Get statistics
# 9. provenexpert_list_badges         - List badges
# 10. provenexpert_get_seals          - Get seals info

- slug: provenexpert_get_rating_summary
  name: Get Rating Summary
  description: |
    Retrieve the overall rating summary for your ProvenExpert profile, including average rating scores and total review counts.
    Returns aggregated rating metrics for reputation monitoring and display.
  provider: provenexpert
  endpoint: /v1/rating/summary/get
  method: POST
  scopes: []
  tags:
    - ratings
    - reputation
    - read
  input_schema:
    type: object
    description: Parameters for getting rating summary
    properties: {}
    required: []

- slug: provenexpert_list_ratings
  name: List Ratings
  description: |
    Retrieve all ratings from ProvenExpert with their dates, scores, and reviewer information.
    Returns rating records for performance tracking and analysis.
  provider: provenexpert
  endpoint: /v1/rating/get
  method: POST
  scopes: []
  tags:
    - ratings
    - reputation
    - list
  input_schema:
    type: object
    description: Parameters for listing ratings
    properties:
      startDate:
        type: string
        description: "Start date filter"
      endDate:
        type: string
        description: "End date filter"
    required: []

- slug: provenexpert_get_rating
  name: Get Rating
  description: |
    Retrieve detailed information about a specific rating including the score, review text, and reviewer details.
    Returns rating details for individual feedback analysis.
  provider: provenexpert
  endpoint: /v1/rating/get
  method: POST
  scopes: []
  tags:
    - ratings
    - reputation
    - read
  input_schema:
    type: object
    description: Parameters for getting a rating
    properties:
      ratingId:
        type: string
        description: "Rating ID"
    required:
      - ratingId

