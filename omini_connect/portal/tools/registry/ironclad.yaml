  provider: ironclad
  endpoint: /api/v2/contracts/{id}/metadata
  method: GET
  scopes:
    - contract:read
  tags:
    - contracts
    - metadata
    - read
  input_schema:
    type: object
    description: Parameters for getting contract metadata
    properties:
      id:
        type: string
        description: "Contract ID"
    required:
      - id