- slug: ironclad_search_contracts
  name: Search Contracts
  description: |
    Search for contracts using full-text search across contract titles, content, and metadata.
  provider: ironclad
  endpoint: /api/v2/contracts/search
  method: POST
  scopes:
    - contract:read
  tags:
    - contracts
    - search
    - read
  input_schema:
    type: object
    description: Parameters for searching contracts
    properties:
      query:
        type: string
        description: "Search query string"
      status:
        type: array
        items:
          type: string
        description: "Filter by contract statuses"
      date_range:
        type: object
        description: "Date range filter"
        properties:
          from:
            type: string
          to:
            type: string
      limit:
        type: integer
        description: "Maximum number of results (default 20)"
        default: 20
    required:
      - query

- slug: ironclad_get_contract_metadata
  name: Get Contract Metadata
  description: |
