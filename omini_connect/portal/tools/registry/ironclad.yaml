- slug: ironclad_get_template
  name: Get Template
  description: |
    Get detailed information about a contract template including fields and structure.
  provider: ironclad
  endpoint: /api/v2/templates/{id}
  method: GET
  scopes:
    - template:read
  tags:
    - templates
