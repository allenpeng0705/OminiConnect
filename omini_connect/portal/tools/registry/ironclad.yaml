# Ironclad Tools - Allowlist
# Curated subset of Ironclad Contract Management API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ironclad_list_contracts         - List contracts
# 2. ironclad_get_contract          - Get contract details
# 3. ironclad_create_contract       - Create a new contract
# 4. ironclad_update_contract       - Update a contract
# 5. ironclad_list_counterparties   - List counterparties
# 6. ironclad_get_counterparty      - Get counterparty details
# 7. ironclad_list_templates        - List contract templates
# 8. ironclad_get_template         - Get template details
# 9. ironclad_search_contracts     - Search contracts
# 10. ironclad_get_contract_metadata - Get contract metadata

- slug: ironclad_list_contracts
  name: List Contracts
  description: |
    List all contracts with optional filtering by status, counterparty, or date range.
  provider: ironclad
  endpoint: /api/v2/contracts
  method: GET
  scopes:
    - contract:read
  tags:
    - contracts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contracts
    properties:
      status:
        type: string
        description: "Filter by status (draft, pending, active, closed)"
      counterparty_id:
        type: string
        description: "Filter by counterparty ID"
      from_date:
        type: string
        description: "Filter contracts created after this date (ISO 8601)"
      to_date:
        type: string
        description: "Filter contracts created before this date (ISO 8601)"
      limit:
        type: integer
        description: "Number of results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
        default: 0
    required: []

- slug: ironclad_get_contract
  name: Get Contract
  description: |
    Get detailed information about a specific contract including parties, terms, and metadata.
  provider: ironclad
  endpoint: /api/v2/contracts/{id}
  method: GET
  scopes:
    - contract:read
  tags:
    - contracts
    - read
    - details
  input_schema:
    type: object
    description: Parameters for getting a contract
    properties:
      id:
        type: string
        description: "Contract ID"
    required:
      - id

- slug: ironclad_create_contract
  name: Create Contract
  description: |
    Create a new contract in Ironclad with specified terms and parties.
  provider: ironclad
  endpoint: /api/v2/contracts
  method: POST
  scopes:
    - contract:write
  tags:
    - contracts
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a contract
    properties:
      title:
        type: string
        description: "Contract title"
      counterparty_id:
        type: string
        description: "Counterparty ID"
      template_id:
        type: string
        description: "Template ID to use"
      effective_date:
        type: string
        description: "Contract effective date (ISO 8601)"
      expiration_date:
        type: string
        description: "Contract expiration date (ISO 8601)"
    required:
      - title

- slug: ironclad_update_contract
  name: Update Contract
  description: |
    Update an existing contract's fields, status, or terms.
  provider: ironclad
  endpoint: /api/v2/contracts/{id}
  method: PATCH
  scopes:
    - contract:write
  tags:
    - contracts
    - update
    - write
  input_schema:
    type: object
    description: Parameters for updating a contract
    properties:
      id:
        type: string
        description: "Contract ID"
      title:
        type: string
        description: "Updated contract title"
      status:
        type: string
        description: "Updated status"
      effective_date:
        type: string
        description: "Updated effective date (ISO 8601)"
      expiration_date:
        type: string
        description: "Updated expiration date (ISO 8601)"
    required:
      - id

- slug: ironclad_list_counterparties
  name: List Counterparties
  description: |
    Retrieve a list of all counterparties (organizations you contract with).
  provider: ironclad
  endpoint: /api/v2/counterparties
  method: GET
  scopes:
    - counterparty:read
  tags:
    - counterparties
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing counterparties
    properties:
      search:
        type: string
        description: "Search by counterparty name"
      limit:
        type: integer
        description: "Number of results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
        default: 0
    required: []

- slug: ironclad_get_counterparty
  name: Get Counterparty
