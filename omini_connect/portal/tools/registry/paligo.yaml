# Paligo Tools - Allowlist
# Curated subset of Paligo documentation platform API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. paligo_list_topics               - List topics/documents
# 2. paligo_get_topic                - Get topic details
# 3. paligo_create_topic             - Create topic
# 4. paligo_update_topic             - Update topic
# 5. paligo_list_publications        - List publications
# 6. paligo_get_publication         - Get publication details
# 7. paligo_list_assets             - List assets
# 8. paligo_get_asset               - Get asset details
# 9. paligo_search_content          - Search content
# 10. paligo_get_tree              - Get content tree

- slug: paligo_list_topics
  name: List Topics
  description: |
    List all topics and documents in Paligo.
  provider: paligo
  endpoint: /api/v1/topics
  method: GET
  scopes:
    - topics:read
  tags:
    - docs
    - cms
    - content
  input_schema:
    type: object
    description: Parameters for listing topics
    properties:
      limit:
        type: integer
        description: "Number of topics"
        default: 20
    required: []

- slug: paligo_get_topic
  name: Get Topic
  description: |
    Get detailed information for a specific topic.
  provider: paligo
  endpoint: /api/v1/topics/{id}
  method: GET
  scopes:
    - topics:read
  tags:
    - docs
    - cms
    - read
  input_schema:
    type: object
    description: Parameters for getting a topic
    properties:
      id:
        type: integer
        description: "Topic ID"
    required:
      - id

- slug: paligo_create_topic
  name: Create Topic
  description: |
    Create a new topic in Paligo.
  provider: paligo
  endpoint: /api/v1/topics
  method: POST
  scopes:
    - topics:write
  tags:
    - docs
    - cms
    - create
  input_schema:
    type: object
    description: Parameters for creating a topic
    properties:
      title:
        type: string
        description: "Topic title"
      content:
        type: string
        description: "Topic content (XML)"
      type:
        type: string
        description: "Topic type"
    required:
      - title

- slug: paligo_update_topic
  name: Update Topic
  description: |
    Update an existing topic.
  provider: paligo
  endpoint: /api/v1/topics/{id}
  method: PUT
  scopes:
    - topics:write
  tags:
    - docs
    - cms
    - update
  input_schema:
    type: object
    description: Parameters for updating a topic
    properties:
      id:
        type: integer
        description: "Topic ID"
      title:
        type: string
        description: "Topic title"
      content:
        type: string
        description: "Topic content (XML)"
    required:
      - id

