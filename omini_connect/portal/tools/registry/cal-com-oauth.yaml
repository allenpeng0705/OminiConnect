# Cal.com (OAuth) Tools - Allowlist
# Curated subset of the Cal.com API v2 for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cal_com_list_event_types       - List event types
# 2. cal_com_get_event_type         - Get event type details
# 3. cal_com_list_bookings          - List bookings
# 4. cal_com_get_booking            - Get booking details
# 5. cal_com_create_booking         - Create a booking
# 6. cal_com_cancel_booking          - Cancel a booking
# 7. cal_com_list_users             - List users
# 8. cal_com_get_current_user       - Get current user
# 9. cal_com_list_webhooks          - List webhooks
# 10. cal_com_create_webhook        - Create a webhook

- slug: cal_com_list_event_types
  name: List Event Types
  description: |
    List all event types for the authenticated user or team and return event type IDs, names, and durations.
    Use this to discover available booking options for scheduling.
  provider: cal-com-oauth
  endpoint: /event-types
  method: GET
  scopes: []
  tags:
    - events
    - scheduling
  input_schema:
    type: object
    description: Parameters for listing event types
    properties:
      user:
        type: string
        description: "Username to list event types for"
      team:
        type: string
        description: "Team ID to list event types for"
    required: []

- slug: cal_com_get_event_type
  name: Get Event Type
  description: |
    Get details of a specific event type including duration, description, and booking settings.
    Returns the complete event type configuration for scheduling setup.
  provider: cal-com-oauth
  endpoint: /event-types/{id}
  method: GET
  scopes: []
  tags:
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting an event type
    properties:
      id:
        type: integer
        description: "Event type ID"
    required:
      - id

- slug: cal_com_list_bookings
  name: List Bookings
  description: |
    List all bookings for the authenticated user and return booking IDs, times, event types, and attendees.
    Filter by status (upcoming, past, cancelled) to manage scheduling.
  provider: cal-com-oauth
  endpoint: /bookings
  method: GET
  scopes: []
  tags:
    - bookings
    - scheduling
  input_schema:
    type: object
    description: Parameters for listing bookings
    properties:
      status:
        type: string
        description: "Filter by status: upcoming, past, cancelled"
        enum: [upcoming, past, cancelled]
      user:
        type: string
        description: "Filter by user"
      limit:
        type: integer
        description: "Max results (default 20)"
        default: 20
    required: []

- slug: cal_com_get_booking
  name: Get Booking
  description: |
    Get details of a specific booking including event type, time, attendees, and status.
    Returns the complete booking data for scheduling management and verification.
  provider: cal-com-oauth
  endpoint: /bookings/{id}
  method: GET
  scopes: []
  tags:
    - bookings
    - read
  input_schema:
    type: object
    description: Parameters for getting a booking
    properties:
      id:
        type: integer
        description: "Booking ID"
    required:
      - id

- slug: cal_com_create_booking
  name: Create Booking
  description: |
    Create a new booking for an event type with specified start time and attendee information.
    Returns the created booking ID for confirmation and calendar management.
  provider: cal-com-oauth
  endpoint: /bookings
  method: POST
  scopes: []
  tags:
    - bookings
    - create
  input_schema:
    type: object
    description: Parameters for creating a booking
    properties:
      eventTypeId:
        type: integer
        description: "Event type ID"
      start:
        type: string
        description: "ISO 8601 start time"
      end:
        type: string
        description: "ISO 8601 end time"
      attendees:
        type: array
        items:
          type: object
        description: "Array of attendee email and name objects"
    required:
      - eventTypeId
      - start

- slug: cal_com_cancel_booking
  name: Cancel Booking
  description: |
    Cancel a specific booking by ID and optionally provide a cancellation reason.
    Returns confirmation of the cancellation for scheduling updates.
  provider: cal-com-oauth
  endpoint: /bookings/{id}
  method: DELETE
  scopes: []
  tags:
    - bookings
    - delete
  input_schema:
    type: object
    description: Parameters for cancelling a booking
    properties:
      id:
        type: integer
        description: "Booking ID"
      reason:
        type: string
        description: "Cancellation reason"
    required:
      - id

- slug: cal_com_list_users
  name: List Users
  description: |
    List all users in the Cal.com workspace and return user names, emails, and scheduling availability.
    Use this to find team members for collaborative scheduling.
  provider: cal-com-oauth
  endpoint: /users
  method: GET
  scopes: []
  tags:
    - users
    - team
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: cal_com_get_current_user
  name: Get Current User
  description: |
    Get the currently authenticated user profile including name, email, and scheduling settings.
    Returns the complete user profile for personalization and availability checking.
  provider: cal-com-oauth
  endpoint: /me
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: No parameters
    properties: {}
    required: []

- slug: cal_com_list_webhooks
  name: List Webhooks
  description: |
    List all webhooks for an event type and return webhook IDs, URLs, and subscribed events.
    Use this to discover webhook configurations for event automation.
  provider: cal-com-oauth
  endpoint: /event-types/{id}/webhooks
  method: GET
  scopes: []
  tags:
    - webhooks
    - events
  input_schema:
    type: object
    description: Parameters for listing webhooks
    properties:
      eventTypeId:
        type: integer
        description: "Event type ID"
    required:
      - eventTypeId

- slug: cal_com_create_webhook
  name: Create Webhook
  description: |
    Create a webhook for an event type with specified URL and event subscriptions.
    Returns the created webhook ID for event-driven automation setup.
  provider: cal-com-oauth
  endpoint: /event-types/{id}/webhooks
  method: POST
  scopes: []
  tags:
    - webhooks
    - create
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      eventTypeId:
        type: integer
        description: "Event type ID"
      webhookUrl:
        type: string
        description: "URL to send webhook events to"
      events:
        type: array
        items:
          type: string
        description: "Event types to subscribe to"
    required:
      - eventTypeId
      - webhookUrl
