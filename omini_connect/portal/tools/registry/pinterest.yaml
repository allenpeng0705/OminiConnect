# Pinterest Tools - Allowlist
# Curated subset of the Pinterest API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pinterest_list_pins          - List pins for authenticated user
# 2. pinterest_get_pin             - Get a specific pin by ID
# 3. pinterest_create_pin          - Create a new pin on a board
# 4. pinterest_list_boards         - List boards for authenticated user
# 5. pinterest_get_board           - Get a specific board by ID
# 6. pinterest_create_board       - Create a new board
# 7. pinterest_list_user_pins     - List pins on a specific board
# 8. pinterest_get_user_info      - Get user profile information
# 9. pinterest_search_pins        - Search pins by keyword
# 10. pinterest_list_ads           - List advertising campaigns

- slug: pinterest_list_pins
  name: List Pins
  description: |
    List all pins for the authenticated user including pin IDs, titles, descriptions, image URLs, and board assignments. Returns pin records for content discovery and organization.
  provider: pinterest
  endpoint: /v5/pins
  method: GET
  scopes:
    - pins:read
  tags:
    - pins
    - content
  input_schema:
    type: object
    description: Parameters for listing pins
    properties:
      page_size:
        type: integer
        description: "Number of pins to return (max 100, default 25)"
        default: 25
      bookmark:
        type: string
        description: "Bookmark for pagination"
    required: []

- slug: pinterest_get_pin
  name: Get Pin
  description: |
    Get detailed information for a specific pin including its title, description, images, destination link, and board assignments. Returns pin data for content curation and analysis.
  provider: pinterest
  endpoint: /v5/pins/{pin_id}
  method: GET
  scopes:
    - pins:read
  tags:
    - pins
    - read
  input_schema:
    type: object
    description: Parameters for getting a pin
    properties:
      pin_id:
        type: string
        description: "The unique identifier of the pin"
    required:
      - pin_id

- slug: pinterest_create_pin
  name: Create Pin
  description: |
    Create a new pin on a specified board with an image URL, title, description, and optional destination link. Returns the created pin with its unique identifier for sharing.
  provider: pinterest
  endpoint: /v5/pins
  method: POST
  scopes:
    - pins:write
  tags:
    - pins
    - create
  input_schema:
    type: object
    description: Pin creation parameters
    properties:
      board_id:
        type: string
        description: "Board ID where the pin will be created (required)"
      title:
        type: string
        description: "Pin title (required)"
      description:
        type: string
        description: "Pin description"
      link:
        type: string
        description: "Destination URL when clicking the pin"
      image_url:
        type: string
        description: "URL of the image to pin"
    required:
      - board_id
      - title

- slug: pinterest_list_boards
  name: List Boards
  description: |
    List all boards including their names, descriptions, privacy settings, and pin counts. Returns board listings for content organization and discovery.
  provider: pinterest
  endpoint: /v5/boards
  method: GET
  scopes:
    - boards:read
  tags:
    - boards
    - organization
  input_schema:
    type: object
    description: Parameters for listing boards
    properties:
      page_size:
        type: integer
        description: "Number of boards to return (max 100, default 25)"
        default: 25
      bookmark:
        type: string
        description: "Bookmark for pagination"
    required: []

- slug: pinterest_get_board
  name: Get Board
  description: |
    Get detailed information for a specific board including its name, description, privacy setting, owner, and collaborator list. Returns board data for content curation and collaboration.
  provider: pinterest
  endpoint: /v5/boards/{board_id}
  method: GET
  scopes:
    - boards:read
  tags:
    - boards
    - read
  input_schema:
    type: object
    description: Parameters for getting a board
    properties:
      board_id:
        type: string
        description: "The unique identifier of the board"
    required:
      - board_id

- slug: pinterest_create_board
  name: Create Board
  description: |
    Create a new board with the specified name, optional description, and privacy setting to organize pins into collections. Returns the created board with its unique identifier.
  provider: pinterest
  endpoint: /v5/boards
  method: POST
  scopes:
    - boards:write
  tags:
    - boards
    - create
  input_schema:
    type: object
    description: Board creation parameters
    properties:
      name:
        type: string
        description: "Board name (required)"
      description:
        type: string
        description: "Board description"
      privacy:
        type: string
        description: "Privacy level: public or private"
        enum: [public, private]
        default: public
    required:
      - name

- slug: pinterest_list_user_pins
  name: List User Pins
  description: |
    List all pins on a specific board for a specified owner including pin titles, images, descriptions, and engagement metrics. Returns pin data for board content analysis.
  provider: pinterest
  endpoint: /v5/pins
  method: GET
  scopes:
    - pins:read
  tags:
    - pins
    - boards
  input_schema:
    type: object
    description: Parameters for listing user pins
    properties:
      owner:
        type: string
        description: "Owner ID (user or business)"
      board:
        type: string
        description: "Board ID"
      page_size:
        type: integer
        description: "Number of pins to return (max 100, default 25)"
        default: 25
      bookmark:
        type: string
        description: "Bookmark for pagination"
    required:
      - owner
      - board

- slug: pinterest_get_user_info
  name: Get User Info
  description: |
    Get the authenticated user profile including name, username, profile image, and follower and following counts. Returns user data for profile display and analytics.
  provider: pinterest
  endpoint: /v5/users/me
  method: GET
  scopes:
    - user_accounts:read
  tags:
    - user
    - profile
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: pinterest_search_pins
  name: Search Pins
  description: |
    Search for pins by keyword across the platform and return matching results with titles, images, descriptions, and board information. Returns pin data for content discovery.
  provider: pinterest
  endpoint: /v5/pins/search
  method: GET
  scopes: []
  tags:
    - search
    - pins
    - discovery
  input_schema:
    type: object
    description: Search parameters
    properties:
      query:
        type: string
        description: "Search query (required)"
      page_size:
        type: integer
        description: "Number of results to return (max 100, default 25)"
        default: 25
      bookmark:
        type: string
        description: "Bookmark for pagination"
    required:
      - query

- slug: pinterest_list_ads
  name: List Ads
  description: |
    List all advertising campaigns including campaign names, status values, budget allocations, and performance metrics. Returns ad data for campaign management and analytics.
  provider: pinterest
  endpoint: /v5/ad_accounts/{ad_account_id}/ads
  method: GET
  scopes:
    - ads:read
  tags:
    - ads
    - advertising
  input_schema:
    type: object
    description: Parameters for listing ads
    properties:
      ad_account_id:
        type: string
        description: "Ad Account ID (required)"
      page_size:
        type: integer
        description: "Number of ads to return (max 100, default 25)"
        default: 25
      bookmark:
        type: string
        description: "Bookmark for pagination"
    required:
      - ad_account_id
