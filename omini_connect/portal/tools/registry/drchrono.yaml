# DrChrono Tools - Allowlist
# Curated subset of the DrChrono API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. drchrono_list_patients            - List patients
# 2. drchrono_get_patient             - Get patient details
# 3. drchrono_list_appointments       - List appointments
# 4. drchrono_get_appointment         - Get appointment details
# 5. drchrono_list_calendar_entries   - List calendar entries
# 6. drchrono_get_calendar_entry      - Get calendar entry details
# 7. drchrono_list_insurance          - List insurance providers
# 8. drchrono_get_insurance           - Get insurance details
# 9. drchrono_list_offices           - List offices
# 10. drchrono_get_office           - Get office details

- slug: drchrono_list_patients
  name: List Patients
  description: |
    List all patients in DrChrono.
  provider: drchrono
  endpoint: /api/patients
  method: GET
  scopes: []
  tags:
    - patients
    - healthcare
    - list
  input_schema:
    type: object
    description: Parameters for listing patients
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: drchrono_get_patient
  name: Get Patient
  description: |
    Get details of a specific patient.
  provider: drchrono
  endpoint: /api/patients/{patient_id}
  method: GET
  scopes: []
  tags:
    - patients
    - healthcare
    - read
  input_schema:
    type: object
    description: Parameters for getting a patient
    properties:
      patient_id:
        type: string
        description: "Patient ID"
    required:
      - patient_id

