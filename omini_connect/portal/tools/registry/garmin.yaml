# Garmin Tools - Allowlist
# Curated subset of Garmin Connect API for AI agent use.
# OAUTH1 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. garmin_list_activities       - List activities
# 2. garmin_get_activity          - Get activity details
# 3. garmin_list_sleep_data       - List sleep data
# 4. garmin_list_body_composition - List body composition
# 5. garmin_list_daily_summaries  - List daily summaries
# 6. garmin_list_pulse_ox        - List pulse ox data
# 7. garmin_list_stress          - List stress data
# 8. garmin_list_heart_rate      - List heart rate data
# 9. garmin_list_respiration      - List respiration data
# 10. garmin_list_spO2           - List SpO2 data

- slug: garmin_list_activities
  name: List Activities
  description: |
    List all fitness activities recorded on Garmin Connect. Returns activity IDs, types, dates, durations, distances, and heart rate summaries for each activity.
  provider: garmin
  endpoint: /activitylist-service/activities
  method: GET
  scopes:
    - read
  tags:
    - activities
    - fitness
    - list
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      start:
        type: integer
        description: "Start index"
        default: 0
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: garmin_get_activity
  name: Get Activity
  description: |
    Get detailed information about a specific fitness activity including route map, split times, heart rate zones, power data (if available), and performance metrics.
  provider: garmin
  endpoint: /activitylist-service/activities/{activityId}
  method: GET
  scopes:
    - read
  tags:
    - activities
    - fitness
    - read
  input_schema:
    type: object
    description: Parameters for getting an activity
    properties:
      activityId:
        type: string
        description: "Activity ID"
    required:
      - activityId

- slug: garmin_list_sleep_data
  name: List Sleep Data
  description: |
    List sleep data recorded by Garmin devices within a date range. Returns sleep durations, quality scores, sleep stages (light/deep/REM), and restless moments for each night.
  provider: garmin
  endpoint: /sleep-data-service/sleep
  method: GET
  scopes:
    - read
  tags:
    - sleep
    - health
    - list
  input_schema:
    type: object
    description: Parameters for listing sleep data
    properties:
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []

