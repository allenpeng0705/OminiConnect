    List user's sleep data from Garmin Connect.
  provider: garmin
  endpoint: /sleep-data-service/sleep
  method: GET
  scopes:
    - read
  tags:
    - sleep
    - health
    - list
  input_schema:
    type: object
    description: Parameters for listing sleep data
    properties:
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []

