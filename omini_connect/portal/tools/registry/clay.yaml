- slug: clay_list_tables
  name: List Tables
  description: |
    Retrieve a list of all tables in the Clay workspace.
  provider: clay
  endpoint: /tables
  method: GET
  scopes:
    - tables:read
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      limit:
        type: integer
        description: "Maximum number of tables to return"
    required: []
- slug: clay_get_table
  name: Get Table
  description: |
    Retrieve details of a specific table by ID.
  provider: clay
  endpoint: /tables/{table_id}
  method: GET
  scopes:
    - tables:read
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      table_id:
        type: string
        description: "The unique identifier of the table"
    required:
      - table_id
- slug: clay_add_row
  name: Add Row
  description: |
    Add a new row to a specific table.
  provider: clay
  endpoint: /tables/{table_id}/rows
  method: POST
  scopes:
    - tables:write
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for adding a row
    properties:
      table_id:
        type: string
        description: "The unique identifier of the table"
      data:
        type: object
        description: "The row data to add"
    required:
      - table_id
      - data
- slug: clay_update_row
  name: Update Row
  description: |
    Update an existing row in a specific table.
  provider: clay
  endpoint: /tables/{table_id}/rows/{row_id}
  method: PUT
  scopes:
    - tables:write
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for updating a row
    properties:
      table_id:
        type: string
        description: "The unique identifier of the table"
      row_id:
        type: string
        description: "The unique identifier of the row"
      data:
        type: object
        description: "The row data to update"
    required:
      - table_id
      - row_id
      - data
