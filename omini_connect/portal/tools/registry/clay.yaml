- slug: clay_create_webhook
  name: Create Webhook
  description: |
    Create a new webhook to receive real-time notifications.
  provider: clay
  endpoint: /webhooks
  method: POST
  scopes:
    - webhooks:write
  tags:
    - webhooks
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      url:
        type: string
        description: "The URL to receive webhook notifications"
      events:
        type: array
        items:
          type: string
        description: "List of events to subscribe to"
    required:
      - url
      - events
- slug: clay_list_contacts
