# Lumos Tools - Allowlist
# Curated subset of Lumos API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lumos_list_apps             - List all apps
# 2. lumos_get_app               - Get app details
# 3. lumos_list_users            - List users
# 4. lumos_get_user              - Get user details
# 5. lumos_list_requests         - List access requests
# 6. lumos_get_request           - Get request details
# 7. lumos_approve_request       - Approve access request
# 8. lumos_deny_request           - Deny access request
# 9. lumos_list_systems          - List systems
# 10. lumos_get_system          - Get system details

- slug: lumos_list_apps
  name: List Apps
  description: |
    List all applications in Lumos.
    Shows app name, description, and status.
  provider: lumos
  endpoint: /apps
  method: GET
  scopes: []
  tags:
    - apps
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing apps
    properties:
      status:
        type: string
        description: "Filter by status (active, inactive)"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: lumos_get_app
  name: Get App
  description: |
    Get detailed information about a specific application.
  provider: lumos
  endpoint: /apps/{appId}
  method: GET
  scopes: []
  tags:
    - apps
    - read
  input_schema:
    type: object
    description: Parameters for getting an app
    properties:
      appId:
        type: string
        description: "App ID"
    required:
      - appId

