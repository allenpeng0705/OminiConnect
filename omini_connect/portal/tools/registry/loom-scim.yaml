# Loom SCIM Tools - Allowlist
# Curated subset of Loom SCIM API for AI agent use.
# API_KEY via Nango (SCIM token).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. loom_scim_list_users       - List all users (SCIM)
# 2. loom_scim_get_user         - Get user details (SCIM)
# 3. loom_scim_create_user      - Create a new user (SCIM)
# 4. loom_scim_update_user      - Update a user (SCIM)
# 5. loom_scim_delete_user      - Delete a user (SCIM)
# 6. loom_scim_list_groups      - List all groups (SCIM)
# 7. loom_scim_get_group        - Get group details (SCIM)
# 8. loom_scim_create_group     - Create a group (SCIM)
# 9. loom_scim_update_group     - Update a group (SCIM)
# 10. loom_scim_delete_group    - Delete a group (SCIM)

- slug: loom_scim_list_users
  name: List Users (SCIM)
  description: |
    List all user accounts in Loom via SCIM API.
    Supports filtering by attributes.
  provider: loom-scim
  endpoint: /Users
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM users
    properties:
      filter:
        type: string
        description: "Filter expression (e.g., userName eq 'john@example.com')"
      startIndex:
        type: integer
        description: "Starting index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results to return"
        default: 100
    required: []

- slug: loom_scim_get_user
  name: Get User (SCIM)
  description: |
    Get detailed information about a specific user via SCIM API.
  provider: loom-scim
  endpoint: /Users/{id}
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

- slug: loom_scim_create_user
  name: Create User (SCIM)
  description: |
    Create a new user account in Loom via SCIM API.
  provider: loom-scim
  endpoint: /Users
  method: POST
  scopes: []
  tags:
    - scim
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      emails:
        type: array
        description: "Email addresses"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName

- slug: loom_scim_update_user
  name: Update User (SCIM)
  description: |
    Update an existing user account via SCIM API.
  provider: loom-scim
  endpoint: /Users/{id}
  method: PUT
  scopes: []
  tags:
    - scim
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      active:
        type: boolean
        description: "Whether user is active"
    required:
      - id

- slug: loom_scim_delete_user
  name: Delete User (SCIM)
  description: |
    Delete a user account via SCIM API.
  provider: loom-scim
  endpoint: /Users/{id}
  method: DELETE
  scopes: []
  tags:
    - scim
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

