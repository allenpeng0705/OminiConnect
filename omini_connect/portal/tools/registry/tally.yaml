# Tally Tools - Allowlist
# Curated subset of Tally API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tally_list_forms           - List all forms in your Tally account
# # 2. tally_get_form           - Get details of a specific form
# # 3. tally_get_form_schema           - Get the schema/fields of a form
# # 4. tally_list_submissions           - List all submissions for a form
# # 5. tally_get_submission           - Get a specific submission
# # 6. tally_create_form           - Create a new form
# # 7. tally_update_form           - Update an existing form
# # 8. tally_delete_form           - Delete a form
# # 9. tally_calculate_form           - Calculate form metrics
# # 10. tally_list_webhooks           - List webhooks for a form

- slug: tally_list_forms
  name: List Forms
  description: |
    List all forms in your Tally account
  provider: tally
  endpoint: /forms
  method: GET
  scopes:
    - forms:read
  tags:
    - tally
  input_schema:
    type: object
    description: Parameters for list forms
    properties: {}
    required: []

- slug: tally_get_form
  name: Get Form
  description: |
    Get details of a specific form
  provider: tally
  endpoint: /forms/{form_id}
  method: GET
  scopes:
    - forms:read
  tags:
    - tally
  input_schema:
    type: object
    description: Parameters for get form
    properties: {}
    required: []

- slug: tally_get_form_schema
  name: Get Form Schema
