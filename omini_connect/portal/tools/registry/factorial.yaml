- slug: factorial_list_positions
  name: List Positions
  description: |
    List all positions and job titles in the Factorial organization with position names, associated departments, and employment type for each role.
  provider: factorial
  endpoint: /api/v1/positions
  method: GET
  scopes: []
  tags:
    - positions
    - organization
    - read
  input_schema:
    type: object
    description: Parameters for listing positions
    properties: {}
    required: []

- slug: factorial_list_companies
  name: List Companies
  description: |
    List all companies in the Factorial account with names, tax IDs, locations, employee counts, and subscription status for each company.
  provider: factorial
  endpoint: /api/v1/companies
  method: GET
  scopes: []
  tags:
    - companies
    - organization
    - read
