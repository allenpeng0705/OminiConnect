- slug: factorial_list_contracts
  name: List Contracts
  description: |
    List all employment contracts in Factorial with optional filtering by employee. Returns contract types, start dates, end dates, and salary information.
  provider: factorial
  endpoint: /api/v1/contracts
  method: GET
  scopes: []
  tags:
    - contracts
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing contracts
    properties:
      employee_id:
        type: string
        description: "Filter by employee ID"
    required: []

- slug: factorial_list_attendances
  name: List Attendances
  description: |
    List attendance records in Factorial with optional filtering by employee or date range. Returns check-in times, check-out times, total hours, and overtime for each day.
  provider: factorial
  endpoint: /api/v1/attendances
  method: GET
  scopes: []
  tags:
    - attendances
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing attendances
    properties:
      employee_id:
        type: string
        description: "Filter by employee ID"
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []
