    required: []

- slug: factorial_get_company
  name: Get Company
  description: |
    Retrieve detailed information about a specific Factorial company including address, tax information, settings, department structure, and subscription details.
  provider: factorial
  endpoint: /api/v1/companies/{id}
  method: GET
  scopes: []
  tags:
    - companies
    - organization
    - read
  input_schema:
    type: object
    description: Parameters for getting company
