  description: |
    List all departments in the Factorial organization with names, manager assignments, employee counts, and budget information for each department.
  provider: factorial
  endpoint: /api/v1/departments
  method: GET
  scopes: []
  tags:
    - departments
    - organization
    - read
  input_schema:
    type: object
    description: Parameters for listing departments
    properties: {}
