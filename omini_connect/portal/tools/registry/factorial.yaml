# Factorial Tools - Allowlist
# Curated subset of Factorial HR API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. factorial_list_employees         - List employees
# 2. factorial_get_employee         - Get employee details
# 3. factorial_list_leaves          - List leave requests
# 4. factorial_get_leave           - Get leave details
# 5. factorial_list_departments    - List departments
# 6. factorial_list_positions      - List positions
# 7. factorial_list_companies       - List companies
# 8. factorial_get_company         - Get company details
# 9. factorial_list_contracts      - List contracts
# 10. factorial_list_attendances  - List attendances

- slug: factorial_list_employees
  name: List Employees
  description: |
    List all employees in the Factorial organization with names, emails, departments, positions, and employment status for each employee.
  provider: factorial
  endpoint: /api/v1/employees
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: factorial_get_employee
  name: Get Employee
  description: |
    Retrieve detailed information about a specific Factorial employee including contact details, department, position, start date, manager, and emergency contacts.
  provider: factorial
  endpoint: /api/v1/employees/{id}
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting employee
    properties:
      id:
        type: string
        description: "Employee ID"
    required:
      - id

- slug: factorial_list_leaves
  name: List Leaves
  description: |
    List all leave requests in Factorial with optional filtering by status or employee. Returns leave types, dates, status, employee names, and approver information.
  provider: factorial
  endpoint: /api/v1/leaves
  method: GET
  scopes: []
  tags:
    - leaves
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing leaves
    properties:
      status:
        type: string
        description: "Filter by status (pending, approved, rejected)"
      employee_id:
        type: string
        description: "Filter by employee ID"
    required: []

- slug: factorial_get_leave
  name: Get Leave
  description: |
    Retrieve detailed information about a specific Factorial leave request including leave type, dates, status, approver comments, and employee details.
  provider: factorial
  endpoint: /api/v1/leaves/{id}
  method: GET
  scopes: []
  tags:
    - leaves
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting leave
    properties:
      id:
        type: string
        description: "Leave ID"
    required:
      - id

