    - tiktok
  input_schema:
    type: object
    description: Parameters for listing ads
    properties:
      advertiser_id:
        type: string
        description: "Advertiser account ID"
      adgroup_id:
        type: string
        description: "Filter by ad group ID"
      status:
        type: string
        description: "Filter by ad status"
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - advertiser_id

- slug: bytedance_get_ad
  name: Get Ad
  description: |
    Get detailed information about a specific ad including creative assets, targeting, and metrics.
    Returns the complete ad data for performance analysis and creative testing.
  provider: bytedance
  endpoint: /ad/get
  method: GET
  scopes:
    - advertiser:read
  tags:
    - advertising
    - ads
    - tiktok
  input_schema:
    type: object
    description: Parameters for getting an ad
    properties:
      advertiser_id:
        type: string
        description: "Advertiser account ID"
      ad_id:
        type: string
        description: "Ad ID to retrieve"
    required:
