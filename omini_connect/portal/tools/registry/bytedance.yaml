- slug: bytedance_get_campaign_report
  name: Get Campaign Report
  description: |
    Get performance report for a specific campaign including impressions, clicks, spend, and conversions.
    Returns aggregated metrics for campaign effectiveness analysis and ROI calculation.
  provider: bytedance
  endpoint: /reports/get
  method: GET
  scopes:
    - reports:read
  tags:
    - reporting
    - analytics
    - tiktok
  input_schema:
    type: object
    description: Parameters for getting campaign report
    properties:
      advertiser_id:
        type: string
        description: "Advertiser account ID"
      campaign_id:
        type: string
        description: "Campaign ID to get report for"
      level:
        type: string
        description: "Report granularity level"
        enum: [CAMPAIGN, ADGROUP, AD]
        default: CAMPAIGN
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD format)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD format)"
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - advertiser_id
      - campaign_id
      - start_date
      - end_date

- slug: bytedance_list_audiences
  name: List Audiences
  description: |
    List custom audiences in TikTok Ads and return audience IDs, names, types, and sizes.
    Audiences can be based on user interactions, customer lists, or lookalike profiles for targeting.
  provider: bytedance
  endpoint: /audience/list
  method: GET
  scopes:
    - audience:read
  tags:
    - advertising
    - audiences
    - targeting
    - tiktok
  input_schema:
    type: object
    description: Parameters for listing audiences
    properties:
      advertiser_id:
        type: string
        description: "Advertiser account ID"
      audience_type:
        type: string
        description: "Filter by audience type"
        enum: [CUSTOM, LOOKALIKE, ENGAGEMENT, VIDEO_VIEW, WEB_VISITOR]
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - advertiser_id
