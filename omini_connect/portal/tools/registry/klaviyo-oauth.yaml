# Klaviyo OAuth Tools - Allowlist
# Curated subset of Klaviyo API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. klaviyo_list_profiles        - List profiles
# 2. klaviyo_get_profile         - Get profile details
# 3. klaviyo_create_profile      - Create a profile
# 4. klaviyo_update_profile      - Update a profile
# 5. klaviyo_list_lists          - List lists
# 6. klaviyo_get_list           - Get list details
# 7. klaviyo_list_campaigns     - List campaigns
# 8. klaviyo_get_campaign       - Get campaign details
# 9. klaviyo_list_metrics       - List metrics
# 10. klaviyo_get_metrics_event - Get metrics event

- slug: klaviyo_list_profiles
  name: List Profiles
  description: |
    List all customer profiles in your Klaviyo account with pagination. Returns profile IDs, email addresses, names, phone numbers, and custom properties for each profile.
  provider: klaviyo-oauth
  endpoint: /api/profiles/
  method: GET
  scopes: []
  tags:
    - profiles
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing profiles
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: klaviyo_get_profile
  name: Get Profile
  description: |
    Retrieve details about a specific Klaviyo profile by its ID. Returns all profile attributes including email, phone, name, location, and subscription status with consent timestamps.
  provider: klaviyo-oauth
  endpoint: /api/profiles/{profile_id}
  method: GET
  scopes: []
  tags:
    - profiles
    - read
  input_schema:
    type: object
    description: Parameters for getting a profile
    properties:
      profile_id:
        type: string
        description: "Profile ID"
    required:
      - profile_id

- slug: klaviyo_create_profile
  name: Create Profile
  description: |
    Create a new customer profile in Klaviyo with specified attributes. Returns the created profile including its unique ID and assigned properties.
  provider: klaviyo-oauth
  endpoint: /api/profiles/
  method: POST
  scopes: []
  tags:
    - profiles
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a profile
    properties:
      email:
        type: string
        description: "Email address"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      properties:
        type: object
        description: "Additional properties"
    required:
      - email

- slug: klaviyo_update_profile
  name: Update Profile
  description: |
    Update an existing Klaviyo profile with new attribute values. Returns the updated profile confirming all modified properties have been changed.
  provider: klaviyo-oauth
  endpoint: /api/profiles/{profile_id}
  method: PUT
  scopes: []
  tags:
    - profiles
    - update
    - write
  input_schema:
    type: object
    description: Parameters for updating a profile
    properties:
      profile_id:
        type: string
        description: "Profile ID"
      properties:
        type: object
        description: "Properties to update"
    required:
      - profile_id

- slug: klaviyo_list_lists
  name: List Lists
  description: |
    List all static lists in your Klaviyo account for targeted email campaigns. Returns list names, IDs, descriptions, and subscriber counts for each list.
  provider: klaviyo-oauth
  endpoint: /api/lists/
  method: GET
  scopes: []
  tags:
    - lists
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing lists
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: klaviyo_get_list
  name: Get List
  description: |
    Retrieve details about a specific Klaviyo list by its ID. Returns the list name, description, subscriber count, and creation timestamp.
  provider: klaviyo-oauth
  endpoint: /api/lists/{list_id}
  method: GET
  scopes: []
  tags:
    - lists
    - read
  input_schema:
    type: object
    description: Parameters for getting a list
    properties:
      list_id:
        type: string
        description: "List ID"
    required:
      - list_id

- slug: klaviyo_list_campaigns
  name: List Campaigns
  description: |
    List all email and SMS campaigns in your Klaviyo account. Returns campaign names, IDs, statuses, scheduled times, and send statistics for each campaign.
  provider: klaviyo-oauth
  endpoint: /api/campaigns/
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: klaviyo_get_campaign
  name: Get Campaign
  description: |
    Retrieve details about a specific Klaviyo campaign by its ID. Returns the campaign subject, content preview, recipient count, and delivery status with timestamps.
  provider: klaviyo-oauth
  endpoint: /api/campaigns/{campaign_id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
    required:
      - campaign_id

- slug: klaviyo_list_metrics
  name: List Metrics
  description: |
    List all available metrics in Klaviyo for tracking customer engagement. Returns metric names, IDs, and descriptions for analytics events like opens, clicks, and conversions.
  provider: klaviyo-oauth
  endpoint: /api/metrics/
  method: GET
  scopes: []
  tags:
    - metrics
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing metrics
    properties: {}
    required: []

- slug: klaviyo_get_metrics_event
  name: Get Metrics Event
  description: |
    Retrieve details about a specific Klaviyo metrics event by its ID. Returns the event name, associated data schema, and timestamp information for the analytics event.
  provider: klaviyo-oauth
  endpoint: /api/metrics/{metric_id}
  method: GET
  scopes: []
  tags:
    - metrics
    - read
  input_schema:
    type: object
    description: Parameters for getting a metrics event
    properties:
      metric_id:
        type: string
        description: "Metric ID"
    required:
      - metric_id
