# HighLevel Tools - Allowlist
# Curated subset of HighLevel API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. highlevel_list_contacts      - List contacts
# 2. highlevel_get_contact         - Get contact details
# 3. highlevel_list_opportunities - List opportunities
# 4. highlevel_get_opportunity     - Get opportunity details
# 5. highlevel_list_tasks         - List tasks
# 6. highlevel_get_task            - Get task details
# 7. highlevel_list_appointments  - List appointments
# 8. highlevel_get_appointment     - Get appointment details
# 9. highlevel_list_campaigns     - List campaigns
# 10. highlevel_list_forms         - List forms

- slug: highlevel_list_contacts
  name: List Contacts
  description: |
    List all contacts in HighLevel.
    Returns contact details including name, email, and status.
  provider: highlevel
  endpoint: /contacts
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - list
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: highlevel_get_contact
  name: Get Contact
  description: |
    Get detailed information about a specific contact.
    Includes contact profile, tags, and pipeline.
  provider: highlevel
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

