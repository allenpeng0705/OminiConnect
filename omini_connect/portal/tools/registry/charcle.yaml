- slug: charcle_list_campaigns
  name: List Campaigns
  description: |
    Retrieve a list of all marketing campaigns.
  provider: charcle
  endpoint: /campaigns
  method: GET
  scopes:
    - campaigns:read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter campaigns by status"
      type:
        type: string
        description: "Filter campaigns by type (e.g., email, sms)"
    required: []

- slug: charcle_get_campaign
  name: Get Campaign
  description: |
    Retrieve details of a specific campaign by ID.
  provider: charcle
  endpoint: /campaigns/{campaign_id}
  method: GET
  scopes:
    - campaigns:read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaign_id:
        type: string
        description: "The unique identifier of the campaign"
    required:
      - campaign_id

- slug: charcle_send_message
  name: Send Message
  description: |
    Send a message to customers through a campaign.
  provider: charcle
  endpoint: /messages
  method: POST
  scopes:
    - messages:write
  tags:
    - messages
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      campaign_id:
        type: string
        description: "The campaign ID to send the message through"
      customer_ids:
        type: array
        items:
          type: string
        description: "Array of customer IDs to send the message to"
      content:
        type: string
        description: "The message content"
      channel:
        type: string
        description: "The channel to send through (e.g., email, sms)"
    required:
      - campaign_id
      - customer_ids
      - content

- slug: charcle_get_message_status
  name: Get Message Status
  description: |
    Retrieve the delivery status of a sent message.
  provider: charcle
  endpoint: /messages/{message_id}
  method: GET
  scopes:
    - messages:read
  tags:
    - messages
  input_schema:
    type: object
    description: Parameters for getting message status
    properties:
      message_id:
        type: string
        description: "The unique identifier of the message"
    required:
      - message_id
