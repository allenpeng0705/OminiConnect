- slug: charcle_get_segment
  name: Get Segment
  description: |
    Retrieve details of a specific segment by ID.
  provider: charcle
  endpoint: /segments/{segment_id}
  method: GET
  scopes:
    - segments:read
  tags:
    - segments
  input_schema:
    type: object
