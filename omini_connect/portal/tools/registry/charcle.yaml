- slug: charcle_list_customers
  name: List Customers
  description: |
    Retrieve a list of all customers in the engagement platform.
  provider: charcle
  endpoint: /customers
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      segment_id:
        type: string
        description: "Filter customers by segment ID"
      status:
        type: string
        description: "Filter customers by status (e.g., active, inactive)"
    required: []

- slug: charcle_get_customer
  name: Get Customer
  description: |
    Retrieve details of a specific customer by ID.
  provider: charcle
  endpoint: /customers/{customer_id}
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: string
        description: "The unique identifier of the customer"
    required:
      - customer_id

- slug: charcle_create_customer
  name: Create Customer
  description: |
    Create a new customer in the engagement platform.
  provider: charcle
  endpoint: /customers
  method: POST
  scopes:
    - customers:write
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for creating a customer
    properties:
      name:
        type: string
        description: "The name of the customer"
      email:
        type: string
        description: "The email address of the customer"
      phone:
        type: string
        description: "The phone number of the customer"
      segment_id:
        type: string
        description: "The segment ID to assign the customer to"
    required:
      - name
      - email

- slug: charcle_list_segments
  name: List Segments
