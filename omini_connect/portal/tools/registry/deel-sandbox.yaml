# Deel Sandbox Tools - Allowlist
# Curated subset of the Deel API for AI agent use.
# OAuth2 via Nango (Sandbox environment).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. deel_sandbox_list_contracts         - List contracts
# 2. deel_sandbox_get_contract          - Get contract details
# 3. deem_sandbox_list_employees        - List employees/contractors
# 4. deem_sandbox_get_employee         - Get employee details
# 5. deem_sandbox_list_payments         - List payments
# 6. deem_sandbox_get_payment          - Get payment details
# 7. deem_sandbox_list_invoices         - List invoices
# 8. deem_sandbox_get_invoice          - Get invoice details
# 9. deem_sandbox_list_time_off        - List time off requests
# 10. deem_sandbox_get_time_off        - Get time off details

- slug: deel_sandbox_list_contracts
  name: List Contracts
  description: |
    List all contracts in Deel sandbox.
  provider: deel-sandbox
  endpoint: /v1/contracts
  method: GET
  scopes: []
  tags:
    - contracts
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing contracts
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      status:
        type: string
        description: "Filter by status: active, ended, draft"
    required: []

- slug: deel_sandbox_get_contract
  name: Get Contract
  description: |
    Get details of a specific contract.
  provider: deel-sandbox
  endpoint: /v1/contracts/{contract_id}
  method: GET
  scopes: []
  tags:
    - contracts
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting a contract
    properties:
      contract_id:
        type: string
        description: "Contract ID"
    required:
      - contract_id

