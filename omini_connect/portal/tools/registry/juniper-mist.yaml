# Juniper Mist Tools - Allowlist
# Curated subset of Juniper Mist API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. juniper_mist_get_self       - Get current user
# 2. juniper_mist_list_sites     - List sites
# 3. juniper_mist_get_site      - Get site details
# 4. juniper_mist_list_devices  - List devices
# 5. juniper_mist_get_device   - Get device details
# 6. juniper_mist_list_networks - List networks
# 7. juniper_mist_get_network  - Get network details
# 8. juniper_mist_list_alerts   - List alerts
# 9. juniper_mist_list_clients  - List clients
# 10. juniper_mist_get_client   - Get client details

- slug: juniper_mist_get_self
  name: Get Current User
  description: |
    Get the current authenticated user.
  provider: juniper-mist
  endpoint: /api/v1/self
  method: GET
  scopes: []
  tags:
    - users
    - read
    - auth
  input_schema:
    type: object
    description: Parameters for getting current user
    properties: {}
    required: []

- slug: juniper_mist_list_sites
  name: List Sites
  description: |
    List all sites in the organization.
  provider: juniper-mist
  endpoint: /api/v1/sites
  method: GET
  scopes: []
  tags:
    - sites
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing sites
    properties: {}
    required: []

- slug: juniper_mist_get_site
  name: Get Site
  description: |
    Get details for a specific site.
  provider: juniper-mist
  endpoint: /api/v1/sites/{site_id}
  method: GET
  scopes: []
  tags:
    - sites
    - read
  input_schema:
    type: object
    description: Parameters for getting a site
    properties:
      site_id:
        type: string
        description: "Site ID"
    required:
      - site_id

