# Jobber Tools - Allowlist
# Curated subset of Jobber API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jobber_list_clients       - List clients
# 2. jobber_get_client         - Get client details
# 3. jobber_list_jobs         - List jobs
# 4. jobber_get_job           - Get job details
# 5. jobber_list_quotes       - List quotes
# 6. jobber_get_quote         - Get quote details
# 7. jobber_list_invoices     - List invoices
# 8. jobber_get_invoice       - Get invoice details
# 9. jobber_list_visits       - List visits
# 10. jobber_get_visit        - Get visit details

- slug: jobber_list_clients
  name: List Clients
  description: |
    List all clients in Jobber. Returns client names, contact information, and addresses for field service management.
  provider: jobber
  endpoint: /graphql
  method: POST
  scopes: []
  tags:
    - clients
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      first:
        type: integer
        description: "Number of results"
        default: 20
      after:
        type: string
        description: "Cursor for pagination"
    required: []

- slug: jobber_get_client
  name: Get Client
  description: |
    Retrieve details about a specific client by their ID. Includes contact information, address, and job history.
  provider: jobber
  endpoint: /graphql
  method: POST
  scopes: []
  tags:
    - clients
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      client_id:
        type: string
        description: "Client ID"
    required:
      - client_id

- slug: jobber_list_jobs
  name: List Jobs
  description: |
    List all jobs in Jobber. Filter by status and return job details, client association, and scheduling information.
  provider: jobber
  endpoint: /graphql
  method: POST
  scopes: []
  tags:
    - jobs
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Job status filter"
      first:
        type: integer
        description: "Number of results"
        default: 20
    required: []

