# Zorus Tools - Allowlist
# Curated subset of Zorus API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zorus_list_tenants           - List all managed tenants
# # 2. zorus_get_tenant           - Get tenant details
# # 3. zorus_list_devices           - List all devices
# # 4. zorus_get_device           - Get device details
# # 5. zorus_list_software           - List installed software
# # 6. zorus_list_tickets           - List all tickets
# # 7. zorus_create_ticket           - Create a new ticket
# # 8. zorus_list_alerts           - List all alerts
# # 9. zorus_acknowledge_alert           - Acknowledge an alert
# # 10. zorus_list_users           - List all users

- slug: zorus_list_tenants
  name: List Tenants
  description: |
    List all managed tenants
  provider: zorus
  endpoint: /api/v1/tenants
  method: GET
  scopes:
    - read
  tags:
    - zorus
  input_schema:
    type: object
    description: Parameters for list tenants
    properties: {}
    required: []

- slug: zorus_get_tenant
  name: Get Tenant
  description: |
    Get tenant details
  provider: zorus
  endpoint: /api/v1/tenants/{id}
  method: GET
  scopes:
    - read
  tags:
    - zorus
  input_schema:
    type: object
    description: Parameters for get tenant
    properties: {}
    required: []

