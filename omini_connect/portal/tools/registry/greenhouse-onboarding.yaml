# Greenhouse Onboarding Tools - Allowlist
# Curated subset of Greenhouse Onboarding API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. greenhouse_onboarding_list_employees  - List onboarding employees
# 2. greenhouse_onboarding_get_employee    - Get onboarding employee
# 3. greenhouse_onboarding_list_tasks      - List onboarding tasks
# 4. greenhouse_onboarding_get_task        - Get task details
# 5. greenhouse_onboarding_list_forms      - List onboarding forms
# 6. greenhouse_onboarding_get_form        - Get form details
# 7. greenhouse_onboarding_list_groups     - List onboarding groups
# 8. greenhouse_onboarding_get_group       - Get group details
# 9. greenhouse_onboarding_list_documents  - List documents
# 10. greenhouse_onboarding_get_document    - Get document details

- slug: greenhouse_onboarding_list_employees
  name: List Onboarding Employees
  description: |
    List all employees in the onboarding process.
    Returns employee details including name and onboarding status.
  provider: greenhouse-onboarding
  endpoint: /employees
  method: GET
  scopes:
    - read
  tags:
    - employees
    - list
    - onboarding
  input_schema:
    type: object
    description: Parameters for listing onboarding employees
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: greenhouse_onboarding_get_employee
  name: Get Onboarding Employee
  description: |
    Get detailed information about an onboarding employee.
    Includes onboarding tasks, forms, and progress.
  provider: greenhouse-onboarding
  endpoint: /employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - employees
    - read
    - onboarding
  input_schema:
    type: object
    description: Parameters for getting an onboarding employee
    properties:
      id:
        type: integer
        description: "Employee ID"
    required:
      - id

- slug: greenhouse_onboarding_list_tasks
  name: List Onboarding Tasks
  description: |
