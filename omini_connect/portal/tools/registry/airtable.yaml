# Airtable Tools - Allowlist
# Curated subset of Airtable REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. airtable_list_bases       - List all bases
# 2. airtable_get_base         - Get base details
# 3. airtable_list_tables      - List tables in a base
# 4. airtable_get_table        - Get table schema
# 5. airtable_list_records     - List records in a table
# 6. airtable_get_record       - Get a single record
# 7. airtable_create_record    - Create a new record
# 8. airtable_update_record    - Update a record
# 9. airtable_list_fields      - List fields in a table
# 10. airtable_get_field       - Get field details

- slug: airtable_list_bases
  name: List Bases
  description: |
    List all Airtable bases accessible to the authenticated user. Returns base IDs, names, and permission settings for each base.
    Use this to discover available bases for data access and management.
  provider: airtable
  endpoint: /v0/meta/bases
  method: GET
  scopes:
    - data.records:read
  tags:
    - bases
    - list
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: airtable_get_base
  name: Get Base
  description: |
    Get metadata for a specific Airtable base by its ID. Returns the base name, description, and table information.
    This provides a complete overview of the base structure and contents.
  provider: airtable
  endpoint: /v0/meta/bases/{baseId}
  method: GET
  scopes:
    - data.records:read
  tags:
    - bases
    - read
  input_schema:
    type: object
    description: Parameters for getting a base
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
    required:
      - baseId

- slug: airtable_list_tables
  name: List Tables
  description: |
    List all tables in a specific Airtable base. Returns table IDs, names, and field counts for each table.
    Use this to explore the structure of a base before reading or writing records.
  provider: airtable
  endpoint: /v0/meta/bases/{baseId}/tables
  method: GET
  scopes:
    - data.records:read
  tags:
    - tables
    - list
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
    required:
      - baseId

- slug: airtable_get_table
  name: Get Table
  description: |
    Get metadata for a specific table in an Airtable base. Returns the table name, field definitions, and view information.
    This helps understand the schema before querying or modifying records.
  provider: airtable
  endpoint: /v0/meta/bases/{baseId}/tables/{tableId}
  method: GET
  scopes:
    - data.records:read
  tags:
    - tables
    - read
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID"
    required:
      - baseId
      - tableId

- slug: airtable_list_records
  name: List Records
  description: |
    List records from a specific Airtable table with pagination support. Returns record IDs, field values, and created timestamps.
    Filter, sort, and select specific fields to customize results for your needs.
  provider: airtable
  endpoint: /v0/{baseId}/{tableId}
  method: GET
  scopes:
    - data.records:read
  tags:
    - records
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing records
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID or name"
      pageSize:
        type: integer
        description: "Number of records per page (max 100)"
      offset:
        type: string
        description: "Pagination offset token"
      filterByFormula:
        type: string
        description: "Filter formula"
      fields:
        type: array
        description: "Fields to include"
    required:
      - baseId
      - tableId

- slug: airtable_get_record
  name: Get Record
  description: |
    Get a single record from a specific Airtable table by its ID. Returns all field values and metadata for the record.
    Use this to retrieve complete details of a specific record.
  provider: airtable
  endpoint: /v0/{baseId}/{tableId}/{recordId}
  method: GET
  scopes:
    - data.records:read
  tags:
    - records
    - read
  input_schema:
    type: object
    description: Parameters for getting a record
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID or name"
      recordId:
        type: string
        description: "The record ID"
    required:
      - baseId
      - tableId
      - recordId

- slug: airtable_create_record
  name: Create Record
  description: |
    Create a new record in a specific Airtable table with field values. Returns the created record with its unique ID.
    This enables adding new data entries to your Airtable base.
  provider: airtable
  endpoint: /v0/{baseId}/{tableId}
  method: POST
  scopes:
    - data.records:write
  tags:
    - records
    - create
  input_schema:
    type: object
    description: Parameters for creating a record
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID or name"
      fields:
        type: object
        description: "Record field values (key-value pairs)"
    required:
      - baseId
      - tableId
      - fields

- slug: airtable_update_record
  name: Update Record
  description: |
    Update specific fields of an existing record in an Airtable table. Returns the updated record confirming the changes.
    This modifies existing data while preserving unspecified fields.
  provider: airtable
  endpoint: /v0/{baseId}/{tableId}/{recordId}
  method: PATCH
  scopes:
    - data.records:write
  tags:
    - records
    - update
  input_schema:
    type: object
    description: Parameters for updating a record
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID or name"
      recordId:
        type: string
        description: "The record ID"
      fields:
        type: object
        description: "Fields to update (key-value pairs)"
    required:
      - baseId
      - tableId
      - recordId
      - fields

- slug: airtable_list_fields
  name: List Fields
  description: |
    List all field definitions for a specific Airtable table. Returns field IDs, names, types, and options for each field.
    Use this to understand the data structure before querying records.
  provider: airtable
  endpoint: /v0/meta/bases/{baseId}/tables/{tableId}/fields
  method: GET
  scopes:
    - data.records:read
  tags:
    - fields
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing fields
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID"
    required:
      - baseId
      - tableId

- slug: airtable_get_field
  name: Get Field
  description: |
    Get metadata for a specific field in an Airtable table. Returns the field name, type, options, and description.
    This provides detailed schema information for a specific column.
  provider: airtable
  endpoint: /v0/meta/bases/{baseId}/tables/{tableId}/fields/{fieldId}
  method: GET
  scopes:
    - data.records:read
  tags:
    - fields
    - read
  input_schema:
    type: object
    description: Parameters for getting a field
    properties:
      baseId:
        type: string
        description: "The Airtable base ID"
      tableId:
        type: string
        description: "The table ID"
      fieldId:
        type: string
        description: "The field ID"
    required:
      - baseId
      - tableId
      - fieldId