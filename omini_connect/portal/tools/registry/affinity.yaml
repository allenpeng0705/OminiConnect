  provider: affinity
  endpoint: /organizations/{organization_id}
  method: GET
  scopes:
    - organizations:read
  tags:
    - organizations
    - relationship intelligence
    - read
  input_schema:
    type: object
    description: Parameters for getting an organization
    properties:
