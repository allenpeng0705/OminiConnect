- slug: affinity_get_opportunity
  name: Get Opportunity
  description: |
    Retrieve details of a specific opportunity by ID.
  provider: affinity
  endpoint: /opportunities/{opportunity_id}
  method: GET
  scopes:
    - opportunities:read
  tags:
    - opportunities
    - relationship intelligence
    - read
  input_schema:
    type: object
    description: Parameters for getting an opportunity
    properties:
      opportunity_id:
        type: string
        description: "The unique identifier of the opportunity"
    required:
