- slug: affinity_create_opportunity
  name: Create Opportunity
  description: |
    Create a new opportunity (deal) in the pipeline.
  provider: affinity
  endpoint: /opportunities
  method: POST
  scopes:
    - opportunities:write
  tags:
    - opportunities
    - relationship intelligence
    - write
  input_schema:
    type: object
    description: Parameters for creating an opportunity
    properties:
      name:
        type: string
        description: "The name of the opportunity"
      value:
        type: number
        description: "The monetary value of the opportunity"
      organization_id:
        type: string
        description: "The organization ID associated with the opportunity"
      stage:
        type: string
        description: "The pipeline stage of the opportunity"
    required:
      - name
      - organization_id

