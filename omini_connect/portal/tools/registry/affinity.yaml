    - read
  input_schema:
    type: object
    description: Parameters for listing organizations
    properties:
      name:
        type: string
        description: "Search organizations by name"
      industry:
        type: string
        description: "Filter organizations by industry"
    required: []

- slug: affinity_get_organization
  name: Get Organization
  description: |
