- slug: walkme_list_users
  name: List Users
  description: |
    List all users in your WalkMe system.
  provider: walkme
  endpoint: /api/v1/users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page_size:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
    required: []

