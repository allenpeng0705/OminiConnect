# WalkMe Tools - Allowlist
# Curated subset of WalkMe REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. walkme_list_guides       - List all guides
# 2. walkme_get_guide         - Get guide details
# 3. walkme_create_guide      - Create a new guide
# 4. walkme_list_steps        - List steps in a guide
# 5. walkme_get_step          - Get step details
# 6. walkme_list_users        - List users
# 7. walkme_get_user          - Get user details
# 8. walkme_get_analytics     - Get analytics data
# 9. walkme_list_campaigns    - List campaigns
# 10. walkme_get_campaign     - Get campaign details

- slug: walkme_list_guides
  name: List Guides
  description: |
    List all guides in your WalkMe system.
  provider: walkme
  endpoint: /api/v1/guides
  method: GET
  scopes:
    - guides:read
  tags:
    - guides
    - list
  input_schema:
    type: object
    description: Parameters for listing guides
    properties:
      status:
        type: string
        description: "Filter by status (active, archived, draft)"
      category_id:
        type: string
        description: "Filter by category ID"
    required: []

- slug: walkme_get_guide
  name: Get Guide
  description: |
    Get detailed information about a specific guide.
  provider: walkme
  endpoint: /api/v1/guides/{guideId}
  method: GET
  scopes:
    - guides:read
  tags:
    - guides
    - read
  input_schema:
    type: object
    description: Parameters for getting a guide
    properties:
      guideId:
        type: string
        description: "Guide ID"
    required:
      - guideId

- slug: walkme_create_guide
  name: Create Guide
  description: |
    Create a new guide in WalkMe.
  provider: walkme
  endpoint: /api/v1/guides
  method: POST
  scopes:
    - guides:write
  tags:
    - guides
    - create
  input_schema:
    type: object
    description: Parameters for creating a guide
    properties:
      title:
        type: string
        description: "Guide title"
      description:
        type: string
        description: "Guide description"
      category_id:
        type: string
        description: "Category ID"
      status:
        type: string
        description: "Guide status (draft, published)"
    required:
      - title

