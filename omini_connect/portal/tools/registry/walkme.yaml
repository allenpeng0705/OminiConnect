- slug: walkme_get_analytics
  name: Get Analytics
  description: |
    Get analytics data for guides and user interactions.
  provider: walkme
  endpoint: /api/v1/analytics
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
    - read
  input_schema:
    type: object
    description: Parameters for getting analytics
    properties:
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      guide_id:
        type: string
        description: "Filter by guide ID"
    required: []

