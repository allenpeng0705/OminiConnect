# Gusto Demo Tools - Allowlist
# Curated subset of Gusto API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gusto_list_employees          - List employees
# 2. gusto_get_employee           - Get employee details
# 3. gusto_list_companies          - List companies
# 4. gusto_get_company             - Get company details
# 5. gusto_list_payrolls           - List payrolls
# 6. gusto_get_payroll             - Get payroll details
# 7. gusto_list_time_off          - List time off requests
# 8. gusto_get_time_off           - Get time off details
# 9. gusto_list_departments        - List departments
# 10. gusto_list_locations         - List locations

- slug: gusto_list_employees
  name: List Employees
  description: |
    List all employees in your Gusto account.
    Returns employee details including name, email, and status.
  provider: gusto-demo
  endpoint: /v1/employees
  method: GET
  scopes:
    - read
  tags:
    - employees
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      company_id:
        type: integer
        description: "Filter by company ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: gusto_get_employee
  name: Get Employee
  description: |
    Get detailed information about a specific employee.
    Includes profile, compensation, and employment details.
  provider: gusto-demo
  endpoint: /v1/employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - employees
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      id:
        type: integer
        description: "Employee ID"
    required:
      - id

