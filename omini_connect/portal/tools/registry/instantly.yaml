# Instantly Tools - Allowlist
# Curated subset of Instantly API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. instantly_list_campaigns      - List campaigns
# 2. instantly_get_campaign        - Get campaign details
# 3. instantly_list_leads          - List leads
# 4. instantly_get_lead            - Get lead details
# 5. instantly_list_sequences      - List sequences
# 6. instantly_get_sequence        - Get sequence details
# 7. instantly_list_workspaces      - List workspaces
# 8. instantly_get_workspace       - Get workspace details
# 9. instantly_list_stats          - List statistics
# 10. instantly_list_analytics      - List analytics

- slug: instantly_list_campaigns
  name: List Campaigns
  description: |
    List all campaigns in Instantly.
    Returns campaign details including name, status, and stats.
  provider: instantly
  endpoint: /campaigns
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: instantly_get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific campaign.
    Includes campaign settings and performance metrics.
  provider: instantly
  endpoint: /campaigns/{id}
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

