# Sap-fieldglass Tools - Allowlist
# Curated subset of SAP Fieldglass API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. sap-fieldglass_list_engagements           - List all engagements
# 2. sap-fieldglass_get_engagement            - Get engagement details
# 3. sap-fieldglass_create_engagement         - Create an engagement
# 4. sap-fieldglass_list_workers             - List all workers
# 5. sap-fieldglass_get_worker                - Get worker details
# 6. sap-fieldglass_list_invoices             - List all invoices
# 7. sap-fieldglass_get_invoice               - Get invoice details
# 8. sap-fieldglass_approve_invoice           - Approve an invoice
# 9. sap-fieldglass_list_rate_cards           - List rate cards
# 10. sap-fieldglass_get_rate_card            - Get rate card details

- slug: sap-fieldglass_list_engagements
  name: List Engagements
  description: |
    List all workforce engagements in SAP Fieldglass with optional status filtering. Returns engagement IDs, titles, worker types, start and end dates, and approval status.
  provider: sap-fieldglass
  endpoint: /v1/engagements
  method: GET
  scopes:
    - engagements:read
  tags:
    - engagements
    - workforce
    - sap
  input_schema:
    type: object
    description: Parameters for listing engagements
    properties:
      limit:
        type: integer
        description: "Number of engagements"
        default: 50
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: sap-fieldglass_get_engagement
  name: Get Engagement
  description: |
    Retrieve detailed information for a specific engagement including worker assignment, compensation terms, statement of work, and compliance documentation.
  provider: sap-fieldglass
  endpoint: /v1/engagements/{engagementId}
  method: GET
  scopes:
    - engagements:read
  tags:
    - engagements
    - workforce
    - sap
  input_schema:
    type: object
    description: Parameters for getting an engagement
    properties:
      engagementId:
        type: string
        description: "The engagement ID"
    required:
      - engagementId

- slug: sap-fieldglass_create_engagement
  name: Create Engagement
  description: |
    Create a new workforce engagement in SAP Fieldglass. Initializes an engagement with title, dates, and worker type for contractor or temp worker assignment.
  provider: sap-fieldglass
  endpoint: /v1/engagements
  method: POST
  scopes:
    - engagements:write
  tags:
    - engagements
    - workforce
    - sap
    - create
  input_schema:
    type: object
    description: Parameters for creating an engagement
    properties:
      title:
        type: string
        description: "Engagement title"
      startDate:
        type: string
        description: "Start date"
      endDate:
        type: string
        description: "End date"
      workerType:
        type: string
        description: "Worker type"
    required:
      - title

- slug: sap-fieldglass_list_workers
  name: List Workers
  description: |
    List all contingent workers managed through SAP Fieldglass with optional type filtering. Returns worker IDs, names, assignments, and compliance status for each worker.
  provider: sap-fieldglass
  endpoint: /v1/workers
  method: GET
  scopes:
    - workers:read
  tags:
    - workers
    - workforce
    - sap
  input_schema:
    type: object
    description: Parameters for listing workers
    properties:
      limit:
        type: integer
        description: "Number of workers"
        default: 50
      type:
        type: string
        description: "Filter by worker type"
    required: []

- slug: sap-fieldglass_get_worker
  name: Get Worker
  description: |
    Retrieve detailed information for a specific worker including contact details, qualifications, current assignments, and compliance documentation status.
  provider: sap-fieldglass
  endpoint: /v1/workers/{workerId}
  method: GET
  scopes:
    - workers:read
  tags:
    - workers
    - workforce
    - sap
  input_schema:
    type: object
    description: Parameters for getting a worker
    properties:
      workerId:
        type: string
        description: "The worker ID"
    required:
      - workerId

- slug: sap-fieldglass_list_invoices
  name: List Invoices
  description: |
    List all invoices from SAP Fieldglass with optional status filtering. Returns invoice numbers, engagement references, amounts, dates, and payment status for each invoice.
  provider: sap-fieldglass
  endpoint: /v1/invoices
  method: GET
  scopes:
    - invoices:read
  tags:
    - invoices
    - billing
    - sap
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      limit:
        type: integer
        description: "Number of invoices"
        default: 50
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: sap-fieldglass_get_invoice
  name: Get Invoice
  description: |
    Retrieve detailed information for a specific invoice including line item breakdown, timesheet references, expense charges, and payment terms.
  provider: sap-fieldglass
  endpoint: /v1/invoices/{invoiceId}
  method: GET
  scopes:
    - invoices:read
  tags:
    - invoices
    - billing
    - sap
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      invoiceId:
        type: string
        description: "The invoice ID"
    required:
      - invoiceId

- slug: sap-fieldglass_approve_invoice
  name: Approve Invoice
  description: |
    Approve a pending invoice for payment processing. Updates the invoice status to approved and triggers the payment workflow in the system.
  provider: sap-fieldglass
  endpoint: /v1/invoices/{invoiceId}/approve
  method: POST
  scopes:
    - invoices:write
  tags:
    - invoices
    - billing
    - approval
    - sap
  input_schema:
    type: object
    description: Parameters for approving an invoice
    properties:
      invoiceId:
        type: string
        description: "The invoice ID"
    required:
      - invoiceId

- slug: sap-fieldglass_list_rate_cards
  name: List Rate Cards
  description: |
    List all rate cards defining worker compensation rates and pricing. Returns rate card identifiers, descriptions, effective dates, and rate structures for different worker types.
  provider: sap-fieldglass
  endpoint: /v1/rateCards
  method: GET
  scopes:
    - rateCards:read
  tags:
    - rate-cards
    - pricing
    - sap
  input_schema:
    type: object
    description: Parameters for listing rate cards
    properties:
      limit:
        type: integer
        description: "Number of rate cards"
        default: 50
    required: []

- slug: sap-fieldglass_get_rate_card
  name: Get Rate Card
  description: |
    Retrieve complete details for a specific rate card including all rate lines, skill-based pricing, and effective date ranges for each rate structure.
  provider: sap-fieldglass
  endpoint: /v1/rateCards/{rateCardId}
  method: GET
  scopes:
    - rateCards:read
  tags:
    - rate-cards
    - pricing
    - sap
  input_schema:
    type: object
    description: Parameters for getting a rate card
    properties:
      rateCardId:
        type: string
        description: "The rate card ID"
    required:
      - rateCardId
