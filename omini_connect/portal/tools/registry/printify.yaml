- slug: printify_list_products
  name: List Products
  description: |
    Retrieve a list of all products in your Printify catalog with variant details.
  provider: printify
  endpoint: /v1/catalog/products
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of products per page (default 50, max 100)"
      search:
        type: string
        description: "Search term to filter products by name"
    required: []

- slug: printify_get_product
  name: Get Product
  description: |
    Retrieve detailed information about a specific product including variants and blueprints.
  provider: printify
  endpoint: /v1/catalog/products/{id}
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      id:
        type: string
        description: "Product ID"
    required:
      - id

- slug: printify_list_orders
  name: List Orders
  description: |
    Retrieve a list of orders with filtering options for status and date range.
  provider: printify
  endpoint: /v1/orders
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of orders per page (default 50, max 100)"
      status:
        type: string
        description: "Filter by status: pending, printing, shipped, delivered, canceled"
      from_date:
        type: string
        description: "Start date filter (ISO 8601 format)"
      to_date:
        type: string
        description: "End date filter (ISO 8601 format)"
    required: []

- slug: printify_get_order
  name: Get Order
  description: |
    Retrieve detailed information about a specific order including line items and shipping.
  provider: printify
  endpoint: /v1/orders/{id}
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      id:
        type: string
        description: "Order ID"
    required:
      - id

- slug: printify_create_order
  name: Create Order
  description: |
    Create a new order by specifying items, shipping address, and print provider.
  provider: printify
  endpoint: /v1/orders
  method: POST
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      line_items:
        type: array
        description: "Array of items with product_id, variant_id, and quantity"
      shipping_address:
        type: object
        description: "Shipping address details"
      shipping_provider:
        type: string
        description: "Shipping provider ID"
      external_id:
        type: string
        description: "External order reference ID"
    required:
      - line_items
      - shipping_address

