- slug: printify_get_product_catalog
  name: Get Product Catalog
  description: |
    Browse the full Printify product catalog with blueprints and available providers.
  provider: printify
  endpoint: /v1/catalog
  method: GET
  scopes:
    - catalog
  tags:
    - catalog
  input_schema:
    type: object
    description: Parameters for browsing product catalog
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of products per page (default 50)"
      category:
        type: string
        description: "Filter by product category (e.g., t-shirts, hoodies)"
    required: []