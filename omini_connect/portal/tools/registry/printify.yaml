- slug: printify_list_products
  name: List Products
  description: |
    Retrieve all products in your Printify catalog with their variants, blueprints, and pricing information.
    Returns product listings for print-on-demand inventory management.
  provider: printify
  endpoint: /v1/catalog/products
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of products per page (default 50, max 100)"
      search:
        type: string
        description: "Search term to filter products by name"
    required: []

- slug: printify_get_product
  name: Get Product
  description: |
    Retrieve detailed information for a specific product including its variants, blueprints, and pricing.
    Returns product details for inventory and design management.
  provider: printify
  endpoint: /v1/catalog/products/{id}
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      id:
        type: string
        description: "Product ID"
    required:
      - id

- slug: printify_list_orders
  name: List Orders
  description: |
    Retrieve all orders in Printify with their status, line items, shipping details, and date ranges.
    Returns order listings for fulfillment tracking and management.
  provider: printify
  endpoint: /v1/orders
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of orders per page (default 50, max 100)"
      status:
        type: string
        description: "Filter by status: pending, printing, shipped, delivered, canceled"
      from_date:
        type: string
        description: "Start date filter (ISO 8601 format)"
      to_date:
        type: string
        description: "End date filter (ISO 8601 format)"
    required: []

- slug: printify_get_order
  name: Get Order
  description: |
    Retrieve detailed information for a specific order including its line items, shipping address, and fulfillment status.
    Returns order details for tracking and customer service.
  provider: printify
  endpoint: /v1/orders/{id}
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      id:
        type: string
        description: "Order ID"
    required:
      - id

- slug: printify_create_order
  name: Create Order
  description: |
    Create a new order in Printify with specified line items, shipping address, and print provider.
    Returns the created order with its ID for fulfillment tracking.
  provider: printify
  endpoint: /v1/orders
  method: POST
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      line_items:
        type: array
        description: "Array of items with product_id, variant_id, and quantity"
      shipping_address:
        type: object
        description: "Shipping address details"
      shipping_provider:
        type: string
        description: "Shipping provider ID"
      external_id:
        type: string
        description: "External order reference ID"
    required:
      - line_items
      - shipping_address

