# Bitdefender Tools - Allowlist
# Curated subset of Bitdefender API for AI agent use.
# BASIC auth via Nango (API Key).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bitdefender_list_endpoints    - List endpoints
# 2. bitdefender_get_endpoint    - Get endpoint details
# 3. bitdefender_list_policies   - List security policies
# 4. bitdefender_get_policy      - Get policy details
# 5. bitdefender_list_tasks     - List tasks
# 6. bitdefender_get_task      - Get task details
# 7. bitdefender_list_alerts   - List security alerts
# 8. bitdefender_get_alert     - Get alert details
# 9. bitdefender_list_groups   - List endpoint groups
# 10. bitdefender_get_quarantine - Get quarantine items

- slug: bitdefender_list_endpoints
  name: List Endpoints
  description: |
    List all endpoints (devices) managed by Bitdefender.
  provider: bitdefender
  endpoint: /endpoints
  method: GET
  scopes: []
  tags:
    - endpoints
    - devices
  input_schema:
    type: object
    description: Parameters for listing endpoints
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Endpoints per page"
        default: 20
    required: []

- slug: bitdefender_get_endpoint
  name: Get Endpoint
  description: |
    Get details for a specific endpoint.
  provider: bitdefender
  endpoint: /endpoints/{id}
  method: GET
  scopes: []
  tags:
    - endpoints
    - read
  input_schema:
    type: object
    description: Parameters for getting an endpoint
    properties:
      id:
        type: string
        description: "Endpoint ID"
    required:
      - id

