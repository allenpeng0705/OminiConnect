# Heap Tools - Allowlist
# Curated subset of the Heap APIs for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. heap_list_events         - List events in your application
# 2. heap_get_event            - Get event details and properties
# 3. heap_track_event          - Track an event
# 4. heap_list_users           - List users matching criteria
# 5. heap_get_user             - Get user profile details
# 6. heap_get_funnel           - Get funnel analysis data
# 7. heap_get_session          - Get session data
# 8. heap_list_reports         - List saved reports
# 9. heap_get_report            - Get report details
# 10. heap_list_properties    - List custom properties

- slug: heap_list_events
  name: List Events
  description: |
    Retrieve all events captured in your Heap application with pagination.
    Returns event names, types, and occurrence counts.
  provider: heap
  endpoint: /api/v1/events
  method: GET
  scopes:
    - heap_full_access
  tags:
    - events
    - analytics
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      limit:
        type: integer
        description: "Max events to return (default 100)"
        default: 100
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: heap_get_event
  name: Get Event
  description: |
    Retrieve a specific Heap event with its property analysis and occurrence metrics.
    Returns event structure and verification status.
  provider: heap
  endpoint: /api/v1/events/{event_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - events
    - properties
  input_schema:
    type: object
    description: Parameters for getting event details
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      event_id:
        type: string
        description: "Event ID or name (required)"
    required:
      - event_id

- slug: heap_track_event
  name: Track Event
  description: |
    Record a custom user action event in Heap with optional properties.
    Captures user interactions for analytics and segmentation.
  provider: heap
  endpoint: /api/v1/track
  method: POST
  scopes:
    - heap_full_access
  tags:
    - events
    - tracking
  input_schema:
    type: object
    description: Parameters for tracking an event
    properties:
      app_id:
        type: string
        description: "Heap application ID (required)"
      user_id:
        type: string
        description: "User identifier"
      event:
        type: string
        description: "Event name (required)"
      properties:
        type: object
        description: "Custom event properties"
      timestamp:
        type: string
        description: "ISO 8601 timestamp"
    required:
      - app_id
      - event

- slug: heap_list_users
  name: List Users
  description: |
    Retrieve users matching specific criteria or property filters with pagination.
    Returns user profiles for audience segmentation and research.
  provider: heap
  endpoint: /api/v1/users
  method: GET
  scopes:
    - heap_full_access
  tags:
    - users
    - profiles
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      limit:
        type: integer
        description: "Max users to return (default 100)"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
      filter:
        type: string
        description: "Filter expression for users"
    required: []

- slug: heap_get_user
  name: Get User
  description: |
    Retrieve a specific Heap user profile with all properties and event history.
    Returns user attributes and behavioral data for debugging.
  provider: heap
  endpoint: /api/v1/users/{user_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - users
    - profiles
  input_schema:
    type: object
    description: Parameters for getting user profile
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      user_id:
        type: string
        description: "User ID (required)"
    required:
      - user_id

- slug: heap_get_funnel
  name: Get Funnel
  description: |
    Analyze conversion rates between sequential user actions using funnel definitions.
    Returns step-by-step drop-off data and conversion metrics.
  provider: heap
  endpoint: /api/v1/funnels
  method: GET
  scopes:
    - heap_full_access
  tags:
    - funnels
    - conversion
    - analytics
  input_schema:
    type: object
    description: Parameters for funnel analysis
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      steps:
        type: array
        items:
          type: object
        description: "Array of funnel step objects with event names"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - steps

- slug: heap_get_session
  name: Get Session
  description: |
    Retrieve session data containing user activity within a time window.
    Returns all events and actions during the session.
  provider: heap
  endpoint: /api/v1/sessions/{session_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - sessions
    - engagement
    - analytics
  input_schema:
    type: object
    description: Parameters for session analysis
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      session_id:
        type: string
        description: "Session ID (required)"
    required:
      - session_id

- slug: heap_list_reports
  name: List Reports
  description: |
    Retrieve saved analysis reports in your Heap application with pagination.
    Returns report configurations and result summaries.
  provider: heap
  endpoint: /api/v1/reports
  method: GET
  scopes:
    - heap_full_access
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for listing reports
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      limit:
        type: integer
        description: "Max reports to return (default 50)"
        default: 50
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: heap_get_report
  name: Get Report
  description: |
    Retrieve a specific Heap report with its configuration and computed results.
    Returns saved analysis data and visualization settings.
  provider: heap
  endpoint: /api/v1/reports/{report_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for getting report details
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      report_id:
        type: string
        description: "Report ID (required)"
    required:
      - report_id

- slug: heap_list_properties
  name: List Properties
  description: |
    Retrieve all custom user and event properties defined in your Heap application.
    Returns property names, types, and usage statistics.
  provider: heap
  endpoint: /api/v1/properties
  method: GET
  scopes:
    - heap_full_access
  tags:
    - properties
    - users
    - events
  input_schema:
    type: object
    description: Parameters for listing properties
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      type:
        type: string
        description: "Property type: user or event"
        enum: [user, event]
      limit:
        type: integer
        description: "Max properties to return (default 100)"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []
