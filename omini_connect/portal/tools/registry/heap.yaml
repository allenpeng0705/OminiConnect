# Heap Tools - Allowlist
# Curated subset of the Heap APIs for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. heap_list_events         - List events in your application
# 2. heap_get_event            - Get event details and properties
# 3. heap_track_event          - Track an event
# 4. heap_list_users           - List users matching criteria
# 5. heap_get_user             - Get user profile details
# 6. heap_get_funnel           - Get funnel analysis data
# 7. heap_get_session          - Get session data
# 8. heap_list_reports         - List saved reports
# 9. heap_get_report            - Get report details
# 10. heap_list_properties    - List custom properties

- slug: heap_list_events
  name: List Events
  description: |
    List all events in your Heap application.
    Returns event names, types, and metadata.
  provider: heap
  endpoint: /api/v1/events
  method: GET
  scopes:
    - heap_full_access
  tags:
    - events
    - analytics
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      limit:
        type: integer
        description: "Max events to return (default 100)"
        default: 100
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: heap_get_event
  name: Get Event
  description: |
    Get details about a specific event including property analysis and occurrence counts.
    Use this to understand event structure and verify tracking.
  provider: heap
  endpoint: /api/v1/events/{event_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - events
    - properties
  input_schema:
    type: object
    description: Parameters for getting event details
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      event_id:
        type: string
        description: "Event ID or name (required)"
    required:
      - event_id

- slug: heap_track_event
  name: Track Event
  description: |
    Track an event. Events are actions users take in your application.
    Heap automatically captures many events; use this for custom events.
  provider: heap
  endpoint: /api/v1/track
  method: POST
  scopes:
    - heap_full_access
  tags:
    - events
    - tracking
  input_schema:
    type: object
    description: Parameters for tracking an event
    properties:
      app_id:
        type: string
        description: "Heap application ID (required)"
      user_id:
        type: string
        description: "User identifier"
      event:
        type: string
        description: "Event name (required)"
      properties:
        type: object
        description: "Custom event properties"
      timestamp:
        type: string
        description: "ISO 8601 timestamp"
    required:
      - app_id
      - event

- slug: heap_list_users
  name: List Users
  description: |
    List users matching specific criteria or properties.
    Use for audience segmentation and user research.
  provider: heap
  endpoint: /api/v1/users
  method: GET
  scopes:
    - heap_full_access
  tags:
    - users
    - profiles
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      limit:
        type: integer
        description: "Max users to return (default 100)"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
      filter:
        type: string
        description: "Filter expression for users"
    required: []

- slug: heap_get_user
  name: Get User
  description: |
    Get a user profile with all associated properties and event history.
    Use for user research and debugging user-specific issues.
  provider: heap
  endpoint: /api/v1/users/{user_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - users
    - profiles
  input_schema:
    type: object
    description: Parameters for getting user profile
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      user_id:
        type: string
        description: "User ID (required)"
    required:
      - user_id

- slug: heap_get_funnel
  name: Get Funnel
  description: |
    Get funnel analysis data. Funnels show conversion rates between sequential steps.
    Define steps by event names and analyze drop-off.
  provider: heap
  endpoint: /api/v1/funnels
  method: GET
  scopes:
    - heap_full_access
  tags:
    - funnels
    - conversion
    - analytics
  input_schema:
    type: object
    description: Parameters for funnel analysis
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      steps:
        type: array
        items:
          type: object
        description: "Array of funnel step objects with event names"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - steps

- slug: heap_get_session
  name: Get Session
  description: |
    Get session data for a user or list of sessions.
    Sessions group events by user activity within a time window.
  provider: heap
  endpoint: /api/v1/sessions/{session_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - sessions
    - engagement
    - analytics
  input_schema:
    type: object
    description: Parameters for session analysis
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      session_id:
        type: string
        description: "Session ID (required)"
    required:
      - session_id

- slug: heap_list_reports
  name: List Reports
  description: |
    List saved reports in your Heap application.
    Reports contain saved analysis configurations for quick access.
  provider: heap
  endpoint: /api/v1/reports
  method: GET
  scopes:
    - heap_full_access
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for listing reports
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      limit:
        type: integer
        description: "Max reports to return (default 50)"
        default: 50
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: heap_get_report
  name: Get Report
  description: |
    Get details of a specific report including configuration and results.
    Use this to retrieve saved analysis data.
  provider: heap
  endpoint: /api/v1/reports/{report_id}
  method: GET
  scopes:
    - heap_full_access
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for getting report details
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      report_id:
        type: string
        description: "Report ID (required)"
    required:
      - report_id

- slug: heap_list_properties
  name: List Properties
  description: |
    List all custom properties defined in your Heap application.
    Properties are attributes that can be used for segmentation and filtering.
  provider: heap
  endpoint: /api/v1/properties
  method: GET
  scopes:
    - heap_full_access
  tags:
    - properties
    - users
    - events
  input_schema:
    type: object
    description: Parameters for listing properties
    properties:
      app_id:
        type: string
        description: "Heap application ID"
      type:
        type: string
        description: "Property type: user or event"
        enum: [user, event]
      limit:
        type: integer
        description: "Max properties to return (default 100)"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []
