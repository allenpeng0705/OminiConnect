# UKG Ready Tools - Allowlist
# Curated subset of UKG Ready API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. ukg_list_employees           - List all employees
# # 2. ukg_get_employee           - Get employee details
# # 3. ukg_list_shifts           - List scheduled shifts
# # 4. ukg_create_shift           - Create a new shift
# # 5. ukg_list_time_entries           - List time entries
# # 6. ukg_list_departments           - List all departments
# # 7. ukg_list_positions           - List all positions
# # 8. ukg_get_company_info           - Get company information
# # 9. ukg_list_approvals           - List pending approvals
# # 10. ukg_process_payroll           - Process payroll

- slug: ukg_list_employees
  name: List Employees
  description: |
    List all employees
  provider: ukg-ready
  endpoint: /api/v1/employees
  method: GET
  scopes:
    - read
  tags:
    - ukg-ready
  input_schema:
    type: object
    description: Parameters for list employees
    properties: {}
    required: []

- slug: ukg_get_employee
  name: Get Employee
  description: |
    Get employee details
  provider: ukg-ready
  endpoint: /api/v1/employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - ukg-ready
  input_schema:
    type: object
    description: Parameters for get employee
    properties: {}
    required: []

