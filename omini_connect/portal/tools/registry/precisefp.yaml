# PreciseFP Tools - Allowlist
# Curated subset of PreciseFP API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. precisefp_list_clients            - List clients
# 2. precisefp_get_client             - Get client details
# 3. precisefp_list_assets            - List assets
# 4. precisefp_get_asset              - Get asset details
# 5. precisefp_list_liabilities       - List liabilities
# 6. precisefp_get_liability          - Get liability details
# 7. precisefp_list_goals             - List financial goals
# 8. precisefp_get_goal               - Get goal details
# 9. precisefp_list_documents         - List documents
# 10. precisefp_get_user              - Get user info

- slug: precisefp_list_clients
  name: List Clients
  description: |
    List all clients in the organization.
  provider: precisefp
  endpoint: /api/clients
  method: GET
  scopes: []
  tags:
    - clients
    - crm
    - list
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: precisefp_get_client
  name: Get Client
  description: |
    Get detailed information about a specific client.
  provider: precisefp
  endpoint: /api/clients/{clientId}
  method: GET
  scopes: []
  tags:
    - clients
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      clientId:
        type: string
        description: "Client ID"
    required:
      - clientId

