- slug: teespring_get_analytics
  name: Get Analytics
  description: |
    Retrieve analytics data including sales, revenue, and conversion metrics.
  provider: teespring
  endpoint: /v2/analytics
  method: GET
  scopes:
    - analytics
  tags:
    - analytics
  input_schema:
    type: object
    description: Parameters for retrieving analytics
    properties:
      campaign_id:
        type: string
        description: "Specific campaign ID for analytics (optional for global)"
      from_date:
        type: string
        description: "Start date for analytics period (ISO 8601 format)"
      to_date:
        type: string
        description: "End date for analytics period (ISO 8601 format)"
      metrics:
        type: array
        description: "Specific metrics to retrieve: sales, revenue, views, conversions"
    required: []