- slug: teespring_list_campaigns
  name: List Campaigns
  description: |
    Retrieve a list of all marketing campaigns with performance metrics.
  provider: teespring
  endpoint: /v2/campaigns
  method: GET
  scopes:
    - campaigns
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of campaigns per page (default 20)"
      status:
        type: string
        description: "Filter by status: draft, published, archived"
    required: []

- slug: teespring_get_campaign
  name: Get Campaign
  description: |
    Retrieve detailed information about a specific campaign including design and settings.
  provider: teespring
  endpoint: /v2/campaigns/{id}
  method: GET
  scopes:
    - campaigns
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

- slug: teespring_create_campaign
  name: Create Campaign
  description: |
    Create a new campaign with title, design, products, and pricing.
  provider: teespring
  endpoint: /v2/campaigns
  method: POST
  scopes:
    - campaigns
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      title:
        type: string
        description: "Campaign title"
      design_id:
        type: string
        description: "Design ID to apply to products"
      products:
        type: array
        description: "Array of product types and variants to include"
      pricing:
        type: object
        description: "Pricing configuration per product"
      start_date:
        type: string
        description: "Campaign start date (ISO 8601 format)"
    required:
      - title
      - products

