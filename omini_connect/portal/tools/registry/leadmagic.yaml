# LeadMagic Tools - Allowlist
# Curated subset of LeadMagic API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. leadmagic_list_enrichments   - List enrichments
# 2. leadmagic_get_enrichment    - Get enrichment details
# 3. leadmagic_list_credits      - Get credit balance
# 4. leadmagic_list_lookups      - List lookups
# 5. leadmagic_create_lookup     - Create a lookup
# 6. leadmagic_list_domains     - List domains
# 7. leadmagic_get_domain        - Get domain details
# 8. leadmagic_list_companies    - List companies
# 9. leadmagic_get_company      - Get company details
# 10. leadmagic_list_webhooks   - List webhooks

- slug: leadmagic_list_enrichments
  name: List Enrichments
  description: |
    List all data enrichments performed on contacts in your LeadMagic account. Returns enrichment IDs, contact emails, data sources, and completion timestamps.
  provider: leadmagic
  endpoint: /v1/enrichments
  method: GET
  scopes: []
  tags:
    - enrichments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing enrichments
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: leadmagic_get_enrichment
  name: Get Enrichment
  description: |
    Retrieve detailed information about a specific LeadMagic enrichment by its ID. Returns the contact data, enriched fields, data quality scores, and sources used.
  provider: leadmagic
  endpoint: /v1/enrichments/{enrichment_id}
  method: GET
  scopes: []
  tags:
    - enrichments
    - read
  input_schema:
    type: object
    description: Parameters for getting an enrichment
    properties:
      enrichment_id:
        type: string
        description: "Enrichment ID"
    required:
      - enrichment_id

- slug: leadmagic_list_credits
  name: Get Credit Balance
  description: |
    Get your current LeadMagic account credit balance for data enrichment operations. Returns the number of credits available and your account tier.
  provider: leadmagic
  endpoint: /v1/credits
  method: GET
  scopes: []
  tags:
    - credits
    - read
  input_schema:
    type: object
    description: Parameters for getting credits
    properties: {}
    required: []

- slug: leadmagic_list_lookups
  name: List Lookups
  description: |
    List all email lookups performed in your LeadMagic account. Returns lookup IDs, queried emails, status, and result data for each lookup.
  provider: leadmagic
  endpoint: /v1/lookups
  method: GET
  scopes: []
  tags:
    - lookups
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing lookups
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: leadmagic_create_lookup
  name: Create Lookup
  description: |
    Create a new email lookup request in LeadMagic to retrieve prospect data. Returns the lookup ID and initial status of the enrichment request.
  provider: leadmagic
  endpoint: /v1/lookups
  method: POST
  scopes: []
  tags:
    - lookups
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a lookup
    properties:
      email:
        type: string
        description: "Email to look up"
    required:
      - email

