# LeadMagic Tools - Allowlist
# Curated subset of LeadMagic API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. leadmagic_list_enrichments   - List enrichments
# 2. leadmagic_get_enrichment    - Get enrichment details
# 3. leadmagic_list_credits      - Get credit balance
# 4. leadmagic_list_lookups      - List lookups
# 5. leadmagic_create_lookup     - Create a lookup
# 6. leadmagic_list_domains     - List domains
# 7. leadmagic_get_domain        - Get domain details
# 8. leadmagic_list_companies    - List companies
# 9. leadmagic_get_company      - Get company details
# 10. leadmagic_list_webhooks   - List webhooks

- slug: leadmagic_list_enrichments
  name: List Enrichments
  description: |
    List all enrichments.
  provider: leadmagic
  endpoint: /v1/enrichments
  method: GET
  scopes: []
  tags:
    - enrichments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing enrichments
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: leadmagic_get_enrichment
  name: Get Enrichment
  description: |
    Get details for a specific enrichment.
  provider: leadmagic
  endpoint: /v1/enrichments/{enrichment_id}
  method: GET
  scopes: []
  tags:
    - enrichments
    - read
  input_schema:
    type: object
    description: Parameters for getting an enrichment
    properties:
      enrichment_id:
        type: string
        description: "Enrichment ID"
    required:
      - enrichment_id

