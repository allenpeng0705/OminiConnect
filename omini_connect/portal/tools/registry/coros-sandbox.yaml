# Coros (Sandbox) Tools - Allowlist
# Curated subset of the Coros Sandbox API for AI agent use.
# OAuth2 via Nango (Sandbox environment).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. coros_sandbox_list_activities      - List user activities
# 2. coros_sandbox_get_activity        - Get a specific activity
# 3. coros_sandbox_list_workouts       - List user workouts
# 4. coros_sandbox_get_workout         - Get a specific workout
# 5. coros_sandbox_list_devices        - List paired devices
# 6. coros_sandbox_get_device          - Get device details
# 7. coros_sandbox_list_athlete_profile - Get athlete profile
# 8. coros_sandbox_update_athlete_profile - Update athlete profile
# 9. coros_sandbox_list_teams          - List teams
# 10. coros_sandbox_get_team           - Get team details

- slug: coros_sandbox_list_activities
  name: List Activities
  description: |
    List all activities recorded with Coros devices in the sandbox environment, returning activity IDs, types, dates, and metrics.
  provider: coros-sandbox
  endpoint: /v1/activities
  method: GET
  scopes:
    - athlete:read
  tags:
    - activities
    - fitness
    - list
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      start_date:
        type: string
        description: "ISO 8601 date - filter activities from this date"
      end_date:
        type: string
        description: "ISO 8601 date - filter activities until this date"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: coros_sandbox_get_activity
  name: Get Activity
  description: |
    Get detailed information for a specific Coros sandbox activity including GPS data and performance metrics.
  provider: coros-sandbox
  endpoint: /v1/activities/{activity_id}
  method: GET
  scopes:
    - athlete:read
  tags:
    - activities
    - fitness
    - read
  input_schema:
    type: object
    description: Parameters for getting an activity
    properties:
      activity_id:
        type: string
        description: "Activity ID"
    required:
      - activity_id

- slug: coros_sandbox_list_workouts
  name: List Workouts
  description: |
    List all planned and completed Coros sandbox workouts, returning workout IDs, names, types, and status.
  provider: coros-sandbox
  endpoint: /v1/workouts
  method: GET
  scopes:
    - workout:read
  tags:
    - workouts
    - training
    - list
  input_schema:
    type: object
    description: Parameters for listing workouts
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: coros_sandbox_get_workout
  name: Get Workout
  description: |
    Get details of a specific Coros sandbox workout including its intervals, targets, and duration.
  provider: coros-sandbox
  endpoint: /v1/workouts/{workout_id}
  method: GET
  scopes:
    - workout:read
  tags:
    - workouts
    - training
    - read
  input_schema:
    type: object
    description: Parameters for getting a workout
    properties:
      workout_id:
        type: string
        description: "Workout ID"
    required:
      - workout_id

- slug: coros_sandbox_list_devices
  name: List Devices
  description: |
    List all Coros devices paired to the sandbox account, returning device IDs, names, types, and firmware versions.
  provider: coros-sandbox
  endpoint: /v1/devices
  method: GET
  scopes:
    - device:read
  tags:
    - devices
    - hardware
    - list
  input_schema:
    type: object
    description: Parameters for listing devices
    properties: {}

- slug: coros_sandbox_get_device
  name: Get Device
  description: |
    Get details of a specific Coros sandbox device including its firmware version and configuration settings.
  provider: coros-sandbox
  endpoint: /v1/devices/{device_id}
  method: GET
  scopes:
    - device:read
  tags:
    - devices
    - hardware
    - read
  input_schema:
    type: object
    description: Parameters for getting a device
    properties:
      device_id:
        type: string
        description: "Device ID"
    required:
      - device_id

- slug: coros_sandbox_list_athlete_profile
  name: List Athlete Profile
  description: |
    Get the Coros sandbox athlete's profile information including height, weight, and training zones.
  provider: coros-sandbox
  endpoint: /v1/athlete
  method: GET
  scopes:
    - athlete:read
  tags:
    - athlete
    - profile
    - read
  input_schema:
    type: object
    description: Parameters for getting athlete profile
    properties: {}

- slug: coros_sandbox_update_athlete_profile
  name: Update Athlete Profile
  description: |
    Update the Coros sandbox athlete's profile, modifying height, weight, heart rate zones, or power settings.
  provider: coros-sandbox
  endpoint: /v1/athlete
  method: PUT
  scopes:
    - athlete:write
  tags:
    - athlete
    - profile
    - update
  input_schema:
    type: object
    description: Parameters for updating athlete profile
    properties:
      height:
        type: number
        description: "Height in cm"
      weight:
        type: number
        description: "Weight in kg"
      max_heart_rate:
        type: integer
        description: "Maximum heart rate"
      threshold_heart_rate:
        type: integer
        description: "Threshold heart rate"
      max_power:
        type: integer
        description: "Maximum power (FTP)"
    required: []

- slug: coros_sandbox_list_teams
  name: List Teams
  description: |
    List all teams the Coros sandbox athlete belongs to, returning team IDs, names, and member counts.
  provider: coros-sandbox
  endpoint: /v1/teams
  method: GET
  scopes:
    - team:read
  tags:
    - teams
    - social
    - list
  input_schema:
    type: object
    description: Parameters for listing teams
    properties: {}

- slug: coros_sandbox_get_team
  name: Get Team
  description: |
    Get details of a specific Coros sandbox team including its members and activity statistics.
  provider: coros-sandbox
  endpoint: /v1/teams/{team_id}
  method: GET
  scopes:
    - team:read
  tags:
    - teams
    - social
    - read
  input_schema:
    type: object
    description: Parameters for getting a team
    properties:
      team_id:
        type: string
        description: "Team ID"
    required:
      - team_id
