    properties: {}

- slug: cursor_admin_create_invitation
  name: Create Invitation
  description: |
    Create and send a team invitation via email.
  provider: cursor-admin
  endpoint: /teams/invitations
  method: POST
  scopes: []
  tags:
    - invitations
    - teams
    - create
  input_schema:
    type: object
    description: Parameters for creating an invitation
    properties:
      email:
        type: string
        description: "Email address to invite"
      team_id:
        type: string
        description: "Team ID to invite to"
      role:
        type: string
        description: "Role: member, admin"
        default: member
    required:
      - email
      - team_id

