- slug: gcp_list_operations
  name: List Operations
  description: |
    List long-running operations.
  provider: google-service-account
  endpoint: /v1/{name}/operations
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - operations
    - list
  input_schema:
    type: object
    description: Parameters for listing operations
    properties:
      name:
        type: string
        description: "Parent resource name"
    required:
      - name
