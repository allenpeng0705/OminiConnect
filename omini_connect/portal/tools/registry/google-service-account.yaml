- slug: gcp_get_billing
  name: Get Billing
  description: |
    Get billing information for a project.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/billingInfo
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - billing
    - read
  input_schema:
    type: object
    description: Parameters for getting billing info
    properties:
