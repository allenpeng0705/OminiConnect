# Google Service Account Tools - Allowlist
# Curated subset of Google APIs for AI agent use.
# TWO_STEP (OAuth2 with RSA) via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gcp_list_projects            - List Cloud projects
# 2. gcp_get_project             - Get project details
# 3. gcp_list_services           - List enabled services
# 4. gcp_enable_service          - Enable a service
# 5. gcp_list_resources          - List resources
# 6. gcp_get_quota               - Get quota information
# 7. gcp_list_regions            - List regions
# 8. gcp_list_zones              - List zones
# 9. gcp_get_billing             - Get billing info
# 10. gcp_list_operations       - List operations

- slug: gcp_list_projects
  name: List Projects
  description: |
    List Google Cloud projects.
  provider: google-service-account
  endpoint: /v1/projects
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties: {}

- slug: gcp_get_project
  name: Get Project
  description: |
    Get details about a project.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_list_services
  name: List Services
  description: |
    List enabled services for a project.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/services
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - services
    - list
  input_schema:
    type: object
    description: Parameters for listing services
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_enable_service
  name: Enable Service
  description: |
    Enable a service for a project.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/services/{service_name}
  method: POST
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - services
    - enable
  input_schema:
    type: object
    description: Parameters for enabling a service
    properties:
      project_id:
        type: string
        description: "Project ID"
      service_name:
        type: string
        description: "Service name"
    required:
      - project_id
      - service_name

- slug: gcp_list_resources
  name: List Resources
  description: |
    List cloud resources.
  provider: google-service-account
  endpoint: /v1/{parent}/resources
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - resources
    - list
  input_schema:
    type: object
    description: Parameters for listing resources
    properties:
      parent:
        type: string
        description: "Parent resource path"
    required:
      - parent

- slug: gcp_get_quota
  name: Get Quota
  description: |
    Get quota information for a service.
  provider: google-service-account
  endpoint: /v1/{project}/locations/{location}/quotas
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - quota
  input_schema:
    type: object
    description: Parameters for getting quota
    properties:
      project:
        type: string
        description: "Project ID"
      location:
        type: string
        description: "Location"
    required:
      - project
      - location

