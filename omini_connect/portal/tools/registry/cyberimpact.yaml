# Cyberimpact Tools - Allowlist
# Curated subset of the Cyberimpact API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cyberimpact_list_campaigns       - List email campaigns
# 2. cyberimpact_get_campaign        - Get campaign details
# 3. cyberimpact_create_campaign     - Create a new campaign
# 4. cyberimpact_list_contacts       - List contacts
# 5. cyberimpact_get_contact         - Get contact details
# 6. cyberimpact_add_contact         - Add a new contact
# 7. cyberimpact_list_lists          - List contact lists
# 8. cyberimpact_get_list            - Get list details
# 9. cyberimpact_list_templates      - List email templates
# 10. cyberimpact_get_template      - Get template details

- slug: cyberimpact_list_campaigns
  name: List Campaigns
  description: |
    List all email campaigns in Cyberimpact.
  provider: cyberimpact
  endpoint: /campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - email
    - marketing
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      status:
        type: string
        description: "Filter by status: draft, scheduled, sent"
    required: []

- slug: cyberimpact_get_campaign
  name: Get Campaign
  description: |
    Get detailed information for a specific campaign.
  provider: cyberimpact
  endpoint: /campaigns/{id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - email
    - marketing
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: integer
        description: "Campaign ID"
    required:
      - id

- slug: cyberimpact_create_campaign
  name: Create Campaign
  description: |
    Create a new email campaign in Cyberimpact.
  provider: cyberimpact
  endpoint: /campaigns
  method: POST
  scopes: []
  tags:
    - campaigns
    - email
    - marketing
    - create
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      name:
        type: string
        description: "Campaign name"
      subject:
        type: string
        description: "Email subject"
      template_id:
        type: integer
        description: "Template ID to use"
      list_id:
        type: integer
        description: "Contact list ID to send to"
    required:
      - name
      - subject

