- slug: cyberimpact_add_contact
  name: Add Contact
  description: |
    Add a new contact to Cyberimpact.
  provider: cyberimpact
  endpoint: /contacts
  method: POST
  scopes: []
  tags:
    - contacts
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for adding a contact
    properties:
      email:
        type: string
        description: "Contact email (required)"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      list_id:
        type: integer
        description: "List ID to add to"
    required:
      - email

