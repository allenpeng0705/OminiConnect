- slug: simpleview_list_contacts
  name: List Contacts
  description: |
    Retrieve a paginated list of all contacts in the CRM.
  provider: simpleview
  endpoint: /contacts
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of records per page"
    required: []

- slug: simpleview_get_contact
  name: Get Contact
  description: |
    Retrieve detailed information for a specific contact by ID.
  provider: simpleview
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: simpleview_create_contact
  name: Create Contact
  description: |
    Create a new contact in the CRM with the provided details.
  provider: simpleview
  endpoint: /contacts
  method: POST
  scopes:
    - contacts_write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name of the contact"
      last_name:
        type: string
        description: "Last name of the contact"
      email:
        type: string
        description: "Email address of the contact"
      phone:
        type: string
        description: "Phone number of the contact"
    required:
      - first_name
      - last_name
      - email

