# People Data Labs Tools - Allowlist
# Curated subset of People Data Labs API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. peopledatalabs_search_persons       - Search for persons
# 2. peopledatalabs_get_person          - Get person by ID
# 3. peopledatalabs_lookup_email        - Lookup email
# 4. peopledatalabs_enrich_person       - Enrich person data
# 5. peopledatalabs_search_companies    - Search for companies
# 6. peopledatalabs_get_company         - Get company by ID
# 7. peopledatalabs_enrich_company      - Enrich company data
# 8. peopledatalabs_get_school          - Get school by ID
# 9. peopledatalabs_get_location        - Get location by ID
# 10. peopledatalabs_get_api_usage      - Get API usage stats

- slug: peopledatalabs_search_persons
  name: Search Persons
  description: |
    Search for persons matching criteria.
  provider: peopledatalabs
  endpoint: /v5/person/search
  method: GET
  scopes: []
  tags:
    - persons
    - search
    - people
  input_schema:
    type: object
    description: Parameters for searching persons
    properties:
      query:
        type: string
        description: "Search query string"
      title:
        type: string
        description: "Filter by job title"
      company:
        type: string
        description: "Filter by company name"
      location:
        type: string
        description: "Filter by location"
      skills:
        type: string
        description: "Filter by skills (comma-separated)"
    required:
      - query

- slug: peopledatalabs_get_person
  name: Get Person
  description: |
    Get person by their unique identifier.
  provider: peopledatalabs
  endpoint: /v5/person
  method: GET
  scopes: []
  tags:
    - persons
    - read
    - people
  input_schema:
    type: object
    description: Parameters for getting a person
    properties:
      personId:
        type: string
        description: "Person ID (may be emails_md5, phones_md5, etc.)"
    required:
      - personId

- slug: peopledatalabs_lookup_email
  name: Lookup Email
  description: |
    Lookup person by email address.
  provider: peopledatalabs
  endpoint: /v5/person/lookup
  method: GET
  scopes: []
  tags:
