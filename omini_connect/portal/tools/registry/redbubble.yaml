- slug: redbubble_list_orders
  name: List Orders
  description: |
    Retrieve orders with filtering by status and date range.
  provider: redbubble
  endpoint: /v2/orders
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      per_page:
        type: integer
        description: "Number of orders per page (default 50)"
      status:
        type: string
        description: "Filter by status: pending, production, shipped, delivered, returned"
      from_date:
        type: string
        description: "Start date filter (ISO 8601 format)"
      to_date:
        type: string
        description: "End date filter (ISO 8601 format)"
    required: []

