- slug: redbubble_get_sales_stats
  name: Get Sales Stats
  description: |
    Retrieve sales statistics and revenue data for your account or specific works.
  provider: redbubble
  endpoint: /v2/stats/sales
  method: GET
  scopes:
    - stats
  tags:
    - stats
  input_schema:
    type: object
    description: Parameters for getting sales stats
    properties:
      from_date:
        type: string
        description: "Start date for stats period (ISO 8601 format)"
      to_date:
        type: string
        description: "End date for stats period (ISO 8601 format)"
      work_id:
        type: string
        description: "Filter stats for specific work ID"
      group_by:
        type: string
        description: "Group results by: day, month, work, product"
    required: []

