# Fillout API Key Tools - Allowlist
# Curated subset of Fillout API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fillout_api_key_list_forms           - List forms
# 2. fillout_api_key_get_form            - Get form details
# 3. fillout_api_key_list_responses      - List responses
# 4. fillout_api_key_get_response        - Get response details
# 5. fillout_api_key_list_questions      - List questions
# 6. fillout_api_key_get_question       - Get question details
# 7. fillout_api_key_list_answers       - List answers
# 8. fillout_api_key_get_answer         - Get answer details
# 9. fillout_api_key_list_captures       - List file captures
# 10. fillout_api_key_get_workflow     - Get workflow status

- slug: fillout_api_key_list_forms
  name: List Forms
  description: |
    List all forms created in your Fillout account. Returns form names, IDs, question counts, and response totals for each form.
  provider: fillout-api-key
  endpoint: /v1/api/forms
  method: GET
  scopes: []
  tags:
    - forms
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for listing forms
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: fillout_api_key_get_form
  name: Get Form
  description: |
    Get detailed information about a specific Fillout form including its questions, settings, and外观 configuration.
  provider: fillout-api-key
  endpoint: /v1/api/forms/{id}
  method: GET
  scopes: []
  tags:
    - forms
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for getting form
    properties:
      id:
        type: string
        description: "Form ID"
    required:
      - id

- slug: fillout_api_key_list_responses
  name: List Responses
  description: |
    List all responses submitted to a specific Fillout form. Returns response IDs, submission timestamps, and answers for each response.
  provider: fillout-api-key
  endpoint: /v1/api/forms/{formId}/responses
  method: GET
  scopes: []
  tags:
    - responses
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for listing responses
    properties:
      formId:
        type: string
        description: "Form ID"
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required:
      - formId

- slug: fillout_api_key_get_response
  name: Get Response
  description: |
    Get detailed information about a specific Fillout form response including all question answers and submission metadata.
  provider: fillout-api-key
  endpoint: /v1/api/forms/{formId}/responses/{responseId}
  method: GET
  scopes: []
  tags:
    - responses
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for getting response
    properties:
      formId:
        type: string
        description: "Form ID"
      responseId:
        type: string
        description: "Response ID"
    required:
      - formId
      - responseId

