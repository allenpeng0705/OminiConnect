# Microsoft Ads Tools - Allowlist
# Curated subset of Microsoft Ads API for AI agent use.
# OAuth2 via Nango (alias: microsoft).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. microsoft_ads_list_campaigns       - List campaigns
# 2. microsoft_ads_get_campaign          - Get campaign details
# 3. microsoft_ads_list_ad_groups        - List ad groups
# 4. microsoft_ads_get_ad_group          - Get ad group details
# 5. microsoft_ads_list_ads             - List ads
# 6. microsoft_ads_get_ad                - Get ad details
# 7. microsoft_ads_list_keywords        - List keywords
# 8. microsoft_ads_get_keyword           - Get keyword details
# 9. microsoft_ads_get_performance       - Get campaign performance
# 10. microsoft_ads_list_reports        - Generate reports

- slug: microsoft_ads_list_campaigns
  name: List Campaigns
  description: |
    List all campaigns in Microsoft Ads.
    Filter by status, type, or date.
  provider: microsoft-ads
  endpoint: /campaignManagement/v13/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      accountId:
        type: string
        description: "Account ID"
      status:
        type: string
        description: "Filter by status"
    required:
      - accountId

- slug: microsoft_ads_get_campaign
  name: Get Campaign
  description: |
    Get details of a specific campaign.
  provider: microsoft-ads
  endpoint: /campaignManagement/v13/campaigns/{campaignId}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaignId:
        type: integer
        description: "Campaign ID"
      accountId:
        type: string
        description: "Account ID"
    required:
      - campaignId

