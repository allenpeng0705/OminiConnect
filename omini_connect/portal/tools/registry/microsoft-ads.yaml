- slug: microsoft_ads_get_performance
  name: Get Campaign Performance
  description: |
    Get performance metrics for a campaign.
  provider: microsoft-ads
  endpoint: /reporting/v13/reports
  method: GET
  scopes: []
  tags:
    - analytics
    - performance
    - read
  input_schema:
    type: object
    description: Parameters for getting campaign performance
    properties:
      campaignId:
        type: integer
        description: "Campaign ID"
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
