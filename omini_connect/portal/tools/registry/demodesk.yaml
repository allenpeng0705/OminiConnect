# DemoDesk Tools - Allowlist
# Curated subset of the DemoDesk API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. demodesk_list_meetings          - List meetings
# 2. demodesk_get_meeting           - Get meeting details
# 3. demodesk_create_meeting       - Create a meeting
# 4. demodesk_cancel_meeting        - Cancel a meeting
# 5. demodesk_list_rooms            - List meeting rooms
# 6. demodesk_get_room              - Get room details
# 7. demodesk_list_participants     - List participants
# 8. demodesk_get_participant       - Get participant details
# 9. demodesk_list_recordings       - List recordings
# 10. demodesk_get_recording        - Get recording details

- slug: demodesk_list_meetings
  name: List Meetings
  description: |
    List all meetings in DemoDesk.
  provider: demodesk
  endpoint: /meetings
  method: GET
  scopes: []
  tags:
    - meetings
    - video
    - list
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      status:
        type: string
        description: "Filter by status: scheduled, started, ended, cancelled"
    required: []

- slug: demodesk_get_meeting
  name: Get Meeting
  description: |
    Get details of a specific meeting.
  provider: demodesk
  endpoint: /meetings/{meeting_id}
  method: GET
  scopes: []
  tags:
    - meetings
    - video
    - read
  input_schema:
    type: object
    description: Parameters for getting a meeting
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
    required:
      - meeting_id

- slug: demodesk_create_meeting
  name: Create Meeting
  description: |
    Create a new meeting in DemoDesk.
  provider: demodesk
  endpoint: /meetings
  method: POST
  scopes: []
  tags:
    - meetings
    - video
    - create
  input_schema:
    type: object
    description: Parameters for creating a meeting
    properties:
      title:
        type: string
        description: "Meeting title"
      start_time:
        type: string
        description: "Start time (ISO 8601)"
      duration:
        type: integer
        description: "Duration in minutes"
      room_id:
        type: string
        description: "Room ID to use"
    required:
      - title

- slug: demodesk_cancel_meeting
  name: Cancel Meeting
  description: |
    Cancel a scheduled meeting.
  provider: demodesk
  endpoint: /meetings/{meeting_id}
  method: DELETE
  scopes: []
  tags:
    - meetings
    - video
    - cancel
  input_schema:
    type: object
    description: Parameters for cancelling a meeting
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
    required:
      - meeting_id

