# Slab Tools - Allowlist
# Curated subset of Slab API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_posts                               - List all posts
# 2. get_post                                 - Get post details
# 3. create_post                              - Create a new post
# 4. update_post                              - Update a post
# 5. list_topics                              - List all topics
# 6. get_topic                                - Get topic details
# 7. list_members                             - List workspace members
# 8. list_invitations                         - List pending invitations
# 9. create_invitation                        - Invite a member
# 10. get_workspace                            - Get workspace settings

- slug: list_posts
  name: List Posts
  description: |
    List all posts
  provider: slab
  endpoint: /posts
  method: GET
  scopes: []
  tags:
    - posts
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

