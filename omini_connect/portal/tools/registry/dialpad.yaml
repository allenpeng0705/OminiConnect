# Dialpad Tools - Allowlist
# Curated subset of the Dialpad API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. dialpad_list_users                - List users
# 2. dialpad_get_user                - Get user details
# 3. dialpad_list_calls               - List calls
# 4. dialpad_get_call                 - Get call details
# 5. dialpad_list_departments         - List departments
# 6. dialpad_get_department           - Get department details
# 7. dialpad_list_numbers             - List phone numbers
# 8. dialpad_get_number               - Get number details
# 9. dialpad_list_voicemails          - List voicemails
# 10. dialpad_get_voicemail          - Get voicemail details

- slug: dialpad_list_users
  name: List Users
  description: |
    List all users in Dialpad.
  provider: dialpad
  endpoint: /users
  method: GET
  scopes: []
  tags:
    - users
    - directory
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

- slug: dialpad_get_user
  name: Get User
  description: |
    Get details of a specific user.
  provider: dialpad
  endpoint: /users/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - directory
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: dialpad_list_calls
  name: List Calls
  description: |
    List all calls in Dialpad.
  provider: dialpad
  endpoint: /calls
  method: GET
  scopes: []
  tags:
    - calls
    - telephony
    - list
  input_schema:
    type: object
    description: Parameters for listing calls
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      direction:
        type: string
        description: "Filter by direction: inbound, outbound"
      status:
        type: string
        description: "Filter by status: started, ended, missed"
    required: []

