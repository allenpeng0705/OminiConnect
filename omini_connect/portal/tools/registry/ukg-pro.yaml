# UKG Pro Tools - Allowlist
# Curated subset of UKG Pro API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. ukg_list_employees           - List all employees
# # 2. ukg_get_employee           - Get employee details
# # 3. ukg_list_payrolls           - List payroll runs
# # 4. ukg_get_payroll           - Get payroll details
# # 5. ukg_list_time_off           - List time off requests
# # 6. ukg_create_time_off           - Create time off request
# # 7. ukg_list_departments           - List all departments
# # 8. ukg_list_jobs           - List all job positions
# # 9. ukg_get_company_info           - Get company information
# # 10. ukg_list_benefits           - List employee benefits

- slug: ukg_list_employees
  name: List Employees
  description: |
    List all employees
  provider: ukg-pro
  endpoint: /api/v1/employees
  method: GET
  scopes:
    - read
  tags:
    - ukg-pro
  input_schema:
    type: object
    description: Parameters for list employees
    properties: {}
    required: []

- slug: ukg_get_employee
  name: Get Employee
  description: |
    Get employee details
  provider: ukg-pro
  endpoint: /api/v1/employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - ukg-pro
  input_schema:
    type: object
    description: Parameters for get employee
    properties: {}
    required: []

