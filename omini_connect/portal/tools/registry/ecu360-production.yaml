  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      status:
        type: string
        description: "Filter by status: pending, shipped, delivered"
    required: []

