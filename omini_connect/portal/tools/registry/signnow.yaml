# SignNow Tools - Allowlist
# Curated subset of SignNow API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_documents                           - List all documents
# 2. get_document                             - Get document details
# 3. upload_document                          - Upload a document
# 4. download_document                        - Download document PDF
# 5. create_signature_request                 - Create signature request
# 6. list_signature_requests                  - List signature requests
# 7. get_signature_request                    - Get signature request status
# 8. cancel_signature_request                 - Cancel a signature request
# 9. create_folder                            - Create a folder
# 10. list_folders                             - List all folders

- slug: list_documents
  name: List Documents
  description: |
    List all documents
  provider: signnow
  endpoint: /documents
  method: GET
  scopes: []
  tags:
    - documents
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

