- slug: huggingface_create_inference_endpoint
  name: Create Inference Endpoint
  description: |
    Create a dedicated inference endpoint for deploying a model with specified hardware. Returns the endpoint URL and deployment status.
  provider: huggingface
  endpoint: /v1/endpoints
  method: POST
  scopes:
    - write
  tags:
    - inference
  input_schema:
    type: object
    description: Parameters for creating an inference endpoint
    properties:
      model:
        type: string
        description: "The model to deploy"
      repository:
        type: string
        description: "Repository for the endpoint"
      accelerator:
        type: string
        description: "Hardware accelerator (e.g., gpu-t4-medium)"
      instance_size:
        type: string
        description: "Instance size"
      region:
        type: string
        description: "Deployment region"
    required:
      - model
      - repository
      - accelerator

- slug: huggingface_list_inference_endpoints
  name: List Inference Endpoints
  description: |
    List all inference endpoints in the Hugging Face account. Returns endpoint names, status, URLs, and associated models.
  provider: huggingface
  endpoint: /v1/endpoints
  method: GET
  scopes:
    - read
  tags:
    - inference
  input_schema:
    type: object
    description: Parameters for listing inference endpoints
    properties:
      limit:
        type: integer
        description: "Maximum number of endpoints to return"
    required: []

- slug: huggingface_get_inference_endpoint
  name: Get Inference Endpoint
  description: |
    Retrieve detailed information for a specific inference endpoint including status, usage metrics, and scaling configuration.
  provider: huggingface
  endpoint: /v1/endpoints/{endpoint_id}
  method: GET
  scopes:
    - read
  tags:
    - inference
  input_schema:
    type: object
    description: Parameters for retrieving an inference endpoint
    properties:
      endpoint_id:
        type: string
        description: "The endpoint ID"
    required:
      - endpoint_id

- slug: huggingface_delete_inference_endpoint
  name: Delete Inference Endpoint
  description: |
    Delete a specific inference endpoint and release all associated resources. This action cannot be undone.
  provider: huggingface
  endpoint: /v1/endpoints/{endpoint_id}
  method: DELETE
  scopes:
    - write
  tags:
    - inference
  input_schema:
    type: object
    description: Parameters for deleting an inference endpoint
    properties:
      endpoint_id:
        type: string
        description: "The endpoint ID to delete"
    required:
      - endpoint_id
