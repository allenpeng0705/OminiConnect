- slug: huggingface_list_models
  name: List Models
  description: |
    List all available machine learning models on Hugging Face Hub with optional filtering. Returns model names, tasks, downloads, and ratings.
  provider: huggingface
  endpoint: /v1/models
  method: GET
  scopes:
    - read
  tags:
    - models
  input_schema:
    type: object
    description: Parameters for listing models
    properties:
      filter:
        type: string
        description: "Filter models by task type or library"
      sort:
        type: string
        description: "Sort field (e.g., downloads, created_at)"
      direction:
        type: string
        description: "Sort direction (asc or desc)"
      limit:
        type: integer
        description: "Maximum number of models to return"
    required: []

- slug: huggingface_get_model
  name: Get Model
  description: |
    Retrieve detailed information for a specific model including model card, capabilities, hardware requirements, and example code.
  provider: huggingface
  endpoint: /v1/models/{model_id}
  method: GET
  scopes:
    - read
  tags:
    - models
  input_schema:
    type: object
    description: Parameters for retrieving a model
    properties:
      model_id:
        type: string
        description: "The model ID (e.g., meta-llama/Llama-2-7b)"
    required:
      - model_id

