# Groove Tools - Help Desk Platform
# Curated subset of Groove API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. groove_list_conversations      - List conversations
# 2. groove_get_conversation        - Get conversation details
# 3. groove_reply_to_conversation  - Reply to a conversation
# 4. groove_list_customers         - List customers
# 5. groove_get_customer            - Get customer details
# 6. groove_list_agents             - List agents
# 7. groove_get_agent               - Get agent details
# 8. groove_list_macros             - List macros
# 9. groove_get_macro               - Get macro details
# 10. groove_get_reports            - Get reports

- slug: groove_list_conversations
  name: List Conversations
  description: |
    List conversations in Groove. Filter by status, assignee, mailbox, or tag.
  provider: groove
  endpoint: /api/v2/conversations
  method: GET
  scopes:
    - conversations.read
  tags:
    - conversations
    - support
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
        description: "Filter expression (e.g., state='open')"
    required: []

- slug: groove_get_conversation
  name: Get Conversation
  description: |
    Get detailed information about a Groove conversation including messages and assignee.
  provider: groove
  endpoint: /api/v2/conversations/{conversationId}
  method: GET
  scopes:
    - conversations.read
  tags:
    - conversations
    - support
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: string
        description: "The conversation ID"
    required:
      - conversation_id

- slug: groove_reply_to_conversation
  name: Reply to Conversation
  description: |
    Reply to a Groove conversation with a new message. Supports text and HTML.
  provider: groove
  endpoint: /api/v2/conversations/{conversationId}/messages
  method: POST
  scopes:
    - conversations.write
  tags:
    - conversations
    - support
    - write
  input_schema:
    type: object
    description: Parameters for replying to a conversation
    properties:
      conversation_id:
        type: string
        description: "The conversation ID"
      body:
        type: string
        description: "Reply message body (text or HTML)"
      type:
        type: string
        description: "Message type: reply, note, or forward"
        default: reply
    required:
      - conversation_id
      - body

