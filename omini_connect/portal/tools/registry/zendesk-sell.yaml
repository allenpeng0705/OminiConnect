# Zendesk Sell Tools - Allowlist
# Curated subset of Zendesk Sell API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zendesk_list_contacts           - List all contacts
# # 2. zendesk_get_contact           - Get contact details
# # 3. zendesk_create_contact           - Create a new contact
# # 4. zendesk_update_contact           - Update a contact
# # 5. zendesk_list_deals           - List all deals
# # 6. zendesk_get_deal           - Get deal details
# # 7. zendesk_create_deal           - Create a new deal
# # 8. zendesk_list_tasks           - List all tasks
# # 9. zendesk_get_task           - Get task details
# # 10. zendesk_create_task           - Create a new task

- slug: zendesk_list_contacts
  name: List Contacts
  description: |
    List all contacts
  provider: zendesk-sell
  endpoint: /v2/contacts
  method: GET
  scopes:
    - read
  tags:
    - zendesk-sell
  input_schema:
    type: object
    description: Parameters for list contacts
    properties: {}
    required: []

- slug: zendesk_get_contact
  name: Get Contact
  description: |
    Get contact details
  provider: zendesk-sell
  endpoint: /v2/contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - zendesk-sell
  input_schema:
    type: object
    description: Parameters for get contact
    properties: {}
    required: []

- slug: zendesk_create_contact
  name: Create Contact
  description: |
