- slug: auth0_list_users
  name: List Users
  description: |
    Retrieve a list of all users in your Auth0 tenant.
  provider: auth0
  endpoint: /users
  method: GET
  scopes:
    - read:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      q:
        type: string
        description: "Search query string"
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of users per page"
    required: []

- slug: auth0_get_user
  name: Get User
  description: |
    Get details of a specific user by ID.
  provider: auth0
  endpoint: /users/{id}
  method: GET
  scopes:
    - read:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "The user ID"
    required:
      - id

- slug: auth0_create_user
  name: Create User
  description: |
    Create a new user in your Auth0 tenant.
  provider: auth0
  endpoint: /users
  method: POST
  scopes:
    - create:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      email:
        type: string
        description: "User email address"
      password:
        type: string
        description: "User password"
      connection:
        type: string
        description: "Database connection name"
      name:
        type: string
        description: "User display name"
    required:
      - email
      - password
      - connection

- slug: auth0_update_user
  name: Update User
  description: |
    Update an existing user's information.
  provider: auth0
  endpoint: /users/{id}
  method: PATCH
  scopes:
    - update:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      id:
        type: string
        description: "The user ID"
      email:
        type: string
        description: "Updated email address"
      name:
        type: string
        description: "Updated display name"
    required:
      - id

