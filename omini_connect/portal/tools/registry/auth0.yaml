- slug: auth0_get_logs
  name: Get Logs
  description: |
    Retrieve log entries for your Auth0 tenant.
  provider: auth0
  endpoint: /logs
  method: GET
  scopes:
    - read:logs
  tags:
    - logs
  input_schema:
    type: object
    description: Parameters for retrieving logs
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of log entries per page"
      type:
        type: string
        description: "Filter by log type (e.g., failed_login)"
    required: []

- slug: auth0_get_rules
  name: Get Rules
  description: |
    Retrieve all rules configured in your Auth0 tenant.
  provider: auth0
  endpoint: /rules
  method: GET
  scopes:
    - read:rules
  tags:
    - rules
  input_schema:
    type: object
    description: Parameters for getting rules
    properties:
      stage:
        type: string
        description: "Filter rules by stage (login_success, login_failure, etc)"
    required: []