- slug: attach_get_contact
  name: Get Contact
  description: |
    Get detailed information about a specific contact by ID.
  provider: attach
  endpoint: /contacts/{contact_id}
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
  input_schema:
    type: object
