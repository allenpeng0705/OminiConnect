
- slug: attach_list_deals
  name: List Deals
  description: |
    List all deals in the sales pipeline with optional filters by status or owner.
  provider: attach
  endpoint: /deals
  method: GET
  scopes:
    - deals:read
  tags:
    - deals
  input_schema:
    type: object
    description: Parameters for listing deals
    properties:
      status:
        type: string
        description: "Filter deals by status (e.g., open, won, lost)"
      owner_id:
        type: string
        description: "Filter deals by owner ID"
    required: []

- slug: attach_get_deal
  name: Get Deal
  description: |
    Get detailed information about a specific deal including its value, stage, and owner.
  provider: attach
  endpoint: /deals/{deal_id}
  method: GET
  scopes:
    - deals:read
  tags:
    - deals
  input_schema:
    type: object
    description: Parameters for getting a deal
    properties:
      deal_id:
        type: string
        description: "The unique identifier of the deal"
    required:
      - deal_id

- slug: attach_create_deal
  name: Create Deal
  description: |
    Create a new deal in the sales pipeline with a name, value, stage, and owner.
  provider: attach
  endpoint: /deals
  method: POST
  scopes:
    - deals:write
  tags:
    - deals
  input_schema:
    type: object
    description: Parameters for creating a deal
    properties:
      name:
        type: string
        description: "The name of the deal"
      value:
        type: number
        description: "The monetary value of the deal"
      stage:
        type: string
        description: "The sales stage of the deal"
      owner_id:
        type: string
        description: "The ID of the deal owner"
    required:
      - name

- slug: attach_list_contacts
  name: List Contacts
  description: |
    List all contacts with optional filters by company or tags.
  provider: attach
  endpoint: /contacts
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      company_id:
        type: string
        description: "Filter contacts by company ID"
      tags:
        type: string
