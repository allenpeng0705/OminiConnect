- slug: attach_add_contact_to_deal
  name: Add Contact to Deal
  description: |
    Associate a contact with a deal to link them together in the sales pipeline.
  provider: attach
  endpoint: /deals/{deal_id}/contacts
  method: POST
  scopes:
    - deals:write
  tags:
    - deals
    - contacts
  input_schema:
    type: object
    description: Parameters for adding a contact to a deal
    properties:
      deal_id:
        type: string
        description: "The unique identifier of the deal"
      contact_id:
        type: string
        description: "The unique identifier of the contact"
    required:
      - deal_id
      - contact_id

