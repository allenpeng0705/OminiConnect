- slug: attach_send_email
  name: Send Email
  description: |
    Send an email through the sales engagement platform with recipient, subject, and body content.
  provider: attach
  endpoint: /emails
  method: POST
  scopes:
    - emails:write
  tags:
    - email
  input_schema:
    type: object
    description: Parameters for sending an email
    properties:
      to:
        type: string
        description: "The recipient email address"
      subject:
        type: string
        description: "The email subject"
      body:
        type: string
        description: "The email body content"
      deal_id:
        type: string
        description: "Associate email with a deal ID"
    required:
      - to
      - subject
      - body

- slug: attach_track_email_opened
  name: Track Email Opened
  description: |
    Track when an email was opened by the recipient with timestamp.
  provider: attach
  endpoint: /emails/{email_id}/opened
  method: POST
  scopes:
    - emails:read
  tags:
    - email
    - tracking
  input_schema:
    type: object
    description: Parameters for tracking email opens
    properties:
      email_id:
        type: string
        description: "The unique identifier of the sent email"
      opened_at:
        type: string
        description: "Timestamp when the email was opened"
    required:
      - email_id
