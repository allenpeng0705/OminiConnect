- slug: zendesk_list_tickets
  name: List Tickets
  description: |
    Retrieves a paginated list of tickets from Zendesk.
  provider: zendesk
  endpoint: /tickets
  method: GET
  scopes:
    - read
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of results per page (default 100)"
      status:
        type: string
        description: "Filter by status (new, open, pending, hold, solved, closed)"
      sort_by:
        type: string
        description: "Sort field (created_at, updated_at, priority, status)"
      sort_order:
        type: string
        description: "Sort order (asc, desc)"
    required: []

- slug: zendesk_get_ticket
  name: Get Ticket
  description: |
    Retrieves a single ticket by its ID.
  provider: zendesk
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - read
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
    required:
      - id

- slug: zendesk_create_ticket
  name: Create Ticket
  description: |
    Creates a new ticket in Zendesk.
  provider: zendesk
  endpoint: /tickets
  method: POST
  scopes:
    - write
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      subject:
        type: string
        description: "The ticket subject"
      comment:
        type: object
        description: "Ticket comment/body"
      requester_id:
        type: integer
        description: "The requester user ID"
      priority:
        type: string
        description: "Priority (low, normal, high, urgent)"
      tags:
        type: array
        description: "List of tags"
    required:
      - subject
      - comment

- slug: zendesk_update_ticket
  name: Update Ticket
  description: |
    Updates an existing ticket.
  provider: zendesk
  endpoint: /tickets/{id}
  method: PUT
  scopes:
    - write
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for updating a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
      subject:
        type: string
        description: "Updated subject"
      comment:
        type: object
        description: "Additional comment"
      status:
        type: string
        description: "Updated status"
      priority:
        type: string
        description: "Updated priority"
    required:
      - id

