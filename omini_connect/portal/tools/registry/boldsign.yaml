# BoldSign Tools - Allowlist
# Curated subset of BoldSign API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. boldsign_list_documents       - List documents
# 2. boldsign_get_document       - Get document details
# 3. boldsign_create_document    - Create a document for signing
# 4. boldsign_send_document      - Send document for signature
# 5. boldsign_list_templates     - List templates
# 6. boldsign_get_template       - Get template details
# 7. boldsign_list_signers       - List signers
# 8. boldsign_get_signer         - Get signer details
# 9. boldsign_list_teams         - List teams
# 10. boldsign_get_settings       - Get team settings

- slug: boldsign_list_documents
  name: List Documents
  description: |
    List all documents in BoldSign.
  provider: boldsign
  endpoint: /v1/documents
  method: GET
  scopes: []
  tags:
    - documents
    - esignatures
  input_schema:
    type: object
    description: Parameters for listing documents
    properties:
      status:
        type: string
        description: "Filter by status: draft, sent, signed, etc."
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Documents per page"
        default: 20
    required: []

- slug: boldsign_get_document
  name: Get Document
  description: |
    Get details for a specific document.
  provider: boldsign
  endpoint: /v1/documents/{documentId}
  method: GET
  scopes: []
  tags:
    - documents
    - read
  input_schema:
    type: object
    description: Parameters for getting a document
    properties:
      documentId:
        type: string
        description: "Document ID"
    required:
      - documentId

- slug: boldsign_create_document
  name: Create Document
  description: |
    Create a new document for signing.
  provider: boldsign
  endpoint: /v1/documents
  method: POST
  scopes: []
  tags:
    - documents
    - create
  input_schema:
    type: object
    description: Parameters for creating a document
    properties:
      title:
        type: string
        description: "Document title"
      subject:
        type: string
        description: "Email subject"
      signers:
        type: array
        description: "Array of signer objects"
      files:
        type: array
        description: "Array of file URLs or base64 content"
    required:
      - title
      - signers
      - files

- slug: boldsign_send_document
  name: Send Document
  description: |
    Send an existing document for signature.
  provider: boldsign
  endpoint: /v1/documents/{documentId}/send
  method: POST
  scopes: []
  tags:
    - documents
    - send
  input_schema:
    type: object
    description: Parameters for sending a document
    properties:
      documentId:
        type: string
        description: "Document ID"
      signers:
        type: array
        description: "Array of signer objects"
    required:
      - documentId
      - signers

