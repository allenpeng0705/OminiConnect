# Segment Tools - Allowlist
# Curated subset of the Segment APIs for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. segment_list_sources        - List all sources in your workspace
# 2. segment_get_source          - Get details of a specific source
# 3. segment_create_source       - Create a new source
# 4. segment_list_destinations  - List all destinations
# 5. segment_get_destination     - Get details of a specific destination
# 6. segment_list_warehouses    - List all warehouses
# 7. segment_get_warehouse       - Get details of a specific warehouse
# 8. segment_track_event        - Track a customer event
# 9. segment_identify_user      - Identify a user with traits
# 10. segment_list_tracks        - List tracked events

- slug: segment_list_sources
  name: List Sources
  description: |
    List all sources in your Segment workspace.
    Sources are data producers that send events to Segment (websites, apps, servers).
  provider: segment
  endpoint: /workspace/sources
  method: GET
  scopes:
    - sources:read
  tags:
    - sources
    - workspace
  input_schema:
    type: object
    description: Parameters for listing sources
    properties:
      limit:
        type: integer
        description: "Number of sources to return (max 100, default 20)"
        default: 20
      cursor:
        type: string
        description: "Pagination cursor for fetching next page"
    required: []

- slug: segment_get_source
  name: Get Source
  description: |
    Get details of a specific source including its settings, catalog info, and connection status.
    Use this to check source configuration before debugging data flow issues.
  provider: segment
  endpoint: /workspace/sources/{source_id}
  method: GET
  scopes:
    - sources:read
  tags:
    - sources
    - read
  input_schema:
    type: object
    description: Parameters for getting a source
    properties:
      source_id:
        type: string
        description: "Source ID (required)"
    required:
      - source_id

- slug: segment_create_source
  name: Create Source
  description: |
    Create a new source in your Segment workspace.
    Choose from catalog sources like websites, mobile apps, or server-side trackers.
  provider: segment
  endpoint: /workspace/sources
  method: POST
  scopes:
    - sources:write
  tags:
    - sources
    - create
  input_schema:
    type: object
    description: Parameters for creating a source
    properties:
      name:
        type: string
        description: "Source name (required)"
      catalog_name:
        type: string
        description: "Name in the source catalog (e.g., javascript, node, python)"
      workspace_id:
        type: string
        description: "Workspace ID"
    required:
      - name

- slug: segment_list_destinations
  name: List Destinations
  description: |
    List all destinations in your Segment workspace.
    Destinations receive data from your sources and forward it to downstream tools.
  provider: segment
  endpoint: /workspace/destinations
  method: GET
  scopes:
    - destinations:read
  tags:
    - destinations
    - workspace
  input_schema:
    type: object
    description: Parameters for listing destinations
    properties:
      limit:
        type: integer
        description: "Number of destinations to return (max 100, default 20)"
        default: 20
      cursor:
        type: string
        description: "Pagination cursor for fetching next page"
    required: []

- slug: segment_get_destination
  name: Get Destination
  description: |
    Get details of a specific destination including its enabled status, settings, and source mappings.
    Use this to verify destination configuration.
  provider: segment
  endpoint: /workspace/destinations/{destination_id}
  method: GET
  scopes:
    - destinations:read
  tags:
    - destinations
    - read
  input_schema:
    type: object
    description: Parameters for getting a destination
    properties:
      destination_id:
        type: string
        description: "Destination ID (required)"
    required:
      - destination_id

- slug: segment_list_warehouses
  name: List Warehouses
  description: |
    List all warehouses connected to your Segment workspace.
    Warehouses store your event and user data for long-term analysis.
  provider: segment
  endpoint: /workspace/warehouses
  method: GET
  scopes:
    - warehouses:read
  tags:
    - warehouses
    - storage
  input_schema:
    type: object
    description: Parameters for listing warehouses
    properties:
      limit:
        type: integer
        description: "Number of warehouses to return (max 100, default 20)"
        default: 20
      cursor:
        type: string
        description: "Pagination cursor"
    required: []

- slug: segment_get_warehouse
  name: Get Warehouse
  description: |
    Get details of a specific warehouse including connection status, schema, and sync schedule.
    Use this to check warehouse health and configuration.
  provider: segment
  endpoint: /workspace/warehouses/{warehouse_id}
  method: GET
  scopes:
    - warehouses:read
  tags:
    - warehouses
    - read
  input_schema:
    type: object
    description: Parameters for getting a warehouse
    properties:
      warehouse_id:
        type: string
        description: "Warehouse ID (required)"
    required:
      - warehouse_id

- slug: segment_track_event
  name: Track Event
  description: |
    Track a customer event. Events are actions users take in your product.
    Include properties for additional context about the event.
  provider: segment
  endpoint: /track
  method: POST
  scopes:
    - track:write
  tags:
    - events
    - tracking
  input_schema:
    type: object
    description: Parameters for tracking an event
    properties:
      user_id:
        type: string
        description: "Unique user identifier (required)"
      anonymous_id:
        type: string
        description: "Anonymous ID before user logs in"
      event:
        type: string
        description: "Event name (e.g., 'Product Viewed', 'Signed Up')"
      properties:
        type: object
        description: "Additional event properties"
      timestamp:
        type: string
        description: "ISO 8601 timestamp of when the event occurred"
    required:
      - user_id
      - event

- slug: segment_identify_user
  name: Identify User
  description: |
    Identify a user and associate traits with them. This links events to a user profile.
    Use to store user attributes like name, email, and custom properties.
  provider: segment
  endpoint: /identify
  method: POST
  scopes:
    - identify:write
  tags:
    - users
    - identity
  input_schema:
    type: object
    description: Parameters for identifying a user
    properties:
      user_id:
        type: string
        description: "Unique user identifier (required)"
      anonymous_id:
        type: string
        description: "Anonymous ID before user logs in"
      traits:
        type: object
        description: "User traits (email, name, plan, etc.)"
      timestamp:
        type: string
        description: "ISO 8601 timestamp"
    required:
      - user_id

- slug: segment_list_tracks
  name: List Tracks
  description: |
    List tracked events for a user or across your workspace.
    Useful for auditing event history and debugging data pipelines.
  provider: segment
  endpoint: /workspace/trackingplans
  method: GET
  scopes:
    - trackingplans:read
  tags:
    - events
    - tracking
  input_schema:
    type: object
    description: Parameters for listing tracks
    properties:
      user_id:
        type: string
        description: "Filter by user ID"
      limit:
        type: integer
        description: "Number of tracks to return (max 100, default 20)"
        default: 20
      cursor:
        type: string
        description: "Pagination cursor"
    required: []
