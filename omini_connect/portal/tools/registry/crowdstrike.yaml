# CrowdStrike Tools - Allowlist
# Curated subset of the CrowdStrike API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. crowdstrike_list_hosts               - List hosts/devices
# 2. crowdstrike_get_host                 - Get host details
# 3. crowdstrike_list_vulnerabilities      - List vulnerabilities
# 4. crowdstrike_get_vulnerability        - Get vulnerability details
# 5. crowdstrike_list_incidents           - List incidents
# 6. crowdstrike_get_incident             - Get incident details
# 7. crowdstrike_list_detection_summaries  - List detection summaries
# 8. crowdstrike_get_detection            - Get detection details
# 9. crowdstrike_list_actors              - List threat actors
# 10. crowdstrike_list_policies           - List prevention policies

- slug: crowdstrike_list_hosts
  name: List Hosts
  description: |
    List all hosts (devices) in the CrowdStrike environment. Returns host IDs, names, statuses, operating systems, and security posture information for each host.
  provider: crowdstrike
  endpoint: /devices/entities/devices/v1
  method: GET
  scopes: []
  tags:
    - hosts
    - devices
    - endpoint
    - list
  input_schema:
    type: object
    description: Parameters for listing hosts
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 5000)"
        default: 50
      offset:
        type: string
        description: "Pagination offset"
      filter:
        type: string
        description: "FQL filter string"
    required: []

- slug: crowdstrike_get_host
  name: Get Host
  description: |
    Get detailed information for a specific CrowdStrike host by its ID. Returns the host name, operating system, security status, installed software, and vulnerability count.
  provider: crowdstrike
  endpoint: /devices/entities/devices/v1
  method: GET
  scopes: []
  tags:
    - hosts
    - devices
    - endpoint
    - read
  input_schema:
    type: object
    description: Parameters for getting a host
    properties:
      ids:
        type: array
        items:
          type: string
        description: "Host IDs"
    required:
      - ids

- slug: crowdstrike_list_vulnerabilities
  name: List Vulnerabilities
  description: |
    List all vulnerabilities detected across CrowdStrike endpoints. Returns vulnerability IDs, severity levels, CVE codes, affected hosts, and remediation status for each vulnerability.
  provider: crowdstrike
  endpoint: /vulnerabilities/entities/vulnerabilities/v2
  method: GET
  scopes: []
  tags:
    - vulnerabilities
    - security
    - list
  input_schema:
    type: object
    description: Parameters for listing vulnerabilities
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 500)"
        default: 50
      filter:
        type: string
        description: "FQL filter string"
    required: []

- slug: crowdstrike_get_vulnerability
  name: Get Vulnerability
  description: |
    Get detailed information for a specific CrowdStrike vulnerability by its ID. Returns the vulnerability description, severity, affected hosts, CVE details, and remediation recommendations.
  provider: crowdstrike
  endpoint: /vulnerabilities/entities/vulnerabilities/v2
  method: GET
  scopes: []
  tags:
    - vulnerabilities
    - security
    - read
  input_schema:
    type: object
    description: Parameters for getting a vulnerability
    properties:
      ids:
        type: array
        items:
          type: string
        description: "Vulnerability IDs"
    required:
      - ids

- slug: crowdstrike_list_incidents
  name: List Incidents
