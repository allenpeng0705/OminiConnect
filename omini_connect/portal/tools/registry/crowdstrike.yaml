  name: List Threat Actors
  description: |
    List all known threat actors in CrowdStrike intelligence. Returns actor IDs, names, associated malware families, known aliases, and indicators of compromise for each actor.
  provider: crowdstrike
  endpoint: /intel/entities/actors/v1
  method: GET
  scopes: []
  tags:
    - threat-intel
    - actors
    - list
  input_schema:
    type: object
    description: Parameters for listing actors
    properties:
      limit:
        type: integer
