- slug: crowdstrike_list_policies
  name: List Prevention Policies
  description: |
    List all prevention policies for CrowdStrike endpoint protection. Returns policy IDs, names, policy types, settings, and assignment rules for each policy.
  provider: crowdstrike
  endpoint: /policy/entities/policies/v1
  method: GET
  scopes: []
  tags:
    - policies
    - prevention
    - list
  input_schema:
    type: object
    description: Parameters for listing policies
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
      policy_type:
        type: string
        description: "Policy type: prevention, sensor_update"
        default: prevention
    required: []
