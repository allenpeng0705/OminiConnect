    List all CrowdStrike incidents with pagination support. Returns incident IDs, severity levels, status, assigned user, and affected host counts for each incident.
  provider: crowdstrike
  endpoint: /incidents/entities/incidents/v1
  method: GET
  scopes: []
  tags:
    - incidents
    - security
    - list
  input_schema:
    type: object
    description: Parameters for listing incidents
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
      filter:
        type: string
        description: "FQL filter string"
    required: []

- slug: crowdstrike_get_incident
  name: Get Incident
  description: |
    Get detailed information for a specific CrowdStrike incident by its ID. Returns the incident description, severity, timeline, affected hosts, and security findings with remediation guidance.
  provider: crowdstrike
  endpoint: /incidents/entities/incidents/v1
