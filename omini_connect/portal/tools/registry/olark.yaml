- slug: olark_add_note
  name: Add Note
  description: |
    Add a note to an existing conversation for internal operator annotations.
    Returns the created note confirmation with timestamp.
    This creates internal documentation for customer interactions.
  provider: olark
  endpoint: /conversations/{conversation_id}/notes
  method: POST
  scopes:
    - write
  tags:
    - conversations
    - notes
  input_schema:
    type: object
    description: Parameters for adding a note
    properties:
      conversation_id:
        type: string
        description: "Conversation ID"
      body:
        type: string
        description: "Note content"
      author_id:
        type: string
        description: "Operator ID adding the note"
    required:
      - conversation_id
      - body
