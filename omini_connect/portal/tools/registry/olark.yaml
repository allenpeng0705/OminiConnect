# Olark Tools - Allowlist
# Curated subset of Olark REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. olark_list_conversations - List chat conversations
# 2. olark_get_conversation   - Get conversation details
# 3. olark_send_message       - Send a message in a conversation
# 4. olark_list_visitors      - List all chat visitors
# 5. olark_get_visitor        - Get visitor details
# 6. olark_list_operators     - List all operators
# 7. olark_get_operator       - Get operator details
# 8. olark_list_chats         - List all chats
# 9. olark_get_chat           - Get chat details
# 10. olark_add_note          - Add a note to a conversation

- slug: olark_list_conversations
  name: List Conversations
  description: |
    List all chat conversations in your Olark account with pagination and filtering.
    Returns conversation IDs, statuses, and latest messages for each conversation.
    Use this to discover customer chats and manage support workflows.
  provider: olark
  endpoint: /conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - list
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status (open, closed, all)"
        default: all
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: olark_get_conversation
  name: Get Conversation
  description: |
    Get detailed information about a specific conversation including all messages.
    Returns the complete conversation data with all associated information.
    This provides full conversation data for customer support management.
  provider: olark
  endpoint: /conversations/{conversation_id}
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: string
        description: "Conversation ID"
    required:
      - conversation_id

- slug: olark_send_message
  name: Send Message
  description: |
    Send a message in an active chat conversation to respond to visitors.
    Returns the sent message confirmation with delivery status.
    This sends operator responses across all chat channels.
  provider: olark
  endpoint: /conversations/{conversation_id}/messages
  method: POST
  scopes:
    - write
  tags:
    - messages
    - conversations
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      conversation_id:
        type: string
        description: "Conversation ID"
      body:
        type: string
        description: "Message text"
      author_id:
        type: string
        description: "Operator ID sending the message"
    required:
      - conversation_id
      - body

