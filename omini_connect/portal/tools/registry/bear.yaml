# Bear Tools - Allowlist
# Curated subset of Bear API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bear_list_notes          - List notes
# 2. bear_get_note            - Get note details
# 3. bear_create_note        - Create a note
# 4. bear_update_note        - Update a note
# 5. bear_delete_note        - Delete a note
# 6. bear_list_tags          - List tags
# 7. bear_get_tag            - Get tag details
# 8. bear_search_notes       - Search notes
# 9. bear_list_resources     - List resources
# 10. bear_get_resource      - Get resource details

- slug: bear_list_notes
  name: List Notes
  description: |
    List notes with optional filtering by tag, search term, or archive status. Returns note IDs, titles, tags, and modification dates for each note.
  provider: bear
  endpoint: /notes
  method: GET
  scopes:
    - read
  tags:
    - notes
    - list
  input_schema:
    type: object
    description: Parameters for listing notes
    properties:
      tag:
        type: string
        description: "Filter by tag name"
      search:
        type: string
        description: "Search term to filter notes"
      archived:
        type: boolean
        description: "Include archived notes (default false)"
        default: false
      limit:
        type: integer
        description: "Max results (default 100)"
        default: 100
    required: []

- slug: bear_get_note
  name: Get Note
  description: |
    Retrieve full content and metadata of a specific Bear note. Returns the note title, content, tags, color, and creation/modification dates.
  provider: bear
  endpoint: /notes/{note_id}
  method: GET
  scopes:
    - read
  tags:
    - notes
    - read
  input_schema:
    type: object
    description: Parameters for getting a note
    properties:
      note_id:
        type: string
        description: "Note ID"
    required:
      - note_id

- slug: bear_create_note
  name: Create Note
  description: |
    Create a new note with title, content, and tags. Returns the created note with its unique identifier.
  provider: bear
  endpoint: /notes
  method: POST
  scopes:
    - write
  tags:
    - notes
    - create
  input_schema:
    type: object
    description: Parameters for creating a note
    properties:
      title:
        type: string
        description: "Note title"
      content:
        type: string
        description: "Note content (supports markdown)"
      tags:
        type: array
        items:
          type: string
        description: "Array of tag names"
      color:
        type: string
        description: "Note color (e.g., 'red', 'orange', 'yellow', 'green', 'blue', 'purple', 'pink', 'gray')"
    required:
      - title
      - content

- slug: bear_update_note
  name: Update Note
  description: |
    Update an existing Bear note's title, content, tags, or color. Returns the updated note confirming changes.
  provider: bear
  endpoint: /notes/{note_id}
  method: PUT
  scopes:
    - write
  tags:
    - notes
    - update
  input_schema:
    type: object
    description: Parameters for updating a note
    properties:
      note_id:
        type: string
        description: "Note ID"
      title:
        type: string
        description: "New note title"
      content:
        type: string
        description: "New note content"
      tags:
        type: array
        items:
          type: string
        description: "Array of tag names"
      color:
        type: string
        description: "New note color"
    required:
      - note_id

- slug: bear_delete_note
  name: Delete Note
  description: |
    Delete a Bear note by moving it to archive and then permanent trash after 30 days. Returns confirmation of the deletion.
  provider: bear
  endpoint: /notes/{note_id}
  method: DELETE
  scopes:
    - write
  tags:
    - notes
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a note
    properties:
      note_id:
        type: string
        description: "Note ID"
    required:
      - note_id

- slug: bear_list_tags
  name: List Tags
  description: |
    List all tags in the user's Bear account. Returns tag names and note counts for each tag.
  provider: bear
  endpoint: /tags
  method: GET
  scopes:
    - read
  tags:
    - tags
    - list
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: bear_get_tag
  name: Get Tag
  description: |
    Retrieve details about a specific tag including its name and associated note count. Returns the complete tag information.
  provider: bear
  endpoint: /tags/{tag_id}
  method: GET
  scopes:
    - read
  tags:
    - tags
    - read
  input_schema:
    type: object
    description: Parameters for getting a tag
    properties:
      tag_id:
        type: string
        description: "Tag identifier (name or ID)"
    required:
      - tag_id

- slug: bear_search_notes
  name: Search Notes
  description: |
    Search notes by keyword across title and content with optional tag filtering. Returns matching note IDs, titles, and snippets.
  provider: bear
  endpoint: /notes/search
  method: GET
  scopes:
    - read
  tags:
    - notes
    - search
  input_schema:
    type: object
    description: Parameters for searching notes
    properties:
      term:
        type: string
        description: "Search term"
      tag:
        type: string
        description: "Limit search to specific tag"
      limit:
        type: integer
        description: "Max results (default 100)"
        default: 100
    required:
      - term

- slug: bear_list_resources
  name: List Resources
  description: |
    List all resources such as images and files attached to a note. Returns resource IDs, types, and file names for each resource.
  provider: bear
  endpoint: /notes/{note_id}/resources
  method: GET
  scopes:
    - read
  tags:
    - resources
    - list
  input_schema:
    type: object
    description: Parameters for listing resources
    properties:
      note_id:
        type: string
        description: "Note ID"
    required:
      - note_id

- slug: bear_get_resource
  name: Get Resource
  description: |
    Retrieve details about a specific resource including its type, file name, and download URL. Returns the complete resource metadata.
  provider: bear
  endpoint: /resources/{resource_id}
  method: GET
  scopes:
    - read
  tags:
    - resources
    - read
  input_schema:
    type: object
    description: Parameters for getting a resource
    properties:
      resource_id:
        type: string
        description: "Resource ID"
    required:
      - resource_id
