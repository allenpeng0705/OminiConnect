
- slug: apify_list_actors
  name: List Actors
  description: |
    List all actors in your Apify account with pagination.
  provider: apify
  endpoint: /actors
  method: GET
  scopes:
    - actor:read
  tags:
    - actors
  input_schema:
    type: object
    description: Parameters for listing actors
    properties:
      limit:
        type: integer
        description: "Maximum number of actors to return"
      offset:
        type: integer
        description: "Number of actors to skip"
    required: []

- slug: apify_get_actor
  name: Get Actor
  description: |
    Get details of a specific actor by ID or name.
  provider: apify
  endpoint: /acts/{actorId}
  method: GET
  scopes:
    - actor:read
  tags:
    - actors
  input_schema:
    type: object
    description: Parameters for getting an actor
    properties:
      actorId:
        type: string
        description: "Actor ID or name"
    required:
      - actorId

- slug: apify_start_actor_run
  name: Start Actor Run
  description: |
    Start a new run of an actor with optional input and build tag.
  provider: apify
  endpoint: /acts/{actorId}/runs
  method: POST
  scopes:
    - actor:write
  tags:
    - actors
  input_schema:
    type: object
    description: Parameters for starting an actor run
    properties:
      actorId:
        type: string
        description: "Actor ID or name"
      input:
        type: object
        description: "Input JSON object for the actor"
      build:
        type: string
        description: "Actor build tag or version"
    required:
      - actorId

- slug: apify_get_run
  name: Get Run
  description: |
    Get details and status of a specific actor run.
  provider: apify
  endpoint: /actor-runs/{runId}
  method: GET
  scopes:
    - actor:read
  tags:
    - runs
  input_schema:
    type: object
    description: Parameters for getting a run
    properties:
      runId:
        type: string
        description: "The run ID"
    required:
      - runId

