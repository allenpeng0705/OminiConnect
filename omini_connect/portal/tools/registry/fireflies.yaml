# Fireflies Tools - Allowlist
# Curated subset of Fireflies API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fireflies_list_transcripts    - List transcripts
# 2. fireflies_get_transcript     - Get transcript details
# 3. fireflies_list_users        - List team members
# 4. fireflies_get_user          - Get user details
# 5. fireflies_list_meetings     - List meetings
# 6. fireflies_get_meeting       - Get meeting details
# 7. fireflies_list_summaries    - List AI summaries
# 8. fireflies_search_transcript - Search transcripts
# 9. fireflies_list_analytics   - List analytics
# 10. fireflies_get_overview    - Get analytics overview

- slug: fireflies_list_transcripts
  name: List Transcripts
  description: |
    List all meeting transcripts.
  provider: fireflies
  endpoint: /api/v1/transcripts
  method: GET
  scopes: []
  tags:
    - transcripts
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for listing transcripts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fireflies_get_transcript
  name: Get Transcript
  description: |
    Get details of a specific transcript.
  provider: fireflies
  endpoint: /api/v1/transcripts/{id}
  method: GET
  scopes: []
  tags:
    - transcripts
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for getting transcript
    properties:
      id:
        type: string
        description: "Transcript ID"
    required:
      - id

