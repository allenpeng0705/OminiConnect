# Shopify Tools - Allowlist
# Curated subset of Shopify REST Admin API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. shopify_list_orders        - List orders
# 2. shopify_get_order         - Get order details
# 3. shopify_create_order      - Create an order
# 4. shopify_list_products     - List products
# 5. shopify_get_product       - Get product details
# 6. shopify_create_product    - Create a product
# 7. shopify_list_customers    - List customers
# 8. shopify_get_customer      - Get customer details
# 9. shopify_list_fulfillments - List fulfillments
# 10. shopify_get_fulfillment  - Get fulfillment details

- slug: shopify_list_orders
  name: List Orders
  description: |
    List all orders in the Shopify store with pagination and optional status filtering. Returns order IDs, customer names, financial statuses, fulfillment statuses, and order dates for order management.
  provider: shopify
  endpoint: /admin/api/2024-01/orders.json
  method: GET
  scopes:
    - read_orders
  tags:
    - orders
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, cancelled, any"
      created_at_min:
        type: string
        description: "ISO 8601 date-time to filter orders created after this time"
      limit:
        type: integer
        description: "Maximum number of orders to return (default 50, max 250)"
    required: []

- slug: shopify_get_order
  name: Get Order
  description: |
    Get detailed information about a specific Shopify order by ID including line items, customer details, shipping address, financial status, and payment information. Returns data for order management and fulfillment tracking.
  provider: shopify
  endpoint: /admin/api/2024-01/orders/{order_id}.json
  method: GET
  scopes:
    - read_orders
  tags:
    - orders
    - read
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      order_id:
        type: integer
        description: "Unique identifier of the order"
      fields:
        type: string
        description: "Comma-separated list of fields to include in response"
    required:
      - order_id

- slug: shopify_create_order
  name: Create Order
  description: |
    Create a new order in Shopify with line items, customer, and shipping address. Returns the created order with its ID and status for fulfillment processing and order tracking.
  provider: shopify
  endpoint: /admin/api/2024-01/orders.json
  method: POST
  scopes:
    - write_orders
  tags:
    - orders
    - create
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      line_items:
        type: array
        description: "Array of line item objects with variant_id and quantity"
      customer_id:
        type: integer
        description: "ID of the customer placing the order"
      shipping_address:
        type: object
        description: "Shipping address object with address fields"
      financial_status:
        type: string
        description: "pending, authorized, paid"
    required:
      - line_items

- slug: shopify_list_products
  name: List Products
  description: |
    List all products in the Shopify store with pagination and optional filtering by status, product type, or collection. Returns product IDs, titles, descriptions, vendors, types, and pricing information for catalog management.
  provider: shopify
  endpoint: /admin/api/2024-01/products.json
  method: GET
  scopes:
    - read_products
  tags:
    - products
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      status:
        type: string
        description: "Filter by status: active, archived, draft"
      product_type:
        type: string
        description: "Filter by product type"
      collection_id:
        type: integer
        description: "Filter by collection ID"
      limit:
        type: integer
        description: "Maximum number of products to return (default 50, max 250)"
    required: []

- slug: shopify_get_product
  name: Get Product
  description: |
    Get detailed information about a specific Shopify product by ID including title, description, variants, images, pricing, inventory levels, and SEO information. Returns data for catalog management and inventory tracking.
  provider: shopify
  endpoint: /admin/api/2024-01/products/{product_id}.json
  method: GET
  scopes:
    - read_products
  tags:
    - products
    - read
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      product_id:
        type: integer
        description: "Unique identifier of the product"
      fields:
        type: string
        description: "Comma-separated list of fields to include in response"
    required:
      - product_id

- slug: shopify_create_product
  name: Create Product
  description: |
    Create a new product in Shopify with title, description, vendor, product type, and variants. Returns the created product with its ID and status for inventory and catalog management.
  provider: shopify
  endpoint: /admin/api/2024-01/products.json
  method: POST
  scopes:
    - write_products
  tags:
    - products
    - create
  input_schema:
    type: object
    description: Parameters for creating a product
    properties:
      title:
        type: string
        description: "Product title"
      body_html:
        type: string
        description: "Product description in HTML format"
      vendor:
        type: string
        description: "Vendor name"
      product_type:
        type: string
        description: "Product type category"
      variants:
        type: array
        description: "Array of variant objects with price and inventory"
    required:
      - title

- slug: shopify_list_customers
  name: List Customers
  description: |
    List all customers in the Shopify store with pagination and optional filtering by email or tags. Returns customer IDs, names, email addresses, and tags for CRM management and customer segmentation.
  provider: shopify
  endpoint: /admin/api/2024-01/customers.json
  method: GET
  scopes:
    - read_customers
  tags:
    - customers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      email:
        type: string
        description: "Filter by customer email address"
      tags:
        type: string
        description: "Filter by customer tags (comma-separated)"
      limit:
        type: integer
        description: "Maximum number of customers to return (default 50, max 250)"
    required: []

- slug: shopify_get_customer
  name: Get Customer
  description: |
    Get detailed information about a specific Shopify customer by ID including name, email, addresses, order history, and tags. Returns data for customer relationship management and order tracking.
  provider: shopify
  endpoint: /admin/api/2024-01/customers/{customer_id}.json
  method: GET
  scopes:
    - read_customers
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: integer
        description: "Unique identifier of the customer"
      fields:
        type: string
        description: "Comma-separated list of fields to include in response"
    required:
      - customer_id

- slug: shopify_list_fulfillments
  name: List Fulfillments
  description: |
    List all fulfillments for a Shopify order with pagination. Returns fulfillment IDs, tracking numbers, carrier names, shipment statuses, and fulfillment dates for shipment tracking and logistics management.
  provider: shopify
  endpoint: /admin/api/2024-01/orders/{order_id}/fulfillments.json
  method: GET
  scopes:
    - read_fulfillments
  tags:
    - fulfillment
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing fulfillments
    properties:
      order_id:
        type: integer
        description: "Unique identifier of the order"
    required:
      - order_id

- slug: shopify_get_fulfillment
  name: Get Fulfillment
  description: |
    Get detailed information about a specific Shopify fulfillment by ID including tracking number, carrier, shipment status, tracking events, and estimated delivery date. Returns data for shipment tracking and delivery confirmation.
  provider: shopify
  endpoint: /admin/api/2024-01/orders/{order_id}/fulfillments/{fulfillment_id}.json
  method: GET
  scopes:
    - read_fulfillments
  tags:
    - fulfillment
    - read
  input_schema:
    type: object
    description: Parameters for getting a fulfillment
    properties:
      order_id:
        type: integer
        description: "Unique identifier of the order"
      fulfillment_id:
        type: integer
        description: "Unique identifier of the fulfillment"
    required:
      - order_id
      - fulfillment_id
