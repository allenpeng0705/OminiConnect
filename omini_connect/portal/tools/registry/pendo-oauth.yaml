# Pendo OAuth Tools - Allowlist
# Curated subset of Pendo API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.
# NOTE: pendo-oauth uses the same API endpoints as pendo - only auth is different.

# === TOOL LIST ===
# 1. pendo_oauth_list_features       - List features
# 2. pendo_oauth_get_feature         - Get feature details
# 3. pendo_oauth_list_events         - List events
# 4. pendo_oauth_get_event           - Get event details
# 5. pendo_oauth_list_pages          - List pages
# 6. pendo_oauth_get_page            - Get page details
# 7. pendo_oauth_list_guides         - List guides
# 8. pendo_oauth_get_guide           - Get guide details
# 9. pendo_oauth_list_users          - List users
# 10. pendo_oauth_get_user           - Get user details

- slug: pendo_oauth_list_features
  name: List Features
  description: |
    Retrieve all product features including feature names, keys, and configuration details for tracking user engagement.
  provider: pendo-oauth
  endpoint: /api/v1/features
  method: GET
  scopes:
    - read:me
  tags:
    - features
    - list
  input_schema:
    type: object
    description: Parameters for listing features
    properties:
      productId:
        type: string
        description: "Product ID to filter by"
    required: []

- slug: pendo_oauth_get_feature
  name: Get Feature
  description: |
    Retrieve detailed information about a specific feature including its configuration, metadata, and usage statistics.
  provider: pendo-oauth
  endpoint: /api/v1/features/{featureId}
  method: GET
  scopes:
    - read:me
  tags:
    - features
    - read
  input_schema:
    type: object
    description: Parameters for getting a feature
    properties:
      featureId:
        type: string
        description: "Feature ID"
    required:
      - featureId

- slug: pendo_oauth_list_events
  name: List Events
  description: |
    Retrieve all events tracked in your Pendo product including event names, timestamps, and visitor associations.
  provider: pendo-oauth
  endpoint: /api/v1/events
  method: GET
  scopes:
    - read:me
  tags:
    - events
    - list
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      productId:
        type: string
        description: "Product ID to filter by"
      pageSize:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
    required: []

- slug: pendo_oauth_get_event
  name: Get Event
  description: |
    Retrieve detailed information about a specific event including its properties, timestamp, and visitor context.
  provider: pendo-oauth
  endpoint: /api/v1/events/{eventId}
