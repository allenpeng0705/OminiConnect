# Zoho Tools - Allowlist
# Curated subset of Zoho API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_list_records           - List all CRM records
# # 2. zoho_get_record           - Get record details
# # 3. zoho_create_record           - Create a new record
# # 4. zoho_update_record           - Update a record
# # 5. zoho_delete_record           - Delete a record
# # 6. zoho_list_deals           - List all deals
# # 7. zoho_get_deal           - Get deal details
# # 8. zoho_create_deal           - Create a new deal
# # 9. zoho_list_tasks           - List all tasks
# # 10. zoho_create_task           - Create a new task

- slug: zoho_list_records
  name: List Records
  description: |
    Retrieve all CRM contact records in Zoho with pagination support. Returns record IDs, names, email addresses, and phone numbers for each contact.
  provider: zoho
  endpoint: /crm/v2.1/contacts
  method: GET
  scopes:
    - read
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for list records
    properties: {}
    required: []

- slug: zoho_get_record
  name: Get Record
  description: |
    Retrieve detailed information about a specific contact record by their unique ID. Returns the contact name, email, phone, address, and all custom field values.
  provider: zoho
  endpoint: /crm/v2.1/contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for get record
    properties: {}
    required: []

- slug: zoho_create_record
  name: Create Record
  description: |
    Create a new contact record in Zoho CRM with name, email, phone, and custom field values. Returns the created record with its unique ID.
  provider: zoho
  endpoint: /crm/v2.1/contacts
  method: POST
  scopes:
    - write
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for create record
    properties: {}
    required: []

- slug: zoho_update_record
  name: Update Record
  description: |
    Modify an existing contact record with new field values. Returns the updated record confirming the changes made.
  provider: zoho
  endpoint: /crm/v2.1/contacts/{id}
  method: PUT
  scopes:
    - write
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for update record
    properties: {}
    required: []

- slug: zoho_delete_record
  name: Delete Record
  description: |
    Permanently remove a specific contact record from Zoho CRM by its unique ID. Returns confirmation of successful deletion.
  provider: zoho
  endpoint: /crm/v2.1/contacts/{id}
  method: DELETE
  scopes:
    - write
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for delete record
    properties: {}
    required: []

- slug: zoho_list_deals
  name: List Deals
  description: |
    Retrieve all deals in Zoho CRM with pagination support. Returns deal names, IDs, amounts, stages, and owner information for each deal.
  provider: zoho
  endpoint: /crm/v2.1/deals
  method: GET
  scopes:
    - read
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for list deals
    properties: {}
    required: []

- slug: zoho_get_deal
  name: Get Deal
  description: |
    Retrieve detailed information about a specific deal by its unique ID. Returns the deal name, amount, stage, expected close date, and associated contacts.
  provider: zoho
  endpoint: /crm/v2.1/deals/{id}
  method: GET
  scopes:
    - read
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for get deal
    properties: {}
    required: []

- slug: zoho_create_deal
  name: Create Deal
  description: |
    Create a new deal in Zoho CRM with name, amount, stage, and expected close date. Returns the created deal with its unique ID.
  provider: zoho
  endpoint: /crm/v2.1/deals
  method: POST
  scopes:
    - write
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for create deal
    properties: {}
    required: []

- slug: zoho_list_tasks
  name: List Tasks
  description: |
    Retrieve all tasks in Zoho CRM with pagination support. Returns task titles, IDs, statuses, due dates, and assignee information for each task.
  provider: zoho
  endpoint: /crm/v2.1/tasks
  method: GET
  scopes:
    - read
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for list tasks
    properties: {}
    required: []

- slug: zoho_create_task
  name: Create Task
  description: |
    Create a new task in Zoho CRM with title, description, due date, and assignee. Returns the created task with its unique ID.
  provider: zoho
  endpoint: /crm/v2.1/tasks
  method: POST
  scopes:
    - write
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for create task
    properties: {}
    required: []

