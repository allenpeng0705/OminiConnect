# Zoho Tools - Allowlist
# Curated subset of Zoho API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_list_records           - List all CRM records
# # 2. zoho_get_record           - Get record details
# # 3. zoho_create_record           - Create a new record
# # 4. zoho_update_record           - Update a record
# # 5. zoho_delete_record           - Delete a record
# # 6. zoho_list_deals           - List all deals
# # 7. zoho_get_deal           - Get deal details
# # 8. zoho_create_deal           - Create a new deal
# # 9. zoho_list_tasks           - List all tasks
# # 10. zoho_create_task           - Create a new task

- slug: zoho_list_records
  name: List Records
  description: |
    List all CRM records
  provider: zoho
  endpoint: /crm/v2.1/contacts
  method: GET
  scopes:
    - read
  tags:
    - zoho
  input_schema:
    type: object
    description: Parameters for list records
    properties: {}
    required: []

