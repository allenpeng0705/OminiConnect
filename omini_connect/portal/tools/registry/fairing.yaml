    List all referral data in Fairing with optional date filtering. Returns referral sources, conversion rates, customer attributions, and referral codes.
  provider: fairing
  endpoint: /referrals
  method: GET
  scopes: []
  tags:
    - referrals
    - marketing
    - read
  input_schema:
    type: object
