# Fairing Tools - Allowlist
# Curated subset of Fairing API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fairing_list_questions        - List questions
# 2. fairing_get_question         - Get question details
# 3. fairing_list_surveys         - List surveys
# 4. fairing_get_survey          - Get survey details
# 5. fairing_list_responses      - List responses
# 6. fairing_get_response       - Get response details
# 7. fairing_list_referrals      - List referrals
# 8. fairing_get_stats          - Get survey statistics
# 9. fairing_list_sources       - List traffic sources
# 10. fairing_get_overlay      - Get overlay settings

- slug: fairing_list_questions
  name: List Questions
  description: |
    List all survey questions.
  provider: fairing
  endpoint: /questions
  method: GET
  scopes: []
  tags:
    - questions
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for listing questions
    properties:
      survey_id:
        type: string
        description: "Filter by survey ID"
    required: []

- slug: fairing_get_question
  name: Get Question
  description: |
    Get details of a specific question.
  provider: fairing
  endpoint: /questions/{id}
  method: GET
  scopes: []
  tags:
    - questions
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for getting question
    properties:
      id:
        type: string
        description: "Question ID"
    required:
      - id

