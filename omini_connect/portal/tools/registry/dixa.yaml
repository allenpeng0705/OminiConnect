- slug: dixa_list_conversations
  name: List Conversations
  description: |
    Retrieve all conversations with optional status and date filters.
  provider: dixa
  endpoint: /v1/conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, pending"
      from_date:
        type: string
        description: "Filter from date (ISO 8601)"
      to_date:
        type: string
        description: "Filter to date (ISO 8601)"
      page_size:
        type: integer
        description: "Number of results per page"
        default: 50
      page_token:
        type: string
        description: "Pagination token"

- slug: dixa_get_conversation
  name: Get Conversation
  description: |
    Get details of a specific conversation including messages.
  provider: dixa
  endpoint: /v1/conversations/{id}
  method: GET
  scopes:
    - read
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      id:
        type: string
        description: "The conversation ID"
    required:
      - id

- slug: dixa_create_conversation
  name: Create Conversation
  description: |
    Create a new conversation with an initial message.
  provider: dixa
  endpoint: /v1/conversations
  method: POST
  scopes:
    - write
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      channel:
        type: string
        description: "Channel type: email, chat, facebook, twitter"
      contact_id:
        type: string
        description: "The contact ID"
      message:
        type: object
        description: "Initial message object"
      priority:
        type: string
        description: "Priority: normal, high"
    required:
      - channel
      - contact_id

