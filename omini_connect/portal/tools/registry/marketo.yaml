- slug: marketo_get_program
  name: Get Program
  description: |
    Retrieve detailed information about a specific Marketo program by its ID. Returns the program name, channel, status, member count, and associated campaigns.
  provider: marketo
  endpoint: /rest/v1/programs/{id}.json
