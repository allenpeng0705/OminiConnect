# Marketo Tools - Allowlist
# Curated subset of Marketo API for AI agent use.
# OAUTH2_CC via Nango (Client Credentials).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. marketo_list_leads          - List leads
# 2. marketo_get_lead            - Get lead details
# 3. marketo_create_lead        - Create a lead
# 4. marketo_update_lead        - Update a lead
# 5. marketo_list_campaigns     - List marketing campaigns
# 6. marketo_get_campaign       - Get campaign details
# 7. marketo_list_activities    - List activities
# 8. marketo_list_programs      - List programs
# 9. marketo_get_program        - Get program details
# 10. marketo_list_lists        - List static lists

- slug: marketo_list_leads
  name: List Leads
  description: |
    List all leads in your Marketo database with optional filtering by segment, source, or search terms. Returns lead names, email addresses, company information, and scoring data.
  provider: marketo
  endpoint: /rest/v1/leads.json
  method: GET
  scopes: []
  tags:
    - leads
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      filter_type:
        type: string
        description: "Field to filter by (email, id, etc.)"
      filter_values:
        type: string
        description: "Comma-separated filter values"
      fields:
        type: string
        description: "Fields to return"
      page:
        type: integer
        description: "Page number"
        default: 1
      maxReturn:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: marketo_get_lead
  name: Get Lead
  description: |
    Retrieve detailed information about a specific Marketo lead by their ID. Returns the lead name, email, company, phone, and all associated activity data.
  provider: marketo
  endpoint: /rest/v1/leads/{id}.json
  method: GET
  scopes: []
  tags:
    - leads
    - read
  input_schema:
    type: object
    description: Parameters for getting a lead
    properties:
      id:
        type: integer
        description: "Lead ID"
      fields:
        type: string
        description: "Fields to return"
    required:
      - id

- slug: marketo_create_lead
  name: Create Lead
  description: |
    Create a new lead in Marketo with the specified email address and optional contact details. Returns the created lead with their unique ID.
  provider: marketo
  endpoint: /rest/v1/leads.json
  method: POST
  scopes: []
  tags:
    - leads
    - create
  input_schema:
    type: object
    description: Parameters for creating a lead
    properties:
      email:
        type: string
        description: "Email address"
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      company:
        type: string
        description: "Company name"
    required:
      - email

- slug: marketo_update_lead
  name: Update Lead
  description: |
    Update an existing Marketo lead with new contact information, company details, or scoring data. Returns the updated lead confirming the changes.
  provider: marketo
  endpoint: /rest/v1/leads.json
  method: POST
  scopes: []
  tags:
    - leads
    - update
  input_schema:
    type: object
    description: Parameters for updating a lead
    properties:
      id:
        type: integer
        description: "Lead ID"
      email:
        type: string
        description: "Email address"
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      company:
        type: string
        description: "Company name"
    required:
      - id

- slug: marketo_list_campaigns
  name: List Campaigns
  description: |
    List all marketing campaigns in your Marketo account with optional filtering by status. Returns campaign names, IDs, program associations, and engagement metrics for each campaign.
  provider: marketo
  endpoint: /rest/v1/campaigns.json
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by status (on, off)"
      page:
        type: integer
        description: "Page number"
        default: 1
      maxReturn:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: marketo_get_campaign
  name: Get Campaign
  description: |
    Retrieve detailed information about a specific Marketo marketing campaign by its ID. Returns the campaign settings, target audience, budget, and performance metrics.
  provider: marketo
  endpoint: /rest/v1/campaigns/{id}.json
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: integer
        description: "Campaign ID"
    required:
      - id

- slug: marketo_list_activities
  name: List Activities
  description: |
    List all marketing activities in Marketo within a specified date range with optional filtering by activity type. Returns activity names, timestamps, lead associations, and engagement details.
  provider: marketo
  endpoint: /rest/v1/activities.json
  method: GET
  scopes: []
  tags:
    - activities
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      activityTypeIds:
        type: string
        description: "Comma-separated activity type IDs"
      startDate:
        type: string
        description: "Start date (ISO 8601)"
      endDate:
        type: string
        description: "End date (ISO 8601)"
      page:
        type: integer
        description: "Page number"
        default: 1
      maxReturn:
        type: integer
        description: "Max results"
        default: 20
    required: []

