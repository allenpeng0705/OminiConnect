# Marketo Tools - Allowlist
# Curated subset of Marketo API for AI agent use.
# OAUTH2_CC via Nango (Client Credentials).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. marketo_list_leads          - List leads
# 2. marketo_get_lead            - Get lead details
# 3. marketo_create_lead        - Create a lead
# 4. marketo_update_lead        - Update a lead
# 5. marketo_list_campaigns     - List marketing campaigns
# 6. marketo_get_campaign       - Get campaign details
# 7. marketo_list_activities    - List activities
# 8. marketo_list_programs      - List programs
# 9. marketo_get_program        - Get program details
# 10. marketo_list_lists        - List static lists

- slug: marketo_list_leads
  name: List Leads
  description: |
    List leads in Marketo.
    Filter by segment, source, or search.
  provider: marketo
  endpoint: /rest/v1/leads.json
  method: GET
  scopes: []
  tags:
    - leads
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      filter_type:
        type: string
        description: "Field to filter by (email, id, etc.)"
      filter_values:
        type: string
        description: "Comma-separated filter values"
      fields:
        type: string
        description: "Fields to return"
      page:
        type: integer
        description: "Page number"
        default: 1
      maxReturn:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: marketo_get_lead
  name: Get Lead
  description: |
    Get detailed information about a specific lead.
  provider: marketo
  endpoint: /rest/v1/leads/{id}.json
  method: GET
  scopes: []
  tags:
    - leads
    - read
  input_schema:
    type: object
    description: Parameters for getting a lead
    properties:
      id:
        type: integer
        description: "Lead ID"
      fields:
        type: string
        description: "Fields to return"
    required:
      - id

- slug: marketo_create_lead
  name: Create Lead
  description: |
    Create a new lead in Marketo.
  provider: marketo
  endpoint: /rest/v1/leads.json
  method: POST
  scopes: []
  tags:
    - leads
    - create
  input_schema:
    type: object
    description: Parameters for creating a lead
    properties:
      email:
        type: string
        description: "Email address"
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      company:
        type: string
        description: "Company name"
    required:
      - email

- slug: marketo_update_lead
  name: Update Lead
  description: |
    Update an existing lead in Marketo.
  provider: marketo
  endpoint: /rest/v1/leads.json
  method: POST
  scopes: []
  tags:
    - leads
    - update
  input_schema:
    type: object
    description: Parameters for updating a lead
    properties:
      id:
        type: integer
        description: "Lead ID"
      email:
        type: string
        description: "Email address"
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      company:
        type: string
        description: "Company name"
    required:
      - id

