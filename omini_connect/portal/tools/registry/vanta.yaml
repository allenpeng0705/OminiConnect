# Vanta Tools - Allowlist
# Curated subset of Vanta API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. vanta_list_compliance_frameworks           - List all compliance frameworks
# # 2. vanta_get_framework           - Get framework details
# # 3. vanta_list_controls           - List all controls
# # 4. vanta_get_control           - Get control details
# # 5. vanta_list_users           - List all users
# # 6. vanta_invite_user           - Invite a new user
# # 7. vanta_list_vendors           - List all vendors
# # 8. vanta_add_vendor           - Add a new vendor
# # 9. vanta_list_evidence           - List all evidence items
# # 10. vanta_upload_evidence           - Upload evidence

- slug: vanta_list_compliance_frameworks
  name: List Compliance Frameworks
  description: |
    List all compliance frameworks
  provider: vanta
  endpoint: /v1/compliance-frameworks
  method: GET
  scopes:
    - read
  tags:
    - vanta
  input_schema:
    type: object
    description: Parameters for list compliance frameworks
    properties: {}
    required: []

- slug: vanta_get_framework
  name: Get Framework
