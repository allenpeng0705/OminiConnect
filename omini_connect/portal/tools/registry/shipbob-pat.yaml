# ShipBob (Personal Access Token) Tools - Allowlist
# Curated subset of ShipBob (Personal Access Token) API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_channels                            - List sales channels
# 2. list_orders                              - List all orders
# 3. get_order                                - Get order details
# 4. list_products                            - List all products
# 5. get_product                              - Get product details
# 6. list_warehouses                          - List warehouses
# 7. list_shipments                           - List shipments
# 8. get_shipment                             - Get shipment details
# 9. list_returns                             - List returns
# 10. get_inventory                            - Get inventory levels

- slug: list_channels
  name: List Channels
  description: |
    List sales channels
  provider: shipbob-pat
  endpoint: /2026-01/channel
  method: GET
  scopes: []
  tags:
    - channels
    - ecommerce
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

