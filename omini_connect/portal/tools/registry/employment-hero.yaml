- slug: employment_hero_get_company
  name: Get Company
  description: |
    Retrieve company information for the Employment Hero organization including business details, logo, and configuration settings.
  provider: employment-hero
  endpoint: /api/v1/company
  method: GET
  scopes: []
  tags:
    - company
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: employment_hero_list_awards
  name: List Awards
  description: |
    List all awards and recognitions in the Employment Hero system with optional filtering by employee. Returns award names, dates, and recipients.
  provider: employment-hero
  endpoint: /api/v1/awards
  method: GET
  scopes: []
  tags:
    - awards
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing awards
    properties:
      employee_id:
        type: integer
        description: "Filter by employee ID"
    required: []

- slug: employment_hero_list_timesheets
  name: List Timesheets
  description: |
    List timesheet entries for employees with optional filtering by date range and employee. Returns hours worked, overtime, and approval status.
  provider: employment-hero
  endpoint: /api/v1/timesheets
  method: GET
  scopes: []
  tags:
    - timesheets
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing timesheets
    properties:
      employee_id:
        type: integer
        description: "Filter by employee ID"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []
