  name: List Departments
  description: |
    List all departments in the Employment Hero organization including department names, managers, and member counts.
  provider: employment-hero
  endpoint: /api/v1/departments
  method: GET
  scopes: []
  tags:
    - departments
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for listing departments
    properties: {}
