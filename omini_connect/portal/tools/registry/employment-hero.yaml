- slug: employment_hero_list_jobs
  name: List Jobs
  description: |
    List all job postings in the Employment Hero recruiting system including job titles, locations, departments, and posting status.
  provider: employment-hero
  endpoint: /api/v1/jobs
  method: GET
  scopes: []
  tags:
    - jobs
    - recruiting
    - read
  input_schema:
    type: object
    description: Parameters for listing jobs
