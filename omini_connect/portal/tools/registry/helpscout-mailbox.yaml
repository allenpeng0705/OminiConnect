# Help Scout Mailbox Tools - Allowlist
# Curated subset of Help Scout Mailbox API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. helpscout_list_conversations  - List conversations
# 2. helpscout_get_conversation    - Get conversation details
# 3. helpscout_create_conversation  - Create a conversation
# 4. helpscout_list_mailboxes      - List mailboxes
# 5. helpscout_get_mailbox         - Get mailbox details
# 6. helpscout_list_customers      - List customers
# 7. helpscout_get_customer        - Get customer details
# 8. helpscout_list_tags           - List tags
# 9. helpscout_list_workflows      - List workflows
# 10. helpscout_list_reports        - List reports

- slug: helpscout_list_conversations
  name: List Conversations
  description: |
    Retrieve all Help Scout Mailbox conversations with optional mailbox or status filtering.
    Returns conversation subjects, statuses, and assignee information.
  provider: helpscout-mailbox
  endpoint: /conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - list
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      mailbox_id:
        type: integer
        description: "Filter by mailbox ID"
      status:
        type: string
        description: "Filter by status: active, all, archived, spam, trash"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: helpscout_get_conversation
  name: Get Conversation
  description: |
    Retrieve a specific Help Scout Mailbox conversation by ID with messages and customer info.
    Returns full conversation thread and metadata.
  provider: helpscout-mailbox
  endpoint: /conversations/{id}
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      id:
        type: integer
        description: "Conversation ID"
    required:
      - id

- slug: helpscout_create_conversation
  name: Create Conversation
  description: |
    Create a new conversation in Help Scout Mailbox with subject, customer, and initial message.
    Returns the created conversation with its assigned ID.
  provider: helpscout-mailbox
  endpoint: /conversations
  method: POST
  scopes:
    - write
  tags:
    - conversations
    - create
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      subject:
        type: string
        description: "Conversation subject"
      customer_id:
        type: integer
        description: "Customer ID"
      mailbox_id:
        type: integer
        description: "Mailbox ID"
      status:
        type: string
        description: "Status: active, pending, snoozed"
        default: active
    required:
      - subject
      - customer_id
      - mailbox_id

