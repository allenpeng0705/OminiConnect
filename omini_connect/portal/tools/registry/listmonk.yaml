# Listmonk Tools - Allowlist
# Curated subset of Listmonk API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. listmonk_list_lists        - List lists
# 2. listmonk_get_list         - Get list details
# 3. listmonk_list_subscribers - List subscribers
# 4. listmonk_get_subscriber  - Get subscriber details
# 5. listmonk_add_subscriber  - Add a subscriber
# 6. listmonk_list_campaigns   - List campaigns
# 7. listmonk_get_campaign    - Get campaign details
# 8. listmonk_list_templates   - List templates
# 9. listmonk_get_template    - Get template details
# 10. listmonk_list_forms     - List forms

- slug: listmonk_list_lists
  name: List Lists
  description: |
    List all mailing lists in your Listmonk account. Returns list names, IDs, subscriber counts, and campaign statistics for each list.
  provider: listmonk
  endpoint: /api/lists
  method: GET
  scopes: []
  tags:
    - lists
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing lists
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: listmonk_get_list
  name: Get List
  description: |
    Retrieve details about a specific Listmonk list by its ID. Returns the list name, description, subscriber count, and configuration settings.
  provider: listmonk
  endpoint: /api/lists/{list_id}
  method: GET
  scopes: []
  tags:
    - lists
    - read
  input_schema:
    type: object
    description: Parameters for getting a list
    properties:
      list_id:
        type: integer
        description: "List ID"
    required:
      - list_id

- slug: listmonk_list_subscribers
  name: List Subscribers
  description: |
    List all subscribers in your Listmonk account with optional list filtering. Returns subscriber email addresses, names, subscription status, and tags.
  provider: listmonk
  endpoint: /api/subscribers
  method: GET
  scopes: []
  tags:
    - subscribers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing subscribers
    properties:
      list_id:
        type: integer
        description: "Filter by list ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: listmonk_get_subscriber
  name: Get Subscriber
  description: |
    Retrieve details about a specific Listmonk subscriber by their ID. Returns the subscriber's email, name, tags, subscription history, and campaign engagement.
  provider: listmonk
  endpoint: /api/subscribers/{subscriber_id}
  method: GET
  scopes: []
  tags:
    - subscribers
    - read
  input_schema:
    type: object
    description: Parameters for getting a subscriber
    properties:
      subscriber_id:
        type: integer
        description: "Subscriber ID"
    required:
      - subscriber_id

- slug: listmonk_add_subscriber
  name: Add Subscriber
  description: |
    Add a new subscriber to your Listmonk account with email and optional name. Returns the created subscriber with their unique ID and confirmation.
  provider: listmonk
  endpoint: /api/subscribers
  method: POST
  scopes: []
  tags:
    - subscribers
    - create
    - write
  input_schema:
    type: object
    description: Parameters for adding a subscriber
    properties:
      email:
        type: string
        description: "Email address"
      name:
        type: string
        description: "Subscriber name"
      list_ids:
        type: array
        items:
          type: integer
        description: "List IDs to subscribe to"
    required:
      - email

- slug: listmonk_list_campaigns
  name: List Campaigns
  description: |
    List all email campaigns in your Listmonk account with pagination. Returns campaign names, IDs, statuses, and scheduled or sent timestamps.
  provider: listmonk
  endpoint: /api/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: listmonk_get_campaign
  name: Get Campaign
  description: |
    Retrieve details about a specific Listmonk campaign by its ID. Returns the campaign subject, content preview, recipient count, and delivery statistics.
  provider: listmonk
  endpoint: /api/campaigns/{campaign_id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaign_id:
        type: integer
        description: "Campaign ID"
    required:
      - campaign_id

