- slug: medium_search_posts
  name: Search Posts
  description: |
    Search for posts matching a query.
  provider: medium
  endpoint: /search/posts
  method: GET
  scopes:
    - basic
  tags:
    - search
  input_schema:
    type: object
    description: Parameters for searching posts
    properties:
      q:
        type: string
        description: "Search query string"
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of results per page (default 20)"
    required:
      - q
