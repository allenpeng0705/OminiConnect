# DATEV Tools - Allowlist
# Curated subset of the DATEV API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. datev_list_clients              - List client accounts
# 2. datev_get_client               - Get client details
# 3. datev_list_accounts            - List accounting accounts
# 4. datev_get_account              - Get account details
# 5. datev_list_vouchers            - List vouchers/entries
# 6. datev_get_voucher              - Get voucher details
# 7. datev_list_contacts           - List contacts
# 8. datev_get_contact             - Get contact details
# 9. datev_list_documents          - List documents
# 10. datev_get_document          - Get document details

- slug: datev_list_clients
  name: List Clients
  description: |
    List all client/accounting offices in DATEV.
  provider: datev
  endpoint: /v1/clients
  method: GET
  scopes:
    - openid
  tags:
    - clients
    - accounting
    - list
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

- slug: datev_get_client
  name: Get Client
  description: |
    Get details of a specific client/accounting office.
  provider: datev
  endpoint: /v1/clients/{client_id}
  method: GET
  scopes:
    - openid
  tags:
    - clients
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      client_id:
        type: string
        description: "Client ID"
    required:
      - client_id

