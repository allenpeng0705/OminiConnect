
- slug: active-campaign_list_contacts
  name: List Contacts
  description: |
    Retrieve a paginated list of all contacts in your ActiveCampaign account.
  provider: active-campaign
  endpoint: /contacts
  method: GET
  scopes:
    - contact_list
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of contacts to return (default 20, max 100)"
      offset:
        type: integer
        description: "Offset for pagination"
    required: []

- slug: active-campaign_get_contact
  name: Get Contact
  description: |
    Get details of a specific contact by ID.
  provider: active-campaign
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contact_view
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "The contact ID"
    required:
      - id

- slug: active-campaign_create_contact
  name: Create Contact
  description: |
    Create a new contact in your ActiveCampaign account.
  provider: active-campaign
  endpoint: /contacts
  method: POST
  scopes:
    - contact_add
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      email:
        type: string
        description: "Email address of the contact"
      firstName:
        type: string
        description: "First name of the contact"
      lastName:
        type: string
        description: "Last name of the contact"
      phone:
        type: string
        description: "Phone number of the contact"
    required:
      - email

- slug: active-campaign_update_contact
  name: Update Contact
  description: |
    Update an existing contact's information.
  provider: active-campaign
  endpoint: /contacts/{id}
  method: PUT
  scopes:
    - contact_edit
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for updating a contact
    properties:
      id:
        type: string
        description: "The contact ID"
      email:
        type: string
        description: "Updated email address"
      firstName:
        type: string
        description: "Updated first name"
      lastName:
        type: string
        description: "Updated last name"
      phone:
        type: string
        description: "Updated phone number"
    required:
      - id

