# Heymarket Tools - Allowlist
# Curated subset of Heymarket API for AI agent use.
# JWT via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. heymarket_list_messages       - List messages
# 2. heymarket_send_message        - Send a message
# 3. heymarket_list_campaigns      - List campaigns
# 4. heymarket_get_campaign        - Get campaign details
# 5. heymarket_list_contacts       - List contacts
# 6. heymarket_get_contact         - Get contact details
# 7. heymarket_list_templates      - List templates
# 8. heymarket_get_template        - Get template details
# 9. heymarket_list_tags           - List tags
# 10. heymarket_list_conversations  - List conversations

- slug: heymarket_list_messages
  name: List Messages
  description: |
    List all messages in Heymarket.
    Returns message details including content, status, and timestamp.
  provider: heymarket
  endpoint: /api/messages
  method: GET
  scopes:
    - read
  tags:
    - messages
    - list
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      conversation_id:
        type: string
        description: "Filter by conversation ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: heymarket_send_message
  name: Send Message
  description: |
    Send a message via Heymarket.
    Set recipient, content, and channel.
  provider: heymarket
  endpoint: /api/messages
  method: POST
  scopes:
    - write
  tags:
    - messages
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      recipient:
        type: string
        description: "Recipient phone number"
      content:
        type: string
        description: "Message content"
      channel:
        type: string
        description: "Channel: sms, whatsapp"
    required:
      - recipient
      - content

