- slug: fly_get_certificate
  name: Get Certificate
  description: |
    Get details for a specific certificate.
  provider: fly
  endpoint: /apps/{appName}/certs/{hostname}
  method: GET
  scopes:
    - certificates:read
  tags:
    - certificates
  input_schema:
    type: object
    description: Parameters for getting a certificate
    properties:
      appName:
        type: string
        description: "The name of the application"
      hostname:
        type: string
        description: "The hostname for the certificate"
    required:
      - appName
      - hostname

- slug: fly_list_secrets
  name: List Secrets
