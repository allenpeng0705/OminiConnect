# Bill (Connect API) Tools - Allowlist
# Curated subset of Bill Connect API for AI agent use.
# BILL auth via Nango.
# Production environment at https://gateway.prod.bill.com/connect
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bill_list_vendors          - List vendors
# 2. bill_get_vendor           - Get vendor details
# 3. bill_list_invoices        - List invoices
# 4. bill_get_invoice          - Get invoice details
# 5. bill_create_invoice       - Create an invoice
# 6. bill_list_payments        - List payments
# 7. bill_get_payment          - Get payment details
# 8. bill_list_accounts        - List accounts
# 9. bill_get_account          - Get account details
# 10. bill_list_organizations   - List organizations

- slug: bill_list_vendors
  name: List Vendors
  description: |
    List all vendors in the Bill account.
  provider: bill
  endpoint: /v3/vendors
  method: GET
  scopes: []
  tags:
    - vendors
    - payables
  input_schema:
    type: object
    description: Parameters for listing vendors
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Vendors per page"
        default: 20
    required: []

- slug: bill_get_vendor
  name: Get Vendor
  description: |
    Get details for a specific vendor.
  provider: bill
  endpoint: /v3/vendors/{vendorId}
  method: GET
  scopes: []
  tags:
    - vendors
    - read
  input_schema:
    type: object
    description: Parameters for getting a vendor
    properties:
      vendorId:
        type: string
        description: "Vendor ID"
    required:
      - vendorId

- slug: bill_list_invoices
  name: List Invoices
  description: |
    List all invoices (bills to pay or received).
  provider: bill
  endpoint: /v3/invoices
  method: GET
  scopes: []
  tags:
    - invoices
    - payables
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status: APPROVED, PAID, etc."
      vendorId:
        type: string
        description: "Filter by vendor"
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Invoices per page"
        default: 20
    required: []

- slug: bill_get_invoice
  name: Get Invoice
  description: |
    Get details for a specific invoice.
  provider: bill
  endpoint: /v3/invoices/{invoiceId}
  method: GET
  scopes: []
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      invoiceId:
        type: string
        description: "Invoice ID"
    required:
      - invoiceId

- slug: bill_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice (vendor bill).
  provider: bill
  endpoint: /v3/invoices
  method: POST
  scopes: []
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Parameters for creating an invoice
    properties:
      vendorId:
        type: string
        description: "Vendor ID"
      invoiceDate:
        type: string
        description: "Invoice date (YYYY-MM-DD)"
      dueDate:
        type: string
        description: "Due date (YYYY-MM-DD)"
      amount:
        type: number
        description: "Invoice amount"
      description:
        type: string
        description: "Invoice description"
    required:
      - vendorId
      - invoiceDate
      - dueDate
      - amount

