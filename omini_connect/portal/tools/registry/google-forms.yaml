# Google Forms Tools - Allowlist
# Curated subset of Google Forms API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_forms_list_forms           - List forms
# 2. google_forms_get_form           - Get form details
# 3. google_forms_create_form        - Create form
# 4. google_forms_update_form        - Update form
# 5. google_forms_list_questions     - List questions
# 6. google_forms_create_question     - Create question
# 7. google_forms_list_responses     - List responses
# 8. google_forms_get_response       - Get response details
# 9. google_forms_list_watches       - List watches
# 10. google_forms_create_watch     - Create watch

- slug: google_forms_list_forms
  name: List Forms
  description: |
    List all Google Forms accessible to the user including titles, owners, and last modified dates. Returns form metadata for document discovery and management.
  provider: google-forms
  endpoint: /forms/v1/forms
  method: GET
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - forms
    - list
  input_schema:
    type: object
    description: Parameters for listing forms
    properties: {}

- slug: google_forms_get_form
  name: Get Form
  description: |
    Retrieve detailed information about a Google Form including settings, responder counts, and published URLs. Returns form configuration and summary statistics.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - forms
    - read
  input_schema:
    type: object
    description: Parameters for getting a form
    properties:
      formId:
        type: string
        description: "Form ID"
    required:
      - formId

- slug: google_forms_create_form
  name: Create Form
  description: |
    Create a new blank Google Form with a specified title. Returns the created form with its unique identifier and editing URL.
  provider: google-forms
  endpoint: /forms/v1/forms
  method: POST
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - forms
    - create
  input_schema:
    type: object
    description: Parameters for creating a form
    properties:
      title:
        type: string
        description: "Form title"
    required:
      - title

- slug: google_forms_update_form
  name: Update Form
  description: |
    Update a Google Form's settings including title, description, and response collection preferences. Modifies form settings and returns the updated configuration.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}
  method: PATCH
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - forms
    - update
  input_schema:
    type: object
    description: Parameters for updating a form
    properties:
      formId:
        type: string
        description: "Form ID"
      title:
        type: string
        description: "New title"
    required:
      - formId

- slug: google_forms_list_questions
  name: List Questions
  description: |
    List all questions in a Google Form including question types, text, and answer options. Returns question metadata for form structure analysis.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}/questions
  method: GET
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - questions
    - list
  input_schema:
    type: object
    description: Parameters for listing questions
    properties:
      formId:
        type: string
        description: "Form ID"
    required:
      - formId

- slug: google_forms_create_question
  name: Create Question
  description: |
    Create a new question in a Google Form with specified text, type, and answer options. Adds the question to the form and returns the question identifier.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}/questions
  method: POST
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - questions
    - create
  input_schema:
    type: object
    description: Parameters for creating a question
    properties:
      formId:
        type: string
        description: "Form ID"
      question:
        type: object
        description: "Question object"
    required:
      - formId
      - question

- slug: google_forms_list_responses
  name: List Responses
  description: |
    List all responses to a Google Form including submission timestamps and individual answers. Returns response data for analysis and result compilation.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}/responses
  method: GET
  scopes:
    - https://www.googleapis.com/auth/forms.responses.readonly
  tags:
    - responses
    - list
  input_schema:
    type: object
    description: Parameters for listing responses
    properties:
      formId:
        type: string
        description: "Form ID"
    required:
      - formId

- slug: google_forms_get_response
  name: Get Response
  description: |
    Retrieve detailed information about a specific form response including all answers and submission metadata. Returns individual response data with timestamp and scores.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}/responses/{responseId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/forms.responses.readonly
  tags:
    - responses
    - read
  input_schema:
    type: object
    description: Parameters for getting a response
    properties:
      formId:
        type: string
        description: "Form ID"
      responseId:
        type: string
        description: "Response ID"
    required:
      - formId
      - responseId

- slug: google_forms_list_watches
  name: List Watches
  description: |
    List all webhook watches configured for a Google Form including notification URLs and event types. Returns watch configuration for form event integration.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}/watches
  method: GET
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - watches
    - list
  input_schema:
    type: object
    description: Parameters for listing watches
    properties:
      formId:
        type: string
        description: "Form ID"
    required:
      - formId

- slug: google_forms_create_watch
  name: Create Watch
  description: |
    Create a webhook watch on a Google Form to receive notifications for new responses. Configures the endpoint and event types, returning the watch identifier.
  provider: google-forms
  endpoint: /forms/v1/forms/{formId}/watches
  method: POST
  scopes:
    - https://www.googleapis.com/auth/forms.body
  tags:
    - watches
    - create
  input_schema:
    type: object
    description: Parameters for creating a watch
    properties:
      formId:
        type: string
        description: "Form ID"
      watch:
        type: object
        description: "Watch object with target and event type"
    required:
      - formId
      - watch
