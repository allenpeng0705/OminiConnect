- slug: baidu_translate_text
  name: Translate Text
  description: |
    Translate text between languages using Baidu Translate API.
  provider: baidu
  endpoint: /api/trans/v2/lingo
  method: GET
  scopes:
    - translate
  tags:
    - translate
    - i18n
  input_schema:
    type: object
    description: Parameters for translating text
    properties:
      text:
        type: string
        description: "Text to translate (max 6000 characters)."
      from:
        type: string
        description: "Source language code (e.g., en, zh, auto). Defaults to auto."
      to:
        type: string
        description: "Target language code (e.g., en, zh)."
    required:
      - text
      - to

- slug: baidu_detect_language
  name: Detect Language
  description: |
    Detect the language of the given text using Baidu Translate.
  provider: baidu
  endpoint: /api/trans/v2/lingo
  method: GET
  scopes:
    - translate
  tags:
    - translate
    - i18n
  input_schema:
    type: object
    description: Parameters for language detection
    properties:
      text:
        type: string
        description: "Text to detect language for (max 6000 characters)."
    required:
      - text

- slug: baidu_get_map_place
  name: Get Map Place
  description: |
    Get detailed information about a specific place using Baidu Maps.
  provider: baidu
  endpoint: /place/v2/detail
  method: GET
  scopes:
    - map
  tags:
    - map
    - location
  input_schema:
    type: object
    description: Parameters for getting map place details
    properties:
      uid:
        type: string
        description: "Unique place ID from Baidu Maps."
      coord_type:
        type: string
        description: "Coordinate system: wgs84ll, gcj02ll, bd09ll. Defaults to gcj02ll."
    required:
      - uid

- slug: baidu_search_places
  name: Search Places
  description: |
    Search for places, businesses, or landmarks using Baidu Maps.
  provider: baidu
  endpoint: /place/v2/search
  method: GET
  scopes:
    - map
  tags:
    - map
    - location
    - search
  input_schema:
    type: object
    description: Parameters for searching places
    properties:
      query:
        type: string
        description: "Search query term (e.g., restaurant, hotel)."
      region:
        type: string
        description: "City name or province to scope the search."
      coord_type:
        type: string
        description: "Coordinate system for results: wgs84ll, gcj02ll, bd09ll."
      radius:
        type: integer
        description: "Search radius in meters (max 50000)."
      page_size:
        type: integer
        description: "Number of results per page (max 20)."
      page_num:
        type: integer
        description: "Page number for pagination."
    required:
      - query
      - region

- slug: baidu_list_pan_files
  name: List Pan Files
  description: |
    List files in Baidu Pan (Net Disk) storage.
  provider: baidu
  endpoint: /api/v1/pan_api/file/list
  method: GET
  scopes:
    - pan
  tags:
    - pan
    - storage
  input_schema:
    type: object
    description: Parameters for listing pan files
    properties:
      path:
        type: string
        description: "Directory path on Baidu Pan. Defaults to /."
      order:
        type: string
        description: "Sort order: name, size, time. Defaults to time."
      desc:
        type: boolean
        description: "Descending order. Defaults to true."
      page_size:
        type: integer
        description: "Number of items per page (max 100)."
      page_index:
        type: integer
        description: "Page number (0-based)."
    required: []

- slug: baidu_get_pan_file
  name: Get Pan File
  description: |
    Get metadata and download link for a specific file in Baidu Pan.
  provider: baidu
  endpoint: /api/v1/pan_api/file/info
  method: GET
  scopes:
    - pan
  tags:
    - pan
    - storage
  input_schema:
    type: object
    description: Parameters for getting pan file metadata
    properties:
      path:
        type: string
        description: "Full path to the file on Baidu Pan."
    required:
      - path

- slug: baidu_upload_pan_file
  name: Upload Pan File
  description: |
    Upload a file to Baidu Pan storage.
  provider: baidu
  endpoint: /api/v1/pan_api/file/upload
  method: POST
  scopes:
    - pan
  tags:
    - pan
    - storage
  input_schema:
    type: object
    description: Parameters for uploading a file to pan
    properties:
      path:
        type: string
        description: "Destination path on Baidu Pan."
      content:
        type: string
        description: "Base64-encoded file content."
      overwrite:
        type: boolean
        description: "Whether to overwrite if file exists. Defaults to false."
    required:
      - path
      - content

- slug: baidu_detect_face
  name: Detect Face
  description: |
    Detect faces in an image and return attributes using Baidu Face API.
  provider: baidu
  endpoint: /api/v1/face/v3/detect
  method: POST
  scopes:
    - face
  tags:
    - face
    - ai
    - vision
  input_schema:
    type: object
    description: Parameters for face detection
    properties:
      image:
        type: string
        description: "Base64-encoded image data (max 10MB)."
      image_type:
        type: string
        description: "Image type: BASE64, URL, FACE_TOKEN. Defaults to BASE64."
      face_field:
        type: string
        description: "Face attributes to return: age,beauty,expression,face_shape,gender,glasses,landmark,race,quality."
    required:
      - image

- slug: baidu_compare_faces
  name: Compare Faces
  description: |
    Compare two faces and return similarity score using Baidu Face API.
  provider: baidu
  endpoint: /api/v1/face/v3/match
  method: POST
  scopes:
    - face
  tags:
    - face
    - ai
    - vision
  input_schema:
    type: object
    description: Parameters for face comparison
    properties:
      image1:
        type: string
        description: "First Base64-encoded image data."
      image2:
        type: string
        description: "Second Base64-encoded image data."
      image_type:
        type: string
        description: "Image type: BASE64, URL, FACE_TOKEN. Defaults to BASE64."
    required:
      - image1
      - image2

- slug: baidu_search_web
  name: Search Web
  description: |
    Search the web using Baidu Search engine.
  provider: baidu
  endpoint: /api/search/v1/compound
  method: GET
  scopes:
    - search
  tags:
    - search
    - web
  input_schema:
    type: object
    description: Parameters for web search
    properties:
      query:
        type: string
        description: "Search query text."
      page_num:
        type: integer
        description: "Page number (0-based). Defaults to 0."
      page_size:
        type: integer
        description: "Number of results per page (max 50)."
    required:
      - query
