# SurveyMonkey Tools - Allowlist
# Curated subset of SurveyMonkey API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_surveys                             - List all surveys
# 2. get_survey                               - Get survey details
# 3. list_collectors                          - List survey collectors
# 4. get_collector                            - Get collector details
# 5. list_responses                           - List survey responses
# 6. get_response                             - Get response details
# 7. list_pages                               - List survey pages
# 8. list_questions                           - List survey questions
# 9. get_benchmark                            - Get survey benchmark
# 10. get_details                              - Get survey details with questions

- slug: list_surveys
  name: List Surveys
  description: |
    List all surveys
  provider: survey-monkey
  endpoint: /v3/surveys
  method: GET
  scopes: []
  tags:
    - surveys
    - feedback
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_survey
  name: Get Survey
  description: |
    Get survey details
  provider: survey-monkey
  endpoint: /v3/surveys/{id}
  method: GET
  scopes: []
  tags:
    - surveys
    - feedback
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

