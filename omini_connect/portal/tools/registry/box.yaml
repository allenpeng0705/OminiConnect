- slug: box_list_tasks
  name: List Tasks
  description: |
    List tasks on a file.
  provider: box
  endpoint: /2.0/files/{file_id}/tasks
  method: GET
  scopes:
    - task_read
  tags:
    - tasks
    - files
    - list
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      file_id:
        type: string
        description: "File ID"
    required:
      - file_id
