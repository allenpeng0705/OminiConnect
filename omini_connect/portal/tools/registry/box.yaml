- slug: box_get_group
  name: Get Group
  description: |
    Get information about a group.
  provider: box
  endpoint: /2.0/groups/{group_id}
  method: GET
  scopes:
    - group_read
  tags:
    - groups
    - read
  input_schema:
    type: object
    description: Parameters for getting a group
    properties:
      group_id:
        type: string
        description: "Group ID"
    required:
