# Yotpo Tools - Allowlist
# Curated subset of Yotpo API for AI agent use.
# Two-Step OAuth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. yotpo_list_reviews           - List all product reviews
# # 2. yotpo_get_review           - Get review details
# # 3. yotpo_create_review           - Create a new review
# # 4. yotpo_list_products           - List all products
# # 5. yotpo_get_product           - Get product details
# # 6. yotpo_list_customers           - List all customers
# # 7. yotpo_get_loyalty_status           - Get customer loyalty status
# # 8. yotpo_create_loyalty_event           - Create a loyalty event
# # 9. yotpo_list_coupons           - List all coupons
# # 10. yotpo_create_coupon           - Create a new coupon

- slug: yotpo_list_reviews
  name: List Reviews
  description: |
    List all product reviews
  provider: yotpo
  endpoint: /v1/reviews
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for list reviews
    properties: {}
    required: []

- slug: yotpo_get_review
  name: Get Review
  description: |
    Get review details
  provider: yotpo
  endpoint: /v1/reviews/{id}
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for get review
    properties: {}
    required: []

- slug: yotpo_create_review
  name: Create Review
  description: |
    Create a new review
  provider: yotpo
  endpoint: /v1/reviews
  method: POST
  scopes:
    - write
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for create review
    properties: {}
    required: []

