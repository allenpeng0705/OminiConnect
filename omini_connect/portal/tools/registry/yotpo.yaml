# Yotpo Tools - Allowlist
# Curated subset of Yotpo API for AI agent use.
# Two-Step OAuth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. yotpo_list_reviews           - List all product reviews
# # 2. yotpo_get_review           - Get review details
# # 3. yotpo_create_review           - Create a new review
# # 4. yotpo_list_products           - List all products
# # 5. yotpo_get_product           - Get product details
# # 6. yotpo_list_customers           - List all customers
# # 7. yotpo_get_loyalty_status           - Get customer loyalty status
# # 8. yotpo_create_loyalty_event           - Create a loyalty event
# # 9. yotpo_list_coupons           - List all coupons
# # 10. yotpo_create_coupon           - Create a new coupon

- slug: yotpo_list_reviews
  name: List Reviews
  description: |
    Retrieve all product reviews with pagination support. Returns review content, ratings, product IDs, and customer information for each review.
  provider: yotpo
  endpoint: /v1/reviews
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for list reviews
    properties: {}
    required: []

- slug: yotpo_get_review
  name: Get Review
  description: |
    Retrieve the full details of a specific product review including the review text, star rating, author information, and verified purchase status.
  provider: yotpo
  endpoint: /v1/reviews/{id}
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for get review
    properties: {}
    required: []

- slug: yotpo_create_review
  name: Create Review
  description: |
    Submit a new product review with rating, text content, and customer information. Returns the created review with its unique ID.
  provider: yotpo
  endpoint: /v1/reviews
  method: POST
  scopes:
    - write
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for create review
    properties: {}
    required: []

- slug: yotpo_list_products
  name: List Products
  description: |
    Retrieve all products in the Yotpo catalog with pagination support. Returns product names, IDs, images, and average rating information.
  provider: yotpo
  endpoint: /v1/products
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for list products
    properties: {}
    required: []

- slug: yotpo_get_product
  name: Get Product
  description: |
    Retrieve detailed information for a specific product including name, description, images, and aggregated review statistics.
  provider: yotpo
  endpoint: /v1/products/{id}
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for get product
    properties: {}
    required: []

- slug: yotpo_list_customers
  name: List Customers
  description: |
    Retrieve all customers in the Yotpo database with pagination support. Returns customer names, email addresses, and purchase history.
  provider: yotpo
  endpoint: /v1/customers
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for list customers
    properties: {}
    required: []

- slug: yotpo_get_loyalty_status
  name: Get Loyalty Status
  description: |
    Retrieve the loyalty program status for a specific customer including points balance, tier level, and reward eligibility.
  provider: yotpo
  endpoint: /v1/loyalty/status
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for get loyalty status
    properties: {}
    required: []

- slug: yotpo_create_loyalty_event
  name: Create Loyalty Event
  description: |
    Record a new loyalty event for a customer such as a purchase, referral, or reward redemption. Returns the event ID and updated points balance.
  provider: yotpo
  endpoint: /v1/loyalty/events
  method: POST
  scopes:
    - write
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for create loyalty event
    properties: {}
    required: []

- slug: yotpo_list_coupons
  name: List Coupons
  description: |
    Retrieve all active and inactive discount coupons with pagination support. Returns coupon codes, discount amounts, and expiration dates.
  provider: yotpo
  endpoint: /v1/coupons
  method: GET
  scopes:
    - read
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for list coupons
    properties: {}
    required: []

- slug: yotpo_create_coupon
  name: Create Coupon
  description: |
    Create a new discount coupon with specified code, discount type, value, and expiration date. Returns the created coupon with its unique ID.
  provider: yotpo
  endpoint: /v1/coupons
  method: POST
  scopes:
    - write
  tags:
    - yotpo
  input_schema:
    type: object
    description: Parameters for create coupon
    properties: {}
    required: []

