# Pipedream Client Credentials Tools - Allowlist
# Curated subset of Pipedream API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.
# NOTE: pipedream-oauth2-cc uses the same API endpoints as pipedream - only auth is different.

# === TOOL LIST ===
# 1. pipedream_cc_list_sources          - List event sources
# 2. pipedream_cc_get_source            - Get source details
# 3. pipedream_cc_list_workflows        - List workflows
# 4. pipedream_cc_get_workflow          - Get workflow details
# 5. pipedream_cc_list_keys             - List API keys
# 6. pipedream_cc_get_user              - Get user info
# 7. pipedream_cc_list_events           - List events
# 8. pipedream_cc_get_event            - Get event details
# 9. pipedream_cc_list_connections      - List connections
# 10. pipedream_cc_get_account          - Get account info

- slug: pipedream_cc_list_sources
  name: List Sources
  description: |
    List all event sources.
  provider: pipedream-oauth2-cc
  endpoint: /v1/sources
  method: GET
  scopes: []
  tags:
    - sources
    - events
    - list
  input_schema:
    type: object
    description: Parameters for listing sources
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: pipedream_cc_get_source
  name: Get Source
  description: |
    Get detailed information about a specific source.
  provider: pipedream-oauth2-cc
  endpoint: /v1/sources/{sourceId}
  method: GET
  scopes: []
  tags:
    - sources
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting a source
    properties:
      sourceId:
        type: string
        description: "Source ID"
    required:
      - sourceId

