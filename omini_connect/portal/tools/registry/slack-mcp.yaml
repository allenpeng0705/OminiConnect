    required: []

- slug: search_messages
  name: Search Messages
  description: |
    Search messages in Slack by keyword. Returns matching messages with context and relevance rankings.
  provider: slack-mcp
  endpoint: /search.messages
  method: GET
  scopes: []
  tags:
    - search
    - messages
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

