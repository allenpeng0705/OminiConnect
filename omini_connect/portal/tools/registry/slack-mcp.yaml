# Slack (MCP) Tools - Allowlist
# Curated subset of Slack (MCP) API for AI agent use.
# Auth mode: MCP_OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_channels                            - List all channels
# 2. get_channel                              - Get channel details
# 3. list_messages                            - List messages in channel
# 4. post_message                             - Post a message to channel
# 5. upload_file                              - Upload a file
# 6. list_users                               - List workspace users
# 7. get_user                                 - Get user details
# 8. list_emoji                               - List custom emoji
# 9. get_team_info                            - Get workspace info
# 10. search_messages                          - Search messages

- slug: list_channels
  name: List Channels
  description: |
    List all channels in the Slack workspace. Returns channel names, IDs, topics, member counts, and creation dates.
  provider: slack-mcp
  endpoint: /conversations.list
  method: GET
  scopes: []
  tags:
    - channels
    - communication
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_channel
  name: Get Channel
  description: |
    Get detailed information about a specific Slack channel including its topic, purpose, member list, and settings.
  provider: slack-mcp
  endpoint: /conversations.info
  method: GET
  scopes: []
  tags:
    - channels
    - communication
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_messages
  name: List Messages
  description: |
    List all messages in a Slack channel. Returns message content, timestamps, user information, and thread replies.
  provider: slack-mcp
  endpoint: /conversations.history
  method: GET
  scopes: []
  tags:
    - messages
    - communication
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: post_message
  name: Post Message
  description: |
    Post a message to a Slack channel. Sets the channel, message text, and optionally a thread reply.
  provider: slack-mcp
  endpoint: /chat.postMessage
  method: POST
  scopes: []
  tags:
    - messages
    - communication
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: upload_file
  name: Upload File
  description: |
    Upload a file to Slack. The file is shared to specified channels or direct messages.
  provider: slack-mcp
  endpoint: /files.upload
  method: POST
  scopes: []
  tags:
    - files
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_users
  name: List Users
  description: |
    List all users in the Slack workspace. Returns user names, email addresses, roles, and presence status.
  provider: slack-mcp
  endpoint: /users.list
  method: GET
  scopes: []
  tags:
    - users
    - directory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_user
  name: Get User
  description: |
    Get detailed information about a Slack user including their profile, status, timezone, and contact information.
  provider: slack-mcp
  endpoint: /users.info
  method: GET
  scopes: []
  tags:
    - users
    - directory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_emoji
  name: List Emoji
  description: |
    List all custom emoji in the Slack workspace. Returns emoji names and their image URLs.
  provider: slack-mcp
  endpoint: /emoji.list
  method: GET
  scopes: []
  tags:
    - emoji
