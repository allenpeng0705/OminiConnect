    properties: {}
    required: []

- slug: get_team_info
  name: Get Team Info
  description: |
    Get information about the Slack workspace. Returns workspace name, domain, icon, and subscription details.
  provider: slack-mcp
  endpoint: /team.info
  method: GET
  scopes: []
  tags:
    - team
