# Keap Tools - Allowlist
# Curated subset of Keap API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. keap_list_contacts         - List contacts
# 2. keap_get_contact          - Get contact details
# 3. keap_list_companies       - List companies
# 4. keap_get_company         - Get company details
# 5. keap_list_invoices        - List invoices
# 6. keap_get_invoice         - Get invoice details
# 7. keap_list_products       - List products
# 8. keap_get_product        - Get product details
# 9. keap_list_tags           - List tags
# 10. keap_list_notes         - List notes

- slug: keap_list_contacts
  name: List Contacts
  description: |
    List all contacts in Keap.
  provider: keap
  endpoint: /rest/v1/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: keap_get_contact
  name: Get Contact
  description: |
    Get details for a specific contact.
  provider: keap
  endpoint: /rest/v1/contacts/{contact_id}
  method: GET
  scopes: []
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contact_id:
        type: integer
        description: "Contact ID"
    required:
      - contact_id

