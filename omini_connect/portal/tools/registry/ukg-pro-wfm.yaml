# UKG Pro WFM Tools - Allowlist
# Curated subset of UKG Pro WFM API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. ukg_list_shifts           - List scheduled shifts
# # 2. ukg_create_shift           - Create a new shift
# # 3. ukg_list_time_entries           - List time entries
# # 4. ukg_create_time_entry           - Create a time entry
# # 5. ukg_list_schedules           - List work schedules
# # 6. ukg_get_schedule           - Get schedule details
# # 7. ukg_list_availability           - List employee availability
# # 8. ukg_list_approvals           - List pending approvals
# # 9. ukg_approve_request           - Approve a request
# # 10. ukg_reject_request           - Reject a request

- slug: ukg_list_shifts
  name: List Shifts
  description: |
    List scheduled shifts
  provider: ukg-pro-wfm
  endpoint: /wfm/v1/shifts
  method: GET
  scopes:
    - read
  tags:
    - ukg-pro-wfm
  input_schema:
    type: object
    description: Parameters for list shifts
    properties: {}
    required: []

