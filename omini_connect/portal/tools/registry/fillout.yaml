# Fillout OAuth Tools - Allowlist
# Curated subset of Fillout API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fillout_list_forms           - List forms
# 2. fillout_get_form            - Get form details
# 3. fillout_list_responses      - List responses
# 4. fillout_get_response        - Get response details
# 5. fillout_list_questions      - List questions
# 6. fillout_get_question       - Get question details
# 7. fillout_list_answers       - List answers
# 8. fillout_get_answer         - Get answer details
# 9. fillout_list_captures       - List file captures
# 10. fillout_get_workflow     - Get workflow status

- slug: fillout_list_forms
  name: List Forms
  description: |
    List all forms.
  provider: fillout
  endpoint: /v1/api/forms
  method: GET
  scopes: []
  tags:
    - forms
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for listing forms
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: fillout_get_form
  name: Get Form
  description: |
    Get details of a specific form.
  provider: fillout
  endpoint: /v1/api/forms/{id}
  method: GET
  scopes: []
  tags:
    - forms
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for getting form
    properties:
      id:
        type: string
        description: "Form ID"
    required:
      - id

- slug: fillout_list_responses
  name: List Responses
  description: |
    List all responses to a form.
  provider: fillout
  endpoint: /v1/api/forms/{formId}/responses
  method: GET
  scopes: []
  tags:
    - responses
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for listing responses
    properties:
      formId:
        type: string
        description: "Form ID"
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required:
      - formId

- slug: fillout_get_response
  name: Get Response
  description: |
    Get details of a specific response.
  provider: fillout
