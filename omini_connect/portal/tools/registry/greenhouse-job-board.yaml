# Greenhouse Job Board Tools - Allowlist
# Curated subset of Greenhouse Job Board API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. greenhouse_list_board_jobs    - List board jobs
# 2. greenhouse_get_board_job      - Get board job details
# 3. greenhouse_list_job_questions - List job questions
# 4. greenhouse_get_job_question   - Get job question details
# 5. greenhouse_list_departments   - List departments
# 6. greenhouse_get_department     - Get department details
# 7. greenhouse_list_offices       - List offices
# 8. greenhouse_get_office         - Get office details
# 9. greenhouse_list_employees     - List employees
# 10. greenhouse_get_employee       - Get employee details

- slug: greenhouse_list_board_jobs
  name: List Board Jobs
  description: |
    List all jobs on the job board.
    Returns job details including title, location, and department.
  provider: greenhouse-job-board
  endpoint: /v1/boards/{boardToken}/jobs
  method: GET
  scopes:
    - read
  tags:
    - jobs
    - list
    - job_board
  input_schema:
    type: object
    description: Parameters for listing board jobs
    properties:
      boardToken:
        type: string
        description: "Board token"
      content:
        type: string
        description: "Content format: full or minimal"
        default: full
    required:
      - boardToken

- slug: greenhouse_get_board_job
  name: Get Board Job
  description: |
    Get detailed information about a specific job.
    Includes job description, requirements, and application URL.
  provider: greenhouse-job-board
  endpoint: /v1/boards/{boardToken}/jobs/{jobId}
  method: GET
  scopes:
    - read
  tags:
    - jobs
    - read
    - job_board
  input_schema:
    type: object
    description: Parameters for getting a board job
    properties:
      boardToken:
        type: string
        description: "Board token"
      jobId:
        type: integer
        description: "Job ID"
    required:
      - boardToken
      - jobId

