# Mercury Tools - Allowlist
# Curated subset of Mercury API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. mercury_list_accounts         - List all accounts
# 2. mercury_get_account          - Get account details
# 3. mercury_list_transactions    - List transactions
# 4. mercury_get_transaction      - Get transaction details
# 5. mercury_list_payments       - List payments
# 6. mercury_get_payment         - Get payment details
# 7. mercury_list_invoices       - List invoices
# 8. mercury_get_invoice         - Get invoice details
# 9. mercury_create_transfer     - Create a transfer
# 10. mercury_list_webhooks     - List webhooks

- slug: mercury_list_accounts
  name: List Accounts
  description: |
    List all accounts in Mercury.
    Shows account balances and types.
  provider: mercury
  endpoint: /v1/accounts
  method: GET
  scopes: []
  tags:
    - accounts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties: {}
    required: []

- slug: mercury_get_account
  name: Get Account
  description: |
    Get detailed information about a specific account.
  provider: mercury
  endpoint: /v1/accounts/{accountId}
  method: GET
  scopes: []
  tags:
    - accounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      accountId:
        type: string
        description: "Account ID"
    required:
      - accountId

- slug: mercury_list_transactions
  name: List Transactions
  description: |
    List all transactions in Mercury.
    Filter by account, date range, or status.
  provider: mercury
  endpoint: /v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      account_id:
        type: string
        description: "Filter by account ID"
      from_date:
        type: string
        description: "From date (ISO 8601)"
      to_date:
        type: string
        description: "To date (ISO 8601)"
      status:
        type: string
        description: "Filter by status (pending, posted)"
      limit:
        type: integer
        description: "Max results"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: mercury_get_transaction
  name: Get Transaction
  description: |
    Get details of a specific transaction.
  provider: mercury
  endpoint: /v1/transactions/{transactionId}
  method: GET
  scopes: []
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID"
    required:
      - transactionId

