- slug: mercury_list_invoices
  name: List Invoices
  description: |
    List all invoices in Mercury.
    Filter by status or client.
  provider: mercury
  endpoint: /v1/invoices
  method: GET
  scopes: []
  tags:
    - invoices
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status (draft, sent, paid)"
      client_id:
        type: string
        description: "Filter by client ID"
      limit:
        type: integer
        description: "Max results"
        default: 50
    required: []

- slug: mercury_get_invoice
  name: Get Invoice
  description: |
    Get details of a specific invoice.
  provider: mercury
  endpoint: /v1/invoices/{invoiceId}
  method: GET
  scopes: []
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      invoiceId:
        type: string
        description: "Invoice ID"
    required:
      - invoiceId

- slug: mercury_create_transfer
  name: Create Transfer
  description: |
    Create a transfer between Mercury accounts.
  provider: mercury
  endpoint: /v1/transfers
  method: POST
  scopes: []
  tags:
    - transfers
    - create
  input_schema:
    type: object
    description: Parameters for creating a transfer
    properties:
      from_account_id:
        type: string
        description: "Source account ID"
      to_account_id:
        type: string
        description: "Destination account ID"
      amount:
        type: number
        description: "Transfer amount"
      currency:
        type: string
        description: "Currency code"
        default: USD
    required:
      - from_account_id
      - to_account_id
      - amount

- slug: mercury_list_webhooks
  name: List Webhooks
  description: |
