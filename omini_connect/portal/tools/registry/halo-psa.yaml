# Halo PSA Tools - Allowlist
# Curated subset of Halo PSA API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. halo_list_tickets            - List tickets
# 2. halo_get_ticket              - Get ticket details
# 3. halo_list_clients           - List clients
# 4. halo_get_client             - Get client details
# 5. halo_list_contacts          - List contacts
# 6. halo_get_contact            - Get contact details
# 7. halo_list_invoices          - List invoices
# 8. halo_get_invoice            - Get invoice details
# 9. halo_list_projects          - List projects
# 10. halo_get_project            - Get project details

- slug: halo_list_tickets
  name: List Tickets
  description: |
    List all tickets in Halo PSA.
    Returns ticket details including subject, status, and assignee.
  provider: halo-psa
  endpoint: /tickets
  method: GET
  scopes:
    - read
  tags:
    - tickets
    - list
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Page size"
        default: 20
    required: []

- slug: halo_get_ticket
  name: Get Ticket
  description: |
    Get detailed information about a specific ticket.
    Includes ticket details, comments, and history.
  provider: halo-psa
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - read
  tags:
    - tickets
    - read
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: integer
        description: "Ticket ID"
    required:
      - id

