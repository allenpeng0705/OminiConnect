# Hibob Service User Tools - Allowlist
# Curated subset of Hibob API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. hibob_list_employees          - List employees
# 2. hibob_get_employee            - Get employee details
# 3. hibob_list_departments        - List departments
# 4. hibob_get_department          - Get department details
# 5. hibob_list_jobs               - List job titles
# 6. hibob_get_job                  - Get job title details
# 7. hibob_list_named_lists         - List named lists
# 8. hibob_get_named_list          - Get named list details
# 9. hibob_list_anniversaries       - List anniversaries
# 10. hibob_list_birthdays          - List birthdays

- slug: hibob_list_employees
  name: List Employees
  description: |
    Retrieve all employees in your Hibob account with pagination.
    Returns employee names, emails, and employment status.
  provider: hibob-service-user
  endpoint: /v1/employees
  method: GET
  scopes:
    - read
  tags:
    - employees
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: hibob_get_employee
  name: Get Employee
  description: |
    Retrieve a specific Hibob employee by ID with their profile and role.
    Returns full employee details including company information.
  provider: hibob-service-user
  endpoint: /v1/employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - employees
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      id:
        type: string
        description: "Employee ID"
    required:
      - id

- slug: hibob_list_departments
  name: List Departments
  description: |
    Retrieve all departments in your Hibob account.
    Returns department names and manager information.
  provider: hibob-service-user
  endpoint: /v1/company/departments
  method: GET
  scopes:
    - read
  tags:
    - departments
    - list
  input_schema:
    type: object
    description: Parameters for listing departments
    properties: {}
    required: []

- slug: hibob_get_department
  name: Get Department
