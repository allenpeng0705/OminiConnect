- slug: hibob_list_anniversaries
  name: List Anniversaries
  description: |
    Retrieve upcoming work anniversaries for employees.
    Returns employee names and anniversary dates.
  provider: hibob-service-user
  endpoint: /v1/employees/anniversaries
  method: GET
  scopes:
    - read
  tags:
    - anniversaries
    - list
  input_schema:
    type: object
    description: Parameters for listing anniversaries
    properties:
      months_ahead:
        type: integer
        description: "Months ahead to look"
        default: 1
    required: []

