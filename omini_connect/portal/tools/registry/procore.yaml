# Procore Tools - Allowlist
# Curated subset of Procore API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. procore_list_projects           - List projects
# 2. procore_get_project             - Get project details
# 3. procore_list_drawings           - List drawings
# 4. procore_get_drawing             - Get drawing details
# 5. procore_list_rfis               - List RFIs
# 6. procore_get_rfi                 - Get RFI details
# 7. procore_list_submittals         - List submittals
# 8. procore_get_submittal          - Get submittal details
# 9. procore_list_observations      - List observations
# 10. procore_get_company           - Get company info

- slug: procore_list_projects
  name: List Projects
  description: |
    List all construction projects in the Procore organization with their names, statuses, locations, and key dates. Returns project details for managing construction operations and tracking progress.
  provider: procore
  endpoint: /v1/projects
  method: GET
  scopes: []
  tags:
    - projects
    - construction
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: procore_get_project
  name: Get Project
  description: |
    Get detailed information for a specific Procore project including its description, budget, schedule, and team members. Returns project documentation and current construction status.
  provider: procore
  endpoint: /v1/projects/{projectId}
  method: GET
  scopes: []
  tags:
    - projects
    - construction
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      projectId:
        type: string
        description: "Project ID"
    required:
      - projectId

