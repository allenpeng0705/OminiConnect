# Epic Games Tools - Allowlist
# Curated subset of Epic Games API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. epic_games_get_catalog         - Get catalog items
# 2. epic_games_list_offers         - List available offers
# 3. epic_games_get_offer            - Get offer details
# 4. epic_games_get_player           - Get player info
# 5. epic_games_list_entitlements    - List player entitlements
# 6. epic_games_get_achievements     - Get player achievements
# 7. epic_games_list_leaderboards   - List leaderboards
# 8. epic_games_get_leaderboard      - Get leaderboard entries
# 9. epic_games_list_news           - List news items
# 10. epic_games_get_tournament     - Get tournament details

- slug: epic_games_get_catalog
  name: Get Catalog
  description: |
    Retrieve the Epic Games store catalog with available game items including names, descriptions, prices, and release dates for each product.
  provider: epic-games
  endpoint: /api/v1/catalog
  method: GET
  scopes: []
  tags:
    - catalog
    - games
    - read
  input_schema:
    type: object
    description: Parameters for getting catalog
    properties:
      country:
        type: string
        description: "Country code for localization"
        default: US
    required: []

- slug: epic_games_list_offers
  name: List Offers
  description: |
    List all current promotional offers in the Epic Games store with prices, discounts, validity periods, and applicable product details.
  provider: epic-games
  endpoint: /api/v1/offers
  method: GET
  scopes: []
  tags:
    - offers
    - store
    - read
  input_schema:
    type: object
    description: Parameters for listing offers
    properties:
      country:
        type: string
        description: "Country code"
        default: US
    required: []

- slug: epic_games_get_offer
  name: Get Offer
  description: |
    Retrieve detailed information about a specific Epic Games store promotion including price, discount percentage, applicable products, and expiration date.
  provider: epic-games
  endpoint: /api/v1/offers/{id}
  method: GET
  scopes: []
  tags:
    - offers
    - store
    - read
  input_schema:
    type: object
    description: Parameters for getting offer
    properties:
      id:
        type: string
        description: "Offer ID"
    required:
      - id

- slug: epic_games_get_player
  name: Get Player
  description: |
    Retrieve the authenticated player's Epic Games profile including display name, account ID, creation date, and avatar information.
  provider: epic-games
  endpoint: /api/v1/player
  method: GET
  scopes: []
  tags:
    - player
    - games
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: epic_games_list_entitlements
  name: List Entitlements
  description: |
    List all game entitlements and owned content for a player including purchased games, in-game items, and subscription content with activation dates.
  provider: epic-games
  endpoint: /api/v1/entitlements
  method: GET
  scopes: []
  tags:
    - entitlements
    - games
    - read
  input_schema:
    type: object
    description: Parameters for listing entitlements
    properties:
      epic_id:
        type: string
        description: "Player Epic ID"
    required: []

- slug: epic_games_get_achievements
  name: Get Achievements
  description: |
    Retrieve a player's game achievements with completion status, unlock timestamps, and progress percentages for each achievement.
  provider: epic-games
  endpoint: /api/v1/achievements
  method: GET
  scopes: []
  tags:
    - achievements
    - games
    - read
  input_schema:
    type: object
    description: Parameters for getting achievements
    properties:
      epic_id:
        type: string
        description: "Player Epic ID"
    required: []

- slug: epic_games_list_leaderboards
  name: List Leaderboards
  description: |
    List all available Epic Games leaderboards across different games with leaderboard names, associated game titles, and total entry counts.
  provider: epic-games
  endpoint: /api/v1/leaderboards
  method: GET
  scopes: []
  tags:
    - leaderboards
    - games
    - read
  input_schema:
    type: object
    description: Parameters for listing leaderboards
    properties: {}
    required: []

- slug: epic_games_get_leaderboard
  name: Get Leaderboard
  description: |
    Retrieve ranked entries for a specific Epic Games leaderboard including player rankings, scores, display names, and rank change indicators.
  provider: epic-games
  endpoint: /api/v1/leaderboards/{id}
  method: GET
  scopes: []
  tags:
    - leaderboards
    - games
    - read
  input_schema:
    type: object
    description: Parameters for getting leaderboard
    properties:
      id:
        type: string
        description: "Leaderboard ID"
    required:
      - id

- slug: epic_games_list_news
  name: List News
  description: |
    List Epic Games news articles and game updates with titles, summaries, publish dates, images, and category tags for each article.
  provider: epic-games
  endpoint: /api/v1/news
  method: GET
  scopes: []
  tags:
    - news
    - read
  input_schema:
    type: object
    description: Parameters for listing news
    properties:
      country:
        type: string
        description: "Country code"
        default: US
    required: []

- slug: epic_games_get_tournament
  name: Get Tournament
  description: |
    Retrieve detailed information about a specific Epic Games tournament including registration deadlines, prize pool distribution, format rules, and registered teams.
  provider: epic-games
  endpoint: /api/v1/tournaments/{id}
  method: GET
  scopes: []
  tags:
    - tournaments
    - games
    - read
  input_schema:
    type: object
    description: Parameters for getting tournament
    properties:
      id:
        type: string
        description: "Tournament ID"
    required:
      - id
