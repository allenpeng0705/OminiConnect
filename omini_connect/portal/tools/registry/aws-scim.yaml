- slug: aws_scim_list_service_providers
  name: List Service Providers
  description: |
    Get SCIM service provider configuration information.
  provider: aws-scim
  endpoint: /ServiceProviderConfig
  method: GET
  scopes: []
  tags:
    - service-provider
    - config
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []
