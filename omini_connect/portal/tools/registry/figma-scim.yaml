# Figma SCIM Tools - Allowlist
# Curated subset of Figma SCIM API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. figma_scim_list_users         - List users
# 2. figma_scim_get_user          - Get user details
# 3. figma_scim_create_user      - Create a user
# 4. figma_scim_update_user      - Update user details
# 5. figma_scim_delete_user      - Delete a user
# 6. figma_scim_list_groups      - List groups
# 7. figma_scim_get_group        - Get group details
# 8. figma_scim_create_group     - Create a group
# 9. figma_scim_update_group    - Update group
# 10. figma_scim_list_provisioning_logs - List provisioning logs

- slug: figma_scim_list_users
  name: List Users
  description: |
    List all users in the organization.
  provider: figma-scim
  endpoint: /Users
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      start_index:
        type: integer
        description: "Start index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: figma_scim_get_user
  name: Get User
  description: |
    Get details of a specific user.
  provider: figma-scim
  endpoint: /Users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for getting user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: figma_scim_create_user
  name: Create User
  description: |
    Create a new user in the organization.
  provider: figma-scim
  endpoint: /Users
  method: POST
  scopes: []
  tags:
    - users
    - identity
    - create
  input_schema:
    type: object
    description: Parameters for creating user
    properties:
      user_name:
        type: string
        description: "Username (email)"
      display_name:
        type: string
        description: "Display name"
      email:
        type: string
        description: "Email address"
    required:
      - user_name
      - email

- slug: figma_scim_update_user
  name: Update User
  description: |
    Update user details.
  provider: figma-scim
  endpoint: /Users/{id}
  method: PUT
  scopes: []
  tags:
    - users
    - identity
    - update
  input_schema:
    type: object
    description: Parameters for updating user
    properties:
      id:
        type: string
        description: "User ID"
      display_name:
        type: string
        description: "Display name"
      email:
        type: string
        description: "Email address"
    required:
      - id

- slug: figma_scim_delete_user
  name: Delete User
  description: |
    Delete a user from the organization.
  provider: figma-scim
  endpoint: /Users/{id}
  method: DELETE
  scopes: []
  tags:
    - users
    - identity
    - delete
  input_schema:
    type: object
    description: Parameters for deleting user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

