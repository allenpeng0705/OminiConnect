# Stay AI Tools - Allowlist
# Curated subset of Stay AI API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_customers                           - List all customers
# 2. get_customer                             - Get customer details
# 3. list_subscriptions                       - List all subscriptions
# 4. get_subscription                         - Get subscription details
# 5. list_orders                              - List all orders
# 6. get_order                                - Get order details
# 7. list_products                            - List all products
# 8. get_product                              - Get product details
# 9. get_churn_analysis                       - Get churn analysis
# 10. get_revenue                              - Get revenue metrics

- slug: list_customers
  name: List Customers
  description: |
    List all customers in Stay AI. Returns customer names, email addresses, subscription counts, and acquisition dates.
  provider: stay-ai
  endpoint: /customers
  method: GET
  scopes: []
  tags:
    - customers
    - subscription
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_customer
  name: Get Customer
  description: |
    Get detailed information about a specific Stay AI customer including subscription history and lifetime value.
  provider: stay-ai
  endpoint: /customers/{id}
  method: GET
  scopes: []
  tags:
    - customers
    - subscription
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

