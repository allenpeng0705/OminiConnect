- slug: woocommerce_list_coupons
  name: List Coupons
  description: |
    List all coupons in the WooCommerce store. Filter by discount type and usage limit.
  provider: woocommerce
  endpoint: /wp-json/wc/v3/coupons
  method: GET
  scopes:
