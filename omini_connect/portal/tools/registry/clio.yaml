- slug: clio_list_calendar_events
  name: List Calendar Events
  description: |
    Retrieve all calendar events and deadlines.
  provider: clio
  endpoint: /calendar/events
  method: GET
  scopes:
    - calendar:read
  tags:
    - calendar
  input_schema:
    type: object
    description: Calendar event filters
    properties:
      matter_id:
        type: string
        description: "Filter by matter ID"
      start_date:
        type: string
        description: "Filter events from this date"
      end_date:
        type: string
        description: "Filter events until this date"
      limit:
        type: integer
        description: "Maximum number of events to return"
    required: []

- slug: clio_list_tasks
  name: List Tasks
  description: |
    Retrieve all tasks in your practice management.
  provider: clio
  endpoint: /tasks
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Task filter options
    properties:
      matter_id:
        type: string
        description: "Filter by matter ID"
      status:
        type: string
        description: "Filter by status (pending, completed, overdue)"
      assignee:
        type: string
        description: "Filter by assignee ID"
      limit:
        type: integer
        description: "Maximum number of tasks to return"
    required: []
