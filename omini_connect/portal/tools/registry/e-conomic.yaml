# e-conomic Tools - Allowlist
# Curated subset of the e-conomic API for AI agent use.
# BASIC auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. e_conomic_list_customers          - List customers
# 2. e_conomic_get_customer           - Get customer details
# 3. e_conomic_list_invoices           - List invoices
# 4. e_conomic_get_invoice             - Get invoice details
# 5. e_conomic_list_products          - List products
# 6. e_conomic_get_product            - Get product details
# 7. e_conomic_list_orders            - List orders
# 8. e_conomic_get_order              - Get order details
# 9. e_conomic_list_accounts          - List accounts
# 10. e_conomic_get_account           - Get account details

- slug: e_conomic_list_customers
  name: List Customers
  description: |
    List all customers in e-conomic.
  provider: e-conomic
  endpoint: /customers
  method: GET
  scopes: []
  tags:
    - customers
    - accounting
    - list
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      email:
        type: string
        description: "Filter by email"
    required: []

- slug: e_conomic_get_customer
  name: Get Customer
  description: |
    Get details of a specific customer.
  provider: e-conomic
  endpoint: /customers/{customer_id}
  method: GET
  scopes: []
  tags:
    - customers
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: string
        description: "Customer ID"
    required:
      - customer_id

