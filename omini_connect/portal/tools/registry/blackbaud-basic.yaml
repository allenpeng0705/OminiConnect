# Blackbaud (Basic Auth) Tools - Allowlist
# Curated subset of Blackbaud SKY API for AI agent use.
# BASIC auth via Nango (SOAP-based).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. blackbaud_basic_list_constituents    - List constituents
# 2. blackbaud_basic_get_constituent     - Get constituent details
# 3. blackbaud_basic_list_gifts         - List gifts
# 4. blackbaud_basic_get_gift           - Get gift details
# 5. blackbaud_basic_list_campaigns     - List campaigns
# 6. blackbaud_basic_get_campaign       - Get campaign details
# 7. blackbaud_basic_list_funds        - List funds
# 8. blackbaud_basic_get_fund           - Get fund details
# 9. blackbaud_basic_list_appeals       - List appeals
# 10. blackbaud_basic_get_appeal        - Get appeal details

- slug: blackbaud_basic_list_constituents
  name: List Constituents
  description: |
    List all constituents (donors, supporters) in the Blackbaud database and return names, emails, and giving history.
    Search by name or email to find specific constituents for relationship management.
  provider: blackbaud-basic
  endpoint: /constituents/v1/constituents
  method: GET
  scopes: []
  tags:
    - constituents
    - crm
  input_schema:
    type: object
    description: Parameters for listing constituents
    properties:
      search_text:
        type: string
        description: "Search by name or email"
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: blackbaud_basic_get_constituent
  name: Get Constituent
  description: |
    Get details for a specific constituent including contact information, giving history, and relationship data.
    Returns the complete constituent profile for fundraising management.
  provider: blackbaud-basic
  endpoint: /constituents/v1/constituents/{id}
  method: GET
  scopes: []
  tags:
    - constituents
    - read
  input_schema:
    type: object
    description: Parameters for getting a constituent
    properties:
      id:
        type: integer
        description: "Constituent ID"
    required:
      - id

- slug: blackbaud_basic_list_gifts
  name: List Gifts
  description: |
    List all gifts (donations) in the Blackbaud database and return gift amounts, dates, and donor information.
    Filter by constituent to analyze individual giving patterns.
  provider: blackbaud-basic
  endpoint: /gift/v1/gifts
  method: GET
  scopes: []
  tags:
    - gifts
    - donations
  input_schema:
    type: object
    description: Parameters for listing gifts
    properties:
      constituent_id:
        type: integer
        description: "Filter by constituent ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: blackbaud_basic_get_gift
  name: Get Gift
