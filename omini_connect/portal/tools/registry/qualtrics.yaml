# Qualtrics Tools - Allowlist
# Curated subset of Qualtrics API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. qualtrics_list_surveys         - List all surveys
# 2. qualtrics_get_survey           - Get survey details
# 3. qualtrics_list_responses       - List survey responses
# 4. qualtrics_get_response         - Get response details
# 5. qualtrics_distribute_survey    - Distribute a survey
# 6. qualtrics_get_distribution     - Get distribution details
# 7. qualtrics_list_users           - List users
# 8. qualtrics_get_user             - Get user details
# 9. qualtrics_get_report           - Get survey report
# 10. qualtrics_list_exports        - List data exports

- slug: qualtrics_list_surveys
  name: List Surveys
  description: |
    List all surveys in the Qualtrics account.
  provider: qualtrics
  endpoint: /surveys
  method: GET
  scopes:
    - read
  tags:
    - surveys
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing surveys
    properties:
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
      active:
        type: boolean
        description: "Filter to only active surveys"
        default: true
    required: []

- slug: qualtrics_get_survey
  name: Get Survey
  description: |
    Get detailed information about a specific survey including questions.
  provider: qualtrics
  endpoint: /surveys/{survey_id}
  method: GET
  scopes:
    - read
  tags:
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for getting a survey
    properties:
      survey_id:
        type: string
        description: "Survey ID"
    required:
      - survey_id

- slug: qualtrics_list_responses
  name: List Responses
  description: |
    List all responses for a specific survey.
  provider: qualtrics
  endpoint: /surveys/{survey_id}/responses
  method: GET
  scopes:
    - read
  tags:
    - responses
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing responses
    properties:
      survey_id:
        type: string
        description: "Survey ID"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
      start_date:
        type: string
        description: "Filter from date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "Filter to date (YYYY-MM-DD)"
    required:
      - survey_id

- slug: qualtrics_get_response
  name: Get Response
  description: |
    Get detailed information about a specific survey response.
  provider: qualtrics
  endpoint: /surveys/{survey_id}/responses/{response_id}
  method: GET
  scopes:
    - read
  tags:
    - responses
    - read
  input_schema:
    type: object
    description: Parameters for getting a response
    properties:
      survey_id:
        type: string
        description: "Survey ID"
      response_id:
        type: string
        description: "Response ID"
    required:
      - survey_id
      - response_id

- slug: qualtrics_distribute_survey
  name: Distribute Survey
  description: |
    Distribute a survey via email, link, or social media.
  provider: qualtrics
  endpoint: /surveys/{survey_id}/distributions
  method: POST
  scopes:
    - write
  tags:
    - surveys
    - distribute
    - create
  input_schema:
    type: object
    description: Parameters for distributing a survey
    properties:
      survey_id:
        type: string
        description: "Survey ID"
      type:
        type: string
        description: "Distribution type: email, link, generic"
      recipients:
        type: array
        description: "Array of recipient emails for email distribution"
      message:
        type: object
        description: "Email message content"
      from_name:
        type: string
        description: "Sender name"
    required:
      - survey_id
      - type

- slug: qualtrics_get_distribution
  name: Get Distribution
  description: |
    Get details about a specific survey distribution.
  provider: qualtrics
  endpoint: /distributions/{distribution_id}
  method: GET
  scopes:
    - read
  tags:
    - distributions
    - read
  input_schema:
    type: object
    description: Parameters for getting a distribution
    properties:
      distribution_id:
        type: string
        description: "Distribution ID"
    required:
      - distribution_id

- slug: qualtrics_list_users
  name: List Users
  description: |
    List all users in the Qualtrics account.
  provider: qualtrics
  endpoint: /users
  method: GET
  scopes:
    - read
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
      organization_id:
        type: string
        description: "Filter by organization ID"
    required: []

- slug: qualtrics_get_user
  name: Get User
  description: |
    Get detailed information about a specific user.
  provider: qualtrics
  endpoint: /users/{user_id}
  method: GET
  scopes:
    - read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: qualtrics_get_report
  name: Get Report
  description: |
    Get survey report with response statistics and analytics.
  provider: qualtrics
  endpoint: /surveys/{survey_id}/reports
  method: GET
  scopes:
    - read
  tags:
    - surveys
    - reports
    - read
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      survey_id:
        type: string
        description: "Survey ID"
      report_type:
        type: string
        description: "Report type: default, crosstab, banner"
        default: default
    required:
      - survey_id

- slug: qualtrics_list_exports
  name: List Exports
  description: |
    List all data exports for a survey.
  provider: qualtrics
  endpoint: /surveys/{survey_id}/exports
  method: GET
  scopes:
    - read
  tags:
    - exports
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing exports
    properties:
      survey_id:
        type: string
        description: "Survey ID"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
    required:
      - survey_id
