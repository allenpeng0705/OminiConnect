- slug: fitbit_get_goals
  name: Get Goals
  description: |
    Get the current fitness and health goals for the Fitbit user including daily step target, calories burned goal, and sleep duration target.
  provider: fitbit
  endpoint: /1/user/-/goals.json
  method: GET
  scopes: []
  tags:
    - goals
    - fitness
    - read
  input_schema:
    type: object
    description: Parameters for getting goals
    properties:
      period:
        type: string
        description: "Period (daily, weekly)"
    required: []
