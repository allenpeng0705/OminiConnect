# Fitbit Tools - Allowlist
# Curated subset of Fitbit API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fitbit_get_user             - Get current user
# 2. fitbit_list_activities    - List activities
# 3. fitbit_get_activity       - Get activity details
# 4. fitbit_list_sleep         - List sleep records
# 5. fitbit_get_sleep          - Get sleep details
# 6. fitbit_list_body          - List body measurements
# 7. fitbit_get_body           - Get body details
# 8. fitbit_list_heart         - List heart rate data
# 9. fitbit_list_food         - List food logs
# 10. fitbit_get_goals        - Get user goals

- slug: fitbit_get_user
  name: Get User
  description: |
    Get the profile information for the currently authenticated Fitbit user. Returns user details including display name, member since date, and basic health preferences.
  provider: fitbit
  endpoint: /1/user/-/profile.json
  method: GET
  scopes: []
  tags:
    - user
    - profile
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: fitbit_list_activities
  name: List Activities
  description: |
    List all recorded activities for the Fitbit user within a specified date or period. Returns activity types, durations, calories burned, and distance traveled for each activity.
  provider: fitbit
  endpoint: /1/user/-/activities.json
  method: GET
  scopes: []
  tags:
    - activities
    - fitness
    - read
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      date:
        type: string
        description: "Date (YYYY-MM-DD)"
      period:
        type: string
        description: "Period (1d, 7d, 30d)"
    required: []

- slug: fitbit_get_activity
  name: Get Activity
  description: |
    Get detailed information about a specific activity record including duration, calories, distance, heart rate zones, and step count for that activity.
  provider: fitbit
  endpoint: /1/user/-/activities/{id}.json
  method: GET
  scopes: []
  tags:
    - activities
    - fitness
    - read
  input_schema:
    type: object
    description: Parameters for getting activity
    properties:
      id:
        type: string
        description: "Activity ID"
      date:
        type: string
        description: "Date (YYYY-MM-DD)"
    required:
      - id

- slug: fitbit_list_sleep
  name: List Sleep
  description: |
    List all sleep records for the Fitbit user within a specified date or period. Returns sleep duration, quality scores, time asleep versus awake, and sleep stage breakdowns for each record.
  provider: fitbit
  endpoint: /1/user/-/sleep.json
  method: GET
  scopes: []
  tags:
    - sleep
    - health
    - read
  input_schema:
    type: object
    description: Parameters for listing sleep
    properties:
      date:
        type: string
        description: "Date (YYYY-MM-DD)"
      period:
        type: string
        description: "Period (1d, 7d, 30d)"
    required: []

- slug: fitbit_get_sleep
  name: Get Sleep
  description: |
    Get detailed sleep data for a specific date including total sleep time, sleep efficiency, time in each sleep stage, and wake-up instances.
  provider: fitbit
  endpoint: /1/user/-/sleep/date/{date}.json
  method: GET
  scopes: []
  tags:
    - sleep
    - health
    - read
  input_schema:
    type: object
    description: Parameters for getting sleep
    properties:
      date:
        type: string
        description: "Date (YYYY-MM-DD)"
    required:
      - date

