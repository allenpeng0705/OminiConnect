# ProjectManager Tools - Allowlist
# Curated subset of ProjectManager REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. projectmanager_list_projects       - List projects
# 2. projectmanager_get_project         - Get project details
# 3. projectmanager_create_project      - Create a project
# 4. projectmanager_list_tasks          - List tasks
# 5. projectmanager_get_task            - Get task details
# 6. projectmanager_list_teams          - List teams
# 7. projectmanager_get_team            - Get team details
# 8. projectmanager_list_timesheets     - List timesheets
# 9. projectmanager_get_timesheet       - Get timesheet details
# 10. projectmanager_list_milestones     - List milestones

- slug: projectmanager_list_projects
  name: List Projects
  description: |
    List all projects available.
  provider: projectmanager
  endpoint: /api/projects
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      status:
        type: string
        description: "Filter by status (Active, Archived, Draft)"
    required: []

- slug: projectmanager_get_project
  name: Get Project
  description: |
    Get detailed information about a project.
  provider: projectmanager
  endpoint: /api/projects/{projectId}
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      projectId:
        type: string
        description: "Project ID"
    required:
      - projectId

- slug: projectmanager_create_project
  name: Create Project
  description: |
    Create a new project.
  provider: projectmanager
  endpoint: /api/projects
  method: POST
  scopes:
    - projects:write
  tags:
    - projects
    - create
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      description:
        type: string
        description: "Project description"
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - name

