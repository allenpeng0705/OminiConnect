# Wildix PBX Tools - Allowlist
# Curated subset of Wildix PBX API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wildix_list_extensions           - List all extensions
# # 2. wildix_get_extension           - Get extension details
# # 3. wildix_list_calls           - List all calls
# # 4. wildix_make_call           - Initiate a call
# # 5. wildix_transfer_call           - Transfer a call
# # 6. wildix_hangup_call           - Hangup a call
# # 7. wildix_list_voicemails           - List all voicemails
# # 8. wildix_get_voicemail           - Get voicemail details
# # 9. wildix_list_conferences           - List all conferences
# # 10. wildix_get_presence           - Get user presence status

- slug: wildix_list_extensions
  name: List Extensions
  description: |
    List all extensions
  provider: wildix-pbx
  endpoint: /api/v1/extensions
  method: GET
  scopes:
    - read
  tags:
    - wildix-pbx
  input_schema:
    type: object
    description: Parameters for list extensions
    properties: {}
    required: []

- slug: wildix_get_extension
  name: Get Extension
  description: |
