# Salesforce-sandbox Tools - Allowlist
# Curated subset of Salesforce API for AI agent use.
# Sandbox environment for testing.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. salesforce-sandbox_list_contacts         - List all contacts
# 2. salesforce-sandbox_get_contact           - Get contact details
# 3. salesforce-sandbox_create_contact         - Create a contact
# 4. salesforce-sandbox_list_leads            - List all leads
# 5. salesforce-sandbox_get_lead             - Get lead details
# 6. salesforce-sandbox_create_lead          - Create a lead
# 7. salesforce-sandbox_list_opportunities   - List opportunities
# 8. salesforce-sandbox_get_opportunity      - Get opportunity details
# 9. salesforce-sandbox_list_accounts        - List all accounts
# 10. salesforce-sandbox_get_account         - Get account details

- slug: salesforce-sandbox_list_contacts
  name: List Contacts
  description: |
    Retrieve a list of all contacts in sandbox.
  provider: salesforce-sandbox
  endpoint: /v1/contacts
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
    - crm
    - sandbox
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of contacts"
        default: 50
    required: []

- slug: salesforce-sandbox_get_contact
  name: Get Contact
  description: |
    Get details of a specific contact.
  provider: salesforce-sandbox
  endpoint: /v1/contacts/{contactId}
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
    - crm
    - sandbox
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contactId:
        type: string
        description: "The contact ID"
    required:
      - contactId

- slug: salesforce-sandbox_create_contact
  name: Create Contact
  description: |
    Create a new contact in sandbox.
  provider: salesforce-sandbox
  endpoint: /v1/contacts
  method: POST
  scopes:
    - contacts:write
  tags:
    - contacts
    - crm
    - sandbox
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
    required:
      - firstName
      - lastName

