- slug: tawkto_list_departments
  name: List Departments
  description: |
    List all departments configured in your Tawk.to account.
    Departments organize agents and route chats to the right team.
  provider: tawkto
  endpoint: /departments
  method: GET
  scopes:
    - departments
  tags:
    - departments
    - organization
  input_schema:
    type: object
    description: Parameters for listing departments
    properties:
      propertyId:
        type: string
        description: "Filter by property ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: tawkto_list_triggers
  name: List Triggers
  description: |
    List all automated triggers. Triggers fire based on conditions (time on page, visitor country, etc.)
    to automatically start chats or send messages.
  provider: tawkto
  endpoint: /triggers
  method: GET
  scopes:
    - triggers
  tags:
    - triggers
    - automation
  input_schema:
    type: object
    description: Parameters for listing triggers
    properties:
      propertyId:
        type: string
        description: "Filter by property ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []