    List all agents in your Tawk.to account. Includes their status, role, and department assignments.
  provider: tawkto
  endpoint: /agents
  method: GET
  scopes:
    - agents
  tags:
    - agents
    - team
  input_schema:
    type: object
    description: Parameters for listing agents
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: tawkto_get_agent
  name: Get Agent
  description: |
    Get detailed information about a specific agent including their schedule, status, and performance metrics.
  provider: tawkto
  endpoint: /agents/{agentId}
  method: GET
  scopes:
    - agents
  tags:
    - agents
    - read
  input_schema:
    type: object
    description: Parameters for getting an agent
    properties:
      agentId:
        type: string
        description: "Agent ID (path parameter)"
