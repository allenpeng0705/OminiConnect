# Zoho Recruit Tools - Allowlist
# Curated subset of Zoho Recruit API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_recruit_list_candidates           - List all candidates
# # 2. zoho_recruit_get_candidate           - Get candidate details
# # 3. zoho_recruit_create_candidate           - Create a new candidate
# # 4. zoho_recruit_update_candidate           - Update candidate details
# # 5. zoho_recruit_list_jobs           - List all job openings
# # 6. zoho_recruit_get_job           - Get job details
# # 7. zoho_recruit_create_job           - Create a new job opening
# # 8. zoho_recruit_list_interviews           - List all interviews
# # 9. zoho_recruit_create_interview           - Schedule an interview
# # 10. zoho_recruit_list_clients           - List all clients

- slug: zoho_recruit_list_candidates
  name: List Candidates
  description: |
    List all candidates
  provider: zoho-recruit
  endpoint: /api/v2/candidates
  method: GET
  scopes:
    - read
  tags:
    - zoho-recruit
  input_schema:
    type: object
    description: Parameters for list candidates
    properties: {}
    required: []

- slug: zoho_recruit_get_candidate
  name: Get Candidate
  description: |
    Get candidate details
  provider: zoho-recruit
  endpoint: /api/v2/candidates/{id}
  method: GET
  scopes:
