- slug: freshdesk_list_tickets
  name: List Tickets
  description: |
    Retrieves a list of support tickets from Freshdesk.
  provider: freshdesk
  endpoint: /tickets
  method: GET
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of results per page (default 30)"
      status:
        type: integer
        description: "Filter by status (2=open, 3=pending, 4=resolved, 5=closed)"
      priority:
        type: integer
        description: "Filter by priority (1=low, 2=medium, 3=high, 4=urgent)"
    required: []

- slug: freshdesk_get_ticket
  name: Get Ticket
  description: |
    Retrieves a single support ticket by its ID.
  provider: freshdesk
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
    required:
      - id

- slug: freshdesk_create_ticket
  name: Create Ticket
  description: |
    Creates a new support ticket in Freshdesk.
  provider: freshdesk
  endpoint: /tickets
  method: POST
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      subject:
        type: string
        description: "The ticket subject line"
      description:
        type: string
        description: "The ticket description"
      email:
        type: string
        description: "Requester email address"
      priority:
        type: integer
        description: "Priority (1=low, 2=medium, 3=high, 4=urgent)"
      status:
        type: integer
        description: "Status (2=open, 3=pending, 4=resolved, 5=closed)"
    required:
      - subject
      - description
      - email

- slug: freshdesk_update_ticket
  name: Update Ticket
  description: |
    Updates an existing support ticket.
  provider: freshdesk
  endpoint: /tickets/{id}
  method: PUT
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for updating a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
      subject:
        type: string
        description: "Updated ticket subject"
      description:
        type: string
        description: "Updated ticket description"
      status:
        type: integer
        description: "Updated status"
      priority:
        type: integer
        description: "Updated priority"
    required:
      - id

