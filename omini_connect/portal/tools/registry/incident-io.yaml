# Incident.io Tools - Allowlist
# Curated subset of Incident.io API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. incident_list_incidents       - List incidents
# 2. incident_get_incident         - Get incident details
# 3. incident_list_severities     - List severities
# 4. incident_list_urgencies      - List urgencies
# 5. incident_list_status_pages   - List status pages
# 6. incident_list_members        - List members
# 7. incident_list_roles          - List roles
# 8. incident_list_catalog         - List catalog items
# 9. incident_get_catalog         - Get catalog item details
# 10. incident_list_metrics        - List metrics

- slug: incident_list_incidents
  name: List Incidents
  description: |
    List all incidents in incident.io.
    Returns incident details including title, status, and severity.
  provider: incident-io
  endpoint: /v1/incidents
  method: GET
  scopes:
    - read
  tags:
    - incidents
    - list
  input_schema:
    type: object
    description: Parameters for listing incidents
    properties:
      status:
        type: string
        description: "Filter by status: investigating, identified, monitoring, resolved"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: incident_get_incident
  name: Get Incident
  description: |
    Get detailed information about a specific incident.
    Includes timeline, severity, and affected services.
  provider: incident-io
  endpoint: /v1/incidents/{id}
  method: GET
  scopes:
    - read
  tags:
    - incidents
    - read
  input_schema:
    type: object
    description: Parameters for getting an incident
    properties:
      id:
        type: string
        description: "Incident ID"
    required:
      - id

