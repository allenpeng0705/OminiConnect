- slug: jobvite_create_candidate
  name: Create Candidate
  description: |
    Create a new candidate.
  provider: jobvite
  endpoint: /v2/candidate
  method: POST
  scopes: []
  tags:
    - candidates
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a candidate
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
    required:
      - first_name
      - last_name
      - email

- slug: jobvite_create_job
  name: Create Job
  description: |
    Create a new job posting.
  provider: jobvite
  endpoint: /v2/job
  method: POST
  scopes: []
  tags:
    - jobs
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a job
    properties:
      title:
        type: string
        description: "Job title"
      department_id:
        type: string
        description: "Department ID"
      location_id:
        type: string
        description: "Location ID"
      description:
        type: string
        description: "Job description"
    required:
      - title
