# Jobvite Tools - Allowlist
# Curated subset of Jobvite API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jobvite_list_candidates    - List candidates
# 2. jobvite_get_candidate      - Get candidate details
# 3. jobvite_list_jobs         - List job postings
# 4. jobvite_get_job           - Get job details
# 5. jobvite_list_offers       - List offers
# 6. jobvite_get_offer         - Get offer details
# 7. jobvite_list_departments  - List departments
# 8. jobvite_list_locations    - List locations
# 9. jobvite_create_candidate  - Create a candidate
# 10. jobvite_create_job       - Create a job

- slug: jobvite_list_candidates
  name: List Candidates
  description: |
    List all candidates in Jobvite.
  provider: jobvite
  endpoint: /v2/candidate
  method: GET
  scopes: []
  tags:
    - candidates
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      status:
        type: string
        description: "Candidate status filter"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: jobvite_get_candidate
  name: Get Candidate
  description: |
    Get details for a specific candidate.
  provider: jobvite
  endpoint: /v2/candidate/{candidate_id}
  method: GET
  scopes: []
  tags:
    - candidates
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      candidate_id:
        type: string
        description: "Candidate ID"
    required:
      - candidate_id

- slug: jobvite_list_jobs
  name: List Jobs
  description: |
    List all job postings.
  provider: jobvite
  endpoint: /v2/job
  method: GET
  scopes: []
  tags:
    - jobs
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Job status (open, closed, all)"
        default: open
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

