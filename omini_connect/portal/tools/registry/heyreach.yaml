# HeyReach Tools - Allowlist
# Curated subset of HeyReach API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. heyreach_list_campaigns       - List campaigns
# 2. heyreach_get_campaign        - Get campaign details
# 3. heyreach_list_sequences      - List sequences
# 4. heyreach_get_sequence        - Get sequence details
# 5. heyreach_list_prospects      - List prospects
# 6. heyreach_get_prospect        - Get prospect details
# 7. heyreach_list_accounts       - List accounts
# 8. heyreach_get_account         - Get account details
# 9. heyreach_list_tasks          - List tasks
# 10. heyreach_list_stats          - List statistics

- slug: heyreach_list_campaigns
  name: List Campaigns
  description: |
    List all campaigns in HeyReach.
    Returns campaign details including name, status, and stats.
  provider: heyreach
  endpoint: /public/campaigns
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: heyreach_get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific campaign.
    Includes campaign settings and performance metrics.
  provider: heyreach
  endpoint: /public/campaigns/{id}
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

