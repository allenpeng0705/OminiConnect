# Holded Tools - Allowlist
# Curated subset of Holded API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. holded_list_contacts         - List contacts
# 2. holded_get_contact           - Get contact details
# 3. holded_list_invoices         - List invoices
# 4. holded_get_invoice           - Get invoice details
# 5. holded_list_products         - List products
# 6. holded_get_product           - Get product details
# 7. holded_list_expenses         - List expenses
# 8. holded_get_expense           - Get expense details
# 9. holded_list_treasury         - List treasury movements
# 10. holded_list_projects        - List projects

- slug: holded_list_contacts
  name: List Contacts
  description: |
    Retrieve all contacts in your Holded account with optional type filtering.
    Returns contact names, emails, and type (customer or vendor).
  provider: holded
  endpoint: /invoicing/v1/contacts
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - list
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      type:
        type: string
        description: "Filter by type: customer, vendor"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: holded_get_contact
  name: Get Contact
  description: |
    Retrieve a specific Holded contact by ID with full profile and invoice history.
    Returns contact details including name, email, phone, and transactions.
  provider: holded
  endpoint: /invoicing/v1/contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: holded_list_invoices
  name: List Invoices
  description: |
    Retrieve all invoices in your Holded account with optional status and contact filtering.
    Returns invoice numbers, totals, statuses, and due dates.
  provider: holded
  endpoint: /invoicing/v1/invoices
  method: GET
  scopes:
    - read
  tags:
    - invoices
    - list
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      contact_id:
        type: string
        description: "Filter by contact ID"
      status:
        type: string
        description: "Filter by status: draft, sent, paid"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: holded_get_invoice
  name: Get Invoice
