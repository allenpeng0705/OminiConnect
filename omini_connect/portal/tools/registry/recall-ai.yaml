  provider: recall-ai
  endpoint: /v1/meetings/{meetingId}
  method: DELETE
  scopes:
    - meetings:write
  tags:
    - meetings
    - recall
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a meeting
    properties:
      meetingId:
        type: string
        description: "The meeting ID to delete"
    required:
      - meetingId

