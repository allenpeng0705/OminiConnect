- slug: recall-ai_create_meeting
  name: Create Meeting
  description: |
    Create a new meeting for processing.
  provider: recall-ai
  endpoint: /v1/meetings
  method: POST
  scopes:
    - meetings:write
  tags:
    - meetings
    - recall
    - create
  input_schema:
    type: object
    description: Parameters for creating a meeting
    properties:
      title:
        type: string
        description: "Meeting title"
      scheduledTime:
        type: string
        description: "Scheduled start time (ISO 8601)"
      duration:
        type: integer
        description: "Duration in minutes"
    required:
      - title

- slug: recall-ai_delete_meeting
