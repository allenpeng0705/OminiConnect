# Recallai Tools - Allowlist
# Curated subset of Recall.ai API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. recall-ai_list_meetings        - List all meetings
# 2. recall-ai_get_meeting          - Get meeting details
# 3. recall-ai_list_transcripts     - List meeting transcripts
# 4. recall-ai_get_transcript        - Get transcript details
# 5. recall-ai_list_summaries        - List AI summaries
# 6. recall-ai_get_summary           - Get summary details
# 7. recall-ai_list_action_items     - List action items
# 8. recall-ai_create_meeting        - Create a meeting
# 9. recall-ai_delete_meeting        - Delete a meeting
# 10. recall-ai_list_participants   - List meeting participants

- slug: recall-ai_list_meetings
  name: List Meetings
  description: |
    Retrieve a list of all meetings processed by Recall.ai.
  provider: recall-ai
  endpoint: /v1/meetings
  method: GET
  scopes:
    - meetings:read
  tags:
    - meetings
    - recall
    - intelligence
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      limit:
        type: integer
        description: "Number of meetings to return"
        default: 50
      cursor:
        type: string
        description: "Pagination cursor"
      startDate:
        type: string
        description: "Filter from date (ISO 8601)"
      endDate:
        type: string
        description: "Filter to date (ISO 8601)"
    required: []

- slug: recall-ai_get_meeting
  name: Get Meeting
  description: |
    Get details of a specific meeting.
  provider: recall-ai
  endpoint: /v1/meetings/{meetingId}
  method: GET
  scopes:
    - meetings:read
  tags:
    - meetings
    - recall
    - intelligence
  input_schema:
    type: object
    description: Parameters for getting a meeting
    properties:
      meetingId:
        type: string
        description: "The meeting ID"
    required:
      - meetingId

