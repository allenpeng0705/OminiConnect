# Vimeo (Basic) Tools - Allowlist
# Curated subset of Vimeo (Basic) API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. vimeo_get_user           - Get authenticated user info
# # 2. vimeo_list_videos           - List all videos
# # 3. vimeo_get_video           - Get video details
# # 4. vimeo_upload_video           - Upload a new video
# # 5. vimeo_update_video           - Update video metadata
# # 6. vimeo_delete_video           - Delete a video
# # 7. vimeo_list_albums           - List all albums
# # 8. vimeo_get_album           - Get album details
# # 9. vimeo_create_album           - Create a new album
# # 10. vimeo_get_likes           - Get liked videos

- slug: vimeo_get_user
  name: Get User
  description: |
    Get authenticated user info
  provider: vimeo-basic
  endpoint: /users/me
  method: GET
  scopes:
    - read
  tags:
    - vimeo-basic
  input_schema:
    type: object
    description: Parameters for get user
    properties: {}
    required: []

