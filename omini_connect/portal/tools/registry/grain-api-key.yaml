# Grain API Key Tools - Allowlist
# Curated subset of Grain API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. grain_list_recordings         - List recordings
# 2. grain_get_recording           - Get recording details
# 3. grain_list_transcripts       - List transcripts
# 4. grain_get_transcript         - Get transcript details
# 5. grain_list_highlights        - List highlights
# 6. grain_create_highlight       - Create a highlight
# 7. grain_list_participants      - List participants
# 8. grain_list_workspaces        - List workspaces
# 9. grain_list_speakers          - List speakers
# 10. grain_list_meetings          - List meetings

- slug: grain_list_recordings
  name: List Recordings
  description: |
    List all recordings from Grain.
    Returns recording details including title, duration, and date.
  provider: grain-api-key
  endpoint: /api/v1/recordings
  method: GET
  scopes:
    - read
  tags:
    - recordings
    - list
  input_schema:
    type: object
    description: Parameters for listing recordings
    properties:
      limit:
        type: integer
        description: "Max results (default 20)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: grain_get_recording
  name: Get Recording
  description: |
    Get detailed information about a specific recording.
    Includes video URL, thumbnail, and metadata.
  provider: grain-api-key
  endpoint: /api/v1/recordings/{id}
  method: GET
  scopes:
    - read
  tags:
    - recordings
    - read
  input_schema:
    type: object
    description: Parameters for getting a recording
    properties:
      id:
        type: string
        description: "Recording ID"
    required:
      - id

- slug: grain_list_transcripts
  name: List Transcripts
  description: |
    List all transcripts from Grain recordings with pagination and filtering.
    Returns transcript IDs, languages, and durations for each transcript.
    Use this to discover meeting transcripts and manage documentation.
  provider: grain-api-key
  endpoint: /api/v1/transcripts
  method: GET
  scopes:
    - read
  tags:
    - transcripts
    - list
  input_schema:
    type: object
    description: Parameters for listing transcripts
    properties:
      recording_id:
        type: string
        description: "Filter by recording ID"
    required: []

- slug: grain_get_transcript
  name: Get Transcript
  description: |
    Get detailed transcript for a specific recording including speaker segments and timestamps.
    Returns the complete transcript data with all associated information.
    This provides full transcript data for meeting documentation and analysis.
  provider: grain-api-key
  endpoint: /api/v1/transcripts/{id}
  method: GET
  scopes:
    - read
  tags:
    - transcripts
    - read
  input_schema:
    type: object
    description: Parameters for getting a transcript
    properties:
      id:
        type: string
        description: "Transcript ID"
    required:
      - id

- slug: grain_list_highlights
  name: List Highlights
  description: |
    List all highlights from Grain recordings with pagination and recording filter.
    Returns highlight IDs, labels, and timestamps for each highlight.
    Use this to discover key moments and track important meeting segments.
  provider: grain-api-key
  endpoint: /api/v1/highlights
  method: GET
  scopes:
    - read
  tags:
    - highlights
    - list
  input_schema:
    type: object
    description: Parameters for listing highlights
    properties:
      recording_id:
        type: string
        description: "Filter by recording ID"
    required: []

- slug: grain_create_highlight
  name: Create Highlight
  description: |
    Create a new highlight in a recording to mark a key moment for easy reference.
    Returns the created highlight with its unique ID and confirmation.
    This creates a bookmark for an important moment in a meeting recording.
  provider: grain-api-key
  endpoint: /api/v1/highlights
  method: POST
  scopes:
    - write
  tags:
    - highlights
    - create
  input_schema:
    type: object
    description: Parameters for creating a highlight
    properties:
      recording_id:
        type: string
        description: "Recording ID"
      start_time:
        type: number
        description: "Start time in seconds"
      end_time:
        type: number
        description: "End time in seconds"
      label:
        type: string
        description: "Highlight label"
    required:
      - recording_id
      - start_time
      - end_time

