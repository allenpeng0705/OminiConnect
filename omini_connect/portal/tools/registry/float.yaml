# Float Tools - Allowlist
# Curated subset of Float API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. float_list_projects         - List projects
# 2. float_get_project          - Get project details
# 3. float_list_tasks           - List tasks
# 4. float_get_task             - Get task details
# 5. float_list_people          - List team members
# 6. float_get_person           - Get person details
# 7. float_list_clients         - List clients
# 8. float_get_client          - Get client details
# 9. float_list_holidays       - List holidays
# 10. float_get_schedule       - Get project schedule

- slug: float_list_projects
  name: List Projects
  description: |
    List all projects.
  provider: float
  endpoint: /api/v3/projects
  method: GET
  scopes: []
  tags:
    - projects
    - resource
    - read
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: float_get_project
  name: Get Project
  description: |
    Get details of a specific project.
  provider: float
  endpoint: /api/v3/projects/{id}
  method: GET
  scopes: []
  tags:
    - projects
    - resource
    - read
  input_schema:
    type: object
    description: Parameters for getting project
    properties:
      id:
        type: string
        description: "Project ID"
    required:
      - id

