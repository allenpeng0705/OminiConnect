# TikTok for Business (Accounts) Tools - Allowlist
# Curated subset of TikTok for Business (Accounts) API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tiktok_list_ad_accounts           - List all ad accounts
# # 2. tiktok_get_ad_account           - Get ad account details
# # 3. tiktok_list_campaigns           - List all campaigns
# # 4. tiktok_get_campaign           - Get campaign details
# # 5. tiktok_create_campaign           - Create a new campaign
# # 6. tiktok_update_campaign           - Update a campaign
# # 7. tiktok_list_ads           - List all ads in a campaign
# # 8. tiktok_get_ad           - Get ad details
# # 9. tiktok_create_ad           - Create a new ad
# # 10. tiktok_get_user_info           - Get basic user info

- slug: tiktok_list_ad_accounts
  name: List Ad Accounts
  description: |
    List all ad accounts
  provider: tiktok-accounts
  endpoint: /advertiser/get
  method: GET
  scopes:
    - advertising.read
  tags:
    - tiktok-accounts
  input_schema:
    type: object
    description: Parameters for list ad accounts
    properties: {}
    required: []

