- slug: salesforce_get_contact
  name: Get Contact
  description: |
    Get detailed information about a Salesforce contact including name, email, phone, and account.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Contact/{contactId}
  method: GET
  scopes:
