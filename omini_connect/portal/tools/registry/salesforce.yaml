# Salesforce Tools - Allowlist
# Curated subset of Salesforce REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. salesforce_list_accounts     - List accounts
# 2. salesforce_get_account      - Get account details
# 3. salesforce_create_account   - Create an account
# 4. salesforce_list_contacts     - List contacts
# 5. salesforce_get_contact       - Get contact details
# 6. salesforce_create_contact    - Create a contact
# 7. salesforce_list_leads        - List leads
# 8. salesforce_get_lead          - Get lead details
# 9. salesforce_list_opportunities - List opportunities
# 10. salesforce_get_opportunity    - Get opportunity details

- slug: salesforce_list_accounts
  name: List Accounts
  description: |
    List all Salesforce CRM accounts (companies and organizations) with optional filtering by industry, type, or location. Returns account names, IDs, industries, and revenue information for pipeline management.
  provider: salesforce
  endpoint: /services/data/v59.0/query
  method: GET
  scopes:
    - api
  tags:
    - accounts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      industry:
        type: string
        description: "Filter by industry"
      type:
        type: string
        description: "Filter by account type"
      limit:
        type: integer
        description: "Max results (default 20, max 200)"
        default: 20
    required: []

- slug: salesforce_get_account
  name: Get Account
  description: |
    Get detailed information about a specific Salesforce account by ID. Returns account name, industry, annual revenue, number of employees, and associated contacts for relationship management.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Account/{accountId}
  method: GET
  scopes:
    - api
  tags:
    - accounts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      accountId:
        type: string
        description: "Account ID"
    required:
      - accountId

- slug: salesforce_create_account
  name: Create Account
  description: |
    Create a new account in Salesforce CRM with company name, industry, type, and contact information. Returns the created account with its unique ID for pipeline management.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Account
  method: POST
  scopes:
    - api
  tags:
    - accounts
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for creating an account
    properties:
      Name:
        type: string
        description: "Account/Company name (required)"
      Industry:
        type: string
        description: "Industry (e.g., Technology, Healthcare, Finance)"
      Type:
        type: string
        description: "Account type (Prospect, Customer, Competitor)"
      Website:
        type: string
        description: "Website URL"
      Phone:
        type: string
        description: "Phone number"
      BillingStreet:
        type: string
        description: "Billing street address"
      BillingCity:
        type: string
        description: "Billing city"
      BillingState:
        type: string
        description: "Billing state/province"
      BillingPostalCode:
        type: string
        description: "Billing postal code"
      BillingCountry:
        type: string
        description: "Billing country"
    required:
      - Name

- slug: salesforce_list_contacts
  name: List Contacts
  description: |
    List all Salesforce CRM contacts with optional filtering by account, title, department, or location. Returns contact names, email addresses, phone numbers, and account associations for outreach management.
  provider: salesforce
  endpoint: /services/data/v59.0/query
  method: GET
  scopes:
    - api
  tags:
    - contacts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      accountId:
        type: string
        description: "Filter by account ID"
      title:
        type: string
        description: "Filter by job title"
      department:
        type: string
        description: "Filter by department"
      limit:
        type: integer
        description: "Max results (default 20, max 200)"
        default: 20
    required: []

- slug: salesforce_get_contact
