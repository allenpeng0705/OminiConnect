- slug: salesforce_list_leads
  name: List Leads
  description: |
    List all Salesforce CRM leads with optional filtering by status, source, industry, rating, or creation date. Returns lead names, companies, contact information, and qualification status for pipeline management.
  provider: salesforce
  endpoint: /services/data/v59.0/query
  method: GET
  scopes:
    - api
  tags:
    - leads
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      status:
        type: string
        description: "Lead status (Open, Working, Closed - Converted, Closed - Not Converted)"
      leadSource:
        type: string
        description: "Lead source (Web, Referral, Partner, Trade Show, etc.)"
      industry:
        type: string
        description: "Filter by industry"
      rating:
        type: string
        description: "Rating (Hot, Warm, Cold)"
      limit:
        type: integer
        description: "Max results (default 20, max 200)"
        default: 20
    required: []

- slug: salesforce_get_lead
  name: Get Lead
  description: |
    Get detailed information about a specific Salesforce lead by ID. Returns lead name, company, email, phone, status, source, rating, and conversion readiness for qualification tracking.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Lead/{leadId}
  method: GET
  scopes:
    - api
  tags:
    - leads
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a lead
    properties:
      leadId:
        type: string
        description: "Lead ID"
    required:
      - leadId

- slug: salesforce_list_opportunities
  name: List Opportunities
  description: |
    List all Salesforce CRM opportunities with optional filtering by stage, type, close date, or account. Returns opportunity names, amounts, stages, close dates, and account associations for pipeline management.
  provider: salesforce
  endpoint: /services/data/v59.0/query
  method: GET
  scopes:
    - api
  tags:
    - opportunities
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing opportunities
    properties:
      stage:
        type: string
        description: "Opportunity stage (Prospecting, Qualification, etc.)"
      type:
        type: string
        description: "Opportunity type (New Business, Existing Business)"
      closeDate:
        type: string
        description: "Filter by close date (This Month, Next Month, This Quarter)"
      accountId:
        type: string
        description: "Filter by account ID"
      limit:
        type: integer
        description: "Max results (default 20, max 200)"
        default: 20
    required: []

- slug: salesforce_get_opportunity
  name: Get Opportunity
  description: |
    Get detailed information about a specific Salesforce opportunity by ID. Returns opportunity name, amount, probability, stage, expected close date, and associated account details for pipeline management.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Opportunity/{opportunityId}
  method: GET
  scopes:
    - api
  tags:
    - opportunities
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting an opportunity
    properties:
      opportunityId:
        type: string
        description: "Opportunity ID"
    required:
      - opportunityId