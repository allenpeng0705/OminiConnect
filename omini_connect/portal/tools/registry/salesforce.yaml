- slug: salesforce_create_contact
  name: Create Contact
  description: |
    Create a new contact in Salesforce CRM with name, email, phone, and account association. Returns the created contact with its unique ID for relationship management.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Contact
  method: POST
  scopes:
    - api
  tags:
    - contacts
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      FirstName:
        type: string
        description: "First name"
      LastName:
        type: string
        description: "Last name (required)"
      Email:
        type: string
        description: "Email address"
      Phone:
        type: string
        description: "Phone number"
      MobilePhone:
        type: string
        description: "Mobile phone number"
      Title:
        type: string
        description: "Job title"
      Department:
        type: string
        description: "Department"
      AccountId:
        type: string
        description: "Associated account ID"
