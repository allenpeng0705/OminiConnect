- slug: salesforce_create_contact
  name: Create Contact
  description: |
    Create a new contact in Salesforce. Set name, email, phone, and account association.
  provider: salesforce
  endpoint: /services/data/v59.0/sobjects/Contact
  method: POST
  scopes:
    - api
  tags:
    - contacts
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      FirstName:
        type: string
        description: "First name"
      LastName:
        type: string
        description: "Last name (required)"
      Email:
        type: string
        description: "Email address"
      Phone:
        type: string
        description: "Phone number"
      MobilePhone:
        type: string
        description: "Mobile phone number"
      Title:
        type: string
        description: "Job title"
      Department:
        type: string
        description: "Department"
      AccountId:
        type: string
        description: "Associated account ID"
    required:
      - LastName

- slug: salesforce_list_leads
  name: List Leads
  description: |
    List Salesforce leads with optional filters.
    Filter by status, source, industry, rating, or created date.
  provider: salesforce
  endpoint: /services/data/v59.0/query
  method: GET
  scopes:
    - api
  tags:
    - leads
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      status:
        type: string
        description: "Lead status (Open, Working, Closed - Converted, Closed - Not Converted)"
      leadSource:
        type: string
        description: "Lead source (Web, Referral, Partner, Trade Show, etc.)"
      industry:
        type: string
        description: "Filter by industry"
      rating:
        type: string
        description: "Rating (Hot, Warm, Cold)"
      limit:
        type: integer
        description: "Max results (default 20, max 200)"
        default: 20
    required: []

