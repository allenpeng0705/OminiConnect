    description: Parameters for listing channels
    properties:
      type:
        type: string
        description: "Filter by channel type"
      start:
        type: integer
        description: "Pagination start"
      limit:
        type: integer
        description: "Max results (default 25)"
        default: 25
    required: []

- slug: slite_get_channel
  name: Get Channel
  description: |
    Get detailed information about a specific channel including name, description, and member count.
  provider: slite
  endpoint: /api/v1/channels/{id}
  method: GET
  scopes:
    - channels:read
  tags:
    - channels
    - read
  input_schema:
    type: object
    description: Parameters for getting a channel
    properties:
      id:
        type: string
        description: "Channel ID"
