- slug: slite_search_notes
  name: Search Notes
  description: |
    Search notes by keyword. Returns matching notes with relevance scores.
  provider: slite
  endpoint: /api/v1/notes/search
  method: GET
  scopes:
    - notes:read
  tags:
    - notes
    - search
  input_schema:
    type: object
    description: Parameters for searching notes
    properties:
      q:
        type: string
        description: "Search query"
      channel_id:
        type: string
        description: "Limit search to channel ID"
      start:
        type: integer
        description: "Pagination start"
      limit:
        type: integer
        description: "Max results (default 25)"
        default: 25
    required:
      - q

- slug: slite_share_note
  name: Share Note
  description: |
    Share a note with specific Slite members or make it publicly accessible. Sets member permissions or public access.
  provider: slite
  endpoint: /api/v1/notes/{id}/share
  method: POST
  scopes:
    - notes:write
  tags:
    - notes
    - share
  input_schema:
    type: object
    description: Parameters for sharing a note
    properties:
      id:
        type: string
        description: "Note ID"
      member_ids:
        type: array
        items:
          type: string
        description: "Member IDs to share with"
      public:
        type: boolean
        description: "Make note publicly accessible"
    required:
      - id

- slug: slite_update_permissions
  name: Update Permissions
  description: |
    Update permissions for a note in Slite. Changes the access level for specific members including view, edit, or admin permissions.
  provider: slite
  endpoint: /api/v1/notes/{id}/permissions
  method: PUT
  scopes:
    - notes:write
  tags:
    - notes
    - permissions
  input_schema:
    type: object
    description: Parameters for updating permissions
    properties:
      id:
        type: string
        description: "Note ID"
      member_id:
        type: string
        description: "Member ID"
      permission:
        type: string
        description: "Permission level (view, edit, admin)"
    required:
      - id
      - member_id
      - permission