# Slite Tools - Allowlist
# Curated subset of Slite API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. slite_list_notes              - List notes
# 2. slite_get_note                - Get note details
# 3. slite_create_note             - Create a new note
# 4. slite_list_channels           - List channels
# 5. slite_get_channel             - Get channel details
# 6. slite_list_members            - List members
# 7. slite_get_member              - Get member details
# 8. slite_search_notes            - Search notes
# 9. slite_share_note              - Share a note
# 10. slite_update_permissions      - Update note permissions

- slug: slite_list_notes
  name: List Notes
  description: |
    List all notes in Slite. Returns note titles, content previews, author names, and channel assignments. Filter by channel, status, or keyword.
  provider: slite
  endpoint: /api/v1/notes
  method: GET
  scopes:
    - notes:read
  tags:
    - notes
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing notes
    properties:
      channel_id:
        type: string
        description: "Filter by channel ID"
      status:
        type: string
        description: "Filter by status (active, archived)"
      start:
        type: integer
        description: "Pagination start"
      limit:
        type: integer
        description: "Max results (default 25)"
        default: 25
    required: []

- slug: slite_get_note
  name: Get Note
  description: |
    Get detailed information about a specific note including title, content, author, and timestamps.
  provider: slite
  endpoint: /api/v1/notes/{id}
  method: GET
  scopes:
    - notes:read
  tags:
    - notes
    - read
  input_schema:
    type: object
    description: Parameters for getting a note
    properties:
      id:
        type: string
        description: "Note ID"
    required:
      - id

- slug: slite_create_note
  name: Create Note
  description: |
    Create a new note in Slite. Sets the note title, markdown content, and assigns it to a channel.
  provider: slite
  endpoint: /api/v1/notes
  method: POST
  scopes:
    - notes:write
  tags:
    - notes
    - create
  input_schema:
    type: object
    description: Parameters for creating a note
    properties:
      title:
        type: string
        description: "Note title"
      content:
        type: string
        description: "Note content (Markdown)"
      channel_id:
        type: string
        description: "Channel ID"
    required:
      - title

- slug: slite_list_channels
  name: List Channels
  description: |
