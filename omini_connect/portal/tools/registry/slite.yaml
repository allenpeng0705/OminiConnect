    required: []

- slug: slite_get_member
  name: Get Member
  description: |
    Get detailed information about a specific member including name, email, and role.
  provider: slite
  endpoint: /api/v1/members/{id}
  method: GET
  scopes:
    - members:read
  tags:
    - members
    - read
  input_schema:
    type: object
    description: Parameters for getting a member
    properties:
      id:
        type: string
        description: "Member ID"
    required:
