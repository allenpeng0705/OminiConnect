# Tailscale (API Key) Tools - Allowlist
# Curated subset of Tailscale (API Key) API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tailscale_list_devices           - List all devices in your Tailscale network
# # 2. tailscale_get_device           - Get details of a specific device
# # 3. tailscale_list_users           - List all users in your Tailscale organization
# # 4. tailscale_get_user           - Get details of a specific user
# # 5. tailscale_list_acls           - List ACL policies
# # 6. tailscale_modify_acl           - Update ACL policy
# # 7. tailscale_list_tailnets           - List tailnet configurations
# # 8. tailscale_get_dns_preferences           - Get DNS preferences for a tailnet
# # 9. tailscale_list_keys           - List authentication keys
# # 10. tailscale_create_key           - Create an authentication key

- slug: tailscale_list_devices
  name: List Devices
  description: |
    List all devices in your Tailscale network
  provider: tailscale-api-key
  endpoint: /v2/devices
  method: GET
  scopes:
    - devices:read
  tags:
    - tailscale-api-key
  input_schema:
    type: object
    description: Parameters for list devices
    properties: {}
    required: []

- slug: tailscale_get_device
  name: Get Device
  description: |
    Get details of a specific device
  provider: tailscale-api-key
  endpoint: /v2/devices/{device_id}
  method: GET
  scopes:
    - devices:read
  tags:
    - tailscale-api-key
  input_schema:
    type: object
    description: Parameters for get device
    properties: {}
    required: []

