    Update room pricing for specific dates, setting new rates for selected room types and validity periods.
  provider: booking-com
  endpoint: /price
  method: POST
  scopes: []
  tags:
    - pricing
    - update
  input_schema:
    type: object
    description: Parameters for updating pricing
    properties:
      hotel_id:
        type: string
        description: "Property ID"
      room_id:
        type: string
        description: "Room ID"
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      price:
        type: number
        description: "New price"
