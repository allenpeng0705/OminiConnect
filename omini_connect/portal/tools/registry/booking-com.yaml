# Booking.com Tools - Allowlist
# Curated subset of Booking.com Connectivity API for AI agent use.
# BASIC auth via Nango (Machine Account).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. booking_list_reservations    - List reservations
# 2. booking_get_reservation    - Get reservation details
# 3. booking_list_guests        - List guests
# 4. booking_get_guest           - Get guest details
# 5. booking_list_properties    - List properties
# 6. booking_get_property       - Get property details
# 7. booking_list_availability  - Get availability
# 8. booking_update_pricing     - Update pricing
# 9. booking_list_reviews      - List reviews
# 10. booking_get_statistics    - Get property statistics

- slug: booking_list_reservations
  name: List Reservations
  description: |
    List reservations for a property, returning guest names, check-in dates, room types, and booking status.
    Filter by date range or status to find specific reservations.
  provider: booking-com
  endpoint: /reservation
  method: GET
  scopes: []
  tags:
    - reservations
    - bookings
  input_schema:
    type: object
    description: Parameters for listing reservations
    properties:
      hotel_id:
        type: string
        description: "Property ID"
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: booking_get_reservation
  name: Get Reservation
  description: |
    Get details of a specific reservation including guest information, room assignment, dates, and booking status.
  provider: booking-com
  endpoint: /reservation/{reservation_id}
  method: GET
  scopes: []
  tags:
    - reservations
    - read
  input_schema:
    type: object
    description: Parameters for getting a reservation
    properties:
      reservation_id:
        type: string
        description: "Reservation ID"
    required:
      - reservation_id

