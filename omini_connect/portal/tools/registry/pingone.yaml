# PingOne Tools - Allowlist
# Curated subset of PingOne API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pingone_list_users              - List users
# 2. pingone_get_user                - Get user details
# 3. pingone_list_groups             - List groups
# 4. pingone_get_group              - Get group details
# 5. pingone_list_applications       - List applications
# 6. pingone_get_application       - Get application details
# 7. pingone_list_populations       - List populations
# 8. pingone_get_population        - Get population details
# 9. pingone_list_events            - List audit events
# 10. pingone_get_environment       - Get environment info

- slug: pingone_list_users
  name: List Users
  description: |
    List all users in the environment.
  provider: pingone
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      populationId:
        type: string
        description: "Filter by population ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: pingone_get_user
  name: Get User
  description: |
    Get detailed information about a specific user.
  provider: pingone
  endpoint: /v1/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

