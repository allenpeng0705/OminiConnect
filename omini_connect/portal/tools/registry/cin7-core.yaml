# Cin7 Core Tools - Allowlist
# Curated subset of the Cin7 Core API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cin7_core_list_products              - List products
# 2. cin7_core_get_product               - Get product details
# 3. cin7_core_list_orders                - List orders
# 4. cin7_core_get_order                 - Get order details
# 5. cin7_core_create_order               - Create an order
# 6. cin7_core_list_contacts              - List contacts
# 7. cin7_core_get_contact               - Get contact details
# 8. cin7_core_list_inventory            - List inventory
# 9. cin7_core_get_inventory_item        - Get inventory item
# 10. cin7_core_list_sales_orders       - List sales orders

- slug: cin7_core_list_products
  name: List Products
  description: |
    List all products in the inventory.
  provider: cin7-core
  endpoint: /v2/product
  method: GET
  scopes: []
  tags:
    - products
    - inventory
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: cin7_core_get_product
  name: Get Product
  description: |
    Get details of a specific product.
  provider: cin7-core
  endpoint: /v2/product/{id}
  method: GET
  scopes: []
  tags:
    - products
    - read
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      id:
        type: integer
        description: "Product ID"
    required:
      - id

