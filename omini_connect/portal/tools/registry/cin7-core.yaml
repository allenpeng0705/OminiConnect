- slug: cin7_core_create_order
  name: Create Order
  description: |
    Create a new sales order.
  provider: cin7-core
  endpoint: /v2/salesorder
  method: POST
  scopes: []
  tags:
    - orders
    - create
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      contact_id:
        type: integer
        description: "Contact ID"
      lines:
        type: array
        items:
          type: object
        description: "Order line items"
    required:
      - contact_id
      - lines

