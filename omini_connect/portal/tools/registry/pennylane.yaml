# Pennylane Tools - Allowlist
# Curated subset of Pennylane API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pennylane_list_accounts            - List accounts
# 2. pennylane_get_account              - Get account details
# 3. pennylane_list_contacts            - List contacts
# 4. pennylane_get_contact             - Get contact details
# 5. pennylane_list_invoices           - List invoices
# 6. pennylane_get_invoice             - Get invoice details
# 7. pennylane_list_expenses           - List expenses
# 8. pennylane_get_expense             - Get expense details
# 9. pennylane_list_items              - List items/products
# 10. pennylane_get_company_info       - Get company information

- slug: pennylane_list_accounts
  name: List Accounts
  description: |
    List all accounts in the accounting system.
  provider: pennylane
  endpoint: /api/v1/accounts
  method: GET
  scopes: []
  tags:
    - accounts
    - accounting
    - list
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      type:
        type: string
        description: "Filter by account type (asset, liability, equity, revenue, expense)"
    required: []

- slug: pennylane_get_account
  name: Get Account
  description: |
    Get detailed information about a specific account.
  provider: pennylane
  endpoint: /api/v1/accounts/{accountId}
  method: GET
  scopes: []
  tags:
    - accounts
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      accountId:
        type: string
        description: "Account ID"
    required:
      - accountId

