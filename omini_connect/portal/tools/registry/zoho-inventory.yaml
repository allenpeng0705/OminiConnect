# Zoho Inventory Tools - Allowlist
# Curated subset of Zoho Inventory API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_inventory_list_items           - List all inventory items
# # 2. zoho_inventory_get_item           - Get item details
# # 3. zoho_inventory_create_item           - Create a new item
# # 4. zoho_inventory_list_sales_orders           - List all sales orders
# # 5. zoho_inventory_get_sales_order           - Get sales order details
# # 6. zoho_inventory_create_sales_order           - Create a new sales order
# # 7. zoho_inventory_list_contacts           - List all contacts
# # 8. zoho_inventory_get_contact           - Get contact details
# # 9. zoho_inventory_list_warehouses           - List all warehouses
# # 10. zoho_inventory_list_packages           - List all packages

- slug: zoho_inventory_list_items
  name: List Items
  description: |
    List all inventory items
  provider: zoho-inventory
  endpoint: /items
  method: GET
  scopes:
    - read
  tags:
    - zoho-inventory
  input_schema:
    type: object
    description: Parameters for list items
    properties: {}
    required: []

- slug: zoho_inventory_get_item
  name: Get Item
