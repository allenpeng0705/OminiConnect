# Clerk Tools - Allowlist
# Curated subset of the Clerk API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. clerk_list_users                    - List users
# 2. clerk_get_user                     - Get user details
# 3. clerk_create_user                  - Create a user
# 4. clerk_update_user                  - Update a user
# 5. clerk_delete_user                  - Delete a user
# 6. clerk_list_organizations          - List organizations
# 7. clerk_get_organization           - Get organization details
# 8. clerk_list_sessions              - List sessions
# 9. clerk_get_session                - Get session details
# 10. clerk_create_organization      - Create an organization

- slug: clerk_list_users
  name: List Users
  description: |
    List all users in the Clerk instance with pagination, returning user IDs, email addresses, and creation timestamps.
  provider: clerk
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - identity
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      offset:
        type: integer
        description: "Pagination offset"
        default: 0
    required: []

- slug: clerk_get_user
  name: Get User
  description: |
    Retrieve details of a specific Clerk user including email addresses, phone numbers, and external IDs.
  provider: clerk
  endpoint: /v1/users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: clerk_create_user
  name: Create User
  description: |
    Create a new user in Clerk with email addresses, phone numbers, and optional password, returning the user ID.
  provider: clerk
  endpoint: /v1/users
  method: POST
  scopes: []
  tags:
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      email_addresses:
        type: array
        items:
          type: string
        description: "Array of email addresses"
      phone_numbers:
        type: array
        items:
          type: string
        description: "Array of phone numbers"
      password:
        type: string
        description: "Password"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - email_addresses

- slug: clerk_update_user
  name: Update User
  description: |
    Update an existing Clerk user's first name, last name, or other attributes.
  provider: clerk
  endpoint: /v1/users/{id}
  method: PATCH
  scopes: []
  tags:
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      id:
        type: string
        description: "User ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - id

- slug: clerk_delete_user
  name: Delete User
  description: |
    Delete a user from Clerk, removing their account, sessions, and associated metadata.
  provider: clerk
  endpoint: /v1/users/{id}
  method: DELETE
  scopes: []
  tags:
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: clerk_list_organizations
  name: List Organizations
  description: |
    List all organizations in Clerk with their names, slugs, and membership counts.
  provider: clerk
  endpoint: /v1/organizations
  method: GET
  scopes: []
  tags:
    - organizations
    - identity
  input_schema:
    type: object
    description: Parameters for listing organizations
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: clerk_get_organization
  name: Get Organization
  description: |
    Retrieve details of a specific Clerk organization including members, roles, and settings.
  provider: clerk
  endpoint: /v1/organizations/{id}
  method: GET
  scopes: []
  tags:
    - organizations
    - read
  input_schema:
    type: object
    description: Parameters for getting an organization
    properties:
      id:
        type: string
        description: "Organization ID"
    required:
      - id

- slug: clerk_list_sessions
  name: List Sessions
  description: |
    List all active sessions in Clerk with optional filtering by user ID, returning session IDs and status.
  provider: clerk
  endpoint: /v1/sessions
  method: GET
  scopes: []
  tags:
    - sessions
    - identity
  input_schema:
    type: object
    description: Parameters for listing sessions
    properties:
      user_id:
        type: string
        description: "Filter by user ID"
    required: []

- slug: clerk_get_session
  name: Get Session
  description: |
    Retrieve details of a specific Clerk session including status, user ID, and expiration time.
  provider: clerk
  endpoint: /v1/sessions/{id}
  method: GET
  scopes: []
  tags:
    - sessions
    - read
  input_schema:
    type: object
    description: Parameters for getting a session
    properties:
      id:
        type: string
        description: "Session ID"
    required:
      - id

- slug: clerk_create_organization
  name: Create Organization
  description: |
    Create a new organization in Clerk with a name and optional creator assignment, returning the organization ID.
  provider: clerk
  endpoint: /v1/organizations
  method: POST
  scopes: []
  tags:
    - organizations
    - create
  input_schema:
    type: object
    description: Parameters for creating an organization
    properties:
      name:
        type: string
        description: "Organization name"
      created_by:
        type: string
        description: "User ID of creator"
    required:
      - name
