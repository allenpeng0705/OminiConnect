- slug: digitalocean_get_domain
  name: Get Domain
  description: |
    Get detailed information about a specific DigitalOcean domain by its name. Returns the domain name, zone file, and DNS record count.
  provider: digitalocean
  endpoint: /v2/domains/{domain_name}
  method: GET
  scopes:
    - domains:read
  tags:
    - domains
    - read
  input_schema:
    type: object
    description: Parameters for getting a domain
    properties:
      domain_name:
        type: string
        description: "Domain name (required)"
    required:
