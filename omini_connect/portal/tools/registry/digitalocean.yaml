# DigitalOcean Tools - Allowlist
# Curated subset of the DigitalOcean API v2 for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. digitalocean_list_droplets    - List all droplets
# 2. digitalocean_get_droplet     - Get a specific droplet
# 3. digitalocean_create_droplet  - Create a new droplet
# 4. digitalocean_delete_droplet  - Delete a droplet
# 5. digitalocean_list_volumes    - List all volumes
# 6. digitalocean_get_volume      - Get a specific volume
# 7. digitalocean_list_domains     - List all domains
# 8. digitalocean_get_domain      - Get a specific domain
# 9. digitalocean_list_firewalls  - List all firewalls
# 10. digitalocean_get_firewall   - Get a specific firewall

- slug: digitalocean_list_droplets
  name: List Droplets
  description: |
    List all droplets in your DigitalOcean account. Returns droplet names, IDs, IP addresses, regions, sizes, and statuses for each droplet.
  provider: digitalocean
  endpoint: /v2/droplets
  method: GET
  scopes:
    - droplets:read
  tags:
    - droplets
    - list
  input_schema:
    type: object
    description: Parameters for listing droplets
    properties:
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
      per_page:
        type: integer
        description: "Results per page (default 20, max 200)"
        default: 20
      tag_name:
        type: string
        description: "Filter by tag name"
    required: []

- slug: digitalocean_get_droplet
  name: Get Droplet
  description: |
    Get detailed information about a specific DigitalOcean droplet by its ID. Returns the droplet name, IP addresses, specs, backups, and networking configuration.
  provider: digitalocean
  endpoint: /v2/droplets/{droplet_id}
  method: GET
  scopes:
    - droplets:read
  tags:
    - droplets
    - read
  input_schema:
    type: object
    description: Parameters for getting a droplet
    properties:
      droplet_id:
        type: integer
        description: "Droplet ID (required)"
    required:
      - droplet_id

- slug: digitalocean_create_droplet
  name: Create Droplet
  description: |
    Create a new droplet in DigitalOcean with specified size, region, and image. Returns the created droplet with its unique ID and IP addresses.
  provider: digitalocean
  endpoint: /v2/droplets
  method: POST
  scopes:
    - droplets:create
  tags:
    - droplets
    - create
  input_schema:
    type: object
    description: Parameters for creating a droplet
    properties:
      name:
        type: string
        description: "Droplet name (required)"
      region:
        type: string
        description: "Region slug: nyc1, sfo2, etc. (required)"
      size:
        type: string
        description: "Size slug: s-1vcpu-1gb, s-2vcpu-4gb, etc. (required)"
      image:
        type: string
        description: "Image slug or ID: ubuntu-22-04-x64, docker, etc. (required)"
      ssh_keys:
        type: array
        items:
          type: string
        description: "Array of SSH key IDs or fingerprints"
      backups:
        type: boolean
        description: "Enable automatic backups"
        default: false
      ipv6:
        type: boolean
        description: "Enable IPv6"
        default: false
      tags:
        type: array
        items:
          type: string
        description: "Array of tag names"
      user_data:
        type: string
        description: "Cloud-init user data script"
    required:
      - name
      - region
      - size
      - image

- slug: digitalocean_delete_droplet
  name: Delete Droplet
  description: |
    Delete a specific DigitalOcean droplet by its ID. Returns confirmation of the deletion.
  provider: digitalocean
  endpoint: /v2/droplets/{droplet_id}
  method: DELETE
  scopes:
    - droplets:delete
  tags:
    - droplets
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a droplet
    properties:
      droplet_id:
        type: integer
        description: "Droplet ID (required)"
    required:
      - droplet_id

- slug: digitalocean_list_volumes
  name: List Volumes
  description: |
    List all block storage volumes in your DigitalOcean account. Returns volume names, IDs, sizes, regions, and filesystem types for each volume.
  provider: digitalocean
  endpoint: /v2/volumes
  method: GET
  scopes:
    - volumes:read
  tags:
    - volumes
    - list
  input_schema:
    type: object
    description: Parameters for listing volumes
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
      region:
        type: string
        description: "Filter by region slug"
    required: []

- slug: digitalocean_get_volume
  name: Get Volume
  description: |
    Get detailed information about a specific DigitalOcean volume by its ID. Returns the volume name, size, region, filesystem type, and attached droplets.
  provider: digitalocean
  endpoint: /v2/volumes/{volume_id}
  method: GET
  scopes:
    - volumes:read
  tags:
    - volumes
    - read
  input_schema:
    type: object
    description: Parameters for getting a volume
    properties:
      volume_id:
        type: string
        description: "Volume ID (required)"
    required:
      - volume_id

