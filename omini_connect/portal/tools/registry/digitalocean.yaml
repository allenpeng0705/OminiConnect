- slug: digitalocean_list_firewalls
  name: List Firewalls
  description: |
    List all cloud firewalls in your DigitalOcean account. Returns firewall names, IDs, statuses, and rule summaries for each firewall.
  provider: digitalocean
  endpoint: /v2/firewalls
  method: GET
  scopes:
    - firewalls:read
  tags:
    - firewalls
    - list
  input_schema:
    type: object
    description: Parameters for listing firewalls
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: digitalocean_get_firewall
  name: Get Firewall
  description: |
    Get detailed information about a specific DigitalOcean firewall by its ID. Returns the firewall name, status, and all inbound and outbound rules.
  provider: digitalocean
  endpoint: /v2/firewalls/{firewall_id}
  method: GET
  scopes:
    - firewalls:read
  tags:
    - firewalls
    - read
  input_schema:
    type: object
    description: Parameters for getting a firewall
    properties:
      firewall_id:
        type: string
        description: "Firewall ID (required)"
    required:
      - firewall_id
