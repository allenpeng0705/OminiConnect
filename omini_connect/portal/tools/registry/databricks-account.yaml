# Databricks Account Level Tools - Allowlist
# Curated subset of the Databricks Account API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. databricks_account_list_workspaces    - List workspaces
# 2. databricks_account_get_workspace     - Get workspace details
# 3. databricks_account_list_users         - List account users
# 4. databricks_account_get_user           - Get user details
# 5. databricks_account_list_groups         - List account groups
# 6. databricks_account_get_group           - Get group details
# 7. databricks_account_list_clusters       - List clusters
# 8. databricks_account_get_cluster         - Get cluster details
# 9. databricks_account_list_jobs           - List jobs
# 10. databricks_account_get_job           - Get job details

- slug: databricks_account_list_workspaces
  name: List Workspaces
  description: |
    List all Databricks workspaces in the account.
  provider: databricks-account
  endpoint: /2.0/accounts/{accountId}/workspaces
  method: GET
  scopes: []
  tags:
    - workspaces
    - infrastructure
    - list
  input_schema:
    type: object
    description: Parameters for listing workspaces
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
    required: []

- slug: databricks_account_get_workspace
  name: Get Workspace
  description: |
    Get details of a specific Databricks workspace.
  provider: databricks-account
  endpoint: /2.0/accounts/{accountId}/workspaces/{workspaceId}
  method: GET
  scopes: []
  tags:
    - workspaces
    - infrastructure
    - read
  input_schema:
    type: object
    description: Parameters for getting a workspace
    properties:
      workspace_id:
        type: string
        description: "Workspace ID"
    required:
      - workspace_id

