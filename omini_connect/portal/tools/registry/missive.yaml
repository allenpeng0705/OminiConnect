# Missive Tools - Allowlist
# Curated subset of Missive API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. missive_list_conversations   - List conversations
# 2. missive_get_conversation     - Get conversation details
# 3. missive_list_messages       - List messages
# 4. missive_get_message         - Get message details
# 5. missive_send_message        - Send a message
# 6. missive_list_contacts       - List contacts
# 7. missive_get_contact         - Get contact details
# 8. missive_list_groups         - List groups
# 9. missive_get_group           - Get group details
# 10. missive_create_comment   - Create a comment

- slug: missive_list_conversations
  name: List Conversations
  description: |
    List all conversations in Missive.
    Filter by status, assignee, or folder.
  provider: missive
  endpoint: /v1/conversations
  method: GET
  scopes: []
  tags:
    - conversations
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status (open, closed, archived)"
      assignee_id:
        type: string
        description: "Filter by assignee ID"
      folder_id:
        type: string
        description: "Filter by folder ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: missive_get_conversation
  name: Get Conversation
  description: |
    Get details of a specific conversation.
  provider: missive
  endpoint: /v1/conversations/{conversationId}
  method: GET
  scopes: []
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversationId:
        type: string
        description: "Conversation ID"
    required:
      - conversationId

- slug: missive_list_messages
