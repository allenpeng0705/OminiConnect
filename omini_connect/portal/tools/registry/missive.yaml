- slug: missive_send_message
  name: Send Message
  description: |
    Send a message in a conversation.
  provider: missive
  endpoint: /v1/conversations/{conversationId}/messages
  method: POST
  scopes: []
  tags:
    - messages
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      conversationId:
        type: string
        description: "Conversation ID"
      content:
        type: string
        description: "Message content"
      author_id:
        type: string
        description: "Author user ID"
    required:
      - conversationId
      - content

