# Perk Tools - Allowlist
# Curated subset of Perk (TravelPerk) API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. perk_list_users              - List users
# 2. perk_get_user                - Get user details
# 3. perk_list_trips              - List trips
# 4. perk_get_trip                - Get trip details
# 5. perk_list_expenses           - List expenses
# 6. perk_get_expense             - Get expense details
# 7. perk_list_invoices          - List invoices
# 8. perk_get_invoice             - Get invoice details
# 9. perk_list_cost_centers      - List cost centers
# 10. perk_get_profile           - Get user profile

- slug: perk_list_users
  name: List Users
  description: |
    List all users in the organization.
  provider: perk
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - team
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: perk_get_user
  name: Get User
  description: |
    Get detailed information about a specific user.
  provider: perk
  endpoint: /v1/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - team
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

