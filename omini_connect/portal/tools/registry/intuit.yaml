# Intuit Tools - Allowlist
# Curated subset of QuickBooks API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. intuit_list_companies        - List companies
# 2. intuit_get_company           - Get company details
# 3. intuit_list_accounts         - List accounts
# 4. intuit_get_account          - Get account details
# 5. intuit_list_customers       - List customers
# 6. intuit_get_customer         - Get customer details
# 7. intuit_list_vendors          - List vendors
# 8. intuit_get_vendor           - Get vendor details
# 9. intuit_list_invoices        - List invoices
# 10. intuit_get_invoice          - Get invoice details

- slug: intuit_list_companies
  name: List Companies
  description: |
    List all companies in QuickBooks.
    Returns company details including name and company ID.
  provider: intuit
  endpoint: /v3/company
  method: GET
  scopes:
    - read
  tags:
    - companies
    - list
  input_schema:
    type: object
    description: Parameters for listing companies
    properties: {}
    required: []

- slug: intuit_get_company
  name: Get Company
  description: |
    Get detailed information about a specific company.
    Includes company settings and fiscal year.
  provider: intuit
  endpoint: /v3/company/{companyId}
  method: GET
  scopes:
    - read
  tags:
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      companyId:
        type: string
        description: "Company ID"
    required:
      - companyId

- slug: intuit_list_accounts
  name: List Accounts
  description: |
    List all accounts in QuickBooks.
    Returns account details including name and type.
  provider: intuit
  endpoint: /v3/company/{companyId}/query
