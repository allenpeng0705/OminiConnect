- slug: zapier_create_zap
  name: Create Zap
  description: |
    Create a new Zap with trigger and action configuration.
  provider: zapier
  endpoint: /zaps
  method: POST
  scopes:
    - write
  tags:
    - zaps
    - create
  input_schema:
    type: object
    description: Parameters for creating a zap
    properties:
      name:
        type: string
        description: "Zap name"
      trigger:
        type: object
        description: "Trigger configuration (app, event)"
      actions:
        type: array
        description: "Array of action configurations"
      zap_mode:
        type: string
        description: "Zap mode: live, test"
    required:
      - name
      - trigger

- slug: zapier_get_zap_status
  name: Get Zap Status
  description: |
    Get the current status of a Zap including last run details and history.
  provider: zapier
  endpoint: /zaps/{zap_id}/status
  method: GET
  scopes:
    - read
  tags:
    - zaps
    - status
    - read
  input_schema:
    type: object
    description: Parameters for getting zap status
    properties:
      zap_id:
        type: string
        description: "Zap ID"
    required:
      - zap_id
