# OnceUp Tools - Allowlist
# Curated subset of OnceUp API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. onceup_list_appointments      - List appointments
# 2. onceup_get_appointment        - Get appointment details
# 3. onceup_create_appointment    - Create an appointment
# 4. onceup_cancel_appointment    - Cancel an appointment
# 5. onceup_list_clients          - List clients
# 6. onceup_get_client            - Get client details
# 7. onceup_list_services         - List services
# 8. onceup_get_service           - Get service details
# 9. onceup_list_reminders        - List reminders
# 10. onceup_send_reminder        - Send a reminder

- slug: onceup_list_appointments
  name: List Appointments
  description: |
    List all appointments, optionally filtered by date range, client, or status.
  provider: onceup
  endpoint: /appointments
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing appointments
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      client_id:
        type: string
        description: "Filter by client ID"
      status:
        type: string
        description: "Filter by status: scheduled, completed, cancelled"
      count:
        type: integer
        description: "Max appointments to return"
        default: 100
    required: []

- slug: onceup_get_appointment
  name: Get Appointment
  description: |
    Get detailed information about a specific appointment.
  provider: onceup
  endpoint: /appointments/{appointment_id}
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - read
  input_schema:
    type: object
    description: Parameters for getting an appointment
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
    required:
      - appointment_id

- slug: onceup_create_appointment
  name: Create Appointment
  description: |
    Create a new appointment for a client with a service.
  provider: onceup
  endpoint: /appointments
  method: POST
  scopes:
    - write
  tags:
    - appointments
    - create
  input_schema:
    type: object
    description: Parameters for creating an appointment
    properties:
      client_id:
        type: string
        description: "Client ID"
      service_id:
        type: string
        description: "Service ID"
      start_time:
        type: string
        description: "Start time (ISO 8601)"
      end_time:
        type: string
        description: "End time (ISO 8601)"
      notes:
        type: string
        description: "Appointment notes"
    required:
      - client_id
      - service_id
      - start_time

- slug: onceup_cancel_appointment
  name: Cancel Appointment
  description: |
    Cancel an existing appointment.
  provider: onceup
  endpoint: /appointments/{appointment_id}
  method: DELETE
  scopes:
    - write
  tags:
    - appointments
    - delete
  input_schema:
    type: object
    description: Parameters for canceling an appointment
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
      reason:
        type: string
        description: "Cancellation reason"
    required:
      - appointment_id

