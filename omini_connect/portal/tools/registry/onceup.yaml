- slug: onceup_list_reminders
  name: List Reminders
  description: |
    List all configured reminders for appointments.
  provider: onceup
  endpoint: /reminders
  method: GET
  scopes:
    - read
  tags:
    - reminders
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing reminders
    properties:
      appointment_id:
        type: string
        description: "Filter by appointment ID"
      sent:
        type: boolean
        description: "Filter by sent status"
      count:
        type: integer
        description: "Max reminders to return"
        default: 100
    required: []

- slug: onceup_send_reminder
  name: Send Reminder
  description: |
    Send a reminder notification for an appointment.
  provider: onceup
  endpoint: /reminders/send
  method: POST
  scopes:
    - write
  tags:
    - reminders
    - send
  input_schema:
    type: object
    description: Parameters for sending a reminder
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
      channel:
        type: string
        description: "Notification channel: email, sms, push"
    required:
      - appointment_id