# OnceUp Tools - Allowlist
# Curated subset of OnceUp API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. onceup_list_appointments      - List appointments
# 2. onceup_get_appointment        - Get appointment details
# 3. onceup_create_appointment    - Create an appointment
# 4. onceup_cancel_appointment    - Cancel an appointment
# 5. onceup_list_clients          - List clients
# 6. onceup_get_client            - Get client details
# 7. onceup_list_services         - List services
# 8. onceup_get_service           - Get service details
# 9. onceup_list_reminders        - List reminders
# 10. onceup_send_reminder        - Send a reminder

- slug: onceup_list_appointments
  name: List Appointments
  description: |
    List all appointments, optionally filtered by date range, client, or status.
    Returns appointment details including time, client, service, and current status.
    Use this to discover available time slots and manage scheduling.
  provider: onceup
  endpoint: /appointments
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing appointments
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      client_id:
        type: string
        description: "Filter by client ID"
      status:
        type: string
        description: "Filter by status: scheduled, completed, cancelled"
      count:
        type: integer
        description: "Max appointments to return"
        default: 100
    required: []

- slug: onceup_get_appointment
  name: Get Appointment
  description: |
    Get detailed information about a specific appointment including time, client, service, and notes.
    Returns the complete appointment record with all associated details.
    This provides full appointment data for rescheduling or cancellation decisions.
  provider: onceup
  endpoint: /appointments/{appointment_id}
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - read
  input_schema:
    type: object
    description: Parameters for getting an appointment
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
    required:
      - appointment_id

- slug: onceup_create_appointment
  name: Create Appointment
  description: |
    Create a new appointment for a client with a service.
    Returns the created appointment with its unique ID and confirmed time.
    This schedules a new booking in the OnceUp calendar system.
  provider: onceup
  endpoint: /appointments
  method: POST
  scopes:
    - write
  tags:
    - appointments
    - create
  input_schema:
    type: object
    description: Parameters for creating an appointment
    properties:
      client_id:
        type: string
        description: "Client ID"
      service_id:
        type: string
        description: "Service ID"
      start_time:
        type: string
        description: "Start time (ISO 8601)"
      end_time:
        type: string
        description: "End time (ISO 8601)"
      notes:
        type: string
        description: "Appointment notes"
    required:
      - client_id
      - service_id
      - start_time

- slug: onceup_cancel_appointment
  name: Cancel Appointment
  description: |
    Cancel an existing appointment and optionally provide a cancellation reason.
    Returns confirmation of the cancellation with the appointment ID.
    This removes the appointment from the schedule and may trigger notifications.
  provider: onceup
  endpoint: /appointments/{appointment_id}
  method: DELETE
  scopes:
    - write
  tags:
    - appointments
    - delete
  input_schema:
    type: object
    description: Parameters for canceling an appointment
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
      reason:
        type: string
        description: "Cancellation reason"
    required:
      - appointment_id

- slug: onceup_list_clients
  name: List Clients
  description: |
    List all clients in the account with their contact information.
    Returns client names, emails, phone numbers, and appointment history.
    Use this to discover clients and prepare for upcoming appointments.
  provider: onceup
  endpoint: /clients
  method: GET
  scopes:
    - read
  tags:
    - clients
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      search:
        type: string
        description: "Search by name or email"
      count:
        type: integer
        description: "Max clients to return"
        default: 100
    required: []

- slug: onceup_get_client
  name: Get Client
  description: |
    Get detailed information about a specific client including contact details and appointment history.
    Returns the complete client profile with all associated appointments.
    This provides full client data for personalization and communication.
  provider: onceup
  endpoint: /clients/{client_id}
  method: GET
  scopes:
    - read
  tags:
    - clients
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      client_id:
        type: string
        description: "Client ID"
    required:
      - client_id

- slug: onceup_list_services
  name: List Services
  description: |
    List all services available for booking with their durations and pricing.
    Returns service names, descriptions, time requirements, and costs.
    Use this to discover available offerings for appointment scheduling.
  provider: onceup
  endpoint: /services
  method: GET
  scopes:
    - read
  tags:
    - services
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing services
    properties:
      category:
        type: string
        description: "Filter by category"
      count:
        type: integer
        description: "Max services to return"
        default: 100
    required: []

- slug: onceup_get_service
  name: Get Service
  description: |
    Get detailed information about a specific service including duration, pricing, and description.
    Returns the complete service data for consultation planning.
    This helps prepare for client appointments by understanding service details.
  provider: onceup
  endpoint: /services/{service_id}
  method: GET
  scopes:
    - read
  tags:
    - services
    - read
  input_schema:
    type: object
    description: Parameters for getting a service
    properties:
      service_id:
        type: string
        description: "Service ID"
    required:
      - service_id

- slug: onceup_list_reminders
  name: List Reminders
  description: |
    List all configured reminders for appointments with their delivery status.
    Returns reminder IDs, appointment associations, and whether they have been sent.
    Use this to track upcoming notifications and their delivery status.
  provider: onceup
  endpoint: /reminders
  method: GET
  scopes:
    - read
  tags:
    - reminders
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing reminders
    properties:
      appointment_id:
        type: string
        description: "Filter by appointment ID"
      sent:
        type: boolean
        description: "Filter by sent status"
      count:
        type: integer
        description: "Max reminders to return"
        default: 100
    required: []

- slug: onceup_send_reminder
  name: Send Reminder
  description: |
    Send a reminder notification for an appointment via the specified channel.
    Returns confirmation of the reminder delivery with timestamp.
    This sends a notification to remind clients about their upcoming appointment.
  provider: onceup
  endpoint: /reminders/send
  method: POST
  scopes:
    - write
  tags:
    - reminders
    - send
  input_schema:
    type: object
    description: Parameters for sending a reminder
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
      channel:
        type: string
        description: "Notification channel: email, sms, push"
    required:
      - appointment_id