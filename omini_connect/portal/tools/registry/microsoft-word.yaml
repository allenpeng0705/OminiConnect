# Microsoft Word Tools - Allowlist
# Curated subset of Microsoft Word API for AI agent use.
# OAuth2 via Nango (alias: microsoft).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. word_list_documents            - List documents
# 2. word_get_document             - Get document details
# 3. word_list_content            - List document content
# 4. word_get_paragraph           - Get paragraph content
# 5. word_update_paragraph        - Update paragraph
# 6. word_list_tables             - List tables in document
# 7. word_get_table               - Get table content
# 8. word_insert_paragraph        - Insert paragraph
# 9. word_list_styles            - List document styles
# 10. word_apply_style           - Apply style to text

- slug: word_list_documents
  name: List Documents
  description: |
    List all Word documents in the user's OneDrive. Returns document names, IDs, created dates, and file sizes.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/root/children
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - documents
    - list
  input_schema:
    type: object
    description: Parameters for listing documents
    properties:
      $filter:
        type: string
        description: "OData filter expression"
      $top:
        type: integer
        description: "Max results"
        default: 50
    required: []

- slug: word_get_document
  name: Get Document
  description: |
    Retrieve details about a specific Word document in OneDrive including its metadata, sharing settings, and file information.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - documents
    - read
  input_schema:
    type: object
    description: Parameters for getting a document
    properties:
      itemId:
        type: string
        description: "Document item ID"
    required:
      - itemId

- slug: word_list_content
  name: List Content
  description: |
    List all paragraphs in a Word document. Returns text content and formatting information for each paragraph.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/paragraphs
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - content
    - list
  input_schema:
    type: object
    description: Parameters for listing content
    properties:
      itemId:
        type: string
        description: "Document item ID"
    required:
      - itemId

- slug: word_get_paragraph
  name: Get Paragraph
  description: |
    Retrieve content and formatting details for a specific paragraph in a Word document. Returns the paragraph text, formatting properties, and style information.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/paragraphs/{paragraphId}
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - paragraphs
    - read
  input_schema:
    type: object
    description: Parameters for getting a paragraph
    properties:
      itemId:
        type: string
        description: "Document item ID"
      paragraphId:
        type: string
        description: "Paragraph ID"
    required:
      - itemId
      - paragraphId

- slug: word_update_paragraph
  name: Update Paragraph
  description: |
    Update the text content of a specific paragraph in a Word document. Returns confirmation of the update.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/paragraphs/{paragraphId}
  method: PATCH
  scopes:
    - Files.ReadWrite
  tags:
    - word
    - paragraphs
    - update
  input_schema:
    type: object
    description: Parameters for updating a paragraph
    properties:
      itemId:
        type: string
        description: "Document item ID"
      paragraphId:
        type: string
        description: "Paragraph ID"
      text:
        type: string
        description: "New paragraph text"
    required:
      - itemId
      - paragraphId
      - text

- slug: word_list_tables
  name: List Tables
  description: |
    List all tables in a Word document. Returns table locations and cell counts for each table.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/tables
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - tables
    - list
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      itemId:
        type: string
        description: "Document item ID"
    required:
      - itemId

- slug: word_get_table
  name: Get Table
  description: |
    Retrieve content and structure of a specific table in a Word document including all rows and cells. Returns the complete table structure with cell contents and formatting.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/tables/{tableId}
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - tables
    - read
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      itemId:
        type: string
        description: "Document item ID"
      tableId:
        type: string
        description: "Table ID"
    required:
      - itemId
      - tableId

- slug: word_insert_paragraph
  name: Insert Paragraph
  description: |
    Insert a new paragraph into a Word document at a specified position. Returns confirmation of the insertion.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/paragraphs
  method: POST
  scopes:
    - Files.ReadWrite
  tags:
    - word
    - paragraphs
    - create
  input_schema:
    type: object
    description: Parameters for inserting a paragraph
    properties:
      itemId:
        type: string
        description: "Document item ID"
      text:
        type: string
        description: "Paragraph text"
      position:
        type: integer
        description: "Position to insert (after paragraph ID)"
    required:
      - itemId
      - text

- slug: word_list_styles
  name: List Styles
  description: |
    List all available formatting styles in a Word document such as headings, quotes, and character styles. Returns style names and types.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/styles
  method: GET
  scopes:
    - Files.Read
  tags:
    - word
    - styles
    - list
  input_schema:
    type: object
    description: Parameters for listing styles
    properties:
      itemId:
        type: string
        description: "Document item ID"
    required:
      - itemId

- slug: word_apply_style
  name: Apply Style
  description: |
    Apply a named formatting style to a paragraph or text range in a Word document. Returns confirmation of the style application.
  provider: microsoft-word
  endpoint: /v1.0/me/drive/items/{itemId}/word/document/paragraphs/{paragraphId}/formatting
  method: PATCH
  scopes:
    - Files.ReadWrite
  tags:
    - word
    - styles
    - update
  input_schema:
    type: object
    description: Parameters for applying a style
    properties:
      itemId:
        type: string
        description: "Document item ID"
      paragraphId:
        type: string
        description: "Paragraph ID"
      styleName:
        type: string
        description: "Name of the style to apply"
    required:
      - itemId
      - paragraphId
      - styleName
