# Elevio Tools - Allowlist
# Curated subset of the Elevio API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. elevio_list_articles       - List all articles in the knowledge base
# 2. elevio_get_article         - Get details of a specific article
# 3. elevio_create_article      - Create a new article
# 4. elevio_list_categories     - List all categories
# 5. elevio_get_category        - Get details of a specific category
# 6. elevio_list_users          - List all users
# 7. elevio_get_user            - Get details of a specific user
# 8. elevio_list_collections    - List all collections
# 9. elevio_get_collection      - Get details of a specific collection
# 10. elevio_search_articles     - Search articles by keyword

- slug: elevio_list_articles
  name: List Articles
  description: |
    List all articles in the knowledge base.
    Returns a paginated list of articles with their titles, slugs, and publication status.
  provider: elevio
  endpoint: /articles
  method: GET
  scopes:
    - articles:read
  tags:
    - articles
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for listing articles
    properties:
      published:
        type: boolean
        description: "Filter by publication status"
      category_id:
        type: string
        description: "Filter by category ID"
      per_page:
        type: integer
        description: "Results per page (default 20)"
        default: 20
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: elevio_get_article
  name: Get Article
  description: |
    Get details of a specific article including title, body content, author, and metadata.
  provider: elevio
  endpoint: /articles/{id}
  method: GET
  scopes:
    - articles:read
  tags:
    - articles
    - read
  input_schema:
    type: object
    description: Parameters for getting an article
    properties:
      id:
        type: string
        description: "Article ID"
    required:
      - id

- slug: elevio_create_article
  name: Create Article
  description: |
    Create a new article in the knowledge base.
    The article will be created as a draft by default.
  provider: elevio
  endpoint: /articles
  method: POST
  scopes:
    - articles:write
  tags:
    - articles
    - create
  input_schema:
    type: object
    description: Parameters for creating an article
    properties:
      title:
        type: string
        description: "Article title"
      body:
        type: string
        description: "Article body content (HTML or Markdown)"
      category_id:
        type: string
        description: "Category ID to assign the article to"
      published:
        type: boolean
        description: "Whether to publish immediately (default false)"
        default: false
    required:
      - title

