- slug: elevio_search_articles
  name: Search Articles
  description: |
    Search articles by keyword or phrase.
    Returns matching articles with highlighted search terms.
  provider: elevio
  endpoint: /articles/search
  method: GET
  scopes:
    - articles:read
  tags:
    - articles
    - search
  input_schema:
    type: object
    description: Parameters for searching articles
    properties:
      q:
        type: string
        description: "Search query string"
      category_id:
        type: string
        description: "Limit search to a specific category"
      per_page:
        type: integer
        description: "Results per page (default 20)"
        default: 20
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required:
      - q
