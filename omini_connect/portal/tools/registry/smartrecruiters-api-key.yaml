# Smartrecruiters Tools - Allowlist
# Curated subset of Smartrecruiters API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_job_postings                        - List all job postings
# 2. get_job_posting                          - Get job posting details
# 3. create_job_posting                       - Create a job posting
# 4. list_candidates                          - List all candidates
# 5. get_candidate                            - Get candidate details
# 6. list_publications                        - List job publications
# 7. list_offers                              - List all offers
# 8. get_offer                                - Get offer details
# 9. list_interviews                          - List scheduled interviews
# 10. get_requisition                          - Get requisition details

- slug: list_job_postings
  name: List Job Postings
  description: |
    List all job postings
  provider: smartrecruiters-api-key
  endpoint: /job_postings
  method: GET
  scopes: []
  tags:
    - jobs
    - recruiting
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_job_posting
  name: Get Job Posting
  description: |
    Get job posting details
  provider: smartrecruiters-api-key
  endpoint: /job_postings/{id}
  method: GET
  scopes: []
  tags:
    - jobs
    - recruiting
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_job_posting
  name: Create Job Posting
  description: |
