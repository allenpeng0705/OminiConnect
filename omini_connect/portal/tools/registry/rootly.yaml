- slug: rootly_get_incident_timeline
  name: Get Incident Timeline
  description: |
    Get the timeline of events for an incident.
  provider: rootly
  endpoint: /v1/incidents/{incidentId}/timeline
  method: GET
  scopes:
    - incidents:read
  tags:
    - incidents
    - timeline
    - incident-management
  input_schema:
    type: object
    description: Parameters for getting incident timeline
    properties:
      incidentId:
        type: string
        description: "The incident ID"
    required:
      - incidentId
