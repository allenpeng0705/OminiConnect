# Calendary Tools - Allowlist
# Curated subset of Calendary API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. calendary_list_events             - List events
# 2. calendary_get_event               - Get event details
# 3. calendary_create_event            - Create an event
# 4. calendary_update_event            - Update an event
# 5. calendary_delete_event            - Delete an event
# 6. calendary_list_calendars         - List calendars
# 7. calendary_get_calendar           - Get calendar details
# 8. calendary_get_availability       - Get available time slots
# 9. calendary_create_scheduling_link  - Create a scheduling link
# 10. calendary_list_scheduling_links  - List scheduling links

- slug: calendary_list_events
  name: List Events
  description: |
    Retrieve all calendar events with optional filtering by calendar, date range, or status. Returns event titles, times, locations, and descriptions.
  provider: calendary
  endpoint: /events
  method: GET
  scopes:
    - read
  tags:
    - events
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      calendar_id:
        type: string
        description: "Filter by calendar ID"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      status:
        type: string
        description: "Filter by status: confirmed, tentative, cancelled"
      count:
        type: integer
        description: "Max events to return"
        default: 100
    required: []

- slug: calendary_get_event
  name: Get Event
  description: |
    Retrieve detailed information about a specific calendar event by its unique ID. Returns the title, timing, location, description, and invitee list.
  provider: calendary
  endpoint: /events/{event_id}
  method: GET
  scopes:
    - read
  tags:
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      event_id:
        type: string
        description: "Event ID"
    required:
      - event_id

- slug: calendary_create_event
  name: Create Event
  description: |
    Create a new calendar event with title, timing, location, and optional description. Returns the created event with its unique ID.
  provider: calendary
  endpoint: /events
  method: POST
  scopes:
    - write
  tags:
    - events
    - create
  input_schema:
    type: object
    description: Parameters for creating an event
    properties:
      calendar_id:
        type: string
        description: "Calendar ID"
      title:
        type: string
        description: "Event title"
      description:
        type: string
        description: "Event description"
      start_time:
        type: string
        description: "Start time (ISO 8601)"
      end_time:
        type: string
        description: "End time (ISO 8601)"
      location:
        type: string
        description: "Event location"
    required:
      - calendar_id
      - title
      - start_time
      - end_time

- slug: calendary_update_event
  name: Update Event
  description: |
    Modify an existing calendar event by updating its title, timing, location, or description. Returns the updated event confirming the changes.
  provider: calendary
  endpoint: /events/{event_id}
  method: PUT
  scopes:
    - write
  tags:
    - events
    - update
  input_schema:
    type: object
    description: Parameters for updating an event
    properties:
      event_id:
        type: string
        description: "Event ID"
      title:
        type: string
        description: "Event title"
      description:
        type: string
        description: "Event description"
      start_time:
        type: string
        description: "Start time (ISO 8601)"
      end_time:
        type: string
        description: "End time (ISO 8601)"
      location:
        type: string
        description: "Event location"
    required:
      - event_id

- slug: calendary_delete_event
  name: Delete Event
  description: |
    Permanently remove a specific calendar event by its unique ID, removing it from all invitees' schedules. Returns confirmation of deletion.
  provider: calendary
  endpoint: /events/{event_id}
  method: DELETE
  scopes:
    - write
  tags:
    - events
    - delete
  input_schema:
    type: object
    description: Parameters for deleting an event
    properties:
      event_id:
        type: string
        description: "Event ID"
    required:
      - event_id

- slug: calendary_list_calendars
  name: List Calendars
  description: |
    Retrieve all calendars available to the user with pagination support. Returns calendar names, IDs, descriptions, and availability settings.
  provider: calendary
  endpoint: /calendars
  method: GET
  scopes:
    - read
  tags:
    - calendars
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing calendars
    properties:
      count:
        type: integer
        description: "Max calendars to return"
        default: 100
    required: []

- slug: calendary_get_calendar
  name: Get Calendar
  description: |
    Retrieve detailed information about a specific calendar by its unique ID. Returns the calendar name, description, timezone, and sharing settings.
  provider: calendary
  endpoint: /calendars/{calendar_id}
  method: GET
  scopes:
    - read
  tags:
    - calendars
    - read
  input_schema:
    type: object
    description: Parameters for getting a calendar
    properties:
      calendar_id:
        type: string
        description: "Calendar ID"
    required:
      - calendar_id

- slug: calendary_get_availability
  name: Get Availability
  description: |
    Find available time slots for a calendar within a specified date range based on the desired meeting duration.
  provider: calendary
  endpoint: /availability
  method: GET
  scopes:
    - read
  tags:
    - availability
    - read
  input_schema:
    type: object
    description: Parameters for getting availability
    properties:
      calendar_id:
        type: string
        description: "Calendar ID"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      duration:
        type: integer
        description: "Required slot duration in minutes"
    required:
      - calendar_id
      - start_date
      - end_date

- slug: calendary_create_scheduling_link
  name: Create Scheduling Link
  description: |
    Create a shareable scheduling link that allows invitees to book appointments on a calendar. Returns the unique scheduling link URL.
  provider: calendary
  endpoint: /scheduling-links
  method: POST
  scopes:
    - write
  tags:
    - scheduling
    - create
  input_schema:
    type: object
    description: Parameters for creating a scheduling link
    properties:
      calendar_id:
        type: string
        description: "Calendar ID"
      name:
        type: string
        description: "Name for the scheduling link"
      duration:
        type: integer
        description: "Meeting duration in minutes"
      description:
        type: string
        description: "Description shown to booking parties"
    required:
      - calendar_id
      - name
      - duration

- slug: calendary_list_scheduling_links
  name: List Scheduling Links
  description: |
    Retrieve all scheduling links associated with the user's calendars. Returns link names, URLs, meeting durations, and usage statistics.
  provider: calendary
  endpoint: /scheduling-links
  method: GET
  scopes:
    - read
  tags:
    - scheduling
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing scheduling links
    properties:
      count:
        type: integer
        description: "Max scheduling links to return"
        default: 100
    required: []