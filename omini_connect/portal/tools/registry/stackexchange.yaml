# Stack Exchange Tools - Allowlist
# Curated subset of Stack Exchange API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_questions                           - List questions
# 2. get_question                             - Get question details
# 3. list_answers                             - List answers for question
# 4. get_answer                               - Get answer details
# 5. list_users                               - List users
# 6. get_user                                 - Get user details
# 7. search_questions                         - Search questions
# 8. list_tags                                - List all tags
# 9. get_site_info                            - Get site information
# 10. list_comments                            - List comments

- slug: list_questions
  name: List Questions
  description: |
    List all questions on Stack Exchange. Returns question titles, scores, view counts, and answer counts.
  provider: stackexchange
  endpoint: /questions
  method: GET
  scopes: []
  tags:
    - questions
    - q&a
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_question
  name: Get Question
  description: |
    Get detailed information about a specific Stack Exchange question including body, tags, and score.
  provider: stackexchange
  endpoint: /questions/{id}
  method: GET
  scopes: []
  tags:
    - questions
    - q&a
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_answers
  name: List Answers
  description: |
    List all answers for a specific Stack Exchange question. Returns answer bodies, scores, and acceptance status.
  provider: stackexchange
  endpoint: /questions/{id}/answers
  method: GET
  scopes: []
  tags:
    - answers
    - q&a
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_answer
  name: Get Answer
  description: |
    Get detailed information about a specific Stack Exchange answer including body, score, and comments.
  provider: stackexchange
  endpoint: /answers/{id}
  method: GET
  scopes: []
  tags:
    - answers
    - q&a
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

