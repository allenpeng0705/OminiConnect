- slug: snyk_get_test_report
  name: Get Test Report
  description: |
    Retrieve a test report for a specific project showing vulnerability findings.
  provider: snyk
  endpoint: /v1/orgs/{org_id}/projects/{project_id}/reports/test
  method: GET
  scopes:
    - snyk_orgs_read
  tags:
    - reports
  input_schema:
    type: object
    description: Parameters for getting test report
    properties:
      org_id:
        type: string
        description: "The Snyk organization ID"
      project_id:
        type: string
        description: "The Snyk project ID"
      report_type:
        type: string
        description: "Type of report (full, summary)"
    required:
      - org_id
      - project_id

- slug: snyk_list_api_tokens
  name: List API Tokens
  description: |
    Retrieve all API tokens for a service account or user in the organization.
  provider: snyk
  endpoint: /v1/orgs/{org_id}/members/{member_id}/tokens
  method: GET
  scopes:
    - snyk_orgs_admin
  tags:
    - tokens
  input_schema:
    type: object
    description: Parameters for listing API tokens
    properties:
      org_id:
        type: string
        description: "The Snyk organization ID"
      member_id:
        type: string
        description: "The member ID"
    required:
      - org_id
      - member_id