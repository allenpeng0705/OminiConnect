# Personio Recruiting Tools - Allowlist
# Curated subset of Personio Recruiting API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.
# NOTE: personio-recruiting uses the same API endpoints as personio - only auth is different.

# === TOOL LIST ===
# 1. personio_recruiting_list_candidates         - List candidates
# 2. personio_recruiting_get_candidate          - Get candidate details
# 3. personio_recruiting_list_jobs             - List job postings
# 4. personio_recruiting_get_job               - Get job details
# 5. personio_recruiting_list_applications      - List applications
# 6. personio_recruiting_get_application       - Get application details
# 7. personio_recruiting_list_interviews        - List interviews
# 8. personio_recruiting_get_interview         - Get interview details
# 9. personio_recruiting_list_offer_docs       - List offer documents
# 10. personio_recruiting_get_company          - Get company information

- slug: personio_recruiting_list_candidates
  name: List Candidates
  description: |
    List all candidates in the recruiting system.
  provider: personio-recruiting
  endpoint: /xml
  method: GET
  scopes: []
  tags:
    - candidates
    - recruiting
    - list
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      status:
        type: string
        description: "Filter by candidate status"
    required: []

- slug: personio_recruiting_get_candidate
  name: Get Candidate
  description: |
    Get detailed information about a specific candidate.
  provider: personio-recruiting
  endpoint: /xml/{candidateId}
  method: GET
  scopes: []
  tags:
    - candidates
    - recruiting
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      candidateId:
        type: string
        description: "Candidate ID"
    required:
      - candidateId

