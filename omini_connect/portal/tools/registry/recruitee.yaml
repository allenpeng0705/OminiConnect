# Recruitee Tools - Allowlist
# Curated subset of Recruitee API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. recruitee_list_offers          - List all offers
# 2. recruitee_get_offer            - Get offer details
# 3. recruitee_create_offer         - Create an offer
# 4. recruitee_list_candidates      - List candidates
# 5. recruitee_get_candidate        - Get candidate details
# 6. recruitee_list_departments     - List departments
# 7. recruitee_list_positions       - List positions
# 8. recruitee_get_position         - Get position details
# 9. recruitee_list_interviews      - List interviews
# 10. recruitee_create_interview    - Schedule interview

- slug: recruitee_list_offers
  name: List Offers
  description: |
    Retrieve a list of all job offers.
  provider: recruitee
  endpoint: /offers
  method: GET
  scopes:
    - offers:read
  tags:
    - offers
    - recruitment
    - hr
  input_schema:
    type: object
    description: Parameters for listing offers
    properties:
      limit:
        type: integer
        description: "Number of offers to return"
        default: 50
      status:
        type: string
        description: "Filter by status: pending, accepted, declined"
    required: []

- slug: recruitee_get_offer
  name: Get Offer
  description: |
    Get details of a specific offer.
  provider: recruitee
  endpoint: /offers/{offerId}
  method: GET
  scopes:
    - offers:read
  tags:
    - offers
    - recruitment
    - hr
  input_schema:
    type: object
    description: Parameters for getting an offer
    properties:
      offerId:
        type: string
        description: "The offer ID"
    required:
      - offerId

- slug: recruitee_create_offer
  name: Create Offer
  description: |
    Create a new job offer for a candidate.
  provider: recruitee
  endpoint: /offers
  method: POST
  scopes:
    - offers:write
  tags:
    - offers
    - recruitment
    - hr
    - create
  input_schema:
    type: object
    description: Parameters for creating an offer
    properties:
      candidateId:
        type: string
        description: "Candidate ID"
      positionId:
        type: string
        description: "Position ID"
      salary:
        type: number
        description: "Salary amount"
      startDate:
        type: string
        description: "Proposed start date"
    required:
      - candidateId
      - positionId

