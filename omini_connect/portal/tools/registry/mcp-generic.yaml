# MCP Generic Tools - Allowlist
# Curated subset of MCP (Model Context Protocol) Generic OAuth2 API for AI agent use.
# MCP_OAUTH2_GENERIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# Note: MCP Generic is a special provider that wraps MCP servers as OAuth2 APIs.
# The actual tools depend on the specific MCP server being connected.
# This allowlist defines the standard MCP tool patterns.

# === TOOL LIST ===
# 1. mcp_generic_list_tools      - List available tools from MCP server
# 2. mcp_generic_call_tool       - Call a specific tool on MCP server
# 3. mcp_generic_list_resources  - List available resources
# 4. mcp_generic_read_resource    - Read a specific resource
# 5. mcp_generic_list_prompts     - List available prompts
# 6. mcp_generic_get_prompt      - Get a specific prompt
# 7. mcp_generic_list_servers    - List connected MCP servers
# 8. mcp_generic_get_server      - Get MCP server info
# 9. mcp_generic_list_aliases   - List tool aliases
# 10. mcp_generic_create_alias  - Create a tool alias

- slug: mcp_generic_list_tools
  name: List MCP Tools
  description: |
    List all available tools from the connected MCP server.
    Returns tool names, descriptions, and input schemas.
  provider: mcp-generic
  endpoint: /tools
  method: GET
  scopes: []
  tags:
    - mcp
    - tools
    - list
  input_schema:
    type: object
    description: Parameters for listing MCP tools
    properties:
      category:
        type: string
        description: "Filter by tool category"
    required: []

- slug: mcp_generic_call_tool
  name: Call MCP Tool
  description: |
    Call a specific tool on the MCP server with arguments.
  provider: mcp-generic
  endpoint: /tools/{toolName}
  method: POST
  scopes: []
  tags:
    - mcp
    - tools
    - call
  input_schema:
    type: object
    description: Parameters for calling an MCP tool
    properties:
      toolName:
        type: string
        description: "Name of the tool to call"
      arguments:
        type: object
        description: "Tool arguments as key-value pairs"
    required:
      - toolName
      - arguments

