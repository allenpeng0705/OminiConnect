# Zoom Tools - Allowlist
# Curated subset of Zoom API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. zoom_list_meetings       - List meetings
# 2. zoom_get_meeting         - Get meeting details
# 3. zoom_create_meeting      - Create a meeting
# 4. zoom_update_meeting      - Update a meeting
# 5. zoom_delete_meeting      - Delete a meeting
# 6. zoom_list_participants   - List meeting participants
# 7. zoom_get_participant     - Get participant details
# 8. zoom_list_recordings     - List cloud recordings
# 9. zoom_get_recording      - Get recording details
# 10. zoom_list_users         - List users

- slug: zoom_list_meetings
  name: List Meetings
  description: |
    Retrieve all meetings in the Zoom account with pagination support. Returns meeting IDs, topics, start times, durations, and statuses for each meeting.
  provider: zoom
  endpoint: /users/{user_id}/meetings
  method: GET
  scopes:
    - zoom_meeting:read:list_meetings
  tags:
    - meetings
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      user_id:
        type: string
        description: "User ID (or 'me' for current user)"
      type:
        type: string
        description: "Meeting type: upcoming, live, past"
      page_size:
        type: integer
        description: "Max meetings (default 30)"
        default: 30
    required:
      - user_id

- slug: zoom_get_meeting
  name: Get Meeting
  description: |
    Retrieve detailed information about a specific Zoom meeting by its unique ID. Returns the meeting topic, join URL, password, settings, and recurrence schedule.
  provider: zoom
  endpoint: /meetings/{meeting_id}
  method: GET
  scopes:
    - zoom_meeting:read:list_meetings
  tags:
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for getting a meeting
    properties:
      meeting_id:
        type: string
        description: "Meeting ID (numeric)"
    required:
      - meeting_id

- slug: zoom_create_meeting
  name: Create Meeting
  description: |
    Schedule a new meeting in Zoom with topic, start time, duration, and timezone settings. Returns the created meeting with its unique ID and join URL.
  provider: zoom
  endpoint: /users/{user_id}/meetings
  method: POST
  scopes:
    - zoom_meeting:write:create
  tags:
    - meetings
    - create
  input_schema:
    type: object
    description: Parameters for creating a meeting
    properties:
      user_id:
        type: string
        description: "User ID (or 'me' for current user)"
      topic:
        type: string
        description: "Meeting topic"
      type:
        type: integer
        description: "Meeting type: 1=instant, 2=scheduled, 3=recurring no fixed time, 8=recurring fixed time"
        default: 2
      start_time:
        type: string
        description: "Start time (ISO 8601 format)"
      duration:
        type: integer
        description: "Duration in minutes"
      timezone:
        type: string
        description: "Timezone (e.g., America/New_York)"
      agenda:
        type: string
        description: "Meeting agenda"
      settings:
        type: object
        description: "Meeting settings (host_video, participant_video, etc.)"
    required:
      - user_id
      - topic

- slug: zoom_update_meeting
  name: Update Meeting
  description: |
    Modify an existing Zoom meeting by updating its topic, time, duration, or settings. Returns the updated meeting confirming the changes made.
  provider: zoom
  endpoint: /meetings/{meeting_id}
  method: PUT
  scopes:
    - zoom_meeting:write:update
  tags:
    - meetings
    - update
  input_schema:
    type: object
    description: Parameters for updating a meeting
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
      topic:
        type: string
        description: "New topic"
      start_time:
        type: string
        description: "New start time (ISO 8601)"
      duration:
        type: integer
        description: "New duration in minutes"
      agenda:
        type: string
        description: "New agenda"
      settings:
        type: object
        description: "New meeting settings"
    required:
      - meeting_id

- slug: zoom_delete_meeting
  name: Delete Meeting
  description: |
    Permanently remove a specific Zoom meeting by its unique ID. Returns confirmation of successful deletion.
  provider: zoom
  endpoint: /meetings/{meeting_id}
  method: DELETE
  scopes:
    - zoom_meeting:write:delete
  tags:
    - meetings
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a meeting
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
    required:
      - meeting_id

- slug: zoom_list_participants
  name: List Participants
  description: |
    Retrieve all participants who have joined a specific Zoom meeting. Returns participant names, IDs, email addresses, join times, and session durations.
  provider: zoom
  endpoint: /meetings/{meeting_id}/participants
  method: GET
  scopes:
    - zoom_meeting:read:list_meetings
  tags:
    - meetings
    - participants
    - list
  input_schema:
    type: object
    description: Parameters for listing participants
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
    required:
      - meeting_id

- slug: zoom_get_participant
  name: Get Participant
  description: |
    Retrieve detailed information about a specific meeting participant by their ID. Returns the participant name, device info, connection quality, and session duration.
  provider: zoom
  endpoint: /meetings/{meeting_id}/participants/{participant_id}
  method: GET
  scopes:
    - zoom_meeting:read:list_meetings
  tags:
    - meetings
    - participants
    - read
  input_schema:
    type: object
    description: Parameters for getting participant info
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
      participant_id:
        type: string
        description: "Participant ID"
    required:
      - meeting_id
      - participant_id

- slug: zoom_list_recordings
  name: List Recordings
  description: |
    Retrieve all cloud recordings in the Zoom account with pagination support. Returns recording IDs, meeting topics, durations, file sizes, and download URLs.
  provider: zoom
  endpoint: /users/{user_id}/recordings
  method: GET
  scopes:
    - zoom_recording:read:list_recordings
  tags:
    - recordings
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing recordings
    properties:
      user_id:
        type: string
        description: "User ID (or 'me' for current user)"
      page_size:
        type: integer
        description: "Max results (default 30)"
        default: 30
    required:
      - user_id

- slug: zoom_get_recording
  name: Get Recording
  description: |
    Retrieve detailed information about a specific cloud recording by meeting ID. Returns the recording files, durations, sharing URLs, and deletion settings.
  provider: zoom
  endpoint: /meetings/{meeting_id}/recordings
  method: GET
  scopes:
    - zoom_recording:read:list_recordings
  tags:
    - recordings
    - read
  input_schema:
    type: object
    description: Parameters for getting recording info
    properties:
      meeting_id:
        type: string
        description: "Meeting ID"
    required:
      - meeting_id

- slug: zoom_list_users
  name: List Users
  description: |
    Retrieve all users in the Zoom account with pagination support. Returns user names, IDs, email addresses, and status for each user.
  provider: zoom
  endpoint: /users
  method: GET
  scopes:
    - zoom_user:read:list_users
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      status:
        type: string
        description: "Filter by status: active, inactive, pending"
      page_size:
        type: integer
        description: "Max users (default 30, max 300)"
        default: 30
    required: []
