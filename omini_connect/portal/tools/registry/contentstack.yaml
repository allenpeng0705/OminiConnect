# contentstack Tools - Allowlist
# Curated subset of the Contentstack Content Management API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. contentstack_list_assets         - List assets in a stack
# 2. contentstack_get_asset          - Get a specific asset by UID
# 3. contentstack_upload_asset       - Upload a new asset
# 4. contentstack_list_entries       - List entries in a content type
# 5. contentstack_get_entry           - Get a specific entry by UID
# 6. contentstack_create_entry        - Create a new entry
# 7. contentstack_list_content_types  - List content types in a stack
# 8. contentstack_get_content_type    - Get a specific content type
# 9. contentstack_list_locales        - List locales in a stack
# 10. contentstack_get_locale         - Get a specific locale

- slug: contentstack_list_assets
  name: List Assets
  description: |
    List all assets (images, videos, files) in a Contentstack stack with optional filtering.
    Returns asset details including title, filename, URL, and metadata.
  provider: contentstack
  endpoint: /v3/assets
  method: GET
  scopes:
    - assets:read
  tags:
    - assets
    - media
  input_schema:
    type: object
    description: Parameters for listing assets
    properties:
      limit:
        type: integer
        description: "Number of results to return (max 100)"
        default: 20
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
      include_dimensions:
        type: boolean
        description: "Include asset dimensions in response"
        default: false
      include_fallback:
        type: boolean
        description: "Include fallback locale asset if missing"
        default: false
    required: []

- slug: contentstack_get_asset
  name: Get Asset
  description: |
    Get details of a specific asset by its UID including title, filename, URL, and metadata.
  provider: contentstack
  endpoint: /v3/assets/{uid}
  method: GET
  scopes:
    - assets:read
  tags:
    - assets
    - read
  input_schema:
    type: object
    description: Parameters for getting an asset
    properties:
      uid:
        type: string
        description: "Asset UID"
      include_dimensions:
        type: boolean
        description: "Include asset dimensions"
        default: false
    required:
      - uid

- slug: contentstack_upload_asset
  name: Upload Asset
  description: |
    Upload a new asset (image, video, or file) to Contentstack.
    The asset will be available in the stack's asset library.
  provider: contentstack
  endpoint: /v3/assets
  method: POST
  scopes:
    - assets:create
  tags:
    - assets
    - upload
  input_schema:
    type: object
    description: Parameters for uploading an asset
    properties:
      title:
        type: string
        description: "Asset title"
      description:
        type: string
        description: "Asset description"
      file:
        type: object
        description: "File object with filename and content_type"
    required:
      - title
      - file

- slug: contentstack_list_entries
  name: List Entries
  description: |
    List entries for a specific content type with optional filtering and sorting.
    Returns entry details including fields, locale, and publishing information.
  provider: contentstack
  endpoint: /v3/content_types/{content_type_uid}/entries
  method: GET
  scopes:
    - content_type.read
    - entry:read
  tags:
    - entries
    - content
  input_schema:
    type: object
    description: Parameters for listing entries
    properties:
      content_type_uid:
        type: string
        description: "Content type UID"
      limit:
        type: integer
        description: "Number of results to return"
        default: 20
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
      locale:
        type: string
        description: "Locale code (e.g., en-us)"
        default: en-us
      query:
        type: object
        description: "Query object for filtering (e.g., {\"field_uid\": \"value\"})"
    required:
      - content_type_uid

- slug: contentstack_get_entry
  name: Get Entry
  description: |
    Get details of a specific entry by its UID including all field values and metadata.
  provider: contentstack
  endpoint: /v3/content_types/{content_type_uid}/entries/{entry_uid}
  method: GET
  scopes:
    - content_type.read
    - entry:read
  tags:
    - entries
    - read
  input_schema:
    type: object
    description: Parameters for getting an entry
    properties:
      content_type_uid:
        type: string
        description: "Content type UID"
      entry_uid:
        type: string
        description: "Entry UID"
      locale:
        type: string
        description: "Locale code"
        default: en-us
    required:
      - content_type_uid
      - entry_uid

- slug: contentstack_create_entry
  name: Create Entry
  description: |
    Create a new entry in a content type with the specified field values.
    Entries represent content following a content type schema.
  provider: contentstack
  endpoint: /v3/content_types/{content_type_uid}/entries
  method: POST
  scopes:
    - content_type.read
    - entry:create
  tags:
    - entries
    - create
  input_schema:
    type: object
    description: Parameters for creating an entry
    properties:
      content_type_uid:
        type: string
        description: "Content type UID"
      entry:
        type: object
        description: "Entry data object with field values keyed by field UID"
      locale:
        type: string
        description: "Locale code"
        default: en-us
    required:
      - content_type_uid
      - entry

- slug: contentstack_list_content_types
  name: List Content Types
  description: |
    List all content types in a Contentstack stack.
    Content types define the schema for entries (e.g., Blog Post, Product).
  provider: contentstack
  endpoint: /v3/content_types
  method: GET
  scopes:
    - content_type:read
  tags:
    - content_types
    - schema
  input_schema:
    type: object
    description: Parameters for listing content types
    properties:
      limit:
        type: integer
        description: "Number of results to return"
        default: 20
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
    required: []

- slug: contentstack_get_content_type
  name: Get Content Type
  description: |
    Get details of a specific content type including its schema, display field, and settings.
  provider: contentstack
  endpoint: /v3/content_types/{content_type_uid}
  method: GET
  scopes:
    - content_type:read
  tags:
    - content_types
    - read
  input_schema:
    type: object
    description: Parameters for getting a content type
    properties:
      content_type_uid:
        type: string
        description: "Content type UID"
    required:
      - content_type_uid

- slug: contentstack_list_locales
  name: List Locales
  description: |
    List all locales (languages/regional variants) configured in a Contentstack stack.
    Locales enable multilingual content management.
  provider: contentstack
  endpoint: /v3/locales
  method: GET
  scopes:
    - settings:read
  tags:
    - locales
    - i18n
  input_schema:
    type: object
    description: Parameters for listing locales
    properties:
      limit:
        type: integer
        description: "Number of results to return"
        default: 20
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
    required: []

- slug: contentstack_get_locale
  name: Get Locale
  description: |
    Get details of a specific locale including its code, name, and fallback locale.
  provider: contentstack
  endpoint: /v3/locales/{locale_code}
  method: GET
  scopes:
    - settings:read
  tags:
    - locales
    - read
  input_schema:
    type: object
    description: Parameters for getting a locale
    properties:
      locale_code:
        type: string
        description: "Locale code (e.g., en-us, fr-fr)"
    required:
      - locale_code
