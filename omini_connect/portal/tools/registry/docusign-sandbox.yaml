# DocuSign Sandbox Tools - Allowlist
# Curated subset of the DocuSign API for AI agent use.
# OAuth2 via Nango (Sandbox environment).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. docusign_sandbox_list_envelopes        - List envelopes
# 2. docusign_sandbox_get_envelope          - Get envelope details
# 3. docusign_sandbox_create_envelope       - Create an envelope
# 4. docusign_sandbox_list_documents        - List documents
# 5. docusign_sandbox_get_document          - Get document details
# 6. docusign_sandbox_list_recipients       - List recipients
# 7. docusign_sandbox_get_recipient         - Get recipient details
# 8. docusign_sandbox_list_templates        - List templates
# 9. docusign_sandbox_get_template          - Get template details
# 10. docusign_sandbox_list_users          - List users

- slug: docusign_sandbox_list_envelopes
  name: List Envelopes
  description: |
    List all DocuSign sandbox envelopes with optional filtering by status or date range. Returns envelope IDs, subject lines, statuses, and recipient information.
  provider: docusign-sandbox
  endpoint: /v2.1/envelopes
  method: GET
  scopes: []
  tags:
    - envelopes
    - esignature
    - list
  input_schema:
    type: object
    description: Parameters for listing envelopes
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
      status:
        type: string
        description: "Filter by status: created, sent, delivered, signed, completed"
    required: []

- slug: docusign_sandbox_get_envelope
  name: Get Envelope
  description: |
    Retrieve detailed information about a specific DocuSign sandbox envelope including status, document list, and real-time signing progress.
  provider: docusign-sandbox
  endpoint: /v2.1/envelopes/{envelope_id}
  method: GET
  scopes: []
  tags:
    - envelopes
    - esignature
    - read
  input_schema:
    type: object
    description: Parameters for getting an envelope
    properties:
      envelope_id:
        type: string
        description: "Envelope ID"
    required:
      - envelope_id

- slug: docusign_sandbox_create_envelope
  name: Create Envelope
  description: |
    Create a new DocuSign sandbox envelope for testing electronic signatures with documents and recipients. Returns the created envelope with its unique identifier.
  provider: docusign-sandbox
  endpoint: /v2.1/envelopes
  method: POST
  scopes: []
  tags:
    - envelopes
    - esignature
    - create
  input_schema:
    type: object
    description: Parameters for creating an envelope
    properties:
      email_subject:
        type: string
        description: "Email subject"
      documents:
        type: array
        items:
          type: object
        description: "Documents to include"
      recipients:
        type: array
        items:
          type: object
        description: "Recipients to sign"
    required:
      - email_subject

- slug: docusign_sandbox_list_documents
  name: List Documents
  description: |
    List all documents in a specific DocuSign sandbox envelope with document IDs, names, and page counts for each attachment.
  provider: docusign-sandbox
  endpoint: /v2.1/envelopes/{envelope_id}/documents
  method: GET
  scopes: []
  tags:
    - documents
    - esignature
    - list
  input_schema:
    type: object
    description: Parameters for listing documents
    properties:
      envelope_id:
        type: string
        description: "Envelope ID"
    required:
      - envelope_id

- slug: docusign_sandbox_get_document
  name: Get Document
  description: |
    Retrieve detailed information about a specific document in a DocuSign sandbox envelope including content metadata and page count.
  provider: docusign-sandbox
  endpoint: /v2.1/envelopes/{envelope_id}/documents/{document_id}
  method: GET
  scopes: []
  tags:
    - documents
    - esignature
    - read
  input_schema:
    type: object
    description: Parameters for getting a document
    properties:
      envelope_id:
        type: string
        description: "Envelope ID"
      document_id:
        type: string
        description: "Document ID"
    required:
      - envelope_id
      - document_id

