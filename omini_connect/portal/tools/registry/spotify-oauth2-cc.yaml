# Spotify (Client Credentials) Tools - Allowlist
# Curated subset of Spotify (Client Credentials) API for AI agent use.
# Auth mode: OAUTH2_CC.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_user_profile                         - Get current user profile
# 2. list_playlists                           - List user's playlists
# 3. get_playlist                             - Get playlist details
# 4. list_tracks                              - List tracks in playlist
# 5. get_artist                               - Get artist details
# 6. get_album                                - Get album details
# 7. search                                   - Search for tracks/artists/playlists
# 8. get_recommendations                      - Get track recommendations
# 9. get_audio_features                       - Get audio features for track
# 10. list_followed                            - List followed artists

- slug: get_user_profile
  name: Get User Profile
  description: |
    Get current user profile
  provider: spotify-oauth2-cc
  endpoint: /me
  method: GET
  scopes: []
  tags:
    - user
    - profile
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

