- slug: docuware_create_document
  name: Create Document
  description: |
    Upload a new document to a cabinet.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Documents
  method: POST
  scopes: []
  tags:
    - documents
    - document-management
    - create
  input_schema:
    type: object
    description: Parameters for creating a document
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      file_name:
        type: string
        description: "File name"
      content:
        type: string
        description: "Document content (base64)"
    required:
      - cabinet_id
      - file_name

