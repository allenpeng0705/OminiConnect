      - document_id

- slug: docuware_search_documents
  name: Search Documents
  description: |
    Search documents using query expressions.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Documents/Search
  method: POST
  scopes: []
  tags:
    - search
    - document-management
    - find
  input_schema:
    type: object
    description: Parameters for searching documents
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      query:
        type: string
        description: "Search query expression"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required:
      - cabinet_id
      - query

