# Stripe App Tools - Allowlist
# Curated subset of Stripe App API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_customers                           - List all customers
# 2. get_customer                             - Get customer details
# 3. list_payments                            - List all payments
# 4. get_payment                              - Get payment details
# 5. list_invoices                            - List all invoices
# 6. get_invoice                              - Get invoice details
# 7. list_subscriptions                       - List all subscriptions
# 8. get_subscription                         - Get subscription details
# 9. list_products                            - List all products
# 10. get_balance                              - Get account balance

- slug: list_customers
  name: List Customers
  description: |
    List all customers
  provider: stripe-app
  endpoint: /customers
  method: GET
  scopes: []
  tags:
    - customers
    - billing
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_customer
  name: Get Customer
  description: |
