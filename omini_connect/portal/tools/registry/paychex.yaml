# Paychex Tools - Allowlist
# Curated subset of Paychex API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. paychex_list_employees        - List employees
# 2. paychex_get_employee          - Get employee details
# 3. paychex_list_payroll_runs     - List payroll runs
# 4. paychex_get_payroll_run       - Get payroll run details
# 5. paychex_list_time_entries     - List time entries
# 6. paychex_list_departments      - List departments
# 7. paychex_list_locations        - List locations
# 8. paychex_list_benefits          - List benefit plans
# 9. paychex_list_pay_groups       - List pay groups
# 10. paychex_get_company_info      - Get company information

- slug: paychex_list_employees
  name: List Employees
  description: |
    List all employees in the organization.
  provider: paychex
  endpoint: /v1/employees
  method: GET
  scopes:
    - employees.read
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
      perPage:
        type: integer
        description: "Number of results per page"
        default: 50
    required: []

- slug: paychex_get_employee
  name: Get Employee
  description: |
    Get detailed information about a specific employee.
  provider: paychex
  endpoint: /v1/employees/{employeeId}
  method: GET
  scopes:
    - employees.read
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

- slug: paychex_list_payroll_runs
  name: List Payroll Runs
  description: |
    List all payroll runs for the organization.
  provider: paychex
  endpoint: /v1/payrollRuns
  method: GET
  scopes:
    - payroll.read
  tags:
    - payroll
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payroll runs
    properties:
      status:
        type: string
        description: "Filter by status (e.g., PROCESSED, PENDING)"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: paychex_get_payroll_run
  name: Get Payroll Run
  description: |
    Get detailed information about a specific payroll run.
  provider: paychex
  endpoint: /v1/payrollRuns/{runId}
  method: GET
  scopes:
    - payroll.read
  tags:
    - payroll
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payroll run
    properties:
      runId:
        type: string
        description: "Payroll run ID"
    required:
      - runId

