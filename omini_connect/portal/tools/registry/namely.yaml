# Namely Tools - Allowlist
# Curated subset of Namely HR platform API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. namely_list_employees         - List employees
# 2. namely_get_employee           - Get employee details
# 3. namely_list_departments       - List departments
# 4. namely_list_jobs              - List job postings
# 5. namely_list_time_off          - List time off requests
# 6. namely_create_time_off        - Create time off request
# 7. namely_list_benefits          - List benefits enrollment
# 8. namely_list_payroll           - List payroll data
# 9. namely_list_company           - Get company info
# 10. namely_list_profiles          - List employee profiles

- slug: namely_list_employees
  name: List Employees
  description: |
    List all employees in the organization with pagination and filters.
    Returns employee IDs, names, and email addresses for each employee.
    Use this to discover workforce members and manage HR directory.
  provider: namely
  endpoint: /v1/employees
  method: GET
  scopes:
    - employees:read
  tags:
    - hr
    - employees
    - directory
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Items per page (default 20, max 100)"
        default: 20
    required: []

- slug: namely_get_employee
  name: Get Employee
  description: |
    Get detailed information for a specific employee including employment details.
    Returns the complete employee data with all associated information.
    This provides full employee data for HR management and directory lookup.
  provider: namely
  endpoint: /v1/employees/{id}
  method: GET
  scopes:
    - employees:read
  tags:
    - hr
    - employees
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      id:
        type: integer
        description: "Employee ID"
    required:
      - id

- slug: namely_list_departments
  name: List Departments
  description: |
    List all departments in the organization with hierarchy information.
    Returns department names, IDs, and manager IDs for each department.
    Use this to discover organizational structure and manage team hierarchy.
  provider: namely
  endpoint: /v1/departments
  method: GET
  scopes:
    - departments:read
  tags:
    - hr
    - departments
    - organization
  input_schema:
    type: object
    description: Parameters for listing departments
    properties: {}
    required: []

- slug: namely_list_jobs
  name: List Jobs
  description: |
    List all job postings in the organization with status filtering.
    Returns job titles, IDs, and status for each posting.
    Use this to discover open positions and manage recruitment.
  provider: namely
  endpoint: /v1/jobs
  method: GET
  scopes:
    - jobs:read
  tags:
    - hr
    - jobs
    - recruiting
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Filter by status (open, closed)"
    required: []

- slug: namely_list_time_off
  name: List Time Off
  description: |
    List time off requests for employees with filtering and pagination.
    Returns request IDs, employee names, dates, and status for each request.
    Use this to discover leave requests and manage approval workflows.
  provider: namely
  endpoint: /v1/time_off_requests
  method: GET
  scopes:
    - time_off:read
  tags:
    - hr
    - time-off
    - requests
  input_schema:
    type: object
    description: Parameters for listing time off requests
    properties:
      employee_id:
        type: integer
        description: "Filter by employee ID"
      status:
        type: string
        description: "Filter by status (pending, approved, denied)"
    required: []

- slug: namely_create_time_off
  name: Create Time Off
  description: |
    Create a new time off request for an employee with specified dates and type.
    Returns the created request with its unique ID and confirmation.
    This submits a new leave request for employee time off.
  provider: namely
  endpoint: /v1/time_off_requests
  method: POST
  scopes:
    - time_off:write
  tags:
    - hr
    - time-off
    - create
  input_schema:
    type: object
    description: Parameters for creating time off request
    properties:
      employee_id:
        type: integer
        description: "Employee ID"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      type:
        type: string
        description: "Time off type (vacation, sick, personal)"
    required:
      - employee_id
      - start_date
      - end_date
      - type

