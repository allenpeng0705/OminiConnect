- slug: namely_list_time_off
  name: List Time Off
  description: |
    List time off requests for employees.
  provider: namely
  endpoint: /v1/time_off_requests
  method: GET
  scopes:
    - time_off:read
  tags:
    - hr
    - time-off
    - requests
  input_schema:
    type: object
    description: Parameters for listing time off requests
    properties:
      employee_id:
        type: integer
        description: "Filter by employee ID"
      status:
        type: string
        description: "Filter by status (pending, approved, denied)"
    required: []

- slug: namely_create_time_off
  name: Create Time Off
  description: |
    Create a new time off request for an employee.
  provider: namely
  endpoint: /v1/time_off_requests
  method: POST
  scopes:
    - time_off:write
  tags:
    - hr
    - time-off
    - create
  input_schema:
    type: object
    description: Parameters for creating time off request
    properties:
      employee_id:
        type: integer
        description: "Employee ID"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      type:
        type: string
        description: "Time off type (vacation, sick, personal)"
    required:
      - employee_id
      - start_date
      - end_date
      - type

