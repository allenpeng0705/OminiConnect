# Squareup Tools - Allowlist
# Curated subset of Squareup API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_payments                            - List all payments
# 2. get_payment                              - Get payment details
# 3. list_orders                              - List all orders
# 4. get_order                                - Get order details
# 5. list_customers                           - List all customers
# 6. get_customer                             - Get customer details
# 7. list_items                               - List catalog items
# 8. list_locations                           - List business locations
# 9. get_reports                              - Get sales reports
# 10. list_refunds                             - List all refunds

- slug: list_payments
  name: List Payments
  description: |
    List all payments processed through Square. Returns payment amounts, statuses, and payment method details.
  provider: squareup
  endpoint: /v2/payments
  method: GET
  scopes: []
  tags:
    - payments
    - transactions
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_payment
  name: Get Payment
  description: |
    Get detailed information about a specific Square payment including amount, status, and receipt URL.
  provider: squareup
  endpoint: /v2/payments/{id}
  method: GET
  scopes: []
  tags:
    - payments
    - transactions
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

