# Help Scout Docs Tools - Allowlist
# Curated subset of Help Scout Docs API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. helpscout_docs_list_articles  - List articles
# 2. helpscout_docs_get_article    - Get article details
# 3. helpscout_docs_list_collections - List collections
# 4. helpscout_docs_get_collection - Get collection details
# 5. helpscout_docs_list_sites    - List sites
# 6. helpscout_docs_get_site      - Get site details
# 7. helpscout_docs_list_categories - List categories
# 8. helpscout_docs_get_category   - Get category details
# 9. helpscout_docs_search_articles - Search articles
# 10. helpscout_docs_list_users     - List users

- slug: helpscout_docs_list_articles
  name: List Articles
  description: |
    List all articles in Help Scout Docs.
    Returns article details including title, status, and visibility.
  provider: helpscout-docs
  endpoint: /articles
  method: GET
  scopes:
    - read
  tags:
    - articles
    - list
    - docs
  input_schema:
    type: object
    description: Parameters for listing articles
    properties:
      site_id:
        type: integer
        description: "Filter by site ID"
      collection_id:
        type: integer
        description: "Filter by collection ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: helpscout_docs_get_article
  name: Get Article
  description: |
    Get detailed information about a specific article.
    Includes article content, metadata, and related articles.
  provider: helpscout-docs
  endpoint: /articles/{id}
  method: GET
  scopes:
    - read
  tags:
    - articles
    - read
    - docs
  input_schema:
    type: object
    description: Parameters for getting an article
    properties:
      id:
        type: integer
        description: "Article ID"
    required:
      - id

