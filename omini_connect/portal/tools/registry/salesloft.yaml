- slug: salesloft_add_person_to_cadence
  name: Add Person to Cadence
  description: |
    Add a person to a Salesloft cadence with optional scheduled date.
  provider: salesloft
  endpoint: /api/v2/cadence_enrollments
  method: POST
  scopes:
    - cadences.write
  tags:
    - cadences
    - sales engagement
    - write
  input_schema:
    type: object
    description: Parameters for adding person to cadence
    properties:
      person_id:
        type: string
        description: "The person ID"
      cadence_id:
        type: string
        description: "The cadence ID"
      scheduled_for:
        type: string
        description: "Schedule date (ISO 8601 format)"
    required:
      - person_id
      - cadence_id

