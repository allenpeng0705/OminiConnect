# Salesloft Tools - Sales Engagement Platform
# Curated subset of Salesloft API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. salesloft_list_people              - List people
# 2. salesloft_get_person              - Get person details
# 3. salesloft_create_person            - Create a person
# 4. salesloft_list_cadences            - List cadences
# 5. salesloft_get_cadence              - Get cadence details
# 6. salesloft_add_person_to_cadence     - Add person to cadence
# 7. salesloft_list_calls               - List calls
# 8. salesloft_get_call                 - Get call details
# 9. salesloft_list_emails              - List emails
# 10. salesloft_get_email               - Get email details

- slug: salesloft_list_people
  name: List People
  description: |
    List all people in Salesloft CRM with optional filtering by name, email, cadence, or stage. Returns person names, email addresses, phone numbers, and engagement status for sales outreach management.
  provider: salesloft
  endpoint: /api/v2/people
  method: GET
  scopes:
    - people.read
  tags:
    - people
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for listing people
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
        description: "Filter expression (e.g., cadence_id='123')"
    required: []

- slug: salesloft_get_person
  name: Get Person
  description: |
    Get detailed information about a specific Salesloft person by ID including contact info, company details, activities, and engagement history. Returns data for relationship management and follow-up tracking.
  provider: salesloft
  endpoint: /api/v2/people/{personId}
  method: GET
  scopes:
    - people.read
  tags:
    - people
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for getting a person
    properties:
      person_id:
        type: string
        description: "The person ID"
    required:
      - person_id

- slug: salesloft_create_person
  name: Create Person
  description: |
    Create a new person in Salesloft CRM with name, email, phone, and company information. Returns the created person with their unique ID for outreach management and relationship tracking.
  provider: salesloft
  endpoint: /api/v2/people
  method: POST
  scopes:
    - people.write
  tags:
    - people
    - sales engagement
    - write
  input_schema:
    type: object
    description: Parameters for creating a person
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email_address:
        type: string
        description: "Email address"
      phone_number:
        type: string
        description: "Phone number"
      company_name:
        type: string
        description: "Company name"
      title:
        type: string
        description: "Job title"
    required:
      - email_address

- slug: salesloft_list_cadences
  name: List Cadences
  description: |
    List all sales cadences in Salesloft with optional filtering by status, type, or assigned team. Returns cadence names, step counts, and participant metrics for campaign management.
  provider: salesloft
  endpoint: /api/v2/cadences
  method: GET
  scopes:
    - cadences.read
  tags:
    - cadences
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for listing cadences
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
        description: "Filter expression (e.g., status='active')"
    required: []

- slug: salesloft_get_cadence
  name: Get Cadence
  description: |
    Get detailed information about a specific Salesloft cadence by ID including steps, timing settings, email templates, and participant enrollment data. Returns data for campaign planning and execution.
  provider: salesloft
  endpoint: /api/v2/cadences/{cadenceId}
  method: GET
  scopes:
    - cadences.read
  tags:
    - cadences
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for getting a cadence
    properties:
      cadence_id:
        type: string
        description: "The cadence ID"
    required:
      - cadence_id

- slug: salesloft_add_person_to_cadence
  name: Add Person to Cadence
  description: |
    Add a specific person to a Salesloft sales cadence with optional scheduled start date. Returns enrollment confirmation with cadence and person IDs for campaign enrollment.
  provider: salesloft
  endpoint: /api/v2/cadence_enrollments
  method: POST
  scopes:
    - cadences.write
  tags:
    - cadences
    - sales engagement
    - write
  input_schema:
    type: object
    description: Parameters for adding person to cadence
    properties:
      person_id:
        type: string
        description: "The person ID"
      cadence_id:
        type: string
        description: "The cadence ID"
      scheduled_for:
        type: string
        description: "Schedule date (ISO 8601 format)"
    required:
      - person_id
      - cadence_id

