- slug: salesloft_get_cadence
  name: Get Cadence
  description: |
    Get detailed information about a Salesloft cadence including steps and settings.
  provider: salesloft
  endpoint: /api/v2/cadences/{cadenceId}
  method: GET
  scopes:
    - cadences.read
  tags:
    - cadences
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for getting a cadence
    properties:
      cadence_id:
        type: string
        description: "The cadence ID"
    required:
