# Salesloft Tools - Sales Engagement Platform
# Curated subset of Salesloft API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. salesloft_list_people              - List people
# 2. salesloft_get_person              - Get person details
# 3. salesloft_create_person            - Create a person
# 4. salesloft_list_cadences            - List cadences
# 5. salesloft_get_cadence              - Get cadence details
# 6. salesloft_add_person_to_cadence     - Add person to cadence
# 7. salesloft_list_calls               - List calls
# 8. salesloft_get_call                 - Get call details
# 9. salesloft_list_emails              - List emails
# 10. salesloft_get_email               - Get email details

- slug: salesloft_list_people
  name: List People
  description: |
    List people in Salesloft. Filter by name, email, cadence, or stage.
  provider: salesloft
  endpoint: /api/v2/people
  method: GET
  scopes:
    - people.read
  tags:
    - people
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for listing people
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
        description: "Filter expression (e.g., cadence_id='123')"
    required: []

- slug: salesloft_get_person
  name: Get Person
  description: |
    Get detailed information about a Salesloft person including contact info and activities.
  provider: salesloft
  endpoint: /api/v2/people/{personId}
  method: GET
  scopes:
    - people.read
  tags:
    - people
    - sales engagement
    - read
  input_schema:
    type: object
    description: Parameters for getting a person
    properties:
      person_id:
        type: string
        description: "The person ID"
    required:
      - person_id

- slug: salesloft_create_person
  name: Create Person
  description: |
    Create a new person in Salesloft with name, email, phone, and company information.
  provider: salesloft
  endpoint: /api/v2/people
  method: POST
  scopes:
    - people.write
  tags:
    - people
    - sales engagement
    - write
  input_schema:
    type: object
    description: Parameters for creating a person
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email_address:
        type: string
        description: "Email address"
      phone_number:
        type: string
        description: "Phone number"
      company_name:
        type: string
        description: "Company name"
      title:
        type: string
        description: "Job title"
    required:
      - email_address

- slug: salesloft_list_cadences
