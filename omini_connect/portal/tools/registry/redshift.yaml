- slug: redshift_list_tables
  name: List Tables
  description: |
    List all tables in a Redshift schema. Returns table names, types, and column counts.
    Use this to discover available tables for querying.
  provider: redshift
  endpoint: /
  method: GET
  scopes:
    - redshift_data
  tags:
    - table
