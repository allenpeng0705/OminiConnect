  provider: redshift
  endpoint: /
  method: GET
  scopes:
    - redshift_data
  tags:
    - user
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      clusterIdentifier:
        type: string
        description: "Redshift cluster identifier (required)"
      databaseName:
        type: string
        description: "Database name (required)"
    required:
      - clusterIdentifier
      - databaseName

- slug: redshift_get_user
  name: Get User
  description: |
    Get detailed information about a specific database user including their permissions and session settings.
  provider: redshift
  endpoint: /
  method: GET
  scopes:
    - redshift_data
  tags:
    - user
