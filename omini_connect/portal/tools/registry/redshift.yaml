- slug: redshift_get_query_results
  name: Get Query Results
  description: |
    Retrieve the results of a previously executed query by its ID.
    Use this to fetch results after running an async query.
  provider: redshift
  endpoint: /
  method: GET
  scopes:
    - redshift_data
  tags:
    - query
    - results
  input_schema:
    type: object
    description: Parameters for getting query results
    properties:
      clusterIdentifier:
        type: string
        description: "Redshift cluster identifier (required)"
      databaseName:
        type: string
        description: "Database name (required)"
      queryId:
        type: string
        description: "Query execution ID (required)"
    required:
      - clusterIdentifier
      - databaseName
      - queryId
