      - databaseName
      - schemaName
      - tableName

- slug: redshift_execute_query
  name: Execute Query
  description: |
    Execute a SQL query against Redshift and return results. Use for SELECT, INSERT, UPDATE, DELETE, or DDL.
  provider: redshift
  endpoint: /
  method: POST
  scopes:
    - redshift_data
  tags:
    - query
    - execute
    - sql
  input_schema:
    type: object
    description: Parameters for executing a query
    properties:
      clusterIdentifier:
        type: string
        description: "Redshift cluster identifier (required)"
      databaseName:
        type: string
        description: "Database name (required)"
      sql:
        type: string
        description: "SQL query string (required)"
      withCredentials:
        type: boolean
        description: "Execute with user credentials"
        default: false
    required:
      - clusterIdentifier
      - databaseName
      - sql

- slug: redshift_list_users
  name: List Users
  description: |
    List all users in the Redshift cluster. Returns usernames, session defaults, and create status.
