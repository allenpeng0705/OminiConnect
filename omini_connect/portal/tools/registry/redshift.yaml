  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      clusterIdentifier:
        type: string
        description: "Redshift cluster identifier (required)"
      databaseName:
        type: string
        description: "Database name (required)"
      schemaName:
        type: string
        description: "Schema name (required)"
    required:
      - clusterIdentifier
      - databaseName
      - schemaName

- slug: redshift_get_table
  name: Get Table
  description: |
    Get detailed information about a specific table including column definitions, types, and distribution keys.
  provider: redshift
  endpoint: /
  method: GET
  scopes:
    - redshift_data
  tags:
    - table
    - read
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      clusterIdentifier:
        type: string
        description: "Redshift cluster identifier (required)"
      databaseName:
        type: string
        description: "Database name (required)"
      schemaName:
        type: string
        description: "Schema name (required)"
      tableName:
        type: string
        description: "Table name (required)"
    required:
