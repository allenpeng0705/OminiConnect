# Statista Tools - Allowlist
# Curated subset of Statista API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_statistics                          - List available statistics
# 2. get_statistic                            - Get statistic details
# 3. search_statistics                        - Search for statistics
# 4. list_databases                           - List available databases
# 5. list_topics                              - List topics
# 6. get_topic                                - Get topic details
# 7. list_countries                           - List available countries
# 8. list_charts                              - List chart types
# 9. get_forecast                             - Get forecast data
# 10. get_export                               - Export statistic data

- slug: list_statistics
  name: List Statistics
  description: |
    List all available statistics in Statista. Returns statistic titles, sources, and publication dates.
  provider: statista
  endpoint: /v1/statistics
  method: GET
  scopes: []
  tags:
    - statistics
    - data
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_statistic
  name: Get Statistic
  description: |
    Get detailed information about a specific Statista statistic including data points, source information, and metadata.
  provider: statista
  endpoint: /v1/statistics/{id}
  method: GET
  scopes: []
  tags:
    - statistics
    - data
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: search_statistics
  name: Search Statistics
  description: |
    Search for statistics in Statista by keyword. Returns matching statistics with titles and source information.
  provider: statista
