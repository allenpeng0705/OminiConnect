# Smugmug Tools - Allowlist
# Curated subset of Smugmug API for AI agent use.
# Auth mode: OAUTH1.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_albums                              - List all albums
# 2. get_album                                - Get album details
# 3. list_images                              - List images in album
# 4. get_image                                - Get image details
# 5. upload_image                             - Upload an image
# 6. get_user                                 - Get user profile
# 7. list_folders                             - List folders
# 8. create_album                             - Create an album
# 9. update_album                             - Update album settings
# 10. delete_image                             - Delete an image

- slug: list_albums
  name: List Albums
  description: |
    List all albums
  provider: smugmug
  endpoint: /albums
  method: GET
  scopes: []
  tags:
    - albums
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_album
  name: Get Album
  description: |
    Get album details
  provider: smugmug
