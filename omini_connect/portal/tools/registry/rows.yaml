- slug: rows_list_spreadsheets
  name: List Spreadsheets
  description: |
    Retrieve a list of all accessible spreadsheets in Rows.
    Returns spreadsheet names, IDs, and last modified dates for each spreadsheet.
    Use this to discover available data files and track recent changes.
  provider: rows
  endpoint: /spreadsheets
  method: GET
  scopes:
    - spreadsheets:read
  tags:
    - spreadsheet
    - list
  input_schema:
    type: object
    description: Parameters for listing spreadsheets
    properties:
      limit:
        type: integer
        description: "Maximum number of spreadsheets to return (default: 50)"
      offset:
        type: integer
        description: "Number of spreadsheets to skip for pagination"
    required: []

- slug: rows_get_spreadsheet
  name: Get Spreadsheet
  description: |
    Get details and metadata for a specific spreadsheet by ID.
    Returns the complete spreadsheet metadata including tables and column structure.
    This provides full spreadsheet data for understanding organization.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}
  method: GET
  scopes:
    - spreadsheets:read
  tags:
    - spreadsheet
    - read
  input_schema:
    type: object
    description: Parameters for getting spreadsheet details
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
    required:
      - spreadsheetId

- slug: rows_create_spreadsheet
  name: Create Spreadsheet
  description: |
    Create a new spreadsheet with specified name and optional folder location.
    Returns the created spreadsheet with its unique ID and initial configuration.
    This provisions a new spreadsheet document in Rows.
  provider: rows
  endpoint: /spreadsheets
  method: POST
  scopes:
    - spreadsheets:write
  tags:
    - spreadsheet
    - create
  input_schema:
    type: object
    description: Parameters for creating a spreadsheet
    properties:
      name:
        type: string
        description: "Name of the new spreadsheet"
      folderId:
        type: string
        description: "Folder ID to create spreadsheet in"
    required:
      - name

- slug: rows_list_tables
  name: List Tables
  description: |
    List all tables within a specific spreadsheet.
    Returns table names, IDs, and record counts for each table.
    Use this to discover available data structures in a spreadsheet.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/tables
  method: GET
  scopes:
    - tables:read
  tags:
    - table
    - list
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
    required:
      - spreadsheetId

- slug: rows_get_table
  name: Get Table
  description: |
    Get details, schema, and structure of a specific table.
    Returns the complete table definition including column types and field configurations.
    This provides table metadata for understanding data organization.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/tables/{tableId}
  method: GET
  scopes:
    - tables:read
  tags:
    - table
    - read
  input_schema:
    type: object
    description: Parameters for getting table details
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
      tableId:
        type: string
        description: "The unique identifier of the table"
    required:
      - spreadsheetId
      - tableId

- slug: rows_list_rows
  name: List Rows
  description: |
    Retrieve all rows from a specific table with optional filtering and pagination.
    Returns row data with all column values for each matching entry.
    Use this to query table data for analysis and reporting.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/tables/{tableId}/rows
  method: GET
  scopes:
    - rows:read
  tags:
    - row
    - list
  input_schema:
    type: object
    description: Parameters for listing rows
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
      tableId:
        type: string
        description: "The unique identifier of the table"
      limit:
        type: integer
        description: "Maximum number of rows to return (default: 100)"
      offset:
        type: integer
        description: "Number of rows to skip for pagination"
      filter:
        type: object
        description: "Filter criteria for rows"
    required:
      - spreadsheetId
      - tableId

- slug: rows_get_row
  name: Get Row
  description: |
    Get a single row by its unique identifier from a table.
    Returns the complete row data with all column values.
    This provides detailed row information for specific data lookup.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/tables/{tableId}/rows/{rowId}
  method: GET
  scopes:
    - rows:read
  tags:
    - row
    - read
  input_schema:
    type: object
    description: Parameters for getting a row
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
      tableId:
        type: string
        description: "The unique identifier of the table"
      rowId:
        type: string
        description: "The unique identifier of the row"
    required:
      - spreadsheetId
      - tableId
      - rowId

- slug: rows_insert_row
  name: Insert Row
  description: |
    Insert a new row into a specified table with provided data.
    Returns the created row with its assigned position.
    This adds new data rows to a Rows table.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/tables/{tableId}/rows
  method: POST
  scopes:
    - rows:write
  tags:
    - row
    - create
  input_schema:
    type: object
    description: Parameters for inserting a row
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
      tableId:
        type: string
        description: "The unique identifier of the table"
      data:
        type: object
        description: "Row data as key-value pairs"
      position:
        type: integer
        description: "Position to insert the row at"
    required:
      - spreadsheetId
      - tableId
      - data

- slug: rows_update_row
  name: Update Row
  description: |
    Update an existing row with new data in a specified table.
    Returns the updated row with modified values.
    This modifies existing data in a Rows table.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/tables/{tableId}/rows/{rowId}
  method: PUT
  scopes:
    - rows:write
  tags:
    - row
    - update
  input_schema:
    type: object
    description: Parameters for updating a row
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
      tableId:
        type: string
        description: "The unique identifier of the table"
      rowId:
        type: string
        description: "The unique identifier of the row"
      data:
        type: object
        description: "Updated row data as key-value pairs"
    required:
      - spreadsheetId
      - tableId
      - rowId
      - data

- slug: rows_list_collaborators
  name: List Collaborators
  description: |
    List all collaborators on a specific spreadsheet with their access levels.
    Returns collaborator names, emails, and permission roles.
    Use this to discover who has access to a spreadsheet.
  provider: rows
  endpoint: /spreadsheets/{spreadsheetId}/collaborators
  method: GET
  scopes:
    - users:read
  tags:
    - collaboration
    - list
  input_schema:
    type: object
    description: Parameters for listing collaborators
    properties:
      spreadsheetId:
        type: string
        description: "The unique identifier of the spreadsheet"
    required:
      - spreadsheetId