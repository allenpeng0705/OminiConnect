# Google Meet Tools - Allowlist
# Curated subset of Google Meet API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_meet_list_spaces          - List meeting spaces
# 2. google_meet_create_space        - Create meeting space
# 3. google_meet_get_space          - Get space details
# 4. google_meet_list_recordings     - List recordings
# 5. google_meet_list_participants   - List participants
# 6. google_meet_create_access_rule  - Create access rule
# 7. google_meet_list_access_rules   - List access rules
# 8. google_meet_get_participant     - Get participant details
# 9. google_meet_list_codecs        - List codecs
# 10. google_meet_update_space      - Update space

- slug: google_meet_list_spaces
  name: List Spaces
  description: |
    List meeting spaces in Google Meet.
  provider: google-meet
  endpoint: /v2/spaces
  method: GET
  scopes:
    - https://www.googleapis.com/auth/meetings.space.readonly
  tags:
    - meet
    - spaces
    - list
  input_schema:
    type: object
    description: Parameters for listing spaces
    properties: {}

- slug: google_meet_create_space
  name: Create Space
  description: |
    Create a new meeting space.
  provider: google-meet
  endpoint: /v2/spaces
  method: POST
  scopes:
    - https://www.googleapis.com/auth/meetings.space.created
  tags:
    - meet
    - spaces
    - create
  input_schema:
    type: object
    description: Parameters for creating a space
    properties:
      meetingTitle:
        type: string
        description: "Meeting title"
    required:
      - meetingTitle

- slug: google_meet_get_space
  name: Get Space
  description: |
    Get details about a meeting space.
  provider: google-meet
  endpoint: /v2/spaces/{space_id}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/meetings.space.readonly
  tags:
    - meet
    - spaces
    - read
  input_schema:
    type: object
    description: Parameters for getting a space
    properties:
      space_id:
        type: string
        description: "Space ID"
    required:
      - space_id

- slug: google_meet_list_recordings
  name: List Recordings
  description: |
    List recordings from Meet.
  provider: google-meet
  endpoint: /v2/recordings
  method: GET
  scopes:
    - https://www.googleapis.com/auth/meetings.space.readonly
  tags:
    - meet
    - recordings
    - list
  input_schema:
    type: object
    description: Parameters for listing recordings
