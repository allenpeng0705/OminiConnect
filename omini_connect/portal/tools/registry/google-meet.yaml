- slug: google_meet_update_space
  name: Update Space
  description: |
    Update a meeting space.
  provider: google-meet
  endpoint: /v2/spaces/{space_id}
  method: PATCH
  scopes:
    - https://www.googleapis.com/auth/meetings.space.created
  tags:
    - meet
    - spaces
    - update
  input_schema:
    type: object
    description: Parameters for updating a space
    properties:
      space_id:
        type: string
        description: "Space ID"
      meetingTitle:
        type: string
        description: "New meeting title"
    required:
      - space_id
