- slug: front_more_list_conversations
  name: List Conversations
  description: |
    Retrieve a list of conversations from your Front workspace.
    Supports filtering by status, inbox, and contact.
  provider: front_more
  endpoint: /conversations
  method: GET
  scopes:
    - conversation
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      q:
        type: object
        description: "Query object for filtering"
        properties:
          status:
            type: string
            description: "Filter by status: open, closed, all"
            enum: [open, closed, all]
          inbox_id:
            type: string
            description: "Filter by inbox ID"
          contact_id:
            type: string
            description: "Filter by contact ID"
      page_token:
        type: string
        description: "Pagination token"
      limit:
        type: integer
        description: "Results per page (max 100)"
        default: 25
    required: []

- slug: front_more_get_conversation
  name: Get Conversation
  description: |
    Get details of a specific conversation including messages, metadata, and participants.
  provider: front_more
  endpoint: /conversations/{conversation_id}
  method: GET
  scopes:
    - conversation
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: string
        description: "Conversation ID (path parameter)"
    required:
      - conversation_id

- slug: front_more_create_message
  name: Create Message
  description: |
    Send a message or reply to a conversation in Front.
    Can send via email, chat, or other channels.
  provider: front_more
  endpoint: /messages
  method: POST
  scopes:
    - message
  tags:
    - messages
    - create
  input_schema:
    type: object
    description: Parameters for creating a message
    properties:
      conversation_id:
        type: string
        description: "Conversation ID to reply to"
      type:
        type: string
        description: "Message type: reply, note, or direct"
        enum: [reply, note, direct]
      body:
        type: string
        description: "Message body (HTML or plain text)"
      author_id:
        type: string
        description: "Teammate ID sending the message"
      channel_id:
        type: string
        description: "Channel ID to send through"
      to:
        type: array
        items:
          type: object
        description: "Recipients array with contact_id or email"
    required:
      - conversation_id
      - body

