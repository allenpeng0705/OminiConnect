- slug: posthog_list_events
  name: List Events
  description: |
    Retrieve events from PostHog analytics within a specified date range, including event names, properties, timestamps, and distinct IDs.
    Returns event records for analytics review and user behavior analysis.
  provider: posthog
  endpoint: /api/events
  method: GET
  scopes:
    - ph_api_full_access
  tags:
    - analytics
    - events
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      project_id:
        type: string
        description: "The project ID"
      start_date:
        type: string
        description: "Start date for the query (ISO format)"
      end_date:
        type: string
        description: "End date for the query (ISO format)"
      limit:
        type: integer
        description: "Maximum number of events to return"
    required:
      - project_id

- slug: posthog_get_event
  name: Get Event
  description: |
    Retrieve detailed information for a specific event by its unique identifier, including the full event record with all properties and metadata.
    Returns event data for detailed analysis and debugging.
  provider: posthog
  endpoint: /api/events/{event_id}
  method: GET
  scopes:
    - ph_api_full_access
  tags:
    - analytics
    - events
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      project_id:
        type: string
        description: "The project ID"
      event_id:
        type: string
        description: "The unique identifier of the event"
    required:
      - project_id
      - event_id

- slug: posthog_track_event
  name: Track Event
  description: |
    Record a custom event in PostHog with the specified properties and timestamp for analytics and segmentation purposes.
    Returns confirmation of the tracked event for verification.
  provider: posthog
  endpoint: /api/track
  method: POST
  scopes:
    - ph_api_full_access
  tags:
    - analytics
    - events
  input_schema:
    type: object
    description: Parameters for tracking an event
    properties:
      event:
        type: string
        description: "The event name"
      properties:
        type: object
        description: "Event properties"
      timestamp:
        type: string
        description: "ISO timestamp of the event"
    required:
      - event

