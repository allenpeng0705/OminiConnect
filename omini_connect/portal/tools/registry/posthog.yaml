- slug: posthog_list_events
  name: List Events
  description: |
    List events from PostHog with optional filtering and pagination.
  provider: posthog
  endpoint: /api/events
  method: GET
  scopes:
    - ph_api_full_access
  tags:
    - analytics
    - events
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      project_id:
        type: string
        description: "The project ID"
      start_date:
        type: string
        description: "Start date for the query (ISO format)"
      end_date:
        type: string
        description: "End date for the query (ISO format)"
      limit:
        type: integer
        description: "Maximum number of events to return"
    required:
      - project_id

- slug: posthog_get_event
  name: Get Event
  description: |
    Get details for a specific event by its ID.
  provider: posthog
  endpoint: /api/events/{event_id}
  method: GET
  scopes:
    - ph_api_full_access
  tags:
    - analytics
    - events
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      project_id:
        type: string
        description: "The project ID"
      event_id:
        type: string
        description: "The unique identifier of the event"
    required:
      - project_id
      - event_id

- slug: posthog_track_event
  name: Track Event
  description: |
    Track a custom event.
  provider: posthog
  endpoint: /api/track
  method: POST
  scopes:
    - ph_api_full_access
  tags:
    - analytics
    - events
  input_schema:
    type: object
    description: Parameters for tracking an event
    properties:
      event:
        type: string
        description: "The event name"
      properties:
        type: object
        description: "Event properties"
      timestamp:
        type: string
        description: "ISO timestamp of the event"
    required:
      - event

