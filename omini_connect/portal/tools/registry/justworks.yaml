# Justworks Tools - Allowlist
# Curated subset of Justworks API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. justworks_list_employees    - List employees
# 2. justworks_get_employee     - Get employee details
# 3. justworks_list_companies   - List companies
# 4. justworks_get_company     - Get company details
# 5. justworks_list_payrolls    - List payrolls
# 6. justworks_get_payroll     - Get payroll details
# 7. justworks_list_time_off    - List time off requests
# 8. justworks_get_time_off    - Get time off details
# 9. justworks_list_benefits   - List benefits
# 10. justworks_list_jobs      - List jobs

- slug: justworks_list_employees
  name: List Employees
  description: |
    List all employees in the Justworks organization. Returns employee names, titles, and employment status.
  provider: justworks
  endpoint: /public/v1/employees
  method: GET
  scopes: []
  tags:
    - employees
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: justworks_get_employee
  name: Get Employee
  description: |
    Retrieve details about a specific employee by their ID. Includes title, department, hire date, and compensation information.
  provider: justworks
  endpoint: /public/v1/employees/{employee_id}
  method: GET
  scopes: []
  tags:
    - employees
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employee_id:
        type: integer
        description: "Employee ID"
    required:
      - employee_id

