- slug: justworks_list_time_off
  name: List Time Off Requests
  description: |
    List all time off requests in Justworks. Filter by status and return employee, dates, and request type.
  provider: justworks
  endpoint: /public/v1/time_off_requests
  method: GET
  scopes: []
  tags:
    - time_off
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing time off requests
    properties:
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

