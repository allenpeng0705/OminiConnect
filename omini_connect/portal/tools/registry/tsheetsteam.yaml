# TSheets Tools - Allowlist
# Curated subset of TSheets API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tsheets_list_timesheets           - List all time entries
# # 2. tsheets_get_timesheet           - Get timesheet entry details
# # 3. tsheets_create_timesheet           - Create a new timesheet entry
# # 4. tsheets_update_timesheet           - Update a timesheet entry
# # 5. tsheets_list_employees           - List all employees
# # 6. tsheets_get_employee           - Get employee details
# # 7. tsheets_list_jobs           - List all jobs/projects
# # 8. tsheets_get_job           - Get job details
# # 9. tsheets_list_schedules           - List scheduled shifts
# # 10. tsheets_create_schedule           - Create a scheduled shift

- slug: tsheets_list_timesheets
  name: List Timesheets
  description: |
    List all time entries
  provider: tsheetsteam
  endpoint: /timesheets
  method: GET
  scopes:
    - read
  tags:
    - tsheetsteam
  input_schema:
    type: object
    description: Parameters for list timesheets
    properties: {}
    required: []

- slug: tsheets_get_timesheet
  name: Get Timesheet
  description: |
    Get timesheet entry details
  provider: tsheetsteam
  endpoint: /timesheets/{id}
  method: GET
  scopes:
    - read
  tags:
    - tsheetsteam
  input_schema:
    type: object
    description: Parameters for get timesheet
    properties: {}
    required: []

- slug: tsheets_create_timesheet
  name: Create Timesheet
  description: |
    Create a new timesheet entry
  provider: tsheetsteam
  endpoint: /timesheets
  method: POST
  scopes:
    - write
  tags:
    - tsheetsteam
  input_schema:
    type: object
    description: Parameters for create timesheet
    properties: {}
    required: []

- slug: tsheets_update_timesheet
  name: Update Timesheet
  description: |
    Update a timesheet entry
