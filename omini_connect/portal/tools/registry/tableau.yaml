# Tableau Tools - Allowlist
# Curated subset of the Tableau REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. tableau_list_workbooks      - List workbooks
# 2. tableau_get_workbook         - Get workbook details
# 3. tableau_list_datasources    - List datasources
# 4. tableau_get_datasource      - Get datasource details
# 5. tableau_list_projects       - List projects
# 6. tableau_get_project         - Get project details
# 7. tableau_list_views          - List views
# 8. tableau_get_view            - Get view details
# 9. tableau_list_users          - List users
# 10. tableau_get_user           - Get user details

- slug: tableau_list_workbooks
  name: List Workbooks
  description: |
    List all workbooks the user has access to.
    Filter by site, project, or owner.
  provider: tableau
  endpoint: /api/api-version/workbooks
  method: GET
  scopes:
    - TableauOAuth
  tags:
    - workbooks
    - list
  input_schema:
    type: object
    description: Parameters for listing workbooks
    properties:
      siteId:
        type: string
        description: "Filter by site ID"
      projectId:
        type: string
        description: "Filter by project ID"
      ownerId:
        type: string
        description: "Filter by owner ID"
    required: []

- slug: tableau_get_workbook
  name: Get Workbook
  description: |
    Get detailed information about a specific workbook.
  provider: tableau
  endpoint: /api/api-version/workbooks/{workbookId}
  method: GET
  scopes:
    - TableauOAuth
  tags:
    - workbooks
    - read
  input_schema:
    type: object
    description: Parameters for getting a workbook
    properties:
      workbookId:
        type: string
        description: "Workbook ID"
    required:
      - workbookId

