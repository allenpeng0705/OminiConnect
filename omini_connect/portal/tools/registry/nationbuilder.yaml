# NationBuilder Tools - Allowlist
# Curated subset of NationBuilder CRM API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. nationbuilder_list_people         - List people/contacts
# 2. nationbuilder_get_person           - Get person details
# 3. nationbuilder_list_donations        - List donations
# 4. nationbuilder_list_events          - List events
# 5. nationbuilder_list_petitions       - List petitions
# 6. nationbuilder_list_surveys         - List surveys
# 7. nationbuilder_list_pages          - List website pages
# 8. nationbuilder_list_tags            - List tags
# 9. nationbuilder_list_lists           - List saved lists
# 10. nationbuilder_list_broadcasts      - List broadcasts

- slug: nationbuilder_list_people
  name: List People
  description: |
    List all people and contacts in the CRM.
  provider: nationbuilder
  endpoint: /people
  method: GET
  scopes:
    - people:read
  tags:
    - crm
    - people
    - contacts
  input_schema:
    type: object
    description: Parameters for listing people
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Items per page (default 25, max 100)"
        default: 25
      tag:
        type: string
        description: "Filter by tag slug"
    required: []

- slug: nationbuilder_get_person
  name: Get Person
  description: |
    Get detailed information for a specific person.
  provider: nationbuilder
  endpoint: /people/{id}
  method: GET
  scopes:
    - people:read
  tags:
    - crm
    - people
    - read
  input_schema:
    type: object
    description: Parameters for getting a person
    properties:
      id:
        type: integer
        description: "Person ID"
    required:
      - id

