- slug: nextiva_get_extension
  name: Get Extension
  description: |
    Get detailed information about a specific extension.
    Includes user assignment and features.
  provider: nextiva
  endpoint: /extensions/{extension_id}
  method: GET
  scopes:
    - read
  tags:
    - extensions
    - read
  input_schema:
    type: object
    description: Parameters for getting an extension
    properties:
      extension_id:
        type: string
        description: "Extension ID"
    required:
      - extension_id

- slug: nextiva_create_call
  name: Create Call
  description: |
    Initiate a new outbound call.
    Connect an extension to a phone number.
  provider: nextiva
  endpoint: /calls
  method: POST
  scopes:
    - write
  tags:
    - calls
    - create
  input_schema:
    type: object
    description: Parameters for creating a call
    properties:
      from_extension:
        type: string
        description: "Source extension"
      to_phone_number:
        type: string
        description: "Destination phone number"
    required:
      - from_extension
      - to_phone_number

- slug: nextiva_send_sms
  name: Send SMS
  description: |
    Send an SMS message from a Nextiva extension.
  provider: nextiva
  endpoint: /sms
  method: POST
  scopes:
    - write
  tags:
    - sms
    - send
  input_schema:
    type: object
    description: Parameters for sending SMS
    properties:
      from_extension:
        type: string
        description: "Source extension"
      to_phone_number:
        type: string
        description: "Destination phone number"
      message:
        type: string
        description: "SMS message content"
    required:
      - from_extension
      - to_phone_number
      - message
