- slug: nextiva_list_extensions
  name: List Extensions
  description: |
    List all extensions in Nextiva.
    Returns extension details including user and department.
  provider: nextiva
  endpoint: /extensions
  method: GET
  scopes:
    - read
  tags:
    - extensions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing extensions
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      page_size:
        type: integer
