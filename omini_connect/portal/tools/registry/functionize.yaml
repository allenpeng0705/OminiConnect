# Functionize Tools - Allowlist
# Curated subset of Functionize REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. functionize_list_tests       - List tests
# 2. functionize_get_test         - Get test details
# 3. functionize_create_test      - Create a test
# 4. functionize_run_test         - Run a test
# 5. functionize_list_test_runs   - List test runs
# 6. functionize_get_test_run     - Get test run details
# 7. functionize_list_results     - List results
# 8. functionize_get_result       - Get result details
# 9. functionize_list_suites      - List test suites
# 10. functionize_list_environments - List environments

- slug: functionize_list_tests
  name: List Tests
  description: |
    List all tests in the Functionize account with filtering options.
    Returns test names, IDs, status, and target URLs for each test.
    Use this to discover automated tests and track testing coverage.
  provider: functionize
  endpoint: /api/v1/tests
  method: GET
  scopes:
    - tests:read
  tags:
    - tests
    - list
  input_schema:
    type: object
    description: Parameters for listing tests
    properties:
      projectId:
        type: string
        description: "Filter by project ID"
      suiteId:
        type: string
        description: "Filter by suite ID"
      status:
        type: string
        description: "Filter by status (Active, Disabled)"
    required: []

- slug: functionize_get_test
  name: Get Test
  description: |
    Get detailed information about a test including steps and configuration.
    Returns the complete test data with all associated settings.
    This provides full test data for test management.
  provider: functionize
  endpoint: /api/v1/tests/{testId}
  method: GET
  scopes:
    - tests:read
  tags:
    - tests
    - read
  input_schema:
    type: object
    description: Parameters for getting a test
    properties:
      testId:
        type: string
        description: "Test ID"
    required:
      - testId

- slug: functionize_create_test
  name: Create Test
  description: |
    Create a new test with name, URL, and steps for automated execution.
    Returns the created test with its unique ID and configuration.
    This provisions a new automated test in Functionize.
  provider: functionize
  endpoint: /api/v1/tests
  method: POST
  scopes:
    - tests:write
  tags:
    - tests
    - create
  input_schema:
    type: object
    description: Parameters for creating a test
    properties:
      name:
        type: string
        description: "Test name"
      url:
        type: string
        description: "Target URL"
      steps:
        type: array
        items:
          type: string
        description: "Test steps"
      projectId:
        type: string
        description: "Project ID"
      suiteId:
        type: string
        description: "Suite ID"
    required:
      - name

- slug: functionize_run_test
  name: Run Test
  description: |
    Trigger a test run on a specified environment for automated execution.
    Returns the initiated run with its unique ID and initial status.
    This starts the test immediately on the target environment.
  provider: functionize
  endpoint: /api/v1/tests/{testId}/run
  method: POST
  scopes:
    - tests:execute
  tags:
    - tests
    - execute
  input_schema:
    type: object
    description: Parameters for running a test
    properties:
      testId:
        type: string
        description: "Test ID"
      environmentId:
        type: string
        description: "Environment ID to run against"
    required:
      - testId

- slug: functionize_list_test_runs
  name: List Test Runs
  description: |
    List test run executions with filtering by test, status, and date range.
    Returns run IDs, status, start times, and results for each execution.
    Use this to track test execution history and identify failures.
  provider: functionize
  endpoint: /api/v1/runs
  method: GET
  scopes:
    - runs:read
  tags:
    - test-runs
    - list
  input_schema:
    type: object
    description: Parameters for listing test runs
    properties:
      testId:
        type: string
        description: "Filter by test ID"
      status:
        type: string
        description: "Filter by run status"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: functionize_get_test_run
  name: Get Test Run
  description: |
    Get detailed information about a test run including steps and results.
    Returns the complete run data with all execution details.
    This provides full run data for debugging and analysis.
  provider: functionize
  endpoint: /api/v1/runs/{runId}
  method: GET
  scopes:
    - runs:read
  tags:
    - test-runs
    - read
  input_schema:
    type: object
    description: Parameters for getting a test run
    properties:
      runId:
        type: string
        description: "Test run ID"
    required:
      - runId

- slug: functionize_list_results
  name: List Results
  description: |
    List test results from test runs with filtering by test and status.
    Returns result IDs, pass/fail status, and timestamps for each result.
    Use this to track test outcomes and quality metrics.
  provider: functionize
  endpoint: /api/v1/results
  method: GET
  scopes:
    - results:read
  tags:
    - results
    - list
  input_schema:
    type: object
    description: Parameters for listing results
    properties:
      runId:
        type: string
        description: "Filter by run ID"
      testId:
        type: string
        description: "Filter by test ID"
      status:
        type: string
        description: "Filter by result status (Passed, Failed)"
    required: []

- slug: functionize_get_result
  name: Get Result
  description: |
    Get detailed information about a test result including screenshots and logs.
    Returns the complete result data with all failure details.
    This provides full result data for debugging test failures.
  provider: functionize
  endpoint: /api/v1/results/{resultId}
  method: GET
  scopes:
    - results:read
  tags:
    - results
    - read
  input_schema:
    type: object
    description: Parameters for getting a result
    properties:
      resultId:
        type: string
        description: "Result ID"
    required:
      - resultId

- slug: functionize_list_suites
  name: List Suites
  description: |
    List test suites in the Functionize project for test organization.
    Returns suite names, IDs, and test counts for each suite.
    Use this to discover test suites and organize test execution.
  provider: functionize
  endpoint: /api/v1/suites
  method: GET
  scopes:
    - suites:read
  tags:
    - suites
    - list
  input_schema:
    type: object
    description: Parameters for listing suites
    properties:
      projectId:
        type: string
        description: "Filter by project ID"
    required: []

- slug: functionize_list_environments
  name: List Environments
  description: |
    List test environments configured in Functionize for test execution.
    Returns environment names, IDs, and URLs for each environment.
    Use this to discover available environments for test runs.
  provider: functionize
  endpoint: /api/v1/environments
  method: GET
  scopes:
    - environments:read
  tags:
    - environments
    - list
  input_schema:
    type: object
    description: Parameters for listing environments
    properties: {}
    required: []