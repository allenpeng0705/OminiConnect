# Jamf Pro Basic Auth Tools - Allowlist
# Curated subset of Jamf Pro API for AI agent use.
# Two-step Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jamf_list_computers          - List computers
# 2. jamf_get_computer            - Get computer details
# 3. jamf_list_mobile_devices      - List mobile devices
# 4. jamf_get_mobile_device        - Get mobile device details
# 5. jamf_list_users               - List users
# 6. jamf_get_user                - Get user details
# 7. jamf_list_departments        - List departments
# 8. jamf_list_categories          - List categories
# 9. jamf_list_buildings           - List buildings
# 10. jamf_list_policies           - List policies

- slug: jamf_list_computers
  name: List Computers
  description: |
    List all computers managed by Jamf Pro. Returns computer names, serial numbers, and enrollment status.
  provider: jamf-basic
  endpoint: /JSSResource/computers
  method: GET
  scopes:
    - read
  tags:
    - computers
    - list
  input_schema:
    type: object
    description: Parameters for listing computers
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: jamf_get_computer
  name: Get Computer
  description: |
    Retrieve detailed information about a specific computer by its ID. Includes hardware specifications, installed software, and management status.
  provider: jamf-basic
  endpoint: /JSSResource/computers/id/{id}
  method: GET
  scopes:
    - read
  tags:
    - computers
    - read
  input_schema:
    type: object
    description: Parameters for getting a computer
    properties:
      id:
        type: integer
        description: "Computer ID"
    required:
      - id

