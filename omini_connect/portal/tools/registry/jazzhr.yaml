# JazzHR Tools - Allowlist
# Curated subset of JazzHR API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jazzhr_list_candidates         - List candidates
# 2. jazzhr_get_candidate           - Get candidate details
# 3. jazzhr_list_jobs               - List job postings
# 4. jazzhr_get_job                 - Get job details
# 5. jazzhr_list_users              - List users
# 6. jazzhr_get_user                - Get user details
# 7. jazzhr_list_notes              - List notes
# 8. jazzhr_create_note             - Create a note
# 9. jazzhr_list_activities         - List activities
# 10. jazzhr_list_questionnaires    - List questionnaires

- slug: jazzhr_list_candidates
  name: List Candidates
  description: |
    List all candidates in JazzHR.
  provider: jazzhr
  endpoint: /v1/candidates
  method: GET
  scopes: []
  tags:
    - candidates
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: jazzhr_get_candidate
  name: Get Candidate
  description: |
    Get details for a specific candidate.
  provider: jazzhr
  endpoint: /v1/candidates/{candidate_id}
  method: GET
  scopes: []
  tags:
    - candidates
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      candidate_id:
        type: string
        description: "Candidate ID"
    required:
      - candidate_id

- slug: jazzhr_list_jobs
  name: List Jobs
  description: |
    List all job postings.
  provider: jazzhr
  endpoint: /v1/jobs
  method: GET
  scopes: []
  tags:
    - jobs
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Job status (open, closed, all)"
        default: open
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

