- slug: jazzhr_create_note
  name: Create Note
  description: |
    Create a note on a candidate or job.
  provider: jazzhr
  endpoint: /v1/notes
  method: POST
  scopes: []
  tags:
    - notes
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a note
    properties:
      candidate_id:
        type: string
        description: "Candidate ID"
      job_id:
        type: string
        description: "Job ID"
      body:
        type: string
        description: "Note content"
    required:
