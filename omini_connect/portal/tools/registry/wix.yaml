# Wix Tools - Allowlist
# Curated subset of Wix API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. wix_list_sites        - List all sites
# 2. wix_get_site          - Get site details
# 3. wix_list_pages        - List pages in a site
# 4. wix_get_page          - Get page details
# 5. wix_list_members      - List site members
# 6. wix_get_member        - Get member details
# 7. wix_list_blog_posts   - List blog posts
# 8. wix_get_blog_post     - Get blog post details
# 9. wix_get_site_settings - Get site settings
# 10. wix_update_site_settings - Update site settings

- slug: wix_list_sites
  name: List Sites
  description: |
    List all sites associated with your Wix account.
  provider: wix
  endpoint: /sites
  method: GET
  scopes:
    - site:read
  tags:
    - sites
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing sites
    properties:
      limit:
        type: integer
        description: "Maximum number of sites to return (default 20, max 100)"
      offset:
        type: integer
        description: "Number of sites to skip for pagination"
    required: []

- slug: wix_get_site
  name: Get Site
  description: |
    Get detailed information about a specific Wix site by site ID.
  provider: wix
  endpoint: /sites/{site_id}
  method: GET
  scopes:
    - site:read
  tags:
    - sites
    - read
  input_schema:
    type: object
    description: Parameters for getting a site
    properties:
      site_id:
        type: string
        description: "Unique identifier of the site"
    required:
      - site_id

- slug: wix_list_pages
  name: List Pages
  description: |
    List all pages within a specific Wix site.
  provider: wix
  endpoint: /sites/{site_id}/pages
  method: GET
  scopes:
    - page:read
  tags:
    - pages
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing pages
    properties:
      site_id:
        type: string
        description: "Unique identifier of the site"
    required:
      - site_id

- slug: wix_get_page
  name: Get Page
  description: |
    Get detailed information about a specific page including its hierarchy and settings.
  provider: wix
  endpoint: /sites/{site_id}/pages/{page_id}
  method: GET
  scopes:
    - page:read
  tags:
    - pages
    - read
  input_schema:
    type: object
    description: Parameters for getting a page
    properties:
      site_id:
        type: string
        description: "Unique identifier of the site"
      page_id:
        type: string
        description: "Unique identifier of the page"
    required:
      - site_id
      - page_id

