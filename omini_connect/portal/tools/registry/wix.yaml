- slug: wix_get_site_settings
  name: Get Site Settings
  description: |
    Get global settings and configuration for a Wix site.
  provider: wix
  endpoint: /sites/{site_id}/settings
  method: GET
  scopes:
    - site:read
  tags:
    - settings
    - read
  input_schema:
    type: object
    description: Parameters for getting site settings
    properties:
      site_id:
        type: string
        description: "Unique identifier of the site"
    required:
      - site_id

- slug: wix_update_site_settings
  name: Update Site Settings
  description: |
    Update global settings and configuration for a Wix site.
  provider: wix
  endpoint: /sites/{site_id}/settings
  method: PATCH
  scopes:
    - site:write
  tags:
    - settings
    - update
  input_schema:
    type: object
    description: Parameters for updating site settings
    properties:
      site_id:
        type: string
        description: "Unique identifier of the site"
      site_name:
        type: string
        description: "Updated name for the site"
      language:
        type: string
        description: "Primary language code (e.g., en, es, fr)"
    required:
      - site_id
