- slug: wix_get_blog_post
  name: Get Blog Post
  description: |
    Get detailed content and metadata of a specific blog post.
  provider: wix
  endpoint: /sites/{site_id}/blog/posts/{post_id}
  method: GET
  scopes:
    - blog:read
  tags:
