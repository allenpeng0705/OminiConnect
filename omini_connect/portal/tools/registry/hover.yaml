# Hover Tools - Allowlist
# Curated subset of Hover API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. hover_list_projects          - List projects
# 2. hover_get_project            - Get project details
# 3. hover_list_captures          - List captures
# 4. hover_get_capture            - Get capture details
# 5. hover_list_users             - List users
# 6. hover_get_user               - Get user details
# 7. hover_list_devices           - List devices
# 8. hover_get_device             - Get device details
# 9. hover_list_alerts            - List alerts
# 10. hover_list_locations         - List locations

- slug: hover_list_projects
  name: List Projects
  description: |
    List all projects in Hover.
    Returns project details including name and status.
  provider: hover
  endpoint: /api/v1/projects
  method: GET
  scopes:
    - all
  tags:
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties: {}
    required: []

- slug: hover_get_project
  name: Get Project
  description: |
    Get detailed information about a specific project.
    Includes project details and captures.
  provider: hover
  endpoint: /api/v1/projects/{id}
  method: GET
  scopes:
    - all
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      id:
        type: integer
        description: "Project ID"
    required:
      - id

- slug: hover_list_captures
  name: List Captures
  description: |
