# Wave Accounting Tools - Allowlist
# Curated subset of Wave Accounting API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wave_list_accounts           - List all accounts
# # 2. wave_get_account           - Get account details
# # 3. wave_list_invoices           - List all invoices
# # 4. wave_get_invoice           - Get invoice details
# # 5. wave_create_invoice           - Create a new invoice
# # 6. wave_list_customers           - List all customers
# # 7. wave_get_customer           - Get customer details
# # 8. wave_create_customer           - Create a new customer
# # 9. wave_list_transactions           - List all transactions
# # 10. wave_list_vendors           - List all vendors

- slug: wave_list_accounts
  name: List Accounts
  description: |
    List all accounts
  provider: wave-accounting
  endpoint: /graphql
  method: POST
  scopes:
    - read
  tags:
    - wave-accounting
  input_schema:
    type: object
    description: Parameters for list accounts
    properties: {}
    required: []

