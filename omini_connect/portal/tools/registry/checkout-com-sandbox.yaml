# Checkout.com (Sandbox) Tools - Allowlist
# Curated subset of the Checkout.com Sandbox API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. checkout_com_sandbox_list_payments          - List payments
# 2. checkout_com_sandbox_get_payment           - Get payment details
# 3. checkout_com_sandbox_create_payment        - Create a payment
# 4. checkout_com_sandbox_capture_payment       - Capture a payment
# 5. checkout_com_sandbox_void_payment          - Void a payment
# 6. checkout_com_sandbox_list_refunds          - List refunds
# 7. checkout_com_sandbox_get_refund           - Get refund details
# 8. checkout_com_sandbox_list_chargebacks      - List chargebacks
# 9. checkout_com_sandbox_get_chargeback       - Get chargeback details
# 10. checkout_com_sandbox_list_transactions   - List transactions

- slug: checkout_com_sandbox_list_payments
  name: List Payments
  description: |
    List all payments in sandbox.
  provider: checkout-com-sandbox
  endpoint: /payments
  method: GET
  scopes: []
  tags:
    - payments
    - finance
  input_schema:
    type: object
    description: Parameters for listing payments
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      cursor:
        type: string
        description: "Pagination cursor"
    required: []

- slug: checkout_com_sandbox_get_payment
  name: Get Payment
  description: |
    Get details of a specific payment.
  provider: checkout-com-sandbox
  endpoint: /payments/{id}
  method: GET
  scopes: []
  tags:
    - payments
    - read
  input_schema:
    type: object
    description: Parameters for getting a payment
    properties:
      id:
        type: string
        description: "Payment ID"
    required:
      - id

- slug: checkout_com_sandbox_create_payment
  name: Create Payment
  description: |
    Create a new payment.
  provider: checkout-com-sandbox
  endpoint: /payments
  method: POST
  scopes: []
  tags:
    - payments
    - create
  input_schema:
    type: object
    description: Parameters for creating a payment
    properties:
      amount:
        type: integer
        description: "Amount in minor currency units"
      currency:
        type: string
        description: "Currency code"
      reference:
        type: string
        description: "Payment reference"
    required:
      - amount
      - currency

- slug: checkout_com_sandbox_capture_payment
  name: Capture Payment
  description: |
    Capture an authorized payment.
  provider: checkout-com-sandbox
  endpoint: /payments/{id}/captures
  method: POST
  scopes: []
  tags:
    - payments
    - finance
  input_schema:
    type: object
    description: Parameters for capturing a payment
    properties:
      id:
        type: string
        description: "Payment ID"
      amount:
        type: integer
        description: "Amount to capture"
    required:
      - id

- slug: checkout_com_sandbox_void_payment
  name: Void Payment
  description: |
    Void an authorized payment.
  provider: checkout-com-sandbox
  endpoint: /payments/{id}/voids
