- slug: attio_list_contacts
  name: List Contacts
  description: |
    Retrieve a list of all contacts in your Attio workspace.
  provider: attio
  endpoint: /objects/contacts/records
  method: GET
  scopes:
    - contact:read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Maximum number of contacts to return"
      offset:
        type: integer
        description: "Number of contacts to skip"
      sort:
        type: string
        description: "Sort field and direction (e.g., created_at:desc)"
    required: []

- slug: attio_get_contact
  name: Get Contact
  description: |
    Get details of a specific contact by ID.
  provider: attio
  endpoint: /objects/contacts/records/{id}
  method: GET
  scopes:
    - contact:read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "The contact ID"
    required:
      - id

- slug: attio_create_contact
  name: Create Contact
  description: |
    Create a new contact in your Attio workspace.
  provider: attio
  endpoint: /objects/contacts/records
  method: POST
  scopes:
    - contact:write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      name:
        type: string
        description: "Display name of the contact"
      email:
        type: string
        description: "Email address of the contact"
      phone:
        type: string
        description: "Phone number of the contact"
    required:
      - name

