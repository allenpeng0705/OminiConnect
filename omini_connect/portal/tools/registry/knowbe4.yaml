# KnowBe4 Tools - Allowlist
# Curated subset of KnowBe4 API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. knowbe4_list_users          - List users
# 2. knowbe4_get_user           - Get user details
# 3. knowbe4_list_groups        - List groups
# 4. knowbe4_get_group          - Get group details
# 5. knowbe4_list_campaigns     - List campaigns
# 6. knowbe4_get_campaign       - Get campaign details
# 7. knowbe4_list_policies      - List policies
# 8. knowbe4_list_phishing_tests - List phishing tests
# 9. knowbe4_list_risky_users   - List risky users
# 10. knowbe4_list_remediations  - List remediations

- slug: knowbe4_list_users
  name: List Users
  description: |
    List all users in KnowBe4.
  provider: knowbe4
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: knowbe4_get_user
  name: Get User
  description: |
    Get details for a specific user.
  provider: knowbe4
  endpoint: /v1/users/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: integer
        description: "User ID"
    required:
      - user_id

