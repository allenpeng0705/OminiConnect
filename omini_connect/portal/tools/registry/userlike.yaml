- slug: userlike_list_conversations
  name: List Conversations
  description: |
    Retrieve a list of conversations from your Userlike workspace.
    Supports filtering by state, date range, and operator.
  provider: userlike
  endpoint: /conversations
  method: GET
  scopes:
    - conversations_read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      state:
        type: string
        description: "Filter by state: open, closed, all"
        enum: [open, closed, all]
        default: open
      operator_id:
        type: string
        description: "Filter by operator ID"
      date_from:
        type: string
        description: "Start date in ISO 8601 format"
      date_to:
        type: string
        description: "End date in ISO 8601 format"
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page (max 100)"
        default: 20
    required: []

- slug: userlike_get_conversation
  name: Get Conversation
  description: |
    Get details of a specific conversation including messages, client info, and timeline.
  provider: userlike
  endpoint: /conversations/{conversation_id}
  method: GET
  scopes:
    - conversations_read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: string
        description: "Conversation ID (path parameter)"
    required:
      - conversation_id

- slug: userlike_send_message
  name: Send Message
  description: |
    Send a message to an active conversation.
    Used for responding to clients or sending follow-up messages.
  provider: userlike
  endpoint: /conversations/{conversation_id}/messages
  method: POST
  scopes:
    - conversations_write
  tags:
    - messages
    - create
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      conversation_id:
        type: string
        description: "Conversation ID (path parameter)"
      text:
        type: string
        description: "Message text content"
      channel:
        type: string
        description: "Channel type: chat, messenger, sms"
        enum: [chat, messenger, sms]
    required:
      - conversation_id
      - text

- slug: userlike_list_visitors
  name: List Visitors
  description: |
    Retrieve a list of visitors currently on your website or recently active.
    Shows current page, location, and visit duration.
  provider: userlike
  endpoint: /visitors
  method: GET
  scopes:
    - visitors_read
  tags:
    - visitors
    - read
  input_schema:
    type: object
    description: Parameters for listing visitors
    properties:
      state:
        type: string
        description: "Visitor state: online, offline, all"
        enum: [online, offline, all]
        default: all
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: userlike_get_visitor
