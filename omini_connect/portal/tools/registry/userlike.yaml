- slug: userlike_list_canned_responses
  name: List Canned Responses
  description: |
    Retrieve a list of canned responses (saved replies) in your workspace.
    Canned responses allow quick, consistent answers to common questions.
  provider: userlike
  endpoint: /canned-responses
  method: GET
  scopes:
    - canned_responses_read
  tags:
    - canned_responses
    - read
  input_schema:
    type: object
    description: Parameters for listing canned responses
    properties:
      category:
        type: string
        description: "Filter by category"
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: userlike_get_canned_response
  name: Get Canned Response
  description: |
    Get details of a specific canned response including the full text and usage shortcuts.
  provider: userlike
  endpoint: /canned-responses/{response_id}
  method: GET
  scopes:
    - canned_responses_read
  tags:
    - canned_responses
    - read
  input_schema:
    type: object
    description: Parameters for getting a canned response
    properties:
      response_id:
        type: string
        description: "Canned response ID (path parameter)"
    required:
      - response_id

- slug: userlike_update_availability
  name: Update Availability
  description: |
    Update the availability status of an agent (operator).
    Used to set online/offline status or configure working hours.
  provider: userlike
  endpoint: /operators/{operator_id}/availability
  method: PUT
  scopes:
    - operators_write
  tags:
    - agents
    - update
  input_schema:
    type: object
    description: Parameters for updating availability
    properties:
      operator_id:
        type: string
        description: "Operator/Agent ID (path parameter)"
      status:
        type: string
        description: "Availability status: online, offline, away"
        enum: [online, offline, away]
      working_hours:
        type: object
        description: "Working hours configuration"
        properties:
          timezone:
            type: string
            description: "Timezone (e.g., Europe/Berlin)"
          schedule:
            type: array
            description: "Weekly schedule with start/end times"
    required:
      - operator_id
      - status
