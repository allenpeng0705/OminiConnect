# Sap-concur Tools - Allowlist
# Curated subset of SAP Concur API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. sap-concur_list_expenses              - List all expenses
# 2. sap-concur_get_expense               - Get expense details
# 3. sap-concur_create_expense            - Create an expense
# 4. sap-concur_list_reports              - List expense reports
# 5. sap-concur_get_report                - Get report details
# 6. sap-concur_create_report             - Create an expense report
# 7. sap-concur_submit_report             - Submit a report for approval
# 8. sap-concur_list_users               - List employees
# 9. sap-concur_get_approval_chain        - Get approval chain
# 10. sap-concur_get_policy               - Get expense policy

- slug: sap-concur_list_expenses
  name: List Expenses
  description: |
    Retrieve a list of all expenses.
  provider: sap-concur
  endpoint: /v1/expenses
  method: GET
  scopes:
    - expenses:read
  tags:
    - expenses
    - travel
    - sap-concur
  input_schema:
    type: object
    description: Parameters for listing expenses
    properties:
      limit:
        type: integer
        description: "Number of expenses"
        default: 50
      userId:
        type: string
        description: "Filter by user ID"
    required: []

- slug: sap-concur_get_expense
  name: Get Expense
  description: |
    Get details of a specific expense.
  provider: sap-concur
  endpoint: /v1/expenses/{expenseId}
  method: GET
  scopes:
    - expenses:read
  tags:
    - expenses
    - travel
    - sap-concur
  input_schema:
    type: object
    description: Parameters for getting an expense
    properties:
      expenseId:
        type: string
        description: "The expense ID"
    required:
      - expenseId

- slug: sap-concur_create_expense
  name: Create Expense
  description: |
    Create a new expense entry.
  provider: sap-concur
  endpoint: /v1/expenses
  method: POST
  scopes:
    - expenses:write
  tags:
    - expenses
    - travel
    - sap-concur
    - create
  input_schema:
    type: object
    description: Parameters for creating an expense
    properties:
      expenseType:
        type: string
        description: "Expense type"
      amount:
        type: number
        description: "Expense amount"
      currency:
        type: string
        description: "Currency code"
      description:
        type: string
        description: "Expense description"
      date:
        type: string
        description: "Expense date"
    required:
      - expenseType
      - amount

