  name: Get Server Version
  description: |
    Get Gerrit server version information.
  provider: gerrit
  endpoint: /config/server/version
  method: GET
  scopes:
    - read
  tags:
    - server
    - version
  input_schema:
    type: object
    description: Parameters for getting server version
    properties: {}
