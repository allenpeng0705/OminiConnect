# ServiceNow (Client Credentials) Tools - Allowlist
# Curated subset of ServiceNow (Client Credentials) API for AI agent use.
# Auth mode: OAUTH2_CC.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_incidents                           - List all incidents
# 2. get_incident                             - Get incident details
# 3. create_incident                          - Create a new incident
# 4. list_users                               - List all users
# 5. get_user                                 - Get user details
# 6. list_groups                              - List all groups
# 7. list_kb_articles                         - List knowledge articles
# 8. list_changes                             - List change requests
# 9. get_catalogue                            - Get service catalogue
# 10. get_record                               - Get any table record

- slug: list_incidents
  name: List Incidents
  description: |
    List all incidents in ServiceNow. Returns incident IDs, descriptions, states, priorities, and assigned support team information.
  provider: servicenow-oauth2-cc
  endpoint: /api/now/table/incident
  method: GET
  scopes: []
  tags:
    - incidents
    - ticketing
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_incident
  name: Get Incident
  description: |
    Get detailed information about a specific incident including state, priority, assignment, work notes, and activity history.
  provider: servicenow-oauth2-cc
  endpoint: /api/now/table/incident/{id}
  method: GET
  scopes: []
  tags:
    - incidents
    - ticketing
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_incident
  name: Create Incident
  description: |
    Create a new incident in ServiceNow. Sets the incident description, impact, urgency, and optionally assigns it to a support team.
  provider: servicenow-oauth2-cc
  endpoint: /api/now/table/incident
  method: POST
  scopes: []
  tags:
    - incidents
    - ticketing
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

