- slug: get_record
  name: Get Record
  description: |
    Get any record from a specified ServiceNow table by sys ID. Returns all field values for the requested record.
  provider: servicenow-oauth2-cc
  endpoint: /api/now/table/{table}/{sys_id}
  method: GET
  scopes: []
  tags:
    - records
    - data
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

