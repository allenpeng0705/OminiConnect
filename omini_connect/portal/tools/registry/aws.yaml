# AWS Tools - Allowlist
# Curated subset of the AWS API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# EC2 (2):
# 1. aws_list_ec2_instances    - List EC2 instances
# 2. aws_get_ec2_instance      - Get EC2 instance details
# S3 (3):
# 3. aws_list_s3_buckets       - List S3 buckets
# 4. aws_list_s3_objects       - List objects in a bucket
# 5. aws_get_s3_object         - Get S3 object metadata
# Lambda (2):
# 6. aws_list_lambda_functions - List Lambda functions
# 7. aws_get_lambda_function   - Get Lambda function details
# IAM (2):
# 8. aws_list_iam_users        - List IAM users
# 9. aws_get_iam_user          - Get IAM user details
# RDS (1):
# 10. aws_list_rds_instances   - List RDS instances

- slug: aws_list_ec2_instances
  name: List EC2 Instances
  description: |
    List EC2 instances in the AWS account. Returns instance IDs, types, states, and tags.
    Filter by instance state, tags, or other criteria.
  provider: aws
  endpoint: /ec2/instances
  method: GET
  scopes:
    - ec2:DescribeInstances
  tags:
    - ec2
    - compute
    - list
  input_schema:
    type: object
    description: Parameters for listing EC2 instances
    properties:
      filters:
        type: object
        description: "Filters for instance listing (e.g., instance-state-name: running)"
      max_results:
        type: integer
        description: "Maximum number of instances to return"
        default: 100
    required: []

- slug: aws_get_ec2_instance
  name: Get EC2 Instance
  description: |
    Get detailed information about a specific EC2 instance including state, type, security groups, and networking.
  provider: aws
  endpoint: /ec2/instances/{instance_id}
  method: GET
  scopes:
    - ec2:DescribeInstances
  tags:
    - ec2
    - compute
    - read
  input_schema:
    type: object
    description: Parameters for getting an EC2 instance
    properties:
      instance_id:
        type: string
        description: "EC2 instance ID (required)"
    required:
      - instance_id

- slug: aws_list_s3_buckets
  name: List S3 Buckets
  description: |
    List all S3 buckets owned by the authenticated AWS account.
    Returns bucket names, creation dates, and regional information.
  provider: aws
  endpoint: /
  method: GET
  scopes:
    - s3:ListBuckets
  tags:
    - s3
    - storage
    - list
  input_schema:
    type: object
    description: Parameters for listing S3 buckets
    properties: {}
    required: []

- slug: aws_list_s3_objects
  name: List S3 Objects
  description: |
    List objects in a specified S3 bucket. Returns object keys, sizes, and last modified dates.
    Supports pagination and prefix filtering.
  provider: aws
  endpoint: /{bucket}
  method: GET
  scopes:
    - s3:ListBucket
  tags:
    - s3
    - storage
    - list
  input_schema:
    type: object
    description: Parameters for listing S3 objects
    properties:
      bucket:
        type: string
        description: "S3 bucket name (required)"
      prefix:
        type: string
        description: "Filter objects by prefix"
      max_keys:
        type: integer
        description: "Maximum number of objects to return"
        default: 1000
      continuation_token:
        type: string
        description: "Token for pagination"
    required:
      - bucket

- slug: aws_get_s3_object
  name: Get S3 Object
  description: |
    Retrieve an object from S3. Returns object content, metadata, and version info.
    Use this to read files, configuration, or any stored content.
  provider: aws
  endpoint: /{bucket}/{key}
  method: GET
  scopes:
    - s3:GetObject
  tags:
    - s3
    - storage
    - read
  input_schema:
    type: object
    description: Parameters for getting an S3 object
    properties:
      bucket:
        type: string
        description: "S3 bucket name (required)"
      key:
        type: string
        description: "Object key/path (required)"
      version_id:
        type: string
        description: "Specific version ID of the object"
    required:
      - bucket
      - key

- slug: aws_list_lambda_functions
  name: List Lambda Functions
  description: |
    List all Lambda functions in the AWS account. Returns function names, ARNs, runtimes, and memory configurations.
  provider: aws
  endpoint: /lambda/functions
  method: GET
  scopes:
    - lambda:ListFunctions
  tags:
    - lambda
    - serverless
    - list
  input_schema:
    type: object
    description: Parameters for listing Lambda functions
    properties:
      max_items:
        type: integer
        description: "Maximum number of functions to return"
        default: 100
      marker:
        type: string
        description: "Pagination token"
    required: []

- slug: aws_get_lambda_function
  name: Get Lambda Function
  description: |
    Get configuration details of a Lambda function including runtime, handler, environment variables, and resource usage.
  provider: aws
  endpoint: /lambda/functions/{function_name}
  method: GET
  scopes:
    - lambda:GetFunction
  tags:
    - lambda
    - serverless
    - read
  input_schema:
    type: object
    description: Parameters for getting a Lambda function
    properties:
      function_name:
        type: string
        description: "Lambda function name or ARN (required)"
    required:
      - function_name

- slug: aws_list_iam_users
  name: List IAM Users
  description: |
    List all IAM users in the AWS account. Returns user names, IDs, creation dates, and last activity.
  provider: aws
  endpoint: /iam/users
  method: GET
  scopes:
    - iam:ListUsers
  tags:
    - iam
    - identity
    - list
  input_schema:
    type: object
    description: Parameters for listing IAM users
    properties:
      max_items:
        type: integer
        description: "Maximum number of users to return"
        default: 100
      marker:
        type: string
        description: "Pagination token"
    required: []

- slug: aws_get_iam_user
  name: Get IAM User
  description: |
    Get details about a specific IAM user including policies, groups, and access keys.
  provider: aws
  endpoint: /iam/users/{user_name}
  method: GET
  scopes:
    - iam:GetUser
  tags:
    - iam
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for getting an IAM user
    properties:
      user_name:
        type: string
        description: "IAM username (required)"
    required:
      - user_name

- slug: aws_list_rds_instances
  name: List RDS Instances
  description: |
    List all RDS database instances in the AWS account. Returns instance identifiers, engines, states, and configurations.
  provider: aws
  endpoint: /rds/instances
  method: GET
  scopes:
    - rds:DescribeDBInstances
  tags:
    - rds
    - database
    - list
  input_schema:
    type: object
    description: Parameters for listing RDS instances
    properties:
      region:
        type: string
        description: "AWS region"
      max_records:
        type: integer
        description: "Maximum number of instances to return"
        default: 100
    required: []