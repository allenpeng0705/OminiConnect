# EvaluAgent Tools - Allowlist
# Curated subset of EvaluAgent API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. evaluagent_list_audits           - List audits
# 2. evaluagent_get_audit            - Get audit details
# 3. evaluagent_list_conversations   - List conversations
# 4. evaluagent_get_conversation     - Get conversation details
# 5. evaluagent_list_agents          - List agents
# 6. evaluagent_get_agent            - Get agent details
# 7. evaluagent_list_teams           - List teams
# 8. evaluagent_get_quality_score    - Get quality score
# 9. evaluagent_list_calibrations    - List calibrations
# 10. evaluagent_get_calibration     - Get calibration details

- slug: evaluagent_list_audits
  name: List Audits
  description: |
    List all quality assurance audits in the EvaluAgent system with optional pagination. Returns audit IDs, dates, evaluated agent names, and overall quality scores.
  provider: evaluagent
  endpoint: /v1/audits
  method: GET
  scopes: []
  tags:
    - audits
    - quality
    - read
  input_schema:
    type: object
    description: Parameters for listing audits
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: evaluagent_get_audit
  name: Get Audit
  description: |
    Retrieve detailed information about a specific EvaluAgent audit including evaluation criteria, individual scores, feedback notes, and agent performance summary.
  provider: evaluagent
  endpoint: /v1/audits/{id}
  method: GET
  scopes: []
  tags:
    - audits
    - quality
    - read
  input_schema:
    type: object
    description: Parameters for getting audit
    properties:
      id:
        type: string
        description: "Audit ID"
    required:
      - id

- slug: evaluagent_list_conversations
  name: List Conversations
  description: |
    List customer service conversations in EvaluAgent with optional filtering by agent or team. Returns conversation IDs, timestamps, duration, and participant information.
  provider: evaluagent
  endpoint: /v1/conversations
  method: GET
  scopes: []
  tags:
    - conversations
    - calls
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      agent_id:
        type: string
        description: "Filter by agent ID"
      team_id:
        type: string
        description: "Filter by team ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: evaluagent_get_conversation
  name: Get Conversation
