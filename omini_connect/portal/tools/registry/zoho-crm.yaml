# Zoho CRM Tools - Allowlist
# Curated subset of Zoho CRM API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_crm_list_contacts           - List all contacts
# # 2. zoho_crm_get_contact           - Get contact details
# # 3. zoho_crm_create_contact           - Create a new contact
# # 4. zoho_crm_update_contact           - Update a contact
# # 5. zoho_crm_list_deals           - List all deals
# # 6. zoho_crm_get_deal           - Get deal details
# # 7. zoho_crm_create_deal           - Create a new deal
# # 8. zoho_crm_list_tasks           - List all tasks
# # 9. zoho_crm_create_task           - Create a new task
# # 10. zoho_crm_list_activities           - List all activities

- slug: zoho_crm_list_contacts
  name: List Contacts
  description: |
    List all contacts
  provider: zoho-crm
  endpoint: /crm/v2.1/contacts
  method: GET
  scopes:
    - read
  tags:
    - zoho-crm
  input_schema:
    type: object
    description: Parameters for list contacts
    properties: {}
    required: []

