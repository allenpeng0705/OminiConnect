  method: GET
  scopes:
    - events:r
  tags:
    - events
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      calendar_id:
        type: string
        description: "Filter by calendar ID"
      from_date:
        type: string
        description: "From date (YYYY-MM-DD)"
      to_date:
        type: string
        description: "To date (YYYY-MM-DD)"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []