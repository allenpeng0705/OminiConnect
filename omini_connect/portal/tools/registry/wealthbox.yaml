# Wealthbox Tools - Allowlist
# Curated subset of Wealthbox CRM API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. wealthbox_list_contacts    - List all contacts
# 2. wealthbox_get_contact      - Get contact details
# 3. wealthbox_create_contact   - Create a new contact
# 4. wealthbox_list_activities  - List all activities
# 5. wealthbox_get_activity    - Get activity details
# 6. wealthbox_list_projects   - List all projects
# 7. wealthbox_get_project     - Get project details
# 8. wealthbox_list_tasks      - List all tasks
# 9. wealthbox_get_task        - Get task details
# 10. wealthbox_list_events    - List all events

- slug: wealthbox_list_contacts
  name: List Contacts
  description: |
    List all contacts in Wealthbox CRM.
    Filter by name, email, tag, or company.
  provider: wealthbox
  endpoint: /contacts
  method: GET
  scopes:
    - contacts:r
  tags:
    - contacts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      search:
        type: string
        description: "Search by name, email, or company"
      tag:
        type: string
        description: "Filter by tag"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: wealthbox_get_contact
  name: Get Contact
  description: |
    Get detailed information about a specific Wealthbox contact.
  provider: wealthbox
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contacts:r
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: wealthbox_create_contact
  name: Create Contact
  description: |
    Create a new contact in Wealthbox CRM.
    Set name, email, phone, company, and tags.
  provider: wealthbox
  endpoint: /contacts
  method: POST
  scopes:
    - contacts:w
  tags:
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company:
        type: string
        description: "Company name"
      tags:
        type: array
        items:
          type: string
        description: "Tags to assign"
    required:
      - first_name
      - last_name

