# Lightspeed Retail Tools - Allowlist
# Curated subset of Lightspeed Retail API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lightspeed_retail_list_customers    - List customers
# 2. lightspeed_retail_get_customer      - Get customer details
# 3. lightspeed_retail_list_sales        - List sales
# 4. lightspeed_retail_get_sale          - Get sale details
# 5. lightspeed_retail_list_items        - List items
# 6. lightspeed_retail_get_item         - Get item details
# 7. lightspeed_retail_list_locations    - List locations
# 8. lightspeed_retail_get_location     - Get location details
# 9. lightspeed_retail_list_employees   - List employees
# 10. lightspeed_retail_get_employee   - Get employee details

- slug: lightspeed_retail_list_customers
  name: List Customers
  description: |
    List all customers in your Lightspeed Retail account with pagination. Returns customer names, email addresses, phone numbers, and total purchase amounts.
  provider: lightspeed-retail
  endpoint: /customer.json
  method: GET
  scopes: []
  tags:
    - customers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: lightspeed_retail_get_customer
  name: Get Customer
  description: |
    Retrieve detailed information about a specific Lightspeed Retail customer by their ID. Returns the customer's contact info, purchase history, and reward points balance.
  provider: lightspeed-retail
  endpoint: /customer/{customer_id}.json
  method: GET
  scopes: []
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: integer
        description: "Customer ID"
    required:
      - customer_id

