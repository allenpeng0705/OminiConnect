- slug: pipedream_list_events
  name: List Events
  description: |
    List all events from a specified source or workflow including event IDs, timestamps, payloads, and processing status values. Returns event data for debugging and analytics.
  provider: pipedream
  endpoint: /v1/events
  method: GET
  scopes: []
  tags:
    - events
    - list
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      sourceId:
        type: string
        description: "Filter by source ID"
      workflowId:
        type: string
        description: "Filter by workflow ID"
    required: []

- slug: pipedream_get_event
  name: Get Event
