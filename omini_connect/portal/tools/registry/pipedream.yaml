# Pipedream Tools - Allowlist
# Curated subset of Pipedream API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pipedream_list_sources          - List event sources
# 2. pipedream_get_source            - Get source details
# 3. pipedream_list_workflows        - List workflows
# 4. pipedream_get_workflow          - Get workflow details
# 5. pipedream_list_keys             - List API keys
# 6. pipedream_get_user              - Get user info
# 7. pipedream_list_events           - List events
# 8. pipedream_get_event            - Get event details
# 9. pipedream_list_connections      - List connections
# 10. pipedream_get_account          - Get account info

- slug: pipedream_list_sources
  name: List Sources
  description: |
    List all event sources including their names, types, status values, and event emission counts. Returns source listings for monitoring data ingestion and trigger configuration.
  provider: pipedream
  endpoint: /v1/sources
  method: GET
  scopes: []
  tags:
    - sources
    - events
    - list
  input_schema:
    type: object
    description: Parameters for listing sources
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: pipedream_get_source
  name: Get Source
  description: |
    Get detailed information for a specific source including its configuration, current status, and recent event logs. Returns source data for debugging and monitoring.
  provider: pipedream
  endpoint: /v1/sources/{sourceId}
  method: GET
  scopes: []
  tags:
    - sources
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting a source
    properties:
      sourceId:
        type: string
        description: "Source ID"
    required:
      - sourceId

- slug: pipedream_list_workflows
  name: List Workflows
  description: |
    List all workflows including their names, statuses, trigger types, and execution counts. Returns workflow listings for automation management and monitoring.
  provider: pipedream
  endpoint: /v1/workflows
  method: GET
  scopes: []
  tags:
    - workflows
    - automation
    - list
  input_schema:
    type: object
    description: Parameters for listing workflows
    properties:
