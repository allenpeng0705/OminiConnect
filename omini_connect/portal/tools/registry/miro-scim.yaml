# Miro SCIM Tools - Allowlist
# Curated subset of Miro SCIM API for AI agent use.
# API_KEY via Nango (SCIM token).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. miro_scim_list_users       - List all users (SCIM)
# 2. miro_scim_get_user        - Get user details (SCIM)
# 3. miro_scim_create_user     - Create a new user (SCIM)
# 4. miro_scim_update_user     - Update a user (SCIM)
# 5. miro_scim_delete_user     - Delete a user (SCIM)
# 6. miro_scim_list_teams      - List all teams (SCIM)
# 7. miro_scim_get_team        - Get team details (SCIM)
# 8. miro_scim_create_team     - Create a team (SCIM)
# 9. miro_scim_update_team     - Update a team (SCIM)
# 10. miro_scim_delete_team   - Delete a team (SCIM)

- slug: miro_scim_list_users
  name: List Users (SCIM)
  description: |
    List all user accounts in Miro via SCIM API.
    Supports filtering and pagination.
  provider: miro-scim
  endpoint: /v1/scim/Users
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM users
    properties:
      filter:
        type: string
        description: "Filter expression (e.g., userName eq 'john@example.com')"
      startIndex:
        type: integer
        description: "Starting index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results to return"
        default: 100
    required: []

- slug: miro_scim_get_user
  name: Get User (SCIM)
  description: |
    Get detailed information about a specific user via SCIM API.
  provider: miro-scim
  endpoint: /v1/scim/Users/{id}
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

- slug: miro_scim_create_user
  name: Create User (SCIM)
  description: |
    Create a new user account in Miro via SCIM API.
  provider: miro-scim
  endpoint: /v1/scim/Users
  method: POST
  scopes: []
  tags:
    - scim
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      emails:
        type: array
        description: "Email addresses"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName

- slug: miro_scim_update_user
  name: Update User (SCIM)
  description: |
    Update an existing user account via SCIM API.
  provider: miro-scim
  endpoint: /v1/scim/Users/{id}
  method: PUT
  scopes: []
  tags:
    - scim
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      active:
        type: boolean
        description: "Whether user is active"
    required:
      - id

- slug: miro_scim_delete_user
  name: Delete User (SCIM)
  description: |
    Delete a user account via SCIM API.
  provider: miro-scim
  endpoint: /v1/scim/Users/{id}
  method: DELETE
  scopes: []
  tags:
    - scim
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

