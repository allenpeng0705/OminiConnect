- slug: upsun_list_deployments
  name: List Deployments
  description: |
    List all deployments for an Upsun environment. Returns deployment IDs, statuses, commit information, and deployment times.
  provider: upsun
  endpoint: /projects/{projectId}/environments/{environmentId}/deployments
  method: GET
  scopes:
    - deployments:read
  tags:
    - deployments
  input_schema:
    type: object
    description: Parameters for listing deployments
    properties:
      projectId:
        type: string
        description: "Project ID"
      environmentId:
        type: string
        description: "Environment ID"
      limit:
        type: integer
        description: "Maximum number of deployments to return"
    required:
      - projectId
      - environmentId

