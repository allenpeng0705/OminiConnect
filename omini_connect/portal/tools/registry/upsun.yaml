- slug: upsun_list_projects
  name: List Projects
  description: |
    List all projects in the Upsun account. Returns project names, IDs, regions, and subscription plans.
  provider: upsun
  endpoint: /projects
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      limit:
        type: integer
        description: "Maximum number of projects to return"
      offset:
        type: integer
        description: "Offset for pagination"
    required: []

- slug: upsun_get_project
  name: Get Project
  description: |
    Retrieve detailed information for a specific project including environments, subscription details, and repository configuration.
  provider: upsun
  endpoint: /projects/{projectId}
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      projectId:
        type: string
        description: "The ID of the project"
    required:
      - projectId

- slug: upsun_create_project
  name: Create Project
  description: |
    Create a new project on Upsun with the specified region, title, and repository configuration.
  provider: upsun
  endpoint: /projects
  method: POST
  scopes:
    - projects:write
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      region:
        type: string
        description: "Region (e.g., us-2.platform.sh, eu-2.platform.sh)"
      title:
        type: string
        description: "Project title"
      repository:
        type: string
        description: "Git repository URL"
      plan:
        type: string
        description: "Plan tier (development, standard, performance)"
    required:
      - region
      - title

- slug: upsun_list_apps
  name: List Apps
  description: |
    List all applications in an Upsun project. Returns application names, URLs, build statuses, and environment configurations.
  provider: upsun
  endpoint: /projects/{projectId}/apps
  method: GET
  scopes:
    - apps:read
  tags:
    - apps
  input_schema:
    type: object
    description: Parameters for listing apps
    properties:
      projectId:
        type: string
        description: "Project ID"
    required:
