- slug: upsun_get_app
  name: Get App
  description: |
    Retrieve detailed information for a specific application including routes, environment variables, and deployment configuration.
  provider: upsun
  endpoint: /projects/{projectId}/apps/{appId}
  method: GET
  scopes:
    - apps:read
  tags:
    - apps
  input_schema:
    type: object
    description: Parameters for getting an app
    properties:
      projectId:
        type: string
        description: "Project ID"
      appId:
        type: string
        description: "Application ID"
    required:
      - projectId
      - appId

