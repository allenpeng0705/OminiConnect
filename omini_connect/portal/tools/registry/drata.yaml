# Drata Tools - Allowlist
# Curated subset of the Drata API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. drata_list_devices                - List devices
# 2. drata_get_device                - Get device details
# 3. drata_list_users                 - List users
# 4. drata_get_user                   - Get user details
# 5. drata_list_evidence              - List evidence
# 6. drata_get_evidence               - Get evidence details
# 7. drata_list_controls              - List controls
# 8. drata_get_control                - Get control details
# 9. drata_list_policies              - List policies
# 10. drata_get_policy                - Get policy details

- slug: drata_list_devices
  name: List Devices
  description: |
    List all devices in Drata.
  provider: drata
  endpoint: /v1/devices
  method: GET
  scopes: []
  tags:
    - devices
    - compliance
    - list
  input_schema:
    type: object
    description: Parameters for listing devices
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      status:
        type: string
        description: "Filter by status: healthy, needs_attention, critical"
    required: []

- slug: drata_get_device
  name: Get Device
  description: |
    Get details of a specific device.
  provider: drata
  endpoint: /v1/devices/{device_id}
  method: GET
  scopes: []
  tags:
    - devices
    - compliance
    - read
  input_schema:
    type: object
    description: Parameters for getting a device
    properties:
      device_id:
        type: string
        description: "Device ID"
    required:
      - device_id

