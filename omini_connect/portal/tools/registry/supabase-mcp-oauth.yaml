# Supabase (MCP OAuth) Tools - Allowlist
# Curated subset of Supabase (MCP OAuth) API for AI agent use.
# Auth mode: MCP_OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_projects                            - List all projects
# 2. get_project                              - Get project details
# 3. query_table                              - Query a database table
# 4. insert_rows                              - Insert rows into table
# 5. update_rows                              - Update rows in table
# 6. delete_rows                              - Delete rows from table
# 7. list_functions                           - List edge functions
# 8. invoke_function                          - Invoke edge function
# 9. get_storageBuckets                       - List storage buckets
# 10. upload_file                              - Upload file to storage

- slug: list_projects
  name: List Projects
  description: |
    List all projects
  provider: supabase-mcp-oauth
  endpoint: /projects
  method: GET
  scopes: []
  tags:
    - projects
    - config
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_project
  name: Get Project
  description: |
    Get project details
  provider: supabase-mcp-oauth
  endpoint: /projects/{ref}
  method: GET
  scopes: []
  tags:
    - projects
    - config
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

