# BrightCrowd Tools - Allowlist
# Curated subset of BrightCrowd API for AI agent use.
# OAuth2_CC via Nango (Client Credentials).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. brightcrowd_list_organizations  - List organizations
# 2. brightcrowd_get_organization   - Get organization details
# 3. brightcrowd_list_members        - List organization members
# 4. brightcrowd_get_member         - Get member details
# 5. brightcrowd_list_badges        - List badges
# 6. brightcrowd_get_badge         - Get badge details
# 7. brightcrowd_list_endorsements - List endorsements
# 8. brightcrowd_get_endorsement   - Get endorsement details
# 9. brightcrowd_list_activities   - List activities
# 10. brightcrowd_get_insights     - Get organization insights

- slug: brightcrowd_list_organizations
  name: List Organizations
  description: |
    List all organizations in BrightCrowd.
  provider: brightcrowd
  endpoint: /partner/organizations
  method: GET
  scopes: []
  tags:
    - organizations
    - directory
  input_schema:
    type: object
    description: Parameters for listing organizations
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Organizations per page"
        default: 20
    required: []

- slug: brightcrowd_get_organization
  name: Get Organization
  description: |
    Get details for a specific organization.
  provider: brightcrowd
  endpoint: /partner/organizations/{orgId}
  method: GET
  scopes: []
  tags:
    - organizations
    - read
  input_schema:
    type: object
    description: Parameters for getting an organization
    properties:
      orgId:
        type: string
        description: "Organization ID"
    required:
      - orgId

