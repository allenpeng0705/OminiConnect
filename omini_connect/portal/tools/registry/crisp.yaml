# Crisp Tools - Customer Messaging
# Tools for managing conversations, visitors, contacts, operators, and websites.

# === TOOL LIST ===
# 1. crisp_list_conversations      - List conversations
# 2. crisp_get_conversation        - Get a specific conversation
# 3. crisp_send_message           - Send a message
# 4. crisp_list_visitors          - List visitors
# 5. crisp_get_visitor            - Get a specific visitor
# 6. crisp_list_contacts         - List contacts
# 7. crisp_get_contact           - Get a specific contact
# 8. crisp_list_operators        - List operators
# 9. crisp_get_operator          - Get a specific operator
# 10. crisp_get_website          - Get website settings

- slug: crisp_list_conversations
  name: List Conversations
  description: |
    List all conversations in your Crisp workspace, returning conversation IDs, status, participants, and latest message preview.
    Supports filtering by status (open, closed, all) with pagination.
  provider: crisp
  endpoint: /conversations
  method: GET
  scopes:
    - conversation_read
  tags:
    - conversations
    - messaging
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, all (default open)"
        enum: [open, closed, all]
        default: open
      limit:
        type: integer
        description: "Results per page (default 25)"
        default: 25
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: crisp_get_conversation
  name: Get Conversation
  description: |
    Get detailed information for a specific Crisp conversation including all messages, timeline, and metadata.
  provider: crisp
  endpoint: /conversations/{id}
  method: GET
  scopes:
    - conversation_read
  tags:
    - conversations
    - messaging
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      id:
        type: string
        description: "Conversation ID (path parameter)"
    required:
      - id

- slug: crisp_send_message
  name: Send Message
  description: |
    Send a message in a Crisp conversation, either to respond to customers or proactively reach out to contacts.
  provider: crisp
  endpoint: /conversations/{id}/messages
  method: POST
  scopes:
    - conversation_write
  tags:
    - messages
    - messaging
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      id:
        type: string
        description: "Conversation ID (path parameter)"
      message:
        type: string
        description: "Message content (required)"
      type:
        type: string
        description: "Message type: text, file (default text)"
        enum: [text, file]
        default: text
    required:
      - id
      - message

