- slug: domo_list_datasets
  name: List Datasets
  description: |
    Retrieve all datasets in the Domo instance.
  provider: domo
  endpoint: /v1/datasets
  method: GET
  scopes:
    - read
  tags:
    - datasets
  input_schema:
    type: object
    description: Parameters for listing datasets
    properties:
      limit:
        type: integer
        description: "Maximum number of datasets to return"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
      sort:
        type: string
        description: "Sort field"
      ascending:
        type: boolean
        description: "Sort in ascending order"

- slug: domo_get_dataset
  name: Get Dataset
  description: |
    Get metadata for a specific dataset by ID.
  provider: domo
  endpoint: /v1/datasets/{id}
  method: GET
  scopes:
    - read
  tags:
    - datasets
  input_schema:
    type: object
    description: Parameters for getting a dataset
    properties:
      id:
        type: string
        description: "The dataset ID"
    required:
      - id

- slug: domo_create_dataset
  name: Create Dataset
  description: |
    Create a new dataset with specified schema.
  provider: domo
  endpoint: /v1/datasets
  method: POST
  scopes:
    - write
  tags:
    - datasets
  input_schema:
    type: object
    description: Parameters for creating a dataset
    properties:
      name:
        type: string
        description: "Dataset name"
      description:
        type: string
        description: "Dataset description"
      schema:
        type: object
        description: "Column definitions"
      rows:
        type: integer
        description: "Initial number of rows"
    required:
      - name

