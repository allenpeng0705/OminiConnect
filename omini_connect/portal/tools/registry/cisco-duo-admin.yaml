# Cisco Duo Admin API Tools - Allowlist
# Curated subset of the Cisco Duo Admin API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cisco_duo_list_users                - List users
# 2. cisco_duo_get_user                 - Get user details
# 3. cisco_duo_create_user              - Create a user
# 4. cisco_duo_delete_user              - Delete a user
# 5. cisco_duo_list_phones              - List phones
# 6. cisco_duo_get_phone               - Get phone details
# 7. cisco_duo_list_auth_logs           - List authentication logs
# 8. cisco_duo_list_administrators      - List administrators
# 9. cisco_duo_get_auth_log_entry      - Get authentication log entry
# 10. cisco_duo_list_directory_users   - List directory users

- slug: cisco_duo_list_users
  name: List Users
  description: |
    List all users in the Cisco Duo directory, returning user IDs, usernames, email addresses, and activation status.
  provider: cisco-duo-admin
  endpoint: /admin/v1/users
  method: GET
  scopes: []
  tags:
    - users
    - security
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: cisco_duo_get_user
  name: Get User
  description: |
    Retrieve details of a specific Cisco Duo user including username, email, phone, and authentication status.
  provider: cisco-duo-admin
  endpoint: /admin/v1/users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: cisco_duo_create_user
  name: Create User
  description: |
    Create a new user in Cisco Duo with username, real name, and email address, returning the created user ID.
  provider: cisco-duo-admin
  endpoint: /admin/v1/users
  method: POST
  scopes: []
  tags:
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      username:
        type: string
        description: "Username"
      realname:
        type: string
        description: "Real name"
      email:
        type: string
        description: "Email address"
    required:
      - username

- slug: cisco_duo_delete_user
  name: Delete User
  description: |
    Remove a user from Cisco Duo directory, deleting their account, authentication methods, and associated settings.
  provider: cisco-duo-admin
  endpoint: /admin/v1/users/{id}
  method: DELETE
  scopes: []
  tags:
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

