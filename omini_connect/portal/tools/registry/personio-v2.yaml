# Personio v2 Tools - Allowlist
# Curated subset of Personio v2 API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.
# NOTE: personio-v2 uses the same API endpoints as personio - only version is different.

# === TOOL LIST ===
# 1. personio_v2_list_employees            - List employees
# 2. personio_v2_get_employee             - Get employee details
# 3. personio_v2_list_absences            - List absences
# 4. personio_v2_get_absence             - Get absence details
# 5. personio_v2_list_attendances         - List attendances
# 6. personio_v2_get_attendance          - Get attendance details
# 7. personio_v2_list_contracts           - List contracts
# 8. personio_v2_get_contract            - Get contract details
# 9. personio_v2_list_departments        - List departments
# 10. personio_v2_get_company            - Get company information

- slug: personio_v2_list_employees
  name: List Employees
  description: |
    List all employees in the organization, including names, email addresses, departments, positions, and employment status values.
  provider: personio-v2
  endpoint: /v2/employees
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      departmentId:
        type: string
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: personio_v2_get_employee
  name: Get Employee
  description: |
    Retrieve detailed information about a specific employee, including their profile, contact details, department, position, and employment contract.
  provider: personio-v2
  endpoint: /v2/employees/{employeeId}
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

- slug: personio_v2_list_absences
  name: List Absences
  description: |
    List all absences in the organization, including employee names, absence types, start and end dates, and approval status values.
  provider: personio-v2
  endpoint: /v2/absences
  method: GET
  scopes: []
  tags:
    - absences
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing absences
    properties:
      employeeId:
        type: string
        description: "Filter by employee ID"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: personio_v2_get_absence
