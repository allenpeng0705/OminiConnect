    - notifications
    - list
  input_schema:
    type: object
    description: Parameters for listing webhooks
    properties: {}
    required: []

- slug: paypal_sandbox_get_user_info
  name: Get User Info
  description: |
    Retrieve the authenticated user's profile information including name, email, and account details.
  provider: paypal-sandbox
  endpoint: /v1/identity/oauth2/userinfo
  method: GET
  scopes:
    - openid
  tags:
    - user
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for getting user info
    properties: {}
    required: []
