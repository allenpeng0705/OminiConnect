# PayPal Sandbox Tools - Allowlist
# Curated subset of PayPal Sandbox API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. paypal_sandbox_list_payments         - List payments
# 2. paypal_sandbox_get_payment           - Get payment details
# 3. paypal_sandbox_list_payouts          - List payouts
# 4. paypal_sandbox_get_payout            - Get payout details
# 5. paypal_sandbox_list_invoices         - List invoices
# 6. paypal_sandbox_get_invoice           - Get invoice details
# 7. paypal_sandbox_list_subscriptions    - List subscriptions
# 8. paypal_sandbox_get_subscription      - Get subscription details
# 9. paypal_sandbox_list_webhooks         - List webhooks
# 10. paypal_sandbox_get_user_info        - Get user information

- slug: paypal_sandbox_list_payments
  name: List Payments
  description: |
    List all payments processed in the PayPal Sandbox environment, including transaction status, amounts, and payer details.
  provider: paypal-sandbox
  endpoint: /v1/payments/payments
  method: GET
  scopes:
    - https://api-m.sandbox.paypal.com/v1/payments/.*
  tags:
    - payments
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payments
    properties:
      status:
        type: string
        description: "Filter by status (approved, failed, etc.)"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: paypal_sandbox_get_payment
  name: Get Payment
  description: |
    Retrieve detailed information about a specific payment including its status, amount, currency, and payer information.
  provider: paypal-sandbox
  endpoint: /v1/payments/payments/{paymentId}
  method: GET
  scopes:
    - https://api-m.sandbox.paypal.com/v1/payments/.*
  tags:
    - payments
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payment
    properties:
      paymentId:
        type: string
        description: "Payment ID"
    required:
      - paymentId

- slug: paypal_sandbox_list_payouts
  name: List Payouts
  description: |
    List all payout batches in the PayPal Sandbox, including status, amount, and recipient information.
  provider: paypal-sandbox
  endpoint: /v1/payouts
  method: GET
  scopes:
    - https://uri.paypal.com/payments/payouts
  tags:
    - payouts
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payouts
    properties:
      status:
        type: string
        description: "Filter by status (pending, success, failed)"
    required: []

- slug: paypal_sandbox_get_payout
  name: Get Payout
  description: |
    Retrieve detailed information about a specific payout batch including its status, amount, and item-level details.
  provider: paypal-sandbox
  endpoint: /v1/payouts/{payoutBatchId}
  method: GET
  scopes:
    - https://uri.paypal.com/payments/payouts
  tags:
    - payouts
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payout
    properties:
      payoutBatchId:
        type: string
        description: "Payout batch ID"
    required:
      - payoutBatchId

