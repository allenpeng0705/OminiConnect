# WhiteSource Tools - Allowlist
# Curated subset of WhiteSource REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. whitesource_list_projects              - List all projects
# 2. whitesource_get_project               - Get project details
# 3. whitesource_list_licenses             - List licenses
# 4. whitesource_get_license               - Get license details
# 5. whitesource_list_vulnerabilities      - List vulnerabilities
# 6. whitesource_get_vulnerability        - Get vulnerability details
# 7. whitesource_get_license_report        - Get license report
# 8. whitesource_get_vulnerability_report  - Get vulnerability report
# 9. whitesource_list_alerts               - List alerts
# 10. whitesource_get_alert                - Get alert details

- slug: whitesource_list_projects
  name: List Projects
  description: |
    Retrieve all projects in the WhiteSource organization.
  provider: whitesource
  endpoint: /api/v1/projects
  method: GET
  scopes:
    - whitesource_read
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for listing WhiteSource projects
    properties:
      org_token:
        type: string
        description: "The WhiteSource organization API token"
      product_ids:
        type: array
        items:
          type: string
        description: "Filter by product IDs"
      project_ids:
        type: array
        items:
          type: string
        description: "Filter by project IDs"
    required:
      - org_token

- slug: whitesource_get_project
  name: Get Project
  description: |
    Retrieve detailed information about a specific WhiteSource project.
  provider: whitesource
  endpoint: /api/v1/projects/{projectToken}
  method: GET
  scopes:
    - whitesource_read
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for getting a WhiteSource project
    properties:
      org_token:
        type: string
        description: "The WhiteSource organization API token"
      project_token:
        type: string
        description: "The unique project token"
    required:
      - org_token
      - project_token

- slug: whitesource_list_licenses
