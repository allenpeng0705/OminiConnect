- slug: whitesource_get_license_report
  name: Get License Report
  description: |
    Generate and retrieve a license compliance report.
  provider: whitesource
  endpoint: /api/v1/reports/licenses
  method: GET
  scopes:
    - whitesource_read
  tags:
    - reports
  input_schema:
    type: object
    description: Parameters for generating license report
    properties:
      org_token:
        type: string
        description: "The WhiteSource organization API token"
      project_tokens:
        type: array
        items:
          type: string
        description: "Include specific projects"
      report_format:
        type: string
        description: "Report format (JSON, CSV, PDF)"
    required:
      - org_token

- slug: whitesource_get_vulnerability_report
