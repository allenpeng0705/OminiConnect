# Klipfolio Tools - Allowlist
# Curated subset of Klipfolio API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. klipfolio_get_profile        - Get profile
# 2. klipfolio_list_datasources   - List data sources
# 3. klipfolio_get_datasource    - Get data source details
# 4. klipfolio_list_klips        - List klips
# 5. klipfolio_get_klip          - Get klip details
# 6. klipfolio_list_dashboards   - List dashboards
# 7. klipfolio_get_dashboard    - Get dashboard details
# 8. klipfolio_list_connections  - List connections
# 9. klipfolio_get_connection    - Get connection details
# 10. klipfolio_list_assets      - List assets

- slug: klipfolio_get_profile
  name: Get Profile
  description: |
    Get the current Klipfolio account profile. Returns account information including email, company name, subscription status, and user settings.
  provider: klipfolio
  endpoint: /api/1.0/profile
  method: GET
  scopes: []
  tags:
    - users
    - read
    - auth
  input_schema:
    type: object
    description: Parameters for getting profile
    properties: {}
    required: []

- slug: klipfolio_list_datasources
  name: List Data Sources
  description: |
    List all data sources configured in your Klipfolio account. Returns data source names, types, connection status, and last refresh timestamps.
  provider: klipfolio
  endpoint: /api/1.0/datasources
  method: GET
  scopes: []
  tags:
    - datasources
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing data sources
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: klipfolio_get_datasource
  name: Get Data Source
  description: |
    Get details about a specific Klipfolio data source by ID. Returns connection status, data structure, and last refresh time.
  provider: klipfolio
  endpoint: /api/1.0/datasources/{datasource_id}
  method: GET
  scopes: []
  tags:
    - datasources
    - read
  input_schema:
    type: object
    description: Parameters for getting a data source
    properties:
      datasource_id:
        type: string
        description: "Data source ID"
    required:
      - datasource_id

- slug: klipfolio_list_klips
  name: List Klips
  description: |
    List all klips in your Klipfolio account. Klips are visual dashboard components that display data from connected sources. Returns klip names, types, and dashboard assignments.
  provider: klipfolio
  endpoint: /api/1.0/klips
  method: GET
  scopes: []
  tags:
    - klips
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing klips
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: klipfolio_get_klip
  name: Get Klip
  description: |
    Get details about a specific Klipfolio klip by ID. Returns klip configuration, data source, and visualization settings.
  provider: klipfolio
  endpoint: /api/1.0/klips/{klip_id}
  method: GET
  scopes: []
  tags:
    - klips
    - read
  input_schema:
    type: object
    description: Parameters for getting a klip
    properties:
      klip_id:
        type: string
        description: "Klip ID"
    required:
      - klip_id

- slug: klipfolio_list_dashboards
  name: List Dashboards
  description: |
    List all dashboards in your Klipfolio account. Dashboards are collections of klips organized for monitoring metrics. Returns dashboard names, creation dates, and klip counts.
  provider: klipfolio
  endpoint: /api/1.0/dashboards
  method: GET
  scopes: []
  tags:
    - dashboards
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing dashboards
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: klipfolio_get_dashboard
  name: Get Dashboard
  description: |
    Get details about a specific Klipfolio dashboard by ID. Returns dashboard layout, included klips, and sharing settings.
  provider: klipfolio
  endpoint: /api/1.0/dashboards/{dashboard_id}
  method: GET
  scopes: []
  tags:
    - dashboards
    - read
  input_schema:
    type: object
    description: Parameters for getting a dashboard
    properties:
      dashboard_id:
        type: string
        description: "Dashboard ID"
    required:
      - dashboard_id

- slug: klipfolio_list_connections
  name: List Connections
  description: |
    List all external data connections in your Klipfolio account. Connections are authenticated links to data sources like Google Sheets, Salesforce, or databases. Returns connection names, types, and sync status.
  provider: klipfolio
  endpoint: /api/1.0/connections
  method: GET
  scopes: []
  tags:
    - connections
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing connections
    properties: {}
    required: []

- slug: klipfolio_get_connection
  name: Get Connection
  description: |
    Get details about a specific Klipfolio connection by ID. Returns connection type, authentication status, and last sync time.
  provider: klipfolio
  endpoint: /api/1.0/connections/{connection_id}
  method: GET
  scopes: []
  tags:
    - connections
    - read
  input_schema:
    type: object
    description: Parameters for getting a connection
    properties:
      connection_id:
        type: string
        description: "Connection ID"
    required:
      - connection_id

- slug: klipfolio_list_assets
  name: List Assets
  description: |
    List all assets in your Klipfolio account. Assets are files and images used in dashboards and klips. Returns asset names, file types, and upload timestamps.
  provider: klipfolio
  endpoint: /api/1.0/assets
  method: GET
  scopes: []
  tags:
    - assets
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing assets
    properties: {}
    required: []
