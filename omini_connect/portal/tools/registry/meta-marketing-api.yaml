# Meta Marketing API Tools - Allowlist
# Curated subset of Meta Marketing API for AI agent use.
# OAuth2 via Nango (alias: facebook).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. meta_list_ad_accounts       - List advertising accounts
# 2. meta_get_ad_account         - Get ad account details
# 3. meta_list_campaigns         - List campaigns
# 4. meta_get_campaign           - Get campaign details
# 5. meta_list_ad_sets           - List ad sets
# 6. meta_get_ad_set             - Get ad set details
# 7. meta_list_ads               - List ads
# 8. meta_get_ad                 - Get ad details
# 9. meta_list_adsets_insights   - Get ad set insights
# 10. meta_list_campaign_insights - Get campaign insights

- slug: meta_list_ad_accounts
  name: List Ad Accounts
  description: |
    List all advertising accounts accessible to the user.
  provider: meta-marketing-api
  endpoint: /me/adaccounts
  method: GET
  scopes: []
  tags:
    - adaccounts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing ad accounts
    properties:
      fields:
        type: string
        description: "Fields to return"
        default: "name,account_id,account_status"
    required: []

- slug: meta_get_ad_account
  name: Get Ad Account
  description: |
    Get detailed information about a specific ad account.
  provider: meta-marketing-api
  endpoint: /act_{accountId}
  method: GET
  scopes: []
  tags:
    - adaccounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an ad account
    properties:
      accountId:
        type: string
        description: "Ad account ID"
      fields:
        type: string
        description: "Fields to return"
    required:
      - accountId

- slug: meta_list_campaigns
  name: List Campaigns
  description: |
    List all campaigns for an ad account.
    Filter by status or objective.
  provider: meta-marketing-api
  endpoint: /act_{accountId}/campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      accountId:
        type: string
        description: "Ad account ID"
      status:
        type: integer
        description: "Filter by status (1=active, 2=paused)"
      objective:
        type: string
        description: "Filter by objective"
      fields:
        type: string
        description: "Fields to return"
    required:
      - accountId

- slug: meta_get_campaign
  name: Get Campaign
  description: |
    Get details of a specific campaign.
  provider: meta-marketing-api
  endpoint: /{campaignId}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaignId:
        type: string
        description: "Campaign ID"
      fields:
        type: string
        description: "Fields to return"
    required:
      - campaignId

