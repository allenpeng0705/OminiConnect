# Datto RMM Tools - Allowlist
# Curated subset of the Datto RMM API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. datto_rmm_list_devices             - List devices
# 2. datto_rmm_get_device             - Get device details
# 3. datto_rmm_list_alerts            - List alerts
# 4. datto_rmm_get_alert              - Get alert details
# 5. datto_rmm_list_policies          - List policies
# 6. datto_rmm_get_policy             - Get policy details
# 7. datto_rmm_list_users             - List users
# 8. datto_rmm_get_user               - Get user details
# 9. datto_rmm_list_tickets           - List tickets
# 10. datto_rmm_get_ticket           - Get ticket details

- slug: datto_rmm_list_devices
  name: List Devices
  description: |
    List all monitored devices in Datto RMM.
  provider: datto-rmm
  endpoint: /devices
  method: GET
  scopes: []
  tags:
    - devices
    - endpoint
    - monitoring
    - list
  input_schema:
    type: object
    description: Parameters for listing devices
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: datto_rmm_get_device
  name: Get Device
  description: |
    Get detailed information for a specific device.
  provider: datto-rmm
  endpoint: /devices/{deviceUid}
  method: GET
  scopes: []
  tags:
    - devices
    - endpoint
    - monitoring
    - read
  input_schema:
    type: object
    description: Parameters for getting a device
    properties:
      deviceUid:
        type: string
        description: "Device UID"
    required:
      - deviceUid

