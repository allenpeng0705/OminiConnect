- slug: shortcut_list_stories
  name: List Stories
  description: |
    List all stories in Shortcut project management with optional filtering by project, epic, and workflow state. Returns story IDs, names, descriptions, story types, and workflow states for sprint planning and backlog management.
  provider: shortcut
  endpoint: /stories
  method: GET
  scopes:
    - stories:read
  tags:
    - stories
  input_schema:
    type: object
    description: Query parameters for listing stories
    properties:
      projectId:
        type: string
        description: "Filter stories by project ID"
      epicId:
        type: string
        description: "Filter stories by epic ID"
      state:
        type: string
        description: "Filter by story state"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of stories per page"
    required: []

- slug: shortcut_get_story
  name: Get Story
  description: |
    Get detailed information about a specific Shortcut story by ID including description, workflow state, linked epics, task checklist, and comments. Returns data for sprint planning and progress tracking.
  provider: shortcut
  endpoint: /stories/{storyId}
  method: GET
  scopes:
    - stories:read
  tags:
    - stories
  input_schema:
    type: object
    description: Path parameters for getting a story
    properties:
      storyId:
        type: string
        description: "The unique ID of the story"
    required:
      - storyId

- slug: shortcut_create_story
  name: Create Story
  description: |
    Create a new story in Shortcut with name, description, project, story type, and initial workflow state. Returns the created story with its unique ID for sprint planning and backlog management.
  provider: shortcut
  endpoint: /stories
  method: POST
  scopes:
    - stories:write
  tags:
    - stories
  input_schema:
    type: object
    description: Body parameters for creating a story
    properties:
      projectId:
        type: string
        description: "Project ID to create the story in"
      name:
        type: string
        description: "Story name"
      description:
        type: string
        description: "Story description"
      storyType:
        type: string
        description: "Story type (feature, chore, bug)"
      epicId:
        type: string
        description: "Epic ID to associate the story with"
      state:
        type: string
        description: "Initial story state"
    required:
      - projectId
      - name

- slug: shortcut_update_story
  name: Update Story
  description: |
    Update an existing Shortcut story with new name, description, workflow state, or linked epic. Returns the updated story for confirmation and sprint progress tracking.
  provider: shortcut
  endpoint: /stories/{storyId}
  method: PUT
  scopes:
    - stories:write
  tags:
    - stories
  input_schema:
    type: object
    description: Parameters for updating a story
    properties:
      storyId:
        type: string
        description: "The unique ID of the story"
      name:
        type: string
        description: "New story name"
      description:
        type: string
        description: "New story description"
      state:
        type: string
        description: "New story state"
      epicId:
        type: string
        description: "New epic ID"
    required:
      - storyId

