# TLDV Tools - Allowlist
# Curated subset of TLDV API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tldv_list_meetings           - List all recorded meetings
# # 2. tldv_get_meeting           - Get meeting details with transcript
# # 3. tldv_list_transcripts           - List meeting transcripts
# # 4. tldv_get_transcript           - Get transcript for a meeting
# # 5. tldv_list_summaries           - List AI-generated summaries
# # 6. tldv_get_summary           - Get summary for a meeting
# # 7. tldv_create_action_item           - Create an action item from meeting
# # 8. tldv_list_action_items           - List all action items
# # 9. tldv_share_meeting           - Share a meeting recording
# # 10. tldv_delete_meeting           - Delete a meeting recording

- slug: tldv_list_meetings
  name: List Meetings
  description: |
    List all recorded meetings
  provider: tldv
  endpoint: /api/v1/meetings
  method: GET
  scopes:
    - read
  tags:
    - tldv
  input_schema:
    type: object
    description: Parameters for list meetings
    properties: {}
    required: []

