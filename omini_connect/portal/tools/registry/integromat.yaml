- slug: integromat_list_scenarios
  name: List Scenarios
  description: |
    Retrieve a list of all scenarios in a workspace.
  provider: integromat
  endpoint: /scenarios
  method: GET
  scopes:
    - scenarios:read
  tags:
    - scenarios
    - list
  input_schema:
    type: object
    description: Parameters for listing scenarios
    properties:
      workspace_id:
        type: string
        description: "The workspace ID to list scenarios from"
      limit:
        type: integer
        description: "Maximum number of scenarios to return (default 50)"
      offset:
        type: integer
        description: "Offset for pagination"
    required:
      - workspace_id

- slug: integromat_get_scenario
  name: Get Scenario
  description: |
    Retrieve details of a specific scenario by its ID.
  provider: integromat
  endpoint: /scenarios/{scenario_id}
  method: GET
  scopes:
    - scenarios:read
  tags:
    - scenarios
    - retrieve
  input_schema:
    type: object
    description: Parameters for getting a scenario
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario"
    required:
      - scenario_id

- slug: integromat_create_scenario
  name: Create Scenario
  description: |
    Create a new scenario with specified modules and connections.
  provider: integromat
  endpoint: /scenarios
  method: POST
  scopes:
    - scenarios:write
  tags:
    - scenarios
    - create
  input_schema:
    type: object
    description: Parameters for creating a scenario
    properties:
      name:
        type: string
        description: "Name of the scenario"
      workspace_id:
        type: string
        description: "Workspace ID to create the scenario in"
      flow:
        type: array
        description: "Array of module configurations"
    required:
      - name
      - workspace_id

