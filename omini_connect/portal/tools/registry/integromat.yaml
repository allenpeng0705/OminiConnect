- slug: integromat_get_bundle
  name: Get Bundle
  description: |
    Retrieve details of a specific bundle by its ID.
  provider: integromat
  endpoint: /bundles/{bundle_id}
  method: GET
  scopes:
    - bundles:read
  tags:
    - bundles
