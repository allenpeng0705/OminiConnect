- slug: integromat_list_logs
  name: List Logs
  description: |
    Retrieve execution logs for a scenario.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/logs
  method: GET
  scopes:
    - logs:read
  tags:
    - logs
    - list
  input_schema:
    type: object
    description: Parameters for listing logs
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario"
      limit:
        type: integer
        description: "Maximum number of logs to return (default 50)"
      level:
