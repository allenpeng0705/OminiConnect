- slug: integromat_list_scenarios
  name: List Scenarios
  description: |
    List all automation scenarios in your Make (Integromat) workspace with pagination. Returns scenario names, IDs, statuses, and last execution times.
  provider: integromat
  endpoint: /scenarios
  method: GET
  scopes:
    - scenarios:read
  tags:
    - scenarios
    - list
  input_schema:
    type: object
    description: Parameters for listing scenarios
    properties:
      workspace_id:
        type: string
        description: "The workspace ID to list scenarios from"
      limit:
        type: integer
        description: "Maximum number of scenarios to return (default 50)"
      offset:
        type: integer
        description: "Offset for pagination"
    required:
      - workspace_id

- slug: integromat_get_scenario
  name: Get Scenario
  description: |
    Get a specific Make scenario by ID with full module and connection configuration. Returns scenario details including all modules, mappings, and scheduling settings.
  provider: integromat
  endpoint: /scenarios/{scenario_id}
  method: GET
  scopes:
    - scenarios:read
  tags:
    - scenarios
    - retrieve
  input_schema:
    type: object
    description: Parameters for getting a scenario
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario"
    required:
      - scenario_id

- slug: integromat_create_scenario
  name: Create Scenario
  description: |
    Create a new automation scenario in Make with specified modules and connections. Returns the created scenario ID and initial configuration.
  provider: integromat
  endpoint: /scenarios
  method: POST
  scopes:
    - scenarios:write
  tags:
    - scenarios
    - create
  input_schema:
    type: object
    description: Parameters for creating a scenario
    properties:
      name:
        type: string
        description: "Name of the scenario"
      workspace_id:
        type: string
        description: "Workspace ID to create the scenario in"
      flow:
        type: array
        description: "Array of module configurations"
    required:
      - name
      - workspace_id

- slug: integromat_list_bundles
  name: List Bundles
  description: |
    List data bundles processed by a specific Make scenario with pagination. Returns bundle counts, operation types, and timestamps.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/bundles
  method: GET
  scopes:
    - bundles:read
  tags:
    - bundles
    - list
  input_schema:
    type: object
    description: Parameters for listing bundles
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario"
      limit:
        type: integer
        description: "Maximum number of bundles to return (default 50)"
    required:
      - scenario_id

- slug: integromat_get_bundle
  name: Get Bundle
  description: |
    Get a specific Make bundle by ID with full operation details. Returns bundle data, operation type, and processing status.
  provider: integromat
  endpoint: /bundles/{bundle_id}
  method: GET
  scopes:
    - bundles:read
  tags:
    - bundles
    - retrieve
  input_schema:
    type: object
    description: Parameters for getting a bundle
    properties:
      bundle_id:
        type: string
        description: "The unique identifier of the bundle"
    required:
      - bundle_id

- slug: integromat_list_logs
  name: List Logs
  description: |
    List execution logs for a Make scenario with optional level filtering. Returns log timestamps, levels, messages, and operation details.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/logs
  method: GET
  scopes:
    - logs:read
  tags:
    - logs
    - list
  input_schema:
    type: object
    description: Parameters for listing logs
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario"
      limit:
        type: integer
        description: "Maximum number of logs to return (default 50)"
      level:
        type: string
        description: "Filter by log level (info, error, debug)"
    required:
      - scenario_id

- slug: integromat_get_log
  name: Get Log
  description: |
    Get a specific Make log entry by ID with full execution details. Returns log message, timestamp, module context, and error information.
  provider: integromat
  endpoint: /logs/{log_id}
  method: GET
  scopes:
    - logs:read
  tags:
    - logs
    - retrieve
  input_schema:
    type: object
    description: Parameters for getting a log
    properties:
      log_id:
        type: string
        description: "The unique identifier of the log entry"
    required:
      - log_id

- slug: integromat_run_scenario
  name: Run Scenario
  description: |
    Trigger a manual execution of a Make scenario with optional input data. Returns the activation ID and initial execution status.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/run
  method: POST
  scopes:
    - scenarios:execute
  tags:
    - scenarios
    - execute
  input_schema:
    type: object
    description: Parameters for running a scenario
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario to run"
      data:
        type: object
        description: "Optional input data to pass to the scenario"
    required:
      - scenario_id

- slug: integromat_start_scenario
  name: Start Scenario
  description: |
    Start a Make scenario to begin automated processing on its schedule. Returns the scenario status confirmation.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/start
  method: POST
  scopes:
    - scenarios:write
  tags:
    - scenarios
    - start
  input_schema:
    type: object
    description: Parameters for starting a scenario
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario to start"
    required:
      - scenario_id

- slug: integromat_stop_scenario
  name: Stop Scenario
  description: |
    Stop a running Make scenario to halt automated processing. Returns the scenario status confirmation.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/stop
  method: POST
  scopes:
    - scenarios:write
  tags:
    - scenarios
    - stop
  input_schema:
    type: object
    description: Parameters for stopping a scenario
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario to stop"
    required:
      - scenario_id
