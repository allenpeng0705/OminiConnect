- slug: integromat_run_scenario
  name: Run Scenario
  description: |
    Trigger a manual run of a scenario with optional input data.
  provider: integromat
  endpoint: /scenarios/{scenario_id}/run
  method: POST
  scopes:
    - scenarios:execute
  tags:
    - scenarios
    - execute
  input_schema:
    type: object
    description: Parameters for running a scenario
    properties:
      scenario_id:
        type: string
        description: "The unique identifier of the scenario to run"
      data:
        type: object
        description: "Optional input data to pass to the scenario"
    required:
      - scenario_id

- slug: integromat_start_scenario
  name: Start Scenario
