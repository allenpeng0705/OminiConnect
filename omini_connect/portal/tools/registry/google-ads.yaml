  name: Get Campaign
  description: |
    Get detailed information about a campaign.
  provider: google-ads
  endpoint: /v17/customers/{customer_id}/campaigns/{campaign_id}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/adwords
  tags:
