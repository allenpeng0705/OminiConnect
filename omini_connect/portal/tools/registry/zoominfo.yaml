# ZoomInfo Tools - Allowlist
# Curated subset of ZoomInfo API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoominfo_search_contacts           - Search for contacts
# # 2. zoominfo_get_contact           - Get contact details
# # 3. zoominfo_search_companies           - Search for companies
# # 4. zoominfo_get_company           - Get company details
# # 5. zoominfo_enrich_contact           - Enrich contact data
# # 6. zoominfo_enrich_company           - Enrich company data
# # 7. zoominfo_get_company_by_domain           - Get company by website domain
# # 8. zoominfo_list_technologies           - List technologies used by company
# # 9. zoominfo_get_job_change           - Get job change information
# # 10. zoominfo_list_workflows           - List available workflows

- slug: zoominfo_search_contacts
  name: Search Contacts
  description: |
    Search for contacts
  provider: zoominfo
  endpoint: /contact/search
  method: POST
  scopes:
    - read
  tags:
    - zoominfo
  input_schema:
    type: object
    description: Parameters for search contacts
    properties: {}
    required: []

- slug: zoominfo_get_contact
  name: Get Contact
  description: |
    Get contact details
  provider: zoominfo
  endpoint: /contact/{id}
  method: GET
  scopes:
    - read
  tags:
    - zoominfo
  input_schema:
    type: object
    description: Parameters for get contact
    properties: {}
    required: []

