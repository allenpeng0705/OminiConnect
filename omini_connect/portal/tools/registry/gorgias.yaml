- slug: gorgias_list_tickets
  name: List Tickets
  description: |
    Retrieves a paginated list of support tickets from Gorgias with filtering.
    Returns ticket IDs, subjects, states, and timestamps for each ticket.
    Use this to discover customer support issues and track ticket status.
  provider: gorgias
  endpoint: /tickets
  method: GET
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of results per page (default 20)"
      state:
        type: string
        description: "Filter by ticket state (open, pending, resolved, closed)"
    required: []

- slug: gorgias_get_ticket
  name: Get Ticket
  description: |
    Retrieves a single support ticket by its ID with full conversation history.
    Returns the complete ticket data with all associated information.
    This provides full ticket data for customer support management.
  provider: gorgias
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
    required:
      - id

- slug: gorgias_create_ticket
  name: Create Ticket
  description: |
    Creates a new support ticket in Gorgias with subject, body, and customer email.
    Returns the created ticket with its unique ID and confirmation.
    This opens a new customer support issue for resolution.
  provider: gorgias
  endpoint: /tickets
  method: POST
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      subject:
        type: string
        description: "The ticket subject line"
      body:
        type: string
        description: "The ticket body/description"
      customer_email:
        type: string
        description: "Customer email address"
      priority:
        type: string
        description: "Ticket priority (low, medium, high, urgent)"
    required:
      - subject
      - body
      - customer_email

- slug: gorgias_update_ticket
  name: Update Ticket
  description: |
    Updates an existing support ticket with new subject, body, state, or priority.
    Returns the updated ticket confirmation with modified fields.
    This modifies ticket content for customer support resolution.
  provider: gorgias
  endpoint: /tickets/{id}
  method: PUT
  scopes:
    - base
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for updating a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
      subject:
        type: string
        description: "Updated ticket subject"
      body:
        type: string
        description: "Updated ticket body"
      state:
        type: string
        description: "Updated ticket state"
      priority:
        type: string
        description: "Updated ticket priority"
    required:
      - id

