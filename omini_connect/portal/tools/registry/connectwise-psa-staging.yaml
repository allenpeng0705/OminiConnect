# ConnectWise PSA (Staging) Tools - Allowlist
# Curated subset of the ConnectWise PSA Staging API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. connectwise_psa_staging_list_companies           - List companies
# 2. connectwise_psa_staging_get_company            - Get company details
# 3. connectwise_psa_staging_list_contacts          - List contacts
# 4. connectwise_psa_staging_get_contact            - Get contact details
# 5. connectwise_psa_staging_list_tickets           - List tickets
# 6. connectwise_psa_staging_get_ticket             - Get ticket details
# 7. connectwise_psa_staging_create_ticket           - Create a ticket
# 8. connectwise_psa_staging_update_ticket          - Update a ticket
# 9. connectwise_psa_staging_list_time_entries     - List time entries
# 10. connectwise_psa_staging_list_projects       - List projects

- slug: connectwise_psa_staging_list_companies
  name: List Companies
  description: |
    List all companies in staging.
  provider: connectwise-psa-staging
  endpoint: /company
  method: GET
  scopes: []
  tags:
    - companies
    - crm
  input_schema:
    type: object
    description: Parameters for listing companies
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: connectwise_psa_staging_get_company
  name: Get Company
  description: |
    Get details of a specific company.
  provider: connectwise-psa-staging
  endpoint: /company/{id}
  method: GET
  scopes: []
  tags:
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      id:
        type: integer
        description: "Company ID"
    required:
      - id

- slug: connectwise_psa_staging_list_contacts
  name: List Contacts
