- slug: connectwise_psa_staging_create_ticket
  name: Create Ticket
  description: |
    Create a new ticket.
  provider: connectwise-psa-staging
  endpoint: /service/tickets
  method: POST
  scopes: []
  tags:
    - tickets
    - create
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      summary:
        type: string
        description: "Ticket summary"
      companyId:
        type: integer
        description: "Company ID"
      priority:
        type: integer
        description: "Priority (1-5)"
    required:
      - summary
      - companyId

- slug: connectwise_psa_staging_update_ticket
  name: Update Ticket
  description: |
    Update an existing ticket.
  provider: connectwise-psa-staging
  endpoint: /service/tickets/{id}
  method: PATCH
  scopes: []
  tags:
    - tickets
    - update
  input_schema:
    type: object
    description: Parameters for updating a ticket
    properties:
      id:
        type: integer
        description: "Ticket ID"
      status:
        type: string
        description: "New status"
      priority:
        type: integer
        description: "New priority"
    required:
      - id

