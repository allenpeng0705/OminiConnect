# Freshteam Tools - Allowlist
# Curated subset of Freshteam HR API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. freshteam_list_employees       - List employees
# 2. freshteam_get_employee        - Get employee details
# 3. freshteam_create_employee     - Create an employee
# 4. freshteam_update_employee     - Update an employee
# 5. freshteam_list_departments    - List departments
# 6. freshteam_get_department      - Get department details
# 7. freshteam_list_job_postings   - List job postings
# 8. freshteam_get_job_posting     - Get job posting details
# 9. freshteam_list_holidays       - List holidays
# 10. freshteam_list_time_off_requests - List time off requests

- slug: freshteam_list_employees
  name: List Employees
  description: |
    List all employees in the organization with optional filters and pagination.
    Returns employee IDs, names, departments, and status for each employee.
    Use this to discover workforce members and manage HR operations.
  provider: freshteam
  endpoint: /employees
  method: GET
  scopes:
    - read
  tags:
    - employees
    - list
    - hr
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      department_id:
        type: integer
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive, all)"
        default: active
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: freshteam_get_employee
  name: Get Employee
  description: |
    Get detailed information about a specific employee including personal and employment details.
    Returns the complete employee data with all associated information.
    This provides full employee data for HR management and personnel lookup.
  provider: freshteam
  endpoint: /employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - employees
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      id:
        type: integer
        description: "Employee ID"
    required:
      - id

- slug: freshteam_create_employee
  name: Create Employee
  description: |
    Create a new employee in Freshteam with name, email, department, and designation.
    Returns the created employee with their unique ID and confirmation.
    This provisions a new employee record in the HR system.
  provider: freshteam
  endpoint: /employees
  method: POST
  scopes:
    - write
  tags:
    - employees
    - create
  input_schema:
    type: object
    description: Parameters for creating an employee
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Work email"
      department_id:
        type: integer
        description: "Department ID"
      designation:
        type: string
        description: "Job title"
      date_of_joining:
        type: string
        description: "Join date (YYYY-MM-DD)"
    required:
      - first_name
      - last_name
      - email

- slug: freshteam_update_employee
  name: Update Employee
  description: |
    Update an existing employee's information including name, department, or designation.
    Returns the updated employee confirmation with modified fields.
    This modifies employee records for HR management.
  provider: freshteam
  endpoint: /employees/{id}
  method: PUT
  scopes:
    - write
  tags:
    - employees
    - update
  input_schema:
    type: object
    description: Parameters for updating an employee
    properties:
      id:
        type: integer
        description: "Employee ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      department_id:
        type: integer
        description: "Department ID"
      designation:
        type: string
        description: "Job title"
    required:
      - id

