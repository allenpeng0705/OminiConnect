- slug: freshteam_list_holidays
  name: List Holidays
  description: |
    List all holidays configured in the organization with year filtering.
    Returns holiday names, dates, and descriptions for each holiday.
    Use this to discover company holidays and plan leave calendars.
  provider: freshteam
  endpoint: /holidays
  method: GET
  scopes:
    - read
  tags:
    - holidays
    - list
    - hr
  input_schema:
    type: object
    description: Parameters for listing holidays
    properties:
      year:
        type: integer
        description: "Year (default: current year)"
    required: []

- slug: freshteam_list_time_off_requests
  name: List Time Off Requests
  description: |
    List all time off requests with optional status and employee filters.
    Returns request IDs, employee names, dates, and status for each request.
    Use this to discover leave requests and manage approval workflows.
  provider: freshteam
  endpoint: /time_off_requests
  method: GET
  scopes:
    - read
  tags:
    - time-off
    - requests
    - list
    - hr
  input_schema:
    type: object
    description: Parameters for listing time off requests
    properties:
      status:
        type: string
        description: "Filter by status (pending, approved, rejected)"
      employee_id:
        type: integer
        description: "Filter by employee ID"
    required: []
