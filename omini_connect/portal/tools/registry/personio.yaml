# Personio Tools - Allowlist
# Curated subset of Personio API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. personio_list_employees            - List employees
# 2. personio_get_employee             - Get employee details
# 3. personio_list_absences            - List absences
# 4. personio_get_absence             - Get absence details
# 5. personio_list_attendances         - List attendances
# 6. personio_get_attendance          - Get attendance details
# 7. personio_list_contracts           - List contracts
# 8. personio_get_contract            - Get contract details
# 9. personio_list_departments        - List departments
# 10. personio_get_company            - Get company information

- slug: personio_list_employees
  name: List Employees
  description: |
    List all employees in the organization.
  provider: personio
  endpoint: /v1/employees
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      departmentId:
        type: string
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: personio_get_employee
  name: Get Employee
  description: |
    Get detailed information about a specific employee.
  provider: personio
  endpoint: /v1/employees/{employeeId}
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

