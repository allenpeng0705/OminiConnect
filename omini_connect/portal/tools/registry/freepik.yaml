# Freepik Tools - Allowlist
# Curated subset of Freepik API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. freepik_list_resources       - List resources
# 2. freepik_get_resource        - Get resource details
# 3. freepik_list_collections    - List collections
# 4. freepik_get_collection     - Get collection details
# 5. freepik_list_ai_styles     - List AI styles
# 6. freepik_generate_ai        - Generate AI image
# 7. freepik_list_categories   - List categories
# 8. freepik_get_user          - Get user info
# 9. freepik_search           - Search resources
# 10. freepik_get_editorial   - Get editorial content

- slug: freepik_list_resources
  name: List Resources
  description: |
    List all available resources.
  provider: freepik
  endpoint: /v1/resources
  method: GET
  scopes: []
  tags:
    - resources
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for listing resources
    properties:
      type:
        type: string
        description: "Filter by type (photo, vector, video)"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: freepik_get_resource
  name: Get Resource
  description: |
    Get details of a specific resource.
  provider: freepik
  endpoint: /v1/resources/{id}
  method: GET
  scopes: []
  tags:
    - resources
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for getting resource
    properties:
      id:
        type: string
        description: "Resource ID"
    required:
      - id

