# Plain Tools - Allowlist
# Curated subset of Plain API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. plain_list_customers            - List customers
# 2. plain_get_customer             - Get customer details
# 3. plain_list_components          - List components
# 4. plain_get_component            - Get component details
# 5. plain_list_comments            - List comments
# 6. plain_create_comment           - Create a comment
# 7. plain_list_tags                - List tags
# 8. plain_get_user                 - Get user info
# 9. plain_list_teams               - List teams
# 10. plain_get_customer_by_email   - Get customer by email

- slug: plain_list_customers
  name: List Customers
  description: |
    List all customers.
  provider: plain
  endpoint: /graphql
  method: POST
  scopes: []
  tags:
    - customers
    - crm
    - list
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: plain_get_customer
  name: Get Customer
  description: |
    Get detailed information about a specific customer.
  provider: plain
  endpoint: /graphql
  method: POST
  scopes: []
  tags:
    - customers
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customerId:
        type: string
        description: "Customer ID"
    required:
      - customerId

