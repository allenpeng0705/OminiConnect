# Dialpad Sandbox Tools - Allowlist
# Curated subset of the Dialpad Sandbox API for AI agent use.
# OAuth2 via Nango (Sandbox environment).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. dialpad_sandbox_list_users                - List users
# 2. dialpad_sandbox_get_user                - Get user details
# 3. dialpad_sandbox_list_calls               - List calls
# 4. dialpad_sandbox_get_call                 - Get call details
# 5. dialpad_sandbox_list_departments         - List departments
# 6. dialpad_sandbox_get_department           - Get department details
# 7. dialpad_sandbox_list_numbers             - List phone numbers
# 8. dialpad_sandbox_get_number               - Get number details
# 9. dialpad_sandbox_list_voicemails          - List voicemails
# 10. dialpad_sandbox_get_voicemail          - Get voicemail details

- slug: dialpad_sandbox_list_users
  name: List Users
  description: |
    List all users in the Dialpad sandbox, returning user IDs, names, email addresses, and availability status.
  provider: dialpad-sandbox
  endpoint: /users
  method: GET
  scopes: []
  tags:
    - users
    - directory
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

- slug: dialpad_sandbox_get_user
  name: Get User
  description: |
    Get detailed information for a specific Dialpad sandbox user including their profile, contact details, and call settings.
  provider: dialpad-sandbox
  endpoint: /users/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - directory
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: dialpad_sandbox_list_calls
  name: List Calls
  description: |
    List all calls in the Dialpad sandbox, returning call IDs, participants, direction, status, and duration information.
  provider: dialpad-sandbox
  endpoint: /calls
  method: GET
  scopes: []
  tags:
    - calls
    - telephony
    - list
  input_schema:
    type: object
    description: Parameters for listing calls
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      direction:
        type: string
        description: "Filter by direction: inbound, outbound"
      status:
        type: string
        description: "Filter by status: started, ended, missed"
    required: []

- slug: dialpad_sandbox_get_call
  name: Get Call
