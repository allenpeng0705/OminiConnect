# Paycom Tools - Allowlist
# Curated subset of Paycom API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. paycom_list_employees        - List employees
# 2. paycom_get_employee          - Get employee details
# 3. paycom_list_payroll_runs     - List payroll runs
# 4. paycom_get_payroll_run       - Get payroll run details
# 5. paycom_list_time_off         - List time off requests
# 6. paycom_list_departments      - List departments
# 7. paycom_list_jobs             - List jobs/positions
# 8. paycom_list_pay_groups       - List pay groups
# 9. paycom_list_benefits         - List benefit plans
# 10. paycom_get_company_info     - Get company information

- slug: paycom_list_employees
  name: List Employees
  description: |
    List all employees including their contact information, department assignments, employment status, and work locations. Returns employee records for HR management and payroll purposes.
  provider: paycom
  endpoint: /api/v1/employees
  method: GET
  scopes:
    - employees.read
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      departmentId:
        type: string
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: paycom_get_employee
  name: Get Employee
  description: |
    Get detailed information for a specific employee including their personal details, employment terms, and department. Returns the complete employee profile with compensation and benefits information.
  provider: paycom
  endpoint: /api/v1/employees/{employeeId}
  method: GET
  scopes:
    - employees.read
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

- slug: paycom_list_payroll_runs
  name: List Payroll Runs
  description: |
    List all payroll runs including their processing status, period dates, total amounts, and worker counts. Returns payroll summaries for tracking payroll execution and payment history.
  provider: paycom
  endpoint: /api/v1/payroll/runs
  method: GET
  scopes:
    - payroll.read
  tags:
    - payroll
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payroll runs
    properties:
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: paycom_get_payroll_run
  name: Get Payroll Run
  description: |
    Get detailed information for a specific payroll run including the period, amounts, and employee breakdown. Returns payroll run status and any associated payment records.
  provider: paycom
  endpoint: /api/v1/payroll/runs/{runId}
  method: GET
  scopes:
    - payroll.read
  tags:
    - payroll
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payroll run
    properties:
      runId:
        type: string
        description: "Payroll run ID"
    required:
      - runId

- slug: paycom_list_time_off
  name: List Time Off
  description: |
    List all time off requests including leave balances, request status, and approval details. Returns time off records with accrual usage and remaining balance information.
  provider: paycom
  endpoint: /api/v1/time-off/requests
  method: GET
  scopes:
    - timeoff.read
  tags:
    - time-off
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing time off requests
    properties:
      employeeId:
        type: string
        description: "Filter by employee ID"
      status:
        type: string
        description: "Filter by status (pending, approved, denied)"
    required: []

