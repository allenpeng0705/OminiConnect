# Zoho CRM Tools - Allowlist
# Curated subset of Zoho CRM API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. zoho_crm_list_contacts    - List contacts
# 2. zoho_crm_get_contact      - Get contact details
# 3. zoho_crm_create_contact   - Create a contact
# 4. zoho_crm_list_accounts    - List accounts
# 5. zoho_crm_get_account      - Get account details
# 6. zoho_crm_list_deals       - List deals
# 7. zoho_crm_get_deal         - Get deal details
# 8. zoho_crm_list_tasks       - List tasks
# 9. zoho_crm_get_task         - Get task details
# 10. zoho_crm_list_leads       - List leads

- slug: zoho_crm_list_contacts
  name: List Contacts
  description: |
    List all contacts in Zoho CRM. Filter by email, phone, account, or tag.
  provider: zoho_crm
  endpoint: /crm/v2/Contacts
  method: GET
  scopes:
    - ZohoCRM.modules.contacts.READ
  tags:
    - contacts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Results per page (default 200, max 200)"
        default: 200
      sort_by:
        type: string
        description: "Field to sort by (e.g., Email, Full_Name)"
      sort_order:
        type: string
        description: "Sort order (asc or desc)"
        enum: [asc, desc]
      phone:
        type: string
        description: "Filter by phone number"
      email:
        type: string
        description: "Filter by email address"
    required: []

- slug: zoho_crm_get_contact
  name: Get Contact
  description: |
    Get detailed information about a specific contact including name, email, phone, account, and tags.
  provider: zoho_crm
  endpoint: /crm/v2/Contacts/{id}
  method: GET
  scopes:
    - ZohoCRM.modules.contacts.READ
  tags:
    - contacts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: zoho_crm_create_contact
  name: Create Contact
  description: |
    Create a new contact in Zoho CRM. Set name, email, phone, account association, and custom fields.
  provider: zoho_crm
  endpoint: /crm/v2/Contacts
  method: POST
  scopes:
    - ZohoCRM.modules.contacts.CREATE
  tags:
    - contacts
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      First_Name:
        type: string
        description: "First name"
      Last_Name:
        type: string
        description: "Last name"
      Email:
        type: string
        description: "Email address"
      Phone:
        type: string
        description: "Phone number"
      Mobile:
        type: string
        description: "Mobile phone number"
      Account_Name:
        type: object
        description: "Associated account (use id or name)"
      Title:
        type: string
        description: "Job title"
      Department:
        type: string
        description: "Department"
    required: []

