- slug: google_bigquery_insert_query
  name: Insert Query Job
  description: |
    Insert a query job to run asynchronously.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/jobs
  method: POST
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - jobs
