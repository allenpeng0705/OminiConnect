- slug: google_bigquery_query
  name: Run Query
  description: |
    Run a SQL query on BigQuery data.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/queries
  method: POST
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - query
    - sql
  input_schema:
    type: object
    description: Parameters for running a query
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      query:
        type: string
        description: "SQL query"
      useLegacySql:
        type: boolean
        description: "Use legacy SQL"
        default: false
    required:
      - projectId
      - query

