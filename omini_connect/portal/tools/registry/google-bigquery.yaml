  input_schema:
    type: object
    description: Parameters for inserting a query job
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      query:
        type: string
        description: "SQL query"
      destinationTable:
        type: string
        description: "Destination table (project:dataset.table)"
    required:
