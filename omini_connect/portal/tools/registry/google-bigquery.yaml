# Google BigQuery Tools - Allowlist
# Curated subset of BigQuery API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_bigquery_list_datasets     - List datasets
# 2. google_bigquery_get_dataset      - Get dataset details
# 3. google_bigquery_list_tables      - List tables in dataset
# 4. google_bigquery_get_table        - Get table details
# 5. google_bigquery_query            - Run a SQL query
# 6. google_bigquery_list_jobs        - List query jobs
# 7. google_bigquery_get_job          - Get job details
# 8. google_bigquery_insert_query     - Insert a query job
# 9. google_bigquery_list_routines    - List routines
# 10. google_bigquery_list_models    - List ML models

- slug: google_bigquery_list_datasets
  name: List Datasets
  description: |
    List all BigQuery datasets in the project.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - datasets
    - list
  input_schema:
    type: object
    description: Parameters for listing datasets
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
    required:
      - projectId

- slug: google_bigquery_get_dataset
  name: Get Dataset
  description: |
    Get detailed information about a dataset.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets/{datasetId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - datasets
    - read
  input_schema:
    type: object
    description: Parameters for getting a dataset
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      datasetId:
        type: string
        description: "Dataset ID"
    required:
      - projectId
      - datasetId

