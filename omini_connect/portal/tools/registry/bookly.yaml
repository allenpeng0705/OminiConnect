    - read
  tags:
    - customers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      search:
        type: string
        description: "Search by name, email, or phone"
      count:
        type: integer
        description: "Max customers to return"
        default: 100
    required: []

