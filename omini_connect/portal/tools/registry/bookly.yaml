# Bookly Tools - Allowlist
# Curated subset of Bookly API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bookly_list_appointments      - List appointments
# 2. bookly_get_appointment        - Get appointment details
# 3. bookly_create_appointment    - Create an appointment
# 4. bookly_cancel_appointment    - Cancel an appointment
# 5. bookly_list_customers        - List customers
# 6. bookly_get_customer          - Get customer details
# 7. bookly_list_services         - List services
# 8. bookly_get_service           - Get service details
# 9. bookly_list_staff            - List staff members
# 10. bookly_get_staff            - Get staff details

- slug: bookly_list_appointments
  name: List Appointments
  description: |
    List all appointments and return appointment IDs, dates, times, customer names, and staff assignments.
    Filter by date range, customer, staff, or status to find specific booking records.
  provider: bookly
  endpoint: /appointments
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing appointments
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      customer_id:
        type: integer
        description: "Filter by customer ID"
      staff_id:
        type: integer
        description: "Filter by staff ID"
      status:
        type: string
        description: "Filter by status: approved, pending, cancelled"
      count:
        type: integer
        description: "Max appointments to return"
        default: 100
    required: []

- slug: bookly_get_appointment
  name: Get Appointment
  description: |
    Get detailed information about a specific appointment including customer, service, staff, and time.
    Returns the complete appointment data for scheduling management and conflict resolution.
  provider: bookly
  endpoint: /appointments/{appointment_id}
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - read
  input_schema:
    type: object
    description: Parameters for getting an appointment
    properties:
      appointment_id:
        type: integer
        description: "Appointment ID"
    required:
      - appointment_id

- slug: bookly_create_appointment
  name: Create Appointment
  description: |
    Create a new appointment for a customer with a specified service, staff member, and time slot.
    Returns the created appointment ID for confirmation and further management.
  provider: bookly
  endpoint: /appointments
  method: POST
  scopes:
    - write
  tags:
    - appointments
    - create
  input_schema:
    type: object
    description: Parameters for creating an appointment
    properties:
      customer_id:
        type: integer
        description: "Customer ID"
      service_id:
        type: integer
        description: "Service ID"
      staff_id:
        type: integer
        description: "Staff ID"
      start_date:
        type: string
        description: "Appointment date and time (YYYY-MM-DD HH:MM:SS)"
      end_date:
        type: string
        description: "End date and time (YYYY-MM-DD HH:MM:SS)"
      notes:
        type: string
        description: "Appointment notes"
    required:
      - customer_id
      - service_id
      - staff_id
      - start_date

- slug: bookly_cancel_appointment
  name: Cancel Appointment
  description: |
    Cancel an existing appointment and optionally provide a cancellation reason for records.
    Returns confirmation of the cancellation for scheduling updates.
  provider: bookly
  endpoint: /appointments/{appointment_id}
  method: DELETE
  scopes:
    - write
  tags:
    - appointments
    - delete
  input_schema:
    type: object
    description: Parameters for canceling an appointment
    properties:
      appointment_id:
        type: integer
        description: "Appointment ID"
      reason:
        type: string
        description: "Cancellation reason"
    required:
      - appointment_id

