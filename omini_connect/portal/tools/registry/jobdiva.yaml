  provider: jobdiva
  endpoint: /apiv2/notes
  method: GET
  scopes: []
  tags:
    - notes
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing notes
    properties:
      candidate_id:
        type: integer
        description: "Filter by candidate ID"
      job_id:
        type: integer
        description: "Filter by job ID"
    required: []

- slug: jobdiva_create_note
  name: Create Note
  description: |
    Create a note on a candidate or job.
  provider: jobdiva
  endpoint: /apiv2/notes
  method: POST
  scopes: []
  tags:
    - notes
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a note
    properties:
      candidate_id:
        type: integer
        description: "Candidate ID"
      job_id:
        type: integer
        description: "Job ID"
      content:
        type: string
        description: "Note content"
    required:
      - content
