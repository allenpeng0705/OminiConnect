# Fanvue Tools - Allowlist
# Curated subset of Fanvue API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fanvue_get_user            - Get current user
# 2. fanvue_list_posts         - List posts
# 3. fanvue_get_post          - Get post details
# 4. fanvue_list_messages     - List messages
# 5. fanvue_send_message      - Send a message
# 6. fanvue_list_subscribers  - List subscribers
# 7. fanvue_get_subscriber    - Get subscriber details
# 8. fanvue_list_chats        - List chat conversations
# 9. fanvue_get_chat          - Get chat details
# 10. fanvue_get_stats       - Get account stats

- slug: fanvue_get_user
  name: Get User
  description: |
    Get current authenticated user profile.
  provider: fanvue
  endpoint: /api/v1/me
  method: GET
  scopes: []
  tags:
    - user
    - profile
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: fanvue_list_posts
  name: List Posts
  description: |
    List posts from the creator.
  provider: fanvue
  endpoint: /api/v1/posts
  method: GET
  scopes: []
  tags:
    - posts
    - content
    - read
  input_schema:
    type: object
    description: Parameters for listing posts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fanvue_get_post
  name: Get Post
  description: |
    Get details of a specific post.
  provider: fanvue
  endpoint: /api/v1/posts/{id}
  method: GET
  scopes: []
  tags:
    - posts
    - content
    - read
  input_schema:
    type: object
    description: Parameters for getting post
    properties:
      id:
        type: string
        description: "Post ID"
    required:
      - id

- slug: fanvue_list_messages
  name: List Messages
  description: |
    List messages from inbox.
  provider: fanvue
  endpoint: /api/v1/messages
  method: GET
  scopes: []
  tags:
    - messages
    - communication
    - read
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fanvue_send_message
  name: Send Message
  description: |
    Send a message to a user.
  provider: fanvue
  endpoint: /api/v1/messages
  method: POST
  scopes: []
  tags:
    - messages
    - communication
    - create
  input_schema:
    type: object
    description: Parameters for sending message
    properties:
      recipient_id:
        type: string
        description: "Recipient user ID"
      content:
        type: string
        description: "Message content"
    required:
      - recipient_id
      - content

