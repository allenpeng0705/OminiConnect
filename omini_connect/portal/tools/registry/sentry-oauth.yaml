# Sentry (Public Integrations) Tools - Allowlist
# Curated subset of Sentry (Public Integrations) API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_projects                            - List all Sentry projects
# 2. list_issues                              - List issues across projects
# 3. get_issue                                - Get details for a specific issue
# 4. list_events                              - List events for an issue
# 5. list_teams                               - List teams in organization
# 6. list_members                             - List organization members
# 7. list_releases                            - List releases
# 8. get_org_stats                            - Get organization statistics
# 9. list_projects_by_team                    - List projects for a team
# 10. get_event_counts                         - Get event count statistics

- slug: list_projects
  name: List Projects
  description: |
    List all Sentry projects
  provider: sentry-oauth
  endpoint: /projects
  method: GET
  scopes: []
  tags:
    - projects
    - organization
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

