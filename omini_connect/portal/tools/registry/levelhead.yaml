- slug: levelhead_get_audience
  name: Get Audience
  description: |
    Get detailed information for a specific audience segment including criteria and member count.
    Returns the complete audience definition with all targeting parameters.
    This provides full audience data for campaign targeting decisions.
  provider: levelhead
  endpoint: /api/v1/audiences/{audience_id}
  method: GET
  scopes:
    - audiences:read
  tags:
    - audiences
  input_schema:
    type: object
    description: Parameters for getting an audience
    properties:
      audience_id:
        type: string
        description: "The unique audience ID"
    required:
      - audience_id

- slug: levelhead_create_audience
  name: Create Audience
  description: |
    Create a new audience segment with defined criteria and data source.
    Returns the created audience with its unique ID and member count estimate.
    This defines a new target group for analytics and campaign tracking.
  provider: levelhead
  endpoint: /api/v1/audiences
  method: POST
  scopes:
    - audiences:write
  tags:
    - audiences
  input_schema:
    type: object
    description: Parameters for creating an audience
    properties:
      name:
        type: string
        description: "Name for the audience"
      description:
        type: string
        description: "Optional description"
      criteria:
        type: object
        description: "Audience definition criteria"
      source:
        type: string
        description: "Data source for the audience"
    required:
      - name
      - criteria

