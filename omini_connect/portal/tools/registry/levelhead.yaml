- slug: levelhead_list_campaigns
  name: List Campaigns
  description: |
    List all analytics campaigns in your Levelhead account.
    Returns campaign names, IDs, status, and date ranges for each campaign.
    Use this to discover available campaigns and track ongoing analytics efforts.
  provider: levelhead
  endpoint: /api/v1/campaigns
  method: GET
  scopes:
    - campaigns:read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      per_page:
        type: integer
        description: "Number of items per page (default: 20)"
      status:
        type: string
        description: "Filter by status (active, paused, completed)"
      start_date:
        type: string
        description: "Filter by start date (ISO 8601 format)"
      end_date:
        type: string
        description: "Filter by end date (ISO 8601 format)"
    required: []

- slug: levelhead_get_campaign
  name: Get Campaign
  description: |
    Get detailed information for a specific analytics campaign including status and configuration.
    Returns the complete campaign data with all associated metrics and settings.
    This provides full campaign details for performance analysis and reporting.
  provider: levelhead
  endpoint: /api/v1/campaigns/{campaign_id}
  method: GET
  scopes:
    - campaigns:read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaign_id:
        type: string
        description: "The unique campaign ID"
    required:
      - campaign_id

- slug: levelhead_create_campaign
  name: Create Campaign
  description: |
    Create a new analytics campaign with specified parameters.
    Returns the created campaign with its unique ID and initial configuration.
    This provisions a new analytics tracking campaign in Levelhead.
  provider: levelhead
  endpoint: /api/v1/campaigns
  method: POST
  scopes:
    - campaigns:write
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      name:
        type: string
        description: "Name for the campaign"
      description:
        type: string
        description: "Optional description"
      start_date:
        type: string
        description: "Start date (ISO 8601 format)"
      end_date:
        type: string
        description: "End date (ISO 8601 format)"
      status:
        type: string
        description: "Initial status (active, paused)"
    required:
      - name

- slug: levelhead_list_audiences
  name: List Audiences
  description: |
    List all audience segments defined in your Levelhead account.
    Returns audience names, IDs, types, and member counts for each segment.
    Use this to discover target audiences for campaign analytics.
  provider: levelhead
  endpoint: /api/v1/audiences
  method: GET
  scopes:
    - audiences:read
  tags:
    - audiences
  input_schema:
    type: object
    description: Parameters for listing audiences
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      per_page:
        type: integer
        description: "Number of items per page (default: 20)"
      type:
        type: string
        description: "Filter by audience type"
