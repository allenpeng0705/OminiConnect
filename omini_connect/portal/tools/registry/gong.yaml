- slug: gong_list_calls
  name: List Calls
  description: |
    Retrieve a list of all calls recorded in Gong.
  provider: gong
  endpoint: /calls
  method: GET
  scopes:
    - read
  tags:
    - calls
  input_schema:
    type: object
    description: Filter and pagination options for listing calls
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      page_size:
        type: integer
        description: "Number of calls per page (default: 30, max: 200)"
      from_date_time:
        type: string
        format: date-time
        description: "Filter calls from this date (ISO 8601)"
      to_date_time:
        type: string
        format: date-time
        description: "Filter calls until this date (ISO 8601)"
    required: []

- slug: gong_get_call
  name: Get Call
  description: |
    Retrieve details of a specific call by ID including transcript and content.
  provider: gong
  endpoint: /calls/{id}
  method: GET
  scopes:
    - read
  tags:
    - calls
  input_schema:
    type: object
    description: Parameters for getting a specific call
    properties:
      id:
        type: string
        description: "Call ID"
    required:
      - id

