# MessageBird Tools - Allowlist
# Curated subset of MessageBird API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. messagebird_list_messages        - List messages
# 2. messagebird_get_message          - Get message details
# 3. messagebird_send_message         - Send message
# 4. messagebird_send_sms             - Send SMS
# 5. messagebird_list_conversations  - List conversations
# 6. messagebird_get_conversation     - Get conversation details
# 7. messagebird_create_conversation  - Create conversation
# 8. messagebird_get_balance         - Get account balance
# 9. messagebird_list_webhooks       - List webhooks
# 10. messagebird_create_webhook     - Create webhook

- slug: messagebird_list_messages
  name: List Messages
  description: |
    List all SMS messages sent or received through MessageBird.
  provider: messagebird
  endpoint: /messages
  method: GET
  scopes:
    - read
  tags:
    - messages
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      limit:
        type: integer
        description: "Max results (default 100)"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: messagebird_get_message
  name: Get Message
  description: |
    Get detailed information about a specific MessageBird message.
  provider: messagebird
  endpoint: /messages/{messageId}
  method: GET
  scopes:
    - read
  tags:
    - messages
    - read
  input_schema:
    type: object
    description: Parameters for getting a message
    properties:
      messageId:
        type: string
        description: "Message ID"
    required:
      - messageId

- slug: messagebird_send_message
  name: Send Message
  description: |
    Send a message via MessageBird.
  provider: messagebird
  endpoint: /messages
  method: POST
  scopes:
    - write
  tags:
    - messages
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      recipients:
        type: array
        description: "Recipient phone numbers"
      body:
        type: string
        description: "Message text"
      originator:
        type: string
        description: "Sender name or phone number"
      reference:
        type: string
        description: "Custom reference string"
    required:
      - recipients
      - body

- slug: messagebird_send_sms
  name: Send SMS
  description: |
    Send an SMS to a single recipient via MessageBird.
  provider: messagebird
  endpoint: /messages
  method: POST
  scopes:
    - write
  tags:
    - messages
    - sms
    - send
  input_schema:
    type: object
    description: Parameters for sending an SMS
    properties:
      recipient:
        type: string
        description: "Recipient phone number"
      message:
        type: string
        description: "Message text"
      originator:
        type: string
        description: "Sender name or phone number"
    required:
      - recipient
      - message

- slug: messagebird_list_conversations
  name: List Conversations
  description: |
    List all conversations in MessageBird's omnichannel inbox.
  provider: messagebird
  endpoint: /conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      limit:
        type: integer
        description: "Max results (default 100)"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: messagebird_get_conversation
  name: Get Conversation
  description: |
    Get detailed information about a specific conversation.
  provider: messagebird
  endpoint: /conversations/{conversationId}
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversationId:
        type: string
        description: "Conversation ID"
    required:
      - conversationId

- slug: messagebird_create_conversation
  name: Create Conversation
  description: |
    Create a new conversation or send an initial message.
  provider: messagebird
  endpoint: /conversations
  method: POST
  scopes:
    - write
  tags:
    - conversations
    - create
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      recipient:
        type: string
        description: "Recipient contact identifier"
      channel:
        type: string
        description: "Messaging channel (sms, whatsapp, etc.)"
      message:
        type: string
        description: "Initial message content"
    required:
      - recipient
      - channel

- slug: messagebird_get_balance
  name: Get Balance
  description: |
    Get your MessageBird account balance and currency.
  provider: messagebird
  endpoint: /balance
  method: GET
  scopes:
    - read
  tags:
    - account
    - balance
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: messagebird_list_webhooks
  name: List Webhooks
  description: |
    List all webhooks configured in MessageBird.
  provider: messagebird
  endpoint: /webhooks
  method: GET
  scopes:
    - read
  tags:
    - webhooks
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing webhooks
    properties:
      limit:
        type: integer
        description: "Max results (default 100)"
        default: 100
    required: []

- slug: messagebird_create_webhook
  name: Create Webhook
  description: |
    Create a new webhook to receive event notifications.
  provider: messagebird
  endpoint: /webhooks
  method: POST
  scopes:
    - write
  tags:
    - webhooks
    - create
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      url:
        type: string
        description: "Webhook URL"
      token:
        type: string
        description: "Secret token for webhook verification"
      channel:
        type: string
        description: "Channel for the webhook"
    required:
      - url
      - token
