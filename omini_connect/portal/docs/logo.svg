<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Gateway/Router symbol - stylized O with entrance -->
  <g transform="translate(128, 128)">
    <!-- Outer gateway ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="url(#gatewayGrad)" stroke-width="8" stroke-dasharray="40 12"/>

    <!-- Inner gateway entrance (router port) -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#nodeGrad)" stroke-width="6"/>

    <!-- Entry arrows suggesting router/gateway -->
    <g fill="url(#nodeGrad)">
      <polygon points="0,-95 -12,-80 12,-80"/>
      <polygon points="95,0 80,-12 80,12"/>
      <polygon points="0,95 -12,80 12,80"/>
      <polygon points="-95,0 -80,-12 -80,12"/>
    </g>

    <!-- AI Neural network nodes inside -->
    <!-- Central AI brain node -->
    <circle cx="0" cy="0" r="18" fill="url(#nodeGrad)"/>
    <circle cx="0" cy="0" r="10" fill="#1E1B4B"/>
    <circle cx="0" cy="0" r="6" fill="url(#nodeGrad)"/>

    <!-- Surrounding neural nodes -->
    <g fill="#fff">
      <circle cx="-35" cy="-30" r="8"/>
      <circle cx="35" cy="-30" r="8"/>
      <circle cx="-45" cy="10" r="8"/>
      <circle cx="45" cy="10" r="8"/>
      <circle cx="-30" cy="45" r="8"/>
      <circle cx="30" cy="45" r="8"/>
      <circle cx="0" cy="-50" r="6"/>
      <circle cx="50" cy="0" r="6"/>
      <circle cx="0" cy="50" r="6"/>
      <circle cx="-50" cy="0" r="6"/>
    </g>

    <!-- Neural connections -->
    <g stroke="url(#nodeGrad)" stroke-width="2" fill="none" opacity="0.7">
      <!-- Outer ring connections -->
      <line x1="-35" y1="-30" x2="35" y2="-30"/>
      <line x1="35" y1="-30" x2="45" y2="10"/>
      <line x1="45" y1="10" x2="30" y2="45"/>
      <line x1="30" y1="45" x2="-30" y2="45"/>
      <line x1="-30" y1="45" x2="-45" y2="10"/>
      <line x1="-45" y1="10" x2="-35" y2="-30"/>

      <!-- Connections to center -->
      <line x1="-35" y1="-30" x2="0" y2="0" stroke-dasharray="4 3"/>
      <line x1="35" y1="-30" x2="0" y2="0" stroke-dasharray="4 3"/>
      <line x1="-45" y1="10" x2="0" y2="0" stroke-dasharray="4 3"/>
      <line x1="45" y1="10" x2="0" y2="0" stroke-dasharray="4 3"/>
      <line x1="-30" y1="45" x2="0" y2="0" stroke-dasharray="4 3"/>
      <line x1="30" y1="45" x2="0" y2="0" stroke-dasharray="4 3"/>
    </g>

    <!-- AI sparkles -->
    <g fill="#06B6D4">
      <circle cx="-65" cy="-55" r="3"/>
      <circle cx="65" cy="-55" r="3"/>
      <circle cx="-70" cy="40" r="2"/>
      <circle cx="70" cy="40" r="2"/>
    </g>
  </g>
</svg>
