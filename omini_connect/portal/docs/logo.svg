<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>

  <!-- Outer ring nodes -->
  <circle cx="128" cy="30" r="12" fill="#fff" opacity="0.95"/>
  <circle cx="216" cy="78" r="12" fill="#fff" opacity="0.95"/>
  <circle cx="226" cy="168" r="12" fill="#fff" opacity="0.95"/>
  <circle cx="160" cy="226" r="12" fill="#fff" opacity="0.95"/>
  <circle cx="60" cy="200" r="12" fill="#fff" opacity="0.95"/>
  <circle cx="30" cy="120" r="12" fill="#fff" opacity="0.95"/>
  <circle cx="60" cy="56" r="12" fill="#fff" opacity="0.95"/>

  <!-- Connection lines -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.6">
    <line x1="128" y1="30" x2="216" y2="78"/>
    <line x1="216" y1="78" x2="226" y2="168"/>
    <line x1="226" y1="168" x2="160" y2="226"/>
    <line x1="160" y1="226" x2="60" y2="200"/>
    <line x1="60" y1="200" x2="30" y2="120"/>
    <line x1="30" y1="120" x2="60" y2="56"/>
    <line x1="60" y1="56" x2="128" y2="30"/>
    <!-- Cross connections for mesh effect -->
    <line x1="128" y1="30" x2="226" y2="168" opacity="0.3"/>
    <line x1="216" y1="78" x2="160" y2="226" opacity="0.3"/>
    <line x1="60" y1="200" x2="60" y2="56" opacity="0.3"/>
    <line x1="30" y1="120" x2="160" y2="226" opacity="0.3"/>
  </g>

  <!-- Center hub -->
  <circle cx="128" cy="128" r="36" fill="#fff"/>
  <circle cx="128" cy="128" r="28" fill="url(#bg)"/>

  <!-- Inner O mark -->
  <text x="128" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#fff" text-anchor="middle">O</text>

  <!-- Orbiting dots -->
  <circle cx="128" cy="76" r="6" fill="url(#accent)"/>
  <circle cx="180" cy="128" r="6" fill="url(#accent)"/>
  <circle cx="128" cy="180" r="6" fill="url(#accent)"/>
  <circle cx="76" cy="128" r="6" fill="url(#accent)"/>
</svg>
