<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Logo icon group -->
  <g transform="translate(20, 10)">
    <!-- Background circle -->
    <circle cx="60" cy="60" r="56" fill="url(#bg)"/>

    <!-- Outer ring nodes -->
    <circle cx="60" cy="12" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="102" cy="30" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="108" cy="72" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="76" cy="102" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="32" cy="92" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="18" cy="54" r="6" fill="#fff" opacity="0.95"/>
    <circle cx="32" cy="20" r="6" fill="#fff" opacity="0.95"/>

    <!-- Connection lines -->
    <g stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.5">
      <line x1="60" y1="12" x2="102" y2="30"/>
      <line x1="102" y1="30" x2="108" y2="72"/>
      <line x1="108" y1="72" x2="76" y2="102"/>
      <line x1="76" y1="102" x2="32" y2="92"/>
      <line x1="32" y1="92" x2="18" y2="54"/>
      <line x1="18" y1="54" x2="32" y2="20"/>
      <line x1="32" y1="20" x2="60" y2="12"/>
    </g>

    <!-- Center hub -->
    <circle cx="60" cy="57" r="20" fill="#fff"/>
    <circle cx="60" cy="57" r="15" fill="url(#bg)"/>

    <!-- Inner O mark -->
    <text x="60" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">O</text>

    <!-- Orbiting dots -->
    <circle cx="60" cy="33" r="4" fill="url(#accent)"/>
    <circle cx="83" cy="57" r="4" fill="url(#accent)"/>
    <circle cx="60" cy="81" r="4" fill="url(#accent)"/>
    <circle cx="37" cy="57" r="4" fill="url(#accent)"/>
  </g>

  <!-- Text group -->
  <g transform="translate(150, 0)">
    <!-- Brand name -->
    <text x="0" y="58" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="#1F2937">OminiConnect</text>

    <!-- Tagline -->
    <text x="4" y="90" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#6B7280">A universal API gateway for AI agents</text>
  </g>
</svg>
