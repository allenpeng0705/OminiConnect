# Test config for hybrid inference integration
listen: 127.0.0.1:8089
default_backend: "http://127.0.0.1:5023"

# Enable hybrid inference
hybrid_inference:
  enabled: true
  local_llm:
    enabled: true
    endpoint: "http://127.0.0.1:11434/v1/chat/completions"
    model: "llama3"
    timeout_ms: 30000
  targets:
    - name: minimax
      provider: openai_compatible
      upstream: "https://api.minimaxi.com/v1/chat/completions"
      api_key_name: "MINIMAX_API_KEY"
  cloud_fallback:
    enabled: true
    target: "minimax"
  rules:
    - name: sensitive_data
      priority: 1
      conditions:
        - type: content_matches
          pattern:
            type: keywords
            values: ["工资", "薪酬", "银行", "身份证"]
      action: route_to_local
    - name: catch_all
      priority: 0
      conditions:
        - type: always
      action: route_to_cloud

routes:
  - path_prefix: /v1/chat
    backend_base: "http://127.0.0.1:5023"
    type: openai
