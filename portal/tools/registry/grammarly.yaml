- slug: grammarly_list_analytics
  name: List Analytics
  description: |
    List analytics data for the organization.
    Returns usage statistics and writing metrics.
  provider: grammarly
  endpoint: /v2/analytics/users
  method: GET
  scopes:
    - read
  tags:
    - analytics
    - list
  input_schema:
    type: object
    description: Parameters for listing analytics
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []
