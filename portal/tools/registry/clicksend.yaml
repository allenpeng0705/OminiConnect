  input_schema:
    type: object
    description: Parameters for listing SMS campaigns
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: clicksend_get_sms_campaign
  name: Get SMS Campaign
  description: |
    Retrieve details of a specific SMS campaign including status and message content.
  provider: clicksend
  endpoint: /v3/sms-campaign/{id}
  method: GET
  scopes: []
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting an SMS campaign
    properties:
      id:
        type: integer
        description: "Campaign ID"
    required:
      - id

- slug: clicksend_list_email_campaigns
  name: List Email Campaigns
  description: |
    List all email campaigns showing campaign names, status, and recipient count.
  provider: clicksend
  endpoint: /v3/email-campaign
  method: GET
  scopes: []
  tags:
