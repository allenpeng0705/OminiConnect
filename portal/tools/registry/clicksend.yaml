# ClickSend Tools - Allowlist
# Curated subset of the ClickSend API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. clicksend_list_contacts               - List contacts
# 2. clicksend_get_contact                 - Get contact details
# 3. clicksend_create_contact               - Create a contact
# 4. clicksend_list_sms_messages           - List SMS messages
# 5. clicksend_send_sms                    - Send an SMS
# 6. clicksend_list_sms_campaigns           - List SMS campaigns
# 7. clicksend_get_sms_campaign            - Get SMS campaign details
# 8. clicksend_list_email_campaigns         - List email campaigns
# 9. clicksend_get_email_campaign          - Get email campaign details
# 10. clicksend_get_account              - Get account info

- slug: clicksend_list_contacts
  name: List clicksend Contacts
  description: |
    List all contacts in the account showing names, emails, and phone numbers.
  provider: clicksend
  endpoint: /v3/contact
  method: GET
  scopes: []
  tags:
    - contacts
    - communication
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: clicksend_get_contact
  name: Get clicksend Contact
  description: |
    Retrieve details of a specific contact including name, email, and phone number.
  provider: clicksend
  endpoint: /v3/contact/{id}
  method: GET
  scopes: []
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: clicksend_create_contact
  name: Create Contact
  description: |
    Create a new contact with first name, last name, email, and phone number.
  provider: clicksend
  endpoint: /v3/contact
  method: POST
  scopes: []
  tags:
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
    required:
      - first_name
      - last_name

- slug: clicksend_list_sms_messages
  name: List SMS Messages
  description: |
    List all sent SMS messages showing recipient, content, and delivery status.
  provider: clicksend
  endpoint: /v3/sms
  method: GET
  scopes: []
  tags:
    - sms
    - communication
  input_schema:
    type: object
    description: Parameters for listing SMS messages
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: clicksend_send_sms
  name: Send SMS
  description: |
    Send an SMS message to a recipient with text content.
  provider: clicksend
  endpoint: /v3/sms/send
  method: POST
  scopes: []
  tags:
    - sms
    - send
  input_schema:
    type: object
    description: Parameters for sending SMS
    properties:
      to:
        type: string
        description: "Recipient phone number"
      body:
        type: string
        description: "SMS message body"
    required:
      - to
      - body

- slug: clicksend_list_sms_campaigns
  name: List SMS Campaigns
  description: |
    List all SMS campaigns showing campaign names, status, and recipient count.
  provider: clicksend
  endpoint: /v3/sms-campaign
  method: GET
  scopes: []
