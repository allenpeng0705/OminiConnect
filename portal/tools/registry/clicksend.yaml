- slug: clicksend_get_email_campaign
  name: Get Email Campaign
  description: |
    Retrieve details of a specific email campaign including subject and recipient count.
  provider: clicksend
  endpoint: /v3/email-campaign/{id}
  method: GET
  scopes: []
  tags:
    - campaigns
