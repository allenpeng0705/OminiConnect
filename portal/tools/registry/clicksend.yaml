- slug: clicksend_get_account
  name: Get clicksend Account
  description: |
    Retrieve account information including balance and sender ID settings.
  provider: clicksend
  endpoint: /v3/account
  method: GET
  scopes: []
  tags:
    - account
    - read
  input_schema:
    type: object
    description: No parameters
    properties: {}
    required: []
