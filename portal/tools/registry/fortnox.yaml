# Fortnox Tools - Allowlist
# Curated subset of the Fortnox API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fortnox_list_invoices     - List all invoices
# 2. fortnox_get_invoice        - Get details of a specific invoice
# 3. fortnox_create_invoice    - Create a new invoice
# 4. fortnox_list_customers     - List all customers
# 5. fortnox_get_customer      - Get details of a specific customer
# 6. fortnox_list_suppliers     - List all suppliers
# 7. fortnox_get_supplier       - Get details of a specific supplier
# 8. fortnox_list_products      - List all products
# 9. fortnox_get_product        - Get details of a specific product
# 10. fortnox_list_employees   - List all employees

- slug: fortnox_list_invoices
  name: List fortnox Invoices
  description: |
    List all invoices in the Fortnox accounting system with optional filtering by status, customer, or date range. Returns invoice numbers, customer names, amounts, and payment status.
  provider: fortnox
  endpoint: /invoices
  method: GET
  scopes:
    - invoices:read
  tags:
    - invoices
    - accounting
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status: draft, printed, sent, paid, overdue"
      customer_id:
        type: string
        description: "Filter by customer ID"
      date_from:
        type: string
        description: "Filter by invoice date from (YYYY-MM-DD)"
      date_to:
        type: string
        description: "Filter by invoice date to (YYYY-MM-DD)"
      per_page:
        type: integer
        description: "Results per page (default 50)"
        default: 50
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: fortnox_get_invoice
  name: Get fortnox Invoice
  description: |
    Retrieve detailed information about a specific Fortnox invoice including line items, totals, tax breakdown, and payment status.
  provider: fortnox
  endpoint: /invoices/{id}
  method: GET
  scopes:
    - invoices:read
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      id:
        type: string
        description: "Invoice ID"
    required:
      - id

- slug: fortnox_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice for a customer in Fortnox with line items, pricing, and tax calculations. Returns the created invoice with its unique number.
  provider: fortnox
  endpoint: /invoices
  method: POST
  scopes:
    - invoices:write
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Parameters for creating an invoice
    properties:
      customer_id:
        type: string
        description: "Customer ID"
      invoice_date:
        type: string
        description: "Invoice date (YYYY-MM-DD)"
      due_date:
        type: string
        description: "Payment due date (YYYY-MM-DD)"
      lines:
        type: array
        description: "Invoice line items"
        items:
          type: object
          properties:
            article_id:
              type: string
              description: "Product/Article ID"
            quantity:
              type: number
              description: "Quantity"
            price:
              type: number
              description: "Unit price"
      remarks:
        type: string
        description: "Invoice remarks/notes"
    required:
      - customer_id

- slug: fortnox_list_customers
  name: List Customers
  description: |
    List all customers in the Fortnox accounting system with optional search filtering. Returns customer names, email addresses, phone numbers, and outstanding balances.
  provider: fortnox
  endpoint: /customers
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
    - accounting
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      search:
        type: string
        description: "Search by name, email, or customer number"
      price_list:
        type: string
        description: "Filter by price list"
      per_page:
        type: integer
        description: "Results per page (default 50)"
        default: 50
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

