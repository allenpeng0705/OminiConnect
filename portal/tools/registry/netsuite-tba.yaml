# NetSuite (TBA) Tools - Allowlist
# Curated subset of NetSuite SuiteTalks REST API for AI agent use.
# Token-Based Authentication (TBA) via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. netsuite_list_customers           - List customers
# 2. netsuite_get_customer            - Get customer details
# 3. netsuite_list_invoices           - List invoices
# 4. netsuite_get_invoice             - Get invoice details
# 5. netsuite_list_items              - List items/products
# 6. netsuite_list_vendors             - List vendors
# 7. netsuite_list_purchase_orders     - List purchase orders
# 8. netsuite_list_employees          - List employees
# 9. netsuite_list_departments       - List departments
# 10. netsuite_get_server_time         - Get server time

- slug: netsuite_list_customers
  name: List Customers
  description: |
    List all customers in NetSuite.
  provider: netsuite-tba
  endpoint: /customer
  method: GET
  scopes:
    - rest_webservices
  tags:
    - crm
    - customers
    - accounting
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Number of records (default 10, max 1000)"
        default: 10
      offset:
        type: integer
        description: "Record offset for pagination"
        default: 0
    required: []

- slug: netsuite_get_customer
  name: Get Customer
  description: |
    Get detailed information for a specific customer.
  provider: netsuite-tba
  endpoint: /customer/{id}
  method: GET
  scopes:
    - rest_webservices
  tags:
    - crm
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      id:
        type: integer
        description: "Customer ID"
    required:
      - id

