# Perimeter81 Tools - Allowlist
# Curated subset of Perimeter81 API for AI agent use.
# Two-Step API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. perimeter81_list_users             - List users
# 2. perimeter81_get_user               - Get user details
# 3. perimeter81_list_networks           - List networks
# 4. perimeter81_get_network            - Get network details
# 5. perimeter81_list_devices           - List devices
# 6. perimeter81_get_device            - Get device details
# 7. perimeter81_list_policies         - List policies
# 8. perimeter81_get_policy            - Get policy details
# 9. perimeter81_list_activity_logs    - List activity logs
# 10. perimeter81_get_organization      - Get organization info

- slug: perimeter81_list_users
  name: List perimeter81 Users
  description: |
    List all users in the organization, including their names, email addresses, roles, and activation status.
  provider: perimeter81
  endpoint: /users
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: perimeter81_get_user
  name: Get perimeter81 User
  description: |
    Retrieve detailed information about a specific user, including their profile, role, permissions, and network assignments.
  provider: perimeter81
  endpoint: /users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

