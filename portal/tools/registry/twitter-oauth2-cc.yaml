# Twitter (OAuth2 CC) Tools - Allowlist
# Curated subset of Twitter (OAuth2 CC) API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. twitter_list_tweets           - List tweets from timeline
# # 2. twitter_get_tweet           - Get tweet details
# # 3. twitter_create_tweet           - Post a new tweet
# # 4. twitter_delete_tweet           - Delete a tweet
# # 5. twitter_list_users           - List Twitter users
# # 6. twitter_get_user           - Get user profile
# # 7. twitter_search_tweets           - Search for tweets
# # 8. twitter_get_likes           - Get tweets liked by a user
# # 9. twitter_like_tweet           - Like a tweet
# # 10. twitter_unlike_tweet           - Unlike a tweet

- slug: twitter_list_tweets
  name: List Tweets
  description: |
    List tweets from timeline
  provider: twitter-oauth2-cc
  endpoint: /2/tweets
  method: GET
  scopes:
    - tweet.read
  tags:
    - twitter-oauth2-cc
  input_schema:
    type: object
    description: Parameters for list tweets
    properties: {}
    required: []

