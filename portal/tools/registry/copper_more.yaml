- slug: copper_more_list_projects
  name: List copper_more Projects
  description: |
    List all projects in Copper CRM, returning project IDs, names, status, and member assignments.
  provider: copper_more
  endpoint: /projects
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
    - crm
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of results per page"
      sort_by:
        type: string
        description: "Field to sort by"
      sort_order:
        type: string
        description: "asc or desc"
      search:
        type: string
        description: "Search term for project name"
    required: []

- slug: copper_more_get_project
  name: Get copper_more Project
  description: |
    Get details of a specific Copper CRM project including its description, status, and task assignments.
  provider: copper_more
  endpoint: /projects/{id}
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
    - crm
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      id:
        type: integer
        description: "Project ID"
    required:
      - id

- slug: copper_more_list_tasks
