# Teamtailor Tools - Allowlist
# Curated subset of Teamtailor API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. teamtailor_list_jobs           - List all job postings
# # 2. teamtailor_get_job           - Get details of a job posting
# # 3. teamtailor_list_candidates           - List all candidates
# # 4. teamtailor_get_candidate           - Get candidate details
# # 5. teamtailor_list_departments           - List all departments
# # 6. teamtailor_list_offices           - List all offices
# # 7. teamtailor_list_users           - List all users
# # 8. teamtailor_list_questions           - List all questions for job applications
# # 9. teamtailor_list_interviews           - List all scheduled interviews
# # 10. teamtailor_create_candidate           - Create a new candidate

- slug: teamtailor_list_jobs
  name: List Jobs
  description: |
    List all job postings
  provider: teamtailor
  endpoint: /jobs
  method: GET
  scopes:
    - api
  tags:
    - teamtailor
  input_schema:
    type: object
    description: Parameters for list jobs
    properties: {}
    required: []

- slug: teamtailor_get_job
  name: Get Job
  description: |
    Get details of a job posting
  provider: teamtailor
  endpoint: /jobs/{job_id}
  method: GET
  scopes:
    - api
  tags:
    - teamtailor
  input_schema:
    type: object
    description: Parameters for get job
    properties: {}
    required: []

