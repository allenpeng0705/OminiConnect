- slug: rock-gym-pro_create_membership
  name: Create Membership
  description: |
    Create a new membership for a member.
  provider: rock-gym-pro
  endpoint: /v1/memberships
  method: POST
  scopes:
    - memberships:write
  tags:
    - memberships
    - gym
    - billing
    - create
  input_schema:
    type: object
    description: Parameters for creating a membership
    properties:
      memberId:
        type: string
        description: "Member ID"
      planId:
        type: string
        description: "Membership plan ID"
      startDate:
        type: string
        description: "Start date (ISO 8601)"
    required:
      - memberId
      - planId

