# Rock-gym-pro Tools - Allowlist
# Curated subset of Rock Gym Pro API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. rock-gym-pro_list_members          - List all members
# 2. rock-gym-pro_get_member            - Get member details
# 3. rock-gym-pro_create_member         - Create a member
# 4. rock-gym-pro_list_memberships      - List memberships
# 5. rock-gym-pro_create_membership      - Create a membership
# 6. rock-gym-pro_list_visits           - List member visits
# 7. rock-gym-pro_list_classes          - List classes
# 8. rock-gym-pro_create_booking        - Create a class booking
# 9. rock-gym-pro_list_staff            - List staff members
# 10. rock-gym-pro_get_revenue_report   - Get revenue report

- slug: rock-gym-pro_list_members
  name: List Members
  description: |
    Retrieve a list of all gym members.
  provider: rock-gym-pro
  endpoint: /v1/members
  method: GET
  scopes:
    - members:read
  tags:
    - members
    - gym
    - fitness
  input_schema:
    type: object
    description: Parameters for listing members
    properties:
      limit:
        type: integer
        description: "Number of members"
        default: 50
      status:
        type: string
        description: "Filter by status: active, inactive, paused"
    required: []

- slug: rock-gym-pro_get_member
  name: Get Member
  description: |
    Get details of a specific member.
  provider: rock-gym-pro
  endpoint: /v1/members/{memberId}
  method: GET
  scopes:
    - members:read
  tags:
    - members
    - gym
    - fitness
  input_schema:
    type: object
    description: Parameters for getting a member
    properties:
      memberId:
        type: string
        description: "The member ID"
    required:
      - memberId

- slug: rock-gym-pro_create_member
  name: Create Member
  description: |
    Create a new gym member.
  provider: rock-gym-pro
  endpoint: /v1/members
  method: POST
  scopes:
    - members:write
  tags:
    - members
    - gym
    - fitness
    - create
  input_schema:
    type: object
    description: Parameters for creating a member
    properties:
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
    required:
      - firstName
      - lastName
      - email

