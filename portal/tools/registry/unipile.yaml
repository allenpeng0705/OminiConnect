# Unipile Tools - Allowlist
# Curated subset of Unipile API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. unipile_list_messages           - List messages from channels
# # 2. unipile_send_message           - Send a message
# # 3. unipile_list_threads           - List message threads
# # 4. unipile_get_thread           - Get thread details
# # 5. unipile_list_contacts           - List contacts
# # 6. unipile_get_contact           - Get contact details
# # 7. unipile_list_channels           - List available channels
# # 8. unipile_get_channel           - Get channel details
# # 9. unipile_list_accounts           - List connected accounts
# # 10. unipile_webhook_test           - Test webhook configuration

- slug: unipile_list_messages
  name: List Messages
  description: |
    List messages from channels
  provider: unipile
  endpoint: /api/v1/messages
  method: GET
  scopes:
    - 
  tags:
    - unipile
  input_schema:
    type: object
    description: Parameters for list messages
    properties: {}
    required: []

