# Microsoft OAuth2 CC Tools - Allowlist
# Curated subset of Microsoft Graph API for AI agent use.
# OAUTH2_CC via Nango (Client Credentials).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ms_cc_list_users              - List all users
# 2. ms_cc_get_user               - Get user details
# 3. ms_cc_list_groups            - List groups
# 4. ms_cc_get_group              - Get group details
# 5. ms_cc_list_applications      - List applications
# 6. ms_cc_get_application        - Get application details
# 7. ms_cc_list_service_principals - List service principals
# 8. ms_cc_list_audit_logs       - List audit logs
# 9. ms_cc_list_sign_ins         - List sign-ins
# 10. ms_cc_list_reports         - Get usage reports

- slug: ms_cc_list_users
  name: List microsoft-oauth2-cc Users
  description: |
    List all users in the organization.
  provider: microsoft-oauth2-cc
  endpoint: /v1.0/users
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      $filter:
        type: string
        description: "OData filter expression"
      $top:
        type: integer
        description: "Max results"
        default: 50
    required: []

- slug: ms_cc_get_user
  name: Get microsoft-oauth2-cc User
  description: |
    Get detailed information about a specific user.
  provider: microsoft-oauth2-cc
  endpoint: /v1.0/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID or email"
    required:
      - userId

