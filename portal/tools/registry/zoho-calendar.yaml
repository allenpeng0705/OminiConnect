# Zoho Calendar Tools - Allowlist
# Curated subset of Zoho Calendar API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_calendar_list_calendars           - List all calendars
# # 2. zoho_calendar_get_calendar           - Get calendar details
# # 3. zoho_calendar_list_events           - List all events
# # 4. zoho_calendar_get_event           - Get event details
# # 5. zoho_calendar_create_event           - Create a new event
# # 6. zoho_calendar_update_event           - Update an event
# # 7. zoho_calendar_delete_event           - Delete an event
# # 8. zoho_calendar_list_tasks           - List all tasks
# # 9. zoho_calendar_get_task           - Get task details
# # 10. zoho_calendar_create_task           - Create a new task

- slug: zoho_calendar_list_calendars
  name: List Calendars
  description: |
    List all calendars
  provider: zoho-calendar
  endpoint: /v1/calendars
  method: GET
  scopes:
    - read
  tags:
    - zoho-calendar
  input_schema:
    type: object
    description: Parameters for list calendars
    properties: {}
    required: []

