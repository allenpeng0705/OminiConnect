# LastPass Tools - Allowlist
# Curated subset of LastPass API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lastpass_list_shared_folders  - List shared folders
# 2. lastpass_get_shared_folder   - Get shared folder details
# 3. lastpass_list_users          - List users
# 4. lastpass_get_user           - Get user details
# 5. lastpass_list_groups        - List groups
# 6. lastpass_get_group          - Get group details
# 7. lastpass_list_policies      - List policies
# 8. lastpass_list_reports       - List reports
# 9. lastpass_list_company_settings - List company settings
# 10. lastpass_get_company_info   - Get company info

- slug: lastpass_list_shared_folders
  name: List Shared Folders
  description: |
    List all shared folders in LastPass. Shared folders organize and distribute passwords across teams securely.
  provider: lastpass
  endpoint: /api/1.0/shared_folders
  method: GET
  scopes: []
  tags:
    - shared_folders
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing shared folders
    properties: {}
    required: []

- slug: lastpass_get_shared_folder
  name: Get Shared Folder
  description: |
    Get details about a specific LastPass shared folder by ID. Returns folder name, member access levels, and included passwords.
  provider: lastpass
  endpoint: /api/1.0/shared_folders/{folder_id}
  method: GET
  scopes: []
  tags:
    - shared_folders
    - read
  input_schema:
    type: object
    description: Parameters for getting a shared folder
    properties:
      folder_id:
        type: string
        description: "Shared folder ID"
    required:
      - folder_id

