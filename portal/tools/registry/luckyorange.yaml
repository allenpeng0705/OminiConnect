# Lucky Orange Tools - Allowlist
# Curated subset of Lucky Orange API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. luckyorange_list_recordings - List session recordings
# 2. luckyorange_get_recording   - Get recording details
# 3. luckyorange_list_heatmaps   - List heatmaps
# 4. luckyorange_get_heatmap     - Get heatmap details
# 5. luckyorange_list_chats      - List live chat conversations
# 6. luckyorange_get_chat        - Get chat details
# 7. luckyorange_list_funnels    - List conversion funnels
# 8. luckyorange_get_funnel      - Get funnel details
# 9. luckyorange_list_visits     - List website visits
# 10. luckyorange_get_visit      - Get visit details

- slug: luckyorange_list_recordings
  name: List Recordings
  description: |
    Retrieve a list of session recordings with filtering options and pagination.
    Returns recording IDs, visitor IDs, and duration for each recording.
    Use this to discover user sessions and analyze website behavior.
  provider: luckyorange
  endpoint: /sites/{siteId}/recordings
  method: GET
  scopes:
    - luckyorange.recordings.read
  tags:
    - recordings
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing recordings
    properties:
      siteId:
        type: string
        description: "Lucky Orange site ID"
      limit:
        type: integer
        description: "Maximum number of recordings to return (default 50)"
      offset:
        type: integer
        description: "Offset for pagination"
    required:
      - siteId

- slug: luckyorange_get_recording
  name: Get Recording
  description: |
    Retrieve a specific session recording by its ID.
    Returns the complete recording data with all associated information.
    This provides full recording data for user behavior analysis.
  provider: luckyorange
  endpoint: /sites/{siteId}/recordings/{recordingId}
  method: GET
  scopes:
    - luckyorange.recordings.read
  tags:
    - recordings
    - read
  input_schema:
    type: object
    description: Parameters for getting a recording
    properties:
      siteId:
        type: string
        description: "Lucky Orange site ID"
      recordingId:
        type: string
        description: "Unique identifier of the recording"
    required:
      - siteId
      - recordingId

