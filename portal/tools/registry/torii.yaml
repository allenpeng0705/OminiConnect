# Torii Tools - Allowlist
# Curated subset of Torii API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. torii_list_apps           - List all tracked SaaS applications
# # 2. torii_get_app           - Get application details
# # 3. torii_list_users           - List all users across apps
# # 4. torii_get_user           - Get user details
# # 5. torii_list_groups           - List all groups
# # 6. torii_create_app           - Add a new SaaS app to track
# # 7. torii_update_app           - Update app details
# # 8. torii_list_activities           - List user activity logs
# # 9. torii_list_integrations           - List connected integrations
# # 10. torii_get_spend           - Get spending analytics

- slug: torii_list_apps
  name: List Apps
  description: |
    List all tracked SaaS applications
  provider: torii
  endpoint: /api/v1/apps
  method: GET
  scopes:
    - read
  tags:
    - torii
  input_schema:
    type: object
    description: Parameters for list apps
    properties: {}
    required: []

- slug: torii_get_app
  name: Get App
  description: |
