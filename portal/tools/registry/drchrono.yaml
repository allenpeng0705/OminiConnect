# DrChrono Tools - Allowlist
# Curated subset of the DrChrono API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. drchrono_list_patients            - List patients
# 2. drchrono_get_patient             - Get patient details
# 3. drchrono_list_appointments       - List appointments
# 4. drchrono_get_appointment         - Get appointment details
# 5. drchrono_list_calendar_entries   - List calendar entries
# 6. drchrono_get_calendar_entry      - Get calendar entry details
# 7. drchrono_list_insurance          - List insurance providers
# 8. drchrono_get_insurance           - Get insurance details
# 9. drchrono_list_offices           - List offices
# 10. drchrono_get_office           - Get office details

- slug: drchrono_list_patients
  name: List Patients
  description: |
    List all patients in the DrChrono system with optional pagination. Returns patient names, dates of birth, contact information, and insurance details for each record.
  provider: drchrono
  endpoint: /api/patients
  method: GET
  scopes: []
  tags:
    - patients
    - healthcare
    - list
  input_schema:
    type: object
    description: Parameters for listing patients
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: drchrono_get_patient
  name: Get Patient
  description: |
    Retrieve detailed information about a specific DrChrono patient including their full medical record, contact details, insurance coverage, and appointment history.
  provider: drchrono
  endpoint: /api/patients/{patient_id}
  method: GET
  scopes: []
  tags:
    - patients
    - healthcare
    - read
  input_schema:
    type: object
    description: Parameters for getting a patient
    properties:
      patient_id:
        type: string
        description: "Patient ID"
    required:
      - patient_id

- slug: drchrono_list_appointments
  name: List Appointments
  description: |
    List all appointments in DrChrono with optional date filtering. Returns appointment IDs, scheduled times, patient names, and doctor assignments for each booking.
  provider: drchrono
  endpoint: /api/appointments
  method: GET
  scopes: []
  tags:
    - appointments
    - healthcare
    - list
  input_schema:
    type: object
    description: Parameters for listing appointments
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      date:
        type: string
        description: "Filter by date (YYYY-MM-DD)"
    required: []

- slug: drchrono_get_appointment
  name: Get Appointment
  description: |
    Retrieve detailed information about a specific DrChrono appointment including patient details, scheduled time, doctor, examination room, and appointment status.
  provider: drchrono
  endpoint: /api/appointments/{appointment_id}
  method: GET
  scopes: []
  tags:
    - appointments
    - healthcare
    - read
  input_schema:
    type: object
    description: Parameters for getting an appointment
    properties:
      appointment_id:
        type: string
        description: "Appointment ID"
    required:
      - appointment_id

