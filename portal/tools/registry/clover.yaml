- slug: clover_list_merchants
  name: List Merchants
  description: |
    List all merchants associated with the Clover account, returning merchant IDs, names, and status.
  provider: clover
  endpoint: /merchants
  method: GET
  scopes:
    - merchant
  tags:
    - merchants
  input_schema:
    type: object
    description: Parameters for listing merchants
    properties:
      limit:
        type: integer
        description: "Maximum number of merchants to return"
    required: []
- slug: clover_get_merchant
  name: Get Merchant
  description: |
    Get details of a specific Clover merchant including their business information and account status.
  provider: clover
  endpoint: /merchants/{merchant_id}
  method: GET
  scopes:
    - merchant
  tags:
    - merchants
  input_schema:
    type: object
    description: Parameters for getting a merchant
    properties:
      merchant_id:
        type: string
        description: "The unique identifier of the merchant"
    required:
      - merchant_id
- slug: clover_list_orders
  name: List Orders
  description: |
    List all orders for a Clover merchant, returning order IDs, amounts, status, and creation dates.
  provider: clover
  endpoint: /merchants/{merchant_id}/orders
  method: GET
  scopes:
    - orders:read
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      merchant_id:
        type: string
        description: "The unique identifier of the merchant"
      limit:
        type: integer
        description: "Maximum number of orders to return"
      offset:
        type: integer
        description: "Number of orders to skip for pagination"
    required:
      - merchant_id
- slug: clover_get_order
  name: Get Order
  description: |
    Get details of a specific Clover order including items, totals, payment information, and customer details.
  provider: clover
  endpoint: /merchants/{merchant_id}/orders/{order_id}
  method: GET
  scopes:
    - orders:read
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      merchant_id:
        type: string
        description: "The unique identifier of the merchant"
      order_id:
        type: string
        description: "The unique identifier of the order"
    required:
      - merchant_id
      - order_id
