# ECU360 Production Tools - Allowlist
# Curated subset of the ECU360 API for AI agent use.
# Two-Step auth via Nango (Production environment).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ecu360_production_list_products               - List products
# 2. ecu360_production_get_product                - Get product details
# 3. ecu360_production_list_orders                 - List orders
# 4. ecu360_production_get_order                   - Get order details
# 5. ecu360_production_list_customers              - List customers
# 6. ecu360_production_get_customer                - Get customer details
# 7. ecu360_production_list_inventories            - List inventory
# 8. ecu360_production_get_inventory               - Get inventory details
# 9. ecu360_production_list_shipments              - List shipments
# 10. ecu360_production_get_shipment              - Get shipment details

- slug: ecu360_production_list_products
  name: List ecu360-production Products
  description: |
    List all products in the ECU360 production environment. Returns product names, SKUs, prices, and inventory levels.
  provider: ecu360-production
  endpoint: /products
  method: GET
  scopes: []
  tags:
    - products
    - ecommerce
    - list
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

- slug: ecu360_production_get_product
  name: Get ecu360-production Product
  description: |
    Retrieve detailed information about a specific ECU360 production product including pricing and stock levels.
  provider: ecu360-production
  endpoint: /products/{product_id}
  method: GET
  scopes: []
  tags:
    - products
    - ecommerce
    - read
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      product_id:
        type: string
        description: "Product ID"
    required:
      - product_id

- slug: ecu360_production_list_orders
  name: List Orders
  description: |
    List all orders in the ECU360 production environment. Returns order numbers, customer info, and fulfillment status.
  provider: ecu360-production
  endpoint: /orders
  method: GET
  scopes: []
  tags:
    - orders
    - ecommerce
    - list
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      status:
        type: string
        description: "Filter by status: pending, shipped, delivered"
    required: []

