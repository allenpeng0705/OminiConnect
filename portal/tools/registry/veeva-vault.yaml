# Veeva Vault Tools - Allowlist
# Curated subset of Veeva Vault API for AI agent use.
# Two-Step OAuth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. veeva_list_documents           - List all documents
# # 2. veeva_get_document           - Get document details
# # 3. veeva_create_document           - Create a new document
# # 4. veeva_update_document           - Update a document
# # 5. veeva_list_objects           - List all custom objects
# # 6. veeva_get_object           - Get object details
# # 7. veeva_create_object           - Create a new object
# # 8. veeva_list_packets           - List all packets for submission
# # 9. veeva_submit_packet           - Submit a packet
# # 10. veeva_get_audit_trail           - Get audit trail for a document

- slug: veeva_list_documents
  name: List veeva-vault Documents
  description: |
    List all documents
  provider: veeva-vault
  endpoint: /documents
  method: GET
  scopes:
    - read
  tags:
    - veeva-vault
  input_schema:
    type: object
    description: Parameters for list documents
    properties: {}
    required: []

- slug: veeva_get_document
  name: Get veeva-vault Document
  description: |
    Get document details
  provider: veeva-vault
  endpoint: /documents/{id}
