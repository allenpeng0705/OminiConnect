# Loom SCIM Tools - Allowlist
# Curated subset of Loom SCIM API for AI agent use.
# API_KEY via Nango (SCIM token).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. loom_scim_list_users       - List all users (SCIM)
# 2. loom_scim_get_user         - Get user details (SCIM)
# 3. loom_scim_create_user      - Create a new user (SCIM)
# 4. loom_scim_update_user      - Update a user (SCIM)
# 5. loom_scim_delete_user      - Delete a user (SCIM)
# 6. loom_scim_list_groups      - List all groups (SCIM)
# 7. loom_scim_get_group        - Get group details (SCIM)
# 8. loom_scim_create_group     - Create a group (SCIM)
# 9. loom_scim_update_group     - Update a group (SCIM)
# 10. loom_scim_delete_group    - Delete a group (SCIM)

- slug: loom_scim_list_users
  name: List Users (SCIM)
  description: |
    List all user accounts provisioned in your Loom organization via SCIM. Filter by attributes such as name or email. Returns user IDs, names, emails, and active status.
  provider: loom-scim
  endpoint: /Users
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM users
    properties:
      filter:
        type: string
        description: "Filter expression (e.g., userName eq 'john@example.com')"
      startIndex:
        type: integer
        description: "Starting index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results to return"
        default: 100
    required: []

- slug: loom_scim_get_user
  name: Get User (SCIM)
  description: |
    Get detailed information about a specific Loom user provisioned via SCIM by their user ID. Returns the user's name, email, role, and active status.
  provider: loom-scim
  endpoint: /Users/{id}
  method: GET
  scopes: []
  tags:
    - scim
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

- slug: loom_scim_create_user
  name: Create User (SCIM)
  description: |
    Create a new user account in your Loom organization via SCIM. Specify the username, name, and email address. Returns the created user with their SCIM ID.
  provider: loom-scim
  endpoint: /Users
  method: POST
  scopes: []
  tags:
    - scim
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      emails:
        type: array
        description: "Email addresses"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName

- slug: loom_scim_update_user
  name: Update User (SCIM)
  description: |
    Update an existing Loom user account via SCIM. Modify the username, name, or active status. Returns the updated user confirming the changes.
  provider: loom-scim
  endpoint: /Users/{id}
  method: PUT
  scopes: []
  tags:
    - scim
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
          familyName:
            type: string
      active:
        type: boolean
        description: "Whether user is active"
    required:
      - id

- slug: loom_scim_delete_user
  name: Delete User (SCIM)
  description: |
    Delete a user account from your Loom organization via SCIM. This removes the user's access to Loom. Returns confirmation of the deletion.
  provider: loom-scim
  endpoint: /Users/{id}
  method: DELETE
  scopes: []
  tags:
    - scim
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM user
    properties:
      id:
        type: string
        description: "User ID (SCIM id)"
    required:
      - id

- slug: loom_scim_list_groups
  name: List Groups (SCIM)
  description: |
    List all groups configured in your Loom organization via SCIM. Returns group IDs, display names, and member counts for each group.
  provider: loom-scim
  endpoint: /Groups
  method: GET
  scopes: []
  tags:
    - scim
    - groups
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM groups
    properties:
      filter:
        type: string
        description: "Filter expression"
      startIndex:
        type: integer
        description: "Starting index for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results to return"
        default: 100
    required: []

- slug: loom_scim_get_group
  name: Get Group (SCIM)
  description: |
    Get detailed information about a specific Loom group provisioned via SCIM. Returns the group display name, member list, and SCIM ID.
  provider: loom-scim
  endpoint: /Groups/{id}
  method: GET
  scopes: []
  tags:
    - scim
    - groups
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM group
    properties:
      id:
        type: string
        description: "Group ID (SCIM id)"
    required:
      - id

- slug: loom_scim_create_group
  name: Create Group (SCIM)
  description: |
    Create a new group in your Loom organization via SCIM. Specify the display name and optional member list. Returns the created group with its SCIM ID.
  provider: loom-scim
  endpoint: /Groups
  method: POST
  scopes: []
  tags:
    - scim
    - groups
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM group
    properties:
      displayName:
        type: string
        description: "Group display name"
      members:
        type: array
        description: "List of member user IDs"
    required:
      - displayName

- slug: loom_scim_update_group
  name: Update Group (SCIM)
  description: |
    Update an existing Loom group via SCIM. Modify the display name or member list. Returns the updated group confirming the changes.
  provider: loom-scim
  endpoint: /Groups/{id}
  method: PUT
  scopes: []
  tags:
    - scim
    - groups
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM group
    properties:
      id:
        type: string
        description: "Group ID (SCIM id)"
      displayName:
        type: string
        description: "Group display name"
      members:
        type: array
        description: "List of member user IDs"
    required:
      - id

- slug: loom_scim_delete_group
  name: Delete Group (SCIM)
  description: |
    Delete a group from your Loom organization via SCIM. This removes the group and its member assignments. Returns confirmation of the deletion.
  provider: loom-scim
  endpoint: /Groups/{id}
  method: DELETE
  scopes: []
  tags:
    - scim
    - groups
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM group
    properties:
      id:
        type: string
        description: "Group ID (SCIM id)"
    required:
      - id
