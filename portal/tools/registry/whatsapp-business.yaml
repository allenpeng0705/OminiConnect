# WhatsApp Business Tools - Allowlist
# Curated subset of WhatsApp Business API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. whatsapp_list_message_templates           - List all message templates
# # 2. whatsapp_create_message_template           - Create a new message template
# # 3. whatsapp_send_message           - Send a WhatsApp message
# # 4. whatsapp_list_messages           - List sent messages
# # 5. whatsapp_get_message_status           - Get status of a sent message
# # 6. whatsapp_create_template_message           - Send a template message
# # 7. whatsapp_list_phonenumbers           - List registered phone numbers
# # 8. whatsapp_get_business_profile           - Get business profile info
# # 9. whatsapp_update_business_profile           - Update business profile
# # 10. whatsapp_list_media           - List media files

- slug: whatsapp_list_message_templates
  name: List Message Templates
  description: |
    List all message templates
  provider: whatsapp-business
  endpoint: /v18.0/{phone_number_id}/message_templates
  method: GET
  scopes:
    - read
  tags:
    - whatsapp-business
  input_schema:
    type: object
    description: Parameters for list message templates
    properties: {}
    required: []

