- slug: printful_list_products
  name: List Products
  description: |
    List all products in your Printful catalog, including product names, variants, prices, images, and status values.
  provider: printful
  endpoint: /v2/products
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      limit:
        type: integer
        description: "Number of products to return (default 20, max 100)"
      offset:
        type: integer
        description: "Number of products to skip for pagination"
      status:
        type: string
        description: "Filter by product status: active, archived"
    required: []

- slug: printful_get_product
  name: Get Product
  description: |
    Retrieve detailed information about a specific Printful product, including its name, description, variants, pricing, and inventory status.
  provider: printful
  endpoint: /v2/products/{id}
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      id:
        type: string
        description: "Product ID"
    required:
      - id

- slug: printful_list_orders
  name: List Orders
  description: |
    List all orders in Printful, including order IDs, recipient information, item details, shipping status, and totals.
  provider: printful
  endpoint: /v2/orders
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Number of orders to return (default 20, max 100)"
      offset:
        type: integer
        description: "Number of orders to skip for pagination"
      status:
        type: string
        description: "Filter by status: pending, processing, on_hold, shipped, canceled"
      from:
        type: string
        description: "Start date filter (ISO 8601 format)"
      to:
        type: string
        description: "End date filter (ISO 8601 format)"
    required: []

- slug: printful_get_order
  name: Get Order
  description: |
    Retrieve detailed information about a specific Printful order, including its items, quantities, shipping method, status, and tracking information.
  provider: printful
  endpoint: /v2/orders/{id}
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      id:
        type: string
        description: "Order ID"
    required:
      - id

- slug: printful_create_order
  name: Create Order
  description: |
    Create a new order in Printful with the specified recipient information, items, and shipping option.
  provider: printful
  endpoint: /v2/orders
  method: POST
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      recipient:
        type: object
        description: "Recipient information (name, address, email, phone)"
      items:
        type: array
        description: "Array of items to order with variant ID and quantity"
      shipping:
        type: string
        description: "Shipping method identifier"
      external_id:
        type: string
        description: "External order reference ID"
    required:
      - recipient
      - items

- slug: printful_list_files
  name: List Files
  description: |
    List all uploaded files in your Printful account, including file names, types, URLs, upload dates, and associated products.
  provider: printful
  endpoint: /v2/files
  method: GET
  scopes:
    - files
  tags:
    - files
  input_schema:
    type: object
    description: Parameters for listing files
    properties:
      limit:
        type: integer
        description: "Number of files to return (default 20, max 100)"
      offset:
        type: integer
        description: "Number of files to skip for pagination"
    required: []

- slug: printful_get_file
  name: Get File
  description: |
    Retrieve detailed information about a specific Printful file, including its name, type, URL, dimensions, and associated product.
  provider: printful
  endpoint: /v2/files/{id}
  method: GET
  scopes:
    - files
  tags:
    - files
  input_schema:
    type: object
    description: Parameters for getting a file
    properties:
      id:
        type: string
        description: "File ID"
    required:
      - id

- slug: printful_list_shipping_rates
  name: List Shipping Rates
  description: |
    Calculate and list all available shipping options for a specified address and items, including rates, estimated delivery times, and carrier information.
  provider: printful
  endpoint: /v2/shipping_rates
  method: GET
  scopes:
    - shipping
  tags:
    - shipping
  input_schema:
    type: object
    description: Parameters for listing shipping rates
    properties:
      address:
        type: object
        description: "Recipient address (name, address1, city, state_code, country_code, zip)"
      items:
        type: array
        description: "Array of items with variant_id and quantity"
    required:
      - address
      - items

- slug: printful_get_shipping_rate
  name: Get Shipping Rate
  description: |
    Retrieve detailed information about a specific shipping rate, including its cost, estimated delivery date, and carrier details.
  provider: printful
  endpoint: /v2/shipping_rates/{id}
  method: GET
  scopes:
    - shipping
  tags:
    - shipping
  input_schema:
    type: object
    description: Parameters for getting a shipping rate
    properties:
      id:
        type: string
        description: "Shipping rate ID"
    required:
      - id

- slug: printful_list_inventory
  name: List Inventory
  description: |
    List inventory levels for all Printful products and variants, including product names, variant details, and current stock quantities.
  provider: printful
  endpoint: /v2/inventory
  method: GET
  scopes:
    - inventory
  tags:
    - inventory
  input_schema:
    type: object
    description: Parameters for listing inventory
    properties:
      limit:
        type: integer
        description: "Number of inventory records to return (default 20, max 100)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      product_id:
        type: string
        description: "Filter by specific product ID"
    required: []