- slug: linear_list_cycles
  name: List Cycles
  description: |
    List all cycles in your Linear workspace with optional filtering by team or status. Returns cycle names, IDs, start/end dates, and statuses for each cycle.
  provider: linear
  endpoint: /graphql
  method: POST
  scopes:
    - cycles:read
  tags:
    - cycles
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing cycles
    properties:
      teamId:
        type: string
        description: "Team ID"
      status:
        type: string
        description: "Cycle status (upcoming, active, completed)"
    required: []

- slug: linear_get_cycle
  name: Get Cycle
  description: |
    Get detailed information about a specific Linear cycle by its ID. Returns the cycle name, status, start/end dates, and associated issue counts.
  provider: linear
  endpoint: /graphql
  method: POST
  scopes:
    - cycles:read
  tags:
    - cycles
    - read
  input_schema:
    type: object
    description: Parameters for getting a cycle
    properties:
      cycleId:
        type: string
        description: "Cycle ID"
    required:
      - cycleId
