# Upsales Tools - Allowlist
# Curated subset of Upsales API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. upsales_list_companies           - List all companies
# # 2. upsales_get_company           - Get company details
# # 3. upsales_list_contacts           - List all contacts
# # 4. upsales_get_contact           - Get contact details
# # 5. upsales_list_deals           - List all deals/opportunities
# # 6. upsales_get_deal           - Get deal details
# # 7. upsales_create_deal           - Create a new deal
# # 8. upsales_list_activities           - List all activities
# # 9. upsales_create_activity           - Create a new activity
# # 10. upsales_get_analytics           - Get sales analytics

- slug: upsales_list_companies
  name: List Companies
  description: |
    List all companies
  provider: upsales
  endpoint: /api/v2/companies
  method: GET
  scopes:
    - read
  tags:
    - upsales
  input_schema:
    type: object
    description: Parameters for list companies
    properties: {}
    required: []

