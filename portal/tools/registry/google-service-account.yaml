# Google Service Account Tools - Allowlist
# Curated subset of Google APIs for AI agent use.
# TWO_STEP (OAuth2 with RSA) via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. gcp_list_projects            - List Cloud projects
# 2. gcp_get_project             - Get project details
# 3. gcp_list_services           - List enabled services
# 4. gcp_enable_service          - Enable a service
# 5. gcp_list_resources          - List resources
# 6. gcp_get_quota               - Get quota information
# 7. gcp_list_regions            - List regions
# 8. gcp_list_zones              - List zones
# 9. gcp_get_billing             - Get billing info
# 10. gcp_list_operations       - List operations

- slug: gcp_list_projects
  name: List google-service-account Projects
  description: |
    List all Google Cloud projects associated with the service account including project IDs and lifecycle status. Returns project metadata for resource organization and billing.
  provider: google-service-account
  endpoint: /v1/projects
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties: {}

- slug: gcp_get_project
  name: Get google-service-account Project
  description: |
    Retrieve detailed information about a Google Cloud project including settings, IAM policies, and resource quotas. Returns project configuration and billing information.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_list_services
  name: List Services
  description: |
    List all enabled Google Cloud services for a project including service names and enablement status. Returns service inventory for API management.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/services
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - services
    - list
  input_schema:
    type: object
    description: Parameters for listing services
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_enable_service
  name: Enable Service
  description: |
    Enable a specific Google Cloud service for a project to allow API access and resource creation. Returns the operation status and service configuration.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/services/{service_name}
  method: POST
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - services
    - enable
  input_schema:
    type: object
    description: Parameters for enabling a service
    properties:
      project_id:
        type: string
        description: "Project ID"
      service_name:
        type: string
        description: "Service name"
    required:
      - project_id
      - service_name

- slug: gcp_list_resources
  name: List Resources
  description: |
    List Google Cloud resources under a parent resource including compute instances, storage buckets, and databases. Returns resource metadata for inventory management.
  provider: google-service-account
  endpoint: /v1/{parent}/resources
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - resources
    - list
  input_schema:
    type: object
    description: Parameters for listing resources
    properties:
      parent:
        type: string
        description: "Parent resource path"
    required:
      - parent

- slug: gcp_get_quota
  name: Get Quota
  description: |
    Retrieve quota information for a Google Cloud service including current usage and limits. Returns quota metrics for capacity planning and cost control.
  provider: google-service-account
  endpoint: /v1/{project}/locations/{location}/quotas
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - quota
  input_schema:
    type: object
    description: Parameters for getting quota
    properties:
      project:
        type: string
        description: "Project ID"
      location:
        type: string
        description: "Location"
    required:
      - project
      - location

- slug: gcp_list_regions
  name: List Regions
  description: |
    List available Google Cloud regions including region codes, locations, and available zones. Returns region information for deployment planning.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/regions
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - regions
    - list
  input_schema:
    type: object
    description: Parameters for listing regions
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_list_zones
  name: List Zones
  description: |
    List available Google Cloud zones within a region including zone codes and status. Returns zone availability for resource placement decisions.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/zones
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - zones
    - list
  input_schema:
    type: object
    description: Parameters for listing zones
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_get_billing
  name: Get Billing
  description: |
    Retrieve billing information for a Google Cloud project including budget alerts and payment methods. Returns billing configuration and cost summary.
  provider: google-service-account
  endpoint: /v1/projects/{project_id}/billingInfo
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - billing
    - read
  input_schema:
    type: object
    description: Parameters for getting billing info
    properties:
      project_id:
        type: string
        description: "Project ID"
    required:
      - project_id

- slug: gcp_list_operations
  name: List Operations
  description: |
    List long-running Google Cloud operations including ongoing deployments, migrations, and data transfers. Returns operation status and progress details.
  provider: google-service-account
  endpoint: /v1/{name}/operations
  method: GET
  scopes:
    - https://www.googleapis.com/auth/cloud-platform
  tags:
    - gcp
    - operations
    - list
  input_schema:
    type: object
    description: Parameters for listing operations
    properties:
      name:
        type: string
        description: "Parent resource name"
    required:
      - name
