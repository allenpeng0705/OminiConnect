- slug: gong_list_calls
  name: List Calls
  description: |
    List all recorded calls in your Gong account. Returns call IDs, dates, durations, parties, and call outcomes for each call. Filter by date range.
  provider: gong
  endpoint: /calls
  method: GET
  scopes:
    - read
  tags:
    - calls
  input_schema:
    type: object
    description: Filter and pagination options for listing calls
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      page_size:
        type: integer
        description: "Number of calls per page (default: 30, max: 200)"
      from_date_time:
        type: string
        format: date-time
        description: "Filter calls from this date (ISO 8601)"
      to_date_time:
        type: string
        format: date-time
        description: "Filter calls until this date (ISO 8601)"
    required: []

- slug: gong_get_call
  name: Get Call
  description: |
    Get detailed information about a specific call including the full transcript, content analytics, speaker segments, and outcome data.
  provider: gong
  endpoint: /calls/{id}
  method: GET
  scopes:
    - read
  tags:
    - calls
  input_schema:
    type: object
    description: Parameters for getting a specific call
    properties:
      id:
        type: string
        description: "Call ID"
    required:
      - id

