# Fireflies Tools - Allowlist
# Curated subset of Fireflies API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fireflies_list_transcripts    - List transcripts
# 2. fireflies_get_transcript     - Get transcript details
# 3. fireflies_list_users        - List team members
# 4. fireflies_get_user          - Get user details
# 5. fireflies_list_meetings     - List meetings
# 6. fireflies_get_meeting       - Get meeting details
# 7. fireflies_list_summaries    - List AI summaries
# 8. fireflies_search_transcript - Search transcripts
# 9. fireflies_list_analytics   - List analytics
# 10. fireflies_get_overview    - Get analytics overview

- slug: fireflies_list_transcripts
  name: List Transcripts
  description: |
    List all meeting transcripts stored in Fireflies. Returns transcript IDs, meeting titles, dates, duration, and participant information for each transcript with pagination.
  provider: fireflies
  endpoint: /api/v1/transcripts
  method: GET
  scopes: []
  tags:
    - transcripts
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for listing transcripts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fireflies_get_transcript
  name: Get Transcript
  description: |
    Get the full transcript of a specific meeting including all speaker segments, timestamps, and conversation text with search capability.
  provider: fireflies
  endpoint: /api/v1/transcripts/{id}
  method: GET
  scopes: []
  tags:
    - transcripts
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for getting transcript
    properties:
      id:
        type: string
        description: "Transcript ID"
    required:
      - id

- slug: fireflies_list_users
  name: List fireflies Users
  description: |
    List all team members in the Fireflies workspace. Returns member IDs, names, email addresses, and their availability status for scheduling.
  provider: fireflies
  endpoint: /api/v1/users
  method: GET
  scopes: []
  tags:
    - users
    - team
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties: {}
    required: []

- slug: fireflies_get_user
  name: Get fireflies User
  description: |
    Get detailed information about a specific team member including their name, email, role, permissions, and calendar integration settings.
  provider: fireflies
  endpoint: /api/v1/users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - team
    - read
  input_schema:
    type: object
    description: Parameters for getting user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: fireflies_list_meetings
  name: List Meetings
  description: |
    List all meetings recorded in Fireflies. Returns meeting IDs, titles, dates, durations, participant counts, and associated transcript availability for each meeting.
  provider: fireflies
  endpoint: /api/v1/meetings
  method: GET
  scopes: []
  tags:
    - meetings
    - video
    - read
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fireflies_get_meeting
  name: Get Meeting
  description: |
    Get detailed information about a specific meeting including its title, date, duration, participants, and links to the full transcript and AI-generated summary.
  provider: fireflies
  endpoint: /api/v1/meetings/{id}
  method: GET
  scopes: []
  tags:
    - meetings
    - video
    - read
  input_schema:
    type: object
    description: Parameters for getting meeting
    properties:
      id:
        type: string
        description: "Meeting ID"
    required:
      - id

- slug: fireflies_list_summaries
  name: List Summaries
  description: |
    List AI-generated summaries for recorded meetings. Returns summary IDs, meeting associations, key topics, action items, and timestamps for each summary.
  provider: fireflies
  endpoint: /api/v1/summaries
  method: GET
  scopes: []
  tags:
    - summaries
    - ai
    - read
  input_schema:
    type: object
    description: Parameters for listing summaries
    properties:
      meeting_id:
        type: string
        description: "Filter by meeting ID"
    required: []

- slug: fireflies_search_transcript
  name: Search Transcript
  description: |
    Search across all meeting transcripts using keywords. Returns matching transcript segments with timestamps, speaker names, and meeting context.
  provider: fireflies
  endpoint: /api/v1/transcripts/search
  method: GET
  scopes: []
  tags:
    - transcripts
    - search
    - read
  input_schema:
    type: object
    description: Parameters for searching
    properties:
      q:
        type: string
        description: "Search query"
    required:
      - q

- slug: fireflies_list_analytics
  name: List Analytics
  description: |
    List meeting analytics and participation metrics. Returns metrics like total meeting time, participant speaking times, and engagement scores broken down by date range.
  provider: fireflies
  endpoint: /api/v1/analytics
  method: GET
  scopes: []
  tags:
    - analytics
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for listing analytics
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required: []

- slug: fireflies_get_overview
  name: Get Overview
  description: |
    Get an analytics overview including total meetings this period, average meeting duration, total participants, and overall team engagement scores.
  provider: fireflies
  endpoint: /api/v1/analytics/overview
  method: GET
  scopes: []
  tags:
    - analytics
    - overview
    - read
  input_schema:
    type: object
    description: Parameters for getting overview
    properties: {}
    required: []
