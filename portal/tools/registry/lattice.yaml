- slug: lattice_list_goals
  name: List Goals
  description: |
    List all goals in your Lattice organization. Returns goal names, owner names, status labels, and due dates for tracking organizational objectives.
  provider: lattice
  endpoint: /goals
  method: GET
  scopes:
    - goals:read
  tags:
    - goals
  input_schema:
    type: object
    description: Parameters for listing goals
    properties:
      status:
        type: string
        description: "Filter goals by status (e.g., active, completed)"
      owner_id:
        type: string
        description: "Filter goals by owner ID"
    required: []

- slug: lattice_get_goal
  name: Get Goal
  description: |
    Get detailed information about a specific Lattice goal by its ID. Returns goal description, owner information, progress percentage, and alignment to other goals.
  provider: lattice
  endpoint: /goals/{goal_id}
  method: GET
  scopes:
    - goals:read
  tags:
    - goals
  input_schema:
    type: object
    description: Parameters for getting a goal
    properties:
      goal_id:
        type: string
        description: "The unique identifier of the goal"
    required:
      - goal_id

- slug: lattice_create_goal
  name: Create Goal
  description: |
    Create a new goal in your Lattice organization. Specify the goal name, description, owner, and due date to set organizational objectives. Returns the created goal with its unique ID.
  provider: lattice
  endpoint: /goals
  method: POST
  scopes:
    - goals:write
  tags:
    - goals
  input_schema:
    type: object
    description: Parameters for creating a goal
    properties:
      name:
        type: string
        description: "The name of the goal"
      description:
        type: string
        description: "The description of the goal"
      owner_id:
        type: string
        description: "The ID of the user who owns the goal"
      due_date:
        type: string
        description: "The due date for the goal (ISO 8601 format)"
    required:
      - name

- slug: lattice_update_goal
  name: Update Goal
  description: |
    Update an existing goal in your Lattice organization. Modify the goal name, description, status, owner, or due date. Returns the updated goal confirming the changes.
  provider: lattice
  endpoint: /goals/{goal_id}
  method: PUT
  scopes:
    - goals:write
  tags:
    - goals
  input_schema:
    type: object
    description: Parameters for updating a goal
    properties:
      goal_id:
        type: string
        description: "The unique identifier of the goal"
      name:
        type: string
        description: "The updated name of the goal"
      description:
        type: string
        description: "The updated description"
      status:
        type: string
        description: "The updated status"
      due_date:
        type: string
        description: "The updated due date (ISO 8601 format)"
    required:
      - goal_id

- slug: lattice_list_reviews
