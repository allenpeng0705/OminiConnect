- slug: lattice_list_feeds
  name: List Feeds
  description: |
    List all activity feed items in your Lattice organization. Returns updates, comments, and system notifications with timestamps and user assignments.
  provider: lattice
  endpoint: /feeds
  method: GET
  scopes:
    - feed:read
  tags:
    - feed
  input_schema:
    type: object
    description: Parameters for listing feed items
    properties:
