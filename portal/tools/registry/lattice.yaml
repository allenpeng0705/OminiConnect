- slug: lattice_get_review
  name: Get Review
  description: |
    Get detailed information about a specific Lattice review by its ID. Returns review content, written feedback, ratings, and completion status with timestamps.
  provider: lattice
  endpoint: /reviews/{review_id}
  method: GET
  scopes:
    - reviews:read
  tags:
    - reviews
  input_schema:
    type: object
    description: Parameters for getting a review
    properties:
      review_id:
        type: string
        description: "The unique identifier of the review"
    required:
      - review_id

- slug: lattice_create_review
  name: Create Review
  description: |
    Create a new performance review cycle in your Lattice organization. Specify the reviewee, reviewer, review type, and due date. Returns the created review with its unique ID.
  provider: lattice
  endpoint: /reviews
  method: POST
  scopes:
    - reviews:write
  tags:
    - reviews
  input_schema:
    type: object
    description: Parameters for creating a review
    properties:
      reviewee_id:
        type: string
        description: "The ID of the user being reviewed"
      reviewer_id:
        type: string
        description: "The ID of the user conducting the review"
      review_type:
        type: string
        description: "The type of review (e.g., annual, quarterly)"
      due_date:
        type: string
        description: "The due date for completing the review"
    required:
      - reviewee_id
      - reviewer_id

