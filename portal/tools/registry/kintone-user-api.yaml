# Kintone User API Tools - Allowlist
# Curated subset of Kintone User API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. kintone_user_api_list_users      - List users
# 2. kintone_user_api_get_user       - Get user details
# 3. kintone_user_api_list_departments - List departments
# 4. kintone_user_api_get_department - Get department details
# 5. kintone_user_api_list_groups    - List groups
# 6. kintone_user_api_get_group     - Get group details
# 7. kintone_user_api_get_organizations - Get organization
# 8. kintone_user_api_list_employees  - List employees
# 9. kintone_user_api_get_user_organizations - Get user organizations
# 10. kintone_user_api_get_user_groups - Get user groups

- slug: kintone_user_api_list_users
  name: List Users
  description: |
    List all users in your Kintone organization. Returns user names, codes, email addresses, and department assignments for each user account.
  provider: kintone-user-api
  endpoint: /v1/users.json
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
      size:
        type: integer
        description: "Number of results (default 100)"
        default: 100
    required: []

- slug: kintone_user_api_get_user
  name: Get User
  description: |
    Retrieve details about a specific Kintone user by their ID. Returns the user's name, email, department, role, phone number, and company information.
  provider: kintone-user-api
  endpoint: /v1/users/{user_id}.json
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

