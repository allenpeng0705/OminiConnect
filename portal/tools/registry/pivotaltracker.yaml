# Pivotal Tracker Tools - Allowlist
# Curated subset of Pivotal Tracker API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pivotaltracker_list_projects        - List projects
# 2. pivotaltracker_get_project         - Get project details
# 3. pivotaltracker_list_stories        - List stories
# 4. pivotaltracker_get_story          - Get story details
# 5. pivotaltracker_list_tasks          - List tasks
# 6. pivotaltracker_get_task           - Get task details
# 7. pivotaltracker_list_members       - List project members
# 8. pivotaltracker_get_iteration      - Get iteration details
# 9. pivotaltracker_list_iterations    - List iterations
# 10. pivotaltracker_get_account       - Get account info

- slug: pivotaltracker_list_projects
  name: List pivotaltracker Projects
  description: |
    List all projects including their names, statuses, point scales, and member counts. Returns project listings for agile project management and team coordination.
  provider: pivotaltracker
  endpoint: /projects
  method: GET
  scopes: []
  tags:
    - projects
    - agile
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties: {}
    required: []

- slug: pivotaltracker_get_project
  name: Get pivotaltracker Project
  description: |
    Get detailed information for a specific project including its name, description, iteration length, and velocity settings. Returns project configuration for agile planning and team management.
  provider: pivotaltracker
  endpoint: /projects/{projectId}
  method: GET
  scopes: []
  tags:
    - projects
    - agile
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      projectId:
        type: string
        description: "Project ID"
    required:
      - projectId

- slug: pivotaltracker_list_stories
  name: List Stories
  description: |
    List all stories in a project including their titles, types, states, estimates, and current owners. Returns story listings for sprint planning and backlog management.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/stories
  method: GET
  scopes: []
  tags:
    - stories
    - agile
    - list
  input_schema:
    type: object
    description: Parameters for listing stories
    properties:
      projectId:
        type: string
        description: "Project ID"
      storyType:
        type: string
        description: "Filter by type (feature, bug, chore, release)"
      state:
        type: string
        description: "Filter by state"
    required:
      - projectId

- slug: pivotaltracker_get_story
  name: Get Story
  description: |
    Get detailed information for a specific story including its title, description, type, state, estimate, and task breakdown. Returns story details for detailed planning and estimation.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/stories/{storyId}
  method: GET
  scopes: []
  tags:
    - stories
    - agile
    - read
  input_schema:
    type: object
    description: Parameters for getting a story
    properties:
      projectId:
        type: string
        description: "Project ID"
      storyId:
        type: string
        description: "Story ID"
    required:
      - projectId
      - storyId

- slug: pivotaltracker_list_tasks
  name: List pivotaltracker Tasks
  description: |
    List all tasks within a specific story including their descriptions, statuses, and assignee information. Returns task listings for work breakdown and progress tracking.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/stories/{storyId}/tasks
  method: GET
  scopes: []
  tags:
    - tasks
    - agile
    - list
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      projectId:
        type: string
        description: "Project ID"
      storyId:
        type: string
        description: "Story ID"
    required:
      - projectId
      - storyId

- slug: pivotaltracker_get_task
  name: Get pivotaltracker Task
  description: |
    Get detailed information for a specific task including its description, status, and assigned team member. Returns task details for work assignment and completion tracking.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/stories/{storyId}/tasks/{taskId}
  method: GET
  scopes: []
  tags:
    - tasks
    - agile
    - read
  input_schema:
    type: object
    description: Parameters for getting a task
    properties:
      projectId:
        type: string
        description: "Project ID"
      storyId:
        type: string
        description: "Story ID"
      taskId:
        type: string
        description: "Task ID"
    required:
      - projectId
      - storyId
      - taskId

- slug: pivotaltracker_list_members
  name: List Members
  description: |
    List all members in a project including their names, email addresses, and project roles. Returns member listings for team coordination and permission management.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/memberships
  method: GET
  scopes: []
  tags:
    - members
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing members
    properties:
      projectId:
        type: string
        description: "Project ID"
    required:
      - projectId

- slug: pivotaltracker_get_iteration
  name: Get Iteration
  description: |
    Get detailed information for a specific iteration including its start and end dates, story list, and team capacity. Returns iteration details for sprint planning and progress monitoring.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/iterations/{iterationId}
  method: GET
  scopes: []
  tags:
    - iterations
    - agile
    - read
  input_schema:
    type: object
    description: Parameters for getting an iteration
    properties:
      projectId:
        type: string
        description: "Project ID"
      iterationId:
        type: string
        description: "Iteration ID"
    required:
      - projectId
      - iterationId

- slug: pivotaltracker_list_iterations
  name: List Iterations
  description: |
    List all iterations in a project including their numbers, dates, story counts, and point totals. Returns iteration listings for release planning and velocity tracking.
  provider: pivotaltracker
  endpoint: /projects/{projectId}/iterations
  method: GET
  scopes: []
  tags:
    - iterations
    - agile
    - list
  input_schema:
    type: object
    description: Parameters for listing iterations
    properties:
      projectId:
        type: string
        description: "Project ID"
      limit:
        type: integer
        description: "Number of iterations to return"
        default: 10
    required:
      - projectId

- slug: pivotaltracker_get_account
  name: Get pivotaltracker Account
  description: |
    Get account information including account name, subscription plan, and project limits. Returns account details for usage monitoring and billing management.
  provider: pivotaltracker
  endpoint: /accounts
  method: GET
  scopes: []
  tags:
    - account
    - read
  input_schema:
    type: object
    description: Parameters for getting account info
    properties: {}
    required: []
