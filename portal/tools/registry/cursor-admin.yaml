- slug: cursor_admin_list_invitations
  name: List Invitations
  description: |
    List all pending team invitations in the Cursor workspace, returning invitation IDs, email addresses, and team assignments.
  provider: cursor-admin
  endpoint: /teams/invitations
  method: GET
  scopes: []
  tags:
    - invitations
    - teams
    - list
  input_schema:
    type: object
    description: Parameters for listing invitations
    properties: {}

- slug: cursor_admin_create_invitation
  name: Create Invitation
  description: |
    Create and send a team invitation via email to a specified address with a designated role in Cursor.
  provider: cursor-admin
  endpoint: /teams/invitations
  method: POST
  scopes: []
  tags:
    - invitations
    - teams
    - create
  input_schema:
    type: object
    description: Parameters for creating an invitation
    properties:
      email:
        type: string
        description: "Email address to invite"
      team_id:
        type: string
        description: "Team ID to invite to"
      role:
        type: string
        description: "Role: member, admin"
        default: member
    required:
      - email
      - team_id

