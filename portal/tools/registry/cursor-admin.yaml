# Cursor Admin Tools - Allowlist
# Curated subset of the Cursor Admin API for AI agent use.
# BASIC auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cursor_admin_list_users           - List workspace users
# 2. cursor_admin_get_user           - Get user details
# 3. cursor_admin_list_projects      - List workspace projects
# 4. cursor_admin_get_project        - Get project details
# 5. cursor_admin_list_teams         - List teams
# 6. cursor_admin_get_team           - Get team details
# 7. cursor_admin_list_invitations   - List pending invitations
# 8. cursor_admin_create_invitation  - Create team invitation
# 9. cursor_admin_list_settings      - List workspace settings
# 10. cursor_admin_get_settings      - Get workspace settings

- slug: cursor_admin_list_users
  name: List Users
  description: |
    List all users in the Cursor workspace, returning user IDs, names, email addresses, and role assignments.
  provider: cursor-admin
  endpoint: /teams/members
  method: GET
  scopes: []
  tags:
    - users
    - workspace
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

- slug: cursor_admin_get_user
  name: Get User
  description: |
    Get detailed information for a specific Cursor workspace user including their role, status, and permissions.
  provider: cursor-admin
  endpoint: /teams/members/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - workspace
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

