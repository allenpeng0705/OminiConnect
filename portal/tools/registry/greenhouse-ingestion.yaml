- slug: greenhouse_list_candidates
  name: List Candidates
  description: |
    List all candidates in Greenhouse.
    Returns candidate details.
  provider: greenhouse-ingestion
  endpoint: /candidates
  method: GET
  scopes:
    - read
  tags:
    - candidates
    - list
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

