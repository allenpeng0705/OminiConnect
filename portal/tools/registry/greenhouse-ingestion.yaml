# Greenhouse Ingestion Tools - Allowlist
# Curated subset of Greenhouse Ingestion API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. greenhouse_ingest_candidate    - Ingest a candidate
# 2. greenhouse_ingest_job         - Ingest a job
# 3. greenhouse_ingest_application - Ingest an application
# 4. greenhouse_ingest_offer       - Ingest an offer
# 5. greenhouse_ingest_department - Ingest a department
# 6. greenhouse_ingest_office      - Ingest an office
# 7. greenhouse_ingest_hiring_team - Ingest a hiring team
# 8. greenhouse_list_candidates    - List candidates
# 9. greenhouse_list_jobs          - List jobs
# 10. greenhouse_list_applications - List applications

- slug: greenhouse_ingest_candidate
  name: Ingest Candidate
  description: |
    Ingest a candidate into Greenhouse.
    Create or update candidate data.
  provider: greenhouse-ingestion
  endpoint: /ingestion/candidates
  method: POST
  scopes:
    - write
  tags:
    - candidates
    - ingestion
    - create
  input_schema:
    type: object
    description: Parameters for ingesting a candidate
    properties:
      email:
        type: string
        description: "Candidate email"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      phone:
        type: string
        description: "Phone number"
      company:
        type: string
        description: "Current company"
      title:
        type: string
        description: "Current title"
    required:
      - email

- slug: greenhouse_ingest_job
  name: Ingest Job
  description: |
    Ingest a job into Greenhouse.
    Create or update job data.
  provider: greenhouse-ingestion
  endpoint: /ingestion/jobs
  method: POST
