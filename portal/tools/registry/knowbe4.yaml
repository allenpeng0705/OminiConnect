        description: "Page number"
        default: 1
    required: []

- slug: knowbe4_list_risky_users
  name: List Risky Users
  description: |
    List all users identified as risky by KnowBe4 security awareness tracking. Risky users have low phishing test scores, failed simulations, or suspicious activity patterns. Returns user names, risk scores, and risk factors.
  provider: knowbe4
  endpoint: /v1/risky-users
  method: GET
  scopes: []
  tags:
    - risky
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing risky users
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: knowbe4_list_remediations
  name: List Remediations
