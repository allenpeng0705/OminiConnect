    List all security awareness remediation assignments in your KnowBe4 account. Remediations are corrective training actions assigned to users who failed phishing simulations. Returns remediation types, status, and assigned users.
  provider: knowbe4
  endpoint: /v1/remediations
  method: GET
  scopes: []
  tags:
    - remediations
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing remediations
    properties: {}
    required: []
