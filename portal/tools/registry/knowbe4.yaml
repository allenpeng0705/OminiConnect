  provider: knowbe4
  endpoint: /v1/groups
  method: GET
  scopes: []
  tags:
    - groups
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing groups
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: knowbe4_get_group
