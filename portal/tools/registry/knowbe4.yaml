- slug: knowbe4_list_phishing_tests
  name: List Phishing Tests
  description: |
    List all phishing simulation tests in your KnowBe4 account. Phishing tests are simulated attacks that measure user vulnerability and security awareness. Returns test names, types, and scheduled dates.
  provider: knowbe4
  endpoint: /v1/phishing
  method: GET
  scopes: []
  tags:
