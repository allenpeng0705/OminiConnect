# Thrivecart (OAuth) Tools - Allowlist
# Curated subset of Thrivecart (OAuth) API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. thrivecart_list_products           - List all products
# # 2. thrivecart_get_product           - Get product details
# # 3. thrivecart_list_orders           - List all orders
# # 4. thrivecart_get_order           - Get order details
# # 5. thrivecart_list_customers           - List all customers
# # 6. thrivecart_get_customer           - Get customer details
# # 7. thrivecart_list_affiliates           - List all affiliates
# # 8. thrivecart_create_product           - Create a new product
# # 9. thrivecart_list_coupons           - List all coupons
# # 10. thrivecart_refund_order           - Refund an order

