- slug: freshmarketer_get_conversion_report
  name: Get Conversion Report
  description: |
    Get conversion report data for your marketing campaigns over a date range.
    Returns detailed conversion metrics including rates, costs, and attribution.
    Use this to measure campaign effectiveness and ROI.
  provider: freshmarketer
  endpoint: /api/v1/reports/conversion
  method: GET
  scopes:
    - reports:read
  tags:
    - reports
    - conversion
    - read
  input_schema:
    type: object
    description: Parameters for getting conversion report
    properties:
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      campaign_id:
        type: string
        description: "Filter by campaign ID"
    required: []

- slug: freshmarketer_list_page_analytics
  name: List Page Analytics
  description: |
    List page analytics data for your website including views and engagement.
    Returns page URLs, view counts, bounce rates, and session durations.
    Use this to discover popular content and optimize user experience.
  provider: freshmarketer
  endpoint: /api/v1/analytics/pages
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
    - pages
    - list
  input_schema:
    type: object
    description: Parameters for listing page analytics
    properties:
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      page_size:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
    required: []

- slug: freshmarketer_get_page_analytics
  name: Get Page Analytics
  description: |
    Get detailed analytics for a specific page including engagement metrics.
    Returns the complete page performance data with visitor behavior.
    This provides page-level insights for content optimization.
  provider: freshmarketer
  endpoint: /api/v1/analytics/pages/{pageId}
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
    - pages
    - read
  input_schema:
    type: object
    description: Parameters for getting page analytics
    properties:
      pageId:
        type: string
        description: "Page ID or URL identifier"
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - pageId

- slug: freshmarketer_list_campaigns
  name: List Campaigns
  description: |
    List all marketing campaigns in your Freshmarketer account with status information.
    Returns campaign names, IDs, status, and performance metrics for each campaign.
    Use this to discover ongoing campaigns and track their progress.
  provider: freshmarketer
  endpoint: /api/v1/campaigns
  method: GET
  scopes:
