# Freshmarketer Tools - Allowlist
# Curated subset of Freshmarketer REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. freshmarketer_list_visitors          - List website visitors
# 2. freshmarketer_get_visitor            - Get visitor details
# 3. freshmarketer_list_events            - List tracked events
# 4. freshmarketer_get_event              - Get event details
# 5. freshmarketer_list_funnels           - List conversion funnels
# 6. freshmarketer_get_funnel             - Get funnel details
# 7. freshmarketer_get_conversion_report  - Get conversion report
# 8. freshmarketer_list_page_analytics    - List page analytics
# 9. freshmarketer_get_page_analytics     - Get page analytics details
# 10. freshmarketer_list_campaigns        - List campaigns

- slug: freshmarketer_list_visitors
  name: List Visitors
  description: |
    List all website visitors in your Freshmarketer account with filtering options.
    Returns visitor IDs, IP addresses, locations, and page views for each visitor.
    Use this to discover website traffic and track user engagement.
  provider: freshmarketer
  endpoint: /api/v1/visitors
  method: GET
  scopes:
    - visitors:read
  tags:
    - visitors
    - list
  input_schema:
    type: object
    description: Parameters for listing visitors
    properties:
      page_size:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
      date_from:
        type: string
        description: "Filter from date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "Filter to date (YYYY-MM-DD)"
    required: []

- slug: freshmarketer_get_visitor
  name: Get Visitor
  description: |
    Get detailed information about a specific visitor including browsing history and events.
    Returns the complete visitor profile with page views and interaction data.
    This provides full visitor data for lead scoring and personalization.
  provider: freshmarketer
  endpoint: /api/v1/visitors/{visitorId}
  method: GET
  scopes:
    - visitors:read
  tags:
    - visitors
    - read
  input_schema:
    type: object
    description: Parameters for getting a visitor
    properties:
      visitorId:
        type: string
        description: "Visitor ID"
    required:
      - visitorId

- slug: freshmarketer_list_events
  name: List Events
  description: |
    List all tracked events in your Freshmarketer account for analytics.
    Returns event names, types, timestamps, and occurrence counts for each event.
    Use this to discover tracked user interactions and campaign triggers.
  provider: freshmarketer
  endpoint: /api/v1/events
  method: GET
  scopes:
    - events:read
  tags:
    - events
    - list
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      page_size:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
      event_type:
        type: string
        description: "Filter by event type"
    required: []

- slug: freshmarketer_get_event
  name: Get Event
  description: |
    Get detailed information about a specific event including timing and user data.
    Returns the complete event record with associated visitor information.
    This provides event details for campaign analysis and optimization.
  provider: freshmarketer
  endpoint: /api/v1/events/{eventId}
  method: GET
  scopes:
    - events:read
  tags:
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      eventId:
        type: string
        description: "Event ID"
    required:
      - eventId

