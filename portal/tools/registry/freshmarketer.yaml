  tags:
    - campaigns
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by status (active, paused, completed)"
      page_size:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
    required: []
