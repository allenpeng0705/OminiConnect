# Ramp-Sandbox Tools - Allowlist
# Curated subset of Ramp API for AI agent use.
# Sandbox environment for testing.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ramp-sandbox_list_transactions    - List all transactions
# 2. ramp-sandbox_get_transaction      - Get transaction details
# 3. ramp-sandbox_list_cards           - List company cards
# 4. ramp-sandbox_get_card             - Get card details
# 5. ramp-sandbox_list_employees       - List employees
# 6. ramp-sandbox_get_employee         - Get employee details
# 7. ramp-sandbox_list_departments     - List departments
# 8. ramp-sandbox_create_expense       - Create an expense
# 9. ramp-sandbox_list_limits          - List spending limits
# 10. ramp-sandbox_get_balance         - Get account balance

- slug: ramp-sandbox_list_transactions
  name: List ramp-sandbox Transactions
  description: |
    Retrieve a list of all transactions in your Ramp sandbox.
  provider: ramp-sandbox
  endpoint: /v1/transactions
  method: GET
  scopes:
    - transactions:read
  tags:
    - transactions
    - spending
    - finance
    - sandbox
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      limit:
        type: integer
        description: "Number of transactions to return"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
      status:
        type: string
        description: "Filter by status: pending, posted, declined"
    required: []

- slug: ramp-sandbox_get_transaction
  name: Get ramp-sandbox Transaction
  description: |
    Get details of a specific transaction by ID.
  provider: ramp-sandbox
  endpoint: /v1/transactions/{transactionId}
  method: GET
  scopes:
    - transactions:read
  tags:
    - transactions
    - spending
    - finance
    - sandbox
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "The transaction ID"
    required:
      - transactionId

