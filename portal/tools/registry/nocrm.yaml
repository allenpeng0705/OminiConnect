- slug: nocrm_list_activities
  name: List Activities
  description: |
    List all activities (calls, emails, meetings).
  provider: nocrm
  endpoint: /api/v2/activities
  method: GET
  scopes:
    - activities:read
  tags:
    - crm
    - activities
    - history
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      lead_id:
        type: integer
        description: "Filter by lead ID"
      type:
        type: string
        description: "Filter by activity type"
    required: []

- slug: nocrm_create_activity
  name: Create Activity
  description: |
    Log a new activity for a lead.
  provider: nocrm
  endpoint: /api/v2/activities
  method: POST
  scopes:
    - activities:write
  tags:
    - crm
    - activities
    - create
  input_schema:
    type: object
    description: Parameters for creating an activity
    properties:
      lead_id:
        type: integer
        description: "Lead ID"
      type:
        type: string
        description: "Activity type (call, email, meeting)"
      content:
        type: string
        description: "Activity description"
    required:
      - lead_id
      - type
      - content

