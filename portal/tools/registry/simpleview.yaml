- slug: simpleview_list_contacts
  name: List simpleview Contacts
  description: |
    List all contacts in Simpleview CRM. Returns contact names, email addresses, phone numbers, and company associations.
  provider: simpleview
  endpoint: /contacts
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of records per page"
    required: []

- slug: simpleview_get_contact
  name: Get simpleview Contact
  description: |
    Get detailed information about a specific contact including their personal details, company, and activity history.
  provider: simpleview
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: simpleview_create_contact
  name: Create Contact
  description: |
    Create a new contact in the Simpleview CRM. Sets the contact first name, last name, email address, and phone number.
  provider: simpleview
  endpoint: /contacts
  method: POST
  scopes:
    - contacts_write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name of the contact"
      last_name:
        type: string
        description: "Last name of the contact"
      email:
        type: string
        description: "Email address of the contact"
      phone:
        type: string
        description: "Phone number of the contact"
    required:
      - first_name
      - last_name
      - email

