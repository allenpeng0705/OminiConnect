- slug: sharpspring_list_campaigns
  name: List Campaigns
  description: |
    List all marketing campaigns in SharpSpring. Returns campaign names, statuses, dates, and performance metrics for each campaign.
  provider: sharpspring
  endpoint: /campaigns
  method: GET
  scopes:
    - campaigns_read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by campaign status (active, paused, completed)"
      page:
        type: integer
        description: "Page number for pagination"
    required: []

- slug: sharpspring_get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific marketing campaign including its status, target audience, and engagement metrics.
  provider: sharpspring
  endpoint: /campaigns/{id}
  method: GET
  scopes:
    - campaigns_read
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

- slug: sharpspring_create_campaign
  name: Create Campaign
  description: |
    Create a new marketing automation campaign in SharpSpring. Sets the campaign name, description, and initial status for tracking.
  provider: sharpspring
  endpoint: /campaigns
  method: POST
  scopes:
    - campaigns_write
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      name:
        type: string
        description: "Name of the campaign"
      description:
        type: string
        description: "Description of the campaign"
      status:
        type: string
        description: "Initial status of the campaign"
    required:
      - name

- slug: sharpspring_list_contacts
  name: List Contacts
  description: |
    List all contacts in the SharpSpring marketing system. Returns contact names, email addresses, companies, and lead status information.
  provider: sharpspring
  endpoint: /contacts
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of records per page"
    required: []

- slug: sharpspring_get_contact
  name: Get Contact
  description: |
    Get detailed information about a specific contact including their personal details, company association, and activity history.
  provider: sharpspring
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contacts_read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: sharpspring_create_contact
  name: Create Contact
  description: |
    Create a new contact in the SharpSpring marketing automation system. Sets the contact name, email address, and optional company information.
  provider: sharpspring
  endpoint: /contacts
  method: POST
  scopes:
    - contacts_write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name of the contact"
      last_name:
        type: string
        description: "Last name of the contact"
      email:
        type: string
        description: "Email address of the contact"
    required:
      - first_name
      - last_name
      - email

