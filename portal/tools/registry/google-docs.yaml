# Google Docs Tools - Allowlist
# Curated subset of Google Docs API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_docs_list_documents    - List documents
# 2. google_docs_get_document     - Get document details
# 3. google_docs_create_document  - Create document
# 4. google_docs_batch_update     - Batch update document
# 5. google_docs_get_content      - Get document content
# 6. google_docs_create_comment   - Create comment
# 7. google_docs_list_comments    - List comments
# 8. google_docs_list_revisions   - List revisions
# 9. google_docs_get_revision     - Get revision
# 10. google_docs_list_styles    - List styles

- slug: google_docs_list_documents
  name: List google-docs Documents
  description: |
    List all Google Docs documents accessible to the user including titles and last modified dates. Returns document metadata for discovery and access management.
  provider: google-docs
  endpoint: /documents
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents
  tags:
    - documents
    - list
  input_schema:
    type: object
    description: Parameters for listing documents
    properties: {}

- slug: google_docs_get_document
  name: Get google-docs Document
  description: |
    Retrieve detailed information about a Google Docs document including title, owner, and modification history. Returns document metadata and sharing settings.
  provider: google-docs
  endpoint: /documents/{documentId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents
  tags:
    - documents
    - read
  input_schema:
    type: object
    description: Parameters for getting a document
    properties:
      documentId:
        type: string
        description: "Document ID"
    required:
      - documentId

- slug: google_docs_create_document
  name: Create google-docs Document
  description: |
    Create a new blank Google Doc with a specified title in the user's Drive. Returns the created document with its unique identifier and URL.
  provider: google-docs
  endpoint: /documents
  method: POST
  scopes:
    - https://www.googleapis.com/auth/documents
  tags:
    - documents
    - create
  input_schema:
    type: object
    description: Parameters for creating a document
    properties:
      title:
        type: string
        description: "Document title"
    required:
      - title

- slug: google_docs_batch_update
  name: Batch Update
  description: |
    Apply multiple updates to a Google Docs document including text insertions, deletions, and formatting changes. Executes all requests in a single atomic operation.
  provider: google-docs
  endpoint: /documents/{documentId}:batchUpdate
  method: POST
  scopes:
    - https://www.googleapis.com/auth/documents
  tags:
    - documents
    - update
  input_schema:
    type: object
    description: Parameters for batch update
    properties:
      documentId:
        type: string
        description: "Document ID"
      requests:
        type: array
        description: "Array of update requests"
    required:
      - documentId
      - requests

- slug: google_docs_get_content
  name: Get Content
  description: |
    Retrieve the full textual content of a Google Docs document including all paragraphs and structural elements. Returns document text with formatting metadata.
  provider: google-docs
  endpoint: /documents/{documentId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents.readonly
  tags:
    - documents
    - content
    - read
  input_schema:
    type: object
    description: Parameters for getting content
    properties:
      documentId:
        type: string
        description: "Document ID"
    required:
      - documentId

- slug: google_docs_create_comment
  name: Create Comment
  description: |
    Create a new comment on a specific Google Docs document at a specified text location. Adds the comment and returns the comment thread identifier.
  provider: google-docs
  endpoint: /documents/{documentId}/comments
  method: POST
  scopes:
    - https://www.googleapis.com/auth/documents
  tags:
    - comments
    - create
  input_schema:
    type: object
    description: Parameters for creating a comment
    properties:
      documentId:
        type: string
        description: "Document ID"
      content:
        type: string
        description: "Comment text"
      anchor:
        type: string
        description: "Text anchor for comment location"
    required:
      - documentId
      - content

- slug: google_docs_list_comments
  name: List Comments
  description: |
    List all comments on a Google Docs document including author, content, and resolved status. Returns comment threads for collaborative document review.
  provider: google-docs
  endpoint: /documents/{documentId}/comments
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents
  tags:
    - comments
    - list
  input_schema:
    type: object
    description: Parameters for listing comments
    properties:
      documentId:
        type: string
        description: "Document ID"
    required:
      - documentId

- slug: google_docs_list_revisions
  name: List Revisions
  description: |
    List all revision history for a Google Docs document including modification timestamps and author information. Returns revision IDs and change summaries.
  provider: google-docs
  endpoint: /documents/{documentId}/revisions
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents.readonly
  tags:
    - revisions
    - list
  input_schema:
    type: object
    description: Parameters for listing revisions
    properties:
      documentId:
        type: string
        description: "Document ID"
    required:
      - documentId

- slug: google_docs_get_revision
  name: Get Revision
  description: |
    Retrieve detailed information about a specific revision of a Google Docs document including the content at that point in time. Returns revision content and modification details.
  provider: google-docs
  endpoint: /documents/{documentId}/revisions/{revisionId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents.readonly
  tags:
    - revisions
    - read
  input_schema:
    type: object
    description: Parameters for getting a revision
    properties:
      documentId:
        type: string
        description: "Document ID"
      revisionId:
        type: string
        description: "Revision ID"
    required:
      - documentId
      - revisionId

- slug: google_docs_list_styles
  name: List Styles
  description: |
    List all defined styles in a Google Docs document including heading levels, body text, and custom styles. Returns style definitions for document formatting analysis.
  provider: google-docs
  endpoint: /documents/{documentId}/styles
  method: GET
  scopes:
    - https://www.googleapis.com/auth/documents.readonly
  tags:
    - styles
    - list
  input_schema:
    type: object
    description: Parameters for listing styles
    properties:
      documentId:
        type: string
        description: "Document ID"
    required:
      - documentId
