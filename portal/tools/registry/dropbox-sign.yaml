# Dropbox Sign Tools - Allowlist
# Curated subset of the Dropbox Sign (HelloSign) API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. dropbox_sign_list_signature_requests - List signature requests
# 2. dropbox_sign_get_signature_request    - Get request details
# 3. dropbox_sign_create_signature_request - Create a signature request
# 4. dropbox_sign_list_templates           - List templates
# 5. dropbox_sign_get_template             - Get template details
# 6. dropbox_sign_list_users               - List team users
# 7. dropbox_sign_get_user                 - Get user details
# 8. dropbox_sign_list_bulk_send_jobs      - List bulk send jobs
# 9. dropbox_sign_get_bulk_send_job        - Get bulk send details
# 10. dropbox_sign_list_documents         - List documents

- slug: dropbox_sign_list_signature_requests
  name: List Signature Requests
  description: |
    List all signature requests in Dropbox Sign. Returns request details including status, signers, and document information.
  provider: dropbox-sign
  endpoint: /signature_requests
  method: GET
  scopes: []
  tags:
    - signatures
    - esignature
    - list
  input_schema:
    type: object
    description: Parameters for listing signature requests
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
      status:
        type: string
        description: "Filter by status: pending, signed, declined, expired"
    required: []

- slug: dropbox_sign_get_signature_request
  name: Get Signature Request
  description: |
    Retrieve detailed information about a specific signature request including signer status, document, and audit trail.
  provider: dropbox-sign
  endpoint: /signature_requests/{signature_request_id}
  method: GET
  scopes: []
  tags:
    - signatures
    - esignature
    - read
  input_schema:
    type: object
    description: Parameters for getting a signature request
    properties:
      signature_request_id:
        type: string
        description: "Signature Request ID"
    required:
      - signature_request_id

- slug: dropbox_sign_create_signature_request
  name: Create Signature Request
  description: |
    Create and send a new signature request to one or more signers. Returns the created request with its ID and signing URL.
  provider: dropbox-sign
  endpoint: /signature_requests/send
  method: POST
  scopes: []
  tags:
    - signatures
    - esignature
    - create
  input_schema:
    type: object
    description: Parameters for creating a signature request
    properties:
      title:
        type: string
        description: "Request title"
      subject:
        type: string
        description: "Email subject"
      message:
        type: string
        description: "Email message"
      signers:
        type: array
        items:
          type: object
        description: "Array of signer objects with email and name"
      file_url:
        type: string
        description: "URL of file to sign"
    required:
      - title
      - signers

