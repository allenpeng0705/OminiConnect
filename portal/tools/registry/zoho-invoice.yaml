# Zoho Invoice Tools - Allowlist
# Curated subset of Zoho Invoice API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_invoice_list_invoices           - List all invoices
# # 2. zoho_invoice_get_invoice           - Get invoice details
# # 3. zoho_invoice_create_invoice           - Create a new invoice
# # 4. zoho_invoice_email_invoice           - Email an invoice to customer
# # 5. zoho_invoice_list_contacts           - List all contacts
# # 6. zoho_invoice_get_contact           - Get contact details
# # 7. zoho_invoice_create_contact           - Create a new contact
# # 8. zoho_invoice_list_estimates           - List all estimates
# # 9. zoho_invoice_create_estimate           - Create a new estimate
# # 10. zoho_invoice_list_recurring_invoices           - List all recurring invoices

- slug: zoho_invoice_list_invoices
  name: List Invoices
  description: |
    List all invoices
  provider: zoho-invoice
  endpoint: /invoices
  method: GET
  scopes:
    - read
  tags:
    - zoho-invoice
  input_schema:
    type: object
    description: Parameters for list invoices
    properties: {}
    required: []

