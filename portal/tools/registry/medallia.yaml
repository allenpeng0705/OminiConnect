# Medallia Tools - Allowlist
# Curated subset of Medallia API for AI agent use.
# OAUTH2_CC via Nango (Client Credentials).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. medallia_list_surveys        - List all surveys
# 2. medallia_get_survey          - Get survey details
# 3. medallia_list_responses      - List survey responses
# 4. medallia_get_response         - Get response details
# 5. medallia_list_employees      - List employees
# 6. medallia_get_employee        - Get employee details
# 7. medallia_list_teams          - List teams
# 8. medallia_get_team            - Get team details
# 9. medallia_list_analytics      - Get analytics data
# 10. medallia_list_invites       - List invitations

- slug: medallia_list_surveys
  name: List Surveys
  description: |
    List all surveys in Medallia.
    Filter by status, type, or date.
  provider: medallia
  endpoint: /surveys
  method: GET
  scopes: []
  tags:
    - surveys
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing surveys
    properties:
      status:
        type: string
        description: "Filter by status (active, closed, draft)"
      survey_type:
        type: string
        description: "Filter by type"
      page:
        type: integer
        description: "Page number"
        default: 1
      page_size:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: medallia_get_survey
  name: Get Survey
  description: |
    Get detailed information about a specific survey.
  provider: medallia
  endpoint: /surveys/{surveyId}
  method: GET
  scopes: []
  tags:
    - surveys
    - read
  input_schema:
    type: object
    description: Parameters for getting a survey
    properties:
      surveyId:
        type: string
        description: "Survey ID"
    required:
      - surveyId

