# Valley (API Key) Tools - Allowlist
# Curated subset of Valley (API Key) API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. valley_list_accounts           - List all bank accounts
# # 2. valley_get_account           - Get account details
# # 3. valley_list_transactions           - List all transactions
# # 4. valley_get_transaction           - Get transaction details
# # 5. valley_create_transfer           - Create a transfer
# # 6. valley_list_payments           - List all payments
# # 7. valley_create_payment           - Create a payment
# # 8. valley_list_contacts           - List saved contacts
# # 9. valley_create_contact           - Create a contact
# # 10. valley_get_balance           - Get account balance

- slug: valley_list_accounts
  name: List valley-api-key Accounts
  description: |
    List all bank accounts
  provider: valley-api-key
  endpoint: /accounts
  method: GET
  scopes:
    - read
  tags:
    - valley-api-key
  input_schema:
    type: object
    description: Parameters for list accounts
    properties: {}
    required: []

