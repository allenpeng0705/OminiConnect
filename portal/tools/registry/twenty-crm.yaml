# Twenty CRM Tools - Allowlist
# Curated subset of Twenty CRM API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. twenty_list_companies           - List all companies
# # 2. twenty_get_company           - Get company details
# # 3. twenty_create_company           - Create a new company
# # 4. twenty_list_contacts           - List all contacts
# # 5. twenty_get_contact           - Get contact details
# # 6. twenty_create_contact           - Create a new contact
# # 7. twenty_list_opportunities           - List all opportunities
# # 8. twenty_get_opportunity           - Get opportunity details
# # 9. twenty_create_opportunity           - Create a new opportunity
# # 10. twenty_list_tasks           - List all tasks

- slug: twenty_list_companies
  name: List Companies
  description: |
    List all companies
  provider: twenty-crm
  endpoint: /companies
  method: GET
  scopes:
    - read
  tags:
    - twenty-crm
  input_schema:
    type: object
    description: Parameters for list companies
    properties: {}
    required: []

