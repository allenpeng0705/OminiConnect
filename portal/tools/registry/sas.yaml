- slug: sas_list_projects
  name: List Projects
  description: |
    List all analytics projects with pagination support. Returns project names, IDs, and descriptions for each project.
  provider: sas
  endpoint: /projects
  method: GET
  scopes:
    - projects_read
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of records per page"
    required: []

- slug: sas_get_project
  name: Get Project
  description: |
    Retrieve detailed information for a specific project by its unique identifier. Returns the project name, description, and configuration settings.
  provider: sas
  endpoint: /projects/{id}
  method: GET
  scopes:
    - projects_read
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      id:
        type: string
        description: "Project ID"
    required:
      - id

- slug: sas_create_project
  name: Create Project
  description: |
    Create a new analytics project with specified name and description. Returns the created project with its unique identifier.
  provider: sas
  endpoint: /projects
  method: POST
  scopes:
    - projects_write
  tags:
    - projects
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Name of the project"
      description:
        type: string
        description: "Description of the project"
    required:
      - name

