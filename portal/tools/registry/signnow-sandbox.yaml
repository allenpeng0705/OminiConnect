# SignNow (Sandbox) Tools - Allowlist
# Curated subset of SignNow (Sandbox) API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_documents                           - List all documents
# 2. get_document                             - Get document details
# 3. upload_document                          - Upload a document
# 4. download_document                        - Download document PDF
# 5. create_signature_request                 - Create signature request
# 6. list_signature_requests                  - List signature requests
# 7. get_signature_request                    - Get signature request status
# 8. cancel_signature_request                 - Cancel a signature request
# 9. create_folder                            - Create a folder
# 10. list_folders                             - List all folders

- slug: list_documents
  name: List signnow-sandbox Documents
  description: |
    List all documents in SignNow. Returns document IDs, names, created dates, statuses, and owner information.
  provider: signnow-sandbox
  endpoint: /documents
  method: GET
  scopes: []
  tags:
    - documents
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_document
  name: Get signnow-sandbox Document
  description: |
    Get detailed information about a specific document including its status, signer information, and field data.
  provider: signnow-sandbox
  endpoint: /documents/{id}
  method: GET
  scopes: []
  tags:
    - documents
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: upload_document
  name: Upload Document
  description: |
    Upload a document to SignNow for electronic signatures. The document is stored and prepared for signature requests.
  provider: signnow-sandbox
  endpoint: /documents
  method: POST
  scopes: []
  tags:
    - documents
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: download_document
  name: Download Document
  description: |
    Download a signed document PDF from SignNow. Returns the PDF binary content for local storage or viewing.
  provider: signnow-sandbox
  endpoint: /documents/{id}/download
  method: GET
  scopes: []
  tags:
    - documents
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_signature_request
  name: Create Signature Request
  description: |
    Create a signature request in SignNow. Sends the document to specified signers for electronic signature.
  provider: signnow-sandbox
  endpoint: /signature_requests
  method: POST
  scopes: []
  tags:
    - signatures
    - esign
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_signature_requests
  name: List Signature Requests
  description: |
    List all signature requests in SignNow. Returns request IDs, document names, statuses, and signer information.
  provider: signnow-sandbox
  endpoint: /signature_requests
  method: GET
  scopes: []
  tags:
    - signatures
    - esign
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_signature_request
  name: Get Signature Request
  description: |
    Get detailed information about a signature request including its status, signer progress, and completion details.
  provider: signnow-sandbox
  endpoint: /signature_requests/{id}
  method: GET
  scopes: []
  tags:
    - signatures
    - esign
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: cancel_signature_request
  name: Cancel Signature Request
  description: |
    Cancel a pending signature request in SignNow. The request is voided and signers can no longer sign the document.
  provider: signnow-sandbox
  endpoint: /signature_requests/{id}/cancel
  method: POST
  scopes: []
  tags:
    - signatures
    - esign
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_folder
  name: Create Folder
  description: |
    Create a new folder in SignNow for organizing documents. Sets the folder name and parent folder if needed.
  provider: signnow-sandbox
  endpoint: /folders
  method: POST
  scopes: []
  tags:
    - folders
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_folders
  name: List Folders
  description: |
    List all folders in SignNow. Returns folder names, IDs, document counts, and parent folder information.
  provider: signnow-sandbox
  endpoint: /folders
  method: GET
  scopes: []
  tags:
    - folders
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

