# Lightspeed Tools - Allowlist
# Curated subset of Lightspeed Retail POS API for AI agent use.

# === TOOL LIST ===
# 1. lightspeed_list_items          - List items/products
# 2. lightspeed_get_item            - Get item details
# 3. lightspeed_create_item         - Create a new item
# 4. lightspeed_list_customers      - List customers
# 5. lightspeed_get_customer       - Get customer details
# 6. lightspeed_list_transactions  - List transactions
# 7. lightspeed_get_transaction    - Get transaction details
# 8. lightspeed_list_suppliers     - List suppliers
# 9. lightspeed_get_supplier       - Get supplier details
# 10. lightspeed_list_staff        - List staff members

- slug: lightspeed_list_items
  name: List Items
  description: |
    List all items (products) in the Lightspeed Retail POS with filtering options.
    Returns item names, SKUs, prices, and stock levels for each product.
    Use this to discover products and manage inventory.
  provider: lightspeed
  endpoint: /api/v2/Item.json
  method: GET
  scopes:
    - read_inventory
  tags:
    - items
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing items
    properties:
      categoryID:
        type: integer
        description: "Filter by category ID"
      supplierID:
        type: integer
        description: "Filter by supplier ID"
      isArchived:
        type: boolean
        description: "Include archived items"
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
    required: []

- slug: lightspeed_get_item
  name: Get Item
  description: |
    Get detailed information about a specific item including variants, pricing, and stock levels.
    Returns the complete item data with inventory counts and cost information.
    This provides full product details for sales and inventory management.
  provider: lightspeed
  endpoint: /api/v2/Item/{itemID}.json
  method: GET
  scopes:
    - read_inventory
  tags:
    - items
    - read
  input_schema:
    type: object
    description: Parameters for getting an item
    properties:
      itemID:
        type: integer
        description: "The item ID"
    required:
      - itemID

- slug: lightspeed_create_item
  name: Create Item
  description: |
    Create a new item in Lightspeed Retail POS with name, SKU, price, and inventory settings.
    Returns the created item with its unique ID and configuration.
    This adds a new product to your retail inventory.
  provider: lightspeed
  endpoint: /api/v2/Item.json
  method: POST
  scopes:
    - write_inventory
  tags:
    - items
    - create
  input_schema:
    type: object
    description: Parameters for creating an item
    properties:
      name:
        type: string
        description: "Item name"
      sku:
        type: string
        description: "Stock keeping unit"
      description:
        type: string
        description: "Item description"
      price:
        type: number
        description: "Selling price"
      cost:
        type: number
        description: "Cost price"
      quantity:
        type: number
        description: "Initial inventory quantity"
      categoryID:
        type: integer
        description: "Category ID"
    required:
      - name
      - sku

- slug: lightspeed_list_customers
  name: List Customers
  description: |
    List all customers in Lightspeed Retail POS with filtering options.
    Returns customer names, emails, phone numbers, and purchase history for each customer.
    Use this to discover customers and track their buying patterns.
  provider: lightspeed
  endpoint: /api/v2/Customer.json
  method: GET
  scopes:
    - read_customers
  tags:
    - customers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      customerGroupID:
        type: integer
        description: "Filter by customer group ID"
      isArchived:
        type: boolean
        description: "Include archived customers"
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
    required: []

- slug: lightspeed_get_customer
  name: Get Customer
  description: |
    Get detailed information about a specific customer including contact info, addresses, and purchase history.
    Returns the complete customer profile with transaction records.
    This provides full customer data for personalization and support.
  provider: lightspeed
  endpoint: /api/v2/Customer/{customerID}.json
  method: GET
  scopes:
    - read_customers
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customerID:
        type: integer
        description: "The customer ID"
    required:
      - customerID

- slug: lightspeed_list_transactions
  name: List lightspeed Transactions
  description: |
    List all transactions (sales) in Lightspeed Retail POS with filtering options.
    Returns transaction IDs, dates, totals, and payment methods for each sale.
    Use this to track sales and reconcile daily receipts.
  provider: lightspeed
  endpoint: /api/v2/Sale.json
  method: GET
  scopes:
    - read_sales
  tags:
    - transactions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      saleDate:
        type: string
        description: "Filter by date (YYYY-MM-DD)"
      registerID:
        type: integer
        description: "Filter by register ID"
      employeeID:
        type: integer
        description: "Filter by employee ID"
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
    required: []

- slug: lightspeed_get_transaction
  name: Get lightspeed Transaction
  description: |
    Get detailed information about a specific transaction including line items, payments, and totals.
    Returns the complete transaction data with item-level details.
    This provides full transaction data for refunds and accounting.
  provider: lightspeed
  endpoint: /api/v2/Sale/{saleID}.json
  method: GET
  scopes:
    - read_sales
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      saleID:
        type: integer
        description: "The transaction/sale ID"
    required:
      - saleID

