  provider: statsig
  endpoint: /v1/experiments
  method: GET
  scopes:
    - experiments:read
  tags:
    - experiments
    - list
  input_schema:
    type: object
    description: Parameters for listing experiments
    properties:
      project_id:
        type: string
        description: "The project ID"
      limit:
        type: integer
        description: "Maximum number of experiments to return"
    required:
      - project_id

- slug: statsig_get_experiment
  name: Get Experiment
  description: |
    Retrieve details for a specific experiment including its variants, associated metrics, and current results. Returns the complete experiment configuration and statistical analysis.
  provider: statsig
  endpoint: /v1/experiments/{experiment_id}
  method: GET
  scopes:
    - experiments:read
  tags:
    - experiments
    - read
  input_schema:
    type: object
    description: Parameters for getting an experiment
    properties:
      experiment_id:
        type: string
        description: "The experiment ID"
    required:
      - experiment_id

