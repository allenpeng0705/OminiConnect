- slug: statsig_get_metric
  name: Get Metric
  description: |
    Retrieve details for a specific metric including its type, aggregation method, and historical values. Returns the complete metric configuration and data source information.
  provider: statsig
  endpoint: /v1/metrics/{metric_id}
  method: GET
  scopes:
    - metrics:read
  tags:
    - metrics
    - read
  input_schema:
    type: object
    description: Parameters for getting a metric
    properties:
      metric_id:
        type: string
        description: "The metric ID"
    required:
      - metric_id