# Statsig Tools - Allowlist
# Curated subset of Statsig REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. statsig_list_feature_gates     - List feature gates
# 2. statsig_get_feature_gate       - Get feature gate details
# 3. statsig_create_feature_gate    - Create a feature gate
# 4. statsig_update_feature_gate    - Update a feature gate
# 5. statsig_list_experiments       - List experiments
# 6. statsig_get_experiment         - Get experiment details
# 7. statsig_list_users            - List users
# 8. statsig_get_user              - Get user details
# 9. statsig_list_metrics          - List metrics
# 10. statsig_get_metric           - Get metric details

- slug: statsig_list_feature_gates
  name: List Feature Gates
  description: |
    List all feature gates in a Statsig project. Returns gate names, statuses, and targeting rules for each feature gate used in gradual rollouts.
  provider: statsig
  endpoint: /v1/feature_gates
  method: GET
  scopes:
    - feature_gates:read
  tags:
    - feature_gates
    - list
  input_schema:
    type: object
    description: Parameters for listing feature gates
    properties:
      project_id:
        type: string
        description: "The project ID"
      limit:
        type: integer
        description: "Maximum number of gates to return"
    required:
      - project_id

- slug: statsig_get_feature_gate
  name: Get Feature Gate
  description: |
    Retrieve details for a specific feature gate including its rules, default value, and targeting configuration. Returns the complete gate definition.
  provider: statsig
  endpoint: /v1/feature_gates/{gate_name}
  method: GET
  scopes:
    - feature_gates:read
  tags:
    - feature_gates
    - read
  input_schema:
    type: object
    description: Parameters for getting a feature gate
    properties:
      gate_name:
        type: string
        description: "The feature gate name"
    required:
      - gate_name

- slug: statsig_create_feature_gate
  name: Create Feature Gate
  description: |
    Create a new feature gate in Statsig with specified name, description, project, and unit type for targeting. Returns the created gate configuration with its unique identifier.
  provider: statsig
  endpoint: /v1/feature_gates
  method: POST
  scopes:
    - feature_gates:write
  tags:
    - feature_gates
    - create
  input_schema:
    type: object
    description: Parameters for creating a feature gate
    properties:
      name:
        type: string
        description: "The unique gate name"
      description:
        type: string
        description: "Description of the gate"
      project_id:
        type: string
        description: "The project ID"
      id_type:
        type: string
        description: "The unit type (user, device, custom)"
    required:
      - name
      - project_id

- slug: statsig_update_feature_gate
  name: Update Feature Gate
  description: |
    Update an existing feature gate to modify its description, rules, or active status. Returns the updated gate configuration.
  provider: statsig
  endpoint: /v1/feature_gates/{gate_name}
  method: PATCH
  scopes:
    - feature_gates:write
  tags:
    - feature_gates
    - update
  input_schema:
    type: object
    description: Parameters for updating a feature gate
    properties:
      gate_name:
        type: string
        description: "The feature gate name"
      description:
        type: string
        description: "Updated description"
      status:
        type: string
        description: "Gate status (active, inactive)"
    required:
      - gate_name

- slug: statsig_list_experiments
