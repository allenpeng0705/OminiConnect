- slug: statsig_get_user
  name: Get User
  description: |
    Retrieve details for a specific user including their feature gate states, experiment assignments, and evaluation history. Returns the complete user profile.
  provider: statsig
  endpoint: /v1/users/{user_id}
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "The user ID"
    required:
