- slug: statsig_list_metrics
  name: List Metrics
  description: |
    List all metrics in a Statsig project. Returns metric names, types, and configurations for measuring experiment outcomes and feature gate impact.
  provider: statsig
  endpoint: /v1/metrics
  method: GET
  scopes:
    - metrics:read
  tags:
    - metrics
    - list
  input_schema:
    type: object
    description: Parameters for listing metrics
    properties:
      project_id:
        type: string
        description: "The project ID"
      limit:
        type: integer
        description: "Maximum number of metrics to return"
