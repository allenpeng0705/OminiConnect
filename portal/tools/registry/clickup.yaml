- slug: clickup_get_folder
  name: Get Folder
  description: |
    Get detailed information about a specific Clickup folder by its ID. Returns the folder name, description, and contained lists.
  provider: clickup
  endpoint: /folder/{folderId}
  method: GET
  scopes:
    - folders:read
  tags:
    - folders
  input_schema:
    type: object
    description: Path parameters for getting a folder
    properties:
      folderId:
        type: string
        description: "The unique ID of the folder"
    required:
      - folderId
