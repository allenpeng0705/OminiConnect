- slug: clickup_list_tasks
  name: List clickup Tasks
  description: |
    List all tasks in a Clickup list with optional filtering by status, priority, or assignee. Returns task names, IDs, statuses, assignees, and due dates for each task.
  provider: clickup
  endpoint: /list/{listId}/task
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Path and query parameters for listing tasks
    properties:
      listId:
        type: string
        description: "Filter tasks by list ID"
      spaceId:
        type: string
        description: "Filter tasks by space ID"
      projectId:
        type: string
        description: "Filter tasks by project ID"
      status:
        type: string
        description: "Filter by task status"
      include_closed:
        type: boolean
        description: "Include closed tasks"
      page:
        type: integer
        description: "Page number for pagination"
    required:
      - listId

- slug: clickup_get_task
  name: Get clickup Task
  description: |
    Get detailed information about a specific Clickup task by its ID. Returns the task name, description, assignees, due date, and priority.
  provider: clickup
  endpoint: /task/{taskId}
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Path parameters for getting a task
    properties:
      taskId:
        type: string
        description: "The unique ID of the task"
    required:
      - taskId

- slug: clickup_create_task
  name: Create Task
  description: |
    Create a new task in a Clickup list with name, description, assignees, and optional priority. Returns the created task with its unique ID.
  provider: clickup
  endpoint: /list/{listId}/task
  method: POST
  scopes:
    - tasks:write
  tags:
    - tasks
  input_schema:
    type: object
    description: Body parameters for creating a task
    properties:
      listId:
        type: string
        description: "List ID to create the task in"
      name:
        type: string
        description: "Task name"
      description:
        type: string
        description: "Task description"
      assignees:
        type: array
        items:
          type: string
        description: "List of user IDs to assign"
      status:
        type: string
        description: "Task status"
      priority:
        type: integer
        description: "Task priority (1-4)"
      dueDate:
        type: string
        description: "Task due date (Unix timestamp in milliseconds)"
    required:
      - listId
      - name

- slug: clickup_update_task
  name: Update Task
  description: |
    Update an existing Clickup task with new name, description, status, or priority values. Returns the updated task confirming the changes.
  provider: clickup
  endpoint: /task/{taskId}
  method: PUT
  scopes:
    - tasks:write
  tags:
    - tasks
  input_schema:
    type: object
    description: Parameters for updating a task
    properties:
      taskId:
        type: string
        description: "The unique ID of the task"
      name:
        type: string
        description: "New task name"
      description:
        type: string
        description: "New task description"
      status:
        type: string
        description: "New task status"
      priority:
        type: integer
        description: "New task priority (1-4)"
      dueDate:
        type: string
        description: "New due date (Unix timestamp in milliseconds)"
    required:
      - taskId

- slug: clickup_list_lists
  name: List Lists
  description: |
    List all lists in a Clickup space or folder. Returns list names, IDs, and task counts for each list.
  provider: clickup
  endpoint: /space/{spaceId}/list
  method: GET
  scopes:
    - lists:read
  tags:
    - lists
  input_schema:
    type: object
    description: Path and query parameters for listing lists
    properties:
      spaceId:
        type: string
        description: "Filter by space ID"
      folderId:
        type: string
        description: "Filter by folder ID"
      page:
        type: integer
        description: "Page number for pagination"
    required:
      - spaceId

- slug: clickup_get_list
  name: Get List
  description: |
    Get detailed information about a specific Clickup list by its ID. Returns the list name, description, status settings, and task count.
  provider: clickup
  endpoint: /list/{listId}
  method: GET
  scopes:
    - lists:read
  tags:
    - lists
  input_schema:
    type: object
    description: Path parameters for getting a list
    properties:
      listId:
        type: string
        description: "The unique ID of the list"
    required:
      - listId

