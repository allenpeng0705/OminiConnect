- slug: clickup_list_folders
  name: List Folders
  description: |
    List all folders in a Clickup space. Returns folder names, IDs, and nested list counts for each folder.
  provider: clickup
  endpoint: /space/{spaceId}/folder
  method: GET
  scopes:
    - folders:read
  tags:
