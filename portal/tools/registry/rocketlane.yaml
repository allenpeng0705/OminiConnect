- slug: rocketlane_list_time_entries
  name: List Time Entries
  description: |
    Retrieve a list of time entries.
  provider: rocketlane
  endpoint: /v1/time-entries
  method: GET
  scopes:
    - time-entries:read
  tags:
    - time-entries
    - projects
    - tracking
  input_schema:
    type: object
    description: Parameters for listing time entries
    properties:
      projectId:
        type: string
        description: "Filter by project ID"
      limit:
        type: integer
        description: "Number of entries"
        default: 50
    required: []

- slug: rocketlane_create_time_entry
  name: Create Time Entry
  description: |
    Log a time entry for a task.
  provider: rocketlane
  endpoint: /v1/time-entries
  method: POST
  scopes:
    - time-entries:write
  tags:
    - time-entries
    - projects
    - tracking
    - create
  input_schema:
    type: object
    description: Parameters for creating a time entry
    properties:
      taskId:
        type: string
        description: "Task ID"
      projectId:
        type: string
        description: "Project ID"
      duration:
        type: integer
        description: "Duration in minutes"
      description:
        type: string
        description: "Entry description"
    required:
      - taskId
      - duration
