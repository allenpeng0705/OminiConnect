# Avaza Tools - Allowlist
# Curated subset of Avaza REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. avaza_list_projects       - List projects
# 2. avaza_get_project         - Get project details
# 3. avaza_create_project      - Create a project
# 4. avaza_list_tasks          - List tasks
# 5. avaza_get_task            - Get task details
# 6. avaza_list_time_entries   - List time entries
# 7. avaza_get_time_entry      - Get time entry details
# 8. avaza_list_invoices       - List invoices
# 9. avaza_get_invoice         - Get invoice details
# 10. avaza_list_expenses      - List expenses

- slug: avaza_list_projects
  name: List avaza Projects
  description: |
    List projects in Avaza with optional status filter.
  provider: avaza
  endpoint: /api/projects
  method: GET
  scopes:
    - projectread
  tags:
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      status:
        type: string
        description: "Filter by status (Active, Draft, Closed)"
      pageSize:
        type: integer
        description: "Number of results per page"
        default: 20
      pageNumber:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: avaza_get_project
  name: Get avaza Project
  description: |
    Get detailed information about a project.
  provider: avaza
  endpoint: /api/projects/{projectGuid}
  method: GET
  scopes:
    - projectread
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      projectGuid:
        type: string
        description: "Project GUID"
    required:
      - projectGuid

- slug: avaza_create_project
  name: Create Project
  description: |
    Create a new project in Avaza with name, description, and dates.
  provider: avaza
  endpoint: /api/projects
  method: POST
  scopes:
    - projectwrite
  tags:
    - projects
    - create
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      description:
        type: string
        description: "Project description"
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - name

- slug: avaza_list_tasks
  name: List avaza Tasks
  description: |
    List tasks in a project or across all projects with optional project, assignee, and status filters.
  provider: avaza
  endpoint: /api/tasks
  method: GET
  scopes:
    - taskread
  tags:
    - tasks
    - list
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      projectGuid:
        type: string
        description: "Filter by project GUID"
      assigneeGuid:
        type: string
        description: "Filter by assignee GUID"
      isCompleted:
        type: boolean
        description: "Filter by completion status"
    required: []

