- slug: fly_list_apps
  name: List Apps
  description: |
    List all applications in the Fly.io organization. Returns app names, status, and region information for each application.
  provider: fly
  endpoint: /apps
  method: GET
  scopes:
    - apps:read
  tags:
    - apps
  input_schema:
    type: object
    description: Parameters for listing apps
    properties:
      org:
        type: string
        description: "Organization slug (default: personal)"
      limit:
        type: integer
        description: "Maximum number of apps to return"
    required: []

- slug: fly_get_app
  name: Get App
  description: |
    Retrieve detailed information for a specific Fly.io application including configuration, status, and deployment details.
  provider: fly
  endpoint: /apps/{appName}
  method: GET
  scopes:
    - apps:read
  tags:
    - apps
  input_schema:
    type: object
    description: Parameters for getting an app
    properties:
      appName:
        type: string
        description: "The name of the application"
    required:
      - appName

- slug: fly_create_app
  name: Create App
  description: |
    Create a new application on Fly.io with the specified name, organization, and primary region.
  provider: fly
  endpoint: /apps
  method: POST
  scopes:
    - apps:write
  tags:
    - apps
  input_schema:
    type: object
    description: Parameters for creating an app
    properties:
      appName:
        type: string
        description: "Application name (must be unique)"
      org:
        type: string
        description: "Organization slug"
      region:
        type: string
        description: "Primary region"
      machines:
        type: boolean
        description: "Use Machines (default: true)"
    required:
      - appName

- slug: fly_list_machines
  name: List Machines
  description: |
    List all Machines for a Fly.io application. Returns machine IDs, status, region, and configuration for each machine.
  provider: fly
  endpoint: /apps/{appName}/machines
  method: GET
  scopes:
    - machines:read
  tags:
    - machines
  input_schema:
    type: object
    description: Parameters for listing machines
    properties:
      appName:
        type: string
        description: "The name of the application"
      region:
        type: string
        description: "Filter by region"
    required:
      - appName

- slug: fly_get_machine
  name: Get Machine
  description: |
    Retrieve detailed information for a specific Fly.io machine including status, config, and runtime details.
  provider: fly
  endpoint: /machines/{machineId}
  method: GET
  scopes:
    - machines:read
  tags:
    - machines
  input_schema:
    type: object
    description: Parameters for getting a machine
    properties:
      machineId:
        type: string
        description: "The ID of the machine"
    required:
      - machineId

- slug: fly_list_volumes
  name: List Volumes
  description: |
    List all volumes in the Fly.io organization or for a specific app. Returns volume IDs, names, region, and size information.
  provider: fly
  endpoint: /volumes
  method: GET
  scopes:
    - volumes:read
  tags:
    - volumes
  input_schema:
    type: object
    description: Parameters for listing volumes
    properties:
      appName:
        type: string
        description: "Filter by app name"
      org:
        type: string
        description: "Organization slug"
    required: []

- slug: fly_get_volume
  name: Get Volume
  description: |
    Retrieve detailed information for a specific Fly.io volume including size, region, and attached machines.
  provider: fly
  endpoint: /volumes/{volumeId}
  method: GET
  scopes:
    - volumes:read
  tags:
    - volumes
  input_schema:
    type: object
    description: Parameters for getting a volume
    properties:
      volumeId:
        type: string
        description: "The ID of the volume"
    required:
      - volumeId

- slug: fly_list_certificates
  name: List Certificates
  description: |
    List all TLS certificates for a Fly.io application. Returns certificate domains, issuance status, and expiration dates.
  provider: fly
  endpoint: /apps/{appName}/certs
  method: GET
  scopes:
    - certificates:read
  tags:
    - certificates
  input_schema:
    type: object
    description: Parameters for listing certificates
    properties:
      appName:
        type: string
        description: "The name of the application"
    required:
      - appName

- slug: fly_get_certificate
  name: Get Certificate
  description: |
    Retrieve detailed information for a specific certificate including verification status, DNS records, and expiration.
  provider: fly
  endpoint: /apps/{appName}/certs/{hostname}
  method: GET
  scopes:
    - certificates:read
  tags:
    - certificates
  input_schema:
    type: object
    description: Parameters for getting a certificate
    properties:
      appName:
        type: string
        description: "The name of the application"
      hostname:
        type: string
        description: "The hostname for the certificate"
    required:
      - appName
      - hostname

- slug: fly_list_secrets
  name: List Secrets
  description: |
    List all secrets for a Fly.io application. Returns secret names and creation timestamps (values are not exposed).
  provider: fly
  endpoint: /apps/{appName}/secrets
  method: GET
  scopes:
    - secrets:read
  tags:
    - secrets
  input_schema:
    type: object
    description: Parameters for listing secrets
    properties:
      appName:
        type: string
        description: "The name of the application"
    required:
      - appName
