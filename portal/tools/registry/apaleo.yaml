# Apaleo Tools - Allowlist
# Curated subset of Apaleo API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. apaleo_list_reservations  - List all reservations
# 2. apaleo_get_reservation    - Get reservation details
# 3. apaleo_create_reservation - Create a new reservation
# 4. apaleo_list_guests        - List all guests
# 5. apaleo_get_guest          - Get guest details
# 6. apaleo_create_guest       - Create a new guest
# 7. apaleo_list_properties     - List all properties
# 8. apaleo_get_property       - Get property details
# 9. apaleo_list_invoices      - List all invoices
# 10. apaleo_get_invoice       - Get invoice details

- slug: apaleo_list_reservations
  name: List Reservations
  description: |
    List reservations in Apaleo with optional property, status, and arrival date filters.
  provider: apaleo
  endpoint: /reservation-api/reservations
  method: GET
  scopes:
    - reservations:read
  tags:
    - reservations
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing reservations
    properties:
      property_id:
        type: string
        description: "Filter by property ID"
      status:
        type: string
        description: "Filter by status (confirmed, cancelled, checked-in, checked-out)"
      arrival_date:
        type: string
        description: "Filter by arrival date (YYYY-MM-DD)"
      departure_date:
        type: string
        description: "Filter by departure date (YYYY-MM-DD)"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: apaleo_get_reservation
  name: Get Reservation
  description: |
    Get detailed information about a specific reservation including guests, room assignment, and services.
  provider: apaleo
  endpoint: /reservation-api/reservations/{id}
  method: GET
  scopes:
    - reservations:read
  tags:
    - reservations
    - read
  input_schema:
    type: object
    description: Parameters for getting a reservation
    properties:
      id:
        type: string
        description: "Reservation ID"
    required:
      - id

- slug: apaleo_create_reservation
  name: Create Reservation
  description: |
    Create a new reservation with property, room type, arrival/departure dates, and guest information.
  provider: apaleo
  endpoint: /reservation-api/reservations
  method: POST
  scopes:
    - reservations:write
  tags:
    - reservations
    - create
  input_schema:
    type: object
    description: Parameters for creating a reservation
    properties:
      property_id:
        type: string
        description: "Property ID"
      room_type_id:
        type: string
        description: "Room type ID"
      arrival_date:
        type: string
        description: "Arrival date (YYYY-MM-DD)"
      departure_date:
        type: string
        description: "Departure date (YYYY-MM-DD)"
      guest_email:
        type: string
        description: "Guest email address"
      guest_first_name:
        type: string
        description: "Guest first name"
      guest_last_name:
        type: string
        description: "Guest last name"
      adults:
        type: integer
        description: "Number of adults"
        default: 1
    required:
      - property_id
      - room_type_id
      - arrival_date
      - departure_date

