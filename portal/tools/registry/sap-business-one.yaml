- slug: sap-business-one_create_order
  name: Create Order
  description: |
    Create a new sales order.
  provider: sap-business-one
  endpoint: /v1/orders
  method: POST
  scopes:
    - orders:write
  tags:
    - orders
    - sales
    - sap
    - create
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      cardCode:
        type: string
        description: "Business partner code"
      docDate:
        type: string
        description: "Document date"
      lines:
        type: array
        description: "Order lines"
