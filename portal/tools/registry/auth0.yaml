- slug: auth0_list_users
  name: List auth0 Users
  description: |
    List users in your Auth0 tenant with search query and pagination. Returns user IDs, emails, names, and metadata for each user.
    Use this to discover and manage user accounts in your authentication system.
  provider: auth0
  endpoint: /users
  method: GET
  scopes:
    - read:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      q:
        type: string
        description: "Search query string"
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of users per page"
    required: []

- slug: auth0_get_user
  name: Get auth0 User
  description: |
    Get details of a specific user by ID. Returns the user's email, name, picture, metadata, and last login information.
    This provides complete user profile data for account management and support.
  provider: auth0
  endpoint: /users/{id}
  method: GET
  scopes:
    - read:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "The user ID"
    required:
      - id

- slug: auth0_create_user
  name: Create auth0 User
  description: |
    Create a new user in your Auth0 tenant with email, password, and connection. Returns the created user with their unique ID.
    This provisions new user accounts for your application.
  provider: auth0
  endpoint: /users
  method: POST
  scopes:
    - create:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      email:
        type: string
        description: "User email address"
      password:
        type: string
        description: "User password"
      connection:
        type: string
        description: "Database connection name"
      name:
        type: string
        description: "User display name"
    required:
      - email
      - password
      - connection

- slug: auth0_update_user
  name: Update auth0 User
  description: |
    Update an existing user's information in Auth0 including email, name, or metadata. Returns the updated user profile.
    This modifies user account data to keep profiles current.
  provider: auth0
  endpoint: /users/{id}
  method: PATCH
  scopes:
    - update:users
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      id:
        type: string
        description: "The user ID"
      email:
        type: string
        description: "Updated email address"
      name:
        type: string
        description: "Updated display name"
    required:
      - id

- slug: auth0_list_clients
  name: List Clients
  description: |
    List clients (applications) in your Auth0 tenant with pagination. Returns client IDs, names, types, and callback URLs.
    Use this to discover registered applications using your Auth0 domain.
  provider: auth0
  endpoint: /clients
  method: GET
  scopes:
    - read:clients
  tags:
    - clients
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of clients per page"
    required: []

- slug: auth0_get_client
  name: Get Client
  description: |
    Get details of a specific client by ID. Returns the client's name, type, settings, and OAuth configuration.
    This provides complete client application data for configuration management.
  provider: auth0
  endpoint: /clients/{id}
  method: GET
  scopes:
    - read:clients
  tags:
    - clients
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      id:
        type: string
        description: "The client ID"
    required:
      - id

- slug: auth0_list_connections
  name: List Connections
  description: |
    List database and social connections in your Auth0 tenant with pagination. Returns connection names, types, and status.
    This discovers available identity providers for authentication.
  provider: auth0
  endpoint: /connections
  method: GET
  scopes:
    - read:connections
  tags:
    - connections
  input_schema:
    type: object
    description: Parameters for listing connections
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of connections per page"
    required: []

- slug: auth0_get_connection
  name: Get Connection
  description: |
    Get details of a specific connection by ID. Returns the connection configuration, enabled providers, and options.
    This provides detailed connection settings for troubleshooting and configuration.
  provider: auth0
  endpoint: /connections/{id}
  method: GET
  scopes:
    - read:connections
  tags:
    - connections
  input_schema:
    type: object
    description: Parameters for getting a connection
    properties:
      id:
        type: string
        description: "The connection ID"
    required:
      - id

- slug: auth0_get_logs
  name: Get Logs
  description: |
    List log entries for your Auth0 tenant with pagination and type filter. Returns timestamps, event types, and user details.
    This provides security auditing and troubleshooting for authentication events.
  provider: auth0
  endpoint: /logs
  method: GET
  scopes:
    - read:logs
  tags:
    - logs
  input_schema:
    type: object
    description: Parameters for retrieving logs
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of log entries per page"
      type:
        type: string
        description: "Filter by log type (e.g., failed_login)"
    required: []

- slug: auth0_get_rules
  name: Get Rules
  description: |
    List rules configured in your Auth0 tenant with optional stage filter. Returns rule names, order, enabled status, and script content.
    Use this to discover custom authentication logic and extensions.
  provider: auth0
  endpoint: /rules
  method: GET
  scopes:
    - read:rules
  tags:
    - rules
  input_schema:
    type: object
    description: Parameters for getting rules
    properties:
      stage:
        type: string
        description: "Filter rules by stage (login_success, login_failure, etc)"
    required: []