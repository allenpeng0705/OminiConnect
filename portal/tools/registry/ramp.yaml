# Ramp Tools - Allowlist
# Curated subset of Ramp API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ramp_list_transactions       - List all transactions
# 2. ramp_get_transaction         - Get transaction details
# 3. ramp_list_cards              - List company cards
# 4. ramp_get_card                - Get card details
# 5. ramp_list_employees         - List employees
# 6. ramp_get_employee            - Get employee details
# 7. ramp_list_departments        - List departments
# 8. ramp_create_expense          - Create an expense
# 9. ramp_list_limits             - List spending limits
# 10. ramp_get_balance            - Get account balance

- slug: ramp_list_transactions
  name: List ramp Transactions
  description: |
    List all transactions in your Ramp account including amounts, dates, merchants, and status values. Returns transaction records for expense tracking and financial reconciliation.
  provider: ramp
  endpoint: /v1/transactions
  method: GET
  scopes:
    - transactions:read
  tags:
    - transactions
    - spending
    - finance
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      limit:
        type: integer
        description: "Number of transactions to return"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
      status:
        type: string
        description: "Filter by status: pending, posted, declined"
    required: []

- slug: ramp_get_transaction
  name: Get ramp Transaction
  description: |
    Get details of a specific Ramp transaction by ID including amount, date, merchant, category, and receipt information. Returns transaction data for expense reporting and audit preparation.
  provider: ramp
  endpoint: /v1/transactions/{transactionId}
  method: GET
  scopes:
    - transactions:read
  tags:
    - transactions
    - spending
    - finance
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "The transaction ID"
    required:
      - transactionId

- slug: ramp_list_cards
  name: List ramp Cards
  description: |
    List all company cards in your Ramp account including card numbers (masked), holders, spending limits, and activation statuses. Returns card listings for corporate spend management and policy enforcement.
  provider: ramp
  endpoint: /v1/cards
  method: GET
  scopes:
    - cards:read
  tags:
    - cards
    - spending
    - finance
  input_schema:
    type: object
    description: Parameters for listing cards
    properties:
      limit:
        type: integer
        description: "Number of cards to return"
        default: 50
      employeeId:
        type: string
        description: "Filter by employee ID"
    required: []

- slug: ramp_get_card
  name: Get ramp Card
  description: |
    Get details of a specific Ramp card by ID including spending limit, holder information, and recent transaction summaries. Returns card data for usage monitoring and limit adjustment.
  provider: ramp
  endpoint: /v1/cards/{cardId}
  method: GET
  scopes:
    - cards:read
  tags:
    - cards
    - spending
    - finance
  input_schema:
    type: object
    description: Parameters for getting a card
    properties:
      cardId:
        type: string
        description: "The card ID"
    required:
      - cardId

- slug: ramp_list_employees
  name: List Employees
  description: |
    List all employees in your Ramp account including names, email addresses, and department assignments. Returns employee records for spend policy assignment and card management.
  provider: ramp
  endpoint: /v1/employees
  method: GET
  scopes:
    - employees:read
  tags:
    - employees
    - hr
    - finance
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      limit:
        type: integer
        description: "Number of employees to return"
        default: 50
    required: []

- slug: ramp_get_employee
  name: Get Employee
  description: |
    Get details of a specific Ramp employee by ID including name, department, spending limit, and assigned cards. Returns employee data for expense management and policy configuration.
  provider: ramp
  endpoint: /v1/employees/{employeeId}
  method: GET
  scopes:
    - employees:read
  tags:
    - employees
    - hr
    - finance
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "The employee ID"
    required:
      - employeeId

- slug: ramp_list_departments
  name: List Departments
  description: |
    List all departments in your Ramp account including names, budgets, and manager information. Returns department data for organizational structure and budget allocation.
  provider: ramp
  endpoint: /v1/departments
  method: GET
  scopes:
    - departments:read
  tags:
    - departments
    - organization
    - hr
  input_schema:
    type: object
    description: Parameters for listing departments
    properties: {}
    required: []

- slug: ramp_create_expense
  name: Create Expense
  description: |
    Create a new expense record in Ramp with amount, merchant name, date, and optional description and employee assignment. Returns the created expense with ID for tracking and reimbursement processing.
  provider: ramp
  endpoint: /v1/expenses
  method: POST
  scopes:
    - expenses:write
  tags:
    - expenses
    - finance
    - create
  input_schema:
    type: object
    description: Parameters for creating an expense
    properties:
      amount:
        type: number
        description: "Expense amount"
      currency:
        type: string
        description: "Currency code (e.g., USD)"
        default: USD
      merchantName:
        type: string
        description: "Merchant name"
      description:
        type: string
        description: "Expense description"
      employeeId:
        type: string
        description: "Employee ID"
      date:
        type: string
        description: "Expense date (ISO 8601)"
    required:
      - amount
      - merchantName

- slug: ramp_list_limits
  name: List Limits
  description: |
    List spending limits for Ramp cards and employees including daily, monthly, and category-specific restrictions. Returns limit data for policy enforcement and budget monitoring.
  provider: ramp
  endpoint: /v1/limits
  method: GET
  scopes:
    - limits:read
  tags:
    - limits
    - cards
    - finance
  input_schema:
    type: object
    description: Parameters for listing limits
    properties:
      cardId:
        type: string
        description: "Filter by card ID"
    required: []

- slug: ramp_get_balance
  name: Get Balance
  description: |
    Get your Ramp account balance including available credit, pending transactions, and recent cash flow summary. Returns balance data for budget planning and cash management.
  provider: ramp
  endpoint: /v1/balance
  method: GET
  scopes:
    - balance:read
  tags:
    - balance
    - finance
    - account
  input_schema:
    type: object
    description: Parameters for getting balance
    properties: {}
    required: []
