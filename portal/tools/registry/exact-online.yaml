# Exact Online Tools - Allowlist
# Curated subset of Exact Online API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. exact_online_list_accounts           - List accounts
# 2. exact_online_get_account             - Get account details
# 3. exact_online_list_invoices           - List sales invoices
# 4. exact_online_get_invoice             - Get invoice details
# 5. exact_online_list_contacts           - List contacts
# 6. exact_online_get_contact             - Get contact details
# 7. exact_online_list_items              - List items
# 8. exact_online_get_item                - Get item details
# 9. exact_online_list_journals          - List journals
# 10. exact_online_get_financial_balance - Get financial balance

- slug: exact_online_list_accounts
  name: List Accounts
  description: |
    List all accounts (customers and suppliers) in Exact Online with optional filtering by division. Returns account names, codes, addresses, and contact information for each record.
  provider: exact-online
  endpoint: /api/v1/{division}/crm/Accounts
  method: GET
  scopes: []
  tags:
    - accounts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      division:
        type: integer
        description: "Division ID"
      top:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: exact_online_get_account
  name: Get Account
  description: |
    Retrieve detailed information about a specific Exact Online account including address, contact details, tax identification numbers, and payment terms.
  provider: exact-online
  endpoint: /api/v1/{division}/crm/Accounts({id})
  method: GET
  scopes: []
  tags:
    - accounts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting account
    properties:
      division:
        type: integer
        description: "Division ID"
      id:
        type: string
        description: "Account ID"
    required:
      - id

