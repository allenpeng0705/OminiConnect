# Kandji Tools - Allowlist
# Curated subset of Kandji API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. kandji_list_devices         - List devices
# 2. kandji_get_device          - Get device details
# 3. kandji_list_blueprints     - List blueprints
# 4. kandji_get_blueprint      - Get blueprint details
# 5. kandji_list_apps           - List apps
# 6. kandji_get_app            - Get app details
# 7. kandji_list_library_items  - List library items
# 8. kandji_get_library_item   - Get library item details
# 9. kandji_list_users         - List users
# 10. kandji_get_device_activity - Get device activity

- slug: kandji_list_devices
  name: List kandji Devices
  description: |
    List all devices managed by Kandji. Returns device names, types, enrollment status, and blueprint assignments.
  provider: kandji
  endpoint: /api/v1/devices
  method: GET
  scopes: []
  tags:
    - devices
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing devices
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: kandji_get_device
  name: Get kandji Device
  description: |
    Retrieve details about a specific device by its ID. Includes device information, security status, and app inventory.
  provider: kandji
  endpoint: /api/v1/devices/{device_id}
  method: GET
  scopes: []
  tags:
    - devices
    - read
  input_schema:
    type: object
    description: Parameters for getting a device
    properties:
      device_id:
        type: string
        description: "Device ID"
    required:
      - device_id

