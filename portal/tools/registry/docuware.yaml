# DocuWare Tools - Allowlist
# Curated subset of the DocuWare API for AI agent use.
# Two-Step auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. docuware_list_cabinets              - List cabinets
# 2. docuware_get_cabinet              - Get cabinet details
# 3. docuware_list_documents            - List documents
# 4. docuware_get_document              - Get document details
# 5. docuware_search_documents          - Search documents
# 6. docuware_list_folders              - List folders
# 7. docuware_get_folder                - Get folder details
# 8. docuware_list_indexes              - List index fields
# 9. docuware_create_document           - Upload a document
# 10. docuware_get_user                - Get user details

- slug: docuware_list_cabinets
  name: List Cabinets
  description: |
    List all DocuWare cabinets (document repositories) in your organization. Returns cabinet names, IDs, and descriptions for each repository.
  provider: docuware
  endpoint: /Cabinets
  method: GET
  scopes: []
  tags:
    - cabinets
    - document-management
    - list
  input_schema:
    type: object
    description: Parameters for listing cabinets
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required: []

- slug: docuware_get_cabinet
  name: Get Cabinet
  description: |
    Get detailed information about a specific DocuWare cabinet including its structure, index fields, and document count.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}
  method: GET
  scopes: []
  tags:
    - cabinets
    - document-management
    - read
  input_schema:
    type: object
    description: Parameters for getting a cabinet
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
    required:
      - cabinet_id

- slug: docuware_list_documents
  name: List docuware Documents
  description: |
    List all documents stored in a specific DocuWare cabinet. Returns document IDs, names, timestamps, and index values for each document.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Documents
  method: GET
  scopes: []
  tags:
    - documents
    - document-management
    - list
  input_schema:
    type: object
    description: Parameters for listing documents
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required:
      - cabinet_id

- slug: docuware_get_document
  name: Get docuware Document
  description: |
    Get detailed information about a specific document in DocuWare including its metadata, index values, and file properties.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Documents/{document_id}
  method: GET
  scopes: []
  tags:
    - documents
    - document-management
    - read
  input_schema:
    type: object
    description: Parameters for getting a document
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      document_id:
        type: string
        description: "Document ID"
    required:
      - cabinet_id
      - document_id

- slug: docuware_search_documents
  name: Search Documents
  description: |
    Search for documents in a DocuWare cabinet using query expressions. Returns matching documents with their index field values.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Documents/Search
  method: POST
  scopes: []
  tags:
    - search
    - document-management
    - find
  input_schema:
    type: object
    description: Parameters for searching documents
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      query:
        type: string
        description: "Search query expression"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
    required:
      - cabinet_id
      - query

- slug: docuware_list_folders
  name: List Folders
  description: |
    List all folders within a DocuWare cabinet. Returns folder names, IDs, and subfolder counts for each folder.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Folders
  method: GET
  scopes: []
  tags:
    - folders
    - document-management
    - list
  input_schema:
    type: object
    description: Parameters for listing folders
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
    required:
      - cabinet_id

- slug: docuware_get_folder
  name: Get Folder
  description: |
    Get detailed information about a specific folder in DocuWare including its path, contents count, and access permissions.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Folders/{folder_id}
  method: GET
  scopes: []
  tags:
    - folders
    - document-management
    - read
  input_schema:
    type: object
    description: Parameters for getting a folder
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      folder_id:
        type: string
        description: "Folder ID"
    required:
      - cabinet_id
      - folder_id

- slug: docuware_list_indexes
  name: List Indexes
  description: |
    List all index field definitions for a DocuWare cabinet. Returns field names, data types, and validation rules for each index.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Indexes
  method: GET
  scopes: []
  tags:
    - indexes
    - document-management
    - list
  input_schema:
    type: object
    description: Parameters for listing indexes
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
    required:
      - cabinet_id

- slug: docuware_create_document
  name: Create docuware Document
  description: |
    Upload a new document to a DocuWare cabinet with optional index values. Returns the created document ID and storage location.
  provider: docuware
  endpoint: /Cabinets/{cabinet_id}/Documents
  method: POST
  scopes: []
  tags:
    - documents
    - document-management
    - create
  input_schema:
    type: object
    description: Parameters for creating a document
    properties:
      cabinet_id:
        type: string
        description: "Cabinet ID"
      file_name:
        type: string
        description: "File name"
      content:
        type: string
        description: "Document content (base64)"
    required:
      - cabinet_id
      - file_name

- slug: docuware_get_user
  name: Get docuware User
  description: |
    Get information about the currently authenticated DocuWare user including their name, roles, and cabinet access permissions.
  provider: docuware
  endpoint: /UserInfo
  method: GET
  scopes: []
  tags:
    - users
    - profile
    - read
  input_schema:
    type: object
    description: Parameters for getting user info
    properties: {}
