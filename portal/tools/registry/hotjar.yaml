# Hotjar Tools - Allowlist
# Curated subset of Hotjar API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. hotjar_list_recordings - List session recordings
# 2. hotjar_get_recording   - Get recording details
# 3. hotjar_list_heatmaps   - List heatmaps
# 4. hotjar_get_heatmap     - Get heatmap details
# 5. hotjar_list_funnels    - List conversion funnels
# 6. hotjar_get_funnel      - Get funnel details
# 7. hotjar_list_surveys    - List surveys
# 8. hotjar_get_survey      - Get survey details
# 9. hotjar_list_users      - List identified users
# 10. hotjar_get_user       - Get user details

- slug: hotjar_list_recordings
  name: List Recordings
  description: |
    List session recordings for a Hotjar site with pagination. Returns recording IDs, timestamps, user devices, and session durations.
  provider: hotjar
  endpoint: /sites/{siteId}/recordings
  method: GET
  scopes:
    - hotjar.recordings.read
  tags:
    - recordings
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing recordings
    properties:
      siteId:
        type: integer
        description: "Hotjar site ID"
      limit:
        type: integer
        description: "Maximum number of recordings to return (default 50)"
      offset:
        type: integer
        description: "Offset for pagination"
    required:
      - siteId

- slug: hotjar_get_recording
  name: Get Recording
  description: |
    Get a specific Hotjar session recording with full replay data. Returns recording events, clicks, scrolls, mouse movements, and user interactions.
  provider: hotjar
  endpoint: /sites/{siteId}/recordings/{recordingId}
  method: GET
  scopes:
    - hotjar.recordings.read
  tags:
    - recordings
    - read
  input_schema:
    type: object
    description: Parameters for getting a recording
    properties:
      siteId:
        type: integer
        description: "Hotjar site ID"
      recordingId:
        type: string
        description: "Unique identifier of the recording"
    required:
      - siteId
      - recordingId

- slug: hotjar_list_heatmaps
  name: List Heatmaps
  description: |
    List all heatmaps for a Hotjar site showing user click and scroll patterns. Returns heatmap names, URLs, visualization types, and element engagement data.
  provider: hotjar
  endpoint: /sites/{siteId}/heatmaps
