  scopes:
    - hotjar.heatmaps.read
  tags:
    - heatmaps
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing heatmaps
    properties:
      siteId:
        type: integer
        description: "Hotjar site ID"
      limit:
        type: integer
        description: "Maximum number of heatmaps to return"
    required:
      - siteId

- slug: hotjar_get_heatmap
  name: Get Heatmap
  description: |
    Get a specific Hotjar heatmap by ID with detailed click and scroll analytics. Returns element frequencies, engagement metrics, and user behavior patterns.
  provider: hotjar
  endpoint: /sites/{siteId}/heatmaps/{heatmapId}
