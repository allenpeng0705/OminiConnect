- slug: hotjar_list_surveys
  name: List Surveys
  description: |
    List all surveys for a Hotjar site with optional status filtering. Returns survey names, types (feedback or exit-intent), response counts, and completion rates.
  provider: hotjar
  endpoint: /surveys
  method: GET
  scopes:
    - hotjar.surveys.read
  tags:
    - surveys
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing surveys
    properties:
      siteId:
        type: integer
        description: "Hotjar site ID"
      status:
        type: string
        description: "Filter by survey status (active, paused, closed)"
    required:
      - siteId

- slug: hotjar_get_survey
