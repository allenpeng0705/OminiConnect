- slug: apollo_add_contact_to_sequence
  name: Add Contact to Sequence
  description: |
    Add a contact to an Apollo sequence with an optional scheduled date for enrollment.
  provider: apollo
  endpoint: /sequence_enrollments
  method: POST
  scopes:
    - sequences.write
  tags:
    - sequences
    - sales intelligence
    - write
  input_schema:
    type: object
    description: Parameters for adding contact to sequence
    properties:
      contact_id:
        type: string
        description: "The contact ID"
      sequence_id:
        type: string
        description: "The sequence ID"
      scheduled_for:
        type: string
        description: "Schedule date (ISO 8601 format)"
    required:
      - contact_id
      - sequence_id