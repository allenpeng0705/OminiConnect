# Apollo Tools - Sales Intelligence Platform
# Curated subset of Apollo API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. apollo_list_contacts              - List contacts
# 2. apollo_get_contact               - Get contact details
# 3. apollo_create_contact             - Create a contact
# 4. apollo_list_companies             - List companies
# 5. apollo_get_company                - Get company details
# 6. apollo_list_campaigns            - List campaigns
# 7. apollo_get_campaign               - Get campaign details
# 8. apollo_list_sequences            - List sequences
# 9. apollo_get_sequence              - Get sequence details
# 10. apollo_add_contact_to_sequence   - Add contact to sequence

- slug: apollo_list_contacts
  name: List apollo Contacts
  description: |
    List contacts in Apollo with optional filters by name, email, company, or campaign.
    Returns contact records including names, emails, and company associations.
  provider: apollo
  endpoint: /contacts
  method: GET
  scopes:
    - contacts.read
  tags:
    - contacts
    - sales intelligence
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      filter:
        type: string
        description: "Filter expression (e.g., company_id='123')"
    required: []

- slug: apollo_get_contact
  name: Get apollo Contact
  description: |
    Get detailed information about an Apollo contact including contact info and account data.
  provider: apollo
  endpoint: /contacts/{contact_id}
  method: GET
  scopes:
    - contacts.read
  tags:
    - contacts
    - sales intelligence
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contact_id:
        type: string
        description: "The contact ID"
    required:
      - contact_id

- slug: apollo_create_contact
  name: Create Contact
  description: |
    Create a new contact in Apollo with name, email, phone, and company information.
  provider: apollo
  endpoint: /contacts
  method: POST
  scopes:
    - contacts.write
  tags:
    - contacts
    - sales intelligence
    - write
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone_number:
        type: string
        description: "Phone number"
      company_id:
        type: string
        description: "Company ID to associate"
      title:
        type: string
        description: "Job title"
    required:
      - email

