  tags:
    - templates
    - workspace
  input_schema:
    type: object
    description: Parameters for listing templates
    properties:
      workspace_id:
        type: string
        description: "Filter by workspace ID"
      cursor:
        type: string
        description: "Pagination cursor for next page"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required: []

- slug: mural_get_template
  name: Get Template
  description: |
    Retrieve details for a specific template including its name, description, and structure. Returns the complete template configuration for mural creation.
  provider: mural
  endpoint: /v1/templates/{templateId}
  method: GET
  scopes:
    - template:read
  tags:
    - templates
    - read
  input_schema:
    type: object
    description: Parameters for getting a template
    properties:
      templateId:
        type: string
        description: "Template ID (path parameter)"
    required:
      - templateId

