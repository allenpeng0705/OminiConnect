- slug: mural_get_user
  name: Get User
  description: |
    Retrieve details for a specific user including name, email, avatar, and permissions. Returns the complete user profile for workspace verification.
  provider: mural
  endpoint: /v1/users/{userId}
  method: GET
  scopes:
