# Mural Tools - Allowlist
# Curated subset of the Mural REST API for AI agent use.

# === TOOL LIST ===
# 1. mural_list_rooms            - List rooms in Mural
# 2. mural_get_room              - Get a specific room
# 3. mural_create_room           - Create a new room
# 4. mural_list_murals           - List murals in a room
# 5. mural_get_mural             - Get a specific mural
# 6. mural_create_mural          - Create a new mural
# 7. mural_list_templates        - List available templates
# 8. mural_get_template          - Get a specific template
# 9. mural_list_users            - List users in workspace
# 10. mural_get_user             - Get a specific user

- slug: mural_list_rooms
  name: List Rooms
  description: |
    List all rooms in the workspace with optional workspace filtering. Returns room names, IDs, member counts, and mural counts for organization.
  provider: mural
  endpoint: /v1/rooms
  method: GET
  scopes:
    - room:read
  tags:
    - rooms
    - workspace
  input_schema:
    type: object
    description: Parameters for listing rooms
    properties:
      workspace_id:
        type: string
        description: "Filter by workspace ID"
      cursor:
        type: string
        description: "Pagination cursor for next page"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required: []

- slug: mural_get_room
  name: Get Room
  description: |
    Retrieve details for a specific room including name, description, member count, and mural count. Returns the complete room configuration.
  provider: mural
  endpoint: /v1/rooms/{roomId}
  method: GET
  scopes:
    - room:read
  tags:
    - rooms
    - read
  input_schema:
    type: object
    description: Parameters for getting a room
    properties:
      roomId:
        type: string
        description: "Room ID (path parameter)"
    required:
      - roomId

- slug: mural_create_room
  name: Create Room
  description: |
    Create a new room in a workspace with specified name and description. Returns the created room with its unique identifier.
  provider: mural
  endpoint: /v1/rooms
  method: POST
  scopes:
    - room:write
  tags:
    - rooms
    - create
  input_schema:
    type: object
    description: Parameters for creating a room
    properties:
      name:
        type: string
        description: "Room name (required)"
      description:
        type: string
        description: "Room description"
      workspace_id:
        type: string
        description: "Workspace ID to create the room in"
      is_private:
        type: boolean
        description: "Make room private (default false)"
        default: false
    required:
      - name

- slug: mural_list_murals
  name: List Murals
  description: |
    List all murals within a specific room with pagination support. Returns mural names, IDs, and last modified dates for each visual collaboration canvas.
  provider: mural
  endpoint: /v1/rooms/{roomId}/murals
  method: GET
  scopes:
    - mural:read
  tags:
    - murals
    - room
  input_schema:
    type: object
    description: Parameters for listing murals
    properties:
      roomId:
        type: string
        description: "Room ID (path parameter)"
      cursor:
        type: string
        description: "Pagination cursor for next page"
      limit:
        type: integer
        description: "Number of results per page (max 50, default 20)"
        default: 20
    required:
      - roomId

- slug: mural_get_mural
  name: Get Mural
  description: |
    Retrieve details for a specific mural including name, description, size, and current state. Returns the complete mural configuration.
  provider: mural
  endpoint: /v1/murals/{muralId}
  method: GET
  scopes:
    - mural:read
  tags:
    - murals
    - read
  input_schema:
    type: object
    description: Parameters for getting a mural
    properties:
      muralId:
        type: string
        description: "Mural ID (path parameter)"
    required:
      - muralId

- slug: mural_create_mural
  name: Create Mural
  description: |
    Create a new mural in a specified room with name, description, and optional template. Returns the created mural with its unique identifier.
  provider: mural
  endpoint: /v1/rooms/{roomId}/murals
  method: POST
  scopes:
    - mural:write
  tags:
    - murals
    - create
  input_schema:
    type: object
    description: Parameters for creating a mural
    properties:
      roomId:
        type: string
        description: "Room ID (path parameter)"
      name:
        type: string
        description: "Mural name (required)"
      description:
        type: string
        description: "Mural description"
      template_id:
        type: string
        description: "Template ID to use for the mural"
      width:
        type: number
        description: "Mural width in pixels"
        default: 3000
      height:
        type: number
        description: "Mural height in pixels"
        default: 2000
    required:
      - roomId
      - name

- slug: mural_list_templates
  name: List Templates
  description: |
