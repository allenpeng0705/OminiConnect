# Certn Partner Tools - Allowlist
# Curated subset of the Certn Partner API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. certn_partner_list_teams                  - List teams
# 2. certn_partner_get_team                    - Get team details
# 3. certn_partner_list_applicants             - List applicants
# 4. certn_partner_get_applicant               - Get applicant details
# 5. certn_partner_create_applicant            - Create an applicant
# 6. certn_partner_list_background_checks      - List background checks
# 7. certn_partner_get_background_check        - Get background check details
# 8. certn_partner_list_reports                - List reports
# 9. certn_partner_get_report                  - Get report details
# 10. certn_partner_list_invites              - List invites

- slug: certn_partner_list_teams
  name: List certn-partner Teams
  description: |
    Retrieve all teams in the Certn partner account with pagination support. Returns team names, IDs, member counts, and background check settings.
  provider: certn-partner
  endpoint: /api/v2/teams
  method: GET
  scopes: []
  tags:
    - teams
    - management
  input_schema:
    type: object
    description: Parameters for listing teams
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: certn_partner_get_team
  name: Get certn-partner Team
  description: |
    Retrieve detailed information about a specific team by its unique ID. Returns the team name, member list, and background check settings.
  provider: certn-partner
  endpoint: /api/v2/teams/{id}
  method: GET
  scopes: []
  tags:
    - teams
    - read
  input_schema:
    type: object
    description: Parameters for getting a team
    properties:
      id:
        type: string
        description: "Team ID"
    required:
      - id

- slug: certn_partner_list_applicants
  name: List Applicants
  description: |
    Retrieve all job applicants in a specific team with pagination support. Returns applicant names, IDs, application status, and submission dates.
  provider: certn-partner
  endpoint: /api/v2/teams/{teamId}/applicants
  method: GET
  scopes: []
  tags:
    - applicants
    - hr
  input_schema:
    type: object
    description: Parameters for listing applicants
    properties:
      teamId:
        type: string
        description: "Team ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required:
      - teamId

- slug: certn_partner_get_applicant
  name: Get Applicant
  description: |
    Retrieve detailed information about a specific applicant by their unique ID. Returns the applicant name, email, and application status.
  provider: certn-partner
  endpoint: /api/v2/applicants/{id}
  method: GET
  scopes: []
  tags:
    - applicants
    - read
  input_schema:
    type: object
    description: Parameters for getting an applicant
    properties:
      id:
        type: string
        description: "Applicant ID"
    required:
      - id

- slug: certn_partner_create_applicant
  name: Create Applicant
  description: |
    Create a new applicant in a specific team with name, email, and team assignment. Returns the created applicant with their unique ID.
  provider: certn-partner
  endpoint: /api/v2/teams/{teamId}/applicants
  method: POST
  scopes: []
  tags:
    - applicants
    - create
  input_schema:
    type: object
    description: Parameters for creating an applicant
    properties:
      teamId:
        type: string
        description: "Team ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
    required:
      - teamId
      - first_name
      - last_name
      - email

- slug: certn_partner_list_background_checks
  name: List Background Checks
  description: |
    Retrieve all background checks for a specific applicant. Returns check IDs, types, statuses, and completion dates.
  provider: certn-partner
  endpoint: /api/v2/applicants/{applicantId}/background-checks
  method: GET
  scopes: []
  tags:
    - background-checks
    - hr
  input_schema:
    type: object
    description: Parameters for listing background checks
    properties:
      applicantId:
        type: string
        description: "Applicant ID"
    required:
      - applicantId

- slug: certn_partner_get_background_check
  name: Get Background Check
  description: |
    Retrieve detailed information about a specific background check by its unique ID. Returns the check type, status, and completion information.
  provider: certn-partner
  endpoint: /api/v2/background-checks/{id}
  method: GET
  scopes: []
  tags:
    - background-checks
    - read
  input_schema:
    type: object
    description: Parameters for getting a background check
    properties:
      id:
        type: string
        description: "Background check ID"
    required:
      - id

- slug: certn_partner_list_reports
  name: List Reports
  description: |
    Retrieve all reports generated for a specific background check. Returns report IDs, types, statuses, and completion dates.
  provider: certn-partner
  endpoint: /api/v2/background-checks/{checkId}/reports
  method: GET
  scopes: []
  tags:
    - reports
    - hr
  input_schema:
    type: object
    description: Parameters for listing reports
    properties:
      checkId:
        type: string
        description: "Background check ID"
    required:
