- slug: certn_partner_get_report
  name: Get Report
  description: |
    Retrieve detailed information about a specific report by its unique ID. Returns the verification results, findings, and overall status.
  provider: certn-partner
  endpoint: /api/v2/reports/{id}
  method: GET
  scopes: []
  tags:
    - reports
    - read
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      id:
        type: string
        description: "Report ID"
    required:
      - id

- slug: certn_partner_list_invites
  name: List Invites
  description: |
    Retrieve all invitations sent to applicants with pagination support. Returns invite IDs, statuses, and sent dates.
  provider: certn-partner
  endpoint: /api/v2/teams/{teamId}/invites
  method: GET
  scopes: []
  tags:
    - invites
    - hr
  input_schema:
    type: object
    description: Parameters for listing invites
    properties:
      teamId:
        type: string
        description: "Team ID"
    required:
      - teamId
