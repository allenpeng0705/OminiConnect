# eBay Sandbox Tools - Allowlist
# Curated subset of the eBay Sandbox API for AI agent use.
# OAuth2 via Nango (Sandbox environment).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ebay_sandbox_list_items                - List items for sale
# 2. ebay_sandbox_get_item                  - Get item details
# 3. ebay_sandbox_list_orders               - List orders
# 4. ebay_sandbox_get_order                 - Get order details
# 5. ebay_sandbox_list_users                - List users
# 6. ebay_sandbox_get_user                  - Get user details
# 7. ebay_sandbox_list_categories           - List categories
# 8. ebay_sandbox_get_category              - Get category details
# 9. ebay_sandbox_list_transactions         - List transactions
# 10. ebay_sandbox_get_transaction         - Get transaction details

- slug: ebay_sandbox_list_items
  name: List Items
  description: |
    List all inventory items in the eBay sandbox environment. Returns item SKUs, titles, quantities, and pricing.
  provider: ebay-sandbox
  endpoint: /sell/inventory/v1/inventory_item
  method: GET
  scopes: []
  tags:
    - items
    - inventory
    - list
  input_schema:
    type: object
    description: Parameters for listing items
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: ebay_sandbox_get_item
  name: Get Item
  description: |
    Retrieve detailed information about a specific inventory item in the eBay sandbox including full descriptions and inventory levels.
  provider: ebay-sandbox
  endpoint: /sell/inventory/v1/inventory_item/{sku}
  method: GET
  scopes: []
  tags:
    - items
    - inventory
    - read
  input_schema:
    type: object
    description: Parameters for getting an item
    properties:
      sku:
        type: string
        description: "Item SKU"
    required:
      - sku

- slug: ebay_sandbox_list_orders
  name: List Orders
  description: |
    List all orders in the eBay sandbox environment. Returns order IDs, buyer info, item details, and fulfillment status.
  provider: ebay-sandbox
  endpoint: /sell/fulfillment/v1/order
  method: GET
  scopes: []
  tags:
    - orders
    - fulfillment
    - list
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      order_state:
        type: string
        description: "Filter by state: ACTIVE, COMPLETED, CANCELLED"
    required: []

- slug: ebay_sandbox_get_order
  name: Get Order
  description: |
    Retrieve detailed information about a specific order in the eBay sandbox including buyer details and line items.
  provider: ebay-sandbox
  endpoint: /sell/fulfillment/v1/order/{order_id}
  method: GET
  scopes: []
  tags:
    - orders
    - fulfillment
    - read
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      order_id:
        type: string
        description: "Order ID"
    required:
      - order_id

- slug: ebay_sandbox_list_users
  name: List ebay-sandbox Users
  description: |
    List all users in the eBay sandbox environment. Returns user IDs, usernames, and account types.
  provider: ebay-sandbox
  endpoint: /user
  method: GET
  scopes: []
  tags:
    - users
    - account
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
    required: []

- slug: ebay_sandbox_get_user
  name: Get ebay-sandbox User
  description: |
    Retrieve detailed information about a specific user in the eBay sandbox including account status and preferences.
  provider: ebay-sandbox
  endpoint: /user/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - account
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

