  name: Get ebay-sandbox Transaction
  description: |
    Retrieve detailed information about a specific transaction in the eBay sandbox including payment and shipping details.
  provider: ebay-sandbox
  endpoint: /sell/fulfillment/v1/transactions/{transaction_id}
  method: GET
  scopes: []
  tags:
    - transactions
    - fulfillment
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transaction_id:
        type: string
        description: "Transaction ID"
    required:
