- slug: ebay_sandbox_list_transactions
  name: List ebay-sandbox Transactions
  description: |
    List all payment transactions in the eBay sandbox environment. Returns transaction IDs, amounts, and statuses.
  provider: ebay-sandbox
  endpoint: /sell/fulfillment/v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - fulfillment
