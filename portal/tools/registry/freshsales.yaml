- slug: freshsales_list_contacts
  name: List freshsales Contacts
  description: |
    List all contacts in Freshsales CRM with optional filtering. Returns contact names, IDs, email addresses, phone numbers, and lifecycle stages for each contact.
  provider: freshsales
  endpoint: /crm/sales/contacts
  method: GET
  scopes:
    - crm.contacts.read
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      filter:
        type: string
        description: "Filter type: all, walk_in, cold_call, marketing"
      sort_by:
        type: string
        description: "Field to sort by"
      sort_order:
        type: string
        description: "asc or desc"
      per_page:
        type: integer
        description: "Number of results per page (default 20)"
      page:
        type: integer
        description: "Page number for pagination"
    required: []

- slug: freshsales_get_contact
  name: Get freshsales Contact
  description: |
    Get detailed information about a specific Freshsales contact by their ID. Returns the contact name, email, phone, address, company, and all associated deals and activity history.
  provider: freshsales
  endpoint: /crm/sales/contacts/{id}
  method: GET
  scopes:
    - crm.contacts.read
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: freshsales_create_contact
  name: Create Contact
  description: |
    Create a new contact in Freshsales CRM with the specified name, email, and phone number. Returns the created contact with their unique ID.
  provider: freshsales
  endpoint: /crm/sales/contacts
  method: POST
  scopes:
    - crm.contacts.write
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name of the contact"
      last_name:
        type: string
        description: "Last name of the contact"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      mobile:
        type: string
        description: "Mobile number"
    required:
      - first_name
      - last_name

- slug: freshsales_list_deals
  name: List Deals
  description: |
    List all deals in Freshsales CRM with optional filtering. Returns deal names, IDs, amounts, stages, owners, and close dates for each deal.
  provider: freshsales
  endpoint: /crm/sales/deals
  method: GET
  scopes:
    - crm.deals.read
  tags:
    - deals
    - crm
  input_schema:
    type: object
    description: Parameters for listing deals
    properties:
      filter:
        type: string
        description: "Filter: all, open, won, lost"
      sort_by:
        type: string
        description: "Field to sort by"
      sort_order:
        type: string
        description: "asc or desc"
      per_page:
        type: integer
        description: "Number of results per page"
      page:
        type: integer
        description: "Page number"
    required: []

- slug: freshsales_get_deal
  name: Get Deal
  description: |
    Get detailed information about a specific Freshsales deal by its ID. Returns the deal name, amount, stage, contacts, products, and activity timeline.
  provider: freshsales
  endpoint: /crm/sales/deals/{id}
  method: GET
  scopes:
    - crm.deals.read
  tags:
    - deals
    - crm
  input_schema:
    type: object
    description: Parameters for getting a deal
    properties:
      id:
        type: integer
        description: "Deal ID"
    required:
      - id

- slug: freshsales_create_deal
  name: Create Deal
  description: |
    Create a new deal in Freshsales CRM with title, amount, pipeline, stage, and expected close date. Returns the created deal with its unique ID.
  provider: freshsales
  endpoint: /crm/sales/deals
  method: POST
  scopes:
    - crm.deals.write
  tags:
    - deals
    - crm
  input_schema:
    type: object
    description: Parameters for creating a deal
    properties:
      title:
        type: string
        description: "Deal title"
      amount:
        type: number
        description: "Deal amount"
      pipeline:
        type: string
        description: "Pipeline name"
      stage:
        type: string
        description: "Deal stage"
      close_date:
        type: string
        description: "Expected close date (YYYY-MM-DD)"
    required:
      - title

