- slug: freshsales_list_activities
  name: List Activities
  description: |
    List all activities (calls, meetings, notes, emails) in Freshsales CRM with optional filtering. Returns activity types, descriptions, timestamps, and associated entity information for each activity.
  provider: freshsales
  endpoint: /crm/sales/activities
  method: GET
  scopes:
    - crm.activities.read
  tags:
    - activities
    - crm
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      filter:
        type: string
        description: "Filter by type: all, call, meeting, note, email"
      entity_type:
        type: string
        description: "Related entity type (contact, deal, account)"
      entity_id:
        type: integer
        description: "Related entity ID"
      per_page:
        type: integer
        description: "Number of results per page"
      page:
        type: integer
        description: "Page number"
    required: []

