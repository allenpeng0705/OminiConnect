# Wave Tools - Allowlist
# Curated subset of the Wave API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. wave_list_invoices             - List invoices
# 2. wave_get_invoice               - Get a specific invoice
# 3. wave_create_invoice             - Create a new invoice
# 4. wave_send_invoice               - Send an invoice to customer
# 5. wave_list_customers             - List customers
# 6. wave_get_customer               - Get a specific customer
# 7. wave_list_receipts              - List receipts
# 8. wave_get_receipt                - Get a specific receipt
# 9. wave_list_employees             - List employees
# 10. wave_get_employee              - Get a specific employee

- slug: wave_list_invoices
  name: List wave Invoices
  description: |
    List all invoices in your Wave business account. Returns invoice IDs, numbers, customer names, statuses, and totals for each invoice.
  provider: wave
  endpoint: /v1/businesses/{business_id}/invoices
  method: GET
  scopes:
    - BUSINESS_INVOICE_READ
  tags:
    - invoices
    - accounting
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      business_id:
        type: string
        description: "Wave Business ID"
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
      page_size:
        type: integer
        description: "Results per page (max 100)"
        default: 20
    required:
      - business_id

- slug: wave_get_invoice
  name: Get wave Invoice
  description: |
    Get detailed information about a specific Wave invoice by its ID. Returns the invoice number, line items, totals, customer, and status.
  provider: wave
  endpoint: /v1/businesses/{business_id}/invoices/{invoice_id}
  method: GET
  scopes:
    - BUSINESS_INVOICE_READ
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      business_id:
        type: string
        description: "Wave Business ID"
      invoice_id:
        type: string
        description: "Invoice ID"
    required:
      - business_id
      - invoice_id

- slug: wave_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice in Wave with customer and line items. Returns the created invoice with its unique ID and number.
  provider: wave
  endpoint: /v1/businesses/{business_id}/invoices
  method: POST
  scopes:
    - BUSINESS_INVOICE_CREATE
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Invoice creation parameters
    properties:
      business_id:
        type: string
        description: "Wave Business ID"
      customer_id:
        type: string
        description: "Customer ID"
      items:
        type: array
        description: "Array of line item objects"
      invoice_number:
        type: string
        description: "Invoice number"
      due_date:
        type: string
        description: "Due date (YYYY-MM-DD)"
      notes:
        type: string
        description: "Invoice notes"
      currency:
        type: string
        description: "Currency code (e.g., USD, CAD)"
        default: USD
    required:
      - business_id
      - customer_id
      - items

- slug: wave_send_invoice
  name: Send Invoice
  description: |
    Send a specific Wave invoice to the customer via email. Returns confirmation that the invoice was delivered.
  provider: wave
  endpoint: /v1/businesses/{business_id}/invoices/{invoice_id}/send
  method: POST
  scopes:
    - BUSINESS_INVOICE_SEND
  tags:
    - invoices
    - communication
  input_schema:
    type: object
    description: Parameters for sending an invoice
    properties:
      business_id:
        type: string
        description: "Wave Business ID"
      invoice_id:
        type: string
        description: "Invoice ID"
      recipient_email:
        type: string
        description: "Override recipient email (optional)"
      subject:
        type: string
        description: "Email subject (optional)"
      message:
        type: string
        description: "Custom message to include in email (optional)"
    required:
      - business_id
      - invoice_id

