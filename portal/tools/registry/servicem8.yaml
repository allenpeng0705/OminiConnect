# ServiceM8 Tools - Allowlist
# Curated subset of ServiceM8 API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_jobs                                - List all jobs
# 2. get_job                                  - Get job details
# 3. list_activities                          - List all activities
# 4. list_contacts                            - List all contacts
# 5. get_contact                              - Get contact details
# 6. list_invoices                            - List all invoices
# 7. get_invoice                              - Get invoice details
# 8. list_products                            - List all products
# 9. list_schedule                            - List scheduled items
# 10. get_account                              - Get account details

- slug: list_jobs
  name: List Jobs
  description: |
    List all field service jobs in ServiceM8. Returns job details including customer, status, and scheduling information.
  provider: servicem8
  endpoint: /jobs
  method: GET
  scopes: []
  tags:
    - jobs
    - field-service
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_job
  name: Get Job
  description: |
    Get detailed information about a specific field service job including customer details, tasks, and assignment status.
  provider: servicem8
  endpoint: /jobs/{id}
  method: GET
  scopes: []
  tags:
    - jobs
    - field-service
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

