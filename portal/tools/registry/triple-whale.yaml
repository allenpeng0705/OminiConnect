# Triple Whale Tools - Allowlist
# Curated subset of Triple Whale API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. triple_whale_list_stores           - List all connected stores
# # 2. triple_whale_get_store           - Get store details
# # 3. triple_whale_list_orders           - List all orders
# # 4. triple_whale_get_order           - Get order details
# # 5. triple_whale_list_products           - List all products
# # 6. triple_whale_get_product           - Get product details
# # 7. triple_whale_get_analytics           - Get analytics data
# # 8. triple_whale_list_customers           - List all customers
# # 9. triple_whale_get_customer           - Get customer details
# # 10. triple_whale_get_reports           - Get report data

- slug: triple_whale_list_stores
  name: List Stores
  description: |
    List all connected stores
  provider: triple-whale
  endpoint: /api/stores
  method: GET
  scopes:
    - read
  tags:
    - triple-whale
  input_schema:
    type: object
    description: Parameters for list stores
    properties: {}
    required: []

- slug: triple_whale_get_store
