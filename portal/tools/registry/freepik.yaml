# Freepik Tools - Allowlist
# Curated subset of Freepik API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. freepik_list_resources       - List resources
# 2. freepik_get_resource        - Get resource details
# 3. freepik_list_collections    - List collections
# 4. freepik_get_collection     - Get collection details
# 5. freepik_list_ai_styles     - List AI styles
# 6. freepik_generate_ai        - Generate AI image
# 7. freepik_list_categories   - List categories
# 8. freepik_get_user          - Get user info
# 9. freepik_search           - Search resources
# 10. freepik_get_editorial   - Get editorial content

- slug: freepik_list_resources
  name: List Resources
  description: |
    List all available creative resources on Freepik including photos, vectors, and videos. Returns resource IDs, titles, types, and preview thumbnails for each resource with filtering by type.
  provider: freepik
  endpoint: /v1/resources
  method: GET
  scopes: []
  tags:
    - resources
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for listing resources
    properties:
      type:
        type: string
        description: "Filter by type (photo, vector, video)"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: freepik_get_resource
  name: Get Resource
  description: |
    Get detailed information about a specific creative resource including its title, description, author, download formats, and license information.
  provider: freepik
  endpoint: /v1/resources/{id}
  method: GET
  scopes: []
  tags:
    - resources
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for getting resource
    properties:
      id:
        type: string
        description: "Resource ID"
    required:
      - id

- slug: freepik_list_collections
  name: List Collections
  description: |
    List all user-created collections on Freepik. Returns collection IDs, names, resource counts, and creation dates for organizing saved creative assets.
  provider: freepik
  endpoint: /v1/collections
  method: GET
  scopes: []
  tags:
    - collections
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for listing collections
    properties: {}
    required: []

- slug: freepik_get_collection
  name: Get Collection
  description: |
    Get detailed information about a specific collection including its name, description, contained resources, and visibility settings.
  provider: freepik
  endpoint: /v1/collections/{id}
  method: GET
  scopes: []
  tags:
    - collections
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for getting collection
    properties:
      id:
        type: string
        description: "Collection ID"
    required:
      - id

- slug: freepik_list_ai_styles
  name: List AI Styles
  description: |
    List available AI generation styles for image creation on Freepik. Returns style names, descriptions, and example previews for each available AI art style.
  provider: freepik
  endpoint: /v1/ai/styles
  method: GET
  scopes: []
  tags:
    - ai
    - generation
    - read
  input_schema:
    type: object
    description: Parameters for listing AI styles
    properties: {}
    required: []

- slug: freepik_generate_ai
  name: Generate AI
  description: |
    Generate an image using Freepik's AI art generation with a text prompt and selected style. Returns the generated image with download options and generation metadata.
  provider: freepik
  endpoint: /v1/ai/generate
  method: POST
  scopes: []
  tags:
    - ai
    - generation
    - create
  input_schema:
    type: object
    description: Parameters for AI generation
    properties:
      prompt:
        type: string
        description: "Text prompt for generation"
      style:
        type: string
        description: "AI style to use"
    required:
      - prompt

