- slug: freepik_search
  name: Search
  description: |
    Search for creative resources on Freepik by keywords. Returns matching resource IDs, titles, types, thumbnails, and relevance scores for photos, vectors, and videos.
  provider: freepik
  endpoint: /v1/search
  method: GET
  scopes: []
  tags:
    - search
    - creative
    - read
  input_schema:
    type: object
    description: Parameters for searching
    properties:
      q:
        type: string
        description: "Search query"
      type:
        type: string
        description: "Filter by type"
    required:
      - q

