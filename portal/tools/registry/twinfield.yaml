# Twinfield Tools - Allowlist
# Curated subset of Twinfield API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. twinfield_list_customers           - List all customers/debtors
# # 2. twinfield_get_customer           - Get customer details
# # 3. twinfield_list_suppliers           - List all suppliers/creditors
# # 4. twinfield_get_supplier           - Get supplier details
# # 5. twinfield_list_invoices           - List all invoices
# # 6. twinfield_create_invoice           - Create a new invoice
# # 7. twinfield_list_transactions           - List all transactions
# # 8. twinfield_get_balance           - Get account balance
# # 9. twinfield_list_dimensions           - List all dimensions
# # 10. twinfield_create_transaction           - Create a new transaction

- slug: twinfield_list_customers
  name: List Customers
  description: |
    List all customers/debtors
  provider: twinfield
  endpoint: /api/v1/customers
  method: GET
  scopes:
    - read
  tags:
    - twinfield
  input_schema:
    type: object
    description: Parameters for list customers
    properties: {}
    required: []

