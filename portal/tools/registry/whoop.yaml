# Whoop Tools - Allowlist
# Curated subset of Whoop API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. whoop_get_user           - Get current user profile
# # 2. whoop_get_activities           - Get workout activities
# # 3. whoop_get_sleep           - Get sleep data
# # 4. whoop_get_recovery           - Get recovery metrics
# # 5. whoop_get_strain           - Get daily strain score
# # 6. whoop_get_body_measurements           - Get body measurements
# # 7. whoop_get_cycle           - Get daily cycle data
# # 8. whoop_get_workouts           - Get workout data
# # 9. whoop_get_goals           - Get user goals
# # 10. whoop_get_all_metrics           - Get all metrics for a date range

- slug: whoop_get_user
  name: Get whoop User
  description: |
    Get current user profile
  provider: whoop
  endpoint: /v1/user
  method: GET
  scopes:
    - read
  tags:
    - whoop
  input_schema:
    type: object
    description: Parameters for get user
    properties: {}
    required: []

