# Vercel MCP Tools - Allowlist
# Curated subset of Vercel MCP API for AI agent use.
# MCP OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. vercel_list_projects           - List all projects
# # 2. vercel_get_project           - Get project details
# # 3. vercel_list_deployments           - List all deployments
# # 4. vercel_get_deployment           - Get deployment details
# # 5. vercel_create_deployment           - Create a new deployment
# # 6. vercel_delete_deployment           - Delete a deployment
# # 7. vercel_list_domains           - List all domains
# # 8. vercel_add_domain           - Add a new domain
# # 9. vercel_list_secrets           - List all environment secrets
# # 10. vercel_create_secret           - Create an environment secret

- slug: vercel_list_projects
  name: List Projects
  description: |
    List all projects
  provider: vercel-mcp
  endpoint: /v1/projects
  method: GET
  scopes:
    - read
  tags:
    - vercel-mcp
  input_schema:
    type: object
    description: Parameters for list projects
    properties: {}
    required: []

- slug: vercel_get_project
  name: Get Project
  description: |
    Get project details
  provider: vercel-mcp
  endpoint: /v1/projects/{id}
  method: GET
  scopes:
    - read
  tags:
    - vercel-mcp
  input_schema:
    type: object
    description: Parameters for get project
    properties: {}
    required: []

