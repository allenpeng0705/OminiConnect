# Dubsado Tools - Allowlist
# Curated subset of Dubsado CRM API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. dubsado_list_clients         - List all clients
# 2. dubsado_get_client          - Get client details
# 3. dubsado_create_client       - Create a new client
# 4. dubsado_list_projects       - List all projects
# 5. dubsado_get_project          - Get project details
# 6. dubsado_list_tasks          - List all tasks
# 7. dubsado_get_task            - Get task details
# 8. dubsado_list_invoices       - List all invoices
# 9. dubsado_get_invoice         - Get invoice details
# 10. dubsado_list_time_entries  - List all time entries

- slug: dubsado_list_clients
  name: List Clients
  description: |
    List all clients in the Dubsado CRM. Returns client names, emails, phone numbers, and tags for filtering.
  provider: dubsado
  endpoint: /clients
  method: GET
  scopes:
    - clients:r
  tags:
    - clients
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      search:
        type: string
        description: "Search by name or email"
      tag_ids:
        type: string
        description: "Filter by tag IDs"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: dubsado_get_client
  name: Get Client
  description: |
    Retrieve detailed information about a specific Dubsado client including contact details, company info, and project history.
  provider: dubsado
  endpoint: /clients/{id}
  method: GET
  scopes:
    - clients:r
  tags:
    - clients
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      id:
        type: string
        description: "Client ID"
    required:
      - id

- slug: dubsado_create_client
  name: Create Client
  description: |
    Create a new client in Dubsado CRM with name, email, phone, company, and address information. Returns the created client.
  provider: dubsado
  endpoint: /clients
  method: POST
  scopes:
    - clients:w
  tags:
    - clients
    - create
  input_schema:
    type: object
    description: Parameters for creating a client
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company:
        type: string
        description: "Company name"
      address:
        type: string
        description: "Street address"
      city:
        type: string
        description: "City"
      state:
        type: string
        description: "State/Province"
      postal_code:
        type: string
        description: "Postal code"
      country:
        type: string
        description: "Country"
    required:
      - first_name
      - last_name

