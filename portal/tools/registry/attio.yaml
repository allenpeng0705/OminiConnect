- slug: attio_list_contacts
  name: List attio Contacts
  description: |
    List all contacts in your Attio workspace with pagination and sorting. Returns contact names, IDs, email addresses, and phone numbers for each contact.
  provider: attio
  endpoint: /objects/contacts/records
  method: GET
  scopes:
    - contact:read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Maximum number of contacts to return"
      offset:
        type: integer
        description: "Number of contacts to skip"
      sort:
        type: string
        description: "Sort field and direction (e.g., created_at:desc)"
    required: []

- slug: attio_get_contact
  name: Get attio Contact
  description: |
    Get detailed information about a specific Attio contact by their ID. Returns the contact name, email, phone, and all associated company and deal information.
  provider: attio
  endpoint: /objects/contacts/records/{id}
  method: GET
  scopes:
    - contact:read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "The contact ID"
    required:
      - id

- slug: attio_create_contact
  name: Create Contact
  description: |
    Create a new contact in your Attio workspace with name, email, and phone. Returns the created contact with their unique ID.
  provider: attio
  endpoint: /objects/contacts/records
  method: POST
  scopes:
    - contact:write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      name:
        type: string
        description: "Display name of the contact"
      email:
        type: string
        description: "Email address of the contact"
      phone:
        type: string
        description: "Phone number of the contact"
    required:
      - name

