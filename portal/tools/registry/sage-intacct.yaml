# Sage-intacct Tools - Allowlist
# Curated subset of Sage Intacct API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. sage-intacct_list_locations           - List all locations
# 2. sage-intacct_get_location            - Get location details
# 3. sage-intacct_list_departments        - List departments
# 4. sage-intacct_list_employees         - List employees
# 5. sage-intacct_get_employee           - Get employee details
# 6. sage-intacct_list_projects         - List projects
# 7. sage-intacct_get_project            - Get project details
# 8. sage-intacct_list_GL_ACCOUNTS      - List GL accounts
# 9. sage-intacct_list_journals         - List journal entries
# 10. sage-intacct_get_reports          - Get financial reports

- slug: sage-intacct_list_locations
  name: List Locations
  description: |
    Retrieve a list of all locations in Sage Intacct.
  provider: sage-intacct
  endpoint: /v3/locations
  method: GET
  scopes:
    - locations:read
  tags:
    - locations
    - organization
    - accounting
  input_schema:
    type: object
    description: Parameters for listing locations
    properties:
      limit:
        type: integer
        description: "Number of locations"
        default: 50
    required: []

- slug: sage-intacct_get_location
  name: Get Location
  description: |
    Get details of a specific location.
  provider: sage-intacct
  endpoint: /v3/locations/{locationId}
  method: GET
  scopes:
    - locations:read
  tags:
    - locations
    - organization
    - accounting
  input_schema:
    type: object
    description: Parameters for getting a location
    properties:
      locationId:
        type: string
        description: "The location ID"
    required:
      - locationId

