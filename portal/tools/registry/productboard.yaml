# Productboard Tools - Allowlist
# Curated subset of Productboard API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. productboard_list_features       - List features
# 2. productboard_get_feature          - Get feature details
# 3. productboard_create_feature      - Create a new feature
# 4. productboard_list_insights       - List insights
# 5. productboard_get_insight         - Get insight details
# 6. productboard_create_insight      - Create a new insight
# 7. productboard_list_users          - List users
# 8. productboard_get_user            - Get user details
# 9. productboard_list_portals        - List portals
# 10. productboard_get_portal          - Get portal details

- slug: productboard_list_features
  name: List Features
  description: |
    List all features in Productboard. Filter by product, status, or keyword.
  provider: productboard
  endpoint: /api/v1/features
  method: GET
  scopes:
    - features:read
  tags:
    - features
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing features
    properties:
      product_id:
        type: string
        description: "Filter by product ID"
      status:
        type: string
        description: "Filter by status"
      keyword:
        type: string
        description: "Search keyword"
      start:
        type: integer
        description: "Pagination start"
      limit:
        type: integer
        description: "Max results (default 25)"
        default: 25
    required: []

- slug: productboard_get_feature
  name: Get Feature
  description: |
    Get detailed information about a specific feature including name, description, status, and associated insights.
  provider: productboard
  endpoint: /api/v1/features/{id}
  method: GET
  scopes:
    - features:read
  tags:
    - features
    - read
  input_schema:
    type: object
    description: Parameters for getting a feature
    properties:
      id:
        type: string
        description: "Feature ID"
    required:
      - id

- slug: productboard_create_feature
  name: Create Feature
  description: |
    Create a new feature in Productboard. Set name, product, description, and type.
  provider: productboard
  endpoint: /api/v1/features
  method: POST
  scopes:
    - features:write
  tags:
    - features
    - create
  input_schema:
    type: object
    description: Parameters for creating a feature
    properties:
      name:
        type: string
        description: "Feature name"
      product_id:
        type: string
        description: "Product ID"
      description:
        type: string
        description: "Feature description"
      feature_type:
        type: string
        description: "Feature type (enhancement, bug, etc.)"
      status:
        type: string
        description: "Initial status"
    required:
      - name
      - product_id

