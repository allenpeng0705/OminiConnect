- slug: productboard_create_insight
  name: Create Insight
  description: |
    Create a new insight in Productboard. Set title, description, source, and product.
  provider: productboard
  endpoint: /api/v1/insights
  method: POST
  scopes:
    - insights:write
  tags:
    - insights
    - create
  input_schema:
    type: object
    description: Parameters for creating an insight
    properties:
      title:
        type: string
        description: "Insight title"
      description:
        type: string
