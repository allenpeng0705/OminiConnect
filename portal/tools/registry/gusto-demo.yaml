- slug: gusto_list_time_off
  name: List Time Off
  description: |
    Retrieve all time off requests in your Gusto account with employee and status filtering.
    Returns time off records with dates, types, and approval status.
  provider: gusto-demo
  endpoint: /v1/time_off_requests
  method: GET
  scopes:
    - read
  tags:
    - time_off
    - list
  input_schema:
    type: object
    description: Parameters for listing time off requests
    properties:
      employee_id:
        type: integer
        description: "Filter by employee ID"
      status:
        type: string
        description: "Filter by status: approved, denied, pending"
    required: []

- slug: gusto_get_time_off
  name: Get Time Off
