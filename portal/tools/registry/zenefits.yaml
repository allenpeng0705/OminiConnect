# Zenefits Tools - Allowlist
# Curated subset of Zenefits API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zenefits_list_employees           - List all employees
# # 2. zenefits_get_employee           - Get employee details
# # 3. zenefits_list_departments           - List all departments
# # 4. zenefits_list_locations           - List all locations
# # 5. zenefits_list_jobs           - List all job positions
# # 6. zenefits_list_time_off           - List time off requests
# # 7. zenefits_create_time_off           - Create time off request
# # 8. zenefits_list_beneficiaries           - List all beneficiaries
# # 9. zenefits_list_payrolls           - List payroll runs
# # 10. zenefits_list_approvals           - List pending approvals

- slug: zenefits_list_employees
  name: List Employees
  description: |
    List all employees
  provider: zenefits
  endpoint: /core/employees
  method: GET
  scopes:
    - read
  tags:
    - zenefits
  input_schema:
    type: object
    description: Parameters for list employees
    properties: {}
    required: []

- slug: zenefits_get_employee
  name: Get Employee
  description: |
    Get employee details
  provider: zenefits
  endpoint: /core/employees/{id}
  method: GET
  scopes:
    - read
  tags:
    - zenefits
  input_schema:
