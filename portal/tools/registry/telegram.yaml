# Telegram Tools - Allowlist
# Curated subset of Telegram API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. telegram_get_me           - Get information about the bot
# # 2. telegram_get_updates           - Get updates from the bot
# # 3. telegram_send_message           - Send a message to a chat
# # 4. telegram_send_photo           - Send a photo to a chat
# # 5. telegram_send_document           - Send a document to a chat
# # 6. telegram_get_chat           - Get chat information
# # 7. telegram_list_chat_members           - Get chat member count
# # 8. telegram_set_webhook           - Set webhook URL for updates
# # 9. telegram_delete_webhook           - Delete webhook URL
# # 10. telegram_get_file           - Get file information for download

- slug: telegram_get_me
  name: Get Bot Info
  description: |
    Get information about the Telegram bot associated with the authenticated token. Returns the bot's username, first name, and profile picture if available.
  provider: telegram
  endpoint: /getMe
  method: GET
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for get bot info
    properties: {}
    required: []

- slug: telegram_get_updates
  name: Get Updates
  description: |
    Get all updates from the Telegram bot including new messages, inline queries, and callback queries. Returns update IDs, message content, and chat information for each update.
  provider: telegram
  endpoint: /getUpdates
  method: GET
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for get updates
    properties: {}
    required: []

- slug: telegram_send_message
  name: Send Message
  description: |
    Send a text message to a specified Telegram chat from the bot. Returns the sent message with its unique ID, timestamp, and delivery status confirmation.
  provider: telegram
  endpoint: /sendMessage
  method: POST
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for send message
    properties: {}
    required: []

- slug: telegram_send_photo
  name: Send Photo
  description: |
    Send a photo to a specified Telegram chat from the bot. Returns the sent message with the photo's unique ID and file metadata confirming delivery.
  provider: telegram
  endpoint: /sendPhoto
  method: POST
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for send photo
    properties: {}
    required: []

- slug: telegram_send_document
  name: Send Document
  description: |
    Send a document or file to a specified Telegram chat from the bot. Returns the sent message with the document's unique ID and file metadata confirming delivery.
  provider: telegram
  endpoint: /sendDocument
  method: POST
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for send document
    properties: {}
    required: []

- slug: telegram_get_chat
  name: Get Chat
  description: |
    Get detailed information about a specific Telegram chat by its ID. Returns the chat title or name, type (private, group, channel), member count, and description.
  provider: telegram
  endpoint: /getChat
  method: GET
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for get chat
    properties: {}
    required: []

- slug: telegram_list_chat_members
  name: List Chat Members
  description: |
    List all members in a specific Telegram chat by its ID. Returns the total number of members including their basic information in the specified chat.
  provider: telegram
  endpoint: /getChatMemberCount
  method: GET
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for list chat members
    properties: {}
    required: []

- slug: telegram_set_webhook
  name: Set Webhook
  description: |
    Set a webhook URL to receive Telegram updates for the bot. Returns confirmation of successful webhook registration with the specified URL.
  provider: telegram
  endpoint: /setWebhook
  method: POST
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for set webhook
    properties: {}
    required: []

- slug: telegram_delete_webhook
  name: Delete Webhook
  description: |
    Delete the configured webhook URL for the Telegram bot. Returns confirmation that the webhook has been successfully removed and updates will no longer be sent.
  provider: telegram
  endpoint: /deleteWebhook
  method: POST
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for delete webhook
    properties: {}
    required: []

- slug: telegram_get_file
  name: Get File
  description: |
    Get file information for a specific Telegram file by its unique file ID. Returns the file path and download URL to retrieve the actual file content.
  provider: telegram
  endpoint: /getFile
  method: GET
  scopes:
    - 
  tags:
    - telegram
  input_schema:
    type: object
    description: Parameters for get file
    properties: {}
    required: []

