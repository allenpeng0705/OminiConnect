# ProjectManager Tools - Allowlist
# Curated subset of ProjectManager REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. projectmanager_list_projects       - List projects
# 2. projectmanager_get_project         - Get project details
# 3. projectmanager_create_project      - Create a project
# 4. projectmanager_list_tasks          - List tasks
# 5. projectmanager_get_task            - Get task details
# 6. projectmanager_list_teams          - List teams
# 7. projectmanager_get_team            - Get team details
# 8. projectmanager_list_timesheets     - List timesheets
# 9. projectmanager_get_timesheet       - Get timesheet details
# 10. projectmanager_list_milestones     - List milestones

- slug: projectmanager_list_projects
  name: List projectmanager Projects
  description: |
    List all projects available in the ProjectManager account.
    Returns project names, IDs, status, and dates for each project.
    Use this to discover available projects and track their progress.
  provider: projectmanager
  endpoint: /api/projects
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      status:
        type: string
        description: "Filter by status (Active, Archived, Draft)"
    required: []

- slug: projectmanager_get_project
  name: Get projectmanager Project
  description: |
    Get detailed information about a project including tasks and team assignments.
    Returns the complete project data with all associated details.
    This provides full project data for management and analysis.
  provider: projectmanager
  endpoint: /api/projects/{projectId}
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      projectId:
        type: string
        description: "Project ID"
    required:
      - projectId

- slug: projectmanager_create_project
  name: Create Project
  description: |
    Create a new project with name, description, and date range.
    Returns the created project with its unique ID and configuration.
    This provisions a new project in ProjectManager.
  provider: projectmanager
  endpoint: /api/projects
  method: POST
  scopes:
    - projects:write
  tags:
    - projects
    - create
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      description:
        type: string
        description: "Project description"
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - name

- slug: projectmanager_list_tasks
  name: List projectmanager Tasks
  description: |
    List tasks in a project or across all tasks with filtering options.
    Returns task names, IDs, status, and assignees for each task.
    Use this to discover tasks and track work progress.
  provider: projectmanager
  endpoint: /api/tasks
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
    - list
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      projectId:
        type: string
        description: "Filter by project ID"
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: projectmanager_get_task
  name: Get projectmanager Task
  description: |
    Get detailed information about a task including assignments and due dates.
