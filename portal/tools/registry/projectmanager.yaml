- slug: projectmanager_list_timesheets
  name: List Timesheets
  description: |
    List timesheets for tracking work hours with date and user filtering.
    Returns timesheet IDs, dates, hours, and approval status for each entry.
    Use this to track time logging and monitor work hours.
  provider: projectmanager
  endpoint: /api/timesheets
  method: GET
  scopes:
    - timesheets:read
  tags:
    - time-tracking
    - list
  input_schema:
    type: object
    description: Parameters for listing timesheets
    properties:
      userId:
        type: string
        description: "Filter by user ID"
      projectId:
        type: string
        description: "Filter by project ID"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

