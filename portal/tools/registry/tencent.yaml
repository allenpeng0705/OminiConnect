- slug: tencent_list_cvm_instances
  name: List CVM Instances
  description: |
    List all Cloud Virtual Machine (CVM) instances in Tencent Cloud with filtering options.
    Returns instance IDs, names, status, and configuration for each instance.
    Use this to discover cloud servers and manage compute resources.
  provider: tencent
  endpoint: /cvm/v1/instances
  method: GET
  scopes:
    - cvm
  tags:
    - cvm
    - compute
    - cloud
  input_schema:
    type: object
    description: Parameters for listing CVM instances
    properties:
      region:
        type: string
        description: "Tencent Cloud region (e.g., ap-guangzhou, ap-singapore)."
      filters:
        type: string
        description: "Filter conditions as JSON string (e.g., {'instance-state-name': ['RUNNING']})."
      limit:
        type: integer
        description: "Number of instances to return (max 100)."
      offset:
        type: integer
        description: "Offset for pagination."
    required:
      - region

- slug: tencent_get_cvm_instance
  name: Get CVM Instance
  description: |
    Get details of a specific CVM instance by ID including configuration and network settings.
    Returns the complete instance data with IP addresses and resource details.
    This provides full instance data for cloud server management.
  provider: tencent
  endpoint: /cvm/v1/instances/{instance_id}
  method: GET
  scopes:
    - cvm
  tags:
    - cvm
    - compute
    - cloud
  input_schema:
    type: object
    description: Parameters for getting CVM instance details
    properties:
      instance_id:
        type: string
        description: "The CVM instance ID."
      region:
        type: string
        description: "Tencent Cloud region."
    required:
      - instance_id
      - region

- slug: tencent_list_cos_buckets
  name: List COS Buckets
  description: |
    List all Cloud Object Storage (COS) buckets in Tencent Cloud for data management.
    Returns bucket names, regions, and creation dates for each bucket.
    Use this to discover storage containers and manage cloud data.
  provider: tencent
  endpoint: /cos/v1/buckets
  method: GET
  scopes:
    - cos
  tags:
    - cos
    - storage
    - cloud
  input_schema:
    type: object
    description: Parameters for listing COS buckets
    properties:
      region:
        type: string
        description: "Tencent Cloud region."
    required:
      - region

- slug: tencent_list_cos_objects
  name: List COS Objects
  description: |
    List objects in a COS bucket with prefix filtering and pagination.
    Returns object keys, sizes, and last modified dates for each object.
    Use this to browse bucket contents and discover stored files.
  provider: tencent
  endpoint: /cos/v1/buckets/{bucket}/objects
  method: GET
  scopes:
    - cos
  tags:
    - cos
    - storage
    - cloud
  input_schema:
    type: object
    description: Parameters for listing COS objects
    properties:
      bucket:
        type: string
        description: "COS bucket name (e.g., mybucket-1234567890)."
      region:
        type: string
        description: "Tencent Cloud region."
      prefix:
        type: string
        description: "Object key prefix to filter results."
      marker:
        type: string
        description: "Object key to start listing from for pagination."
      max_keys:
        type: integer
        description: "Maximum number of objects to return (max 1000)."
    required:
      - bucket
      - region

- slug: tencent_upload_cos_object
  name: Upload COS Object
  description: |
    Upload a file to COS bucket in Tencent Cloud with specified content and key.
    Returns the uploaded object confirmation with metadata.
    This adds new files to your cloud object storage.
  provider: tencent
  endpoint: /cos/v1/buckets/{bucket}/objects
  method: POST
  scopes:
    - cos
  tags:
    - cos
    - storage
    - cloud
  input_schema:
    type: object
    description: Parameters for uploading a COS object
    properties:
      bucket:
        type: string
        description: "COS bucket name."
      region:
        type: string
        description: "Tencent Cloud region."
      key:
        type: string
        description: "Object key (file path in bucket)."
      body:
        type: string
        description: "Base64-encoded file content."
      content_type:
        type: string
        description: "MIME type of the file (e.g., image/jpeg, application/pdf)."
    required:
      - bucket
      - region
      - key
      - body

