# Setmore Tools - Allowlist
# Curated subset of Setmore API for AI agent use.
# Auth mode: TWO_STEP.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_customers                           - List all customers
# 2. get_customer                             - Get customer details
# 3. list_appointments                        - List all appointments
# 4. get_appointment                          - Get appointment details
# 5. create_appointment                       - Create an appointment
# 6. cancel_appointment                       - Cancel an appointment
# 7. list_services                            - List available services
# 8. list_staff                               - List staff members
# 9. get_availability                         - Get staff availability
# 10. get_business_profile                     - Get business profile

- slug: list_customers
  name: List Customers
  description: |
    List all customers in Setmore. Returns customer names, email addresses, phone numbers, and appointment history.
  provider: setmore
  endpoint: /customer
  method: GET
  scopes: []
  tags:
    - customers
    - crm
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_customer
  name: Get Customer
  description: |
    Get detailed information about a specific customer including their contact details, notes, and upcoming appointments.
  provider: setmore
  endpoint: /customer/{id}
  method: GET
  scopes: []
  tags:
    - customers
    - crm
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_appointments
  name: List Appointments
  description: |
    List all appointments in Setmore. Returns appointment times, customer names, service types, and staff assignments.
  provider: setmore
  endpoint: /appointment
  method: GET
  scopes: []
  tags:
    - appointments
    - scheduling
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_appointment
  name: Get Appointment
  description: |
    Get detailed information about a specific appointment including the customer, service booked, staff assigned, and any notes.
  provider: setmore
  endpoint: /appointment/{id}
  method: GET
  scopes: []
  tags:
    - appointments
    - scheduling
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_appointment
  name: Create Appointment
  description: |
    Create a new appointment in Setmore. Sets the customer, service, date and time, and staff member for the booking.
  provider: setmore
  endpoint: /appointment
  method: POST
  scopes: []
  tags:
    - appointments
    - scheduling
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: cancel_appointment
  name: Cancel Appointment
  description: |
    Cancel an existing appointment in Setmore. Updates the appointment status to cancelled and notifies the customer.
  provider: setmore
  endpoint: /appointment/{id}/cancel
  method: POST
  scopes: []
  tags:
    - appointments
    - scheduling
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_services
  name: List Services
  description: |
    List all available services in Setmore. Returns service names, descriptions, durations, and pricing information.
  provider: setmore
  endpoint: /service
  method: GET
  scopes: []
  tags:
    - services
    - offerings
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_staff
  name: List Staff
  description: |
    List all staff members in Setmore. Returns staff names, roles, email addresses, and scheduling availability.
  provider: setmore
  endpoint: /staff
  method: GET
  scopes: []
  tags:
    - staff
    - team
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_availability
  name: Get Availability
  description: |
    Get staff availability for a specific staff member. Returns available time slots for booking appointments.
  provider: setmore
  endpoint: /availability/{staff_id}
  method: GET
  scopes: []
  tags:
    - availability
    - scheduling
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_business_profile
  name: Get Business Profile
  description: |
    Get business profile information for the authenticated account. Returns company name, address, timezone, and operating hours.
  provider: setmore
  endpoint: /business
  method: GET
  scopes: []
  tags:
    - business
    - profile
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

