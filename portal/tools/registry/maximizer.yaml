# Maximizer Tools - Allowlist
# Curated subset of Maximizer CRM API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. maximizer_list_contacts     - List all contacts
# 2. maximizer_get_contact       - Get contact details
# 3. maximizer_create_contact    - Create a contact
# 4. maximizer_update_contact    - Update a contact
# 5. maximizer_list_companies    - List all companies
# 6. maximizer_get_company       - Get company details
# 7. maximizer_list_opportunities - List opportunities
# 8. maximizer_get_opportunity   - Get opportunity details
# 9. maximizer_list_activities   - List activities
# 10. maximizer_create_activity - Create an activity

- slug: maximizer_list_contacts
  name: List maximizer Contacts
  description: |
    List all contacts in Maximizer CRM.
    Filter by status, company, or search.
  provider: maximizer
  endpoint: /api/v1/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      status:
        type: string
        description: "Filter by status (active, inactive)"
      company_id:
        type: integer
        description: "Filter by company ID"
      search:
        type: string
        description: "Search query"
      page_size:
        type: integer
        description: "Results per page"
        default: 20
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: maximizer_get_contact
  name: Get maximizer Contact
  description: |
    Get detailed information about a specific contact.
  provider: maximizer
  endpoint: /api/v1/contacts/{id}
  method: GET
  scopes: []
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: maximizer_create_contact
  name: Create Contact
  description: |
    Create a new contact in Maximizer.
  provider: maximizer
  endpoint: /api/v1/contacts
  method: POST
  scopes: []
  tags:
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company_id:
        type: integer
        description: "Company ID"
    required:
      - first_name
      - last_name

- slug: maximizer_update_contact
  name: Update Contact
  description: |
    Update an existing contact.
  provider: maximizer
  endpoint: /api/v1/contacts/{id}
  method: PUT
  scopes: []
  tags:
    - contacts
    - update
  input_schema:
    type: object
    description: Parameters for updating a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
    required:
      - id

