- slug: groove_get_reports
  name: Get Reports
  description: |
    Retrieve support performance reports including response times and resolution rates.
    Returns analytics data filtered by report type and date range.
  provider: groove
  endpoint: /api/v2/reports
  method: GET
  scopes:
    - reports.read
  tags:
    - reports
    - analytics
    - read
  input_schema:
    type: object
    description: Parameters for getting reports
    properties:
      report_type:
        type: string
        description: "Report type: conversations, team, or inbox"
      start_date:
        type: string
        description: "Start date (ISO 8601 format)"
      end_date:
        type: string
        description: "End date (ISO 8601 format)"
    required:
      - report_type
