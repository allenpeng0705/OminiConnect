# Freeagent Sandbox Tools - Allowlist
# Curated subset of Freeagent Sandbox API for AI agent use.
# OAuth2 via Nango (Sandbox).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. freeagent_sandbox_list_users           - List users
# 2. freeagent_sandbox_get_user            - Get user details
# 3. freeagent_sandbox_list_contacts       - List contacts
# 4. freeagent_sandbox_get_contact        - Get contact details
# 5. freeagent_sandbox_list_invoices       - List invoices
# 6. freeagent_sandbox_get_invoice        - Get invoice details
# 7. freeagent_sandbox_list_bank_accounts - List bank accounts
# 8. freeagent_sandbox_get_bank_account   - Get bank account details
# 9. freeagent_sandbox_list_projects      - List projects
# 10. freeagent_sandbox_get_project      - Get project details

- slug: freeagent_sandbox_list_users
  name: List freeagent-sandbox Users
  description: |
    List all users in the Freeagent sandbox account. Returns user IDs, names, email addresses, and permission levels for each user in the test environment.
  provider: freeagent-sandbox
  endpoint: /v2/users
  method: GET
  scopes: []
  tags:
    - users
    - accounting
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: freeagent_sandbox_get_user
  name: Get freeagent-sandbox User
  description: |
    Get detailed information about the authenticated user including their name, email, role, and permissions in the Freeagent sandbox environment.
  provider: freeagent-sandbox
  endpoint: /v2/me
  method: GET
  scopes: []
  tags:
    - users
    - accounting
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: freeagent_sandbox_list_contacts
  name: List freeagent-sandbox Contacts
  description: |
    List all contacts in the Freeagent sandbox accounting system. Returns contact IDs, names, email addresses, phone numbers, and account balances for each contact.
  provider: freeagent-sandbox
  endpoint: /v2/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: freeagent_sandbox_get_contact
  name: Get freeagent-sandbox Contact
  description: |
    Get detailed information about a specific contact including their name, email, phone, address, and transaction history with outstanding balances.
  provider: freeagent-sandbox
  endpoint: /v2/contacts/{id}
  method: GET
  scopes: []
  tags:
    - contacts
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: freeagent_sandbox_list_invoices
  name: List freeagent-sandbox Invoices
  description: |
    List all invoices in the Freeagent sandbox with optional status filtering. Returns invoice IDs, numbers, amounts, statuses, and due dates for each invoice.
  provider: freeagent-sandbox
  endpoint: /v2/invoices
  method: GET
  scopes: []
  tags:
    - invoices
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: freeagent_sandbox_get_invoice
  name: Get freeagent-sandbox Invoice
  description: |
    Get detailed information about a specific invoice including line items, total amount, status, due date, and associated contact information.
  provider: freeagent-sandbox
  endpoint: /v2/invoices/{id}
  method: GET
  scopes: []
  tags:
    - invoices
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting invoice
    properties:
      id:
        type: integer
        description: "Invoice ID"
    required:
      - id

- slug: freeagent_sandbox_list_bank_accounts
  name: List Bank Accounts
  description: |
    List all bank accounts linked to the Freeagent sandbox account. Returns account IDs, bank names, account numbers, balances, and account types for each account.
  provider: freeagent-sandbox
  endpoint: /v2/bank_accounts
  method: GET
  scopes: []
  tags:
    - bank
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for listing bank accounts
    properties: {}
    required: []

- slug: freeagent_sandbox_get_bank_account
  name: Get Bank Account
  description: |
    Get detailed information about a specific bank account including the bank name, account number, current balance, and recent transactions.
  provider: freeagent-sandbox
  endpoint: /v2/bank_accounts/{id}
  method: GET
  scopes: []
  tags:
    - bank
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting bank account
    properties:
      id:
        type: integer
        description: "Bank account ID"
    required:
      - id

- slug: freeagent_sandbox_list_projects
  name: List freeagent-sandbox Projects
  description: |
    List all projects in Freeagent sandbox with optional status filtering. Returns project IDs, names, status, contact associations, and budget information for each project.
  provider: freeagent-sandbox
  endpoint: /v2/projects
  method: GET
  scopes: []
  tags:
    - projects
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      status:
        type: string
        description: "Filter by status (Active, Archived)"
    required: []

- slug: freeagent_sandbox_get_project
  name: Get freeagent-sandbox Project
  description: |
    Get detailed information about a specific project including its name, status, budget, associated contact, and time entries for tracking.
  provider: freeagent-sandbox
  endpoint: /v2/projects/{id}
  method: GET
  scopes: []
  tags:
    - projects
    - accounting
    - read
  input_schema:
    type: object
    description: Parameters for getting project
    properties:
      id:
        type: integer
        description: "Project ID"
    required:
      - id
