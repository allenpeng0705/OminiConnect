- slug: google_ads_get_account
  name: Get google-ads Account
  description: |
    Retrieve detailed information about a Google Ads account including billing settings, currency, and account-level permissions. Returns account configuration and credit status.
  provider: google-ads
  endpoint: /v17/customers/{customer_id}
  method: GET
  scopes:
