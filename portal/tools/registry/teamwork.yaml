- slug: teamwork_list_projects
  name: List Projects
  description: |
    List all projects in your Teamwork account with pagination and status filtering. Returns project IDs, names, status values, and creation dates for each project.
  provider: teamwork
  endpoint: /projects.json
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
  input_schema:
    type: object
    description: Query parameters for listing projects
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of projects per page"
      status:
        type: string
        description: "Filter by project status (active, on hold, completed)"
    required: []

- slug: teamwork_get_project
  name: Get Project
  description: |
    Get details for a specific project by its unique ID. Returns the project name, description, status, dates, team members, and all associated settings.
  provider: teamwork
  endpoint: /projects/{projectId}.json
  method: GET
  scopes:
    - projects:read
  tags:
    - projects
  input_schema:
    type: object
    description: Path parameters for getting a project
    properties:
      projectId:
        type: string
        description: "The unique ID of the project"
    required:
      - projectId

- slug: teamwork_create_project
  name: Create Project
  description: |
    Create a new project in Teamwork with the specified name, description, and settings. Returns the created project with its unique ID confirming successful creation.
  provider: teamwork
  endpoint: /projects.json
  method: POST
  scopes:
    - projects:write
  tags:
    - projects
  input_schema:
    type: object
    description: Body parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name"
      description:
        type: string
        description: "Project description"
      status:
        type: string
        description: "Project status (active, on hold, completed)"
      startDate:
        type: string
        description: "Project start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "Project end date (YYYY-MM-DD)"
    required:
      - name

- slug: teamwork_list_tasks
  name: List Tasks
  description: |
    List all tasks in your Teamwork account with optional filtering by project and status. Returns task IDs, names, assignees, due dates, and completion status for each task.
  provider: teamwork
  endpoint: /tasks.json
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Query parameters for listing tasks
    properties:
      projectId:
        type: string
        description: "Filter tasks by project ID"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of tasks per page"
      status:
        type: string
        description: "Filter by task status (open, completed)"
    required: []

- slug: teamwork_get_task
  name: Get Task
  description: |
    Get details for a specific task by its unique ID. Returns the task name, description, assignee, due date, priority, and all associated metadata.
  provider: teamwork
  endpoint: /tasks/{taskId}.json
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Path parameters for getting a task
    properties:
      taskId:
        type: string
        description: "The unique ID of the task"
    required:
      - taskId

- slug: teamwork_create_task
  name: Create Task
  description: |
    Create a new task in a Teamwork project with the specified name, description, and assignments. Returns the created task with its unique ID confirming successful creation.
  provider: teamwork
  endpoint: /tasks.json
  method: POST
  scopes:
    - tasks:write
  tags:
    - tasks
  input_schema:
    type: object
    description: Body parameters for creating a task
    properties:
      projectId:
        type: string
        description: "Project ID to create the task in"
      name:
        type: string
        description: "Task name"
      description:
        type: string
        description: "Task description"
      dueDate:
        type: string
        description: "Task due date (YYYY-MM-DD)"
      assignedTo:
        type: string
        description: "User ID to assign the task to"
    required:
      - projectId
      - name

- slug: teamwork_list_users
  name: List Users
  description: |
    List all users in your Teamwork account with pagination support. Returns user IDs, names, email addresses, and roles for each user account.
  provider: teamwork
  endpoint: /people.json
  method: GET
  scopes:
    - people:read
  tags:
    - users
  input_schema:
    type: object
    description: Query parameters for listing users
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of users per page"
    required: []

- slug: teamwork_get_user
  name: Get User
  description: |
    Get details for a specific user by their unique ID. Returns the user's name, email, avatar, role, and contact information for the user account.
  provider: teamwork
  endpoint: /people/{userId}.json
  method: GET
  scopes:
    - people:read
  tags:
    - users
  input_schema:
    type: object
    description: Path parameters for getting a user
    properties:
      userId:
        type: string
        description: "The unique ID of the user"
    required:
      - userId

- slug: teamwork_list_time_entries
  name: List Time Entries
  description: |
    List all time entries in your Teamwork account with optional filtering by project, task, or user. Returns entry IDs, descriptions, durations, dates, and user assignments.
  provider: teamwork
  endpoint: /time_entries.json
  method: GET
  scopes:
    - time:read
  tags:
    - time_tracking
  input_schema:
    type: object
    description: Query parameters for listing time entries
    properties:
      projectId:
        type: string
        description: "Filter time entries by project ID"
      taskId:
        type: string
        description: "Filter time entries by task ID"
      userId:
        type: string
        description: "Filter time entries by user ID"
      page:
        type: integer
        description: "Page number for pagination"
    required: []

- slug: teamwork_get_time_entry
  name: Get Time Entry
  description: |
    Get details for a specific time entry by its unique ID. Returns the entry description, duration, date, user assignment, and associated project or task information.
  provider: teamwork
  endpoint: /time_entries/{entryId}.json
  method: GET
  scopes:
    - time:read
  tags:
    - time_tracking
  input_schema:
    type: object
    description: Path parameters for getting a time entry
    properties:
      entryId:
        type: string
        description: "The unique ID of the time entry"
    required:
      - entryId
