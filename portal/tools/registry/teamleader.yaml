# Teamleader Focus Tools - Allowlist
# Curated subset of Teamleader Focus API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. teamleader_list_contacts           - List all contacts in Teamleader
# # 2. teamleader_get_contact           - Get details of a specific contact
# # 3. teamleader_create_contact           - Create a new contact
# # 4. teamleader_update_contact           - Update an existing contact
# # 5. teamleader_list_companies           - List all companies
# # 6. teamleader_get_company           - Get details of a company
# # 7. teamleader_list_projects           - List all projects
# # 8. teamleader_get_project           - Get details of a project
# # 9. teamleader_list_invoices           - List all invoices
# # 10. teamleader_get_invoice           - Get details of an invoice

- slug: teamleader_list_contacts
  name: List teamleader Contacts
  description: |
    List all contacts in Teamleader
  provider: teamleader
  endpoint: /contacts.list
  method: POST
  scopes:
    - contacts:read
  tags:
    - teamleader
  input_schema:
    type: object
    description: Parameters for list contacts
    properties: {}
    required: []

