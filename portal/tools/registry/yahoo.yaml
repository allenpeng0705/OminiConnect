# Yahoo Tools - Allowlist
# Curated subset of Yahoo API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. yahoo_get_user           - Get current user info
# # 2. yahoo_list_emails           - List emails in inbox
# # 3. yahoo_get_email           - Get email details
# # 4. yahoo_send_email           - Send an email
# # 5. yahoo_delete_email           - Delete an email
# # 6. yahoo_list_folders           - List all folders
# # 7. yahoo_list_contacts           - List all contacts
# # 8. yahoo_get_contact           - Get contact details
# # 9. yahoo_create_contact           - Create a new contact
# # 10. yahoo_list_calendars           - List all calendars

- slug: yahoo_get_user
  name: Get User
  description: |
    Retrieve the profile information of the authenticated Yahoo user including their name, email, and profile settings.
  provider: yahoo
  endpoint: /profile
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for get user
    properties: {}
    required: []

- slug: yahoo_list_emails
  name: List Emails
  description: |
    Retrieve all emails from the Yahoo mailbox with pagination support. Returns message IDs, subjects, senders, and timestamps for each email.
  provider: yahoo
  endpoint: /messages
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for list emails
    properties: {}
    required: []

- slug: yahoo_get_email
  name: Get Email
  description: |
    Retrieve the full content and metadata of a specific email including the body, attachments, headers, and sender information.
  provider: yahoo
  endpoint: /messages/{id}
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for get email
    properties: {}
    required: []

- slug: yahoo_send_email
  name: Send Email
  description: |
    Send a new email message to specified recipients with subject, body, and optional attachments. Returns the sent message ID and status.
  provider: yahoo
  endpoint: /messages
  method: POST
  scopes:
    - write
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for send email
    properties: {}
    required: []

- slug: yahoo_delete_email
  name: Delete Email
  description: |
    Permanently remove a specific email from the Yahoo mailbox by its ID. Returns confirmation of successful deletion.
  provider: yahoo
  endpoint: /messages/{id}
  method: DELETE
  scopes:
    - write
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for delete email
    properties: {}
    required: []

- slug: yahoo_list_folders
  name: List Folders
  description: |
    Retrieve all mailbox folders including inbox, sent, drafts, and custom folders. Returns folder names, counts, and unread message counts.
  provider: yahoo
  endpoint: /folders
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for list folders
    properties: {}
    required: []

- slug: yahoo_list_contacts
  name: List Contacts
  description: |
    Retrieve all contacts from the Yahoo address book with pagination support. Returns contact names, email addresses, and phone numbers.
  provider: yahoo
  endpoint: /contacts
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for list contacts
    properties: {}
    required: []

- slug: yahoo_get_contact
  name: Get Contact
  description: |
    Retrieve detailed information for a specific contact including their name, email addresses, phone numbers, and physical address.
  provider: yahoo
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for get contact
    properties: {}
    required: []

- slug: yahoo_create_contact
  name: Create Contact
  description: |
    Add a new contact to the Yahoo address book with name, email, phone, and address information. Returns the created contact with their unique ID.
  provider: yahoo
  endpoint: /contacts
  method: POST
  scopes:
    - write
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for create contact
    properties: {}
    required: []

- slug: yahoo_list_calendars
  name: List Calendars
  description: |
    Retrieve all calendars associated with the Yahoo account including primary and shared calendars. Returns calendar names, IDs, and colors.
  provider: yahoo
  endpoint: /calendars
  method: GET
  scopes:
    - read
  tags:
    - yahoo
  input_schema:
    type: object
    description: Parameters for list calendars
    properties: {}
    required: []

