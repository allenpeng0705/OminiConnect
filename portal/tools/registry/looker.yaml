    required: []

- slug: looker_get_model
  name: Get Model
  description: |
    Retrieve details about a specific Looker data model by its name. Returns the model name, description, explores, and available views for querying.
  provider: looker
  endpoint: /models/{modelName}
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - models
    - read
  input_schema:
    type: object
    description: Parameters for getting a model
    properties:
      modelName:
        type: string
        description: "Model name"
    required:
      - modelName

- slug: looker_list_users
  name: List looker Users
  description: |
    List all users in your Looker instance with pagination. Returns user names, IDs, email addresses, and roles for each user.
  provider: looker
  endpoint: /users
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Number of results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: looker_get_user
  name: Get looker User
  description: |
    Retrieve details about a specific Looker user by their ID. Returns the user's name, email, roles, permissions, and preferences.
  provider: looker
  endpoint: /users/{userId}
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

- slug: looker_run_look
  name: Run Look
  description: |
    Execute a saved Looker look and retrieve results in the specified format. Returns the query results with column headers and row data values.
  provider: looker
  endpoint: /looks/{lookId}/run
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - looks
    - execute
  input_schema:
    type: object
    description: Parameters for running a look
    properties:
      lookId:
        type: string
        description: "Look ID"
      format:
        type: string
        description: "Output format: json, csv, html (default json)"
        enum: [json, csv, html]
        default: json
    required:
      - lookId

- slug: looker_get_query
  name: Get Query
  description: |
    Retrieve details about a specific saved Looker query by its ID. Returns the query SQL, parameters, model, explore, and result metadata.
  provider: looker
  endpoint: /queries/{queryId}
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - queries
    - read
  input_schema:
    type: object
    description: Parameters for getting a query
    properties:
      queryId:
        type: string
        description: "Query ID"
    required:
      - queryId
