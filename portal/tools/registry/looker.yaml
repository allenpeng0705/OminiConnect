# Looker Tools - Allowlist
# Curated subset of the Looker API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. looker_list_looks           - List looks
# 2. looker_get_look             - Get look details
# 3. looker_list_dashboards      - List dashboards
# 4. looker_get_dashboard       - Get dashboard details
# 5. looker_list_models         - List models
# 6. looker_get_model           - Get model details
# 7. looker_list_users          - List users
# 8. looker_get_user            - Get user details
# 9. looker_run_look            - Run a look and get results
# 10. looker_get_query          - Get query details

- slug: looker_list_looks
  name: List Looks
  description: |
    List all saved looks in your Looker account with pagination. Returns look titles, IDs, descriptions, and query configurations for each look.
  provider: looker
  endpoint: /looks
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - looks
    - list
  input_schema:
    type: object
    description: Parameters for listing looks
    properties:
      limit:
        type: integer
        description: "Number of results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: looker_get_look
  name: Get Look
  description: |
    Retrieve details about a specific Looker look by its ID. Returns the look title, description, query definition, visualization type, and result data.
  provider: looker
  endpoint: /looks/{lookId}
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - looks
    - read
  input_schema:
    type: object
    description: Parameters for getting a look
    properties:
      lookId:
        type: string
        description: "Look ID"
    required:
      - lookId

- slug: looker_list_dashboards
  name: List Dashboards
  description: |
    List all dashboards in your Looker account with pagination. Returns dashboard names, IDs, descriptions, and tile layouts for each dashboard.
  provider: looker
  endpoint: /dashboards
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - dashboards
    - list
  input_schema:
    type: object
    description: Parameters for listing dashboards
    properties:
      limit:
        type: integer
        description: "Number of results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: looker_get_dashboard
  name: Get Dashboard
  description: |
    Retrieve details about a specific Looker dashboard by its ID. Returns the dashboard title, description, tiles, filters, and layout configuration.
  provider: looker
  endpoint: /dashboards/{dashboardId}
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - dashboards
    - read
  input_schema:
    type: object
    description: Parameters for getting a dashboard
    properties:
      dashboardId:
        type: string
        description: "Dashboard ID or slug"
    required:
      - dashboardId

- slug: looker_list_models
  name: List Models
  description: |
    List all data models in your Looker account with pagination. Returns model names, descriptions, and view counts for each model.
  provider: looker
  endpoint: /models
  method: GET
  scopes:
    - LookerOAuth
  tags:
    - models
    - list
  input_schema:
    type: object
    description: Parameters for listing models
    properties:
      limit:
        type: integer
        description: "Number of results (default 50)"
