- slug: hubspot_list_contacts
  name: List hubspot Contacts
  description: |
    List all contacts in HubSpot CRM with cursor-based pagination. Returns contact names, IDs, email addresses, and all custom properties for each contact.
  provider: hubspot
  endpoint: /crm/v3/objects/contacts
  method: GET
  scopes:
    - crm.objects.contacts.read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of results to return (default 100, max 200)"
      after:
        type: string
        description: "Cursor for pagination (use after from previous response)"
      properties:
        type: array
        description: "Specific properties to return"
    required: []

- slug: hubspot_get_contact
  name: Get hubspot Contact
  description: |
    Get detailed information about a specific HubSpot contact by their ID. Returns the contact's name, email, phone, company, and all custom field values.
  provider: hubspot
  endpoint: /crm/v3/objects/contacts/{id}
  method: GET
  scopes:
    - crm.objects.contacts.read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "The unique contact ID"
      properties:
        type: array
        description: "Specific properties to return"
    required:
      - id

- slug: hubspot_create_contact
  name: Create Contact
  description: |
    Create a new contact in HubSpot CRM with specified properties. Returns the created contact with their unique ID and all properties.
  provider: hubspot
  endpoint: /crm/v3/objects/contacts
  method: POST
  scopes:
    - crm.objects.contacts.write
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      properties:
        type: object
        description: "Contact properties"
      email:
        type: string
        description: "Contact email"
      firstname:
        type: string
        description: "Contact first name"
      lastname:
        type: string
        description: "Contact last name"
    required:
      - properties

