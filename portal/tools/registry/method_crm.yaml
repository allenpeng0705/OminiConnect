- slug: method_crm_list_deals
  name: List Deals
  description: |
    List all deals in Method CRM. Returns deal names, IDs, amounts, stages, and assigned persons for each deal. Filter by status, stage, or assigned person to find specific deals.
  provider: method_crm
  endpoint: /deals
  method: GET
  scopes:
    - deals:r
  tags:
    - deals
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing deals
    properties:
      status:
        type: string
        description: "Filter by status (open, won, lost)"
      stage:
        type: string
        description: "Filter by deal stage"
      assigned_to:
        type: string
        description: "Filter by assigned person ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

