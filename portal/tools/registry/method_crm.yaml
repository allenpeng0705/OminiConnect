  name: List method_crm Tasks
  description: |
    List all tasks in Method CRM. Returns task titles, IDs, status, assignees, and due dates for each task. Filter by status, assignee, or due date range to find specific tasks.
  provider: method_crm
  endpoint: /tasks
  method: GET
  scopes:
    - tasks:r
  tags:
    - tasks
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      status:
        type: string
        description: "Filter by status (pending, in-progress, completed)"
      assignee_id:
        type: string
        description: "Filter by assignee ID"
      due_date_from:
        type: string
        description: "Due date from (YYYY-MM-DD)"
      due_date_to:
        type: string
        description: "Due date to (YYYY-MM-DD)"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

