# Method CRM Tools - Allowlist
# Curated subset of Method CRM API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. method_crm_list_people         - List all people
# 2. method_crm_get_person         - Get person details
# 3. method_crm_create_person      - Create a new person
# 4. method_crm_list_companies      - List all companies
# 5. method_crm_get_company         - Get company details
# 6. method_crm_list_deals          - List all deals
# 7. method_crm_get_deal           - Get deal details
# 8. method_crm_list_tasks          - List all tasks
# 9. method_crm_get_task           - Get task details
# 10. method_crm_list_activities   - List all activities

- slug: method_crm_list_people
  name: List People
  description: |
    List all people in Method CRM. Returns contact names, IDs, email addresses, and phone numbers for each person. Filter by name, email, or tags to find specific contacts.
  provider: method_crm
  endpoint: /people
  method: GET
  scopes:
    - people:r
  tags:
    - people
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing people
    properties:
      search:
        type: string
        description: "Search by name or email"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: method_crm_get_person
  name: Get Person
  description: |
    Get detailed information about a specific Method CRM person. Returns the person's name, email, phone, company association, and all related activities.
  provider: method_crm
  endpoint: /people/{id}
  method: GET
  scopes:
    - people:r
  tags:
    - people
    - read
  input_schema:
    type: object
    description: Parameters for getting a person
    properties:
      id:
        type: string
        description: "Person ID"
    required:
      - id

- slug: method_crm_create_person
  name: Create Person
  description: |
    Create a new person in Method CRM with name, email, phone, and company details. Returns the created person with their unique identifier.
  provider: method_crm
  endpoint: /people
  method: POST
  scopes:
    - people:w
  tags:
    - people
    - create
  input_schema:
    type: object
    description: Parameters for creating a person
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company_id:
        type: string
        description: "Company ID"
      title:
        type: string
        description: "Job title"
    required:
      - first_name
      - last_name

