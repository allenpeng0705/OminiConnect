- slug: oomnitza_assign_asset
  name: Assign Asset
  description: |
    Assign an asset to a user.
  provider: oomnitza
  endpoint: /api/v3/assets/{id}/assign
  method: POST
  scopes:
    - assets:manage
  tags:
    - asset-management
    - assets
    - assignment
  input_schema:
    type: object
    description: Parameters for assigning an asset
    properties:
      id:
        type: string
        description: "Asset ID"
      user_id:
        type: string
        description: "User ID"
    required:
      - id
      - user_id

