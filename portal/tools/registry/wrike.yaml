- slug: wrike_list_tasks
  name: List wrike Tasks
  description: |
    List all tasks in your Wrike account with optional filtering by project, folder, or status. Returns task IDs, titles, assignees, due dates, and completion status for each task.
  provider: wrike
  endpoint: /tasks
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Query parameters for listing tasks
    properties:
      projectId:
        type: string
        description: "Filter tasks by project ID"
      folderId:
        type: string
        description: "Filter tasks by folder ID"
      status:
        type: string
        description: "Filter by task status"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of tasks per page"
    required: []

- slug: wrike_get_task
  name: Get wrike Task
  description: |
    Retrieve details for a specific task by its unique ID. Returns the task title, description, status, assignees, due date, and all associated metadata.
  provider: wrike
  endpoint: /tasks/{taskId}
  method: GET
  scopes:
    - tasks:read
  tags:
    - tasks
  input_schema:
    type: object
    description: Path parameters for getting a task
    properties:
      taskId:
        type: string
        description: "The unique ID of the task"
    required:
      - taskId

- slug: wrike_create_task
  name: Create Task
  description: |
    Create a new task in a Wrike project or folder with the specified title, description, and assignees. Returns the created task with its unique ID confirming successful creation.
  provider: wrike
  endpoint: /tasks
  method: POST
  scopes:
    - tasks:write
  tags:
    - tasks
  input_schema:
    type: object
    description: Body parameters for creating a task
    properties:
      title:
        type: string
        description: "Task title"
      description:
        type: string
        description: "Task description"
      parentId:
        type: string
        description: "Parent folder or project ID"
      assignees:
        type: array
        items:
          type: string
        description: "List of user IDs to assign"
      dueDate:
        type: string
        description: "Task due date (ISO 8601)"
    required:
      - title

- slug: wrike_update_task
  name: Update Task
  description: |
    Update an existing task in Wrike with new values for title, description, status, or due date. Returns the updated task confirming the changes were applied successfully.
  provider: wrike
  endpoint: /tasks/{taskId}
  method: PUT
  scopes:
    - tasks:write
  tags:
    - tasks
  input_schema:
    type: object
    description: Parameters for updating a task
    properties:
      taskId:
        type: string
        description: "The unique ID of the task"
      title:
        type: string
        description: "New task title"
      description:
        type: string
        description: "New task description"
      status:
        type: string
        description: "New task status"
      dueDate:
        type: string
        description: "New due date (ISO 8601)"
    required:
      - taskId

