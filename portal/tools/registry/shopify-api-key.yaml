- slug: list_fulfillments
  name: List Fulfillments
  description: |
    List all fulfillments in the Shopify store. Returns fulfillment IDs, tracking numbers, shipment statuses, and carrier information.
  provider: shopify-api-key
  endpoint: /fulfillments.json
  method: GET
  scopes: []
  tags:
