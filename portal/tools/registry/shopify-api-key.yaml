    properties: {}
    required: []

- slug: create_fulfillment
  name: Create Fulfillment
  description: |
    Create a fulfillment for an order in Shopify. Sets tracking information, notifies the customer, and updates order status.
  provider: shopify-api-key
  endpoint: /orders/{order_id}/fulfillments.json
  method: POST
  scopes: []
  tags:
    - fulfillments
    - shipping
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

