# Exa Tools - Allowlist
# Curated subset of Exa API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. exa_search              - Search the web
# 2. exa_search_contents     - Search and get contents
# 3. exa_find_similar        - Find similar documents
# 4. exa_get_document        - Get document by ID
# 5. exa_list_collections    - List collections
# 6. exa_create_collection   - Create a collection
# 7. exa_delete_document     - Delete a document
# 8. exa_get_stats           - Get usage statistics
# 9. exa_list_webpages       - List discovered webpages
# 10. exa_highlight          - Get highlights from search results

- slug: exa_search
  name: Search
  description: |
    Search the web using natural language queries and return relevant webpages with titles, URLs, summaries, and publication dates.
  provider: exa
  endpoint: /search
  method: POST
  scopes: []
  tags:
    - search
    - web
    - read
  input_schema:
    type: object
    description: Parameters for web search
    properties:
      query:
        type: string
        description: "Natural language search query"
      num_results:
        type: integer
        description: "Number of results (default 10)"
        default: 10
      start_date:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required:
      - query

- slug: exa_search_contents
  name: Search and Get Contents
  description: |
    Search the web and retrieve full content of matching pages including text, metadata, and highlighted passages relevant to the search query.
  provider: exa
  endpoint: /search
  method: POST
  scopes: []
  tags:
    - search
    - web
    - read
  input_schema:
    type: object
    description: Parameters for search with contents
    properties:
      query:
        type: string
        description: "Natural language search query"
      num_results:
        type: integer
        description: "Number of results"
        default: 10
      contents:
        type: boolean
        description: "Include page contents"
        default: true
      start_date:
        type: string
        description: "Start date filter"
      end_date:
        type: string
        description: "End date filter"
    required:
      - query

- slug: exa_find_similar
  name: Find Similar
  description: |
    Find documents similar to a given URL or text query and return relevant webpages with similarity scores and content highlights.
  provider: exa
  endpoint: /find-similar
  method: POST
  scopes: []
  tags:
    - search
    - similarity
    - read
  input_schema:
    type: object
    description: Parameters for finding similar documents
    properties:
      query:
        type: string
        description: "URL or text to find similar content"
      num_results:
        type: integer
        description: "Number of results"
        default: 10
    required:
      - query

- slug: exa_get_document
  name: Get exa Document
  description: |
    Retrieve a specific document from Exa by its ID including full text content, metadata, and extraction data.
  provider: exa
  endpoint: /documents/{id}
  method: GET
  scopes: []
  tags:
    - documents
    - read
  input_schema:
    type: object
    description: Parameters for getting document
    properties:
      id:
        type: string
        description: "Document ID"
    required:
      - id

- slug: exa_list_collections
  name: List Collections
  description: |
    List all document collections in Exa including collection names, descriptions, and document counts for each collection.
  provider: exa
  endpoint: /collections
  method: GET
  scopes: []
  tags:
    - collections
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: exa_create_collection
  name: Create Collection
  description: |
    Create a new document collection in Exa with a specified name and description for organizing stored documents. Returns the created collection identifier.
  provider: exa
  endpoint: /collections
  method: POST
  scopes: []
  tags:
    - collections
    - create
  input_schema:
    type: object
    description: Parameters for creating collection
    properties:
      name:
        type: string
        description: "Collection name"
      description:
        type: string
        description: "Collection description"
    required:
      - name

- slug: exa_delete_document
  name: Delete Document
  description: |
    Delete a specific document from an Exa collection by its ID and receive confirmation of successful deletion.
  provider: exa
  endpoint: /documents/{id}
  method: DELETE
  scopes: []
  tags:
    - documents
    - delete
  input_schema:
    type: object
    description: Parameters for deleting document
    properties:
      id:
        type: string
        description: "Document ID"
    required:
      - id

- slug: exa_get_stats
  name: Get Stats
  description: |
    Retrieve API usage statistics including total searches performed, documents stored, and available quota information for the account.
  provider: exa
  endpoint: /stats
  method: GET
  scopes: []
  tags:
    - stats
    - usage
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: exa_list_webpages
  name: List Webpages
  description: |
    List discovered webpages from previous Exa searches including titles, URLs, scores, and publication dates for each result.
  provider: exa
  endpoint: /webpages
  method: GET
  scopes: []
  tags:
    - search
    - web
    - read
  input_schema:
    type: object
    description: Parameters for listing webpages
    properties:
      num_results:
        type: integer
        description: "Number of results"
        default: 10
    required: []

- slug: exa_highlight
  name: Highlight
  description: |
    Get highlighted text passages from Exa search results that match a specified query and return relevant snippets with source information.
  provider: exa
  endpoint: /highlight
  method: POST
  scopes: []
  tags:
    - search
    - highlights
    - read
  input_schema:
    type: object
    description: Parameters for getting highlights
    properties:
      query:
        type: string
        description: "Query to highlight"
      ids:
        type: array
        items:
          type: string
        description: "Array of result IDs"
    required:
      - query
      - ids
