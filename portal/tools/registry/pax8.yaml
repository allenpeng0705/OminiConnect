# Pax8 Tools - Allowlist
# Curated subset of Pax8 API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pax8_list_companies             - List companies
# 2. pax8_get_company              - Get company details
# 3. pax8_list_subscriptions       - List subscriptions
# 4. pax8_get_subscription        - Get subscription details
# 5. pax8_list_orders              - List orders
# 6. pax8_get_order               - Get order details
# 7. pax8_list_products           - List products
# 8. pax8_get_product             - Get product details
# 9. pax8_list_invoices           - List invoices
# 10. pax8_get_invoice          - Get invoice details

- slug: pax8_list_companies
  name: List Companies
  description: |
    List all companies in Pax8.
  provider: pax8
  endpoint: /v1/companies
  method: GET
  scopes:
    - companies:read
  tags:
    - billing
    - companies
    - directory
  input_schema:
    type: object
    description: Parameters for listing companies
    properties:
      limit:
        type: integer
        description: "Number of companies"
        default: 50
    required: []

- slug: pax8_get_company
  name: Get Company
  description: |
    Get detailed information for a specific company.
  provider: pax8
  endpoint: /v1/companies/{id}
  method: GET
  scopes:
    - companies:read
  tags:
    - billing
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      id:
        type: string
        description: "Company ID"
    required:
      - id

