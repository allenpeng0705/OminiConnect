# Snipe-IT Tools - Allowlist
# Curated subset of Snipe-IT API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_assets                              - List all assets
# 2. get_asset                                - Get asset details
# 3. create_asset                             - Create a new asset
# 4. update_asset                             - Update asset details
# 5. list_users                               - List all users
# 6. get_user                                 - Get user details
# 7. list_locations                           - List all locations
# 8. get_location                             - Get location details
# 9. list_manufacturers                       - List manufacturers
# 10. list_categories                          - List asset categories

- slug: list_assets
  name: List Assets
  description: |
    List all assets in Snipe-IT. Returns asset names, statuses, assigned users, and location information.
  provider: snipe-it
  endpoint: /assets
  method: GET
  scopes: []
  tags:
    - assets
    - inventory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_asset
  name: Get Asset
  description: |
    Get detailed information about a specific asset including its assignment status, location, and purchase information.
  provider: snipe-it
  endpoint: /assets/{id}
  method: GET
  scopes: []
  tags:
    - assets
    - inventory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_asset
  name: Create Asset
  description: |
    Create a new asset in Snipe-IT. Sets the asset name, serial number, model, and assigns it to a location or user.
  provider: snipe-it
  endpoint: /assets
  method: POST
  scopes: []
  tags:
    - assets
    - inventory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: update_asset
  name: Update Asset
  description: |
    Update an existing asset in Snipe-IT. Modifies the asset details, assignment, status, or location information.
  provider: snipe-it
  endpoint: /assets/{id}
  method: PUT
  scopes: []
  tags:
    - assets
    - inventory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

