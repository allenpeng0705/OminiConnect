- slug: avoma_list_collaborators
  name: List Collaborators
  description: |
    List all collaborators in the organization, returning names, email addresses, and permission levels.
  provider: avoma
  endpoint: /v1/collaborators
  method: GET
  scopes: []
  tags:
    - collaborators
    - users
  input_schema:
    type: object
    description: Parameters for listing collaborators
    properties:
