- slug: avoma_search_content
  name: Search Content
  description: |
    Search across meetings, recordings, transcripts, and notes to find specific content by keywords.
  provider: avoma
  endpoint: /v1/search
  method: GET
  scopes: []
  tags:
    - search
    - content
  input_schema:
    type: object
    description: Parameters for searching content
    properties:
      query:
        type: string
        description: "Search query string"
      type:
        type: string
        description: "Content type filter: meeting, recording, transcript, all"
        default: all
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - query
