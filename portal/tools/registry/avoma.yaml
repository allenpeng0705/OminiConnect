# Avoma Tools - Allowlist
# Curated subset of Avoma API for AI agent use.
# API_KEY auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. avoma_list_users             - List users
# 2. avoma_get_user               - Get user details
# 3. avoma_list_meetings           - List meetings
# 4. avoma_get_meeting            - Get meeting details
# 5. avoma_list_recordings         - List recordings
# 6. avoma_get_recording          - Get recording details
# 7. avoma_list_accounts          - List accounts
# 8. avoma_get_account            - Get account details
# 9. avoma_list_collaborators     - List collaborators
# 10. avoma_search_content         - Search across meetings and recordings

- slug: avoma_list_users
  name: List avoma Users
  description: |
    List all users in the Avoma organization, returning names, email addresses, roles, and account status.
  provider: avoma
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - directory
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Users per page"
        default: 20
    required: []

- slug: avoma_get_user
  name: Get avoma User
  description: |
    Get details for a specific user including role, permissions, and configuration settings.
  provider: avoma
  endpoint: /v1/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

- slug: avoma_list_meetings
  name: List Meetings
  description: |
    List all meetings in the organization, returning meeting titles, participants, dates, and duration information.
  provider: avoma
  endpoint: /v1/meetings
  method: GET
  scopes: []
  tags:
    - meetings
    - collaboration
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      userId:
        type: string
        description: "Filter by user ID"
      startDate:
        type: string
        description: "Filter by start date (ISO 8601)"
      endDate:
        type: string
        description: "Filter by end date (ISO 8601)"
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Meetings per page"
        default: 20
    required: []

- slug: avoma_get_meeting
  name: Get Meeting
  description: |
    Get details of a specific meeting including participants and notes.
  provider: avoma
  endpoint: /v1/meetings/{meetingId}
  method: GET
  scopes: []
  tags:
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for getting a meeting
    properties:
      meetingId:
        type: string
        description: "Meeting ID"
    required:
      - meetingId

