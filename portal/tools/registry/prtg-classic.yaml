# PRTG Classic Tools - Allowlist
# Curated subset of PRTG API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. prtg_list_sensors             - List sensors
# 2. prtg_get_sensor               - Get sensor details
# 3. prtg_list_devices             - List devices
# 4. prtg_get_device               - Get device details
# 5. prtg_list_groups              - List groups
# 6. prtg_get_group                 - Get group details
# 7. prtg_list_alerts              - List alerts
# 8. prtg_get_ticket               - Get ticket details
# 9. prtg_list_channels            - List channels
# 10. prtg_get_system_status       - Get system status

- slug: prtg_list_sensors
  name: List Sensors
  description: |
    List all monitoring sensors in PRTG including their current status, type, and last check times.
    Returns sensor records for infrastructure monitoring and alerting configuration.
  provider: prtg-classic
  endpoint: /api/table.json
  method: GET
  scopes: []
  tags:
    - sensors
    - monitoring
    - list
  input_schema:
    type: object
    description: Parameters for listing sensors
    properties:
      content:
        type: string
        description: "Content type (sensors)"
        default: sensors
      count:
        type: integer
        description: "Number of results"
        default: 50
    required: []

- slug: prtg_get_sensor
  name: Get Sensor
  description: |
    Retrieve detailed information about a specific sensor including its current readings, uptime status, and alert thresholds.
    Returns sensor data for troubleshooting and performance analysis.
  provider: prtg-classic
  endpoint: /api/sensors/{sensorId}
  method: GET
  scopes: []
  tags:
    - sensors
    - monitoring
    - read
  input_schema:
    type: object
    description: Parameters for getting a sensor
    properties:
      sensorId:
        type: string
        description: "Sensor ID"
    required:
      - sensorId

