  scopes: []
  tags:
    - loyalty
    - rewards
    - list
  input_schema:
    type: object
    description: Parameters for listing loyalty rewards
    properties:
      customer_id:
        type: string
        description: "Filter by customer ID"
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

