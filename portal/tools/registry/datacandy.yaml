# DataCandy Tools - Allowlist
# Curated subset of the DataCandy API for AI agent use.
# BASIC auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. datacandy_list_customers          - List customers
# 2. datacandy_get_customer           - Get customer details
# 3. datacandy_create_customer        - Create a customer
# 4. datacandy_update_customer        - Update customer details
# 5. datacandy_list_loyalty_rewards   - List loyalty rewards
# 6. datacandy_get_loyalty_reward     - Get reward details
# 7. datacandy_list_gift_cards        - List gift cards
# 8. datacandy_get_gift_card          - Get gift card details
# 9. datacandy_list_campaigns         - List campaigns
# 10. datacandy_get_campaign          - Get campaign details

- slug: datacandy_list_customers
  name: List Customers
  description: |
    List all customers in DataCandy, returning customer IDs, names, email addresses, and contact information.
  provider: datacandy
  endpoint: /merchant
  method: GET
  scopes: []
  tags:
    - customers
    - crm
    - list
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: datacandy_get_customer
  name: Get Customer
  description: |
    Get detailed information for a specific DataCandy customer including their profile, purchase history, and loyalty status.
  provider: datacandy
  endpoint: /merchant/{customer_id}
  method: GET
  scopes: []
  tags:
    - customers
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: string
        description: "Customer ID"
    required:
      - customer_id

- slug: datacandy_create_customer
  name: Create Customer
  description: |
    Create a new customer in DataCandy with the specified email, name, and contact information.
  provider: datacandy
  endpoint: /merchant
  method: POST
  scopes: []
  tags:
    - customers
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for creating a customer
    properties:
      email:
        type: string
        description: "Customer email"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      phone:
        type: string
        description: "Phone number"
    required:
      - email

- slug: datacandy_update_customer
  name: Update Customer
  description: |
    Update customer information in DataCandy, modifying the specified fields for an existing customer record.
  provider: datacandy
  endpoint: /merchant/{customer_id}
  method: PUT
  scopes: []
  tags:
    - customers
    - crm
    - update
  input_schema:
    type: object
    description: Parameters for updating a customer
    properties:
      customer_id:
        type: string
        description: "Customer ID"
      email:
        type: string
        description: "Customer email"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      phone:
        type: string
        description: "Phone number"
    required:
      - customer_id

