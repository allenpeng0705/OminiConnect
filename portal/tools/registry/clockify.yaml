# Clockify Tools - Allowlist
# Curated subset of Clockify API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. clockify_list_time_entries          - List time entries
# 2. clockify_get_time_entry             - Get time entry details
# 3. clockify_create_time_entry          - Create a new time entry
# 4. clockify_update_time_entry          - Update a time entry
# 5. clockify_list_projects              - List projects
# 6. clockify_get_project                - Get project details
# 7. clockify_list_workspaces            - List workspaces
# 8. clockify_get_workspace             - Get workspace details
# 9. clockify_get_time_report            - Get time report
# 10. clockify_list_users                - List users

- slug: clockify_list_time_entries
  name: List Time Entries
  description: |
    List time entries within a workspace, returning entry IDs, associated projects, user information, and duration details.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/time-entries
  method: GET
  scopes:
    - read
  tags:
    - time_entries
    - list
  input_schema:
    type: object
    description: Parameters for listing time entries
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
      userId:
        type: string
        description: "User ID"
      projectId:
        type: string
        description: "Project ID"
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - workspaceId

- slug: clockify_get_time_entry
  name: Get Time Entry
  description: |
    Get detailed information about a specific time entry, including project association, duration, and description.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/time-entries/{id}
  method: GET
  scopes:
    - read
  tags:
    - time_entries
    - read
  input_schema:
    type: object
    description: Parameters for getting a time entry
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
      id:
        type: string
        description: "Time entry ID"
    required:
      - workspaceId
      - id

- slug: clockify_create_time_entry
  name: Create Time Entry
  description: |
    Create a new time entry in a workspace, specifying the project, start and end times, and description.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/time-entries
  method: POST
  scopes:
    - write
  tags:
    - time_entries
    - create
  input_schema:
    type: object
    description: Parameters for creating a time entry
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
      projectId:
        type: string
        description: "Project ID"
      description:
        type: string
        description: "Time entry description"
      start:
        type: string
        description: "Start time (ISO 8601)"
      end:
        type: string
        description: "End time (ISO 8601)"
    required:
      - workspaceId

- slug: clockify_update_time_entry
  name: Update Time Entry
  description: |
    Update an existing time entry, modifying its project, time range, or description.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/time-entries/{id}
  method: PUT
  scopes:
    - write
  tags:
    - time_entries
    - update
  input_schema:
    type: object
    description: Parameters for updating a time entry
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
      id:
        type: string
        description: "Time entry ID"
      projectId:
        type: string
        description: "New project ID"
      description:
        type: string
        description: "New description"
      start:
        type: string
        description: "New start time (ISO 8601)"
      end:
        type: string
        description: "New end time (ISO 8601)"
    required:
      - workspaceId
      - id

- slug: clockify_list_workspaces
  name: List clockify Workspaces
  description: |
    List all workspaces accessible to the authenticated user, returning workspace IDs and names.
  provider: clockify
  endpoint: /v1/workspaces
  method: GET
  scopes:
    - read
  tags:
    - workspaces
    - list
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: clockify_get_workspace
  name: Get clockify Workspace
  description: |
    Get detailed information about a specific workspace, including its name, settings, and associated projects.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}
  method: GET
  scopes:
    - read
  tags:
    - workspaces
    - read
  input_schema:
    type: object
    description: Parameters for getting a workspace
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
    required:
      - workspaceId

- slug: clockify_list_projects
  name: List clockify Projects
  description: |
    List all projects in a workspace, returning project IDs, names, client associations, and current status.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/projects
  method: GET
  scopes:
    - read
  tags:
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
      archived:
        type: boolean
        description: "Include archived projects"
    required:
      - workspaceId

- slug: clockify_get_project
  name: Get clockify Project
  description: |
    Get detailed information about a specific project, including its name, description, client, and billing settings.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/projects/{id}
  method: GET
  scopes:
    - read
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
      id:
        type: string
        description: "Project ID"
    required:
      - workspaceId
      - id

- slug: clockify_list_users
  name: List clockify Users
  description: |
    List all users in a workspace, returning user IDs, names, email addresses, and status.
  provider: clockify
  endpoint: /v1/workspaces/{workspaceId}/users
  method: GET
  scopes:
    - read
  tags:
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      workspaceId:
        type: string
        description: "Workspace ID"
    required:
      - workspaceId

- slug: clockify_get_user
  name: Get clockify User
  description: |
    Get detailed information about a specific user, including their name, email address, and assigned roles.
  provider: clockify
  endpoint: /v1/users/{id}
  method: GET
  scopes:
    - read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id
