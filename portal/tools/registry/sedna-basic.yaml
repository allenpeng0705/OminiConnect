# Sedna (Basic Auth) Tools - Allowlist
# Curated subset of Sedna (Basic Auth) API for AI agent use.
# Auth mode: BASIC.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_user                                 - Get current user profile
# 2. list_messages                            - List messages in workspace
# 3. send_message                             - Send a message
# 4. list_channels                            - List all channels
# 5. create_channel                           - Create a new channel
# 6. get_channel                              - Get channel details
# 7. list_members                             - List workspace members
# 8. list_files                               - List files in workspace
# 9. upload_file                              - Upload a file
# 10. get_workspace                            - Get workspace details

- slug: get_user
  name: Get sedna-basic User
  description: |
    Get current user profile
  provider: sedna-basic
  endpoint: /users/me
  method: GET
  scopes: []
  tags:
    - user
    - profile
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

