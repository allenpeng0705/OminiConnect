    description: Parameters for listing templates
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Templates per page"
        default: 20
    required: []

- slug: bird_create_template
  name: Create Template
  description: |
    Create a new message template with name, channel, and content for outgoing communications.
    Templates ensure consistent messaging across campaigns.
  provider: bird
  endpoint: /v1/templates
  method: POST
  scopes: []
  tags:
    - templates
    - create
  input_schema:
    type: object
    description: Parameters for creating a template
    properties:
      name:
        type: string
        description: "Template name"
      channel:
        type: string
        description: "Channel: sms, email, etc."
      content:
        type: string
        description: "Template content"
    required:
      - name
      - channel
      - content

