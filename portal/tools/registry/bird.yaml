# Bird Tools - Allowlist
# Curated subset of Bird Composable API for AI agent use.
# API_KEY auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bird_list_messages         - List messages
# 2. bird_get_message          - Get message details
# 3. bird_send_message         - Send a message
# 4. bird_list_templates       - List message templates
# 5. bird_create_template      - Create message template
# 6. bird_list_contacts       - List contacts
# 7. bird_get_contact          - Get contact details
# 8. bird_list_campaigns       - List campaigns
# 9. bird_get_campaign        - Get campaign details
# 10. bird_get_webhooks       - Get webhook events

- slug: bird_list_messages
  name: List Messages
  description: |
    List all messages sent through Bird and return message IDs, status, and delivery information.
    Use this to track message history across all channels.
  provider: bird
  endpoint: /v1/messages
  method: GET
  scopes: []
  tags:
    - messages
    - communication
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Messages per page"
        default: 20
    required: []

- slug: bird_get_message
  name: Get Message
  description: |
    Get details for a specific message including content, recipient, and delivery status.
    Returns the complete message data for tracking and analytics.
  provider: bird
  endpoint: /v1/messages/{messageId}
  method: GET
  scopes: []
  tags:
    - messages
    - read
  input_schema:
    type: object
    description: Parameters for getting a message
    properties:
      messageId:
        type: string
        description: "Message ID"
    required:
      - messageId

- slug: bird_send_message
  name: Send Message
  description: |
    Send a message through Bird across a specified channel (sms, email, whatsapp) to a recipient.
    Returns message ID and delivery status for tracking.
  provider: bird
  endpoint: /v1/messages
  method: POST
  scopes: []
  tags:
    - messages
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      channel:
        type: string
        description: "Channel: sms, email, whatsapp, etc."
      recipient:
        type: string
        description: "Recipient identifier"
      content:
        type: string
        description: "Message content"
    required:
      - channel
      - recipient
      - content

- slug: bird_list_templates
  name: List Templates
  description: |
    List all message templates available in Bird and return template names, channels, and content.
    Use this to discover templates for consistent messaging.
  provider: bird
  endpoint: /v1/templates
  method: GET
