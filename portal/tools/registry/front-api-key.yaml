# Front API Key Tools - Allowlist
# Curated subset of Front API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. front_list_conversations     - List conversations
# 2. front_get_conversation       - Get conversation details
# 3. front_list_comments          - List comments on conversation
# 4. front_list_teammates         - List teammates
# 5. front_get_teammate           - Get teammate details
# 6. front_list_inboxes           - List inboxes
# 7. front_get_inbox              - Get inbox details
# 8. front_list_tags              - List tags
# 9. front_list_rules             - List automation rules
# 10. front_list_contacts         - List contacts

- slug: front_list_conversations
  name: List Conversations
  description: |
    List conversations from Front with optional filters and pagination.
    Returns conversation IDs, subjects, and statuses for each conversation.
    Use this to discover customer messages and manage inbox workflows.
  provider: front-api-key
  endpoint: /conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - list
    - inbox
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      inbox_id:
        type: string
        description: "Filter by inbox ID"
      status:
        type: string
        description: "Filter by status (open, archived, deleted)"
      page_token:
        type: string
        description: "Pagination token"
    required: []

- slug: front_get_conversation
  name: Get Conversation
  description: |
    Get detailed information about a specific conversation including messages and metadata.
    Returns the complete conversation data with all associated information.
    This provides full conversation data for customer communication management.
  provider: front-api-key
  endpoint: /conversations/{conversation_id}
  method: GET
  scopes:
    - read
  tags:
    - conversations
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversation_id:
        type: string
        description: "Conversation ID"
    required:
      - conversation_id

- slug: front_list_comments
  name: List Comments
  description: |
    List all comments on a specific conversation with pagination.
    Returns comment IDs, authors, bodies, and timestamps for each comment.
