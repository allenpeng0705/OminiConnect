# Aha Tools - Allowlist
# Curated subset of Aha! API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. aha_list_ideas             - List ideas
# 2. aha_get_idea               - Get idea details
# 3. aha_create_idea            - Create a new idea
# 4. aha_list_features           - List features
# 5. aha_get_feature             - Get feature details
# 6. aha_create_feature          - Create a new feature
# 7. aha_list_releases           - List releases
# 8. aha_get_release             - Get release details
# 9. aha_list_users              - List users
# 10. aha_get_user               - Get user details

- slug: aha_list_ideas
  name: List Ideas
  description: |
    List ideas in Aha! with optional filters by product, status, or keyword.
    Returns idea records including titles, descriptions, and status.
  provider: aha
  endpoint: /api/v1/ideas
  method: GET
  scopes:
    - ideas:read
  tags:
    - ideas
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing ideas
    properties:
      product_id:
        type: string
        description: "Filter by product ID"
      status:
        type: string
        description: "Filter by status"
      keyword:
        type: string
        description: "Search keyword"
      start:
        type: integer
        description: "Pagination start"
      limit:
        type: integer
        description: "Max results (default 25)"
        default: 25
    required: []

- slug: aha_get_idea
  name: Get Idea
  description: |
    Get detailed information about a specific idea including title, description, status, and votes.
  provider: aha
  endpoint: /api/v1/ideas/{id}
  method: GET
  scopes:
    - ideas:read
  tags:
    - ideas
    - read
  input_schema:
    type: object
    description: Parameters for getting an idea
    properties:
      id:
        type: string
        description: "Idea ID"
    required:
      - id

- slug: aha_create_idea
  name: Create Idea
  description: |
    Create a new idea in Aha! with title, description, product, and initial status.
  provider: aha
  endpoint: /api/v1/ideas
  method: POST
  scopes:
    - ideas:write
  tags:
    - ideas
    - create
  input_schema:
    type: object
    description: Parameters for creating an idea
    properties:
      title:
        type: string
        description: "Idea title"
      description:
        type: string
        description: "Idea description"
      product_id:
        type: string
        description: "Product ID"
      status:
        type: string
        description: "Initial status"
    required:
      - title
      - product_id

