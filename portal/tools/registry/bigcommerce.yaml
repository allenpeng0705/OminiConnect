- slug: bigcommerce_list_coupons
  name: List Coupons
  description: |
    List all coupons in the BigCommerce store and return coupon codes, discount types, and expiration dates.
    Filter by type and expiration status for promotional management.
  provider: bigcommerce
  endpoint: /api/v3/marketing/coupons
  method: GET
  scopes:
    - read_marketing
  tags:
    - coupons
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing coupons
    properties:
      type:
        type: string
        description: "Filter by type: percentage, fixed, free_shipping, fixed_total"
      limit:
        type: integer
        description: "Max results (default 50, max 250)"
        default: 50
    required: []
