# BigCommerce Tools - Allowlist
# Curated subset of BigCommerce API for AI agent use.

# === TOOL LIST ===
# 1. bigcommerce_list_orders        - List orders
# 2. bigcommerce_get_order          - Get order details
# 3. bigcommerce_list_products      - List products
# 4. bigcommerce_get_product        - Get product details
# 5. bigcommerce_create_product     - Create a new product
# 6. bigcommerce_list_customers     - List customers
# 7. bigcommerce_get_customer       - Get customer details
# 8. bigcommerce_list_categories    - List categories
# 9. bigcommerce_get_category       - Get category details
# 10. bigcommerce_list_coupons     - List coupons

- slug: bigcommerce_list_orders
  name: List Orders
  description: |
    List all orders in the BigCommerce store and return order IDs, statuses, and totals.
    Filter by status, payment method, and date range to find specific orders.
  provider: bigcommerce
  endpoint: /api/storefront/orders
  method: GET
  scopes:
    - read_orders
  tags:
    - orders
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      status_id:
        type: integer
        description: "Filter by order status ID"
      min_date_created:
        type: string
        description: "Created after this date (ISO 8601)"
      max_date_created:
        type: string
        description: "Created before this date (ISO 8601)"
      limit:
        type: integer
        description: "Max results (default 50, max 250)"
        default: 50
    required: []

- slug: bigcommerce_get_order
  name: Get Order
  description: |
    Get detailed information about a specific order including products, shipping address, and payment details.
    Returns the complete order data for fulfillment processing.
  provider: bigcommerce
  endpoint: /api/storefront/orders/{order_id}
  method: GET
  scopes:
    - read_orders
  tags:
    - orders
    - read
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      order_id:
        type: integer
        description: "The order ID"
    required:
      - order_id

- slug: bigcommerce_list_products
  name: List bigcommerce Products
  description: |
    List all products in the BigCommerce store and return product names, prices, and inventory levels.
    Filter by category, brand, and availability for catalog management.
  provider: bigcommerce
  endpoint: /api/storefront/products
  method: GET
  scopes:
    - read_products
  tags:
    - products
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      category_id:
        type: integer
        description: "Filter by category ID"
      brand_id:
        type: integer
        description: "Filter by brand ID"
      is_visible:
        type: boolean
        description: "Filter by visibility"
      limit:
        type: integer
        description: "Max results (default 50, max 250)"
        default: 50
    required: []

- slug: bigcommerce_get_product
  name: Get bigcommerce Product
  description: |
    Get detailed information about a specific product including variants, images, and custom fields.
    Returns the complete product data for catalog management.
  provider: bigcommerce
  endpoint: /api/storefront/products/{product_id}
  method: GET
  scopes:
    - read_products
  tags:
    - products
    - read
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      product_id:
        type: integer
        description: "The product ID"
    required:
      - product_id

- slug: bigcommerce_create_product
  name: Create Product
  description: |
    Create a new product in BigCommerce with name, description, price, and inventory settings.
    The product will be available in your store catalog for sales.
  provider: bigcommerce
  endpoint: /api/v3/catalog/products
  method: POST
  scopes:
    - create_products
  tags:
    - products
    - create
  input_schema:
    type: object
    description: Parameters for creating a product
    properties:
      name:
        type: string
        description: "Product name"
      type:
        type: string
        description: "Product type: physical, digital"
        default: physical
      price:
        type: number
        description: "Product price"
      description:
        type: string
        description: "Product description"
      sku:
        type: string
        description: "Stock keeping unit"
      inventory_level:
        type: integer
        description: "Current inventory level"
    required:
      - name

- slug: bigcommerce_list_customers
  name: List Customers
