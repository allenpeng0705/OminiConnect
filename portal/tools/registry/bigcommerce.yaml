    type: object
    description: Parameters for listing customers
    properties:
      email:
        type: string
        description: "Filter by email address"
      company:
        type: string
        description: "Filter by company name"
      min_date_created:
        type: string
        description: "Created after this date (ISO 8601)"
      limit:
        type: integer
        description: "Max results (default 50, max 250)"
