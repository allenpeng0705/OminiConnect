- slug: avalara_validate_address
  name: Validate Address
  description: |
    Validate and normalize an address with geocoding coordinates and resolution status.
  provider: avalara
  endpoint: /addresses/resolve
  method: POST
  scopes:
    - read_only
  tags:
    - addresses
    - validation
  input_schema:
    type: object
    description: Parameters for validating an address
    properties:
      line1:
        type: string
        description: "Street address line 1"
      line2:
        type: string
        description: "Street address line 2"
      city:
        type: string
        description: "City"
      region:
        type: string
        description: "State/Province code"
      postal_code:
        type: string
        description: "ZIP/Postal code"
      country:
        type: string
        description: "Country code (e.g., USA)"
        default: USA
    required:
      - line1
      - city
      - region
      - postal_code

- slug: avalara_get_tax_rates
  name: Get Tax Rates
  description: |
    Get tax rates for a specific address or postal code with breakdown by jurisdiction.
  provider: avalara
  endpoint: /taxrates/byaddress
  method: GET
  scopes:
    - read_only
  tags:
    - tax
    - rates
  input_schema:
    type: object
    description: Parameters for getting tax rates
    properties:
      line1:
        type: string
        description: "Street address"
      city:
        type: string
        description: "City"
      region:
        type: string
        description: "State/Province code"
      postal_code:
        type: string
        description: "ZIP/Postal code"
      country:
        type: string
        description: "Country code"
        default: USA
    required:
      - line1
      - city
      - region
      - postal_code

