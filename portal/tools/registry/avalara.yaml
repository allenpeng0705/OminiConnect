# Avalara Tools - Allowlist
# Curated subset of the Avalara AvaTax API v2 for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. avalara_list_transactions    - List transactions in the account
# 2. avalara_get_transaction      - Get details of a specific transaction
# 3. avalara_create_transaction   - Create a new transaction
# 4. avalara_list_customers       - List customers
# 5. avalara_get_customer         - Get details of a specific customer
# 6. avalara_list_items           - List items in the item catalog
# 7. avalara_get_item             - Get details of a specific item
# 8. avalara_validate_address     - Validate and normalize an address
# 9. avalara_get_tax_rates         - Get tax rates for a location
# 10. avalara_list_exemptions     - List tax exemptions

- slug: avalara_list_transactions
  name: List avalara Transactions
  description: |
    List transactions (invoices, refunds) in the Avalara account with optional company, date, and status filters.
  provider: avalara
  endpoint: /transactions
  method: GET
  scopes:
    - read_only
  tags:
    - transactions
    - invoices
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      company_id:
        type: string
        description: "Filter by company ID"
      date:
        type: string
        description: "Filter by date (YYYY-MM-DD)"
      status:
        type: string
        description: "Filter by status: posted, saved, voided"
      top:
        type: integer
        description: "Number of results (max 200, default 100)"
        default: 100
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
    required: []

- slug: avalara_get_transaction
  name: Get avalara Transaction
  description: |
    Get details of a specific transaction including line items, tax amounts, and status.
  provider: avalara
  endpoint: /transactions/{id}
  method: GET
  scopes:
    - read_only
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      id:
        type: string
        description: "Transaction ID"
      company_id:
        type: string
        description: "Company ID"
    required:
      - id

- slug: avalara_create_transaction
  name: Create Transaction
  description: |
    Create a new transaction (invoice, order, refund) for tax calculation with type, company, date, and line items.
  provider: avalara
  endpoint: /transactions/create
  method: POST
  scopes:
    - write
  tags:
    - transactions
    - create
  input_schema:
    type: object
    description: Parameters for creating a transaction
    properties:
      type:
        type: string
        description: "Transaction type: SalesOrder, SalesInvoice, ReturnOrder, ReturnInvoice"
        enum: [SalesOrder, SalesInvoice, ReturnOrder, ReturnInvoice]
      company_id:
        type: string
        description: "Company ID"
      date:
        type: string
        description: "Transaction date (YYYY-MM-DD)"
      currency_code:
        type: string
        description: "Currency code (e.g., USD)"
        default: USD
      lines:
        type: array
        description: "Array of line items"
      customer_code:
        type: string
        description: "Customer identifier"
      addresses:
        type: object
        description: "Address information"
    required:
      - type
      - company_id

- slug: avalara_list_customers
  name: List Customers
