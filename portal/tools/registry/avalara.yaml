    List customers in the Avalara account with pagination.
  provider: avalara
  endpoint: /customers
  method: GET
  scopes:
    - read_only
  tags:
    - customers
    - users
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      company_id:
        type: string
        description: "Company ID"
      top:
        type: integer
        description: "Number of results (max 200, default 100)"
        default: 100
      skip:
        type: integer
        description: "Number of results to skip"
        default: 0
