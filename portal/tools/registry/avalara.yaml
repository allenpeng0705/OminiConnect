- slug: avalara_get_customer
  name: Get Customer
  description: |
    Get details of a specific customer including contact info, exemption status, and linked transactions.
  provider: avalara
  endpoint: /customers/{customer_code}
  method: GET
  scopes:
    - read_only
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_code:
        type: string
        description: "Customer code"
      company_id:
        type: string
        description: "Company ID"
    required:
      - customer_code
      - company_id

