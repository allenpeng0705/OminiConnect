  provider: boldsign
  endpoint: /v1/templates
  method: GET
  scopes: []
  tags:
    - templates
    - esignatures
  input_schema:
    type: object
    description: Parameters for listing templates
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Templates per page"
        default: 20
    required: []

- slug: boldsign_get_template
  name: Get Template
  description: |
    Get details for a specific template including field layout, signer requirements, and document structure.
    Returns the complete template configuration for document creation and automation.
  provider: boldsign
  endpoint: /v1/templates/{templateId}
  method: GET
  scopes: []
  tags:
    - templates
    - read
  input_schema:
    type: object
    description: Parameters for getting a template
    properties:
      templateId:
        type: string
        description: "Template ID"
    required:
