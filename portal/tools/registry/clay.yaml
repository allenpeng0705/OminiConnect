- slug: clay_get_integration
  name: Get Integration
  description: |
    Retrieve details of a specific Clay integration including connection status, configured syncs, and last sync time.
  provider: clay
  endpoint: /integrations/{integration_id}
  method: GET
  scopes:
    - integrations:read
  tags:
    - integrations
  input_schema:
    type: object
    description: Parameters for getting an integration
    properties:
      integration_id:
        type: string
        description: "The unique identifier of the integration"
