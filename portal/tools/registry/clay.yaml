- slug: clay_create_webhook
  name: Create Webhook
  description: |
    Create a webhook in Clay to receive real-time notifications for specified table events, returning the webhook ID.
  provider: clay
  endpoint: /webhooks
  method: POST
  scopes:
    - webhooks:write
  tags:
    - webhooks
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      url:
        type: string
        description: "The URL to receive webhook notifications"
      events:
        type: array
        items:
          type: string
        description: "List of events to subscribe to"
    required:
      - url
      - events
- slug: clay_list_contacts
  name: List clay Contacts
  description: |
    List all contacts in the Clay workspace with pagination, returning names, email addresses, and company associations.
  provider: clay
  endpoint: /contacts
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Maximum number of contacts to return"
      offset:
        type: integer
        description: "Number of contacts to skip for pagination"
    required: []
