- slug: clay_list_tables
  name: List clay Tables
  description: |
    List all tables in the Clay workspace, returning table IDs, names, column schemas, and row counts.
  provider: clay
  endpoint: /tables
  method: GET
  scopes:
    - tables:read
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      limit:
        type: integer
        description: "Maximum number of tables to return"
    required: []
- slug: clay_get_table
  name: Get clay Table
  description: |
    Retrieve details of a specific Clay table including column schema, row count, and table settings.
  provider: clay
  endpoint: /tables/{table_id}
  method: GET
  scopes:
    - tables:read
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      table_id:
        type: string
        description: "The unique identifier of the table"
    required:
      - table_id
- slug: clay_add_row
  name: Add Row
  description: |
    Add a new row to a specific Clay table with data values for each column, returning the created row ID.
  provider: clay
  endpoint: /tables/{table_id}/rows
  method: POST
  scopes:
    - tables:write
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for adding a row
    properties:
      table_id:
        type: string
        description: "The unique identifier of the table"
      data:
        type: object
        description: "The row data to add"
    required:
      - table_id
      - data
- slug: clay_update_row
  name: Update Row
  description: |
    Update an existing row in a Clay table with new data values, modifying the specified columns.
  provider: clay
  endpoint: /tables/{table_id}/rows/{row_id}
  method: PUT
  scopes:
    - tables:write
  tags:
    - tables
  input_schema:
    type: object
    description: Parameters for updating a row
    properties:
      table_id:
        type: string
        description: "The unique identifier of the table"
      row_id:
        type: string
        description: "The unique identifier of the row"
      data:
        type: object
        description: "The row data to update"
    required:
      - table_id
      - row_id
      - data
- slug: clay_list_enrichments
  name: List Enrichments
  description: |
    List all available data enrichments in the Clay workspace for enriching company and contact records, returning enrichment types and providers.
  provider: clay
  endpoint: /enrichments
  method: GET
  scopes:
    - enrichments:read
  tags:
    - enrichments
  input_schema:
    type: object
    description: Parameters for listing enrichments
    properties:
      limit:
        type: integer
        description: "Maximum number of enrichments to return"
    required: []
- slug: clay_get_enrichment
  name: Get Enrichment
  description: |
    Retrieve details of a specific Clay enrichment showing data fields, provider information, and credit cost.
  provider: clay
  endpoint: /enrichments/{enrichment_id}
  method: GET
  scopes:
    - enrichments:read
  tags:
    - enrichments
  input_schema:
    type: object
    description: Parameters for getting an enrichment
    properties:
      enrichment_id:
        type: string
        description: "The unique identifier of the enrichment"
    required:
      - enrichment_id
- slug: clay_list_integrations
  name: List Integrations
  description: |
    List all integrations connected to the Clay workspace for data import and export, returning integration status and types.
  provider: clay
  endpoint: /integrations
  method: GET
  scopes:
    - integrations:read
  tags:
    - integrations
  input_schema:
    type: object
    description: Parameters for listing integrations
    properties:
      limit:
        type: integer
        description: "Maximum number of integrations to return"
