# Metabase Tools - Allowlist
# Curated subset of the Metabase API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. metabase_list_databases      - List databases connected to Metabase
# 2. metabase_get_database        - Get database details
# 3. metabase_list_tables         - List tables across databases
# 4. metabase_get_table           - Get table details and columns
# 5. metabase_list_questions      - List saved questions/cards
# 6. metabase_get_question        - Get question details
# 7. metabase_create_question     - Create a new question
# 8. metabase_list_dashboards     - List dashboards
# 9. metabase_get_dashboard       - Get dashboard details
# 10. metabase_get_pulse          - Get pulse/subscription details

- slug: metabase_list_databases
  name: List Databases
  description: |
    List all databases connected to your Metabase instance. Returns database names, descriptions, and connection status for discovering available data sources.
  provider: metabase
  endpoint: /api/database
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - database
    - list
  input_schema:
    type: object
    description: Parameters for listing databases
    properties:
      limit:
        type: integer
        description: "Maximum number of databases to return"
        default: 100
    required: []

- slug: metabase_get_database
  name: Get Database
  description: |
    Retrieve detailed information about a specific Metabase database by its ID. Returns the database name, tables, features, and connection configuration.
  provider: metabase
  endpoint: /api/database/{database_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - database
    - read
  input_schema:
    type: object
    description: Parameters for getting a database
    properties:
      database_id:
        type: integer
        description: "Database ID (required)"
    required:
      - database_id

- slug: metabase_list_tables
  name: List metabase Tables
  description: |
    List all tables across all databases in your Metabase instance. Returns table names, schemas, database associations, and visibility status for discovering available data structures.
  provider: metabase
  endpoint: /api/table
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - table
    - list
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      limit:
        type: integer
        description: "Maximum number of tables to return"
        default: 100
    required: []

- slug: metabase_get_table
  name: Get metabase Table
  description: |
    Retrieve detailed information about a specific Metabase table by its ID. Returns the table name, column definitions, data types, and visibility settings.
  provider: metabase
  endpoint: /api/table/{table_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - table
    - read
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      table_id:
        type: integer
        description: "Table ID (required)"
    required:
      - table_id

- slug: metabase_list_questions
  name: List Questions
  description: |
    List all saved questions (cards) in your Metabase instance with optional pagination. Returns question names, collections, query types, and creation dates for discovering existing analyses.
  provider: metabase
  endpoint: /api/card
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - question
    - list
  input_schema:
    type: object
    description: Parameters for listing questions
    properties:
      limit:
        type: integer
        description: "Maximum number of questions to return"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: metabase_get_question
  name: Get Question
  description: |
    Retrieve detailed information about a specific Metabase question by its ID. Returns the question name, query definition, visualization type, and results metadata.
  provider: metabase
  endpoint: /api/card/{card_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - question
    - read
  input_schema:
    type: object
    description: Parameters for getting a question
    properties:
      card_id:
        type: integer
        description: "Card/Question ID (required)"
    required:
      - card_id

- slug: metabase_create_question
  name: Create Question
  description: |
    Create a new saved question in Metabase with the specified query definition and visualization type. Returns the created question with its unique ID and URL.
  provider: metabase
  endpoint: /api/card
  method: POST
  scopes:
    - metabase_full_access
  tags:
    - question
    - create
  input_schema:
    type: object
    description: Parameters for creating a question
    properties:
      name:
        type: string
        description: "Question name (required)"
      dataset_query:
        type: object
        description: "Query definition object (required)"
      display:
        type: string
        description: "Visualization type (e.g., table, bar, line)"
        default: table
      collection_id:
        type: integer
        description: "Collection to save the question in"
    required:
      - name
      - dataset_query

- slug: metabase_list_dashboards
  name: List Dashboards
  description: |
    List all dashboards in your Metabase instance. Returns dashboard names, descriptions, owner information, and card counts for discovering available dashboards.
  provider: metabase
  endpoint: /api/dashboard
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - dashboard
    - list
  input_schema:
    type: object
    description: Parameters for listing dashboards
    properties:
      limit:
        type: integer
        description: "Maximum number of dashboards to return"
        default: 100
    required: []

- slug: metabase_get_dashboard
  name: Get Dashboard
  description: |
    Retrieve detailed information about a specific Metabase dashboard by its ID. Returns the dashboard name, description, cards, tabs, and parameter configurations.
  provider: metabase
  endpoint: /api/dashboard/{dashboard_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - dashboard
    - read
  input_schema:
    type: object
    description: Parameters for getting a dashboard
    properties:
      dashboard_id:
        type: integer
        description: "Dashboard ID (required)"
    required:
      - dashboard_id

- slug: metabase_get_pulse
  name: Get Pulse
  description: |
    Retrieve detailed information about a specific Metabase pulse (scheduled report or subscription) by its ID. Returns the pulse name, schedule configuration, recipients, and delivery status.
  provider: metabase
  endpoint: /api/pulse/{pulse_id}
  method: GET
  scopes:
    - metabase_full_access
  tags:
    - pulse
    - read
  input_schema:
    type: object
    description: Parameters for getting a pulse
    properties:
      pulse_id:
        type: integer
        description: "Pulse ID (required)"
    required:
      - pulse_id
