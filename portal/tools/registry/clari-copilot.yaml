# Clari Copilot Tools - Allowlist
# Curated subset of the Clari Copilot API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. clari_copilot_list_calls              - List calls
# 2. clari_copilot_get_call               - Get call details
# 3. clari_copilot_list_meetings          - List meetings
# 4. clari_copilot_get_meeting           - Get meeting details
# 5. clari_copilot_list_contacts          - List contacts
# 6. clari_copilot_get_contact           - Get contact details
# 7. clari_copilot_list_accounts          - List accounts
# 8. clari_copilot_get_account           - Get account details
# 9. clari_copilot_list_activities       - List activities
# 10. clari_copilot_get_call_recording  - Get call recording

- slug: clari_copilot_list_calls
  name: List Calls
  description: |
    List all recorded sales calls in Clari Copilot with optional filtering by account and date range, returning call details.
  provider: clari-copilot
  endpoint: /calls
  method: GET
  scopes: []
  tags:
    - calls
    - sales
  input_schema:
    type: object
    description: Parameters for listing calls
    properties:
      account_id:
        type: string
        description: "Filter by account ID"
      from_date:
        type: string
        description: "Start date"
      to_date:
        type: string
        description: "End date"
    required: []

- slug: clari_copilot_get_call
  name: Get Call
  description: |
    Retrieve details of a specific Clari Copilot call including participants, duration, key moments, and notes.
  provider: clari-copilot
  endpoint: /calls/{id}
  method: GET
  scopes: []
  tags:
    - calls
    - read
  input_schema:
    type: object
    description: Parameters for getting a call
    properties:
      id:
        type: string
        description: "Call ID"
    required:
      - id

