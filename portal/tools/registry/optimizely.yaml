- slug: optimizely_list_variations
  name: List Variations
  description: |
    List all variations for an experiment.
    Variations are the different versions users might see.
  provider: optimizely
  endpoint: /v2/experiments/{experiment_id}/variations
  method: GET
  scopes:
    - variations:read
  tags:
    - variations
    - list
  input_schema:
    type: object
    description: Parameters for listing variations
    properties:
      experiment_id:
        type: integer
        description: "The experiment ID"
    required:
      - experiment_id

- slug: optimizely_get_variation
  name: Get Variation
  description: |
    Get detailed information about a specific variation including its configuration and key.
  provider: optimizely
  endpoint: /v2/variations/{variation_id}
  method: GET
  scopes:
    - variations:read
  tags:
    - variations
    - read
  input_schema:
    type: object
    description: Parameters for getting a variation
    properties:
      variation_id:
        type: string
        description: "The variation ID"
    required:
      - variation_id