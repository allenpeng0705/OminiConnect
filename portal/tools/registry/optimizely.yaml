# Optimizely Tools - Allowlist
# Curated subset of Optimizely REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. optimizely_list_experiments     - List experiments
# 2. optimizely_get_experiment       - Get experiment details
# 3. optimizely_create_experiment    - Create an experiment
# 4. optimizely_update_experiment    - Update an experiment
# 5. optimizely_list_features       - List features
# 6. optimizely_get_feature          - Get feature details
# 7. optimizely_list_audiences       - List audiences
# 8. optimizely_get_audience         - Get audience details
# 9. optimizely_list_variations      - List variations
# 10. optimizely_get_variation       - Get variation details

- slug: optimizely_list_experiments
  name: List Experiments
  description: |
    List all experiments in an Optimizely project.
    Experiments are A/B tests that compare variations against a control.
  provider: optimizely
  endpoint: /v2/experiments
  method: GET
  scopes:
    - experiments:read
  tags:
    - experiments
    - list
  input_schema:
    type: object
    description: Parameters for listing experiments
    properties:
      project_id:
        type: integer
        description: "The project ID"
      limit:
        type: integer
        description: "Maximum number of experiments to return"
      page_token:
        type: string
        description: "Token for pagination"
    required:
      - project_id

- slug: optimizely_get_experiment
  name: Get Experiment
  description: |
    Get detailed information about a specific experiment including variations, targeting, and status.
  provider: optimizely
  endpoint: /v2/experiments/{experiment_id}
  method: GET
  scopes:
    - experiments:read
  tags:
    - experiments
    - read
  input_schema:
    type: object
    description: Parameters for getting an experiment
    properties:
      experiment_id:
        type: integer
        description: "The experiment ID"
    required:
      - experiment_id

- slug: optimizely_create_experiment
  name: Create Experiment
  description: |
    Create a new experiment in Optimizely.
    Set variations, traffic allocation, targeting rules, and metrics.
  provider: optimizely
  endpoint: /v2/experiments
  method: POST
  scopes:
    - experiments:write
  tags:
    - experiments
    - create
  input_schema:
    type: object
    description: Parameters for creating an experiment
    properties:
      name:
        type: string
        description: "The experiment name"
      description:
        type: string
        description: "Description of the experiment"
      project_id:
        type: integer
        description: "The project ID"
      hypothesis:
        type: string
        description: "The hypothesis being tested"
      variants:
        type: array
        description: "List of experiment variants"
    required:
      - name
      - project_id

- slug: optimizely_update_experiment
  name: Update Experiment
  description: |
    Update an existing experiment. Modify name, description, status, or targeting.
  provider: optimizely
  endpoint: /v2/experiments/{experiment_id}
  method: PATCH
  scopes:
    - experiments:write
  tags:
    - experiments
    - update
  input_schema:
    type: object
    description: Parameters for updating an experiment
    properties:
      experiment_id:
        type: integer
        description: "The experiment ID"
      name:
        type: string
        description: "Updated experiment name"
      description:
        type: string
        description: "Updated description"
      status:
        type: string
        description: "Experiment status (active, paused, archived)"
    required:
      - experiment_id

