  tags:
    - features
    - list
  input_schema:
    type: object
    description: Parameters for listing features
    properties:
      project_id:
        type: integer
        description: "The project ID"
      limit:
        type: integer
        description: "Maximum number of features to return"
    required:
      - project_id

- slug: optimizely_get_feature
  name: Get Feature
  description: |
    Get detailed information about a specific feature including rollout rules and settings.
  provider: optimizely
  endpoint: /v2/features/{feature_key}
  method: GET
  scopes:
    - features:read
  tags:
    - features
    - read
  input_schema:
    type: object
    description: Parameters for getting a feature
    properties:
      feature_key:
        type: string
        description: "The feature key"
      project_id:
        type: integer
        description: "The project ID"
    required:
      - feature_key

