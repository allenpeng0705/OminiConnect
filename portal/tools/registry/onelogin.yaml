# OneLogin Tools - Allowlist
# Curated subset of OneLogin API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. onelogin_list_users               - List users
# 2. onelogin_get_user                - Get user details
# 3. onelogin_create_user             - Create user
# 4. onelogin_update_user             - Update user
# 5. onelogin_list_groups             - List groups
# 6. onelogin_list_roles              - List roles
# 7. onelogin_assign_role             - Assign role to user
# 8. onelogin_list_applications       - List applications
# 9. onelogin_get_reports            - Get reports
# 10. onelogin_get_events            - Get events

- slug: onelogin_list_users
  name: List onelogin Users
  description: |
    List all users in OneLogin.
  provider: onelogin
  endpoint: /api/v2/users
  method: GET
  scopes:
    - users:read
  tags:
    - iam
    - users
    - directory
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Number of users (default 50)"
        default: 50
    required: []

- slug: onelogin_get_user
  name: Get onelogin User
  description: |
    Get detailed information for a specific user.
  provider: onelogin
  endpoint: /api/v2/users/{id}
  method: GET
  scopes:
    - users:read
  tags:
    - iam
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: integer
        description: "User ID"
    required:
      - id

- slug: onelogin_create_user
  name: Create onelogin User
  description: |
    Create a new user in OneLogin.
  provider: onelogin
  endpoint: /api/v2/users
  method: POST
  scopes:
    - users:manage
  tags:
    - iam
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      email:
        type: string
        description: "User email"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - email
      - first_name
      - last_name

- slug: onelogin_update_user
  name: Update onelogin User
  description: |
    Update an existing user.
  provider: onelogin
  endpoint: /api/v2/users/{id}
  method: PUT
  scopes:
    - users:manage
  tags:
    - iam
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      id:
        type: integer
        description: "User ID"
      email:
        type: string
        description: "User email"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
    required:
      - id

