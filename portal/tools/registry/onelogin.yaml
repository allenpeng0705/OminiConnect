- slug: onelogin_assign_role
  name: Assign Role
  description: |
    Assign a role to a user.
  provider: onelogin
  endpoint: /api/v2/users/{id}/roles
  method: POST
  scopes:
    - roles:manage
  tags:
    - iam
    - roles
    - assign
  input_schema:
    type: object
    description: Parameters for assigning a role
    properties:
      id:
        type: integer
        description: "User ID"
      role_id:
        type: integer
        description: "Role ID to assign"
    required:
      - id
      - role_id

