# WiseAgent Tools - Allowlist
# Curated subset of WiseAgent API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wiseagent_list_contacts           - List all contacts
# # 2. wiseagent_get_contact           - Get contact details
# # 3. wiseagent_create_contact           - Create a new contact
# # 4. wiseagent_update_contact           - Update a contact
# # 5. wiseagent_list_leads           - List all leads
# # 6. wiseagent_get_lead           - Get lead details
# # 7. wiseagent_create_lead           - Create a new lead
# # 8. wiseagent_list_tasks           - List all tasks
# # 9. wiseagent_create_task           - Create a new task
# # 10. wiseagent_list_emails           - List all emails

- slug: wiseagent_list_contacts
  name: List Contacts
  description: |
    List all contacts
  provider: wiseagent
  endpoint: /api/contacts
  method: GET
  scopes:
    - read
  tags:
    - wiseagent
  input_schema:
    type: object
    description: Parameters for list contacts
    properties: {}
    required: []

- slug: wiseagent_get_contact
  name: Get Contact
  description: |
    Get contact details
  provider: wiseagent
  endpoint: /api/contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - wiseagent
  input_schema:
    type: object
    description: Parameters for get contact
    properties: {}
    required: []

- slug: wiseagent_create_contact
