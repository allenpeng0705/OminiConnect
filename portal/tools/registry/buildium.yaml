# Buildium Tools - Allowlist
# Curated subset of Buildium API for AI agent use.
# API_KEY auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. buildium_list_residents       - List residents
# 2. buildium_get_resident         - Get resident details
# 3. buildium_list_rentals         - List rental units
# 4. buildium_get_rental          - Get rental unit details
# 5. buildium_list_leases         - List leases
# 6. buildium_get_lease           - Get lease details
# 7. buildium_list_transactions    - List transactions
# 8. buildium_get_transaction      - Get transaction details
# 9. buildium_list_maintenance     - List maintenance requests
# 10. buildium_get_maintenance    - Get maintenance request details

- slug: buildium_list_residents
  name: List Residents
  description: |
    List all residents in Buildium, returning resident names, units, contact information, and lease status.
  provider: buildium
  endpoint: /v1/residents
  method: GET
  scopes: []
  tags:
    - residents
    - property-management
  input_schema:
    type: object
    description: Parameters for listing residents
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Residents per page"
        default: 20
    required: []

- slug: buildium_get_resident
  name: Get Resident
  description: |
    Get details for a specific resident including unit assignment, contact info, and payment history.
  provider: buildium
  endpoint: /v1/residents/{residentId}
  method: GET
  scopes: []
  tags:
    - residents
    - read
  input_schema:
    type: object
    description: Parameters for getting a resident
    properties:
      residentId:
        type: integer
        description: "Resident ID"
    required:
      - residentId

