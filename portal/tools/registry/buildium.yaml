- slug: buildium_list_transactions
  name: List buildium Transactions
  description: |
    List all financial transactions with optional date filters, returning amounts, types, and dates.
  provider: buildium
  endpoint: /v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - accounting
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      startDate:
        type: string
        description: "Start date (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date (YYYY-MM-DD)"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

