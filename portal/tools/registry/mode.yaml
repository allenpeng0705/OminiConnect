    type: object
    description: Parameters for getting a dashboard
    properties:
      workspaceId:
        type: string
        description: "Workspace ID (required)"
      dashboardId:
        type: string
        description: "Dashboard ID (required)"
    required:
      - workspaceId
      - dashboardId

- slug: mode_run_query
  name: Run Query
  description: |
    Execute a SQL query in Mode and return results. The query runs against the specified data source.
    Use this for ad-hoc analysis or to retrieve specific data.
  provider: mode
  endpoint: /api/workspaces/{workspaceId}/query
  method: POST
  scopes:
    - api_key
  tags:
    - query
    - execute
    - sql
  input_schema:
    type: object
    description: Parameters for running a query
    properties:
      workspaceId:
        type: string
        description: "Workspace ID (required)"
      sql:
        type: string
        description: "SQL query string (required)"
      dataSourceId:
        type: string
        description: "Data source ID to query against"
    required:
      - workspaceId
      - sql

- slug: mode_list_queries
  name: List Queries
  description: |
    List all saved queries in a Mode workspace. Returns query names, SQL, and execution history.
    Use this to discover reusable SQL snippets for common analyses.
  provider: mode
  endpoint: /api/workspaces/{workspaceId}/queries
  method: GET
  scopes:
    - api_key
  tags:
    - query
    - list
  input_schema:
    type: object
    description: Parameters for listing queries
    properties:
      workspaceId:
        type: string
        description: "Workspace ID (required)"
      limit:
        type: integer
        description: "Maximum number of queries to return"
        default: 25
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required:
      - workspaceId

- slug: mode_get_query
  name: Get Query
  description: |
    Get detailed information about a saved query including the SQL, parameters, and last execution results.
  provider: mode
  endpoint: /api/workspaces/{workspaceId}/queries/{queryId}
  method: GET
  scopes:
    - api_key
  tags:
    - query
