  input_schema:
    type: object
    description: Parameters for getting a query
    properties:
      workspaceId:
        type: string
        description: "Workspace ID (required)"
      queryId:
        type: string
        description: "Query ID (required)"
    required:
      - workspaceId
      - queryId

