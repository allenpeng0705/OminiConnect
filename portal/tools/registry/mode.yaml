  provider: mode
  endpoint: /api/workspaces/{workspaceId}/dashboards
  method: GET
  scopes:
    - api_key
  tags:
    - dashboard
    - list
  input_schema:
    type: object
    description: Parameters for listing dashboards
    properties:
      workspaceId:
        type: string
        description: "Workspace ID (required)"
      limit:
        type: integer
        description: "Maximum number of dashboards to return"
        default: 25
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required:
