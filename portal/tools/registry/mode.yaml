- slug: mode_get_dashboard
  name: Get Dashboard
  description: |
    Get detailed information about a specific dashboard including its reports, filters, and layout.
  provider: mode
  endpoint: /api/workspaces/{workspaceId}/dashboards/{dashboardId}
  method: GET
  scopes:
    - api_key
  tags:
    - dashboard
    - read
