# Drift Tools - Sales Chat
# Tools for managing conversations, contacts, bots, campaigns, and reports.

# === TOOL LIST ===
# 1. drift_list_conversations      - List conversations
# 2. drift_get_conversation        - Get a specific conversation
# 3. drift_send_message           - Send a message
# 4. drift_list_contacts          - List contacts
# 5. drift_get_contact            - Get a specific contact
# 6. drift_list_bots              - List bots
# 7. drift_get_bot                - Get a specific bot
# 8. drift_list_campaigns         - List campaigns
# 9. drift_get_campaign           - Get a specific campaign
# 10. drift_get_report            - Get a report

- slug: drift_list_conversations
  name: List Conversations
  description: |
    List all conversations in your Drift workspace. Returns paginated results with conversation status, participants, and last message preview.
  provider: drift
  endpoint: /conversations
  method: GET
  scopes:
    - conversation_read
  tags:
    - conversations
    - chat
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, all (default open)"
        enum: [open, closed, all]
        default: open
      limit:
        type: integer
        description: "Results limit (default 25)"
        default: 25
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: drift_get_conversation
  name: Get Conversation
  description: |
    Retrieve full details of a specific conversation including all messages, participant information, and conversation history.
  provider: drift
  endpoint: /conversations/{id}
  method: GET
  scopes:
    - conversation_read
  tags:
    - conversations
    - chat
    - read
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      id:
        type: string
        description: "Conversation ID (path parameter)"
    required:
      - id

- slug: drift_send_message
  name: Send Message
  description: |
    Send a message in an existing conversation or initiate a new conversation with a contact. Returns the sent message details.
  provider: drift
  endpoint: /messages
  method: POST
  scopes:
    - conversation_write
  tags:
    - messages
    - chat
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      conversation_id:
        type: string
        description: "Conversation ID to send message to"
      contact_id:
        type: string
        description: "Contact ID to start new conversation with"
      message:
        type: string
        description: "Message content (required)"
      type:
        type: string
        description: "Message type: chat, email (default chat)"
        enum: [chat, email]
        default: chat
    required:
      - message

- slug: drift_list_contacts
  name: List Contacts
  description: |
    List all contacts in your Drift workspace. Returns contact profiles with names, emails, company information, and activity status.
  provider: drift
  endpoint: /contacts
  method: GET
  scopes:
    - contact_read
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Results limit"
        default: 25
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
      email:
        type: string
        description: "Filter by email address"
    required: []

- slug: drift_get_contact
  name: Get Contact
  description: |
    Retrieve complete profile details for a specific contact including custom attributes, conversation history, and activity logs.
  provider: drift
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - contact_read
  tags:
    - contacts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID (path parameter)"
    required:
      - id

