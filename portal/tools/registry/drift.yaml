  provider: drift
  endpoint: /bots
  method: GET
  scopes:
    - bot_read
  tags:
    - bots
    - automation
  input_schema:
    type: object
    description: Parameters for listing bots
    properties:
      limit:
        type: integer
        description: "Results limit"
        default: 25
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: drift_get_bot
  name: Get Bot
  description: |
    Retrieve full configuration details for a specific bot including settings, trigger conditions, and conversation flow definitions.
  provider: drift
  endpoint: /bots/{id}
  method: GET
  scopes:
    - bot_read
  tags:
    - bots
    - automation
    - read
  input_schema:
    type: object
    description: Parameters for getting a bot
    properties:
      id:
        type: string
        description: "Bot ID (path parameter)"
    required:
      - id

- slug: drift_list_campaigns
  name: List Campaigns
  description: |
    List all marketing campaigns in your Drift workspace. Returns campaign names, current statuses, and targeting configurations.
  provider: drift
  endpoint: /campaigns
  method: GET
  scopes:
    - campaign_read
  tags:
    - campaigns
    - marketing
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by status: active, paused, all"
        enum: [active, paused, all]
        default: all
      limit:
        type: integer
        description: "Results limit"
        default: 25
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: drift_get_campaign
  name: Get Campaign
  description: |
    Retrieve complete details for a specific campaign including targeting rules, messaging content, and scheduling information.
  provider: drift
  endpoint: /campaigns/{id}
  method: GET
  scopes:
    - campaign_read
  tags:
    - campaigns
    - marketing
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID (path parameter)"
    required:
      - id

- slug: drift_get_report
  name: Get Report
  description: |
    Retrieve analytics report data for Drift conversations and campaigns. Returns metrics on conversation volume, response times, and conversion rates.
  provider: drift
  endpoint: /reports/{type}
  method: GET
  scopes:
    - analytics_read
  tags:
    - reports
    - analytics
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      type:
        type: string
        description: "Report type: conversations, campaigns, overview"
        enum: [conversations, campaigns, overview]
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - type
