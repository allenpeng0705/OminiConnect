# Shipstation (v2) Tools - Allowlist
# Curated subset of Shipstation (v2) API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_orders                              - List all orders
# 2. get_order                                - Get order details
# 3. list_shipments                           - List shipments
# 4. create_shipment                          - Create a shipment label
# 5. list_products                            - List all products
# 6. list_warehouses                          - List warehouses
# 7. list_carriers                            - List shipping carriers
# 8. get_rates                                - Get shipping rates
# 9. list_customers                           - List customers
# 10. get_user                                 - Get user account info

- slug: list_orders
  name: List Orders
  description: |
    List all orders in ShipStation. Returns order IDs, customer information, item details, and fulfillment statuses.
  provider: shipstation-v2
  endpoint: /orders
  method: GET
  scopes: []
  tags:
    - orders
    - shipping
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_order
  name: Get Order
  description: |
    Get detailed information about a specific order including its items, shipping address, payment status, and tracking details.
  provider: shipstation-v2
  endpoint: /orders/{id}
  method: GET
  scopes: []
  tags:
    - orders
    - shipping
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_shipments
  name: List Shipments
  description: |
    List all shipments in ShipStation. Returns shipment IDs, carrier information, tracking numbers, and delivery status.
  provider: shipstation-v2
  endpoint: /shipments
  method: GET
  scopes: []
  tags:
    - shipments
    - fulfillment
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_shipment
  name: Create Shipment
  description: |
    Create a new shipment label in ShipStation. Generates a shipping label with the specified carrier, package, and shipping service.
  provider: shipstation-v2
  endpoint: /shipments
  method: POST
  scopes: []
  tags:
    - shipments
    - fulfillment
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_products
  name: List shipstation-v2 Products
  description: |
    List all products in ShipStation. Returns product names, SKUs, descriptions, weights, and image URLs.
  provider: shipstation-v2
  endpoint: /products
  method: GET
  scopes: []
  tags:
    - products
    - inventory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_warehouses
  name: List Warehouses
  description: |
    List all warehouses in ShipStation. Returns warehouse names, addresses, contact information, and shipping preferences.
  provider: shipstation-v2
  endpoint: /warehouses
  method: GET
  scopes: []
  tags:
    - warehouses
    - fulfillment
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_carriers
  name: List Carriers
  description: |
    List all shipping carriers supported by ShipStation. Returns carrier names, codes, and available shipping services.
  provider: shipstation-v2
  endpoint: /carriers
  method: GET
  scopes: []
  tags:
    - carriers
    - shipping
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_rates
  name: Get Rates
  description: |
    Get shipping rates for a shipment in ShipStation. Returns available rates from different carriers for the specified package and destination.
  provider: shipstation-v2
  endpoint: /shipments/getrates
  method: POST
  scopes: []
  tags:
    - rates
    - shipping
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_customers
  name: List Customers
  description: |
    List all customers in ShipStation. Returns customer names, email addresses, shipping addresses, and order history.
  provider: shipstation-v2
  endpoint: /customers
  method: GET
  scopes: []
  tags:
    - customers
    - crm
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_user
  name: Get shipstation-v2 User
  description: |
    Get account information for the authenticated ShipStation user. Returns username, company name, and subscription details.
  provider: shipstation-v2
  endpoint: /users
  method: GET
  scopes: []
  tags:
    - user
    - account
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

