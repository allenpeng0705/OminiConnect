# Lessonly Tools - Allowlist
# Curated subset of Lessonly API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lessonly_list_users          - List users
# 2. lessonly_get_user           - Get user details
# 3. lessonly_list_lessons       - List lessons
# 4. lessonly_get_lesson         - Get lesson details
# 5. lessonly_list_assignments   - List assignments
# 6. lessonly_get_assignment     - Get assignment details
# 7. lessonly_list_paths         - List learning paths
# 8. lessonly_get_path           - Get learning path details
# 9. lessonly_list_groups        - List groups
# 10. lessonly_get_group         - Get group details

- slug: lessonly_list_users
  name: List lessonly Users
  description: |
    List all users in your Lessonly account with pagination. Returns user names, email addresses, job titles, and group assignments.
  provider: lessonly
  endpoint: /api/users
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: lessonly_get_user
  name: Get lessonly User
  description: |
    Retrieve detailed information about a specific Lessonly user by their ID. Returns the user's name, email, role, group memberships, and assigned learning content.
  provider: lessonly
  endpoint: /api/users/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: integer
        description: "User ID"
    required:
      - user_id

- slug: lessonly_list_lessons
