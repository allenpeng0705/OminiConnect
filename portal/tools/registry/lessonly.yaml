    List all training lessons in your Lessonly account. Returns lesson names, IDs, types, and duration estimates for each lesson.
  provider: lessonly
  endpoint: /api/lessons
  method: GET
  scopes: []
  tags:
    - lessons
    - list
    - read
  input_schema:
    type: object
