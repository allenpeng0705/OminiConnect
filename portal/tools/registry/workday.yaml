- slug: workday_list_workers
  name: List Workers
  description: |
    Retrieve a list of all workers (employees) in the Workday HR system with organization and status filtering.
    Returns worker names, IDs, positions, and employment status for each worker.
    Use this to discover employees and manage workforce information.
  provider: workday
  endpoint: /ccx/api/v1/{tenant_id}/workers
  method: GET
  scopes:
    - workday.worker.read
  tags:
    - workers
  input_schema:
    type: object
    description: Parameters for listing workers
    properties:
      limit:
        type: integer
        description: "Maximum number of workers to return (default 50, max 200)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      supervisory_organization:
        type: string
        description: "Filter by supervisory organization ID"
      status:
        type: string
        description: "Filter by worker status (e.g., Active, On Leave, Terminated)"
    required: []

- slug: workday_get_worker
  name: Get Worker
  description: |
    Retrieve detailed information for a specific worker by ID including employment details and organizational assignments.
    Returns the complete worker data with all associated information.
    This provides full worker data for HR management and employee lookup.
  provider: workday
  endpoint: /ccx/api/v1/{tenant_id}/workers/{worker_id}
  method: GET
  scopes:
    - workday.worker.read
  tags:
    - workers
  input_schema:
    type: object
    description: Parameters for getting a worker
    properties:
      worker_id:
        type: string
        description: "Unique identifier of the worker"
    required:
      - worker_id

