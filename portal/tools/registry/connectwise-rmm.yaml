- slug: connectwise_rmm_list_users
  name: List connectwise-rmm Users
  description: |
    List all users in ConnectWise RMM, returning user IDs, names, email addresses, and roles.
  provider: connectwise-rmm
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
