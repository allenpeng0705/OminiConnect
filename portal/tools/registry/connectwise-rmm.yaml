# ConnectWise RMM Tools - Allowlist
# Curated subset of the ConnectWise RMM API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. connectwise_rmm_list_devices             - List devices
# 2. connectwise_rmm_get_device              - Get device details
# 3. connectwise_rmm_list_alerts             - List alerts
# 4. connectwise_rmm_get_alert               - Get alert details
# 5. connectwise_rmm_list_tickets            - List tickets
# 6. connectwise_rmm_get_ticket               - Get ticket details
# 7. connectwise_rmm_create_ticket           - Create a ticket
# 8. connectwise_rmm_list_policies          - List policies
# 9. connectwise_rmm_get_policy              - Get policy details
# 10. connectwise_rmm_list_users           - List users

- slug: connectwise_rmm_list_devices
  name: List connectwise-rmm Devices
  description: |
    List all monitored devices in ConnectWise RMM, returning device IDs, names, types, and status information.
  provider: connectwise-rmm
  endpoint: /v1/devices
  method: GET
  scopes: []
  tags:
    - devices
    - monitoring
  input_schema:
    type: object
    description: Parameters for listing devices
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: connectwise_rmm_get_device
  name: Get connectwise-rmm Device
  description: |
    Get details of a specific ConnectWise RMM device including its status, configuration, and health metrics.
  provider: connectwise-rmm
  endpoint: /v1/devices/{id}
  method: GET
  scopes: []
  tags:
    - devices
    - read
  input_schema:
    type: object
    description: Parameters for getting a device
    properties:
      id:
        type: string
        description: "Device ID"
    required:
      - id

- slug: connectwise_rmm_list_alerts
  name: List Alerts
  description: |
    List all alerts from monitored devices in ConnectWise RMM, returning alert IDs, severity, device associations, and descriptions.
  provider: connectwise-rmm
  endpoint: /v1/alerts
  method: GET
  scopes: []
  tags:
    - alerts
    - monitoring
  input_schema:
    type: object
    description: Parameters for listing alerts
    properties:
      deviceId:
        type: string
        description: "Filter by device ID"
      severity:
        type: string
        description: "Filter by severity"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: connectwise_rmm_get_alert
  name: Get Alert
  description: |
    Get details of a specific ConnectWise RMM alert including its severity, description, and device association.
  provider: connectwise-rmm
  endpoint: /v1/alerts/{id}
  method: GET
  scopes: []
  tags:
    - alerts
    - read
  input_schema:
    type: object
    description: Parameters for getting an alert
    properties:
      id:
        type: string
        description: "Alert ID"
    required:
      - id

- slug: connectwise_rmm_list_tickets
  name: List Tickets
  description: |
    List all tickets in ConnectWise RMM, returning ticket IDs, titles, status, and device associations.
  provider: connectwise-rmm
  endpoint: /v1/tickets
  method: GET
  scopes: []
  tags:
    - tickets
    - support
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      status:
        type: string
        description: "Filter by status"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: connectwise_rmm_get_ticket
  name: Get Ticket
  description: |
    Get details of a specific ConnectWise RMM ticket including its title, description, status, and related device.
  provider: connectwise-rmm
  endpoint: /v1/tickets/{id}
  method: GET
  scopes: []
  tags:
    - tickets
    - read
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: string
        description: "Ticket ID"
    required:
      - id

- slug: connectwise_rmm_create_ticket
  name: Create Ticket
  description: |
    Create a new ticket in ConnectWise RMM, specifying the title, description, and optional device association.
  provider: connectwise-rmm
  endpoint: /v1/tickets
  method: POST
  scopes: []
  tags:
    - tickets
    - create
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      title:
        type: string
        description: "Ticket title"
      description:
        type: string
        description: "Ticket description"
      deviceId:
        type: string
        description: "Related device ID"
    required:
      - title
      - description

