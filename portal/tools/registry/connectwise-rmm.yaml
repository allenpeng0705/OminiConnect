- slug: connectwise_rmm_get_policy
  name: Get Policy
  description: |
    Get details of a specific ConnectWise RMM policy including its configuration, scope, and assigned devices.
  provider: connectwise-rmm
  endpoint: /v1/policies/{id}
  method: GET
  scopes: []
  tags:
    - policies
    - read
  input_schema:
    type: object
    description: Parameters for getting a policy
    properties:
