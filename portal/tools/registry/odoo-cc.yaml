# Odoo (Client Credentials) Tools - Allowlist
# Curated subset of Odoo REST API for AI agent use.
# Two-Step (Client Credentials) via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. odoo_list_contacts               - List contacts
# 2. odoo_get_contact                - Get contact details
# 3. odoo_create_contact             - Create contact
# 4. odoo_update_contact             - Update contact
# 5. odoo_list_tasks                 - List tasks
# 6. odoo_get_task                   - Get task details
# 7. odoo_create_task                - Create task
# 8. odoo_list_projects             - List projects
# 9. odoo_list_sales                - List sales orders
# 10. odoo_get_lead                 - Get CRM lead

- slug: odoo_list_contacts
  name: List odoo-cc Contacts
  description: |
    List all contacts in the Odoo CRM system. Returns contact names, email addresses, phone numbers, and company associations for each contact record in the database.
  provider: odoo-cc
  endpoint: /res.partner
  method: GET
  scopes:
    - contacts:read
  tags:
    - crm
    - contacts
    - directory
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Items per page"
        default: 20
    required: []

- slug: odoo_get_contact
  name: Get odoo-cc Contact
  description: |
    Get detailed information for a specific contact in Odoo including their name, email, phone, and associated company information. Returns the complete contact record.
  provider: odoo-cc
  endpoint: /res.partner/{id}
  method: GET
  scopes:
    - contacts:read
  tags:
    - crm
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: odoo_create_contact
  name: Create Contact
  description: |
    Create a new contact in Odoo with name, email, and phone number. Returns the created contact with their unique identifier and initial setup.
  provider: odoo-cc
  endpoint: /res.partner
  method: POST
  scopes:
    - contacts:write
  tags:
    - crm
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      name:
        type: string
        description: "Contact name"
      email:
        type: string
        description: "Contact email"
      phone:
        type: string
        description: "Contact phone"
    required:
      - name

- slug: odoo_update_contact
  name: Update Contact
  description: |
    Update an existing contact in Odoo with new name, email, or phone information. Returns the updated contact record with the modified fields.
  provider: odoo-cc
  endpoint: /res.partner/{id}
  method: PUT
  scopes:
    - contacts:write
  tags:
    - crm
    - contacts
    - update
  input_schema:
    type: object
    description: Parameters for updating a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
      name:
        type: string
        description: "Contact name"
      email:
        type: string
        description: "Contact email"
    required:
      - id

- slug: odoo_list_tasks
  name: List odoo-cc Tasks
  description: |
    List all tasks in the Odoo Project module. Returns task names, descriptions, assignees, and current status for each project task in the system.
  provider: odoo-cc
  endpoint: /project.task
  method: GET
  scopes:
    - tasks:read
  tags:
    - project
    - tasks
    - management
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      project_id:
        type: integer
        description: "Filter by project ID"
      stage_id:
        type: integer
        description: "Filter by stage ID"
    required: []

- slug: odoo_get_task
  name: Get odoo-cc Task
  description: |
    Get detailed information for a specific task in Odoo Project including its description, assignee, project, and current status. Returns the complete task object.
  provider: odoo-cc
  endpoint: /project.task/{id}
  method: GET
  scopes:
    - tasks:read
  tags:
    - project
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for getting a task
    properties:
      id:
        type: integer
        description: "Task ID"
    required:
      - id

- slug: odoo_create_task
  name: Create Task
  description: |
    Create a new task in Odoo Project with name, description, and project assignment. Returns the created task with its unique identifier and initial settings.
  provider: odoo-cc
  endpoint: /project.task
  method: POST
  scopes:
    - tasks:write
  tags:
    - project
    - tasks
    - create
  input_schema:
    type: object
    description: Parameters for creating a task
    properties:
      name:
        type: string
        description: "Task name"
      project_id:
        type: integer
        description: "Project ID"
      description:
        type: string
        description: "Task description"
    required:
      - name
      - project_id

- slug: odoo_list_projects
  name: List odoo-cc Projects
  description: |
    List all projects in Odoo. Returns project names, descriptions, member assignments, and current status for each project in the system.
  provider: odoo-cc
  endpoint: /project.project
  method: GET
  scopes:
    - projects:read
  tags:
    - project
    - projects
    - management
  input_schema:
    type: object
    description: Parameters for listing projects
    properties: {}
    required: []

- slug: odoo_list_sales
  name: List Sales
  description: |
    List all sales orders in Odoo. Returns order numbers, customer names, dates, and total amounts for each sales order in the system.
  provider: odoo-cc
  endpoint: /sale.order
  method: GET
  scopes:
    - sales:read
  tags:
    - crm
    - sales
    - orders
  input_schema:
    type: object
    description: Parameters for listing sales
    properties:
      state:
        type: string
        description: "Filter by state (draft, sale, done)"
    required: []

- slug: odoo_get_lead
  name: Get Lead
  description: |
    Get detailed information for a CRM lead in Odoo including contact details, lead source, stage, and expected revenue. Returns the complete lead record with all attributes.
  provider: odoo-cc
  endpoint: /crm.lead/{id}
  method: GET
  scopes:
    - leads:read
  tags:
    - crm
    - leads
    - read
  input_schema:
    type: object
    description: Parameters for getting a lead
    properties:
      id:
        type: integer
        description: "Lead ID"
    required:
      - id
