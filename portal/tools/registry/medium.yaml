- slug: medium_list_posts
  name: List Posts
  description: |
    Retrieve all posts written by a specific Medium user with optional pagination. Returns post titles, publication dates, URLs, and reading times for each post.
  provider: medium
  endpoint: /users/{user_id}/posts
  method: GET
  scopes:
    - basic
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for listing posts
    properties:
      user_id:
        type: string
        description: "The user ID"
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of results per page (default 20)"
    required:
      - user_id

- slug: medium_get_post
  name: Get Post
  description: |
    Retrieve detailed information about a specific Medium post by its ID. Returns the post title, content, author, publication date, and associated tags.
  provider: medium
  endpoint: /posts/{post_id}
  method: GET
  scopes:
    - basic
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for getting a post
    properties:
      post_id:
        type: string
        description: "The post ID"
    required:
      - post_id

- slug: medium_create_post
  name: Create Post
  description: |
    Create and publish a new post on Medium with the specified title, content, and optional tags. Returns the created post with its unique ID and URL.
  provider: medium
  endpoint: /users/{user_id}/posts
  method: POST
  scopes:
    - publish
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for creating a post
    properties:
      user_id:
        type: string
        description: "The user ID"
      title:
        type: string
        description: "The post title"
      content_format:
        type: string
        enum: ["html", "markdown"]
        description: "Format of the content"
      content:
        type: string
        description: "The post content"
      tags:
        type: array
        items:
          type: string
        description: "Tags for the post"
      publish_status:
        type: string
        enum: ["public", "draft", "unlisted"]
        description: "Publication status"
    required:
      - user_id
      - title
      - content

- slug: medium_update_post
  name: Update Post
  description: |
    Update an existing Medium post with new title, content, tags, or publication status. Returns the updated post confirming the changes.
  provider: medium
  endpoint: /posts/{post_id}
  method: PUT
  scopes:
    - publish
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for updating a post
    properties:
      post_id:
        type: string
        description: "The post ID"
      title:
        type: string
        description: "The updated post title"
      content:
        type: string
        description: "The updated post content"
      content_format:
        type: string
        enum: ["html", "markdown"]
        description: "Format of the content"
      tags:
        type: array
        items:
          type: string
        description: "Updated tags for the post"
      publish_status:
        type: string
        enum: ["public", "draft", "unlisted"]
        description: "Updated publication status"
    required:
      - post_id

- slug: medium_delete_post
  name: Delete Post
  description: |
    Permanently delete a specific Medium post by its ID. Returns confirmation of successful deletion.
  provider: medium
  endpoint: /posts/{post_id}
  method: DELETE
  scopes:
    - delete
  tags:
    - posts
  input_schema:
    type: object
    description: Parameters for deleting a post
    properties:
      post_id:
        type: string
        description: "The post ID to delete"
    required:
      - post_id

- slug: medium_list_publication_posts
  name: List Publication Posts
  description: |
    Retrieve all posts from a specific Medium publication with optional pagination. Returns post titles, publication dates, URLs, and author information for each post.
  provider: medium
  endpoint: /publications/{publication_id}/posts
  method: GET
  scopes:
    - basic
  tags:
    - publications
  input_schema:
    type: object
    description: Parameters for listing publication posts
    properties:
      publication_id:
        type: string
        description: "The publication ID"
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of results per page (default 20)"
    required:
      - publication_id

- slug: medium_get_user_info
  name: Get User Info
  description: |
    Retrieve profile information for a specific Medium user including their name, bio, profile image, and follower statistics.
  provider: medium
  endpoint: /users/{user_id}
  method: GET
  scopes:
    - basic
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for getting user info
    properties:
      user_id:
        type: string
        description: "The user ID"
    required:
      - user_id

- slug: medium_list_followers
  name: List Followers
  description: |
    Retrieve all followers of a specific Medium user with optional pagination. Returns follower names, usernames, and profile image URLs.
  provider: medium
  endpoint: /users/{user_id}/followers
  method: GET
  scopes:
    - basic
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for listing followers
    properties:
      user_id:
        type: string
        description: "The user ID"
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of results per page (default 20)"
    required:
      - user_id

- slug: medium_get_follower
  name: Get Follower
  description: |
    Retrieve detailed information about a specific Medium follower by their user ID. Returns the follower's name, username, bio, and follower count.
  provider: medium
  endpoint: /users/{user_id}/followers/{follower_id}
  method: GET
  scopes:
    - basic
  tags:
    - users
  input_schema:
    type: object
    description: Parameters for getting a follower
    properties:
      user_id:
        type: string
        description: "The user ID"
      follower_id:
        type: string
        description: "The follower ID"
    required:
      - user_id
      - follower_id

- slug: medium_search_posts
  name: Search Posts
  description: |
    Search for Medium posts matching a specified query string with optional pagination. Returns post titles, URLs, publication dates, and relevance scores.
  provider: medium
  endpoint: /search/posts
  method: GET
  scopes:
    - basic
  tags:
    - search
  input_schema:
    type: object
    description: Parameters for searching posts
    properties:
      q:
        type: string
        description: "Search query string"
      page:
        type: integer
        description: "Page number for pagination"
      limit:
        type: integer
        description: "Number of results per page (default 20)"
    required:
      - q
