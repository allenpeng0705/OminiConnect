- slug: reapit_create_offer
  name: Create Offer
  description: |
    Create a new offer on a property.
  provider: reapit
  endpoint: /offers
  method: POST
  scopes:
    - offers:write
  tags:
    - offers
    - sales
    - real-estate
    - create
  input_schema:
    type: object
    description: Parameters for creating an offer
    properties:
      propertyId:
        type: string
        description: "Property ID"
      applicantId:
        type: string
        description: "Applicant ID"
      amount:
        type: number
        description: "Offer amount"
    required:
      - propertyId
      - applicantId
      - amount

