# Reapit Tools - Allowlist
# Curated subset of Reapit Property Management API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. reapit_list_properties        - List all properties
# 2. reapit_get_property           - Get property details
# 3. reapit_list_applicants        - List all applicants
# 4. reapit_get_applicant          - Get applicant details
# 5. reapit_create_applicant       - Create an applicant
# 6. reapit_list_offers            - List all offers
# 7. reapit_create_offer           - Create an offer
# 8. repay_list_negotiations       - List negotiations
# 9. reapit_list_tasks             - List tasks
# 10. reapit_create_task          - Create a task

- slug: reapit_list_properties
  name: List Properties
  description: |
    Retrieve a list of all properties in your Reapit account.
  provider: reapit
  endpoint: /properties
  method: GET
  scopes:
    - properties:read
  tags:
    - properties
    - real-estate
  input_schema:
    type: object
    description: Parameters for listing properties
    properties:
      limit:
        type: integer
        description: "Number of properties to return"
        default: 50
      status:
        type: string
        description: "Filter by status: available, under-offer, sold"
    required: []

- slug: reapit_get_property
  name: Get Property
  description: |
    Get details of a specific property by ID.
  provider: reapit
  endpoint: /properties/{propertyId}
  method: GET
  scopes:
    - properties:read
  tags:
    - properties
    - real-estate
  input_schema:
    type: object
    description: Parameters for getting a property
    properties:
      propertyId:
        type: string
        description: "The property ID"
    required:
      - propertyId

- slug: reapit_list_applicants
  name: List Applicants
  description: |
    Retrieve a list of all applicants in your pipeline.
  provider: reapit
  endpoint: /applicants
  method: GET
  scopes:
    - applicants:read
  tags:
    - applicants
    - crm
    - sales
  input_schema:
    type: object
    description: Parameters for listing applicants
    properties:
      limit:
        type: integer
        description: "Number of applicants to return"
        default: 50
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: reapit_get_applicant
  name: Get Applicant
  description: |
    Get details of a specific applicant.
  provider: reapit
  endpoint: /applicants/{applicantId}
  method: GET
  scopes:
    - applicants:read
  tags:
    - applicants
    - crm
    - sales
  input_schema:
    type: object
    description: Parameters for getting an applicant
    properties:
      applicantId:
        type: string
        description: "The applicant ID"
    required:
      - applicantId

- slug: reapit_create_applicant
  name: Create Applicant
  description: |
    Create a new applicant in your system.
  provider: reapit
  endpoint: /applicants
  method: POST
  scopes:
    - applicants:write
  tags:
    - applicants
    - crm
    - sales
    - create
  input_schema:
    type: object
    description: Parameters for creating an applicant
    properties:
      name:
        type: string
        description: "Applicant name"
      email:
        type: string
        description: "Applicant email"
      phone:
        type: string
        description: "Applicant phone"
      propertyInterest:
        type: string
        description: "Property ID they're interested in"
    required:
      - name
      - email

- slug: reapit_list_offers
