# Canny Tools - Allowlist
# Curated subset of the Canny API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. canny_list_boards     - List all boards
# 2. canny_get_board       - Get details of a specific board
# 3. canny_list_posts      - List posts in a board
# 4. canny_get_post        - Get details of a specific post
# 5. canny_create_post     - Create a new post
# 6. canny_list_comments   - List comments on a post
# 7. canny_get_comment     - Get details of a specific comment
# 8. canny_list_users      - List users
# 9. canny_get_user        - Get details of a specific user
# 10. canny_vote_on_post   - Vote on a post

- slug: canny_list_boards
  name: List Boards
  description: |
    Retrieve all boards in the Canny workspace with pagination support. Returns board names, IDs, post counts, and category information.
  provider: canny
  endpoint: /boards
  method: GET
  scopes:
    - boards:read
  tags:
    - boards
    - discovery
  input_schema:
    type: object
    description: Parameters for listing boards
    properties:
      limit:
        type: integer
        description: "Maximum number of boards to return"
        default: 50
      skip:
        type: integer
        description: "Number of boards to skip for pagination"
        default: 0
    required: []

- slug: canny_get_board
  name: Get Board
  description: |
    Retrieve detailed information about a specific board by its unique ID. Returns the board name, description, post counts, and category settings.
  provider: canny
  endpoint: /boards
  method: GET
  scopes:
    - boards:read
  tags:
    - boards
    - read
  input_schema:
    type: object
    description: Parameters for getting a board
    properties:
      id:
        type: string
        description: "Board ID"
    required:
      - id

- slug: canny_list_posts
  name: List Posts
  description: |
    Retrieve all feature request posts in a board with optional filtering by status, author, or visibility. Returns post titles, IDs, statuses, and vote counts.
  provider: canny
  endpoint: /posts
  method: GET
  scopes:
    - posts:read
  tags:
    - posts
    - feedback
  input_schema:
    type: object
    description: Parameters for listing posts
    properties:
      boardID:
        type: string
        description: "Board ID to filter posts by"
      status:
        type: string
        description: "Filter by post status: open, closed, open, under review, etc."
      authorID:
        type: string
        description: "Filter by author user ID"
      limit:
        type: integer
        description: "Maximum number of posts to return"
        default: 50
      skip:
        type: integer
        description: "Number of posts to skip"
        default: 0
    required:
      - boardID

- slug: canny_get_post
  name: Get Post
  description: |
    Retrieve the full details of a specific post by its unique ID. Returns the title, body, author, status, vote count, and comment count.
  provider: canny
  endpoint: /posts
  method: GET
  scopes:
    - posts:read
  tags:
    - posts
    - read
  input_schema:
    type: object
    description: Parameters for getting a post
    properties:
      id:
        type: string
        description: "Post ID"
    required:
      - id

- slug: canny_create_post
  name: Create Post
  description: |
    Create a new feature request post in a specified board with title, description, and optional author. Returns the created post with its unique ID.
  provider: canny
  endpoint: /posts
  method: POST
  scopes:
    - posts:create
  tags:
    - posts
    - create
  input_schema:
    type: object
    description: Parameters for creating a post
    properties:
      boardID:
        type: string
        description: "Board ID to create post in"
      title:
        type: string
        description: "Post title (feature request summary)"
      details:
        type: string
        description: "Detailed description of the feature request"
      authorID:
        type: string
        description: "User ID of the post author"
      categoryID:
        type: string
        description: "Category ID for the post"
    required:
      - boardID
      - title

- slug: canny_list_comments
  name: List Comments
  description: |
    Retrieve all comments on a specific post with pagination support. Returns comment text, author names, timestamps, and parent comment relationships.
  provider: canny
  endpoint: /comments
  method: GET
  scopes:
    - comments:read
  tags:
    - comments
    - discussion
  input_schema:
    type: object
    description: Parameters for listing comments
    properties:
      postID:
        type: string
        description: "Post ID to get comments for"
      limit:
        type: integer
        description: "Maximum number of comments to return"
        default: 50
      skip:
        type: integer
        description: "Number of comments to skip"
        default: 0
    required:
      - postID

- slug: canny_get_comment
  name: Get Comment
  description: |
    Retrieve detailed information about a specific comment by its unique ID. Returns the comment text, author name, and creation timestamp.
  provider: canny
  endpoint: /comments
  method: GET
  scopes:
    - comments:read
  tags:
    - comments
    - read
  input_schema:
    type: object
    description: Parameters for getting a comment
    properties:
      id:
        type: string
        description: "Comment ID"
    required:
      - id

- slug: canny_list_users
  name: List canny Users
  description: |
    Retrieve all users in the Canny workspace with pagination support. Returns user names, email addresses, and avatar URLs.
  provider: canny
  endpoint: /users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - discovery
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      limit:
        type: integer
        description: "Maximum number of users to return"
        default: 50
      skip:
        type: integer
        description: "Number of users to skip"
        default: 0
    required: []

- slug: canny_get_user
  name: Get canny User
  description: |
    Retrieve detailed information about a specific user by their unique ID. Returns the user name, email, and avatar URL.
  provider: canny
  endpoint: /users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: canny_vote_on_post
  name: Vote on Post
  description: |
    Add or remove an upvote on a feature request post to indicate user support. Returns the updated vote count for the post.
  provider: canny
  endpoint: /posts/vote
  method: POST
  scopes:
    - posts:vote
  tags:
    - posts
    - voting
  input_schema:
    type: object
    description: Parameters for voting on a post
    properties:
      postID:
        type: string
        description: "Post ID to vote on"
      voterID:
        type: string
        description: "User ID of the voter"
      type:
        type: string
        description: "Vote type"
        enum: [upvote, removeVote]
        default: upvote
    required:
      - postID
      - voterID
