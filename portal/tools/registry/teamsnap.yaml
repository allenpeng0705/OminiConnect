# TeamSnap Tools - Allowlist
# Curated subset of TeamSnap API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. teamsnap_list_teams    - List all teams
# 2. teamsnap_get_team      - Get team details
# 3. teamsnap_create_team   - Create a new team
# 4. teamsnap_list_events   - List all events
# 5. teamsnap_get_event     - Get event details
# 6. teamsnap_create_event  - Create a new event
# 7. teamsnap_list_members  - List team members
# 8. teamsnap_get_member    - Get member details
# 9. teamsnap_list_schedules - List schedules
# 10. teamsnap_get_schedule  - Get schedule details

- slug: teamsnap_list_teams
  name: List teamsnap Teams
  description: |
    List all teams associated with the authenticated user with optional filtering by sport, name, or membership status. Returns team IDs, names, sports, and member counts for each team.
  provider: teamsnap
  endpoint: /teams
  method: GET
  scopes:
    - teams:r
  tags:
    - teams
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing teams
    properties:
      sport:
        type: string
        description: "Filter by sport type"
      name:
        type: string
        description: "Search by team name"
      member_id:
        type: integer
        description: "Filter by member ID"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required: []

- slug: teamsnap_get_team
  name: Get teamsnap Team
  description: |
    Get details for a specific team by its unique ID. Returns the team name, sport type, location, member roster, upcoming events, and all team settings.
  provider: teamsnap
  endpoint: /teams/{teamId}
  method: GET
  scopes:
    - teams:r
  tags:
    - teams
    - read
  input_schema:
    type: object
    description: Parameters for getting a team
    properties:
      teamId:
        type: integer
        description: "Team ID"
    required:
      - teamId

- slug: teamsnap_create_team
  name: Create Team
  description: |
    Create a new team with the specified name, sport type, location, and settings. Optionally invite initial members during team creation. Returns the created team with its unique ID.
  provider: teamsnap
  endpoint: /teams
  method: POST
  scopes:
    - teams:w
  tags:
    - teams
    - create
  input_schema:
    type: object
    description: Parameters for creating a team
    properties:
      name:
        type: string
        description: "Team name"
      sport:
        type: string
        description: "Sport type (soccer, basketball, baseball, etc.)"
      location:
        type: string
        description: "Team location"
      timezone:
        type: string
        description: "Team timezone"
      division:
        type: string
        description: "Division or league"
      is_public:
        type: boolean
        description: "Public team visibility"
        default: false
    required:
      - name
      - sport

- slug: teamsnap_list_events
  name: List Events
  description: |
    List all events for a team including games, practices, and other team activities with date range filtering. Returns event IDs, titles, types, dates, locations, and RSVP counts.
  provider: teamsnap
  endpoint: /teams/{teamId}/events
  method: GET
  scopes:
    - events:r
  tags:
    - events
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      teamId:
        type: integer
        description: "Team ID"
      from_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      to_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      event_type:
        type: string
        description: "Filter by type (game, practice, other)"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required:
      - teamId

- slug: teamsnap_get_event
  name: Get Event
  description: |
    Get details for a specific event by its unique ID. Returns the event title, type, date, time, location, opponent, notes, and participant RSVP status.
  provider: teamsnap
  endpoint: /events/{eventId}
  method: GET
  scopes:
    - events:r
  tags:
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      eventId:
        type: integer
        description: "Event ID"
    required:
      - eventId

- slug: teamsnap_create_event
  name: Create Event
  description: |
    Create a new event for a team such as a game, practice, or team meeting with the specified title, type, date, and location. Returns the created event with its unique ID.
  provider: teamsnap
  endpoint: /teams/{teamId}/events
  method: POST
  scopes:
    - events:w
  tags:
    - events
    - create
  input_schema:
    type: object
    description: Parameters for creating an event
    properties:
      teamId:
        type: integer
        description: "Team ID"
      title:
        type: string
        description: "Event title"
      event_type:
        type: string
        description: "Event type (game, practice, meeting)"
      start_date:
        type: string
        description: "Start date and time (ISO 8601)"
      end_date:
        type: string
        description: "End date and time (ISO 8601)"
      location:
        type: string
        description: "Event location"
      opponent:
        type: string
        description: "Opponent team name"
      notes:
        type: string
        description: "Event notes"
    required:
      - teamId
      - title
      - start_date

- slug: teamsnap_list_members
  name: List Members
  description: |
    List all members of a team including players, coaches, and staff with optional role and status filtering. Returns member IDs, names, roles, contact information, and availability status.
  provider: teamsnap
  endpoint: /teams/{teamId}/members
  method: GET
  scopes:
    - members:r
  tags:
    - members
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing members
    properties:
      teamId:
        type: integer
        description: "Team ID"
      role:
        type: string
        description: "Filter by role (player, coach, staff)"
      status:
        type: string
        description: "Filter by status (active, inactive)"
      page:
        type: integer
        description: "Page number"
        default: 1
      per_page:
        type: integer
        description: "Results per page"
        default: 50
    required:
      - teamId

- slug: teamsnap_get_member
  name: Get Member
  description: |
    Get details for a specific team member by their unique ID. Returns the member's name, email, phone, role, position, and availability information.
  provider: teamsnap
  endpoint: /members/{memberId}
  method: GET
  scopes:
    - members:r
  tags:
    - members
    - read
  input_schema:
    type: object
    description: Parameters for getting a member
    properties:
      memberId:
        type: integer
        description: "Member ID"
    required:
      - memberId

- slug: teamsnap_list_schedules
  name: List Schedules
  description: |
    List all schedules for a team including game schedules, practice schedules, and event calendars with date range and type filtering. Returns schedule IDs, types, and associated event counts.
  provider: teamsnap
  endpoint: /teams/{teamId}/schedules
  method: GET
  scopes:
    - schedules:r
  tags:
    - schedules
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing schedules
    properties:
      teamId:
        type: integer
        description: "Team ID"
      schedule_type:
        type: string
        description: "Filter by type (game, practice, all)"
      from_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      to_date:
        type: string
        description: "End date (YYYY-MM-DD)"
    required:
      - teamId

- slug: teamsnap_get_schedule
  name: Get Schedule
  description: |
    Get details for a specific schedule by its unique ID. Returns the schedule name, type, all associated events, recurring schedule rules, and time slots.
  provider: teamsnap
  endpoint: /schedules/{scheduleId}
  method: GET
  scopes:
    - schedules:r
  tags:
    - schedules
    - read
  input_schema:
    type: object
    description: Parameters for getting a schedule
    properties:
      scheduleId:
        type: integer
        description: "Schedule ID"
    required:
      - scheduleId