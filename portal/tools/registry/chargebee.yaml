# Chargebee Tools - Allowlist
# Curated subset of Chargebee subscription billing API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. chargebee_list_subscriptions    - List all subscriptions
# 2. chargebee_get_subscription      - Get subscription details
# 3. chargebee_create_subscription   - Create a new subscription
# 4. chargebee_cancel_subscription  - Cancel a subscription
# 5. chargebee_list_customers        - List all customers
# 6. chargebee_get_customer         - Get customer details
# 7. chargebee_list_invoices         - List all invoices
# 8. chargebee_get_invoice          - Get invoice details
# 9. chargebee_list_plans           - List all plans
# 10. chargebee_get_plan            - Get plan details

- slug: chargebee_list_subscriptions
  name: List Subscriptions
  description: |
    Retrieve all subscriptions with optional filtering by status, customer, or plan. Returns subscription IDs, statuses, plan names, and billing cycle information.
  provider: chargebee
  endpoint: /subscriptions
  method: GET
  scopes:
    - subscriptions:read
  tags:
    - subscriptions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing subscriptions
    properties:
      status:
        type: string
        description: "Filter by status (active, cancelled, paused, future, etc)"
      customer_id:
        type: string
        description: "Filter by customer ID"
      plan_id:
        type: string
        description: "Filter by plan ID"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: chargebee_get_subscription
  name: Get Subscription
  description: |
    Retrieve detailed information about a specific subscription by its unique ID. Returns the plan name, billing cycle, status, and customer information.
  provider: chargebee
  endpoint: /subscriptions/{id}
  method: GET
  scopes:
    - subscriptions:read
  tags:
    - subscriptions
    - read
  input_schema:
    type: object
    description: Parameters for getting a subscription
    properties:
      id:
        type: string
        description: "Subscription ID"
    required:
      - id

- slug: chargebee_create_subscription
  name: Create Subscription
  description: |
    Create a new subscription for a specific customer with a specified plan and billing settings. Returns the created subscription with its unique ID.
  provider: chargebee
  endpoint: /subscriptions
  method: POST
  scopes:
    - subscriptions:write
  tags:
    - subscriptions
    - create
  input_schema:
    type: object
    description: Parameters for creating a subscription
    properties:
      customer_id:
        type: string
        description: "Customer ID"
      plan_id:
        type: string
        description: "Plan ID"
      billing_cycles:
        type: integer
        description: "Number of billing cycles"
      start_date:
        type: integer
        description: "Start date as Unix timestamp"
      trial_end:
        type: integer
        description: "Trial end as Unix timestamp"
      auto_collection:
        type: string
        description: "Auto collection (on, off)"
        default: on
    required:
      - customer_id
      - plan_id

- slug: chargebee_cancel_subscription
  name: Cancel Subscription
  description: |
    Cancel an existing subscription with optional cancellation at the end of the billing period. Returns confirmation of the cancellation.
  provider: chargebee
  endpoint: /subscriptions/{id}/cancel
  method: POST
  scopes:
    - subscriptions:write
  tags:
    - subscriptions
    - cancel
    - delete
  input_schema:
    type: object
    description: Parameters for cancelling a subscription
    properties:
      id:
        type: string
        description: "Subscription ID"
      end_of_term:
        type: boolean
        description: "Cancel at end of current term"
        default: false
      cancellation_reason:
        type: string
        description: "Reason for cancellation"
      cancel_at:
        type: integer
        description: "Cancel at specific Unix timestamp"
    required:
      - id

- slug: chargebee_list_customers
  name: List Customers
  description: |
    Retrieve all customers with optional filtering by email, company, or status. Returns customer names, IDs, email addresses, and company information.
  provider: chargebee
  endpoint: /customers
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      email:
        type: string
        description: "Filter by email address"
      company:
        type: string
        description: "Filter by company name"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: chargebee_get_customer
  name: Get Customer
  description: |
    Retrieve detailed information about a specific customer by their unique ID. Returns the billing address, subscription history, and payment information.
  provider: chargebee
  endpoint: /customers/{id}
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
    - read
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      id:
        type: string
        description: "Customer ID"
    required:
      - id

- slug: chargebee_list_invoices
  name: List chargebee Invoices
  description: |
    Retrieve all invoices with optional filtering by customer, status, or date range. Returns invoice IDs, amounts, statuses, and customer information.
  provider: chargebee
  endpoint: /invoices
  method: GET
  scopes:
    - invoices:read
  tags:
    - invoices
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      customer_id:
        type: string
        description: "Filter by customer ID"
      status:
        type: string
        description: "Filter by status (paid, pending, voided, etc)"
      from_date:
        type: integer
        description: "From date as Unix timestamp"
      to_date:
        type: integer
        description: "To date as Unix timestamp"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: chargebee_get_invoice
  name: Get chargebee Invoice
  description: |
    Retrieve detailed information about a specific invoice by its unique ID. Returns line items, total amount, due date, and payment status.
  provider: chargebee
  endpoint: /invoices/{id}
  method: GET
  scopes:
    - invoices:read
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      id:
        type: string
        description: "Invoice ID"
    required:
      - id

- slug: chargebee_list_plans
  name: List Plans
  description: |
    Retrieve all subscription plans with optional filtering by status. Returns plan names, IDs, pricing, billing intervals, and feature information.
  provider: chargebee
  endpoint: /plans
  method: GET
  scopes:
    - plans:read
  tags:
    - plans
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing plans
    properties:
      status:
        type: string
        description: "Filter by status (active, archived)"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: chargebee_get_plan
  name: Get Plan
  description: |
    Retrieve detailed information about a specific plan by its unique ID. Returns the pricing, billing interval, and feature list.
  provider: chargebee
  endpoint: /plans/{id}
  method: GET
  scopes:
    - plans:read
