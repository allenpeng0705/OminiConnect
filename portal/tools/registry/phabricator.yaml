# Phabricator Tools - Allowlist
# Curated subset of Phabricator Conduit API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. phabricator_list_projects     - List projects
# 2. phabricator_get_project      - Get a specific project
# 3. phabricator_create_project   - Create a project
# 4. phabricator_list_tasks       - List tasks (Maniphest)
# 5. phabricator_get_task         - Get a specific task
# 6. phabricator_create_task      - Create a task
# 7. phabricator_list_repositories - List repositories
# 8. phabricator_get_repository   - Get a specific repository
# 9. phabricator_list_users       - List users
# 10. phabricator_get_user        - Get a specific user

- slug: phabricator_list_projects
  name: List phabricator Projects
  description: |
    List all projects in your Phabricator instance, including project names, statuses, member counts, and associated task and repository details.
  provider: phabricator
  endpoint: /project.query
  method: POST
  scopes:
    - project
  tags:
    - projects
    - organization
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      query:
        type: string
        description: "Search projects by name"
      status:
        type: string
        description: "Filter by status: active, archived"
        enum: [active, archived]
        default: active
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: phabricator_get_project
  name: Get phabricator Project
  description: |
    Retrieve detailed information about a specific project, including its name, description, members, milestones, and linked repositories and tasks.
  provider: phabricator
  endpoint: /project.query
  method: POST
  scopes:
    - project
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      project_ids:
        type: array
        items:
          type: string
        description: "Project ID(s) (required)"
    required:
      - project_ids

- slug: phabricator_create_project
  name: Create Project
  description: |
    Create a new project in Phabricator, specifying the name, description, icon, and initial team members to assign.
  provider: phabricator
  endpoint: /project.create
  method: POST
  scopes:
    - project
  tags:
    - projects
    - create
  input_schema:
    type: object
    description: Parameters for creating a project
    properties:
      name:
        type: string
        description: "Project name (required)"
      description:
        type: string
        description: "Project description"
      icon:
        type: string
        description: "Project icon (default: project)"
        default: project
      members:
        type: array
        items:
          type: string
        description: "Array of user PHIDs to add as members"
    required:
      - name

- slug: phabricator_list_tasks
  name: List phabricator Tasks
  description: |
    List all tasks (Maniphest tickets) in your Phabricator instance, including titles, statuses, priorities, assignees, and associated projects.
  provider: phabricator
  endpoint: /maniphest.query
  method: POST
  scopes:
    - maniphest
  tags:
    - tasks
    - work items
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      query:
        type: string
        description: "Search tasks by title"
      project_ids:
        type: array
        items:
          type: string
        description: "Filter by project PHIDs"
      status:
        type: string
        description: "Filter by status: open, resolved, closed"
        enum: [open, resolved, closed]
      priority:
        type: array
        items:
          type: string
        description: "Filter by priority PHIDs"
      assignees:
        type: array
        items:
          type: string
        description: "Filter by assignee PHIDs"
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: phabricator_get_task
  name: Get phabricator Task
  description: |
    Retrieve detailed information about a specific task, including its title, description, status, priority, assignees, and comment thread.
  provider: phabricator
  endpoint: /maniphest.query
  method: POST
  scopes:
    - maniphest
  tags:
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for getting a task
    properties:
      task_ids:
        type: array
        items:
          type: string
        description: "Task ID(s) (required)"
    required:
      - task_ids

- slug: phabricator_create_task
  name: Create Task
  description: |
    Create a new task (Maniphest ticket) in Phabricator with the specified title, description, priority, and project assignments.
  provider: phabricator
  endpoint: /maniphest.create
  method: POST
  scopes:
    - maniphest
  tags:
    - tasks
    - create
  input_schema:
    type: object
    description: Parameters for creating a task
    properties:
      title:
        type: string
        description: "Task title (required)"
      description:
        type: string
        description: "Task description/notes"
      priority:
        type: string
        description: "Priority: unbreakable, needs Triage, high, normal, low, wishlist"
        default: normal
      project_ids:
        type: array
        items:
          type: string
        description: "Project PHIDs to assign the task to"
      assignee:
        type: string
        description: "User PHID to assign the task to"
    required:
      - title

- slug: phabricator_list_repositories
  name: List Repositories
  description: |
    List all repositories (Diffusion) in your Phabricator instance, including repository names, remote URLs, types, and last commit timestamps.
  provider: phabricator
  endpoint: /diffusion.repository.search
  method: POST
  scopes:
    - diffusion
  tags:
    - repositories
    - code
  input_schema:
    type: object
    description: Parameters for listing repositories
    properties:
      query:
        type: string
        description: "Search repositories by name"
      status:
        type: string
        description: "Filter by status: active, inactive"
        enum: [active, inactive]
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: phabricator_get_repository
  name: Get Repository
  description: |
    Retrieve detailed information about a specific repository, including its name, remote URL, tracking configuration, branches, and recent commits.
  provider: phabricator
  endpoint: /diffusion.repository.search
  method: POST
  scopes:
    - diffusion
  tags:
    - repositories
    - read
  input_schema:
    type: object
    description: Parameters for getting a repository
    properties:
      repository_phids:
        type: array
        items:
          type: string
        description: "Repository PHID(s) (required)"
    required:
      - repository_phids

- slug: phabricator_list_users
  name: List phabricator Users
  description: |
    List all users in your Phabricator instance, including usernames, real names, email addresses, roles, and current status values.
  provider: phabricator
  endpoint: /user.search
  method: POST
  scopes:
    - user
  tags:
    - users
    - team
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      query:
        type: string
        description: "Search users by name or username"
      status:
        type: string
        description: "Filter by status: active, disabled"
        enum: [active, disabled]
      limit:
        type: integer
        description: "Max results (default 20, max 100)"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: phabricator_get_user
  name: Get phabricator User
  description: |
    Retrieve detailed information about a specific user, including their username, real name, avatar, roles, permissions, and recent activities.
  provider: phabricator
  endpoint: /user.search
  method: POST
  scopes:
    - user
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_phids:
        type: array
        items:
          type: string
        description: "User PHID(s) (required)"
    required:
      - user_phids