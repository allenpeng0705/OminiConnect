- slug: redbubble_list_orders
  name: List Orders
  description: |
    Retrieve orders with filtering by status and date range.
    Returns order IDs, customer information, items purchased, and shipping status.
    Use this to track sales and manage order fulfillment.
  provider: redbubble
  endpoint: /v2/orders
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      per_page:
        type: integer
        description: "Number of orders per page (default 50)"
      status:
        type: string
        description: "Filter by status: pending, production, shipped, delivered, returned"
      from_date:
        type: string
        description: "Start date filter (ISO 8601 format)"
      to_date:
        type: string
        description: "End date filter (ISO 8601 format)"
    required: []

- slug: redbubble_get_order
  name: Get Order
  description: |
    Retrieve detailed information about a specific order including items and shipping.
    Returns the complete order data with product details and delivery tracking.
    This provides full order information for customer service and support.
  provider: redbubble
  endpoint: /v2/orders/{id}
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      id:
        type: string
        description: "Order ID"
    required:
      - id

- slug: redbubble_get_sales_stats
  name: Get Sales Stats
  description: |
    Retrieve sales statistics and revenue data for your account or specific works.
    Returns detailed sales metrics including units sold, revenue, and trends.
    Use this to track business performance and analyze product success.
  provider: redbubble
  endpoint: /v2/stats/sales
  method: GET
  scopes:
    - stats
  tags:
    - stats
  input_schema:
    type: object
    description: Parameters for getting sales stats
    properties:
      from_date:
        type: string
        description: "Start date for stats period (ISO 8601 format)"
      to_date:
        type: string
        description: "End date for stats period (ISO 8601 format)"
      work_id:
        type: string
        description: "Filter stats for specific work ID"
      group_by:
        type: string
        description: "Group results by: day, month, work, product"
    required: []

- slug: redbubble_list_collections
  name: List Collections
  description: |
    Retrieve all collections of works organized on your account.
    Returns collection names, IDs, work counts, and descriptions.
    Use this to discover grouped artwork and organize your portfolio.
  provider: redbubble
  endpoint: /v2/collections
  method: GET
  scopes:
    - collections
  tags:
    - collections
  input_schema:
    type: object
    description: Parameters for listing collections
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      per_page:
        type: integer
        description: "Number of collections per page (default 25)"
