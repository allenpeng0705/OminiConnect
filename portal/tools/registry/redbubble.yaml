- slug: redbubble_list_works
  name: List Works
  description: |
    Retrieve all artwork works uploaded to your Redbubble account.
    Returns work titles, IDs, tags, and creation dates for each artwork.
    Use this to discover available designs and track uploaded content.
  provider: redbubble
  endpoint: /v2/works
  method: GET
  scopes:
    - works
  tags:
    - works
  input_schema:
    type: object
    description: Parameters for listing works
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      per_page:
        type: integer
        description: "Number of works per page (default 25, max 100)"
      tags:
        type: string
        description: "Filter works by tags (comma-separated)"
    required: []

- slug: redbubble_get_work
  name: Get Work
  description: |
    Retrieve detailed information about a specific artwork work.
    Returns the complete work data including dimensions, tags, and pricing.
    This provides full artwork details for product application and management.
  provider: redbubble
  endpoint: /v2/works/{id}
  method: GET
  scopes:
    - works
  tags:
    - works
  input_schema:
    type: object
    description: Parameters for getting a work
    properties:
      id:
        type: string
        description: "Work ID"
    required:
      - id

- slug: redbubble_upload_work
  name: Upload Work
  description: |
    Upload a new artwork file to your Redbubble account with title and tags.
    Returns the uploaded work with its unique ID and processing status.
    This adds new artwork to your Redbubble portfolio for selling.
  provider: redbubble
  endpoint: /v2/works
  method: POST
  scopes:
    - works
  tags:
    - works
  input_schema:
    type: object
    description: Parameters for uploading a work
    properties:
      title:
        type: string
        description: "Title for the artwork"
      file:
        type: string
        description: "Base64-encoded image file or URL to file"
      tags:
        type: array
        description: "Array of tags for discoverability"
      description:
        type: string
        description: "Description of the artwork"
    required:
      - title
      - file

- slug: redbubble_list_products
  name: List redbubble Products
  description: |
    Retrieve all product types available in the Redbubble catalog.
    Returns product names, IDs, base prices, and available variants.
    Use this to discover merchandise options for artwork application.
  provider: redbubble
  endpoint: /v2/products
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      per_page:
        type: integer
        description: "Number of products per page (default 50)"
    required: []

- slug: redbubble_get_product
  name: Get redbubble Product
  description: |
    Retrieve detailed information about a specific product type.
    Returns the complete product data including sizing options and pricing tiers.
    This provides product details for understanding merchandise specifications.
  provider: redbubble
  endpoint: /v2/products/{id}
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for getting a product
