# InVision Tools - Allowlist
# Curated subset of InVision API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. invision_list_prototypes - List all prototypes
# 2. invision_get_prototype  - Get prototype details
# 3. invision_list_screens   - List screens in a prototype
# 4. invision_get_screen    - Get screen details
# 5. invision_list_comments  - List comments on a screen
# 6. invision_get_comment   - Get comment details
# 7. invision_list_users    - List users
# 8. invision_get_user      - Get user details
# 9. invision_list_teams    - List teams
# 10. invision_get_team     - Get team details

- slug: invision_list_prototypes
  name: List Prototypes
  description: |
    List all InVision prototypes accessible to the authenticated user. Returns prototype names, thumbnails, and creation dates.
  provider: invision
  endpoint: /api/v1/prototypes
  method: GET
  scopes:
    - prototypes:read
  tags:
    - prototypes
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing prototypes
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: invision_get_prototype
  name: Get Prototype
  description: |
    Retrieve details about a specific InVision prototype by its ID. Includes the prototype name, description, and owner information.
  provider: invision
  endpoint: /api/v1/prototypes/{prototype_id}
  method: GET
  scopes:
    - prototypes:read
  tags:
    - prototypes
    - read
  input_schema:
    type: object
    description: Parameters for getting a prototype
    properties:
      prototype_id:
        type: string
        description: "Prototype ID (required)"
    required:
      - prototype_id

- slug: invision_list_screens
  name: List Screens
  description: |
    List all screens within a specific InVision prototype. Returns screen names, thumbnails, and order information.
  provider: invision
  endpoint: /api/v1/prototypes/{prototype_id}/screens
  method: GET
  scopes:
    - screens:read
  tags:
    - screens
    - prototypes
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing screens
    properties:
      prototype_id:
        type: string
        description: "Prototype ID (required)"
      limit:
        type: integer
        description: "Number of results"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
    required:
      - prototype_id

- slug: invision_get_screen
  name: Get Screen
  description: |
    Retrieve details about a specific screen within an InVision prototype. Includes screen name, dimensions, and metadata.
  provider: invision
  endpoint: /api/v1/screens/{screen_id}
  method: GET
  scopes:
    - screens:read
  tags:
    - screens
    - read
  input_schema:
    type: object
    description: Parameters for getting a screen
    properties:
      screen_id:
        type: string
        description: "Screen ID (required)"
    required:
      - screen_id

