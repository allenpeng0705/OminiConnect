- slug: teespring_list_campaigns
  name: List Campaigns
  description: |
    Retrieve a list of all marketing campaigns with performance metrics.
    Returns campaign names, IDs, status, and key statistics for each campaign.
    Use this to discover ongoing campaigns and track their performance.
  provider: teespring
  endpoint: /v2/campaigns
  method: GET
  scopes:
    - campaigns
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of campaigns per page (default 20)"
      status:
        type: string
        description: "Filter by status: draft, published, archived"
    required: []

- slug: teespring_get_campaign
  name: Get Campaign
  description: |
    Retrieve detailed information about a specific campaign including design and settings.
    Returns the complete campaign configuration with products, pricing, and status.
    This provides full campaign data for management and analysis.
  provider: teespring
  endpoint: /v2/campaigns/{id}
  method: GET
  scopes:
    - campaigns
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

- slug: teespring_create_campaign
  name: Create Campaign
  description: |
    Create a new campaign with title, design, products, and pricing configuration.
    Returns the created campaign with its unique ID and initial status.
    This provisions a new marketing campaign in Teespring.
  provider: teespring
  endpoint: /v2/campaigns
  method: POST
  scopes:
    - campaigns
  tags:
    - campaigns
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      title:
        type: string
        description: "Campaign title"
      design_id:
        type: string
        description: "Design ID to apply to products"
      products:
        type: array
        description: "Array of product types and variants to include"
      pricing:
        type: object
        description: "Pricing configuration per product"
      start_date:
        type: string
        description: "Campaign start date (ISO 8601 format)"
    required:
      - title
      - products

- slug: teespring_list_products
  name: List teespring Products
  description: |
    Retrieve all products available in the Teespring catalog.
    Returns product names, IDs, categories, and base pricing for each item.
    Use this to discover available merchandise for campaign design.
  provider: teespring
  endpoint: /v2/products
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of products per page (default 50)"
      category:
        type: string
        description: "Filter by product category"
    required: []

- slug: teespring_get_product
  name: Get teespring Product
  description: |
    Retrieve detailed information about a specific product including variants and sizing.
    Returns the complete product data with available colors, sizes, and pricing tiers.
    This provides product details for campaign creation and merchandising.
  provider: teespring
  endpoint: /v2/products/{id}
  method: GET
  scopes:
    - products
  tags:
    - products
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      id:
        type: string
        description: "Product ID"
    required:
      - id

- slug: teespring_list_orders
  name: List Orders
  description: |
    Retrieve orders with filtering by campaign, status, and date range.
    Returns order IDs, customer details, items purchased, and shipping status.
    Use this to track sales and manage order fulfillment.
  provider: teespring
  endpoint: /v2/orders
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      page:
        type: integer
        description: "Page number for pagination (default 1)"
      limit:
        type: integer
        description: "Number of orders per page (default 50)"
      campaign_id:
        type: string
        description: "Filter by specific campaign ID"
      status:
        type: string
        description: "Filter by status: pending, processing, shipped, delivered, canceled"
      from_date:
        type: string
        description: "Start date filter (ISO 8601 format)"
      to_date:
        type: string
        description: "End date filter (ISO 8601 format)"
    required: []

- slug: teespring_get_order
  name: Get Order
  description: |
    Retrieve detailed information about a specific order including items and shipping.
    Returns the complete order data with product details and delivery status.
    This provides full order information for customer service and tracking.
  provider: teespring
  endpoint: /v2/orders/{id}
  method: GET
  scopes:
    - orders
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      id:
        type: string
        description: "Order ID"
    required:
      - id

