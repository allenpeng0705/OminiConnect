- slug: teespring_get_design
  name: Get Design
  description: |
    Retrieve detailed information about a specific design including artwork and layers.
    Returns the complete design data with file URLs and layer composition.
    This provides design details for editing and campaign application.
  provider: teespring
  endpoint: /v2/designs/{id}
  method: GET
  scopes:
    - designs
  tags:
