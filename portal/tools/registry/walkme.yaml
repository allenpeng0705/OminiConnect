  name: List Campaigns
  description: |
    List all campaigns in your WalkMe system for engagement tracking.
    Returns campaign names, IDs, status, and targeting information for each campaign.
    Use this to discover engagement campaigns and track adoption initiatives.
  provider: walkme
  endpoint: /api/v1/campaigns
  method: GET
  scopes:
