  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      status:
        type: string
        description: "Filter by status (active, archived, draft)"
    required: []

- slug: walkme_get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific campaign including targeting and status.
    Returns the complete campaign configuration with engagement metrics.
    This provides full campaign data for analysis and optimization.
  provider: walkme
  endpoint: /api/v1/campaigns/{campaignId}
  method: GET
  scopes:
    - campaigns:read
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaignId:
        type: string
        description: "Campaign ID"
    required:
      - campaignId
