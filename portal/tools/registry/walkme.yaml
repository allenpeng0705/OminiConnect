# WalkMe Tools - Allowlist
# Curated subset of WalkMe REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. walkme_list_guides       - List all guides
# 2. walkme_get_guide         - Get guide details
# 3. walkme_create_guide      - Create a new guide
# 4. walkme_list_steps        - List steps in a guide
# 5. walkme_get_step          - Get step details
# 6. walkme_list_users        - List users
# 7. walkme_get_user          - Get user details
# 8. walkme_get_analytics     - Get analytics data
# 9. walkme_list_campaigns    - List campaigns
# 10. walkme_get_campaign     - Get campaign details

- slug: walkme_list_guides
  name: List Guides
  description: |
    List all guides in your WalkMe system for digital adoption and training.
    Returns guide names, IDs, status, and category information for each guide.
    Use this to discover available guides and track content availability.
  provider: walkme
  endpoint: /api/v1/guides
  method: GET
  scopes:
    - guides:read
  tags:
    - guides
    - list
  input_schema:
    type: object
    description: Parameters for listing guides
    properties:
      status:
        type: string
        description: "Filter by status (active, archived, draft)"
      category_id:
        type: string
        description: "Filter by category ID"
    required: []

- slug: walkme_get_guide
  name: Get Guide
  description: |
    Get detailed information about a specific guide including steps and configuration.
    Returns the complete guide data with all steps and targeting settings.
    This provides full guide details for understanding and implementation.
  provider: walkme
  endpoint: /api/v1/guides/{guideId}
  method: GET
  scopes:
    - guides:read
  tags:
    - guides
    - read
  input_schema:
    type: object
    description: Parameters for getting a guide
    properties:
      guideId:
        type: string
        description: "Guide ID"
    required:
      - guideId

- slug: walkme_create_guide
  name: Create Guide
  description: |
    Create a new guide in WalkMe with title, description, and category.
    Returns the created guide with its unique ID and initial configuration.
    This provisions a new digital adoption guide in WalkMe.
  provider: walkme
  endpoint: /api/v1/guides
  method: POST
  scopes:
    - guides:write
  tags:
    - guides
    - create
  input_schema:
    type: object
    description: Parameters for creating a guide
    properties:
      title:
        type: string
        description: "Guide title"
      description:
        type: string
        description: "Guide description"
      category_id:
        type: string
        description: "Category ID"
      status:
        type: string
        description: "Guide status (draft, published)"
    required:
      - title

- slug: walkme_list_steps
  name: List Steps
  description: |
    List all steps in a guide for digital adoption content.
    Returns step numbers, titles, content types, and configurations for each step.
    Use this to discover the structure of a guide's content flow.
  provider: walkme
  endpoint: /api/v1/guides/{guideId}/steps
  method: GET
  scopes:
    - guides:read
  tags:
    - steps
    - list
  input_schema:
    type: object
    description: Parameters for listing steps
    properties:
      guideId:
        type: string
        description: "Guide ID"
    required:
      - guideId

- slug: walkme_get_step
  name: Get Step
  description: |
    Get detailed information about a specific step including content and settings.
    Returns the complete step data with media, text, and interaction configuration.
    This provides full step details for guide creation and modification.
  provider: walkme
  endpoint: /api/v1/steps/{stepId}
  method: GET
  scopes:
    - guides:read
  tags:
    - steps
    - read
  input_schema:
    type: object
    description: Parameters for getting a step
    properties:
      stepId:
        type: string
        description: "Step ID"
    required:
      - stepId

- slug: walkme_list_users
  name: List walkme Users
  description: |
    List all users in your WalkMe system for administration and tracking.
    Returns user names, emails, roles, and enrollment status for each user.
    Use this to discover users and manage guide assignments.
  provider: walkme
  endpoint: /api/v1/users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page_size:
        type: integer
        description: "Number of results (default 50, max 200)"
        default: 50
    required: []

- slug: walkme_get_user
  name: Get walkme User
  description: |
    Get detailed information about a specific user including profile and progress.
    Returns the complete user data with guide completions and engagement metrics.
    This provides full user data for tracking and support.
  provider: walkme
  endpoint: /api/v1/users/{userId}
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

- slug: walkme_get_analytics
  name: Get Analytics
  description: |
    Get analytics data for guides and user interactions over a date range.
    Returns engagement metrics, completion rates, and user activity statistics.
    Use this to track digital adoption performance and identify areas for improvement.
  provider: walkme
  endpoint: /api/v1/analytics
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
    - read
  input_schema:
    type: object
    description: Parameters for getting analytics
    properties:
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      guide_id:
        type: string
        description: "Filter by guide ID"
    required: []

