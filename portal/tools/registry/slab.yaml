# Slab Tools - Allowlist
# Curated subset of Slab API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_posts                               - List all posts
# 2. get_post                                 - Get post details
# 3. create_post                              - Create a new post
# 4. update_post                              - Update a post
# 5. list_topics                              - List all topics
# 6. get_topic                                - Get topic details
# 7. list_members                             - List workspace members
# 8. list_invitations                         - List pending invitations
# 9. create_invitation                        - Invite a member
# 10. get_workspace                            - Get workspace settings

- slug: list_posts
  name: List Posts
  description: |
    List all posts in the Slab knowledge base with pagination. Returns post titles, content previews, author names, topic assignments, and publication dates for content discovery.
  provider: slab
  endpoint: /posts
  method: GET
  scopes: []
  tags:
    - posts
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_post
  name: Get Post
  description: |
    Get detailed information about a specific Slab post including its full content, author information, topic assignments, and view count. Returns all post metadata for content review and collaboration.
  provider: slab
  endpoint: /posts/{id}
  method: GET
  scopes: []
  tags:
    - posts
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_post
  name: Create Post
  description: |
    Create a new post in Slab with title, content, topic, and visibility settings. Returns the created post with its ID for knowledge base contribution.
  provider: slab
  endpoint: /posts
  method: POST
  scopes: []
  tags:
    - posts
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: update_post
  name: Update Post
  description: |
    Update an existing Slab post with new title, content, topic, or visibility settings. Returns the updated post for confirmation.
  provider: slab
  endpoint: /posts/{id}
  method: PUT
  scopes: []
  tags:
    - posts
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_topics
  name: List Topics
  description: |
    List all topics in the Slab knowledge base for content organization. Returns topic names, descriptions, post counts, and parent topic information.
  provider: slab
  endpoint: /topics
  method: GET
  scopes: []
  tags:
    - topics
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_topic
  name: Get Topic
  description: |
    Get detailed information about a specific Slab topic including description, post list, member permissions, and subscriber count. Returns topic metadata for content organization and access management.
  provider: slab
  endpoint: /topics/{id}
  method: GET
  scopes: []
  tags:
    - topics
    - knowledge-base
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_members
  name: List Members
  description: |
    List all workspace members in Slab for access management. Returns member names, email addresses, roles, and last active dates.
  provider: slab
  endpoint: /members
  method: GET
  scopes: []
  tags:
    - members
    - workspace
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_invitations
  name: List Invitations
  description: |
    List all pending invitations in Slab for workspace onboarding management. Returns invitation emails, invited roles, and invitation status.
  provider: slab
  endpoint: /invitations
  method: GET
  scopes: []
  tags:
    - invitations
    - workspace
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_invitation
  name: Create Invitation
  description: |
    Create a new invitation to join the Slab workspace with specified email address and role. Returns the invitation ID and status for tracking workspace onboarding.
  provider: slab
  endpoint: /invitations
  method: POST
  scopes: []
  tags:
    - invitations
    - workspace
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_workspace
  name: Get slab Workspace
  description: |
    Get workspace settings for Slab including name, domain, member count, and configuration details for administration. Returns workspace metadata for team management and configuration.
  provider: slab
  endpoint: /workspace
  method: GET
  scopes: []
  tags:
    - workspace
    - config
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

