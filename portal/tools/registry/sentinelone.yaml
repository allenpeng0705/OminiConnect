# SentinelOne Tools - Allowlist
# Curated subset of SentinelOne API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_sites                                - List all sites
# 2. get_agents                               - List all agents
# 3. get_threats                              - List detected threats
# 4. get_activities                           - List activities
# 5. get_applications                         - List installed applications
# 6. get_networks                             - List network information
# 7. get_policies                             - List security policies
# 8. get_exclusions                           - List exclusions
# 9. get_dashboard                            - Get dashboard summary
# 10. get_settings                             - Get system settings

- slug: get_sites
  name: Get Sites
  description: |
    List all sites
  provider: sentinelone
  endpoint: /sites
  method: GET
  scopes: []
  tags:
    - sites
    - security
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

