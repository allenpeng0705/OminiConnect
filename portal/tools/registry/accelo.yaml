# Accelo Tools - Allowlist
# Curated subset of Accelo REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. accelo_list_contacts       - List contacts
# 2. accelo_get_contact         - Get contact details
# 3. accelo_create_contact      - Create a new contact
# 4. accelo_list_companies      - List companies
# 5. accelo_get_company         - Get company details
# 6. accelo_list_matters        - List matters (cases/projects)
# 7. accelo_get_matter          - Get matter details
# 8. accelo_list_tasks          - List tasks
# 9. accelo_get_task            - Get task details
# 10. accelo_list_activities    - List activities

- slug: accelo_list_contacts
  name: List accelo Contacts
  description: |
    List all contacts in your Accelo account. Returns contact names, IDs, email addresses, phone numbers, and company associations for each contact.
  provider: accelo
  endpoint: /api/contacts
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      company_id:
        type: integer
        description: "Filter by company ID"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
    required: []

- slug: accelo_get_contact
  name: Get accelo Contact
  description: |
    Get detailed information about a specific Accelo contact by their ID. Returns the contact name, email, phone, company, and all associated activities.
  provider: accelo
  endpoint: /api/contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: accelo_create_contact
  name: Create Contact
  description: |
    Create a new contact in Accelo with their contact information. Returns the created contact with their unique ID and details.
  provider: accelo
  endpoint: /api/contacts
  method: POST
  scopes:
    - write
  tags:
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      company_id:
        type: integer
        description: "Associated company ID"
    required:
      - first_name
      - last_name

- slug: accelo_list_companies
  name: List Companies
  description: |
    List all companies in your Accelo account. Returns company names, IDs, addresses, and contact information for each company.
  provider: accelo
  endpoint: /api/companies
  method: GET
  scopes:
    - read
  tags:
    - companies
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing companies
    properties:
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
    required: []

- slug: accelo_get_company
  name: Get Company
  description: |
    Get detailed information about a specific Accelo company by its ID. Returns the company name, address, contacts, and associated matters.
  provider: accelo
  endpoint: /api/companies/{id}
  method: GET
  scopes:
    - read
  tags:
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      id:
        type: integer
        description: "Company ID"
    required:
      - id

- slug: accelo_list_matters
  name: List Matters
  description: |
    List all matters (cases and projects) in your Accelo account. Returns matter titles, IDs, status, client associations, and matter types for each matter.
  provider: accelo
  endpoint: /api/matters
  method: GET
  scopes:
    - read
  tags:
    - matters
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing matters
    properties:
      status:
        type: string
        description: "Filter by status (open, closed, pending)"
      company_id:
        type: integer
        description: "Filter by company ID"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
    required: []

- slug: accelo_get_matter
  name: Get Matter
