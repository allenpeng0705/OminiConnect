- slug: accelo_list_activities
  name: List Activities
  description: |
    List all activities in your Accelo account. Returns activity IDs, types, timestamps, subject, and associated objects for each activity.
  provider: accelo
  endpoint: /api/activities
  method: GET
  scopes:
    - read
  tags:
    - activities
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing activities
    properties:
      object:
        type: string
        description: "Filter by object type (contact, company, matter)"
      object_id:
        type: integer
        description: "Filter by object ID"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
    required: []
