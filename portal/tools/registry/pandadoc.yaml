  provider: pandadoc
  endpoint: /public/v1/templates/{id}
  method: GET
  scopes:
    - templates:read
  tags:
    - legal
    - templates
    - read
  input_schema:
    type: object
    description: Parameters for getting a template
    properties:
      id:
        type: string
        description: "Template ID"
    required:
      - id

