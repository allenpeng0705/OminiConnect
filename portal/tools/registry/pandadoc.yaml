  name: List Webhooks
  description: |
    List all webhooks for receiving event notifications including their URLs, event types, and activation status. Returns webhook configurations for integration setup.
  provider: pandadoc
  endpoint: /public/v1/webhooks
  method: GET
  scopes:
    - webhooks:read
  tags:
    - legal
