- slug: pandadoc_get_analytics
  name: Get Analytics
  description: |
    Get analytics and tracking data for a specific document including view counts, completion rates, and signer activity timestamps. Returns engagement metrics for document performance monitoring.
  provider: pandadoc
  endpoint: /public/v1/documents/{id}/analytics
  method: GET
  scopes:
    - analytics:read
  tags:
    - legal
    - documents
    - analytics
  input_schema:
    type: object
    description: Parameters for getting analytics
    properties:
      id:
        type: string
        description: "Document ID"
    required:
      - id
