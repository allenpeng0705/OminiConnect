# Azure DevOps Tools - Allowlist
# Curated subset of the Azure DevOps REST API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. azure_devops_list_projects     - List projects for an organization
# 2. azure_devops_get_project       - Get details of a specific project
# 3. azure_devops_list_work_items  - List work items in a project
# 4. azure_devops_get_work_item    - Get a specific work item
# 5. azure_devops_create_work_item - Create a new work item
# 6. azure_devops_list_repos       - List repositories in a project
# 7. azure_devops_get_repo         - Get a specific repository
# 8. azure_devops_list_builds      - List build definitions or runs
# 9. azure_devops_get_build       - Get a specific build
# 10. azure_devops_list_releases   - List release definitions or runs

- slug: azure_devops_list_projects
  name: List azure_devops Projects
  description: |
    List all projects in an Azure DevOps organization, returning project names, descriptions, visibility, and state.
  provider: azure_devops
  endpoint: /api/v4/projects
  method: GET
  scopes:
    - vso.project
  tags:
    - projects
    - azure_devops
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      $top:
        type: integer
        description: "Number of projects to return (max 1000)"
        default: 100
      $skip:
        type: integer
        description: "Number of projects to skip for pagination"
        default: 0
      state:
        type: string
        description: "Filter by state: wellFormed, createPending, deleting, changed, healthy, unhealthy"
        enum: [wellFormed, createPending, deleting, changed, healthy, unhealthy]
    required:
      - organization

- slug: azure_devops_get_project
  name: Get azure_devops Project
  description: |
    Get details of a specific project including name, description, visibility, source control type, and process template.
  provider: azure_devops
  endpoint: /api/v4/projects/{project_id}
  method: GET
  scopes:
    - vso.project
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      project_id:
        type: string
        description: "Project ID or name"
    required:
      - organization
      - project_id

- slug: azure_devops_list_work_items
  name: List Work Items
  description: |
    List work items in a project with optional filters for type, state, assignee, or area path.
  provider: azure_devops
  endpoint: /api/v4/projects/{project_id}/workitems
  method: GET
  scopes:
    - vso.work
  tags:
    - work_items
    - tasks
  input_schema:
    type: object
    description: Parameters for listing work items
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      project_id:
        type: string
        description: "Project ID or name"
      work_item_type:
        type: string
        description: "Filter by work item type (e.g., Task, Bug, User Story)"
      state:
        type: string
        description: "Filter by state"
      assigned_to:
        type: string
        description: "Filter by assignee"
      area_path:
        type: string
        description: "Filter by area path"
      $top:
        type: integer
        description: "Number of work items to return (max 200)"
        default: 100
      $skip:
        type: integer
        description: "Number of work items to skip"
        default: 0
    required:
      - organization
      - project_id

- slug: azure_devops_get_work_item
  name: Get Work Item
  description: |
    Get details of a specific work item including title, description, state, assignees, and history.
  provider: azure_devops
  endpoint: /api/v4/projects/{project_id}/workitems/{work_item_id}
  method: GET
  scopes:
    - vso.work
  tags:
    - work_items
    - read
  input_schema:
    type: object
    description: Parameters for getting a work item
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      project_id:
        type: string
        description: "Project ID or name"
      work_item_id:
        type: integer
        description: "Work item ID"
    required:
      - organization
      - project_id
      - work_item_id

- slug: azure_devops_create_work_item
  name: Create Work Item
  description: |
    Create a new work item in a project with title, type, description, assignees, and tags.
  provider: azure_devops
  endpoint: /api/v4/projects/{project_id}/workitems
  method: POST
  scopes:
    - vso.work
  tags:
    - work_items
    - create
  input_schema:
    type: object
    description: Parameters for creating a work item
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      project_id:
        type: string
        description: "Project ID or name"
      work_item_type:
        type: string
        description: "Work item type (e.g., Task, Bug, User Story)"
      title:
        type: string
        description: "Work item title"
      description:
        type: string
        description: "Work item description"
      assigned_to:
        type: string
        description: "User email or display name to assign"
      tags:
        type: string
        description: "Comma-separated list of tags"
    required:
      - organization
      - project_id
      - work_item_type
      - title

