- slug: azure_devops_list_builds
  name: List Builds
  description: |
    List build definitions or recent build runs in a project with optional filters for branch, status, or result.
  provider: azure_devops
  endpoint: /api/v4/projects/{project_id}/builds
  method: GET
  scopes:
    - vso.build
  tags:
    - builds
    - ci_cd
  input_schema:
    type: object
    description: Parameters for listing builds
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      project_id:
        type: string
        description: "Project ID or name"
      definition_id:
        type: integer
        description: "Filter by build definition ID"
      branch:
        type: string
        description: "Filter by source branch"
      status:
        type: string
        description: "Filter by status: inProgress, completed, cancelling, paused, notStarted"
        enum: [inProgress, completed, cancelling, paused, notStarted]
      result:
        type: string
        description: "Filter by result: succeeded, partiallySucceeded, failed, canceled, none"
        enum: [succeeded, partiallySucceeded, failed, canceled, none]
      $top:
        type: integer
        description: "Number of builds to return"
        default: 100
      $skip:
        type: integer
        description: "Number of builds to skip"
        default: 0
    required:
      - organization
      - project_id

- slug: azure_devops_get_build
  name: Get Build
  description: |
    Get details of a specific build including build number, status, result, start/end times, and source branch.
  provider: azure_devops
  endpoint: /api/v4/projects/{project_id}/builds/{build_id}
  method: GET
  scopes:
    - vso.build
  tags:
    - builds
    - read
  input_schema:
    type: object
    description: Parameters for getting a build
    properties:
      organization:
        type: string
        description: "Azure DevOps organization name"
      project_id:
        type: string
        description: "Project ID or name"
      build_id:
        type: integer
        description: "Build ID"
    required:
      - organization
      - project_id
      - build_id

