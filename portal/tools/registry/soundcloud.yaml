- slug: soundcloud_search_tracks
  name: Search Tracks
  description: |
    Search for tracks by keyword query.
    Returns matching tracks with title, artist, and stats.
  provider: soundcloud
  endpoint: /tracks
  method: GET
  scopes:
    - tracks-read
  tags:
    - search
    - tracks
    - discovery
  input_schema:
    type: object
    description: Parameters for searching tracks
    properties:
      q:
        type: string
        description: "Search query (required)"
      limit:
        type: integer
        description: "Max results (default 50, max 100)"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required:
      - q