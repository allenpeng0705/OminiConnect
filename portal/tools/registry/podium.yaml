# Podium Tools - Allowlist
# Curated subset of Podium API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. podium_list_leads              - List leads
# 2. podium_get_lead                - Get lead details
# 3. podium_list_contacts           - List contacts
# 4. podium_get_contact             - Get contact details
# 5. podium_list_messages           - List messages
# 6. podium_get_message             - Get message details
# 7. podium_list_reviews            - List reviews
# 8. podium_get_review              - Get review details
# 9. podium_list_campaigns          - List campaigns
# 10. podium_get_location           - Get location info

- slug: podium_list_leads
  name: List Leads
  description: |
    List all leads in the Podium organization, including lead names, contact information, status values, and source details.
  provider: podium
  endpoint: /api/leads
  method: GET
  scopes: []
  tags:
    - leads
    - crm
    - list
  input_schema:
    type: object
    description: Parameters for listing leads
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: podium_get_lead
  name: Get Lead
  description: |
    Retrieve detailed information about a specific lead, including their contact details, status, notes, and activity timeline.
  provider: podium
  endpoint: /api/leads/{leadId}
  method: GET
  scopes: []
  tags:
    - leads
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting a lead
    properties:
      leadId:
        type: string
        description: "Lead ID"
    required:
      - leadId

- slug: podium_list_contacts
  name: List Contacts
  description: |
    List all contacts in Podium, including contact names, email addresses, phone numbers, and company associations.
  provider: podium
  endpoint: /api/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - crm
    - list
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required: []

