# Zoho Desk Tools - Allowlist
# Curated subset of Zoho Desk API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_desk_list_tickets           - List all tickets
# # 2. zoho_desk_get_ticket           - Get ticket details
# # 3. zoho_desk_create_ticket           - Create a new ticket
# # 4. zoho_desk_update_ticket           - Update a ticket
# # 5. zoho_desk_list_comments           - List all comments on a ticket
# # 6. zoho_desk_add_comment           - Add a comment to a ticket
# # 7. zoho_desk_list_contacts           - List all contacts
# # 8. zoho_desk_get_contact           - Get contact details
# # 9. zoho_desk_list_teams           - List all support teams
# # 10. zoho_desk_list_agents           - List all agents

- slug: zoho_desk_list_tickets
  name: List Tickets
  description: |
    List all tickets
  provider: zoho-desk
  endpoint: /v1/tickets
  method: GET
  scopes:
    - read
  tags:
    - zoho-desk
  input_schema:
    type: object
    description: Parameters for list tickets
    properties: {}
    required: []

