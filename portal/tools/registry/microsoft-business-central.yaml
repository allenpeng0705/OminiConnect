# Microsoft Business Central Tools - Allowlist
# Curated subset of Microsoft Business Central API for AI agent use.
# OAUTH2_CC via Nango (Client Credentials).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. business_central_list_companies      - List companies
# 2. business_central_get_company        - Get company details
# 3. business_central_list_customers     - List customers
# 4. business_central_get_customer       - Get customer details
# 5. business_central_list_vendors       - List vendors
# 6. business_central_get_vendor         - Get vendor details
# 7. business_central_list_invoices      - List sales invoices
# 8. business_central_get_invoice        - Get invoice details
# 9. business_central_list_items         - List items
# 10. business_central_get_item          - Get item details

- slug: business_central_list_companies
  name: List Companies
  description: |
    List all companies in Business Central.
  provider: microsoft-business-central
  endpoint: /v2.0/{tenantId}/{environmentName}/api/v2.0/companies
  method: GET
  scopes: []
  tags:
    - companies
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing companies
    properties: {}
    required: []

- slug: business_central_get_company
  name: Get Company
  description: |
    Get details of a specific company.
  provider: microsoft-business-central
  endpoint: /v2.0/{tenantId}/{environmentName}/api/v2.0/companies/{companyId}
  method: GET
  scopes: []
  tags:
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      companyId:
        type: string
        description: "Company ID"
    required:
      - companyId

- slug: business_central_list_customers
  name: List Customers
  description: |
    List all customers in Business Central.
    Filter by country, city, or search.
  provider: microsoft-business-central
  endpoint: /v2.0/{tenantId}/{environmentName}/api/v2.0/customers
  method: GET
  scopes: []
  tags:
    - customers
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      $filter:
        type: string
        description: "OData filter expression"
      $top:
        type: integer
        description: "Max results"
        default: 20
    required: []

