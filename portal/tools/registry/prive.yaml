# Prive Tools - Allowlist
# Curated subset of Prive API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. prive_list_subscriptions         - List subscriptions
# 2. prive_get_subscription          - Get subscription details
# 3. prive_list_customers            - List customers
# 4. prive_get_customer             - Get customer details
# 5. prive_list_orders              - List orders
# 6. prive_get_order               - Get order details
# 7. prive_list_products            - List products
# 8. prive_get_product             - Get product details
# 9. prive_list_invoices           - List invoices
# 10. prive_get_invoice            - Get invoice details

- slug: prive_list_subscriptions
  name: List Subscriptions
  description: |
    List all subscriptions.
  provider: prive
  endpoint: /subscriptions
  method: GET
  scopes: []
  tags:
    - subscriptions
    - billing
    - list
  input_schema:
    type: object
    description: Parameters for listing subscriptions
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: prive_get_subscription
  name: Get Subscription
  description: |
    Get detailed information about a specific subscription.
  provider: prive
  endpoint: /subscriptions/{subscriptionId}
  method: GET
  scopes: []
  tags:
    - subscriptions
    - billing
    - read
  input_schema:
    type: object
    description: Parameters for getting a subscription
    properties:
      subscriptionId:
        type: string
        description: "Subscription ID"
    required:
      - subscriptionId

