# FreshBooks Tools - Allowlist
# Curated subset of the FreshBooks API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. freshbooks_list_clients        - List clients
# 2. freshbooks_get_client          - Get a specific client
# 3. freshbooks_create_client      - Create a new client
# 4. freshbooks_list_invoices       - List invoices
# 5. freshbooks_get_invoice         - Get a specific invoice
# 6. freshbooks_create_invoice      - Create a new invoice
# 7. freshbooks_list_expenses       - List expenses
# 8. freshbooks_get_expense         - Get a specific expense
# 9. freshbooks_list_time_entries   - List time entries
# 10. freshbooks_get_time_entry     - Get a specific time entry

- slug: freshbooks_list_clients
  name: List Clients
  description: |
    List all clients in the FreshBooks account with optional pagination and search. Returns client names, IDs, email addresses, phone numbers, and billing information.
  provider: freshbooks
  endpoint: /users/business/{business_id}/clients
  method: GET
  scopes:
    - self
    - clients
  tags:
    - clients
    - accounting
  input_schema:
    type: object
    description: Parameters for listing clients
    properties:
      business_id:
        type: string
        description: "FreshBooks Business ID"
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
      per_page:
        type: integer
        description: "Results per page (max 100)"
        default: 25
      search:
        type: string
        description: "Search by client name or email"
    required:
      - business_id

- slug: freshbooks_get_client
  name: Get Client
  description: |
    Retrieve detailed information about a specific FreshBooks client including name, email, phone, address, and billing metadata.
  provider: freshbooks
  endpoint: /users/business/{business_id}/clients/{client_id}
  method: GET
  scopes:
    - self
    - clients
  tags:
    - clients
    - read
  input_schema:
    type: object
    description: Parameters for getting a client
    properties:
      business_id:
        type: string
        description: "FreshBooks Business ID"
      client_id:
        type: string
        description: "Client ID"
    required:
      - business_id
      - client_id

- slug: freshbooks_create_client
  name: Create Client
  description: |
    Create a new client in FreshBooks with contact information. Returns the created client with their unique ID and account details.
  provider: freshbooks
  endpoint: /users/business/{business_id}/clients
  method: POST
  scopes:
    - self
    - clients
  tags:
    - clients
    - create
  input_schema:
    type: object
    description: Client creation parameters
    properties:
      business_id:
        type: string
        description: "FreshBooks Business ID"
      email:
        type: string
        description: "Client email address"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      organization:
        type: string
        description: "Company/organization name"
      phone:
        type: string
        description: "Phone number"
      billing_address:
        type: object
        description: "Billing address object"
    required:
      - business_id

- slug: freshbooks_list_invoices
  name: List freshbooks Invoices
  description: |
    List all invoices in the FreshBooks account with optional pagination and status filtering. Returns invoice IDs, numbers, client names, dates, and totals.
  provider: freshbooks
  endpoint: /users/business/{business_id}/invoices
  method: GET
  scopes:
    - self
    - invoices
  tags:
    - invoices
    - accounting
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      business_id:
        type: string
        description: "FreshBooks Business ID"
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
      per_page:
        type: integer
        description: "Results per page (max 100)"
        default: 25
      status:
        type: string
        description: "Filter by status: draft, sent, viewed, paid, overdue"
    required:
      - business_id

- slug: freshbooks_get_invoice
  name: Get freshbooks Invoice
  description: |
    Retrieve detailed information about a specific FreshBooks invoice including invoice number, line items, totals, taxes, client information, and payment status.
  provider: freshbooks
  endpoint: /users/business/{business_id}/invoices/{invoice_id}
  method: GET
  scopes:
    - self
    - invoices
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      business_id:
        type: string
        description: "FreshBooks Business ID"
      invoice_id:
        type: string
        description: "Invoice ID"
    required:
      - business_id
      - invoice_id

- slug: freshbooks_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice in FreshBooks with client and line items. Returns the created invoice with its unique ID and invoice number.
  provider: freshbooks
  endpoint: /users/business/{business_id}/invoices
  method: POST
  scopes:
    - self
    - invoices
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Invoice creation parameters
    properties:
      business_id:
        type: string
        description: "FreshBooks Business ID"
      client_id:
        type: string
        description: "Client ID"
      lines:
        type: array
        description: "Array of line item objects"
      invoice_number:
        type: string
        description: "Invoice number"
      date:
        type: string
        description: "Invoice date (YYYY-MM-DD)"
      due_date:
        type: string
        description: "Due date (YYYY-MM-DD)"
      notes:
        type: string
        description: "Invoice notes"
    required:
      - business_id
      - client_id
      - lines

