# Splitwise Tools - Allowlist
# Curated subset of Splitwise API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_user                                 - Get current user
# 2. list_friends                             - List all friends
# 3. list_expenses                            - List all expenses
# 4. create_expense                           - Create an expense
# 5. list_groups                              - List all groups
# 6. get_group                                - Get group details
# 7. list_comments                            - List comments on expense
# 8. create_comment                           - Add comment to expense
# 9. list_currencies                          - List supported currencies
# 10. get_balances                             - Get user balances

- slug: get_user
  name: Get splitwise User
  description: |
    Get the current authenticated user's profile in Splitwise. Returns user ID, email, name, and default currency settings.
  provider: splitwise
  endpoint: /api/v3/get_user
  method: GET
  scopes: []
  tags:
    - user
    - profile
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_friends
  name: List Friends
  description: |
    List all friends in the Splitwise account. Returns friend names, email addresses, and balance information.
  provider: splitwise
  endpoint: /api/v3/get_friends
  method: GET
  scopes: []
  tags:
    - friends
    - social
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_expenses
  name: List splitwise Expenses
  description: |
    List all expenses in the Splitwise account. Returns expense descriptions, amounts, payers, and group associations.
  provider: splitwise
  endpoint: /api/v3/get_expenses
  method: GET
  scopes: []
  tags:
    - expenses
    - split
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_expense
  name: Create Expense
  description: |
    Create a new expense in Splitwise. Sets the expense amount, description, payer, and group membership for splitting.
  provider: splitwise
  endpoint: /api/v3/create_expense
  method: POST
  scopes: []
  tags:
    - expenses
    - split
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_groups
