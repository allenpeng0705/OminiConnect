- slug: oracle_list_customers
  name: List Customers
  description: |
    Retrieve a list of all customers in the Oracle ERP system.
    Returns customer names, IDs, contact information, and account status for each customer.
    Use this to discover customers and manage customer relationships.
  provider: oracle
  endpoint: /crm/v4/customers
  method: GET
  scopes:
    - crm.customer.read
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for listing customers
    properties:
      limit:
        type: integer
        description: "Maximum number of customers to return (default 50, max 200)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      search:
        type: string
        description: "Search term to filter customers by name or email"
    required: []

- slug: oracle_get_customer
  name: Get Customer
  description: |
    Retrieve detailed information for a specific customer by ID including contact details and account history.
    Returns the complete customer data with all associated information.
    This provides full customer data for relationship management and support.
  provider: oracle
  endpoint: /crm/v4/customers/{customer_id}
  method: GET
  scopes:
    - crm.customer.read
  tags:
    - customers
  input_schema:
    type: object
    description: Parameters for getting a customer
    properties:
      customer_id:
        type: string
        description: "Unique identifier of the customer"
    required:
      - customer_id

- slug: oracle_list_orders
  name: List Orders
  description: |
    Retrieve a list of all orders in the Oracle ERP system with filtering by status and customer.
    Returns order IDs, dates, statuses, and total amounts for each order.
    Use this to discover orders and track fulfillment progress.
  provider: oracle
  endpoint: /om/v4/orders
  method: GET
  scopes:
    - om.order.read
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Maximum number of orders to return (default 50, max 200)"
      offset:
        type: integer
        description: "Number of records to skip for pagination"
      status:
        type: string
        description: "Filter orders by status (e.g., OPEN, PROCESSING, SHIPPED, DELIVERED)"
      customer_id:
        type: string
        description: "Filter orders by customer ID"
    required: []

- slug: oracle_get_order
  name: Get Order
  description: |
    Retrieve detailed information for a specific order by ID including line items and shipping details.
    Returns the complete order data with all associated information.
    This provides full order data for fulfillment and customer service.
  provider: oracle
  endpoint: /om/v4/orders/{order_id}
  method: GET
  scopes:
    - om.order.read
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      order_id:
        type: string
        description: "Unique identifier of the order"
    required:
      - order_id

- slug: oracle_create_order
  name: Create Order
  description: |
    Create a new order in the Oracle ERP system with customer and line item information.
    Returns the created order with its unique ID and confirmation.
    This provisions a new order for fulfillment processing.
  provider: oracle
  endpoint: /om/v4/orders
  method: POST
  scopes:
    - om.order.write
  tags:
    - orders
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      customer_id:
        type: string
        description: "ID of the customer placing the order"
      line_items:
        type: array
        description: "Array of order line items"
        items:
          type: object
          properties:
            product_id:
              type: string
            quantity:
              type: integer
            unit_price:
              type: number
      notes:
        type: string
        description: "Optional notes for the order"
    required:
      - customer_id
      - line_items

