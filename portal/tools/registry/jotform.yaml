# Jotform Tools - Allowlist
# Curated subset of Jotform API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jotform_list_forms         - List forms
# 2. jotform_get_form           - Get form details
# 3. jotform_list_submissions   - List form submissions
# 4. jotform_get_submission     - Get submission details
# 5. jotform_create_form        - Create a form
# 6. jotform_list_users        - List users
# 7. jotform_list_questions    - List form questions
# 8. jotform_list_reports      - List reports
# 9. jotform_get_report        - Get report details
# 10. jotform_list_subusers    - List subusers

- slug: jotform_list_forms
  name: List Forms
  description: |
    List all forms in Jotform. Returns form titles, creation dates, and submission counts.
  provider: jotform
  endpoint: /user/forms
  method: GET
  scopes: []
  tags:
    - forms
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing forms
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: jotform_get_form
  name: Get Form
  description: |
    Retrieve details about a specific form by its ID. Includes form structure, settings, and configuration.
  provider: jotform
  endpoint: /form/{form_id}
  method: GET
  scopes: []
  tags:
    - forms
    - read
  input_schema:
    type: object
    description: Parameters for getting a form
    properties:
      form_id:
        type: string
        description: "Form ID"
    required:
      - form_id

- slug: jotform_list_submissions
  name: List Submissions
  description: |
    List all submissions for a specific Jotform form. Returns submission data and timestamps.
  provider: jotform
  endpoint: /form/{form_id}/submissions
  method: GET
  scopes: []
  tags:
    - submissions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing submissions
    properties:
      form_id:
        type: string
        description: "Form ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required:
      - form_id

- slug: jotform_get_submission
  name: Get Submission
  description: |
    Retrieve details about a specific form submission by its ID. Includes all submitted field values and metadata.
  provider: jotform
  endpoint: /submission/{submission_id}
  method: GET
  scopes: []
  tags:
    - submissions
    - read
  input_schema:
    type: object
    description: Parameters for getting a submission
    properties:
      submission_id:
        type: string
        description: "Submission ID"
    required:
      - submission_id

- slug: jotform_create_form
  name: Create Form
  description: |
    Create a new form in Jotform. Specify the form title and define form fields using the form fields JSON structure.
  provider: jotform
  endpoint: /user/forms
  method: POST
  scopes: []
  tags:
    - forms
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a form
    properties:
      title:
        type: string
        description: "Form title"
      form_fields:
        type: object
        description: "Form fields JSON"
    required:
      - title

- slug: jotform_list_users
  name: List jotform Users
  description: |
    Get the authenticated Jotform user account details. Returns username, email, and account settings.
  provider: jotform
  endpoint: /user
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing user info
    properties: {}
    required: []

- slug: jotform_list_questions
  name: List Questions
  description: |
    List all questions (form fields) for a specific Jotform form. Returns question text, type, and order.
  provider: jotform
  endpoint: /form/{form_id}/questions
  method: GET
  scopes: []
  tags:
    - questions
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing questions
    properties:
      form_id:
        type: string
        description: "Form ID"
    required:
      - form_id

- slug: jotform_list_reports
  name: List Reports
  description: |
    List all reports generated from Jotform forms. Returns report names, types, and associated forms.
  provider: jotform
  endpoint: /user/reports
  method: GET
  scopes: []
  tags:
