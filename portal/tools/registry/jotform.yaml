- slug: jotform_get_report
  name: Get Report
  description: |
    Retrieve details about a specific report by its ID. Includes report configuration and data summary.
  provider: jotform
  endpoint: /report/{report_id}
  method: GET
  scopes: []
  tags:
    - reports
    - read
  input_schema:
    type: object
    description: Parameters for getting a report
    properties:
      report_id:
        type: string
        description: "Report ID"
    required:
