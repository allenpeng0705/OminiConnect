- slug: trello_more_list_boards
  name: List Boards
  description: |
    Retrieve a list of all boards accessible to the authenticated user including names, descriptions, and member counts.
    Returns board data for project organization and team collaboration.
  provider: trello_more
  endpoint: /members/me/boards
  method: GET
  scopes:
    - read
  tags:
    - boards
  input_schema:
    type: object
    description: Parameters for listing boards
    properties: {}
    required: []

- slug: trello_more_get_board
  name: Get Board
  description: |
    Get details for a specific board by ID including name, description, and member information for project access.
    Returns board data for task management and team coordination.
  provider: trello_more
  endpoint: /boards/{board_id}
  method: GET
  scopes:
    - read
  tags:
    - boards
  input_schema:
    type: object
    description: Parameters for getting a board
    properties:
      board_id:
        type: string
        description: "The unique identifier of the board"
    required:
      - board_id

- slug: trello_more_create_board
  name: Create Board
  description: |
    Create a new board with the given name, description, and settings for team collaboration.
    Returns the created board with ID for list and card management.
  provider: trello_more
  endpoint: /boards
  method: POST
  scopes:
    - write
  tags:
    - boards
  input_schema:
    type: object
    description: Parameters for creating a board
    properties:
      name:
        type: string
        description: "Name of the board"
      description:
        type: string
        description: "Optional description for the board"
    required:
      - name

- slug: trello_more_list_lists
  name: List Lists
  description: |
    Retrieve all lists on a specific board including names, positions, and card counts for workflow organization.
    Returns list data for project tracking and sprint planning.
  provider: trello_more
  endpoint: /boards/{board_id}/lists
  method: GET
  scopes:
    - read
  tags:
    - lists
  input_schema:
    type: object
    description: Parameters for listing lists
    properties:
      board_id:
        type: string
        description: "The board ID to list lists from"
    required:
      - board_id

- slug: trello_more_get_list
  name: Get List
  description: |
    Get details for a specific list by ID including name, position, and associated cards for workflow management.
    Returns list data for task organization and status tracking.
  provider: trello_more
  endpoint: /lists/{list_id}
  method: GET
  scopes:
    - read
  tags:
    - lists
  input_schema:
    type: object
    description: Parameters for getting a list
    properties:
      list_id:
        type: string
        description: "The unique identifier of the list"
    required:
      - list_id

- slug: trello_more_create_list
  name: Create List
  description: |
    Create a new list on a board with a specified name for workflow organization and project tracking.
    Returns the created list with ID for card management and team coordination.
  provider: trello_more
  endpoint: /boards/{board_id}/lists
  method: POST
  scopes:
    - write
  tags:
    - lists
  input_schema:
    type: object
    description: Parameters for creating a list
    properties:
      board_id:
        type: string
        description: "The board ID to create the list on"
      name:
        type: string
        description: "Name of the list"
    required:
      - board_id
      - name

- slug: trello_more_list_cards
  name: List trello_more Cards
  description: |
    Retrieve all cards on a board or list including names, descriptions, assignees, and due dates for task tracking.
    Returns card data for project management and team coordination.
  provider: trello_more
  endpoint: /boards/{board_id}/cards
  method: GET
  scopes:
    - read
  tags:
    - cards
  input_schema:
    type: object
    description: Parameters for listing cards
    properties:
      board_id:
        type: string
        description: "The board ID to list cards from"
    required:
      - board_id

- slug: trello_more_get_card
  name: Get trello_more Card
  description: |
    Get details for a specific card by ID including name, description, assignees, labels, and activity for task review.
    Returns card data for progress tracking and collaboration.
  provider: trello_more
  endpoint: /cards/{card_id}
  method: GET
  scopes:
    - read
  tags:
    - cards
  input_schema:
    type: object
    description: Parameters for getting a card
    properties:
      card_id:
        type: string
        description: "The unique identifier of the card"
    required:
      - card_id

- slug: trello_more_create_card
  name: Create Card
  description: |
    Create a new card in a list with name, description, and optional metadata for task creation and assignment.
    Returns the created card with ID for tracking and workflow automation.
  provider: trello_more
  endpoint: /cards
  method: POST
  scopes:
    - write
  tags:
    - cards
  input_schema:
    type: object
    description: Parameters for creating a card
    properties:
      name:
        type: string
        description: "Name of the card"
      id_list:
        type: string
        description: "The list ID to add the card to"
      desc:
        type: string
        description: "Optional description for the card"
    required:
      - name
      - id_list

- slug: trello_more_get_board_actions
  name: Get Board Actions
  description: |
    Retrieve recent actions performed on a board including card movements, comments, and member activities for audit tracking.
    Returns action data for project monitoring and team accountability.
  provider: trello_more
  endpoint: /boards/{board_id}/actions
  method: GET
  scopes:
    - read
  tags:
    - actions
  input_schema:
    type: object
    description: Parameters for getting board actions
    properties:
      board_id:
        type: string
        description: "The board ID to get actions from"
      filter:
        type: string
        description: "Optional filter for action types"
    required:
      - board_id
