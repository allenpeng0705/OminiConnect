# Zapier NLA Tools - Allowlist
# Curated subset of Zapier NLA API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zapier_list_zaps           - List all Zaps
# # 2. zapier_get_zap           - Get Zap details
# # 3. zapier_trigger_zap           - Trigger a Zap
# # 4. zapier_list_actions           - List available actions
# # 5. zapier_perform_action           - Perform an action
# # 6. zapier_list_searches           - List available searches
# # 7. zapier_perform_search           - Perform a search
# # 8. zapier_list_history           - List Zap run history
# # 9. zapier_get_run           - Get Zap run details
# # 10. zapier_get_me           - Get user info

- slug: zapier_list_zaps
  name: List Zaps
  description: |
    List all Zaps
  provider: zapier-nla
  endpoint: /zaps
  method: GET
  scopes:
    - read
  tags:
    - zapier-nla
  input_schema:
    type: object
    description: Parameters for list zaps
    properties: {}
    required: []

- slug: zapier_get_zap
  name: Get Zap
  description: |
