- slug: alibaba_get_oss_bucket
  name: Get OSS Bucket
  description: |
    Get details and list objects in an OSS bucket.
  provider: alibaba
  endpoint: /oss/v1/buckets/{bucket_name}
  method: GET
  scopes:
    - oss
  tags:
    - oss
