        type: integer
        description: "Maximum number of objects to return (max 1000)."
      marker:
        type: string
        description: "Object name to start listing from for pagination."
    required:
      - bucket_name
      - region_id

- slug: alibaba_send_sms
  name: Send SMS
  description: |
    Send an SMS message using Alibaba Cloud DirectMail with phone numbers and template.
  provider: alibaba
  endpoint: /dysms/v1/regions/{region_id}/sms
  method: POST
  scopes:
    - sms
  tags:
    - sms
    - messaging
    - communications
  input_schema:
    type: object
    description: Parameters for sending SMS
    properties:
      region_id:
        type: string
        description: "Alibaba Cloud region ID."
      phone_numbers:
        type: string
        description: "Recipient phone number(s), comma-separated for multiple."
      sign_name:
        type: string
        description: "SMS signature name (approved by Alibaba Cloud)."
      template_code:
        type: string
        description: "SMS template code."
      template_param:
        type: string
        description: "JSON string of template parameter key-value pairs."
    required:
      - region_id
      - phone_numbers
      - sign_name
      - template_code
