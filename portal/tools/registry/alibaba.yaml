
- slug: alibaba_list_ecs_instances
  name: List ECS Instances
  description: |
    List Elastic Compute Service (ECS) instances in Alibaba Cloud with optional status and region filters.
  provider: alibaba
  endpoint: /ecs/v1/instances
  method: GET
  scopes:
    - ecs
  tags:
    - ecs
    - compute
    - cloud
  input_schema:
    type: object
    description: Parameters for listing ECS instances
    properties:
      region_id:
        type: string
        description: "Alibaba Cloud region ID (e.g., cn-hangzhou, us-west-1)."
      status:
        type: string
        description: "Instance status: Running, Stopped, etc."
      page_size:
        type: integer
        description: "Number of instances per page (max 100)."
      page_number:
        type: integer
        description: "Page number for pagination."
    required:
      - region_id

- slug: alibaba_get_ecs_instance
  name: Get ECS Instance
  description: |
    Get detailed information about a specific ECS instance by ID.
  provider: alibaba
  endpoint: /ecs/v1/instances/{instance_id}
  method: GET
  scopes:
    - ecs
  tags:
    - ecs
    - compute
    - cloud
  input_schema:
    type: object
    description: Parameters for getting ECS instance details
    properties:
      instance_id:
        type: string
        description: "The ECS instance ID."
      region_id:
        type: string
        description: "Alibaba Cloud region ID."
    required:
      - instance_id
      - region_id

- slug: alibaba_create_ecs_instance
  name: Create ECS Instance
  description: |
    Create a new Elastic Compute Service (ECS) instance in Alibaba Cloud with image, type, and network settings.
  provider: alibaba
  endpoint: /ecs/v1/instances
  method: POST
  scopes:
    - ecs
  tags:
    - ecs
    - compute
    - cloud
  input_schema:
    type: object
    description: Parameters for creating an ECS instance
    properties:
      region_id:
        type: string
        description: "Alibaba Cloud region ID."
      image_id:
        type: string
        description: "OS image ID to use for the instance."
      instance_type:
        type: string
        description: "Instance type (e.g., ecs.n4.small)."
      security_group_id:
        type: string
        description: "Security group ID to attach."
      vswitch_id:
        type: string
        description: "VSwitch ID for VPC network."
      instance_name:
        type: string
        description: "Display name for the instance."
    required:
      - region_id
      - image_id
      - instance_type

