# Fellow Tools - Allowlist
# Curated subset of Fellow API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fellow_get_user             - Get current user
# 2. fellow_list_meetings        - List meetings
# 3. fellow_get_meeting          - Get meeting details
# 4. fellow_list_notes           - List notes
# 5. fellow_get_note             - Get note details
# 6. fellow_list_agenda_items    - List agenda items
# 7. fellow_list_actions         - List action items
# 8. fellow_get_action           - Get action item details
# 9. fellow_list_reflections     - List reflections
# 10. fellow_get_workspace      - Get workspace info

- slug: fellow_get_user
  name: Get User
  description: |
    Retrieve the authenticated user's Fellow profile including name, email, avatar URL, workspace role, and notification preferences.
  provider: fellow
  endpoint: /v1/me
  method: GET
  scopes: []
  tags:
    - user
    - profile
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: fellow_list_meetings
  name: List Meetings
  description: |
    List all meetings in the Fellow workspace with titles, dates, times, participant counts, and meeting status for each scheduled meeting.
  provider: fellow
  endpoint: /v1/meetings
  method: GET
  scopes: []
  tags:
    - meetings
    - productivity
    - read
  input_schema:
    type: object
    description: Parameters for listing meetings
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fellow_get_meeting
  name: Get Meeting
  description: |
    Retrieve detailed information about a specific Fellow meeting including agenda items, notes, action items, participants, and meeting location.
  provider: fellow
  endpoint: /v1/meetings/{id}
  method: GET
  scopes: []
  tags:
    - meetings
    - productivity
    - read
  input_schema:
    type: object
    description: Parameters for getting meeting
    properties:
      id:
        type: string
        description: "Meeting ID"
    required:
      - id

- slug: fellow_list_notes
  name: List Notes
  description: |
    List all notes in the Fellow workspace with optional filtering by meeting. Returns note titles, content previews, timestamps, and author names.
  provider: fellow
  endpoint: /v1/notes
  method: GET
  scopes: []
  tags:
    - notes
    - productivity
    - read
  input_schema:
    type: object
    description: Parameters for listing notes
    properties:
      meeting_id:
        type: string
        description: "Filter by meeting ID"
    required: []

- slug: fellow_get_note
  name: Get Note
  description: |
    Retrieve detailed information about a specific Fellow note including full content, author, creation timestamp, and associated meeting details.
  provider: fellow
  endpoint: /v1/notes/{id}
  method: GET
  scopes: []
  tags:
    - notes
    - productivity
    - read
  input_schema:
    type: object
    description: Parameters for getting note
    properties:
      id:
        type: string
        description: "Note ID"
    required:
      - id

- slug: fellow_list_agenda_items
  name: List Agenda Items
  description: |
    List all agenda items for a specific Fellow meeting with titles, descriptions, allotted time, speaker assignments, and completion status.
  provider: fellow
  endpoint: /v1/meetings/{meetingId}/agenda_items
  method: GET
  scopes: []
  tags:
    - agenda
    - meetings
    - read
  input_schema:
    type: object
    description: Parameters for listing agenda items
    properties:
      meetingId:
        type: string
        description: "Meeting ID"
    required:
      - meetingId

- slug: fellow_list_actions
  name: List Actions
  description: |
    List all action items in Fellow with optional filtering by meeting. Returns action descriptions, assignee names, due dates, and completion status.
  provider: fellow
  endpoint: /v1/action_items
  method: GET
  scopes: []
  tags:
    - actions
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for listing actions
    properties:
      meeting_id:
        type: string
        description: "Filter by meeting ID"
    required: []

- slug: fellow_get_action
  name: Get Action
  description: |
    Retrieve detailed information about a specific Fellow action item including description, assignee, due date, status, and associated meeting.
  provider: fellow
  endpoint: /v1/action_items/{id}
  method: GET
  scopes: []
  tags:
    - actions
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for getting action
    properties:
      id:
        type: string
        description: "Action item ID"
    required:
      - id

- slug: fellow_list_reflections
  name: List Reflections
  description: |
    List all reflections in the Fellow workspace with content, author names, timestamps, meeting associations, and reflection categories.
  provider: fellow
  endpoint: /v1/reflections
  method: GET
  scopes: []
  tags:
    - reflections
    - productivity
    - read
  input_schema:
    type: object
    description: Parameters for listing reflections
    properties: {}
    required: []

- slug: fellow_get_workspace
  name: Get Workspace
  description: |
    Retrieve workspace information for Fellow including workspace name, settings, member count, subscription status, and configured integrations.
  provider: fellow
  endpoint: /v1/workspace
  method: GET
  scopes: []
  tags:
    - workspace
    - organization
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []
