# Unauthenticated Tools - Allowlist
# Curated subset of Unauthenticated API for AI agent use.
# No authentication.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. unauthenticated_health_check           - Check service health
# # 2. unauthenticated_get_info           - Get service information
# # 3. unauthenticated_list_public           - List public data
# # 4. unauthenticated_get_public           - Get public data by ID
# # 5. unauthenticated_search           - Search public data
# # 6. unauthenticated_list_resources           - List available resources
# # 7. unauthenticated_get_resource           - Get a specific resource
# # 8. unauthenticated_list_tags           - List available tags
# # 9. unauthenticated_get_status           - Get service status
# # 10. unauthenticated_list_versions           - List API versions

