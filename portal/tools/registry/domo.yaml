- slug: domo_list_datasets
  name: List Datasets
  description: |
    List all datasets in your Domo instance. Returns dataset names, IDs, schemas, and last modified timestamps for each dataset.
  provider: domo
  endpoint: /v1/datasets
  method: GET
  scopes:
    - read
  tags:
    - datasets
  input_schema:
    type: object
    description: Parameters for listing datasets
    properties:
      limit:
        type: integer
        description: "Maximum number of datasets to return"
        default: 50
      offset:
        type: integer
        description: "Offset for pagination"
      sort:
        type: string
        description: "Sort field"
      ascending:
        type: boolean
        description: "Sort in ascending order"

- slug: domo_get_dataset
  name: Get Dataset
  description: |
    Get detailed metadata about a specific Domo dataset including its schema definition, row count, and data types for each column.
  provider: domo
  endpoint: /v1/datasets/{id}
  method: GET
  scopes:
    - read
  tags:
    - datasets
  input_schema:
    type: object
    description: Parameters for getting a dataset
    properties:
      id:
        type: string
        description: "The dataset ID"
    required:
      - id

- slug: domo_create_dataset
  name: Create Dataset
  description: |
    Create a new empty dataset in Domo with a specified schema and column definitions. Returns the created dataset ID and metadata.
  provider: domo
  endpoint: /v1/datasets
  method: POST
  scopes:
    - write
  tags:
    - datasets
  input_schema:
    type: object
    description: Parameters for creating a dataset
    properties:
      name:
        type: string
        description: "Dataset name"
      description:
        type: string
        description: "Dataset description"
      schema:
        type: object
        description: "Column definitions"
      rows:
        type: integer
        description: "Initial number of rows"
    required:
      - name

