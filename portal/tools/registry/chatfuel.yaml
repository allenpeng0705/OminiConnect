- slug: chatfuel_list_flows
  name: List Flows
  description: |
    Retrieve all chatbot conversation flows with pagination support. Returns flow names, IDs, trigger types, and block configuration counts.
  provider: chatfuel
  endpoint: /flows
  method: GET
  scopes:
    - flows_read
  tags:
    - flows
    - read
  input_schema:
    type: object
    description: Parameters for listing flows
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page (max 100)"
        default: 20
    required: []

- slug: chatfuel_get_flow
  name: Get Flow
  description: |
    Retrieve detailed information about a specific flow by its unique ID. Returns the flow name, blocks, elements, and trigger configuration.
  provider: chatfuel
  endpoint: /flows/{flow_id}
  method: GET
  scopes:
    - flows_read
  tags:
    - flows
    - read
  input_schema:
    type: object
    description: Parameters for getting a flow
    properties:
      flow_id:
        type: string
        description: "Flow ID (path parameter)"
    required:
      - flow_id

- slug: chatfuel_create_flow
  name: Create Flow
  description: |
    Create a new chatbot conversation flow with trigger settings and message blocks. Returns the created flow with its unique ID.
  provider: chatfuel
  endpoint: /flows
  method: POST
  scopes:
    - flows_write
  tags:
    - flows
    - create
  input_schema:
    type: object
    description: Parameters for creating a flow
    properties:
      name:
        type: string
        description: "Flow name (required)"
      description:
        type: string
        description: "Flow description"
      trigger:
        type: string
        description: "Trigger type: keyword, exact, contains, regex"
        enum: [keyword, exact, contains, regex]
      trigger_value:
        type: string
        description: "Trigger value/keyword"
    required:
      - name

- slug: chatfuel_list_subscribers
  name: List Subscribers
  description: |
    Retrieve all users who have interacted with the chatbot with pagination support. Returns subscriber names, IDs, status, and attribute information.
  provider: chatfuel
  endpoint: /subscribers
  method: GET
  scopes:
    - subscribers_read
  tags:
    - subscribers
    - read
  input_schema:
    type: object
    description: Parameters for listing subscribers
    properties:
      status:
        type: string
        description: "Filter by status: active, unsubscribed, all"
        enum: [active, unsubscribed, all]
        default: all
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: chatfuel_get_subscriber
  name: Get Subscriber
  description: |
    Retrieve detailed information about a specific subscriber by their unique ID. Returns the subscriber attributes, tags, and conversation history.
  provider: chatfuel
  endpoint: /subscribers/{subscriber_id}
  method: GET
  scopes:
    - subscribers_read
  tags:
    - subscribers
    - read
  input_schema:
    type: object
    description: Parameters for getting a subscriber
    properties:
      subscriber_id:
        type: string
        description: "Subscriber ID (path parameter)"
    required:
      - subscriber_id

- slug: chatfuel_update_subscriber_attribute
  name: Update Subscriber Attribute
  description: |
    Modify a subscriber's custom attributes or tags for segmentation and personalization. Returns the updated subscriber information.
  provider: chatfuel
  endpoint: /subscribers/{subscriber_id}/attributes
  method: PUT
  scopes:
    - subscribers_write
  tags:
    - subscribers
    - update
  input_schema:
    type: object
    description: Parameters for updating subscriber attributes
    properties:
      subscriber_id:
        type: string
        description: "Subscriber ID (path parameter)"
      attributes:
        type: object
        description: "Key-value pairs of attributes to update"
      tags:
        type: array
        items:
          type: string
        description: "Tags to add or update"
    required:
      - subscriber_id

- slug: chatfuel_create_broadcast
  name: Create Broadcast
  description: |
    Create a broadcast message to send to specific subscribers or segments immediately or on a schedule. Returns the created broadcast with its unique ID.
  provider: chatfuel
  endpoint: /broadcasts
  method: POST
  scopes:
    - broadcasts_write
  tags:
    - broadcasts
    - create
  input_schema:
    type: object
    description: Parameters for creating a broadcast
    properties:
      name:
        type: string
        description: "Broadcast name (required)"
      message:
        type: object
        description: "Message content with type and content fields"
        properties:
          type:
            type: string
            description: "Message type: text, image, card"
          content:
            type: string
            description: "Message content"
      segment:
        type: object
        description: "Target segment definition"
        properties:
          type:
            type: string
            description: "Segment type: all, tag, attribute"
          value:
            type: string
            description: "Segment value"
      schedule:
        type: object
        description: "Scheduling options"
        properties:
          type:
            type: string
            description: "Send type: immediate, scheduled"
          send_at:
            type: string
            description: "ISO 8601 datetime for scheduled sends"
    required:
      - name
      - message

- slug: chatfuel_get_broadcast_stats
  name: Get Broadcast Stats
  description: |
    Retrieve delivery statistics for a specific broadcast by its unique ID. Returns sent, delivered, opened, and clicked counts.
  provider: chatfuel
  endpoint: /broadcasts/{broadcast_id}/stats
  method: GET
  scopes:
    - broadcasts_read
  tags:
    - broadcasts
    - read
  input_schema:
    type: object
    description: Parameters for getting broadcast stats
    properties:
      broadcast_id:
        type: string
        description: "Broadcast ID (path parameter)"
    required:
      - broadcast_id

- slug: chatfuel_list_attributes
  name: List Attributes
  description: |
    Retrieve all custom attributes configured for subscribers with pagination support. Returns attribute names, types, and default values.
  provider: chatfuel
  endpoint: /attributes
  method: GET
  scopes:
    - attributes_read
  tags:
    - attributes
    - read
  input_schema:
    type: object
    description: Parameters for listing attributes
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      limit:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: chatfuel_get_plugin_settings
  name: Get Plugin Settings
  description: |
    Retrieve configuration settings for a specific ChatFuel plugin by its ID. Returns the widget appearance, behavior settings, and integration options.
  provider: chatfuel
  endpoint: /plugins/{plugin_id}/settings
  method: GET
  scopes:
    - plugins_read
  tags:
    - plugins
    - read
  input_schema:
    type: object
    description: Parameters for getting plugin settings
    properties:
      plugin_id:
        type: string
        description: "Plugin ID (path parameter)"
    required:
      - plugin_id
