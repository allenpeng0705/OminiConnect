# Keeper SCIM Tools - Allowlist
# Curated subset of Keeper SCIM API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. keeper_scim_list_users      - List users
# 2. keeper_scim_get_user       - Get user details
# 3. keeper_scim_create_user    - Create a user
# 4. keeper_scim_update_user    - Update a user
# 5. keeper_scim_delete_user    - Delete a user
# 6. keeper_scim_list_groups    - List groups
# 7. keeper_scim_get_group      - Get group details
# 8. keeper_scim_create_group   - Create a group
# 9. keeper_scim_list_teams     - List teams
# 10. keeper_scim_get_team     - Get team details

- slug: keeper_scim_list_users
  name: List keeper-scim Users
  description: |
    List all users in Keeper via SCIM. Returns user names, email addresses, and account status.
  provider: keeper-scim
  endpoint: /Users
  method: GET
  scopes: []
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      filter:
        type: string
        description: "SCIM filter query"
    required: []

- slug: keeper_scim_get_user
  name: Get keeper-scim User
  description: |
    Retrieve details about a specific Keeper user by their ID. Includes email, name, and account status.
  provider: keeper-scim
  endpoint: /Users/{user_id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: keeper_scim_create_user
  name: Create keeper-scim User
  description: |
    Create a new user in Keeper via SCIM. Specify the username (email), name, and email address.
  provider: keeper-scim
  endpoint: /Users
  method: POST
  scopes: []
  tags:
    - users
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
      emails:
        type: array
        description: "Email addresses"
    required:
      - userName

- slug: keeper_scim_update_user
  name: Update keeper-scim User
  description: |
    Update an existing Keeper user via SCIM. Modify name, email, or other user attributes.
  provider: keeper-scim
  endpoint: /Users/{user_id}
  method: PUT
  scopes: []
  tags:
    - users
    - update
    - write
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      user_id:
        type: string
        description: "User ID"
      name:
        type: object
        description: "User name object"
    required:
      - user_id

- slug: keeper_scim_delete_user
  name: Delete User
  description: |
    Delete a user from Keeper via SCIM. This removes the user's access to Keeper password vault.
  provider: keeper-scim
  endpoint: /Users/{user_id}
  method: DELETE
  scopes: []
  tags:
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

