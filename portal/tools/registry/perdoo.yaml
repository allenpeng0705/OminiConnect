# Perdoo Tools - Allowlist
# Curated subset of Perdoo API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. perdoo_list_goals              - List goals
# 2. perdoo_get_goal                - Get goal details
# 3. perdoo_list_key_results        - List key results
# 4. perdoo_get_key_result         - Get key result details
# 5. perdoo_list_projects           - List projects
# 6. perdoo_get_project            - Get project details
# 7. perdoo_list_tasks             - List tasks
# 8. perdoo_get_task               - Get task details
# 9. perdoo_list_users             - List team members
# 10. perdoo_get_user              - Get user details

- slug: perdoo_list_goals
  name: List Goals
  description: |
    List all goals in the organization, including their titles, owners, progress metrics, and current status values.
  provider: perdoo
  endpoint: /goals
  method: GET
  scopes: []
  tags:
    - goals
    - okrs
    - list
  input_schema:
    type: object
    description: Parameters for listing goals
    properties:
      status:
        type: string
        description: "Filter by status (active, completed)"
    required: []

- slug: perdoo_get_goal
  name: Get Goal
  description: |
    Retrieve detailed information about a specific goal, including its description, owner, progress metrics, and alignment with key results.
  provider: perdoo
  endpoint: /goals/{goalId}
  method: GET
  scopes: []
  tags:
    - goals
    - okrs
    - read
  input_schema:
    type: object
    description: Parameters for getting a goal
    properties:
      goalId:
        type: string
        description: "Goal ID"
    required:
      - goalId

- slug: perdoo_list_key_results
  name: List Key Results
  description: |
    List all key results in the organization, including their names, target values, current progress, and associated goal assignments.
  provider: perdoo
  endpoint: /key-results
