# Okta Tools - Allowlist
# Curated subset of Okta API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. okta_list_users                  - List users
# 2. okta_get_user                   - Get user details
# 3. okta_create_user                - Create user
# 4. okta_update_user                - Update user
# 5. okta_list_groups                - List groups
# 6. okta_get_group                  - Get group details
# 7. okta_list_applications          - List applications
# 8. okta_get_application            - Get application details
# 9. okta_list_factors               - List factors
# 10. okta_get_logs                  - Get system logs

- slug: okta_list_users
  name: List okta Users
  description: |
    List all users in the Okta identity management system. Returns user names, emails, status, and last login information for each user account in the system.
  provider: okta
  endpoint: /api/v1/users
  method: GET
  scopes:
    - okta.users:read
  tags:
    - iam
    - users
    - directory
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      filter:
        type: string
        description: "Filter expression"
      limit:
        type: integer
        description: "Number of users (default 100)"
        default: 100
    required: []

- slug: okta_get_user
  name: Get okta User
  description: |
    Get detailed information for a specific user in Okta including their profile, status, credentials, and group memberships. Returns the complete user object with all attributes.
  provider: okta
  endpoint: /api/v1/users/{userId}
  method: GET
  scopes:
    - okta.users:read
  tags:
    - iam
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID or email"
    required:
      - userId

- slug: okta_create_user
  name: Create okta User
  description: |
    Create a new user in Okta with profile and credential information. Returns the created user with their unique identifier and initial configuration.
  provider: okta
  endpoint: /api/v1/users
  method: POST
  scopes:
    - okta.users:manage
  tags:
    - iam
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      profile:
        type: object
        description: "User profile object"
      credentials:
        type: object
        description: "User credentials"
    required:
      - profile

- slug: okta_update_user
  name: Update okta User
  description: |
    Update an existing user in Okta with new profile information or credentials. Returns the updated user record with all modified attributes.
  provider: okta
  endpoint: /api/v1/users/{userId}
  method: PUT
  scopes:
    - okta.users:manage
  tags:
    - iam
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      userId:
        type: string
        description: "User ID or email"
      profile:
        type: object
        description: "User profile object"
    required:
      - userId

- slug: okta_list_groups
  name: List okta Groups
  description: |
    List all groups in Okta. Returns group names, descriptions, and member counts for each security or application group in the directory.
  provider: okta
  endpoint: /api/v1/groups
  method: GET
  scopes:
    - okta.groups:read
  tags:
    - iam
    - groups
    - directory
  input_schema:
    type: object
    description: Parameters for listing groups
    properties:
      limit:
        type: integer
        description: "Number of groups (default 100)"
        default: 100
    required: []

- slug: okta_get_group
  name: Get okta Group
  description: |
    Get detailed information for a specific group in Okta including its name, description, and list of member users. Returns the complete group object.
  provider: okta
  endpoint: /api/v1/groups/{groupId}
  method: GET
  scopes:
    - okta.groups:read
  tags:
    - iam
    - groups
    - read
  input_schema:
    type: object
    description: Parameters for getting a group
    properties:
      groupId:
        type: string
        description: "Group ID"
    required:
      - groupId

- slug: okta_list_applications
  name: List Applications
  description: |
    List all applications in Okta. Returns application names, types, statuses, and assigned users for each integrated application in the system.
  provider: okta
  endpoint: /api/v1/apps
  method: GET
  scopes:
    - okta.apps:read
  tags:
    - iam
    - applications
    - directory
  input_schema:
    type: object
    description: Parameters for listing applications
    properties:
      limit:
        type: integer
        description: "Number of apps (default 100)"
        default: 100
    required: []

- slug: okta_get_application
  name: Get Application
  description: |
    Get detailed information for a specific application in Okta including its configuration, sign-on settings, and assignment rules. Returns the complete application object.
  provider: okta
  endpoint: /api/v1/apps/{appName}/{appId}
  method: GET
  scopes:
    - okta.apps:read
  tags:
    - iam
    - applications
    - read
  input_schema:
    type: object
    description: Parameters for getting an application
    properties:
      appName:
        type: string
        description: "Application name"
      appId:
        type: string
        description: "Application ID"
    required:
      - appName
      - appId

- slug: okta_list_factors
  name: List Factors
  description: |
    List all authentication factors for a user in Okta including MFA methods, phone numbers, and security keys registered. Returns the factor types and verification status for each.
  provider: okta
  endpoint: /api/v1/users/{userId}/factors
  method: GET
  scopes:
    - okta.users:read
  tags:
    - iam
    - users
    - mfa
  input_schema:
    type: object
    description: Parameters for listing factors
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

- slug: okta_get_logs
  name: Get Logs
  description: |
    Get system logs from Okta for audit and security monitoring. Returns log events with timestamps, actors, and action details for the specified time period.
  provider: okta
  endpoint: /api/v1/logs
  method: GET
  scopes:
    - okta.logs:read
  tags:
    - iam
    - logs
    - audit
  input_schema:
    type: object
    description: Parameters for getting logs
    properties:
      since:
        type: string
        description: "Start time (ISO 8601)"
      until:
        type: string
        description: "End time (ISO 8601)"
      filter:
        type: string
        description: "Filter expression"
    required: []
