# Payfit Tools - Allowlist
# Curated subset of Payfit API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. payfit_list_employees        - List employees
# 2. payfit_get_employee          - Get employee details
# 3. payfit_list_payroll_runs     - List payroll runs
# 4. payfit_get_payroll_run       - Get payroll run details
# 5. payfit_list_time_off         - List time off requests
# 6. payfit_list_departments      - List departments
# 7. payfit_list_contracts       - List employment contracts
# 8. payfit_list_benefits         - List benefit plans
# 9. payfit_list_pay_conditions   - List pay conditions
# 10. payfit_get_company_info     - Get company information

- slug: payfit_list_employees
  name: List Employees
  description: |
    Retrieve all employees in the organization with their employment details, department assignments, and work locations.
    Returns employee profiles including contact information and employment status.
  provider: payfit
  endpoint: /employees
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      departmentId:
        type: string
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: payfit_get_employee
  name: Get Employee
  description: |
    Retrieve detailed information for a specific employee including their personal details, employment terms, and department.
    Returns the complete employee profile with compensation and benefits information.
  provider: payfit
  endpoint: /employees/{employeeId}
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

- slug: payfit_list_payroll_runs
  name: List Payroll Runs
  description: |
    Retrieve all payroll runs for the organization with their processing status, period dates, and total amounts.
    Returns payroll summary including worker counts and payment details.
  provider: payfit
  endpoint: /payroll/runs
  method: GET
  scopes: []
  tags:
    - payroll
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payroll runs
    properties:
      status:
        type: string
        description: "Filter by status"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: payfit_get_payroll_run
  name: Get Payroll Run
  description: |
    Retrieve detailed information for a specific payroll run including the period, amounts, and employee breakdown.
    Returns payroll run status and any associated payment records.
  provider: payfit
  endpoint: /payroll/runs/{runId}
  method: GET
  scopes: []
  tags:
    - payroll
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payroll run
    properties:
      runId:
        type: string
        description: "Payroll run ID"
    required:
      - runId

