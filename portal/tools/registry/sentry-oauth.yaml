# Sentry (Public Integrations) Tools - Allowlist
# Curated subset of Sentry (Public Integrations) API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_projects                            - List all Sentry projects
# 2. list_issues                              - List issues across projects
# 3. get_issue                                - Get details for a specific issue
# 4. list_events                              - List events for an issue
# 5. list_teams                               - List teams in organization
# 6. list_members                             - List organization members
# 7. list_releases                            - List releases
# 8. get_org_stats                            - Get organization statistics
# 9. list_projects_by_team                    - List projects for a team
# 10. get_event_counts                         - Get event count statistics

- slug: list_projects
  name: List sentry-oauth Projects
  description: |
    List all projects in the Sentry organization for error tracking configuration. Returns project names, slugs, platforms, and team assignments for monitoring setup.
  provider: sentry-oauth
  endpoint: /projects
  method: GET
  scopes: []
  tags:
    - projects
    - organization
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_issues
  name: List Issues
  description: |
    List all issues across Sentry projects with optional status filtering. Returns issue titles, IDs, error types, assignee information, and occurrence counts for bug triage.
  provider: sentry-oauth
  endpoint: /issues
  method: GET
  scopes: []
  tags:
    - issues
    - errors
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_issue
  name: Get Issue
  description: |
    Get detailed information about a specific Sentry issue by ID including stack traces, user reports, tags, and occurrence timestamps. Returns data for error debugging and investigation.
  provider: sentry-oauth
  endpoint: /issues/{id}
  method: GET
  scopes: []
  tags:
    - issues
    - errors
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_events
  name: List Events
  description: |
    List all events (error occurrences) for a Sentry issue with pagination. Returns event IDs, timestamps, device info, and operating system details for error monitoring.
  provider: sentry-oauth
  endpoint: /events
  method: GET
  scopes: []
  tags:
    - events
    - errors
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_teams
  name: List sentry-oauth Teams
  description: |
    List all teams in the Sentry organization for access control and project assignment. Returns team names, slugs, and member counts for organizational management.
  provider: sentry-oauth
  endpoint: /teams
  method: GET
  scopes: []
  tags:
    - teams
    - organization
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_members
  name: List Members
  description: |
    List all members in the Sentry organization with their roles and access levels. Returns member names, emails, and pending invitations for user management.
  provider: sentry-oauth
  endpoint: /members
  method: GET
  scopes: []
  tags:
    - members
    - organization
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_releases
  name: List Releases
  description: |
    List all releases in the Sentry organization for deployment tracking. Returns version numbers, commit SHAs, deployment dates, and associated projects for release management.
  provider: sentry-oauth
  endpoint: /releases
  method: GET
  scopes: []
  tags:
    - releases
    - deployments
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_org_stats
  name: Get Org Stats
  description: |
    Get organization statistics from Sentry including event counts by time period, error frequencies, and performance metrics. Returns data for overall health monitoring and reporting.
  provider: sentry-oauth
  endpoint: /stats
  method: GET
  scopes: []
  tags:
    - stats
    - analytics
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_projects_by_team
  name: List Projects By Team
  description: |
    List all projects associated with a specific Sentry team by team ID. Returns project names, slugs, and error counts for team project management.
  provider: sentry-oauth
  endpoint: /teams/{team_id}/projects
  method: GET
  scopes: []
  tags:
    - projects
    - teams
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_event_counts
  name: Get Event Counts
  description: |
    Get event count statistics for Sentry projects including resolved vs unresolved ratios and trend data over time. Returns data for error tracking performance monitoring.
  provider: sentry-oauth
  endpoint: /event-counts
  method: GET
  scopes: []
  tags:
    - stats
    - events
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

