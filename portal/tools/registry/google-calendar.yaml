# Google Calendar Tools - Allowlist
# Curated subset of Google Calendar API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_calendar_list_calendars    - List calendars
# 2. google_calendar_get_calendar     - Get calendar details
# 3. google_calendar_list_events      - List events
# 4. google_calendar_get_event        - Get event details
# 5. google_calendar_create_event      - Create event
# 6. google_calendar_update_event     - Update event
# 7. google_calendar_delete_event     - Delete event
# 8. google_calendar_list_acl          - List access controls
# 9. google_calendar_list_freebusy     - Get free/busy info
# 10. google_calendar_list_settings   - List calendar settings

- slug: google_calendar_list_calendars
  name: List Calendars
  description: |
    List all calendars available in the authenticated user's Google Calendar account. Returns calendar IDs, names, descriptions, and time zone settings for each calendar.
  provider: google-calendar
  endpoint: /calendar/v3/users/me/calendarList
  method: GET
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - list
  input_schema:
    type: object
    description: Parameters for listing calendars
    properties: {}

- slug: google_calendar_get_calendar
  name: Get Calendar
  description: |
    Get detailed information about a specific Google Calendar including its name, description, time zone, and access permissions.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - read
  input_schema:
    type: object
    description: Parameters for getting a calendar
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
    required:
      - calendarId

- slug: google_calendar_list_events
  name: List Events
  description: |
    List all events in a Google Calendar within a specified time range. Returns event IDs, titles, start/end times, locations, attendees, and conference details for each event.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}/events
  method: GET
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - events
    - list
  input_schema:
    type: object
    description: Parameters for listing events
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
        default: primary
      timeMin:
        type: string
        description: "Start time (ISO 8601)"
      timeMax:
        type: string
        description: "End time (ISO 8601)"
      maxResults:
        type: integer
        description: "Maximum results"
        default: 20
    required: []

- slug: google_calendar_get_event
  name: Get Event
  description: |
    Get detailed information about a specific calendar event including its title, description, start/end times, location, attendees, and conference data.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}/events/{eventId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - events
    - read
  input_schema:
    type: object
    description: Parameters for getting an event
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
        default: primary
      eventId:
        type: string
        description: "Event ID"
    required:
      - eventId

- slug: google_calendar_create_event
  name: Create Event
  description: |
    Create a new event in a Google Calendar with title, description, start/end times, and location. Returns the created event ID and conference details.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}/events
  method: POST
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - events
    - create
  input_schema:
    type: object
    description: Parameters for creating an event
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
        default: primary
      summary:
        type: string
        description: "Event title"
      description:
        type: string
        description: "Event description"
      start:
        type: string
        description: "Start time (ISO 8601)"
      end:
        type: string
        description: "End time (ISO 8601)"
      location:
        type: string
        description: "Location"
    required:
      - summary
      - start
      - end

- slug: google_calendar_update_event
  name: Update Event
  description: |
    Update an existing calendar event with new title, description, or timing information. Returns the updated event with modified field values.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}/events/{eventId}
  method: PUT
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - events
    - update
  input_schema:
    type: object
    description: Parameters for updating an event
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
        default: primary
      eventId:
        type: string
        description: "Event ID"
      summary:
        type: string
        description: "New title"
      description:
        type: string
        description: "New description"
    required:
      - eventId

- slug: google_calendar_delete_event
  name: Delete Event
  description: |
    Delete a specific event from a Google Calendar. Returns confirmation of successful deletion.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}/events/{eventId}
  method: DELETE
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - events
    - delete
  input_schema:
    type: object
    description: Parameters for deleting an event
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
        default: primary
      eventId:
        type: string
        description: "Event ID"
    required:
      - eventId

- slug: google_calendar_list_acl
  name: List ACL
  description: |
    List all access control rules for a Google Calendar. Returns rule IDs, principal emails, roles (reader, writer, owner), and scope types for each rule.
  provider: google-calendar
  endpoint: /calendar/v3/calendars/{calendarId}/acl
  method: GET
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - acl
    - list
  input_schema:
    type: object
    description: Parameters for listing ACL
    properties:
      calendarId:
        type: string
        description: "Calendar ID"
        default: primary
    required: []

- slug: google_calendar_list_freebusy
  name: List Free/Busy
  description: |
    Get free/busy information for multiple Google Calendars within a specified time range. Returns busy time slots for each calendar to help schedule meetings.
  provider: google-calendar
  endpoint: /calendar/v3/freeBusy
  method: POST
  scopes:
    - https://www.googleapis.com/auth/calendar
  tags:
    - calendar
    - freebusy
  input_schema:
    type: object
    description: Parameters for free/busy query
    properties:
      timeMin:
        type: string
        description: "Start time (ISO 8601)"
      timeMax:
        type: string
        description: "End time (ISO 8601)"
      items:
        type: array
        description: "Calendar IDs to check"
    required:
      - timeMin
      - timeMax
      - items

- slug: google_calendar_list_settings
  name: List Settings
  description: |
    List all user settings for Google Calendar including default calendar, notification preferences, time zone, and view options.
  provider: google-calendar
  endpoint: /calendar/v3/users/me/settings
  method: GET
  scopes:
    - https://www.googleapis.com/auth/calendar.readonly
  tags:
    - calendar
    - settings
    - list
  input_schema:
    type: object
    description: Parameters for listing settings
    properties: {}
