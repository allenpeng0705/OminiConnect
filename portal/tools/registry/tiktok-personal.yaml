# TikTok Personal Tools - Allowlist
# Curated subset of TikTok Personal API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tiktok_get_user_info           - Get basic user information
# # 2. tiktok_list_videos           - List user videos
# # 3. tiktok_get_video           - Get video details
# # 4. tiktok_create_video           - Upload a video
# # 5. tiktok_list_comments           - List comments on a video
# # 6. tiktok_post_comment           - Post a comment on a video
# # 7. tiktok_like_video           - Like a video
# # 8. tiktok_list_followers           - List user followers
# # 9. tiktok_list_followings           - List users being followed
# # 10. tiktok_search_content           - Search for content

- slug: tiktok_get_user_info
  name: Get User Info
  description: |
    Get basic user information
  provider: tiktok-personal
  endpoint: /v2/user/info/
  method: GET
  scopes:
    - user.info.basic
  tags:
    - tiktok-personal
  input_schema:
    type: object
    description: Parameters for get user info
    properties: {}
    required: []

