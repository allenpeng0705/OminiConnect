- slug: fanvue_get_chat
  name: Get Chat
  description: |
    Retrieve detailed information about a specific Fanvue chat conversation including all messages, participant information, and chat settings.
  provider: fanvue
  endpoint: /api/v1/chats/{id}
  method: GET
  scopes: []
  tags:
    - chats
    - messaging
    - read
  input_schema:
    type: object
    description: Parameters for getting chat
    properties:
      id:
        type: string
        description: "Chat ID"
    required:
      - id

- slug: fanvue_get_stats
  name: Get Stats
  description: |
    Retrieve account statistics for the Fanvue creator including subscriber count, total posts, views, earnings summary, and engagement trends.
  provider: fanvue
  endpoint: /api/v1/stats
  method: GET
  scopes: []
  tags:
    - stats
    - analytics
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []
