# Fanvue Tools - Allowlist
# Curated subset of Fanvue API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. fanvue_get_user            - Get current user
# 2. fanvue_list_posts         - List posts
# 3. fanvue_get_post          - Get post details
# 4. fanvue_list_messages     - List messages
# 5. fanvue_send_message      - Send a message
# 6. fanvue_list_subscribers  - List subscribers
# 7. fanvue_get_subscriber    - Get subscriber details
# 8. fanvue_list_chats        - List chat conversations
# 9. fanvue_get_chat          - Get chat details
# 10. fanvue_get_stats       - Get account stats

- slug: fanvue_get_user
  name: Get fanvue User
  description: |
    Retrieve the authenticated Fanvue creator profile including username, display name, bio, profile image, and account settings.
  provider: fanvue
  endpoint: /api/v1/me
  method: GET
  scopes: []
  tags:
    - user
    - profile
    - read
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: fanvue_list_posts
  name: List Posts
  description: |
    List posts from the Fanvue creator account with content, media URLs, timestamps, engagement metrics, and pricing for each post.
  provider: fanvue
  endpoint: /api/v1/posts
  method: GET
  scopes: []
  tags:
    - posts
    - content
    - read
  input_schema:
    type: object
    description: Parameters for listing posts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fanvue_get_post
  name: Get Post
  description: |
    Retrieve detailed information about a specific Fanvue post including content, media files, price, subscriber access settings, and engagement statistics.
  provider: fanvue
  endpoint: /api/v1/posts/{id}
  method: GET
  scopes: []
  tags:
    - posts
    - content
    - read
  input_schema:
    type: object
    description: Parameters for getting post
    properties:
      id:
        type: string
        description: "Post ID"
    required:
      - id

- slug: fanvue_list_messages
  name: List Messages
  description: |
    List messages from the Fanvue inbox with sender names, message content, timestamps, read status, and conversation threads.
  provider: fanvue
  endpoint: /api/v1/messages
  method: GET
  scopes: []
  tags:
    - messages
    - communication
    - read
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fanvue_send_message
  name: Send Message
  description: |
    Send a direct message to a Fanvue user with message content. Returns delivery status and message identifier.
  provider: fanvue
  endpoint: /api/v1/messages
  method: POST
  scopes: []
  tags:
    - messages
    - communication
    - create
  input_schema:
    type: object
    description: Parameters for sending message
    properties:
      recipient_id:
        type: string
        description: "Recipient user ID"
      content:
        type: string
        description: "Message content"
    required:
      - recipient_id
      - content

- slug: fanvue_list_subscribers
  name: List Subscribers
  description: |
    List all subscribers to the Fanvue creator account with names, subscription dates, subscription tiers, and renewal status.
  provider: fanvue
  endpoint: /api/v1/subscribers
  method: GET
  scopes: []
  tags:
    - subscribers
    - fans
    - read
  input_schema:
    type: object
    description: Parameters for listing subscribers
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: fanvue_get_subscriber
  name: Get Subscriber
  description: |
    Retrieve detailed information about a specific Fanvue subscriber including subscription tier, renewal date, engagement history, and lifetime value.
  provider: fanvue
  endpoint: /api/v1/subscribers/{id}
  method: GET
  scopes: []
  tags:
    - subscribers
    - fans
    - read
  input_schema:
    type: object
    description: Parameters for getting subscriber
    properties:
      id:
        type: string
        description: "Subscriber ID"
    required:
      - id

- slug: fanvue_list_chats
  name: List Chats
  description: |
    List all chat conversations on Fanvue with participant names, last message previews, timestamps, and unread counts.
  provider: fanvue
  endpoint: /api/v1/chats
  method: GET
  scopes: []
  tags:
    - chats
    - messaging
    - read
  input_schema:
    type: object
    description: Parameters for listing chats
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
