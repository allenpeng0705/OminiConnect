- slug: zendesk_list_tickets
  name: List Tickets
  description: |
    List all tickets in Zendesk with pagination support. Returns ticket IDs, subjects, statuses, priorities, and requester information for each ticket. Filter by status or sort by created date.
  provider: zendesk
  endpoint: /tickets
  method: GET
  scopes:
    - read
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for listing tickets
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      per_page:
        type: integer
        description: "Number of results per page (default 100)"
      status:
        type: string
        description: "Filter by status (new, open, pending, hold, solved, closed)"
      sort_by:
        type: string
        description: "Sort field (created_at, updated_at, priority, status)"
      sort_order:
        type: string
        description: "Sort order (asc, desc)"
    required: []

- slug: zendesk_get_ticket
  name: Get Ticket
  description: |
    Get detailed information about a specific Zendesk ticket by its ID. Returns the ticket subject, description, status, priority, requester, and comments.
  provider: zendesk
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - read
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for getting a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
    required:
      - id

- slug: zendesk_create_ticket
  name: Create Ticket
  description: |
    Create a new ticket in Zendesk with a subject, comment body, requester, and priority. Returns the created ticket with its unique ID.
  provider: zendesk
  endpoint: /tickets
  method: POST
  scopes:
    - write
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for creating a ticket
    properties:
      subject:
        type: string
        description: "The ticket subject"
      comment:
        type: object
        description: "Ticket comment/body"
      requester_id:
        type: integer
        description: "The requester user ID"
      priority:
        type: string
        description: "Priority (low, normal, high, urgent)"
      tags:
        type: array
        description: "List of tags"
    required:
      - subject
      - comment

- slug: zendesk_update_ticket
  name: Update Ticket
  description: |
    Update an existing Zendesk ticket with new subject, comment, status, or priority. Returns the updated ticket confirming the changes.
  provider: zendesk
  endpoint: /tickets/{id}
  method: PUT
  scopes:
    - write
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for updating a ticket
    properties:
      id:
        type: integer
        description: "The unique ticket ID"
      subject:
        type: string
        description: "Updated subject"
      comment:
        type: object
        description: "Additional comment"
      status:
        type: string
        description: "Updated status"
      priority:
        type: string
        description: "Updated priority"
    required:
      - id

