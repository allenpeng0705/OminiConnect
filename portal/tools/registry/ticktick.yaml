# TickTick Tools - Allowlist
# Curated subset of TickTick API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. ticktick_list_tasks           - List all tasks
# # 2. ticktick_get_task           - Get task details
# # 3. ticktick_create_task           - Create a new task
# # 4. ticktick_update_task           - Update an existing task
# # 5. ticktick_delete_task           - Delete a task
# # 6. ticktick_list_projects           - List all projects
# # 7. ticktick_get_project           - Get project details
# # 8. ticktick_create_project           - Create a new project
# # 9. ticktick_list_sections           - List sections in a project
# # 10. ticktick_list_tags           - List all tags

- slug: ticktick_list_tasks
  name: List ticktick Tasks
  description: |
    List all tasks
  provider: ticktick
  endpoint: /open/v1/task
  method: GET
  scopes:
    - tasks:read
  tags:
    - ticktick
  input_schema:
    type: object
    description: Parameters for list tasks
    properties: {}
    required: []

- slug: ticktick_get_task
  name: Get ticktick Task
  description: |
    Get task details
  provider: ticktick
  endpoint: /open/v1/task/{task_id}
  method: GET
  scopes:
    - tasks:read
  tags:
    - ticktick
  input_schema:
    type: object
    description: Parameters for get task
    properties: {}
    required: []

