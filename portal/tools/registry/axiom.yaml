# Axiom Tools - Allowlist
# Curated subset of Axiom API for AI agent use.
# API_KEY auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. axiom_list_datasets        - List available datasets
# 2. axiom_get_dataset         - Get dataset details
# 3. axiom_query_dataset       - Query a dataset with APL
# 4. axiom_list_views          - List saved views
# 5. axiom_get_view            - Get view details
# 6. axiom_list_alerts        - List alerting rules
# 7. axiom_get_alert          - Get alert details
# 8. axiom_list_monitors      - List monitors
# 9. axiom_get_monitor        - Get monitor details
# 10. axiom_get_usage          - Get usage statistics

- slug: axiom_list_datasets
  name: List Datasets
  description: |
    List all available datasets in Axiom, returning dataset names, schemas, and ingestion statistics.
  provider: axiom
  endpoint: /v1/datasets
  method: GET
  scopes: []
  tags:
    - datasets
    - storage
  input_schema:
    type: object
    description: Parameters for listing datasets
    properties:
      limit:
        type: integer
        description: "Max datasets to return"
        default: 20
    required: []

- slug: axiom_get_dataset
  name: Get Dataset
  description: |
    Get details for a specific dataset including schema, field types, and ingestion configuration.
  provider: axiom
  endpoint: /v1/datasets/{name}
  method: GET
  scopes: []
  tags:
    - datasets
    - read
  input_schema:
    type: object
    description: Parameters for getting a dataset
    properties:
      name:
        type: string
        description: "Dataset name"
    required:
      - name

- slug: axiom_query_dataset
  name: Query Dataset
  description: |
    Query a dataset using APL (Axiom Processing Language), returning matching log entries and aggregated results.
  provider: axiom
  endpoint: /v1/datasets/{name}/query
  method: POST
  scopes: []
  tags:
    - query
    - analytics
  input_schema:
    type: object
    description: Parameters for querying a dataset
    properties:
      name:
        type: string
        description: "Dataset name"
      apl:
        type: string
        description: "APL query expression"
      startTime:
        type: string
        description: "Query start time (ISO 8601)"
      endTime:
        type: string
        description: "Query end time (ISO 8601)"
      limit:
        type: integer
        description: "Max rows to return"
        default: 1000
    required:
      - name
      - apl

