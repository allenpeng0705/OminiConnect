# Zoho Books Tools - Allowlist
# Curated subset of Zoho Books API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_books_list_invoices           - List all invoices
# # 2. zoho_books_get_invoice           - Get invoice details
# # 3. zoho_books_create_invoice           - Create a new invoice
# # 4. zoho_books_list_contacts           - List all contacts
# # 5. zoho_books_get_contact           - Get contact details
# # 6. zoho_books_create_contact           - Create a new contact
# # 7. zoho_books_list_bills           - List all bills
# # 8. zoho_books_get_bill           - Get bill details
# # 9. zoho_books_list_accounts           - List all accounts
# # 10. zoho_books_get_balance           - Get organization balance

- slug: zoho_books_list_invoices
  name: List zoho-books Invoices
  description: |
    List all invoices
  provider: zoho-books
  endpoint: /invoices
  method: GET
  scopes:
    - read
  tags:
    - zoho-books
  input_schema:
    type: object
    description: Parameters for list invoices
    properties: {}
    required: []

- slug: zoho_books_get_invoice
  name: Get zoho-books Invoice
  description: |
    Get invoice details
  provider: zoho-books
  endpoint: /invoices/{id}
  method: GET
  scopes:
    - read
  tags:
    - zoho-books
  input_schema:
    type: object
    description: Parameters for get invoice
    properties: {}
    required: []

