# Grammarly SCIM Tools - Allowlist
# Curated subset of Grammarly SCIM API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. grammarly_scim_list_users      - List SCIM users
# 2. grammarly_scim_get_user        - Get SCIM user details
# 3. grammarly_scim_create_user     - Create SCIM user
# 4. grammarly_scim_update_user     - Update SCIM user
# 5. grammarly_scim_delete_user     - Delete SCIM user
# 6. grammarly_scim_list_groups     - List SCIM groups
# 7. grammarly_scim_get_group       - Get SCIM group details
# 8. grammarly_scim_create_group    - Create SCIM group
# 9. grammarly_scim_update_group    - Update SCIM group
# 10. grammarly_scim_list_resources - List SCIM resources

- slug: grammarly_scim_list_users
  name: List SCIM Users
  description: |
    List all SCIM users in the Grammarly organization.
    Returns user details including email, name, and active status.
  provider: grammarly-scim
  endpoint: /v2/scim/Users
  method: GET
  scopes:
    - read
  tags:
    - users
    - scim
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM users
    properties:
      filter:
        type: string
        description: "Filter expression"
      startIndex:
        type: integer
        description: "Start index for pagination"
        default: 1
      count:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: grammarly_scim_get_user
  name: Get SCIM User
  description: |
    Get detailed information about a specific SCIM user.
    Includes user attributes and group memberships.
  provider: grammarly-scim
  endpoint: /v2/scim/Users/{id}
  method: GET
  scopes:
    - read
  tags:
    - users
    - scim
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: grammarly_scim_create_user
  name: Create SCIM User
  description: |
    Create a new SCIM user in the Grammarly organization.
    Set user email, name, and initial groups.
  provider: grammarly-scim
  endpoint: /v2/scim/Users
  method: POST
  scopes:
    - write
  tags:
    - users
    - scim
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
        properties:
          givenName:
            type: string
            description: "First name"
          familyName:
            type: string
            description: "Last name"
      emails:
        type: array
        description: "Email addresses"
      active:
        type: boolean
        description: "User active status"
        default: true
    required:
      - userName

- slug: grammarly_scim_update_user
  name: Update SCIM User
  description: |
    Update an existing SCIM user.
    Modify user attributes or active status.
  provider: grammarly-scim
  endpoint: /v2/scim/Users/{id}
  method: PUT
  scopes:
    - write
  tags:
    - users
    - scim
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM user
    properties:
      id:
        type: string
        description: "User ID"
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "User name object"
      active:
        type: boolean
        description: "User active status"
    required:
      - id

- slug: grammarly_scim_delete_user
  name: Delete SCIM User
  description: |
    Delete a SCIM user from the Grammarly organization.
    User will be deactivated and removed.
  provider: grammarly-scim
  endpoint: /v2/scim/Users/{id}
  method: DELETE
  scopes:
    - write
  tags:
    - users
    - scim
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a SCIM user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: grammarly_scim_list_groups
  name: List SCIM Groups
  description: |
    List all SCIM groups in the Grammarly organization.
    Returns group details including name and member count.
  provider: grammarly-scim
  endpoint: /v2/scim/Groups
  method: GET
  scopes:
    - read
  tags:
    - groups
    - scim
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM groups
    properties:
      startIndex:
        type: integer
        description: "Start index for pagination"
        default: 1
      count:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: grammarly_scim_get_group
  name: Get SCIM Group
  description: |
    Get detailed information about a specific SCIM group.
    Includes group members and attributes.
  provider: grammarly-scim
  endpoint: /v2/scim/Groups/{id}
  method: GET
  scopes:
    - read
  tags:
    - groups
    - scim
    - read
  input_schema:
    type: object
    description: Parameters for getting a SCIM group
    properties:
      id:
        type: string
        description: "Group ID"
    required:
      - id

- slug: grammarly_scim_create_group
  name: Create SCIM Group
  description: |
    Create a new SCIM group in the Grammarly organization.
    Set group name and initial members.
  provider: grammarly-scim
  endpoint: /v2/scim/Groups
  method: POST
  scopes:
    - write
  tags:
    - groups
    - scim
    - create
  input_schema:
    type: object
    description: Parameters for creating a SCIM group
    properties:
      displayName:
        type: string
        description: "Group display name"
      members:
        type: array
        description: "Group members"
    required:
      - displayName

- slug: grammarly_scim_update_group
  name: Update SCIM Group
  description: |
    Update an existing SCIM group.
    Modify group name or membership.
  provider: grammarly-scim
  endpoint: /v2/scim/Groups/{id}
  method: PUT
  scopes:
    - write
  tags:
    - groups
    - scim
    - update
  input_schema:
    type: object
    description: Parameters for updating a SCIM group
    properties:
      id:
        type: string
        description: "Group ID"
      displayName:
        type: string
        description: "New display name"
      members:
        type: array
        description: "New member list"
    required:
      - id

- slug: grammarly_scim_list_resources
  name: List SCIM Resources
  description: |
    List all SCIM resource types available.
    Returns supported resource types and endpoints.
  provider: grammarly-scim
  endpoint: /v2/scim/Resources
  method: GET
  scopes:
    - read
  tags:
    - resources
    - scim
    - list
  input_schema:
    type: object
    description: Parameters for listing SCIM resources
    properties: {}
    required: []
