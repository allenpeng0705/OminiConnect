# Sellercloud Tools - Allowlist
# Curated subset of Sellercloud API for AI agent use.
# Auth mode: TWO_STEP.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_products                            - List all products
# 2. get_product                              - Get product details
# 3. list_orders                              - List all orders
# 4. get_order                                - Get order details
# 5. list_customers                           - List all customers
# 6. get_customer                             - Get customer details
# 7. list_inventory                           - List inventory levels
# 8. update_inventory                         - Update inventory levels
# 9. list_shipments                           - List shipments
# 10. get_vendor                               - Get vendor details

- slug: list_products
  name: List sellercloud Products
  description: |
    List all products
  provider: sellercloud
  endpoint: /products
  method: GET
  scopes: []
  tags:
    - products
    - inventory
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_product
  name: Get sellercloud Product
  description: |
    Get product details
  provider: sellercloud
  endpoint: /products/{id}
  method: GET
  scopes: []
  tags:
