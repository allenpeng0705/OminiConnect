# Folk Tools - Allowlist
# Curated subset of Folk API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. folk_list_contacts         - List contacts
# 2. folk_get_contact          - Get contact details
# 3. folk_create_contact       - Create a contact
# 4. folk_update_contact       - Update contact details
# 5. folk_list_deals           - List deals
# 6. folk_get_deal             - Get deal details
# 7. folk_list_companies       - List companies
# 8. folk_get_company          - Get company details
# 9. folk_list_tasks          - List tasks
# 10. folk_get_task           - Get task details

- slug: folk_list_contacts
  name: List Contacts
  description: |
    List all contacts in the Folk CRM system. Returns contact IDs, names, email addresses, phone numbers, and company associations for each contact with pagination.
  provider: folk
  endpoint: /v1/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: folk_get_contact
  name: Get Contact
  description: |
    Get detailed information about a specific contact including their name, email, phone, company, and all associated deals and activities.
  provider: folk
  endpoint: /v1/contacts/{id}
  method: GET
  scopes: []
  tags:
    - contacts
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: folk_create_contact
  name: Create Contact
  description: |
    Create a new contact in Folk CRM with name, email, and optional phone number. Returns the created contact with its unique ID.
  provider: folk
  endpoint: /v1/contacts
  method: POST
  scopes: []
  tags:
    - contacts
    - crm
    - create
  input_schema:
    type: object
    description: Parameters for creating contact
    properties:
      name:
        type: string
        description: "Contact name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
    required:
      - name

- slug: folk_update_contact
  name: Update Contact
  description: |
    Update an existing contact's information including name, email, and phone number. Returns the updated contact with modified field values.
  provider: folk
  endpoint: /v1/contacts/{id}
  method: PUT
  scopes: []
  tags:
    - contacts
    - crm
    - update
  input_schema:
    type: object
    description: Parameters for updating contact
    properties:
      id:
        type: string
        description: "Contact ID"
      name:
        type: string
        description: "Contact name"
      email:
        type: string
        description: "Email address"
    required:
      - id

- slug: folk_list_deals
  name: List Deals
  description: |
    List all deals in the Folk CRM pipeline. Returns deal IDs, titles, values, pipeline stages, and associated contact information for each deal with stage filtering.
  provider: folk
  endpoint: /v1/deals
  method: GET
  scopes: []
  tags:
    - deals
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing deals
    properties:
      stage:
        type: string
        description: "Filter by stage"
    required: []

- slug: folk_get_deal
  name: Get Deal
  description: |
    Get detailed information about a specific deal including its title, value, pipeline stage, associated contact, and activity history.
  provider: folk
  endpoint: /v1/deals/{id}
  method: GET
  scopes: []
  tags:
    - deals
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting deal
    properties:
      id:
        type: string
        description: "Deal ID"
    required:
      - id

- slug: folk_list_companies
  name: List Companies
  description: |
    List all companies in the Folk CRM system. Returns company IDs, names, websites, industry information, and associated contact counts for each company.
  provider: folk
  endpoint: /v1/companies
  method: GET
  scopes: []
  tags:
    - companies
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing companies
    properties: {}
    required: []

- slug: folk_get_company
  name: Get Company
  description: |
    Get detailed information about a specific company including its name, website, industry, address, and all associated contacts and deals.
  provider: folk
  endpoint: /v1/companies/{id}
  method: GET
  scopes: []
  tags:
    - companies
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting company
    properties:
      id:
        type: string
        description: "Company ID"
    required:
      - id

- slug: folk_list_tasks
  name: List Tasks
  description: |
    List all tasks in the Folk CRM system with optional status filtering. Returns task IDs, titles, due dates, assignees, and completion status for each task.
  provider: folk
  endpoint: /v1/tasks
  method: GET
  scopes: []
  tags:
    - tasks
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: folk_get_task
  name: Get Task
  description: |
    Get detailed information about a specific task including its title, description, due date, assignee, and completion status.
  provider: folk
  endpoint: /v1/tasks/{id}
  method: GET
  scopes: []
  tags:
    - tasks
    - crm
    - read
  input_schema:
    type: object
    description: Parameters for getting task
    properties:
      id:
        type: string
        description: "Task ID"
    required:
      - id
