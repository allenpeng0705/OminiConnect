# Brex (Staging) Tools - Allowlist
# Curated subset of Brex API for AI agent use.
# OAuth2 via Nango.
# Staging environment at https://platform.staging.brexapps.com
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. brex_staging_get_account_info       - Get account info
# 2. brex_staging_list_transactions     - List transactions
# 3. brex_staging_get_transaction       - Get transaction details
# 4. brex_staging_list_cards            - List cards
# 5. brex_staging_get_card              - Get card details
# 6. brex_staging_list_users           - List team members
# 7. brex_staging_get_user             - Get user details
# 8. brex_staging_list_accounts        - List accounts
# 9. brex_staging_get_balance          - Get account balance
# 10. brex_staging_get_limits          - Get card limits

- slug: brex_staging_get_account_info
  name: Get Account Info
  description: |
    Get Brex staging account information including company name, region, and test configuration.
    Returns the complete account setup for testing financial workflows in staging environment.
  provider: brex-staging
  endpoint: /v1/account_info
  method: GET
  scopes: []
  tags:
    - account
    - info
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: brex_staging_list_transactions
  name: List Transactions
  description: |
    List all transactions in Brex staging and return transaction IDs, amounts, dates, and status.
    Use this to test transaction filtering and reconciliation workflows in staging.
  provider: brex-staging
  endpoint: /v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - payments
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      accountId:
        type: string
        description: "Filter by account ID"
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: brex_staging_get_transaction
  name: Get Transaction
  description: |
    Get details for a specific transaction including amount, date, merchant, and category.
    Returns the complete transaction data for testing expense tracking scenarios.
  provider: brex-staging
  endpoint: /v1/transactions/{transactionId}
  method: GET
  scopes: []
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID"
    required:
      - transactionId

- slug: brex_staging_list_cards
  name: List Cards
  description: |
    List all Brex cards in staging and return card IDs, statuses, and holder information.
    Use this to test card filtering and management workflows in the staging environment.
  provider: brex-staging
  endpoint: /v1/cards
  method: GET
  scopes: []
  tags:
    - cards
    - payments
  input_schema:
    type: object
    description: Parameters for listing cards
    properties:
      userId:
        type: string
        description: "Filter by user ID"
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: brex_staging_get_card
  name: Get Card
  description: |
    Get details for a specific card including status, type, spending limits, and holder info.
    Returns the complete card data for testing expense management features in staging.
  provider: brex-staging
  endpoint: /v1/cards/{cardId}
  method: GET
  scopes: []
  tags:
    - cards
    - read
  input_schema:
    type: object
    description: Parameters for getting a card
    properties:
      cardId:
        type: string
        description: "Card ID"
    required:
      - cardId

