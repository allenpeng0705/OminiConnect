  provider: brex-staging
  endpoint: /v1/cards/{cardId}/limits
  method: GET
  scopes: []
  tags:
    - cards
    - limits
  input_schema:
    type: object
    description: Parameters for getting limits
    properties:
      cardId:
        type: string
        description: "Card ID"
    required:
