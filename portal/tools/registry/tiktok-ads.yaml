# TikTok Ads Tools - Allowlist
# Curated subset of TikTok Ads API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tiktok_list_ad_accounts           - List all ad accounts
# # 2. tiktok_list_campaigns           - List all campaigns
# # 3. tiktok_create_campaign           - Create a new campaign
# # 4. tiktok_update_campaign           - Update a campaign
# # 5. tiktok_list_ad_groups           - List ad groups in a campaign
# # 6. tiktok_create_ad_group           - Create a new ad group
# # 7. tiktok_list_ads           - List all ads
# # 8. tiktok_create_ad           - Create a new ad
# # 9. tiktok_get_ad_report           - Get performance report for an ad
# # 10. tiktok_get_campaign_report           - Get performance report for a campaign

- slug: tiktok_list_ad_accounts
  name: List Ad Accounts
  description: |
    List all ad accounts
  provider: tiktok-ads
  endpoint: /advertiser/get
  method: GET
  scopes:
    - advertising.read
  tags:
    - tiktok-ads
  input_schema:
    type: object
    description: Parameters for list ad accounts
    properties: {}
    required: []

