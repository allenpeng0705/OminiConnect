# HubSpot MCP Tools - Allowlist
# Curated subset of HubSpot MCP API for AI agent use.
# MCP OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. hubspot_list_contacts        - List contacts
# 2. hubspot_get_contact           - Get contact details
# 3. hubspot_list_companies        - List companies
# 4. hubspot_get_company           - Get company details
# 5. hubspot_list_deals           - List deals
# 6. hubspot_get_deal             - Get deal details
# 7. hubspot_list_tickets         - List tickets
# 8. hubspot_get_ticket           - Get ticket details
# 9. hubspot_list_owners          - List owners
# 10. hubspot_list_pipelines       - List pipelines

- slug: hubspot_list_contacts
  name: List hubspot-mcp Contacts
  description: |
    List contacts in HubSpot CRM with cursor-based pagination. Returns contact names, emails, and all custom properties.
  provider: hubspot-mcp
  endpoint: /crm/v3/objects/contacts
  method: GET
  scopes:
    - crm.objects.contacts.read
  tags:
    - contacts
    - list
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
      after:
        type: string
        description: "Cursor for pagination"
    required: []

- slug: hubspot_get_contact
  name: Get hubspot-mcp Contact
  description: |
    Get a specific HubSpot contact by ID with properties and company association. Returns full contact details including all custom fields and linked company.
  provider: hubspot-mcp
  endpoint: /crm/v3/objects/contacts/{contactId}
  method: GET
  scopes:
    - crm.objects.contacts.read
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contactId:
        type: string
        description: "Contact ID"
    required:
      - contactId

