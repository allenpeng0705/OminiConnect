# Rippling-shop-app Tools - Allowlist
# Curated subset of Rippling Shop App API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. rippling-shop-app_list_products      - List all products
# 2. rippling-shop-app_get_product       - Get product details
# 3. rippling-shop-app_create_product    - Create a product
# 4. rippling-shop-app_list_orders       - List all orders
# 5. rippling-shop-app_get_order         - Get order details
# 6. rippling-shop-app_create_order      - Create an order
# 7. rippling-shop-app_list_customers    - List customers
# 8. rippling-shop-app_get_customer      - Get customer details
# 9. rippling-shop-app_list_inventory    - List inventory
# 10. rippling-shop-app_update_inventory - Update inventory

- slug: rippling-shop-app_list_products
  name: List rippling-shop-app Products
  description: |
    Retrieve a list of all products in the shop.
  provider: rippling-shop-app
  endpoint: /v1/products
  method: GET
  scopes:
    - products:read
  tags:
    - products
    - shop
    - e-commerce
  input_schema:
    type: object
    description: Parameters for listing products
    properties:
      limit:
        type: integer
        description: "Number of products"
        default: 50
    required: []

- slug: rippling-shop-app_get_product
  name: Get rippling-shop-app Product
  description: |
    Get details of a specific product.
  provider: rippling-shop-app
  endpoint: /v1/products/{productId}
  method: GET
  scopes:
    - products:read
  tags:
    - products
    - shop
    - e-commerce
  input_schema:
    type: object
    description: Parameters for getting a product
    properties:
      productId:
        type: string
        description: "The product ID"
    required:
      - productId

- slug: rippling-shop-app_create_product
  name: Create Product
  description: |
    Create a new product in the shop.
  provider: rippling-shop-app
  endpoint: /v1/products
  method: POST
  scopes:
    - products:write
  tags:
    - products
    - shop
    - e-commerce
    - create
  input_schema:
    type: object
    description: Parameters for creating a product
    properties:
      name:
        type: string
        description: "Product name"
      description:
        type: string
        description: "Product description"
      price:
        type: number
        description: "Product price"
      sku:
        type: string
        description: "Stock keeping unit"
    required:
      - name
      - price

- slug: rippling-shop-app_list_orders
  name: List Orders
  description: |
    Retrieve a list of all orders.
  provider: rippling-shop-app
  endpoint: /v1/orders
  method: GET
  scopes:
    - orders:read
  tags:
    - orders
    - shop
    - e-commerce
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      limit:
        type: integer
        description: "Number of orders"
        default: 50
      status:
        type: string
        description: "Filter by status: pending, processing, shipped, delivered"
    required: []

- slug: rippling-shop-app_get_order
  name: Get Order
  description: |
    Get details of a specific order.
  provider: rippling-shop-app
  endpoint: /v1/orders/{orderId}
  method: GET
  scopes:
    - orders:read
  tags:
    - orders
    - shop
    - e-commerce
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      orderId:
        type: string
        description: "The order ID"
    required:
      - orderId

- slug: rippling-shop-app_create_order
  name: Create Order
  description: |
    Create a new order.
  provider: rippling-shop-app
  endpoint: /v1/orders
  method: POST
  scopes:
    - orders:write
  tags:
    - orders
    - shop
    - e-commerce
    - create
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      customerId:
        type: string
        description: "Customer ID"
      items:
        type: array
        description: "Order items"
      shippingAddress:
        type: object
        description: "Shipping address"
    required:
      - customerId
      - items

- slug: rippling-shop-app_list_customers
  name: List Customers
  description: |
    Retrieve a list of all customers.
  provider: rippling-shop-app
  endpoint: /v1/customers
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
    - shop
