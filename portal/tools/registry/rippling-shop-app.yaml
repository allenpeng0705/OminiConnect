- slug: rippling-shop-app_list_inventory
  name: List Inventory
  description: |
    Retrieve a list of inventory items.
  provider: rippling-shop-app
  endpoint: /v1/inventory
  method: GET
  scopes:
    - inventory:read
  tags:
    - inventory
    - shop
    - stock
  input_schema:
    type: object
    description: Parameters for listing inventory
    properties:
      limit:
        type: integer
        description: "Number of items"
        default: 50
    required: []

- slug: rippling-shop-app_update_inventory
  name: Update Inventory
  description: |
    Update inventory quantity for a product.
  provider: rippling-shop-app
  endpoint: /v1/inventory/{productId}
  method: PUT
  scopes:
    - inventory:write
  tags:
    - inventory
    - shop
    - stock
  input_schema:
    type: object
    description: Parameters for updating inventory
    properties:
      productId:
        type: string
        description: "The product ID"
      quantity:
        type: integer
        description: "New quantity"
    required:
      - productId
      - quantity
