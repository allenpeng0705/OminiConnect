- slug: rippling-shop-app_get_customer
  name: Get Customer
  description: |
    Get details of a specific customer.
  provider: rippling-shop-app
  endpoint: /v1/customers/{customerId}
  method: GET
  scopes:
    - customers:read
  tags:
    - customers
    - shop
    - crm
  input_schema:
    type: object
    description: Parameters for getting a customer
