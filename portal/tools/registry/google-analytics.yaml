# Google Analytics Tools - Allowlist
# Curated subset of Google Analytics Data API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_analytics_list_reports      - Run Analytics reports
# 2. google_analytics_get_property     - Get property details
# 3. google_analytics_list_properties  - List Analytics properties
# 4. google_analytics_list_dimensions  - List available dimensions
# 5. google_analytics_list_metrics     - List available metrics
# 6. google_analytics_run_realtime_report - Run realtime report
# 7. google_analytics_list_goals      - List conversion goals
# 8. google_analytics_list_user_link  - List user links
# 9. google_analytics_get_audience     - Get audience insights
# 10. google_analytics_list_event     - List events

- slug: google_analytics_list_reports
  name: Run Analytics Reports
  description: |
    Run report queries on Google Analytics data with customizable metrics, dimensions, and date ranges. Returns traffic patterns, user behavior, and conversion data for property analysis.
  provider: google-analytics
  endpoint: /v1beta/properties/{property_id}:runReport
  method: POST
  scopes:
    - https://www.googleapis.com/auth/analytics.readonly
  tags:
    - analytics
    - reports
    - list
  input_schema:
    type: object
    description: Parameters for running reports
    properties:
      property_id:
        type: string
        description: "Analytics property ID"
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      metrics:
        type: array
        description: "Metrics to retrieve"
      dimensions:
        type: array
        description: "Dimensions to group by"
    required:
      - property_id
      - start_date
      - end_date

- slug: google_analytics_get_property
  name: Get Property
  description: |
    Retrieve detailed information about a Google Analytics property including settings, views, and account associations. Returns property configuration and data retention settings.
  provider: google-analytics
  endpoint: /v1beta/properties/{property_id}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/analytics.readonly
  tags:
    - analytics
    - property
    - read
  input_schema:
    type: object
    description: Parameters for getting a property
    properties:
      property_id:
        type: string
        description: "Analytics property ID"
    required:
      - property_id

- slug: google_analytics_list_properties
  name: List Properties
  description: |
    List all Google Analytics properties associated with the account including names, IDs, and website URLs. Returns property summaries and account hierarchy information.
  provider: google-analytics
  endpoint: /v1beta/accountSummaries
  method: GET
  scopes:
    - https://www.googleapis.com/auth/analytics.readonly
  tags:
    - analytics
    - properties
    - list
  input_schema:
    type: object
    description: Parameters for listing properties
    properties: {}

