- slug: google_analytics_run_realtime_report
  name: Run Realtime Report
  description: |
    Run realtime reports on current active user data including page views, user locations, and engagement metrics. Returns live traffic data for immediate insight into website activity.
  provider: google-analytics
  endpoint: /v1beta/properties/{property_id}:runRealtimeReport
  method: POST
  scopes:
    - https://www.googleapis.com/auth/analytics.readonly
  tags:
    - analytics
    - realtime
    - reports
  input_schema:
    type: object
    description: Parameters for realtime reports
    properties:
      property_id:
        type: string
        description: "Analytics property ID"
      metrics:
        type: array
        description: "Metrics to retrieve"
      dimensions:
        type: array
        description: "Dimensions to group by"
    required:
      - property_id

