# Pingboard Tools - Allowlist
# Curated subset of Pingboard API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. pingboard_list_users             - List users
# 2. pingboard_get_user               - Get user details
# 3. pingboard_list_accounts           - List accounts
# 4. pingboard_get_account            - Get account details
# 5. pingboard_list_statuses          - List user statuses
# 6. pingboard_list_skills            - List skills
# 7. pingboard_list_departments       - List departments
# 8. pingboard_get_directory          - Get company directory
# 9. pingboard_list_badges            - List badges
# 10. pingboard_get_user_status       - Get user status

- slug: pingboard_list_users
  name: List pingboard Users
  description: |
    List all users in the organization, including names, email addresses, job titles, departments, and status values.
  provider: pingboard
  endpoint: /v2/users
  method: GET
  scopes: []
  tags:
    - users
    - directory
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: pingboard_get_user
  name: Get pingboard User
  description: |
    Retrieve detailed information about a specific user, including their profile, contact details, skills, department, and manager.
  provider: pingboard
  endpoint: /v2/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - directory
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

