# Nerdio Tools - Allowlist
# Curated subset of Nerdio Manager API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. nerdio_list_desktops              - List virtual desktops
# 2. nerdio_get_desktop               - Get desktop details
# 3. nerdio_list_hosts                - List host servers
# 4. nerdio_list_sessions             - List active sessions
# 5. nerdio_list_users                - List users
# 6. nerdio_get_user                 - Get user details
# 7. nerdio_list_policies             - List management policies
# 8. nerdio_list_reports              - List available reports
# 9. nerdio_list_settings            - List system settings
# 10. nerdio_get_status               - Get system status

- slug: nerdio_list_desktops
  name: List Desktops
  description: |
    List all virtual desktops in the environment with pagination and status filtering.
    Returns desktop IDs, names, and status for each desktop.
    Use this to discover virtual desktops and manage VDI resources.
  provider: nerdio
  endpoint: /v1/desktops
  method: GET
  scopes:
    - desktops:read
  tags:
    - vdi
    - desktops
    - virtual
  input_schema:
    type: object
    description: Parameters for listing desktops
    properties:
      status:
        type: string
        description: "Filter by status (running, stopped, provisioning)"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: nerdio_get_desktop
  name: Get Desktop
  description: |
    Get detailed information for a specific desktop including configuration and status.
    Returns the complete desktop data with all associated information.
    This provides full desktop data for virtual infrastructure management.
  provider: nerdio
  endpoint: /v1/desktops/{id}
  method: GET
  scopes:
    - desktops:read
  tags:
    - vdi
    - desktops
    - read
  input_schema:
    type: object
    description: Parameters for getting a desktop
    properties:
      id:
        type: string
        description: "Desktop ID"
    required:
      - id

