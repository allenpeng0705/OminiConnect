# ShopWorks Tools - Allowlist
# Curated subset of ShopWorks API for AI agent use.
# Auth mode: TWO_STEP.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_orders                              - List all orders
# 2. get_order                                - Get order details
# 3. list_products                            - List all products
# 4. get_product                              - Get product details
# 5. list_customers                           - List customers
# 6. get_customer                             - Get customer details
# 7. list_inventory                           - List inventory levels
# 8. list_shipments                           - List shipments
# 9. list_payments                            - List payments
# 10. get_settings                             - Get store settings

- slug: list_orders
  name: List Orders
  description: |
    List all orders in ShopWorks. Returns order IDs, customer names, order dates, statuses, and total amounts.
  provider: shopworks
  endpoint: /orders
  method: GET
  scopes: []
  tags:
    - orders
    - ecommerce
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_order
  name: Get Order
  description: |
    Get detailed information about a specific order including line items, shipping address, payment status, and order totals.
  provider: shopworks
  endpoint: /orders/{id}
  method: GET
  scopes: []
  tags:
    - orders
    - ecommerce
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

