# Timeular Tools - Allowlist
# Curated subset of Timeular Public API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. timeular_list_time_entries         - List time entries
# 2. timeular_get_time_entry            - Get time entry details
# 3. timeular_create_time_entry         - Create a new time entry
# 4. timeular_stop_time_entry           - Stop tracking time
# 5. timeular_list_activities           - List activities
# 6. timeular_get_activity              - Get activity details
# 7. timeular_list_projects             - List projects
# 8. timeular_get_project               - Get project details
# 9. timeular_get_daily_summary         - Get daily summary
# 10. timeular_list_users               - List users

- slug: timeular_list_time_entries
  name: List Time Entries
  description: |
    List time entries with optional filtering by start and end date. Returns entry IDs, durations, activities, and timestamps for each entry.
  provider: timeular
  endpoint: /time-entries
  method: GET
  scopes:
    - time_entries:read
  tags:
    - time_entries
  input_schema:
    type: object
    description: Parameters for listing time entries
    properties:
      start_date:
        type: string
        description: "Filter entries from this date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "Filter entries until this date (YYYY-MM-DD)"
    required: []

- slug: timeular_get_time_entry
  name: Get Time Entry
  description: |
    Retrieve details for a specific time entry by its unique identifier. Returns the entry duration, activity, timestamps, and notes.
  provider: timeular
  endpoint: /time-entries/{id}
  method: GET
  scopes:
    - time_entries:read
  tags:
    - time_entries
  input_schema:
    type: object
    description: Parameters for getting a time entry
    properties:
      id:
        type: string
        description: "The ID of the time entry"
    required:
      - id

- slug: timeular_create_time_entry
  name: Create Time Entry
  description: |
    Create a new time entry manually with activity, start time, end time, and optional notes. Returns the created entry with its unique identifier.
  provider: timeular
  endpoint: /time-entries
  method: POST
  scopes:
    - time_entries:write
  tags:
    - time_entries
  input_schema:
    type: object
    description: Parameters for creating a time entry
    properties:
      activity_id:
        type: integer
        description: "The activity ID to track"
      start_time:
        type: string
        description: "Start time in ISO 8601 format"
      end_time:
        type: string
        description: "End time in ISO 8601 format"
      note:
        type: string
        description: "Optional note for the entry"
    required:
      - activity_id
      - start_time
      - end_time

- slug: timeular_stop_time_entry
  name: Stop Time Entry
  description: |
    Stop the currently running time tracking entry by its unique identifier. Returns the updated entry with final duration.
  provider: timeular
  endpoint: /time-entries/{id}/stop
  method: POST
  scopes:
    - time_entries:write
  tags:
    - time_entries
  input_schema:
    type: object
    description: Parameters for stopping a time entry
    properties:
      id:
        type: string
        description: "The ID of the time entry to stop"
    required:
      - id

