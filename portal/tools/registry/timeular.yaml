- slug: timeular_get_daily_summary
  name: Get Daily Summary
  description: |
    Get a summary of time tracked for a specific day including total hours, activity breakdown, and entries by project. Returns the complete daily analytics.
  provider: timeular
  endpoint: /reports/daily-summary
  method: GET
  scopes:
    - reports:read
  tags:
    - reports
  input_schema:
    type: object
    description: Parameters for daily summary
    properties:
      date:
        type: string
        description: "The date to get summary for (YYYY-MM-DD)"
    required:
      - date

