# Google BigQuery Tools - Allowlist
# Curated subset of BigQuery API for AI agent use.
# OAUTH2 via Nango (alias: google).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. google_bigquery_list_datasets     - List datasets
# 2. google_bigquery_get_dataset      - Get dataset details
# 3. google_bigquery_list_tables      - List tables in dataset
# 4. google_bigquery_get_table        - Get table details
# 5. google_bigquery_query            - Run a SQL query
# 6. google_bigquery_list_jobs        - List query jobs
# 7. google_bigquery_get_job          - Get job details
# 8. google_bigquery_insert_query     - Insert a query job
# 9. google_bigquery_list_routines    - List routines
# 10. google_bigquery_list_models    - List ML models

- slug: google_bigquery_list_datasets
  name: List Datasets
  description: |
    List all BigQuery datasets in the specified project including names, descriptions, and default table expiration. Returns dataset metadata for data organization and access control.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - datasets
    - list
  input_schema:
    type: object
    description: Parameters for listing datasets
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
    required:
      - projectId

- slug: google_bigquery_get_dataset
  name: Get Dataset
  description: |
    Retrieve detailed information about a BigQuery dataset including tables, access controls, and metadata. Returns dataset configuration and partitioning settings.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets/{datasetId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - datasets
    - read
  input_schema:
    type: object
    description: Parameters for getting a dataset
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      datasetId:
        type: string
        description: "Dataset ID"
    required:
      - projectId
      - datasetId

- slug: google_bigquery_list_tables
  name: List google-bigquery Tables
  description: |
    List all tables in a specified BigQuery dataset including names, schemas, and row counts. Returns table metadata for data discovery and schema inspection.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets/{datasetId}/tables
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - tables
    - list
  input_schema:
    type: object
    description: Parameters for listing tables
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      datasetId:
        type: string
        description: "Dataset ID"
    required:
      - projectId
      - datasetId

- slug: google_bigquery_get_table
  name: Get google-bigquery Table
  description: |
    Retrieve detailed information about a BigQuery table including schema definition, partitioning, and clustering settings. Returns table metadata and storage statistics.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets/{datasetId}/tables/{tableId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - tables
    - read
  input_schema:
    type: object
    description: Parameters for getting a table
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      datasetId:
        type: string
        description: "Dataset ID"
      tableId:
        type: string
        description: "Table ID"
    required:
      - projectId
      - datasetId
      - tableId

- slug: google_bigquery_query
  name: Run Query
  description: |
    Execute a SQL query on BigQuery data and return results including rows and schema. Returns query results with execution statistics and billed bytes.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/queries
  method: POST
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - query
    - sql
  input_schema:
    type: object
    description: Parameters for running a query
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      query:
        type: string
        description: "SQL query"
      useLegacySql:
        type: boolean
        description: "Use legacy SQL"
        default: false
    required:
      - projectId
      - query

- slug: google_bigquery_list_jobs
  name: List Jobs
  description: |
    List recent query jobs including execution status, elapsed time, and billed bytes. Returns job history for monitoring query performance and troubleshooting.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/jobs
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - jobs
    - list
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
    required:
      - projectId

- slug: google_bigquery_get_job
  name: Get Job
  description: |
    Retrieve detailed information about a specific query job including execution plan, statistics, and error details. Returns job configuration and performance metrics.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/jobs/{jobId}
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - jobs
    - read
  input_schema:
    type: object
    description: Parameters for getting a job
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      jobId:
        type: string
        description: "Job ID"
    required:
      - projectId
      - jobId

- slug: google_bigquery_insert_query
  name: Insert Query Job
  description: |
    Create and execute an asynchronous query job with results written to a destination table. Returns job configuration and execution handle for status tracking.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/jobs
  method: POST
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - jobs
    - create
  input_schema:
    type: object
    description: Parameters for inserting a query job
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      query:
        type: string
        description: "SQL query"
      destinationTable:
        type: string
        description: "Destination table (project:dataset.table)"
    required:
      - projectId
      - query

- slug: google_bigquery_list_routines
  name: List Routines
  description: |
    List stored procedures and user-defined functions in a BigQuery dataset including function definitions and parameter types. Returns routine metadata for code organization.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets/{datasetId}/routines
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - routines
    - list
  input_schema:
    type: object
    description: Parameters for listing routines
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      datasetId:
        type: string
        description: "Dataset ID"
    required:
      - projectId
      - datasetId

- slug: google_bigquery_list_models
  name: List Models
  description: |
    List machine learning models stored in a BigQuery dataset including model type, feature columns, and training statistics. Returns model metadata for ML workflows.
  provider: google-bigquery
  endpoint: /bigquery/v2/projects/{projectId}/datasets/{datasetId}/models
  method: GET
  scopes:
    - https://www.googleapis.com/auth/bigquery
  tags:
    - models
    - ml
    - list
  input_schema:
    type: object
    description: Parameters for listing models
    properties:
      projectId:
        type: string
        description: "Google Cloud project ID"
      datasetId:
        type: string
        description: "Dataset ID"
    required:
      - projectId
      - datasetId
