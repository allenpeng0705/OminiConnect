# Zoho Bigin Tools - Allowlist
# Curated subset of Zoho Bigin API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_bigin_list_contacts           - List all contacts
# # 2. zoho_bigin_get_contact           - Get contact details
# # 3. zoho_bigin_create_contact           - Create a new contact
# # 4. zoho_bigin_list_deals           - List all deals
# # 5. zoho_bigin_get_deal           - Get deal details
# # 6. zoho_bigin_create_deal           - Create a new deal
# # 7. zoho_bigin_list_pipeline           - List all pipelines
# # 8. zoho_bigin_list_tasks           - List all tasks
# # 9. zoho_bigin_create_task           - Create a new task
# # 10. zoho_bigin_list_events           - List all events

- slug: zoho_bigin_list_contacts
  name: List zoho-bigin Contacts
  description: |
    List all contacts
  provider: zoho-bigin
  endpoint: /crm/v2.1/contacts
  method: GET
  scopes:
    - read
  tags:
    - zoho-bigin
  input_schema:
    type: object
    description: Parameters for list contacts
    properties: {}
    required: []

- slug: zoho_bigin_get_contact
  name: Get zoho-bigin Contact
  description: |
    Get contact details
  provider: zoho-bigin
  endpoint: /crm/v2.1/contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - zoho-bigin
  input_schema:
    type: object
    description: Parameters for get contact
    properties: {}
    required: []

- slug: zoho_bigin_create_contact
