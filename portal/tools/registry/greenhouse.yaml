# Greenhouse Tools - Allowlist
# Curated subset of the Greenhouse Recruiting API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. greenhouse_list_applications   - List all job applications
# 2. greenhouse_get_application     - Get application details
# 3. greenhouse_update_application  - Update application status/fields
# 4. greenhouse_list_jobs           - List all open jobs
# 5. greenhouse_get_job              - Get job details
# 6. greenhouse_create_job          - Create a new job posting
# 7. greenhouse_list_offers        - List offers for candidates
# 8. greenhouse_get_offer           - Get offer details
# 9. greenhouse_create_offer        - Create an offer for candidate
# 10. greenhouse_list_users         - List users (hiring team, recruiters)

- slug: greenhouse_list_applications
  name: List Applications
  description: |
    List all job applications in your Greenhouse account with filtering by job, status, and pagination. Returns application IDs, candidate names, job titles, stages, and statuses for each application.
  provider: greenhouse
  endpoint: /applications
  method: GET
  scopes:
    - applications:read
  tags:
    - applications
    - recruiting
    - candidates
  input_schema:
    type: object
    description: Parameters for listing applications
    properties:
      job_id:
        type: integer
        description: "Filter by job ID"
      status:
        type: string
        description: "Filter by status: active, rejected, hired, etc."
      limit:
        type: integer
        description: "Number of results (default 100, max 500)"
        default: 100
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: greenhouse_get_application
  name: Get Application
  description: |
    Retrieve detailed information about a specific Greenhouse application by its ID. Returns the candidate profile, job, stage, interview scorecards, and activity history for the application.
  provider: greenhouse
  endpoint: /applications/{application_id}
  method: GET
  scopes:
    - applications:read
  tags:
    - applications
    - recruiting
    - candidates
  input_schema:
    type: object
    description: Parameters for getting an application
    properties:
      application_id:
        type: integer
        description: "Application ID"
    required:
      - application_id

- slug: greenhouse_update_application
  name: Update Application
  description: |
    Update a Greenhouse application's status, recruiter, or custom fields. Modifies the application record and returns the updated data confirming the changes.
  provider: greenhouse
  endpoint: /applications/{application_id}
  method: PUT
  scopes:
    - applications:write
  tags:
    - applications
    - update
    - recruiting
  input_schema:
    type: object
    description: Application update parameters
    properties:
      application_id:
        type: integer
        description: "Application ID"
      status:
        type: string
        description: "New status: active, rejected, hired, etc."
      recruiter_id:
        type: integer
        description: "Assign a recruiter by user ID"
      notes:
        type: string
        description: "Add a note to the application"
    required:
      - application_id

- slug: greenhouse_list_jobs
  name: List Jobs
  description: |
    List all jobs in your Greenhouse account with filtering by status, department, and office. Returns job titles, IDs, statuses, departments, and office locations for each job.
  provider: greenhouse
  endpoint: /jobs
  method: GET
  scopes:
    - jobs:read
  tags:
    - jobs
    - recruiting
    - openings
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, draft"
        enum: [open, closed, draft]
      department_id:
        type: integer
        description: "Filter by department ID"
      office_id:
        type: integer
        description: "Filter by office ID"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: greenhouse_get_job
  name: Get Job
  description: |
    Retrieve detailed information about a specific Greenhouse job by its ID. Returns the job title, description, requirements, hiring team, and application statistics.
  provider: greenhouse
  endpoint: /jobs/{job_id}
  method: GET
  scopes:
    - jobs:read
  tags:
    - jobs
    - recruiting
  input_schema:
    type: object
    description: Parameters for getting a job
    properties:
      job_id:
        type: integer
        description: "Job ID"
    required:
      - job_id

- slug: greenhouse_create_job
  name: Create Job
  description: |
    Create a new job posting in Greenhouse with title, description, department, and office assignment. Returns the created job with its unique ID for tracking.
  provider: greenhouse
  endpoint: /jobs
  method: POST
  scopes:
    - jobs:write
  tags:
    - jobs
    - create
    - recruiting
  input_schema:
    type: object
    description: Job creation parameters
    properties:
      title:
        type: string
        description: "Job title (required)"
      departments:
        type: array
        items:
          type: integer
        description: "Array of department IDs"
      offices:
        type: array
        items:
          type: integer
        description: "Array of office IDs"
      description:
        type: string
        description: "Job description (HTML)"
      status:
        type: string
        description: "Job status: open, closed, draft"
        default: draft
    required:
      - title

- slug: greenhouse_list_offers
  name: List Offers
  description: |
    List all offers in your Greenhouse account with filtering by application and status. Returns offer IDs, amounts, statuses, start dates, and associated applications for each offer.
  provider: greenhouse
  endpoint: /offers
  method: GET
  scopes:
    - offers:read
  tags:
    - offers
    - recruiting
    - compensation
  input_schema:
    type: object
    description: Parameters for listing offers
    properties:
      application_id:
        type: integer
        description: "Filter by application ID"
      status:
        type: string
        description: "Filter by status: pending, approved, declined, etc."
      limit:
        type: integer
        description: "Number of results"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: greenhouse_get_offer
  name: Get Offer
  description: |
    Retrieve detailed information about a specific Greenhouse offer by its ID. Returns the offer compensation, start date, approval status, and offer letter content.
  provider: greenhouse
  endpoint: /offers/{offer_id}
  method: GET
  scopes:
    - offers:read
  tags:
    - offers
    - recruiting
    - compensation
  input_schema:
    type: object
    description: Parameters for getting an offer
    properties:
      offer_id:
        type: integer
        description: "Offer ID"
    required:
      - offer_id

- slug: greenhouse_create_offer
  name: Create Offer
  description: |
    Create a new offer in Greenhouse for a candidate with compensation details and start date. Returns the created offer with its unique ID for tracking.
  provider: greenhouse
  endpoint: /offers
  method: POST
  scopes:
    - offers:write
  tags:
    - offers
    - create
    - recruiting
    - compensation
  input_schema:
    type: object
    description: Offer creation parameters
    properties:
      application_id:
        type: integer
        description: "Application ID (required)"
      payload:
        type: object
        description: "Offer details: salary, start_date, etc. (required)"
    required:
      - application_id
      - payload

- slug: greenhouse_list_users
  name: List greenhouse Users
  description: |
    List all users in your Greenhouse organization with filtering by email and name. Returns user names, IDs, email addresses, roles, and permission levels for each user.
  provider: greenhouse
  endpoint: /users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - team
    - recruiting
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      email:
        type: string
        description: "Filter by email address"
      name:
        type: string
        description: "Search by name"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []
