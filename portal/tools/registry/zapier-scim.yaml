# Zapier SCIM Tools - Allowlist
# Curated subset of Zapier SCIM API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zapier_list_users           - List all users
# # 2. zapier_get_user           - Get user details
# # 3. zapier_create_user           - Create a new user
# # 4. zapier_update_user           - Update a user
# # 5. zapier_delete_user           - Delete a user
# # 6. zapier_list_groups           - List all groups
# # 7. zapier_get_group           - Get group details
# # 8. zapier_create_group           - Create a new group
# # 9. zapier_update_group           - Update a group
# # 10. zapier_delete_group           - Delete a group

