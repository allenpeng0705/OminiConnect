# Osu Tools - Allowlist
# Curated subset of Osu API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. osu_get_me                      - Get current user
# 2. osu_get_user                    - Get user details
# 3. osu_list_beatmapsets           - List beatmapsets
# 4. osu_get_beatmapset             - Get beatmapset details
# 5. osu_list_scores                - List scores
# 6. osu_get_score                  - Get score details
# 7. osu_list_matches              - List matches
# 8. osu_get_match                  - Get match details
# 9. osu_list_user_scores         - List user scores
# 10. osu_get_recent_activity     - Get recent activity

- slug: osu_get_me
  name: Get Me
  description: |
    Get current authenticated user's profile.
  provider: osu
  endpoint: /me
  method: GET
  scopes:
    - identify
  tags:
    - gaming
    - users
    - profile
  input_schema:
    type: object
    description: Parameters for getting current user
    properties: {}
    required: []

- slug: osu_get_user
  name: Get osu User
  description: |
    Get detailed information for a specific user.
  provider: osu
  endpoint: /users/{user_id}
  method: GET
  scopes:
    - public
  tags:
    - gaming
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: osu_list_beatmapsets
  name: List Beatmapsets
  description: |
    List beatmapsets (song packages).
  provider: osu
  endpoint: /beatmapsets
  method: GET
  scopes:
    - public
  tags:
    - gaming
    - beatmaps
    - browse
  input_schema:
    type: object
    description: Parameters for listing beatmapsets
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
    required: []

- slug: osu_get_beatmapset
  name: Get Beatmapset
  description: |
    Get detailed information for a specific beatmapset.
  provider: osu
  endpoint: /beatmapsets/{beatmapset_id}
  method: GET
  scopes:
    - public
  tags:
    - gaming
    - beatmaps
    - read
  input_schema:
    type: object
    description: Parameters for getting a beatmapset
    properties:
      beatmapset_id:
        type: integer
        description: "Beatmapset ID"
    required:
      - beatmapset_id

- slug: osu_list_scores
  name: List Scores
