- slug: freshservice_list_tickets
  name: List Tickets
  description: |
    Retrieve a list of all tickets in the Freshservice system with pagination and filtering.
    Returns ticket IDs, subjects, statuses, and timestamps for each ticket.
    Use this to discover support issues and track ticket resolution progress.
  provider: freshservice
  endpoint: /tickets
  method: GET
  scopes:
    - read
  tags:
    - tickets
  input_schema:
    type: object
    description: Filter and pagination options for listing tickets
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      per_page:
        type: integer
        description: "Number of tickets per page (default: 30, max: 100)"
      status:
        type: integer
        description: "Filter by status: 2=Open, 3=Pending, 4=Resolved, 5=Closed"
    required: []

- slug: freshservice_get_ticket
  name: Get Ticket
  description: |
    Retrieve details of a specific ticket by ID including conversation history.
    Returns the complete ticket data with all associated information.
    This provides full ticket data for customer support management.
  provider: freshservice
  endpoint: /tickets/{id}
  method: GET
  scopes:
    - read
  tags:
    - tickets
  input_schema:
    type: object
    description: Parameters for getting a specific ticket
    properties:
      id:
        type: integer
        description: "Ticket ID"
    required:
      - id

- slug: freshservice_create_ticket
  name: Create Ticket
  description: |
    Create a new ticket in the Freshservice system with subject, description, and requester.
    Returns the created ticket with its unique ID and confirmation.
    This opens a new customer support issue for resolution.
  provider: freshservice
  endpoint: /tickets
  method: POST
  scopes:
    - create
  tags:
    - tickets
  input_schema:
    type: object
    description: Ticket creation parameters
    properties:
      subject:
        type: string
        description: "Ticket subject"
      description:
        type: string
        description: "Ticket description"
      email:
        type: string
        description: "Requester email"
      priority:
        type: integer
        description: "Priority: 1=Low, 2=Medium, 3=High, 4=Urgent"
      status:
        type: integer
        description: "Status: 2=Open, 3=Pending, 4=Resolved, 5=Closed"
      type:
        type: string
        description: "Ticket type: Incident, Service Request, Problem, Change"
    required:
      - subject

