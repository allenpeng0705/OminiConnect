# Heymarket Tools - Allowlist
# Curated subset of Heymarket API for AI agent use.
# JWT via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. heymarket_list_messages       - List messages
# 2. heymarket_send_message        - Send a message
# 3. heymarket_list_campaigns      - List campaigns
# 4. heymarket_get_campaign        - Get campaign details
# 5. heymarket_list_contacts       - List contacts
# 6. heymarket_get_contact         - Get contact details
# 7. heymarket_list_templates      - List templates
# 8. heymarket_get_template        - Get template details
# 9. heymarket_list_tags           - List tags
# 10. heymarket_list_conversations  - List conversations

- slug: heymarket_list_messages
  name: List Messages
  description: |
    Retrieve all messages in your Heymarket account with optional conversation filtering.
    Returns message content, status, and timestamps.
  provider: heymarket
  endpoint: /api/messages
  method: GET
  scopes:
    - read
  tags:
    - messages
    - list
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      conversation_id:
        type: string
        description: "Filter by conversation ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: heymarket_send_message
  name: Send Message
  description: |
    Send an SMS or WhatsApp message to a recipient via Heymarket.
    Returns message delivery status and unique message ID.
  provider: heymarket
  endpoint: /api/messages
  method: POST
  scopes:
    - write
  tags:
    - messages
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      recipient:
        type: string
        description: "Recipient phone number"
      content:
        type: string
        description: "Message content"
      channel:
        type: string
        description: "Channel: sms, whatsapp"
    required:
      - recipient
      - content

- slug: heymarket_list_campaigns
  name: List Campaigns
  description: |
    Retrieve all messaging campaigns in your Heymarket account.
    Returns campaign names and current status.
  provider: heymarket
  endpoint: /api/campaigns
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: heymarket_get_campaign
  name: Get Campaign
  description: |
    Retrieve a specific Heymarket campaign by ID with its stats and messages.
    Returns campaign performance metrics and engagement data.
  provider: heymarket
  endpoint: /api/campaigns/{id}
  method: GET
  scopes:
    - read
  tags:
    - campaigns
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      id:
        type: string
        description: "Campaign ID"
    required:
      - id

