# Snapchat More Tools - Allowlist
# Additional Snapchat Ads API tools for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. snapchat_more_list_ad_accounts      - List Snapchat ad accounts
# 2. snapchat_more_get_ad_account        - Get ad account details
# 3. snapchat_more_list_campaigns        - List advertising campaigns
# 4. snapchat_more_get_campaign          - Get campaign details
# 5. snapchat_more_create_campaign       - Create a new campaign
# 6. snapchat_more_list_ads              - List ads in a campaign
# 7. snapchat_more_get_ad                - Get ad details
# 8. snapchat_more_create_ad              - Create a new ad
# 9. snapchat_more_get_campaign_report    - Get campaign performance report
# 10. snapchat_more_list_audiences        - List custom audiences

- slug: snapchat_more_list_ad_accounts
  name: List Ad Accounts
  description: |
    List all Snapchat ad accounts associated with the authenticated user.
    Returns account details including status, spend limits, and billing information.
  provider: snapchat_more
  endpoint: /adaccounts
  method: GET
  scopes:
    - adaccounts:read
  tags:
    - advertising
    - accounts
    - snapchat
  input_schema:
    type: object
    description: Parameters for listing ad accounts
    properties:
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
      count:
        type: integer
        description: "Number of results per page (max 100)"
        default: 20
    required: []

- slug: snapchat_more_get_ad_account
  name: Get Ad Account
  description: |
    Get detailed information about a specific Snapchat ad account.
    Includes account status, billing settings, and spending limits.
  provider: snapchat_more
  endpoint: /adaccounts/{adaccount_id}
  method: GET
  scopes:
    - adaccounts:read
  tags:
    - advertising
    - accounts
    - snapchat
  input_schema:
    type: object
    description: Parameters for getting an ad account
    properties:
      adaccount_id:
        type: string
        description: "Ad account ID"
    required:
      - adaccount_id

- slug: snapchat_more_list_campaigns
  name: List Campaigns
  description: |
    List all advertising campaigns in a specific Snapchat ad account.
    Returns campaign details including status, budget, and delivery metrics.
  provider: snapchat_more
  endpoint: /campaigns
  method: GET
  scopes:
    - campaigns:read
  tags:
    - advertising
    - campaigns
    - snapchat
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties:
      adaccount_id:
        type: string
        description: "Ad account ID"
      status:
        type: string
        description: "Filter by campaign status"
        enum: [ACTIVE, PAUSED, ARCHIVED]
      page:
        type: integer
        description: "Page number"
        default: 1
      count:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - adaccount_id

- slug: snapchat_more_get_campaign
  name: Get Campaign
  description: |
    Get detailed information about a specific advertising campaign.
    Includes budget, scheduling, targeting, and performance data.
  provider: snapchat_more
  endpoint: /campaigns/{campaign_id}
  method: GET
  scopes:
    - campaigns:read
  tags:
    - advertising
    - campaigns
    - snapchat
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
    required:
      - campaign_id

- slug: snapchat_more_create_campaign
  name: Create Campaign
  description: |
    Create a new advertising campaign in Snapchat Ads.
    Set campaign objectives, budget, and targeting parameters.
  provider: snapchat_more
  endpoint: /campaigns
  method: POST
  scopes:
    - campaigns:write
  tags:
    - advertising
    - campaigns
    - create
    - snapchat
  input_schema:
    type: object
    description: Parameters for creating a campaign
    properties:
      adaccount_id:
        type: string
        description: "Ad account ID"
      campaign_name:
        type: string
        description: "Campaign name (required)"
      objective:
        type: string
        description: "Campaign objective"
        enum: [APP_INSTALL, WEB_VIEW, VIDEO_VIEW, REACH, BRAND_AWARENESS, AWARENESS, CONSIDERATION, CONVERSION]
      daily_budget:
        type: number
        description: "Daily budget in cents"
      lifetime_budget:
        type: number
        description: "Lifetime budget in cents"
      start_time:
        type: string
        description: "Campaign start time (ISO 8601 format)"
      end_time:
        type: string
        description: "Campaign end time (ISO 8601 format)"
      status:
        type: string
        description: "Campaign status"
        enum: [ACTIVE, PAUSED]
        default: PAUSED
    required:
      - adaccount_id
      - campaign_name
      - objective

- slug: snapchat_more_list_ads
  name: List Ads
  description: |
    List all ads within a specific campaign or ad set.
    Use this to view ad performance and creative details.
  provider: snapchat_more
  endpoint: /ads
  method: GET
  scopes:
    - ads:read
  tags:
    - advertising
    - ads
    - snapchat
  input_schema:
    type: object
    description: Parameters for listing ads
    properties:
      adaccount_id:
        type: string
        description: "Ad account ID"
      campaign_id:
        type: string
        description: "Filter by campaign ID"
      adset_id:
        type: string
        description: "Filter by ad set ID"
      status:
        type: string
        description: "Filter by ad status"
      page:
        type: integer
        description: "Page number"
        default: 1
      count:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - adaccount_id

- slug: snapchat_more_get_ad
  name: Get Ad
  description: |
    Get detailed information about a specific ad.
    Includes creative assets, targeting, and delivery metrics.
  provider: snapchat_more
  endpoint: /ads/{ad_id}
  method: GET
  scopes:
    - ads:read
  tags:
    - advertising
    - ads
    - snapchat
  input_schema:
    type: object
    description: Parameters for getting an ad
    properties:
      ad_id:
        type: string
        description: "Ad ID"
    required:
      - ad_id

- slug: snapchat_more_create_ad
  name: Create Ad
  description: |
    Create a new ad in a Snapchat ad set.
    Define creative content, ad format, and tracking pixels.
  provider: snapchat_more
  endpoint: /ads
  method: POST
  scopes:
    - ads:write
  tags:
    - advertising
    - ads
    - create
    - snapchat
  input_schema:
    type: object
    description: Parameters for creating an ad
    properties:
      adaccount_id:
        type: string
        description: "Ad account ID"
      adset_id:
        type: string
        description: "Ad set ID to attach the ad to"
      name:
        type: string
        description: "Ad name (required)"
      type:
        type: string
        description: "Ad type"
        enum: [SNAP_AD, FILTER, LENS, STORY, COLLECTION]
      headline:
        type: string
        description: "Ad headline (max 50 characters)"
      body:
        type: string
        description: "Ad body text (max 500 characters)"
      image_url:
        type: string
        description: "URL of the ad image"
      video_url:
        type: string
        description: "URL of the ad video"
      call_to_action:
        type: string
        description: "Call to action button"
        enum: [SHOP_NOW, LEARN_MORE, WATCH_MORE, INSTALL_NOW, PLAY_NOW, BOOK_NOW, GET_OFFER]
      webview_url:
        type: string
        description: "Destination URL for webview ads"
      app_install_url:
        type: string
        description: "Deep link for app install ads"
      status:
        type: string
        description: "Ad status"
        enum: [ACTIVE, PAUSED]
        default: PAUSED
    required:
      - adaccount_id
      - adset_id
      - name

- slug: snapchat_more_get_campaign_report
  name: Get Campaign Report
  description: |
    Get performance report for a Snapchat campaign including impressions, clicks, spend, and conversions.
    Use this to analyze campaign effectiveness and optimize ad spend.
  provider: snapchat_more
  endpoint: /campaigns/{campaign_id}/stats
  method: GET
  scopes:
    - reports:read
  tags:
    - reporting
    - analytics
    - snapchat
  input_schema:
    type: object
    description: Parameters for getting campaign report
    properties:
      campaign_id:
        type: string
        description: "Campaign ID"
      start_time:
        type: string
        description: "Start time (YYYY-MM-DD format)"
      end_time:
        type: string
        description: "End time (YYYY-MM-DD format)"
      granularity:
        type: string
        description: "Data granularity"
        enum: [HOUR, DAY, WEEK, MONTH]
        default: DAY
    required:
      - campaign_id
      - start_time
      - end_time

- slug: snapchat_more_list_audiences
  name: List Audiences
  description: |
    List custom audiences created for targeted Snapchat advertising.
    Audiences can be built from customer lists, engagement, or lookalike profiles.
  provider: snapchat_more
  endpoint: /audiences
  method: GET
  scopes:
    - audiences:read
  tags:
    - advertising
    - audiences
    - targeting
    - snapchat
  input_schema:
    type: object
    description: Parameters for listing audiences
    properties:
      adaccount_id:
        type: string
        description: "Ad account ID"
      audience_type:
        type: string
        description: "Filter by audience type"
        enum: [CUSTOM, LOOKALIKE, ENGAGEMENT, VIDEO_VIEW, WEB_VISITOR, CONVERSION]
      page:
        type: integer
        description: "Page number"
        default: 1
      count:
        type: integer
        description: "Results per page"
        default: 20
    required:
      - adaccount_id
