# Uber Tools - Allowlist
# Curated subset of Uber API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. uber_get_user_profile           - Get user profile information
# # 2. uber_get_user_history           - Get user trip history
# # 3. uber_list_products           - List available Uber products
# # 4. uber_get_product           - Get product details
# # 5. uber_get_price_estimate           - Get price estimate for a trip
# # 6. uber_get_time_estimate           - Get time estimate for pickup
# # 7. uber_request_ride           - Request a ride
# # 8. uber_get_request           - Get request details
# # 9. uber_cancel_request           - Cancel a ride request
# # 10. uber_list_places           - List saved places

- slug: uber_get_user_profile
  name: Get User Profile
  description: |
    Retrieve the authenticated Uber user's profile information including their name, email, and profile picture URL.
  provider: uber
  endpoint: /v1/me
  method: GET
  scopes:
    - profile
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for get user profile
    properties: {}
    required: []

- slug: uber_get_user_history
  name: Get User History
  description: |
    Retrieve the complete trip history for the authenticated user including trip IDs, dates, origins, destinations, and fare amounts.
  provider: uber
  endpoint: /v1.2/history
  method: GET
  scopes:
    - history
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for get user history
    properties: {}
    required: []

- slug: uber_list_products
  name: List Products
  description: |
    List all available Uber products at a given location including ride options like UberX, UberXL, and UberBlack with their capacity and pricing.
  provider: uber
  endpoint: /v1/products
  method: GET
  scopes:
    - 
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for list products
    properties: {}
    required: []

- slug: uber_get_product
  name: Get Product
  description: |
    Retrieve detailed information about a specific Uber product including its display name, description, capacity, and service details.
  provider: uber
  endpoint: /v1/products/{product_id}
  method: GET
  scopes:
    - 
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for get product
    properties: {}
    required: []

- slug: uber_get_price_estimate
  name: Get Price Estimate
  description: |
    Get price estimates for a trip between specified pickup and dropoff locations including the minimum and maximum fare ranges.
  provider: uber
  endpoint: /v1.2/price
  method: GET
  scopes:
    - 
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for get price estimate
    properties: {}
    required: []

- slug: uber_get_time_estimate
  name: Get Time Estimate
  description: |
    Get estimated pickup times for Uber products at a specified location including the number of cars available and wait times.
  provider: uber
  endpoint: /v1.2/time
  method: GET
  scopes:
    - 
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for get time estimate
    properties: {}
    required: []

- slug: uber_request_ride
  name: Request Ride
  description: |
    Request a new ride with specified pickup and dropoff locations. Returns the request ID and status for tracking the ride.
  provider: uber
  endpoint: /v1/requests
  method: POST
  scopes:
    - request
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for request ride
    properties: {}
    required: []

- slug: uber_get_request
  name: Get Request
  description: |
    Retrieve details about a specific ride request including the driver's location, ETA, and current status of the trip.
  provider: uber
  endpoint: /v1/requests/{request_id}
  method: GET
  scopes:
    - request
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for get request
    properties: {}
    required: []

- slug: uber_cancel_request
  name: Cancel Request
  description: |
    Cancel an existing ride request by its ID. Returns confirmation of successful cancellation.
  provider: uber
  endpoint: /v1/requests/{request_id}
  method: DELETE
  scopes:
    - request
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for cancel request
    properties: {}
    required: []

- slug: uber_list_places
  name: List Places
  description: |
    List all saved places for the authenticated user including home, work, and custom saved locations with their addresses.
  provider: uber
  endpoint: /v1/places/{user_id}
  method: GET
  scopes:
    - places
  tags:
    - uber
  input_schema:
    type: object
    description: Parameters for list places
    properties: {}
    required: []

