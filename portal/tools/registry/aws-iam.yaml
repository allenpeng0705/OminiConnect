# AWS IAM Tools - Allowlist
# Curated subset of AWS IAM API for AI agent use.
# BASIC auth via Nango (Access Key ID + Secret Access Key).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. aws_iam_list_users             - List IAM users
# 2. aws_iam_get_user               - Get user details
# 3. aws_iam_list_groups            - List IAM groups
# 4. aws_iam_list_attached_policies - List attached policies
# 5. aws_iam_list_roles             - List IAM roles
# 6. aws_iam_get_role               - Get role details
# 7. aws_iam_list_access_keys       - List access keys
# 8. aws_iam_list_policies          - List managed policies
# 9. aws_iam_get_policy             - Get policy details
# 10. aws_iam_list_account_aliases  - List account aliases

- slug: aws_iam_list_users
  name: List aws-iam Users
  description: |
    List all IAM users in the AWS account and return user names, IDs, and creation dates.
    Use this to discover accounts for permission management and access control.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - users
    - iam
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      PathPrefix:
        type: string
        description: "Filter by path prefix"
      MaxItems:
        type: integer
        description: "Max items to return"
        default: 20
    required: []

- slug: aws_iam_get_user
  name: Get aws-iam User
  description: |
    Get details for a specific IAM user including their attached managed policies and inline permissions.
    Returns the complete permission configuration for access review.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      UserName:
        type: string
        description: "IAM user name"
    required:
      - UserName

- slug: aws_iam_list_groups
  name: List aws-iam Groups
  description: |
    List all IAM groups in the account and return group names and IDs.
    Use this to discover groups for user membership management.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - groups
    - iam
  input_schema:
    type: object
    description: Parameters for listing groups
    properties:
      MaxItems:
        type: integer
        description: "Max items to return"
        default: 20
    required: []

- slug: aws_iam_list_attached_policies
  name: List Attached Policies
  description: |
    List all managed policies attached to a specific IAM user, group, or role.
    Returns the policy ARNs and attachment details for each policy.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - policies
    - iam
  input_schema:
    type: object
    description: Parameters for listing attached policies
    properties:
      EntityName:
        type: string
        description: "User, group, or role name"
      EntityPath:
        type: string
        description: "Path to filter by"
    required:
      - EntityName

- slug: aws_iam_list_roles
  name: List Roles
  description: |
    List all IAM roles in the account and return role names, IDs, and creation dates.
    Use this to discover roles for cross-account access and service delegation.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - roles
    - iam
  input_schema:
    type: object
    description: Parameters for listing roles
    properties:
      PathPrefix:
        type: string
        description: "Filter by path prefix"
      MaxItems:
        type: integer
        description: "Max items to return"
        default: 20
    required: []

- slug: aws_iam_get_role
  name: Get Role
  description: |
    Get details for a specific IAM role including the trust policy and permission boundaries.
    Returns the complete role configuration for access analysis.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - roles
    - read
  input_schema:
    type: object
    description: Parameters for getting a role
    properties:
      RoleName:
        type: string
        description: "IAM role name"
    required:
      - RoleName

- slug: aws_iam_list_access_keys
  name: List Access Keys
  description: |
    List access keys for a specific IAM user and return key IDs, status, and last usage dates.
    Use this to audit active credentials and manage security.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - access-keys
    - security
  input_schema:
    type: object
    description: Parameters for listing access keys
    properties:
      UserName:
        type: string
        description: "IAM user name"
    required:
      - UserName

- slug: aws_iam_list_policies
  name: List Policies
  description: |
    List all managed policies in the account and return policy names, ARNs, and attachment counts.
    Use this to discover available permissions for role configuration.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - policies
    - iam
  input_schema:
    type: object
    description: Parameters for listing policies
    properties:
      Scope:
        type: string
        description: "Policy scope: Local, AWS, or All"
        default: Local
      MaxItems:
        type: integer
        description: "Max items to return"
        default: 20
    required: []

- slug: aws_iam_get_policy
  name: Get Policy
  description: |
    Get details of a managed policy including the default version document and attachment targets.
    Returns the full policy permissions for access review.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - policies
    - read
  input_schema:
    type: object
    description: Parameters for getting a policy
    properties:
      PolicyArn:
        type: string
        description: "Policy ARN"
    required:
      - PolicyArn

- slug: aws_iam_list_account_aliases
  name: List Account Aliases
  description: |
    List account aliases associated with the AWS account for friendly identification.
    Returns the alias name used in the account URL and sign-in page.
  provider: aws-iam
  endpoint: /
  method: GET
  scopes: []
  tags:
    - account
    - alias
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []
