# Microsoft Power BI Tools - Allowlist
# Curated subset of Microsoft Power BI API for AI agent use.
# OAuth2 via Nango (alias: microsoft).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. powerbi_list_workspaces       - List workspaces
# 2. powerbi_get_workspace         - Get workspace details
# 3. powerbi_list_reports         - List reports
# 4. powerbi_get_report            - Get report details
# 5. powerbi_list_datasets        - List datasets
# 6. powerbi_get_dataset          - Get dataset details
# 7. powerbi_list_capacities      - List capacities
# 8. powerbi_get_capacity         - Get capacity details
# 9. powerbi_list_groups          - List groups
# 10. powerbi_get_group           - Get group details

- slug: powerbi_list_workspaces
  name: List microsoft-power-bi Workspaces
  description: |
    List all Power BI workspaces accessible to the user.
  provider: microsoft-power-bi
  endpoint: /v1.0/myorg/groups
  method: GET
  scopes:
    - Group.Read.All
  tags:
    - powerbi
    - workspaces
    - list
  input_schema:
    type: object
    description: Parameters for listing workspaces
    properties:
      $filter:
        type: string
        description: "OData filter expression"
      $top:
        type: integer
        description: "Max results"
        default: 50
    required: []

- slug: powerbi_get_workspace
  name: Get microsoft-power-bi Workspace
  description: |
    Get details of a specific Power BI workspace.
  provider: microsoft-power-bi
  endpoint: /v1.0/myorg/groups/{groupId}
  method: GET
  scopes:
    - Group.Read.All
  tags:
    - powerbi
    - workspaces
    - read
  input_schema:
    type: object
    description: Parameters for getting a workspace
    properties:
      groupId:
        type: string
        description: "Workspace (Group) ID"
    required:
      - groupId

