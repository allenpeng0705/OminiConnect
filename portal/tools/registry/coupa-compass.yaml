- slug: coupa_compass_list_spend_data
  name: List Spend Data
  description: |
    List spend data and analytics from Coupa Compass, returning spending totals by department, supplier, or category.
  provider: coupa-compass
  endpoint: /spend
  method: GET
  scopes: []
  tags:
    - spend
    - analytics
    - list
  input_schema:
    type: object
    description: Parameters for listing spend data
    properties:
      from_date:
        type: string
        description: "From date (YYYY-MM-DD)"
      to_date:
        type: string
        description: "To date (YYYY-MM-DD)"
      group_by:
        type: string
        description: "Group by: supplier, department, category"
        default: supplier
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []
