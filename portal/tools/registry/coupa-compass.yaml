# Coupa Compass Tools - Allowlist
# Curated subset of the Coupa Compass API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. coupa_compass_list_invoices      - List invoices
# 2. coupa_compass_get_invoice        - Get invoice details
# 3. coupa_compass_list_purchase_orders - List purchase orders
# 4. coupa_compass_get_purchase_order - Get purchase order details
# 5. coupa_compass_list_suppliers     - List suppliers
# 6. coupa_compass_get_supplier       - Get supplier details
# 7. coupa_compass_list_contracts     - List contracts
# 8. coupa_compass_get_contract       - Get contract details
# 9. coupa_compass_list_approvals     - List pending approvals
# 10. coupa_compass_list_spend_data   - List spend data

- slug: coupa_compass_list_invoices
  name: List coupa-compass Invoices
  description: |
    List all invoices in Coupa Compass, returning invoice IDs, amounts, status, and supplier information.
  provider: coupa-compass
  endpoint: /invoices
  method: GET
  scopes: []
  tags:
    - invoices
    - payments
    - list
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status: submitted, approved, paid, rejected"
      supplier_id:
        type: string
        description: "Filter by supplier ID"
      from_date:
        type: string
        description: "From date (YYYY-MM-DD)"
      to_date:
        type: string
        description: "To date (YYYY-MM-DD)"
      limit:
        type: integer
        description: "Max results (default 50, max 200)"
        default: 50
    required: []

- slug: coupa_compass_get_invoice
  name: Get coupa-compass Invoice
  description: |
    Get detailed information for a specific Coupa Compass invoice including line items, totals, and approval status.
  provider: coupa-compass
  endpoint: /invoices/{id}
  method: GET
  scopes: []
  tags:
    - invoices
    - payments
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      id:
        type: string
        description: "Invoice ID"
    required:
      - id

