# Prospeo Tools - Allowlist
# Curated subset of Prospeo API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. prospeo_get_account_info        - Get account info
# 2. prospeo_search_companies       - Search companies
# 3. prospeo_get_company           - Get company details
# 4. prospeo_search_contacts       - Search contacts
# 5. prospeo_get_contact           - Get contact details
# 6. prospeo_enrich_company        - Enrich company data
# 7. prospeo_enrich_contact        - Enrich contact data
# 8. prospeo_get_domain_info       - Get domain information
# 9. prospeo_list_campaigns        - List campaigns
# 10. prospeo_get_campaign         - Get campaign details

- slug: prospeo_get_account_info
  name: Get Account Info
  description: |
    Retrieve your Prospeo account information including current plan details, usage statistics, and API rate limits.
    Returns account status and quota data for monitoring resource utilization.
  provider: prospeo
  endpoint: /account-information
  method: POST
  scopes: []
  tags:
    - account
    - read
  input_schema:
    type: object
    description: Parameters for getting account info
    properties: {}
    required: []

- slug: prospeo_search_companies
  name: Search Companies
  description: |
    Search for companies by name, domain, location, or industry criteria to build targeted prospect lists.
    Returns company records including names, domains, employee counts, and contact availability.
  provider: prospeo
  endpoint: /company/search
  method: POST
  scopes: []
  tags:
    - companies
    - search
  input_schema:
    type: object
    description: Parameters for searching companies
    properties:
      name:
        type: string
        description: "Company name"
      domain:
        type: string
        description: "Company domain"
      location:
        type: string
        description: "Location filter"
    required: []

- slug: prospeo_get_company
  name: Get Company
  description: |
    Retrieve detailed information about a specific company including their industry, size, technology stack, and contact decision-makers.
    Returns company profiles for lead research and account analysis.
  provider: prospeo
  endpoint: /company
  method: POST
  scopes: []
  tags:
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      companyId:
        type: string
        description: "Company ID or domain"
    required:
      - companyId

- slug: prospeo_search_contacts
  name: Search Contacts
  description: |
    Search for business contacts by name, email, company, job title, or seniority level to identify ideal prospects.
    Returns contact records with email addresses, phone numbers, and professional details.
  provider: prospeo
  endpoint: /contact/search
  method: POST
  scopes: []
  tags:
    - contacts
    - people
    - search
  input_schema:
    type: object
    description: Parameters for searching contacts
    properties:
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      company:
        type: string
        description: "Company name"
      email:
        type: string
        description: "Email address"
    required: []

- slug: prospeo_get_contact
  name: Get prospeo Contact
  description: |
    Retrieve detailed information about a specific contact including their full name, title, company, and contact details.
    Returns contact profiles for outreach personalization and relationship building.
  provider: prospeo
  endpoint: /contact
  method: POST
  scopes: []
  tags:
    - contacts
    - people
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contactId:
        type: string
        description: "Contact ID or email"
    required:
      - contactId

- slug: prospeo_enrich_company
  name: Enrich Company
  description: |
    Enrich company data by looking up a domain or company name to retrieve additional firmographic details.
    Returns enriched company data including funding information, technologies used, and employee metrics.
  provider: prospeo
  endpoint: /company/enrich
  method: POST
  scopes: []
  tags:
    - companies
    - enrich
  input_schema:
    type: object
    description: Parameters for enriching company
    properties:
      domain:
        type: string
        description: "Company domain"
      name:
        type: string
        description: "Company name"
    required: []

- slug: prospeo_enrich_contact
  name: Enrich Contact
  description: |
    Enrich contact data by providing an email address to retrieve additional professional and company information.
    Returns enriched contact records including social profiles, phone numbers, and company details.
  provider: prospeo
  endpoint: /contact/enrich
  method: POST
  scopes: []
  tags:
    - contacts
    - enrich
  input_schema:
    type: object
    description: Parameters for enriching contact
    properties:
      email:
        type: string
        description: "Email address"
    required:
      - email

- slug: prospeo_get_domain_info
  name: Get Domain Info
  description: |
    Retrieve information about a domain including associated company details, employee count, and technology indicators.
    Returns domain intelligence for lead qualification and company research.
  provider: prospeo
  endpoint: /domain
  method: POST
  scopes: []
  tags:
    - domain
    - lookup
  input_schema:
    type: object
    description: Parameters for getting domain info
    properties:
      domain:
        type: string
        description: "Domain name"
    required:
      - domain

- slug: prospeo_list_campaigns
  name: List Campaigns
  description: |
    List all email marketing campaigns in Prospeo including campaign names, statuses, sending schedules, and performance metrics.
    Returns campaign listings for tracking outreach progress and engagement rates.
  provider: prospeo
  endpoint: /campaigns
  method: GET
  scopes: []
  tags:
    - campaigns
    - marketing
    - list
  input_schema:
    type: object
    description: Parameters for listing campaigns
    properties: {}
    required: []

- slug: prospeo_get_campaign
  name: Get Campaign
  description: |
    Retrieve detailed information about a specific email campaign including its status, target audience, and delivery statistics.
    Returns campaign performance data including open rates, click rates, and bounce metrics.
  provider: prospeo
  endpoint: /campaigns/{campaignId}
  method: GET
  scopes: []
  tags:
    - campaigns
    - marketing
    - read
  input_schema:
    type: object
    description: Parameters for getting a campaign
    properties:
      campaignId:
        type: string
        description: "Campaign ID"
    required:
      - campaignId
