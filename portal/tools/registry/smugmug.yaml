# Smugmug Tools - Allowlist
# Curated subset of Smugmug API for AI agent use.
# Auth mode: OAUTH1.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_albums                              - List all albums
# 2. get_album                                - Get album details
# 3. list_images                              - List images in album
# 4. get_image                                - Get image details
# 5. upload_image                             - Upload an image
# 6. get_user                                 - Get user profile
# 7. list_folders                             - List folders
# 8. create_album                             - Create an album
# 9. update_album                             - Update album settings
# 10. delete_image                             - Delete an image

- slug: list_albums
  name: List Albums
  description: |
    List all albums in Smugmug. Returns album names, descriptions, image counts, and privacy settings.
  provider: smugmug
  endpoint: /albums
  method: GET
  scopes: []
  tags:
    - albums
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_album
  name: Get Album
  description: |
    Get detailed information about a specific album including its description, image count, and customization settings.
  provider: smugmug
  endpoint: /albums/{id}
  method: GET
  scopes: []
  tags:
    - albums
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_images
  name: List Images
  description: |
    List all images in a Smugmug album. Returns image names, sizes, URLs, and metadata information.
  provider: smugmug
  endpoint: /albums/{id}/images
  method: GET
  scopes: []
  tags:
    - images
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_image
  name: Get Image
  description: |
    Get detailed information about a specific image including its dimensions, file size, and camera metadata.
  provider: smugmug
  endpoint: /images/{id}
  method: GET
  scopes: []
  tags:
    - images
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: upload_image
  name: Upload Image
  description: |
    Upload an image to a Smugmug album. The image is stored and added to the specified album.
  provider: smugmug
  endpoint: /albums/{id}/images
  method: POST
  scopes: []
  tags:
    - images
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_user
  name: Get User
  description: |
    Get user profile information for Smugmug. Returns display name, profile URL, and album statistics.
  provider: smugmug
  endpoint: /user/{id}
  method: GET
  scopes: []
  tags:
    - user
    - profile
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_folders
  name: List Folders
  description: |
    List all folders in Smugmug. Returns folder names, subfolder counts, and album associations.
  provider: smugmug
  endpoint: /folders/{id}
  method: GET
  scopes: []
  tags:
    - folders
    - storage
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: create_album
  name: Create Album
  description: |
    Create a new album in Smugmug. Sets the album name, description, theme, and privacy settings.
  provider: smugmug
  endpoint: /albums
  method: POST
  scopes: []
  tags:
    - albums
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: update_album
  name: Update Album
  description: |
    Update album settings in Smugmug. Modifies the album name, description, privacy, or customization options.
  provider: smugmug
  endpoint: /albums/{id}
  method: PUT
  scopes: []
  tags:
    - albums
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: delete_image
  name: Delete Image
  description: |
    Delete an image from Smugmug. Removes the image file from its album and moves it to trash.
  provider: smugmug
  endpoint: /images/{id}
  method: DELETE
  scopes: []
  tags:
    - images
    - photos
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

