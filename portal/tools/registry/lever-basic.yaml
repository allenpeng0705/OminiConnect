# Lever Basic Auth Tools - Allowlist
# Curated subset of Lever API for AI agent use.
# BASIC Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lever_basic_list_opportunities - List opportunities
# 2. lever_basic_get_opportunity  - Get opportunity details
# 3. lever_basic_list_offers      - List offers
# 4. lever_basic_get_offer       - Get offer details
# 5. lever_basic_list_users      - List users
# 6. lever_basic_get_user       - Get user details
# 7. lever_basic_list_jobs       - List jobs
# 8. lever_basic_get_job        - Get job details
# 9. lever_basic_list_stages    - List stages
# 10. lever_basic_list_notes    - List notes

- slug: lever_basic_list_opportunities
  name: List Opportunities
  description: |
    List all candidate opportunities in your Lever account. Returns opportunity IDs, candidate names, stages, and statuses for each candidate opportunity.
  provider: lever-basic
  endpoint: /v1/opportunities
  method: GET
  scopes: []
  tags:
    - opportunities
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing opportunities
    properties:
      stage:
        type: string
        description: "Filter by stage"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: lever_basic_get_opportunity
  name: Get Opportunity
  description: |
    Get detailed information about a specific Lever opportunity by its ID. Returns the candidate profile, stage, interview history, and all associated notes.
  provider: lever-basic
  endpoint: /v1/opportunities/{opportunity_id}
  method: GET
  scopes: []
  tags:
    - opportunities
    - read
  input_schema:
    type: object
    description: Parameters for getting an opportunity
    properties:
      opportunity_id:
        type: string
        description: "Opportunity ID"
    required:
      - opportunity_id

