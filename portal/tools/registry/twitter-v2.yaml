# Twitter V2 Tools - Allowlist
# Curated subset of Twitter V2 API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. twitter_list_tweets           - List tweets from timeline
# # 2. twitter_get_tweet           - Get tweet details
# # 3. twitter_create_tweet           - Post a new tweet
# # 4. twitter_delete_tweet           - Delete a tweet
# # 5. twitter_list_users           - List Twitter users
# # 6. twitter_get_user           - Get user profile
# # 7. twitter_search_tweets           - Search for tweets
# # 8. twitter_get_followers           - Get user followers
# # 9. twitter_get_following           - Get users followed by a user
# # 10. twitter_retweet           - Retweet a tweet

- slug: twitter_list_tweets
  name: List Tweets
  description: |
    List tweets from timeline
  provider: twitter-v2
  endpoint: /2/tweets
  method: GET
  scopes:
    - tweet.read
  tags:
    - twitter-v2
  input_schema:
    type: object
    description: Parameters for list tweets
    properties: {}
    required: []

- slug: twitter_get_tweet
  name: Get Tweet
  description: |
    Get tweet details
  provider: twitter-v2
  endpoint: /2/tweets/{id}
  method: GET
  scopes:
    - tweet.read
  tags:
    - twitter-v2
  input_schema:
    type: object
    description: Parameters for get tweet
    properties: {}
    required: []

- slug: twitter_create_tweet
  name: Create Tweet
  description: |
    Post a new tweet
  provider: twitter-v2
  endpoint: /2/tweets
  method: POST
  scopes:
    - tweet.write
  tags:
    - twitter-v2
  input_schema:
    type: object
    description: Parameters for create tweet
    properties: {}
    required: []

- slug: twitter_delete_tweet
  name: Delete Tweet
