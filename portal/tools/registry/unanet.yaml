# Unanet Tools - Allowlist
# Curated subset of Unanet API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. unanet_list_projects           - List all projects
# # 2. unanet_get_project           - Get project details
# # 3. unanet_list_tasks           - List all tasks
# # 4. unanet_get_task           - Get task details
# # 5. unanet_list_resources           - List all resources/people
# # 6. unanet_get_resource           - Get resource details
# # 7. unanet_list_timesheets           - List timesheets
# # 8. unanet_submit_timesheet           - Submit a timesheet
# # 9. unanet_list_clients           - List all clients
# # 10. unanet_get_client           - Get client details

- slug: unanet_list_projects
  name: List unanet Projects
  description: |
    List all projects
  provider: unanet
  endpoint: /api/v1/projects
  method: GET
  scopes:
    - read
  tags:
    - unanet
  input_schema:
    type: object
    description: Parameters for list projects
    properties: {}
    required: []

- slug: unanet_get_project
  name: Get unanet Project
