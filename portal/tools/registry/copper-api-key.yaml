    description: Parameters for listing tasks
    properties:
      page_size:
        type: integer
        description: "Number of results per page (default 20, max 200)"
        default: 20
      page_number:
        type: integer
        description: "Page number"
        default: 1
      status:
        type: string
        description: "Filter by status: open, completed"
    required: []

- slug: copper_api_key_get_task
  name: Get copper-api-key Task
  description: |
    Get details of a specific Copper CRM task including its title, description, assignee, and due date.
  provider: copper-api-key
  endpoint: /v1/tasks/{id}
  method: GET
  scopes: []
