# Copper Tools - Allowlist
# Curated subset of the Copper CRM API for AI agent use.
# API_KEY auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. copper_api_key_list_accounts      - List all accounts
# 2. copper_api_key_get_account        - Get a specific account
# 3. copper_api_key_list_contacts     - List all contacts
# 4. copper_api_key_get_contact       - Get a specific contact
# 5. copper_api_key_create_contact    - Create a new contact
# 6. copper_api_key_list_opportunities - List all opportunities
# 7. copper_api_key_get_opportunity   - Get a specific opportunity
# 8. copper_api_key_create_opportunity - Create a new opportunity
# 9. copper_api_key_list_tasks        - List all tasks
# 10. copper_api_key_get_task          - Get a specific task

- slug: copper_api_key_list_accounts
  name: List copper-api-key Accounts
  description: |
    List all accounts in Copper CRM, returning account IDs, names, locations, and industry information.
  provider: copper-api-key
  endpoint: /v1/accounts
  method: GET
  scopes: []
  tags:
    - crm
    - accounts
    - list
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      page_size:
        type: integer
        description: "Number of results per page (default 20, max 200)"
        default: 20
      page_number:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: copper_api_key_get_account
  name: Get copper-api-key Account
  description: |
    Get details of a specific Copper CRM account including its profile, contacts, and opportunity associations.
  provider: copper-api-key
  endpoint: /v1/accounts/{id}
  method: GET
  scopes: []
  tags:
    - crm
    - accounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      id:
        type: integer
        description: "Account ID"
    required:
      - id

- slug: copper_api_key_list_contacts
  name: List copper-api-key Contacts
  description: |
    List all contacts in Copper CRM, returning contact IDs, names, email addresses, and phone numbers.
  provider: copper-api-key
  endpoint: /v1/contacts
  method: GET
  scopes: []
  tags:
    - crm
    - contacts
    - list
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page_size:
        type: integer
        description: "Number of results per page (default 20, max 200)"
        default: 20
      page_number:
        type: integer
        description: "Page number"
        default: 1
      sort_by:
        type: string
        description: "Sort field: name, email_address, date_modified"
        default: date_modified
    required: []

- slug: copper_api_key_get_contact
  name: Get copper-api-key Contact
  description: |
    Get details of a specific Copper CRM contact including their profile, company association, and communication history.
  provider: copper-api-key
  endpoint: /v1/contacts/{id}
  method: GET
  scopes: []
  tags:
    - crm
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: copper_api_key_create_contact
  name: Create Contact
  description: |
    Create a new contact in Copper CRM, specifying the name, email, phone, and optional company association.
  provider: copper-api-key
  endpoint: /v1/contacts
  method: POST
  scopes: []
  tags:
    - crm
    - contacts
    - create
  input_schema:
    type: object
    description: Contact creation parameters
    properties:
      name:
        type: string
        description: "Contact name (required)"
      email:
        type: string
        description: "Contact email address"
      phone:
        type: string
        description: "Contact phone number"
      company_id:
        type: integer
        description: "Associated account ID"
    required:
      - name

- slug: copper_api_key_list_opportunities
  name: List Opportunities
  description: |
    List all opportunities in Copper CRM, returning opportunity IDs, names, values, pipeline stages, and status.
  provider: copper-api-key
  endpoint: /v1/opportunities
  method: GET
  scopes: []
  tags:
    - crm
    - opportunities
    - deals
    - list
  input_schema:
    type: object
    description: Parameters for listing opportunities
    properties:
      page_size:
        type: integer
        description: "Number of results per page (default 20, max 200)"
        default: 20
      page_number:
        type: integer
        description: "Page number"
        default: 1
      status:
        type: string
        description: "Filter by status: open, won, lost"
    required: []

- slug: copper_api_key_get_opportunity
  name: Get Opportunity
  description: |
    Get details of a specific Copper CRM opportunity including its name, value, pipeline stage, and associated contacts.
  provider: copper-api-key
  endpoint: /v1/opportunities/{id}
  method: GET
  scopes: []
  tags:
    - crm
    - opportunities
    - deals
    - read
  input_schema:
    type: object
    description: Parameters for getting an opportunity
    properties:
      id:
        type: integer
        description: "Opportunity ID"
    required:
      - id

- slug: copper_api_key_create_opportunity
  name: Create Opportunity
  description: |
    Create a new opportunity in Copper CRM, specifying the name, pipeline ID, owner, and monetary value.
  provider: copper-api-key
  endpoint: /v1/opportunities
  method: POST
  scopes: []
  tags:
    - crm
    - opportunities
    - deals
    - create
  input_schema:
    type: object
    description: Opportunity creation parameters
    properties:
      name:
        type: string
        description: "Opportunity name (required)"
      pipeline_id:
        type: integer
        description: "Pipeline ID (required)"
      assigned_to_user_id:
        type: integer
        description: "Owner user ID"
      monetary_value:
        type: number
        description: "Deal value"
      customer_source:
        type: string
        description: "Lead source"
    required:
      - name
      - pipeline_id

- slug: copper_api_key_list_tasks
  name: List copper-api-key Tasks
  description: |
