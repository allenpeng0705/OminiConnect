# Oracle Fusion Cloud (HCM) Tools - Allowlist
# Curated subset of Oracle HCM REST API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. oracle_list_workers              - List workers
# 2. oracle_get_worker               - Get worker details
# 3. oracle_list_departments         - List departments
# 4. oracle_list_jobs                - List jobs
# 5. oracle_list_locations           - List locations
# 6. oracle_list_absences            - List absences
# 7. oracle_list_salaries           - List salary data
# 8. oracle_list_performance        - List performance records
# 9. oracle_list_leave_requests     - List leave requests
# 10. oracle_get_person            - Get person details

- slug: oracle_list_workers
  name: List Workers
  description: |
    List all workers in Oracle HCM.
  provider: oracle-hcm
  endpoint: /hcm/v1/workers
  method: GET
  scopes:
    - workers:read
  tags:
    - hcm
    - workers
    - directory
  input_schema:
    type: object
    description: Parameters for listing workers
    properties:
      limit:
        type: integer
        description: "Number of workers"
        default: 20
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: oracle_get_worker
  name: Get Worker
  description: |
    Get detailed information for a specific worker.
  provider: oracle-hcm
  endpoint: /hcm/v1/workers/{personId}
  method: GET
  scopes:
    - workers:read
  tags:
    - hcm
    - workers
    - read
  input_schema:
    type: object
    description: Parameters for getting a worker
    properties:
      personId:
        type: string
        description: "Person ID"
    required:
      - personId

