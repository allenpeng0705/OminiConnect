# Heroku Tools - Allowlist
# Curated subset of the Heroku Platform API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. heroku_list_apps       - List all apps
# 2. heroku_get_app         - Get a specific app
# 3. heroku_create_app      - Create a new app
# 4. heroku_delete_app      - Delete an app
# 5. heroku_list_dynos      - List dynos for an app
# 6. heroku_restart_dyno    - Restart a dyno
# 7. heroku_list_releases   - List releases for an app
# 8. heroku_get_release     - Get a specific release
# 9. heroku_list_config_vars - List config vars for an app
# 10. heroku_get_config_var  - Get a specific config var

- slug: heroku_list_apps
  name: List Apps
  description: |
    List all Heroku apps for the authenticated user with optional team filtering.
    Returns app names, regions, and stack information.
  provider: heroku
  endpoint: /apps
  method: GET
  scopes:
    - read
  tags:
    - apps
    - list
  input_schema:
    type: object
    description: Parameters for listing apps
    properties:
      team_id:
        type: string
        description: "Filter by team/owner ID"
      limit:
        type: integer
        description: "Maximum number of apps to return"
        default: 20
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: heroku_get_app
  name: Get App
  description: |
    Retrieve a specific Heroku app by ID with its region, stack, dynos, and add-ons.
    Returns full app configuration and status information.
  provider: heroku
  endpoint: /apps/{app_id}
  method: GET
  scopes:
    - read
  tags:
    - apps
    - read
  input_schema:
    type: object
    description: Parameters for getting an app
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
    required:
      - app_id

- slug: heroku_create_app
  name: Create App
  description: |
    Create a new Heroku app with specified name, region, and stack configuration.
    Returns the created app with its unique ID and settings.
  provider: heroku
  endpoint: /apps
  method: POST
  scopes:
    - write
  tags:
    - apps
    - create
  input_schema:
    type: object
    description: Parameters for creating an app
    properties:
      name:
        type: string
        description: "App name (optional, auto-generated if not provided)"
      region:
        type: string
        description: "Region: us or eu (default us)"
        enum: [us, eu]
      stack:
        type: string
        description: "Stack: heroku-20, heroku-22"
        enum: [heroku-20, heroku-22]
      team:
        type: string
        description: "Team to assign the app to"
    required: []

- slug: heroku_delete_app
  name: Delete App
  description: |
    Permanently delete a Heroku app and all its associated data.
    This destruction is irreversible and cannot be recovered.
  provider: heroku
  endpoint: /apps/{app_id}
  method: DELETE
  scopes:
    - write
  tags:
    - apps
    - delete
  input_schema:
    type: object
    description: Parameters for deleting an app
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
    required:
      - app_id

- slug: heroku_list_dynos
  name: List Dynos
  description: |
    Retrieve all running dynos for a specific Heroku app.
    Returns dyno types, current state, and uptime metrics.
  provider: heroku
  endpoint: /apps/{app_id}/dynos
  method: GET
  scopes:
    - read
  tags:
    - dynos
    - list
  input_schema:
    type: object
    description: Parameters for listing dynos
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
    required:
      - app_id

- slug: heroku_restart_dyno
  name: Restart Dyno
  description: |
    Restart a specific dyno or all dynos of a Heroku app.
    Triggers a graceful restart of the specified process.
  provider: heroku
  endpoint: /apps/{app_id}/dynos/{dyno_id}/actions/restart
  method: POST
  scopes:
    - write
  tags:
    - dynos
    - restart
  input_schema:
    type: object
    description: Parameters for restarting a dyno
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
      dyno_id:
        type: string
        description: "Dyno name (e.g., web.1) or 'all' to restart all dynos (required)"
    required:
      - app_id
      - dyno_id

- slug: heroku_list_releases
  name: List Releases
  description: |
    Retrieve all releases for a Heroku app with version numbers and deploy dates.
    Returns release history including descriptions and deployment order.
  provider: heroku
  endpoint: /apps/{app_id}/releases
  method: GET
  scopes:
    - read
  tags:
    - releases
    - list
  input_schema:
    type: object
    description: Parameters for listing releases
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
    required:
      - app_id

- slug: heroku_get_release
  name: Get Release
  description: |
    Retrieve a specific Heroku release by version or ID with its slug and notes.
    Returns deployment details and created timestamp.
  provider: heroku
  endpoint: /apps/{app_id}/releases/{release_id}
  method: GET
  scopes:
    - read
  tags:
    - releases
    - read
  input_schema:
    type: object
    description: Parameters for getting a release
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
      release_id:
        type: string
        description: "Release version (e.g., v1, v2) or release ID (required)"
    required:
      - app_id
      - release_id

- slug: heroku_list_config_vars
  name: List Config Vars
  description: |
    Retrieve all environment variables for a Heroku app.
    Returns configuration key-value pairs for the app's environment.
  provider: heroku
  endpoint: /apps/{app_id}/config-vars
  method: GET
  scopes:
    - read
  tags:
    - config
    - list
  input_schema:
    type: object
    description: Parameters for listing config vars
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
    required:
      - app_id

- slug: heroku_get_config_var
  name: Get Config Var
  description: |
    Retrieve a single environment variable value for a Heroku app.
    Returns the configuration value for the specified key.
  provider: heroku
  endpoint: /apps/{app_id}/config-vars/{key}
  method: GET
  scopes:
    - read
  tags:
    - config
    - read
  input_schema:
    type: object
    description: Parameters for getting a config var
    properties:
      app_id:
        type: string
        description: "App name or ID (required)"
      key:
        type: string
        description: "Config var key (required)"
    required:
      - app_id
      - key
