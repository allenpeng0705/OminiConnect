# Sophos Central Tools - Allowlist
# Curated subset of Sophos Central API for AI agent use.
# Auth mode: OAUTH2_CC.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_alerts                               - Get security alerts
# 2. get_endpoints                            - List all endpoints
# 3. get_endpoint                             - Get endpoint details
# 4. get_tenant_info                          - Get tenant information
# 5. list_users                               - List directory users
# 6. list_groups                              - List directory groups
# 7. get_web_logs                             - Get web filtering logs
# 8. get_scan_results                         - Get scan results
# 9. get_firewall_rules                       - List firewall rules
# 10. get_lockdowns                            - List endpoint lockdowns

- slug: get_alerts
  name: Get Alerts
  description: |
    Get all security alerts from Sophos Central. Returns alert details including severity, affected endpoints, and recommended actions.
  provider: sophos-central
  endpoint: /alerts
  method: GET
  scopes: []
  tags:
    - alerts
    - security
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_endpoints
  name: Get Endpoints
  description: |
    List all endpoints managed by Sophos Central. Returns device names, operating systems, protection status, and health information.
  provider: sophos-central
  endpoint: /endpoints
  method: GET
  scopes: []
  tags:
    - endpoints
    - devices
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_endpoint
  name: Get Endpoint
  description: |
    Get detailed information about a specific endpoint including its protection status, installed agents, and last scan results.
  provider: sophos-central
  endpoint: /endpoints/{id}
  method: GET
  scopes: []
  tags:
    - endpoints
    - devices
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

