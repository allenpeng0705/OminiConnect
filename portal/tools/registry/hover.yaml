# Hover Tools - Allowlist
# Curated subset of Hover API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. hover_list_projects          - List projects
# 2. hover_get_project            - Get project details
# 3. hover_list_captures          - List captures
# 4. hover_get_capture            - Get capture details
# 5. hover_list_users             - List users
# 6. hover_get_user               - Get user details
# 7. hover_list_devices           - List devices
# 8. hover_get_device             - Get device details
# 9. hover_list_alerts            - List alerts
# 10. hover_list_locations         - List locations

- slug: hover_list_projects
  name: List hover Projects
  description: |
    List all projects in your Hover account with status tracking. Returns project names, addresses, creation dates, and completion status.
  provider: hover
  endpoint: /api/v1/projects
  method: GET
  scopes:
    - all
  tags:
    - projects
    - list
  input_schema:
    type: object
    description: Parameters for listing projects
    properties: {}
    required: []

- slug: hover_get_project
  name: Get hover Project
  description: |
    Get a specific Hover project by ID with full details and associated captures. Returns project information including location, status, and media attachments.
  provider: hover
  endpoint: /api/v1/projects/{id}
  method: GET
  scopes:
    - all
  tags:
    - projects
    - read
  input_schema:
    type: object
    description: Parameters for getting a project
    properties:
      id:
        type: integer
        description: "Project ID"
    required:
      - id

- slug: hover_list_captures
  name: List Captures
  description: |
    List all captures in your Hover account with optional project filtering. Returns capture types, timestamps, and associated media URLs.
  provider: hover
  endpoint: /api/v1/captures
  method: GET
  scopes:
    - all
  tags:
    - captures
    - list
  input_schema:
    type: object
    description: Parameters for listing captures
    properties:
      project_id:
        type: integer
        description: "Filter by project ID"
    required: []

- slug: hover_get_capture
  name: Get Capture
  description: |
    Get a specific Hover capture by ID with full media content and metadata. Returns capture details including images, measurements, and annotations.
  provider: hover
  endpoint: /api/v1/captures/{id}
  method: GET
  scopes:
    - all
  tags:
    - captures
    - read
  input_schema:
    type: object
    description: Parameters for getting a capture
    properties:
      id:
        type: integer
        description: "Capture ID"
    required:
      - id

