- slug: smartsheet_list_sheets
  name: List Sheets
  description: |
    List all sheets accessible to the user with pagination. Returns sheet names, owners, modification dates, and workspace locations for spreadsheet organization.
  provider: smartsheet
  endpoint: /sheets
  method: GET
  scopes:
    - READ_SHEETS
  tags:
    - sheets
    - list
  input_schema:
    type: object
    description: Parameters for listing sheets
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      pageSize:
        type: integer
        description: "Number of results per page (default: 100, max: 1000)"
      modifiedSince:
        type: string
        description: "Return sheets modified since this timestamp (ISO 8601 format)"
    required: []

- slug: smartsheet_get_sheet
  name: Get Sheet
  description: |
    Get details of a specific Smartsheet including column definitions, row count, and cell data. Returns sheet structure for data analysis and collaboration setup.
  provider: smartsheet
  endpoint: /sheets/{sheetId}
  method: GET
  scopes:
    - READ_SHEETS
  tags:
    - sheets
    - read
  input_schema:
    type: object
    description: Parameters for getting a sheet
    properties:
      sheetId:
        type: integer
        description: "The ID of the sheet to retrieve"
      include:
        type: string
        description: "Comma-separated list of optional data to include (data, columnType, filters, rules, ownerInfo, discussions, attachments)"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of rows per page"
    required:
      - sheetId

- slug: smartsheet_create_sheet
  name: Create Sheet
  description: |
    Create a new sheet in Smartsheet with defined column structure and name. Returns the created sheet with its ID for data entry and collaboration.
  provider: smartsheet
  endpoint: /sheets
  method: POST
  scopes:
    - CREATE_SHEETS
  tags:
    - sheets
    - create
  input_schema:
    type: object
    description: Parameters for creating a sheet
    properties:
      name:
        type: string
        description: "Name of the new sheet"
      columns:
        type: array
        description: "Array of column definitions"
        items:
          type: object
          properties:
            title:
              type: string
              description: "Column title"
            type:
              type: string
              description: "Column type (TEXT_NUMBER, DATE, DATETIME, CONTACT, CHECKBOX, DROP_DOWN, etc.)"
            primary:
              type: boolean
              description: "Whether this is the primary column"
      workspaceId:
        type: integer
        description: "ID of the workspace to create the sheet in"
      folderId:
        type: integer
        description: "ID of the folder to create the sheet in"
    required:
      - name
      - columns

- slug: smartsheet_list_rows
  name: List Rows
  description: |
    List all rows from a specific Smartsheet including cell values, row IDs, and position information. Returns row data for export and analysis.
  provider: smartsheet
  endpoint: /sheets/{sheetId}/rows
  method: GET
  scopes:
    - READ_SHEETS
  tags:
    - rows
    - list
  input_schema:
    type: object
    description: Parameters for listing rows
    properties:
      sheetId:
        type: integer
        description: "The ID of the sheet"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of results per page"
      include:
        type: string
        description: "Include additional data (attachments, discussions, filters, rules)"
      modifiedSince:
        type: string
        description: "Return rows modified since this timestamp"
    required:
      - sheetId

- slug: smartsheet_get_row
  name: Get Row
  description: |
    Get details of a specific Smartsheet row including cell values, hierarchy level, and parent relationships. Returns row data for inspection and updates.
  provider: smartsheet
  endpoint: /sheets/{sheetId}/rows/{rowId}
  method: GET
  scopes:
    - READ_SHEETS
  tags:
    - rows
    - read
  input_schema:
    type: object
    description: Parameters for getting a row
    properties:
      sheetId:
        type: integer
        description: "The ID of the parent sheet"
      rowId:
        type: integer
        description: "The ID of the row to retrieve"
      include:
        type: string
        description: "Include additional data (attachments, discussions, filters)"
    required:
      - sheetId
      - rowId

- slug: smartsheet_add_row
  name: Add Row
  description: |
    Create one or more rows in a Smartsheet with specified cell values and position placement. Returns confirmation with row IDs for further manipulation and data entry.
  provider: smartsheet
  endpoint: /sheets/{sheetId}/rows
  method: POST
  scopes:
    - WRITE_SHEETS
  tags:
    - rows
    - create
  input_schema:
    type: object
    description: Parameters for adding a row
    properties:
      sheetId:
        type: integer
        description: "The ID of the sheet"
      rows:
        type: array
        description: "Array of row objects to add"
        items:
          type: object
          properties:
            toBottom:
              type: boolean
              description: "Add row at the bottom of the sheet"
            parentId:
              type: integer
              description: "Parent row ID for hierarchical sheets"
            cells:
              type: array
              description: "Array of cell values"
    required:
      - sheetId
      - rows

- slug: smartsheet_update_row
  name: Update Row
  description: |
    Update an existing row in a Smartsheet with new cell values, lock status, or expansion state. Returns the updated row for confirmation.
  provider: smartsheet
  endpoint: /sheets/{sheetId}/rows/{rowId}
  method: PUT
  scopes:
    - WRITE_SHEETS
  tags:
    - rows
    - update
  input_schema:
    type: object
    description: Parameters for updating a row
    properties:
      sheetId:
        type: integer
        description: "The ID of the parent sheet"
      rowId:
        type: integer
        description: "The ID of the row to update"
      cells:
        type: array
        description: "Array of cell values to update"
      locked:
        type: boolean
        description: "Lock or unlock the row"
      expanded:
        type: boolean
        description: "Expand or collapse the row"
    required:
      - sheetId
      - rowId
      - cells

- slug: smartsheet_list_columns
  name: List Columns
  description: |
    List all columns from a Smartsheet including column names, types, and option values. Returns column metadata for schema inspection and data modeling.
  provider: smartsheet
  endpoint: /sheets/{sheetId}/columns
  method: GET
  scopes:
    - READ_SHEETS
  tags:
    - columns
    - list
  input_schema:
    type: object
    description: Parameters for listing columns
    properties:
      sheetId:
        type: integer
        description: "The ID of the sheet"
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of results per page"
    required:
      - sheetId

- slug: smartsheet_get_column
  name: Get Column
  description: |
    Get details of a specific Smartsheet column including type, options, and validation rules. Returns column data for form building and validation setup.
  provider: smartsheet
  endpoint: /sheets/{sheetId}/columns/{columnId}
  method: GET
  scopes:
    - READ_SHEETS
  tags:
    - columns
    - read
  input_schema:
    type: object
    description: Parameters for getting a column
    properties:
      sheetId:
        type: integer
        description: "The ID of the parent sheet"
      columnId:
        type: integer
        description: "The ID of the column to retrieve"
    required:
      - sheetId
      - columnId

- slug: smartsheet_list_users
  name: List Users
  description: |
    List all users in the Smartsheet organization with pagination. Returns names, email addresses, and permission levels for access management.
  provider: smartsheet
  endpoint: /users
  method: GET
  scopes:
    - ADMIN_USERS
  tags:
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page:
        type: integer
        description: "Page number for pagination"
      pageSize:
        type: integer
        description: "Number of results per page"
      email:
        type: string
        description: "Filter by email address"
    required: []
