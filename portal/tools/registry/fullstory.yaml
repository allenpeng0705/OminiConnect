- slug: fullstory_search_sessions
  name: Search Sessions
  description: |
    Search for sessions matching specific criteria and filters.
    Returns session IDs, user IDs, and timestamps for each matching session.
    Use this to discover user sessions and investigate behavior issues.
  provider: fullstory
  endpoint: /v1/sessions/search
  method: POST
  scopes:
    - sessions:read
  tags:
    - sessions
    - search
  input_schema:
    type: object
    description: Parameters for searching sessions
    properties:
      query:
        type: string
        description: "Search query for session filtering"
      filters:
        type: object
        description: "Additional filters for session search"
      limit:
        type: integer
        description: "Maximum number of sessions to return"
    required:
      - query

