# Lever Tools - Allowlist
# Curated subset of the Lever API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. lever_list_opportunities      - List candidate opportunities
# 2. lever_get_opportunity        - Get opportunity details
# 3. lever_create_opportunity     - Create new opportunity
# 4. lever_update_opportunity     - Update opportunity fields
# 5. lever_list_offers            - List offers for opportunities
# 6. lever_get_offer             - Get offer details
# 7. lever_create_offer          - Create an offer
# 8. lever_list_users            - List team members
# 9. lever_get_user              - Get user profile
# 10. lever_list_feedback        - List interview feedback

- slug: lever_list_opportunities
  name: List Opportunities
  description: |
    List all candidate opportunities in your Lever account. Returns opportunity IDs, candidate names, stages, statuses, and owners for each candidate opportunity.
  provider: lever
  endpoint: /opportunities
  method: GET
  scopes:
    - opportunities:read
  tags:
    - opportunities
    - candidates
    - recruiting
  input_schema:
    type: object
    description: Parameters for listing opportunities
    properties:
      stage:
        type: string
        description: "Filter by stage name"
      status:
        type: string
        description: "Filter by status: active, archived, rejected"
      tags:
        type: array
        items:
          type: string
        description: "Filter by tags"
      limit:
        type: integer
        description: "Number of results (default 100)"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: lever_get_opportunity
  name: Get Opportunity
  description: |
    Get detailed information about a specific Lever opportunity by its ID. Returns the candidate profile, stage, interview history, offers, and all associated notes.
  provider: lever
  endpoint: /opportunities/{opportunity_id}
  method: GET
  scopes:
    - opportunities:read
  tags:
    - opportunities
    - candidates
    - recruiting
  input_schema:
    type: object
    description: Parameters for getting an opportunity
    properties:
      opportunity_id:
        type: string
        description: "Opportunity ID"
    required:
      - opportunity_id

- slug: lever_create_opportunity
  name: Create Opportunity
  description: |
    Create a new candidate opportunity in Lever. Specify the candidate name, email, phone, and initial stage. Creates the opportunity and returns it with its unique ID.
  provider: lever
  endpoint: /opportunities
  method: POST
  scopes:
    - opportunities:write
  tags:
    - opportunities
    - candidates
    - create
  input_schema:
    type: object
    description: Opportunity creation parameters
    properties:
      name:
        type: string
        description: "Candidate name (required)"
      emails:
        type: array
        items:
          type: string
        description: "Array of email addresses"
      phone:
        type: string
        description: "Phone number"
      stage:
        type: string
        description: "Initial stage name"
        default: Applied
      owner:
        type: string
        description: "Owner user ID"
      tags:
        type: array
        items:
          type: string
        description: "Array of tag names"
    required:
      - name

- slug: lever_update_opportunity
  name: Update Opportunity
  description: |
    Update an existing Lever opportunity to move it to a different stage, change its status, reassign the owner, or add notes. Returns the updated opportunity confirming all changes were applied.
  provider: lever
  endpoint: /opportunities/{opportunity_id}
  method: PUT
  scopes:
    - opportunities:write
  tags:
    - opportunities
    - update
    - candidates
  input_schema:
    type: object
    description: Opportunity update parameters
    properties:
      opportunity_id:
        type: string
        description: "Opportunity ID"
      stage:
        type: string
        description: "Move to a different stage"
      status:
        type: string
        description: "Update status: active, archived"
      owner:
        type: string
        description: "Assign to a different owner"
      tags:
        type: array
        items:
          type: string
        description: "Update tags"
      notes:
        type: string
        description: "Add a note"
    required:
      - opportunity_id

- slug: lever_list_offers
  name: List Offers
  description: |
    List all offers in your Lever account. Returns offer IDs, amounts, statuses, conditions, and associated opportunities for each offer.
  provider: lever
  endpoint: /offers
  method: GET
  scopes:
    - offers:read
  tags:
    - offers
    - recruiting
    - compensation
  input_schema:
    type: object
    description: Parameters for listing offers
    properties:
      opportunity_id:
        type: string
        description: "Filter by opportunity ID"
      status:
        type: string
        description: "Filter by status: draft, pending, approved, declined, etc."
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: lever_get_offer
  name: Get Offer
  description: |
    Get detailed information about a specific Lever offer by its ID. Returns the offer compensation details, start date, approval chain, and status history.
  provider: lever
  endpoint: /offers/{offer_id}
  method: GET
  scopes:
    - offers:read
  tags:
    - offers
    - recruiting
    - compensation
  input_schema:
    type: object
    description: Parameters for getting an offer
    properties:
      offer_id:
        type: string
        description: "Offer ID"
    required:
      - offer_id

- slug: lever_create_offer
  name: Create Offer
  description: |
    Create a new offer in Lever for a specific opportunity. Specify compensation details including salary, equity, and start date. Creates the offer and returns it with its unique ID and approval status.
  provider: lever
  endpoint: /offers
  method: POST
  scopes:
    - offers:write
  tags:
    - offers
    - create
    - recruiting
    - compensation
  input_schema:
    type: object
    description: Offer creation parameters
    properties:
      opportunity_id:
        type: string
        description: "Opportunity ID (required)"
      fields:
        type: object
        description: "Offer fields: compensation, start_date, etc. (required)"
    required:
      - opportunity_id
      - fields

- slug: lever_list_users
  name: List lever Users
  description: |
    List all team members in your Lever account. Returns user names, IDs, email addresses, titles, and team assignments for each team member.
  provider: lever
  endpoint: /users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - team
    - recruiting
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      email:
        type: string
        description: "Filter by email"
      name:
        type: string
        description: "Search by name"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required: []

- slug: lever_get_user
  name: Get lever User
  description: |
    Get detailed information about a specific Lever user by their ID. Returns the user's name, email, role, teams, and scheduling visibility settings.
  provider: lever
  endpoint: /users/{user_id}
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - team
    - profile
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: lever_list_feedback
  name: List Feedback
  description: |
    List all interview feedback for a specific Lever opportunity. Returns feedback IDs, scores, comments, and interviewer information for each feedback entry.
  provider: lever
  endpoint: /feedback
  method: GET
  scopes:
    - feedback:read
  tags:
    - feedback
    - interviews
    - candidates
  input_schema:
    type: object
    description: Parameters for listing feedback
    properties:
      opportunity_id:
        type: string
        description: "Opportunity ID (required)"
      limit:
        type: integer
        description: "Number of results"
        default: 100
      offset:
        type: integer
        description: "Offset for pagination"
        default: 0
    required:
      - opportunity_id
