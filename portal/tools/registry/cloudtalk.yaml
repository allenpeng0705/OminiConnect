# CloudTalk Tools - Allowlist
# Curated subset of the CloudTalk API for AI agent use.
# BASIC via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. cloudtalk_list_contacts              - List contacts
# 2. cloudtalk_get_contact               - Get contact details
# 3. cloudtalk_list_calls                - List calls
# 4. cloudtalk_get_call                  - Get call details
# 5. cloudtalk_list_agents               - List agents
# 6. cloudtalk_get_agent                - Get agent details
# 7. cloudtalk_list_campaigns            - List campaigns
# 8. cloudtalk_get_campaign             - Get campaign details
# 9. cloudtalk_list_call_history        - List call history
# 10. cloudtalk_get_call_recording     - Get call recording

- slug: cloudtalk_list_contacts
  name: List Contacts
  description: |
    List all contacts in CloudTalk, returning contact IDs, names, email addresses, and phone numbers.
  provider: cloudtalk
  endpoint: /contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: cloudtalk_get_contact
  name: Get Contact
  description: |
    Get details of a specific CloudTalk contact including their profile information and communication history.
  provider: cloudtalk
  endpoint: /contacts/{id}
  method: GET
  scopes: []
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: integer
        description: "Contact ID"
    required:
      - id

- slug: cloudtalk_list_calls
  name: List Calls
  description: |
    List all calls in CloudTalk, returning call IDs, participants, duration, and call status.
  provider: cloudtalk
  endpoint: /calls
  method: GET
  scopes: []
  tags:
    - calls
    - communication
  input_schema:
    type: object
    description: Parameters for listing calls
    properties:
      from_date:
        type: string
        description: "Start date"
      to_date:
        type: string
        description: "End date"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

