# Zoho Mail Tools - Allowlist
# Curated subset of Zoho Mail API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. zoho_mail_list_emails           - List emails in inbox
# # 2. zoho_mail_get_email           - Get email details
# # 3. zoho_mail_send_email           - Send an email
# # 4. zoho_mail_delete_email           - Delete an email
# # 5. zoho_mail_list_folders           - List all folders
# # 6. zoho_mail_list_contacts           - List all contacts
# # 7. zoho_mail_get_contact           - Get contact details
# # 8. zoho_mail_create_contact           - Create a new contact
# # 9. zoho_mail_list_signature           - Get email signature
# # 10. zoho_mail_search_emails           - Search for emails

- slug: zoho_mail_list_emails
  name: List Emails
  description: |
    List emails in inbox
  provider: zoho-mail
  endpoint: /api/v1/accounts/{account_id}/messages
  method: GET
  scopes:
    - read
  tags:
    - zoho-mail
  input_schema:
    type: object
    description: Parameters for list emails
    properties: {}
    required: []

