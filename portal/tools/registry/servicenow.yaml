- slug: servicenow_list_users
  name: List Users
  description: |
    List all users in ServiceNow with optional filtering by department, role, location, and active status. Returns user names, email addresses, departments, and role assignments for user management.
  provider: servicenow
  endpoint: /api/now/table/sys_user
  method: GET
  scopes:
    - user.read
  tags:
    - users
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      department:
        type: string
        description: "Department name"
      role:
        type: string
        description: "User role"
      active:
        type: boolean
        description: "Active status (default true)"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
    required: []

- slug: servicenow_get_user
  name: Get User
  description: |
    Get detailed information about a specific ServiceNow user by sys_id including name, email, department, manager, group memberships, and role assignments. Returns data for user management and access control.
  provider: servicenow
  endpoint: /api/now/table/sys_user/{sysId}
  method: GET
  scopes:
    - user.read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      sysId:
        type: string
        description: "User sys_id"
    required:
      - sysId
