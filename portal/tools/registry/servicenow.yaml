    List all IT change requests in ServiceNow with optional filtering by state, risk level, type, and assignment. Returns change numbers, titles, risk levels, approval statuses, and scheduled dates for change management.
  provider: servicenow
  endpoint: /api/now/table/change_request
  method: GET
  scopes:
