  tags:
    - changes
    - itsm
    - list
  input_schema:
    type: object
    description: Parameters for listing change requests
    properties:
      state:
        type: integer
        description: "Change state (1=new, 2=accepted, 3=in progress, 4=review, 5=closed)"
