  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of contacts"
        default: 50
    required: []

- slug: salesmsg_create_contact
  name: Create Contact
  description: |
    Create a new contact in Salesmsg.
  provider: salesmsg
  endpoint: /v1/contacts
  method: POST
  scopes:
    - contacts:write
  tags:
    - contacts
    - crm
    - sales
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      name:
        type: string
        description: "Contact name"
      phone:
        type: string
        description: "Phone number"
      email:
        type: string
        description: "Email address"
    required:
      - name
      - phone

