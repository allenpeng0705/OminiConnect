# Salesmsg Tools - Allowlist
# Curated subset of Salesmsg API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. salesmsg_list_conversations        - List all conversations
# 2. salesmsg_get_conversation         - Get conversation details
# 3. salesmsg_send_message             - Send a message
# 4. salesmsg_list_contacts            - List all contacts
# 5. salesmsg_create_contact           - Create a contact
# 6. salesmsg_list_templates           - List message templates
# 7. salesmsg_create_template          - Create a template
# 8. salesmsg_list_campaigns           - List campaigns
# 9. salesmsg_get_contact_messages     - Get contact message history
# 10. salesmsg_get_stats              - Get messaging stats

- slug: salesmsg_list_conversations
  name: List Conversations
  description: |
    Retrieve a list of all conversations in Salesmsg.
  provider: salesmsg
  endpoint: /v1/conversations
  method: GET
  scopes:
    - conversations:read
  tags:
    - conversations
    - messaging
    - sales
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      limit:
        type: integer
        description: "Number of conversations"
        default: 50
      status:
        type: string
        description: "Filter by status: open, closed"
    required: []

- slug: salesmsg_get_conversation
  name: Get Conversation
  description: |
    Get details of a specific conversation.
  provider: salesmsg
  endpoint: /v1/conversations/{conversationId}
  method: GET
  scopes:
    - conversations:read
  tags:
    - conversations
    - messaging
    - sales
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      conversationId:
        type: string
        description: "The conversation ID"
    required:
      - conversationId

- slug: salesmsg_send_message
  name: Send Message
  description: |
    Send a message to a contact.
  provider: salesmsg
  endpoint: /v1/messages
  method: POST
  scopes:
    - messages:write
  tags:
    - messages
    - messaging
    - sales
    - send
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      contactId:
        type: string
        description: "Contact ID"
      content:
        type: string
        description: "Message content"
    required:
      - contactId
      - content

- slug: salesmsg_list_contacts
