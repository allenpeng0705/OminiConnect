# HighLevel White Label Tools - Allowlist
# Curated subset of HighLevel API for AI agent use.
# OAuth2 via Nango (LeadConnector).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. highlevel_list_contacts      - List contacts
# 2. highlevel_get_contact         - Get contact details
# 3. highlevel_list_opportunities - List opportunities
# 4. highlevel_get_opportunity     - Get opportunity details
# 5. highlevel_list_tasks         - List tasks
# 6. highlevel_get_task            - Get task details
# 7. highlevel_list_appointments  - List appointments
# 8. highlevel_get_appointment     - Get appointment details
# 9. highlevel_list_campaigns     - List campaigns
# 10. highlevel_list_forms         - List forms

- slug: highlevel_list_contacts
  name: List Contacts
  description: |
    Retrieve all contacts in your HighLevel White Label account with pagination.
    Returns contact names, emails, and status information.
  provider: highlevel-white-label
  endpoint: /contacts
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - list
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: highlevel_get_contact
  name: Get Contact
  description: |
    Retrieve a specific HighLevel White Label contact by ID with profile and tags.
    Returns full contact details including pipeline and custom fields.
  provider: highlevel-white-label
  endpoint: /contacts/{id}
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      id:
        type: string
        description: "Contact ID"
    required:
      - id

- slug: highlevel_list_opportunities
  name: List Opportunities
  description: |
    Retrieve all opportunities in your HighLevel White Label account with optional pipeline filtering.
    Returns opportunity names, values, and pipeline stages.
  provider: highlevel-white-label
  endpoint: /opportunities
  method: GET
  scopes:
    - read
  tags:
    - opportunities
    - list
  input_schema:
    type: object
    description: Parameters for listing opportunities
    properties:
      pipeline_id:
        type: string
        description: "Filter by pipeline ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: highlevel_get_opportunity
  name: Get Opportunity
  description: |
    Retrieve a specific HighLevel White Label opportunity by ID with its contact association.
    Returns full opportunity details including stage and value.
  provider: highlevel-white-label
  endpoint: /opportunities/{id}
  method: GET
  scopes:
    - read
  tags:
    - opportunities
    - read
  input_schema:
    type: object
    description: Parameters for getting an opportunity
    properties:
      id:
        type: string
        description: "Opportunity ID"
    required:
      - id

- slug: highlevel_list_tasks
  name: List Tasks
  description: |
    Retrieve all tasks in your HighLevel White Label account with optional contact filtering.
    Returns task titles, statuses, and assignee information.
  provider: highlevel-white-label
  endpoint: /tasks
  method: GET
  scopes:
    - read
  tags:
    - tasks
    - list
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      contact_id:
        type: string
        description: "Filter by contact ID"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: highlevel_get_task
  name: Get Task
  description: |
    Retrieve a specific HighLevel White Label task by ID with its details.
    Returns task description, due date, and status information.
  provider: highlevel-white-label
  endpoint: /tasks/{id}
  method: GET
  scopes:
    - read
  tags:
    - tasks
    - read
  input_schema:
    type: object
    description: Parameters for getting a task
    properties:
      id:
        type: string
        description: "Task ID"
    required:
      - id

- slug: highlevel_list_appointments
  name: List Appointments
  description: |
    Retrieve all appointments in your HighLevel White Label account with date filtering.
    Returns appointment times, statuses, and service types.
  provider: highlevel-white-label
  endpoint: /appointments
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - list
  input_schema:
    type: object
    description: Parameters for listing appointments
    properties:
      start_date:
        type: string
        description: "Start date (YYYY-MM-DD)"
      end_date:
        type: string
        description: "End date (YYYY-MM-DD)"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: highlevel_get_appointment
  name: Get Appointment
  description: |
    Retrieve a specific HighLevel White Label appointment by ID with attendees.
    Returns full appointment details including location and notes.
  provider: highlevel-white-label
  endpoint: /appointments/{id}
  method: GET
  scopes:
    - read
  tags:
    - appointments
    - read
  input_schema:
    type: object
    description: Parameters for getting an appointment
    properties:
      id:
        type: string
        description: "Appointment ID"
    required:
      - id

- slug: highlevel_list_campaigns
  name: List Campaigns
  description: |
    Retrieve all marketing campaigns in your HighLevel White Label account.
    Returns campaign names and current status.
  provider: highlevel-white-label
  endpoint: /campaigns
  method: GET
  scopes:
    - read
  tags:
