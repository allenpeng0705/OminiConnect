- slug: clarity_list_sessions
  name: List Sessions
  description: |
    List all user sessions for a Microsoft Clarity project, returning session IDs, duration, pages viewed, and device information.
  provider: clarity
  endpoint: /v1/sessions
  method: GET
  scopes:
    - sessions:read
  tags:
    - sessions
  input_schema:
    type: object
    description: Parameters for listing sessions
    properties:
      project_id:
        type: string
        description: "Microsoft Clarity project ID"
      limit:
        type: integer
        description: "Maximum number of sessions to return (default 50)"
      offset:
        type: integer
        description: "Offset for pagination"
    required:
      - project_id

- slug: clarity_get_session
  name: Get Session
  description: |
    Retrieve details of a specific Microsoft Clarity session including pages viewed, duration, device, and user ID.
  provider: clarity
  endpoint: /v1/sessions/{session_id}
  method: GET
  scopes:
    - sessions:read
  tags:
    - sessions
  input_schema:
    type: object
    description: Parameters for getting a session
    properties:
      session_id:
        type: string
        description: "Unique identifier of the session"
      project_id:
        type: string
        description: "Microsoft Clarity project ID"
    required:
      - session_id
      - project_id

- slug: clarity_list_events
