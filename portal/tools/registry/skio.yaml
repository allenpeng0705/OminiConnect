# Skio Tools - Allowlist
# Curated subset of Skio API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. get_products                             - List all subscription products
# 2. get_product                              - Get product details
# 3. list_subscriptions                       - List all subscriptions
# 4. get_subscription                         - Get subscription details
# 5. list_customers                           - List all customers
# 6. get_customer                             - Get customer details
# 7. list_orders                              - List all orders
# 8. get_order                                - Get order details
# 9. list_charges                             - List all charges
# 10. get_checkout                             - Get checkout session

- slug: get_products
  name: Get Products
  description: |
    List all subscription products in Skio. Returns product names, descriptions, pricing, and subscription plan options.
  provider: skio
  endpoint: /products
  method: GET
  scopes: []
  tags:
    - products
    - subscriptions
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: get_product
  name: Get skio Product
  description: |
    Get detailed information about a specific product including its variants, pricing, and subscription configuration.
  provider: skio
  endpoint: /products/{id}
  method: GET
  scopes: []
  tags:
    - products
    - subscriptions
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

- slug: list_subscriptions
