# Qualia Tools - Allowlist
# Curated subset of Qualia API for AI agent use.
# Basic Auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. qualia_list_transactions        - List transactions
# 2. qualia_get_transaction         - Get transaction details
# 3. qualia_list_orders             - List orders
# 4. qualia_get_order               - Get order details
# 5. qualia_list_documents          - List documents
# 6. qualia_get_document           - Get document details
# 7. qualia_list_contacts          - List contacts
# 8. qualia_get_contact            - Get contact details
# 9. qualia_list_products          - List products
# 10. qualia_get_company           - Get company info

- slug: qualia_list_transactions
  name: List qualia Transactions
  description: |
    List all financial transactions including amounts, dates, statuses, and associated contact information.
    Returns transaction records for accounting reconciliation and financial reporting.
  provider: qualia
  endpoint: /transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      status:
        type: string
        description: "Filter by status"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: qualia_get_transaction
  name: Get qualia Transaction
  description: |
    Retrieve detailed information about a specific transaction including amount, date, status, and line items.
    Returns transaction data for financial analysis and audit preparation.
  provider: qualia
  endpoint: /transactions/{transactionId}
  method: GET
  scopes: []
  tags:
    - transactions
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID"
    required:
      - transactionId

