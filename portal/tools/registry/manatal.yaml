    Get details of a specific job posting.
  provider: manatal
  endpoint: /jobs/{jobId}
  method: GET
  scopes: []
  tags:
    - jobs
    - read
  input_schema:
    type: object
    description: Parameters for getting a job
    properties:
      jobId:
        type: integer
        description: "Job ID"
    required:
