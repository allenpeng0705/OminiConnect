# Manatal Tools - Allowlist
# Curated subset of Manatal API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. manatal_list_candidates     - List all candidates
# 2. manatal_get_candidate       - Get candidate details
# 3. manatal_create_candidate   - Create a candidate
# 4. manatal_update_candidate   - Update a candidate
# 5. manatal_list_jobs          - List all job postings
# 6. manatal_get_job            - Get job details
# 7. manatal_create_job         - Create a job posting
# 8. manatal_list_departments   - List departments
# 9. manatal_get_department     - Get department details
# 10. manatal_list_offices      - List offices

- slug: manatal_list_candidates
  name: List Candidates
  description: |
    List all candidates in Manatal ATS.
    Filter by stage, job, or search query.
  provider: manatal
  endpoint: /users
  method: GET
  scopes: []
  tags:
    - candidates
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      stage_id:
        type: integer
        description: "Filter by stage ID"
      job_id:
        type: integer
        description: "Filter by job ID"
      search:
        type: string
        description: "Search query"
      page_size:
        type: integer
        description: "Results per page"
        default: 20
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: manatal_get_candidate
  name: Get Candidate
  description: |
    Get detailed information about a specific candidate.
  provider: manatal
  endpoint: /users/{userId}
  method: GET
  scopes: []
  tags:
    - candidates
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      userId:
        type: integer
        description: "Candidate user ID"
    required:
      - userId

- slug: manatal_create_candidate
  name: Create Candidate
  description: |
    Create a new candidate in Manatal.
  provider: manatal
  endpoint: /users
  method: POST
  scopes: []
  tags:
    - candidates
    - create
  input_schema:
    type: object
    description: Parameters for creating a candidate
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      phone:
        type: string
        description: "Phone number"
      job_id:
        type: integer
        description: "Associated job ID"
    required:
      - first_name
      - last_name
      - email

- slug: manatal_update_candidate
  name: Update Candidate
  description: |
    Update an existing candidate.
  provider: manatal
  endpoint: /users/{userId}
  method: PUT
  scopes: []
  tags:
    - candidates
    - update
  input_schema:
    type: object
    description: Parameters for updating a candidate
    properties:
      userId:
        type: integer
        description: "Candidate user ID"
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      phone:
        type: string
        description: "Phone number"
    required:
      - userId

- slug: manatal_list_jobs
  name: List Jobs
  description: |
    List all job postings in Manatal.
    Filter by status, department, or office.
  provider: manatal
  endpoint: /jobs
  method: GET
  scopes: []
  tags:
    - jobs
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Filter by status (open, closed, draft)"
      department_id:
        type: integer
        description: "Filter by department ID"
      office_id:
        type: integer
        description: "Filter by office ID"
      page_size:
        type: integer
        description: "Results per page"
        default: 20
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: manatal_get_job
  name: Get Job
