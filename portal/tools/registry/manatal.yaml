- slug: manatal_create_job
  name: Create Job
  description: |
    Create a new job posting in Manatal.
  provider: manatal
  endpoint: /jobs
  method: POST
  scopes: []
  tags:
    - jobs
    - create
  input_schema:
    type: object
    description: Parameters for creating a job
    properties:
      title:
        type: string
        description: "Job title"
      description:
        type: string
        description: "Job description"
      department_id:
        type: integer
        description: "Department ID"
      office_id:
        type: integer
        description: "Office ID"
      status:
        type: string
        description: "Job status (open, closed, draft)"
        default: open
    required:
      - title
      - description

