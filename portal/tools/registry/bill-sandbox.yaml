# Bill (Connect API Sandbox) Tools - Allowlist
# Curated subset of Bill Connect API for AI agent use.
# BILL auth via Nango.
# Sandbox environment at https://gateway.stage.bill.com/connect
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bill_sandbox_list_vendors          - List vendors
# 2. bill_sandbox_get_vendor           - Get vendor details
# 3. bill_sandbox_list_invoices        - List invoices
# 4. bill_sandbox_get_invoice          - Get invoice details
# 5. bill_sandbox_create_invoice       - Create an invoice
# 6. bill_sandbox_list_payments        - List payments
# 7. bill_sandbox_get_payment          - Get payment details
# 8. bill_sandbox_list_accounts       - List accounts
# 9. bill_sandbox_get_account          - Get account details
# 10. bill_sandbox_list_organizations  - List organizations

- slug: bill_sandbox_list_vendors
  name: List Vendors
  description: |
    List all vendors in the Bill sandbox account and return vendor names, IDs, and payment terms.
    Use this to discover vendors for testing accounts payable workflows.
  provider: bill-sandbox
  endpoint: /v3/vendors
  method: GET
  scopes: []
  tags:
    - vendors
    - payables
  input_schema:
    type: object
    description: Parameters for listing vendors
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Vendors per page"
        default: 20
    required: []

- slug: bill_sandbox_get_vendor
  name: Get Vendor
  description: |
    Get details for a specific vendor including address, contact information, and payment terms.
    Returns the complete vendor profile for sandbox testing.
  provider: bill-sandbox
  endpoint: /v3/vendors/{vendorId}
  method: GET
  scopes: []
  tags:
    - vendors
    - read
  input_schema:
    type: object
    description: Parameters for getting a vendor
    properties:
      vendorId:
        type: string
        description: "Vendor ID"
    required:
      - vendorId

- slug: bill_sandbox_list_invoices
  name: List bill-sandbox Invoices
  description: |
    List all invoices in the Bill sandbox and return invoice IDs, amounts, and status.
    Filter by status and vendor to test payable workflows.
  provider: bill-sandbox
  endpoint: /v3/invoices
  method: GET
  scopes: []
  tags:
    - invoices
    - payables
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status: APPROVED, PAID, etc."
      vendorId:
        type: string
        description: "Filter by vendor"
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Invoices per page"
        default: 20
    required: []

- slug: bill_sandbox_get_invoice
  name: Get bill-sandbox Invoice
  description: |
    Get details for a specific invoice including line items, amounts, and payment status.
    Returns the complete invoice data for sandbox testing.
  provider: bill-sandbox
  endpoint: /v3/invoices/{invoiceId}
  method: GET
  scopes: []
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      invoiceId:
        type: string
        description: "Invoice ID"
    required:
      - invoiceId

- slug: bill_sandbox_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice (vendor bill) in the sandbox environment with vendor, amount, dates, and description.
    Use this to test invoice creation workflows without affecting production data.
  provider: bill-sandbox
  endpoint: /v3/invoices
  method: POST
  scopes: []
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Parameters for creating an invoice
    properties:
      vendorId:
        type: string
        description: "Vendor ID"
      invoiceDate:
        type: string
        description: "Invoice date (YYYY-MM-DD)"
      dueDate:
        type: string
        description: "Due date (YYYY-MM-DD)"
      amount:
        type: number
        description: "Invoice amount"
      description:
        type: string
        description: "Invoice description"
    required:
      - vendorId
      - invoiceDate
      - dueDate
      - amount

- slug: bill_sandbox_list_payments
  name: List Payments
  description: |
    List all payments made in the sandbox and return payment IDs, amounts, and dates.
    Use this to test payment tracking without real financial impact.
  provider: bill-sandbox
  endpoint: /v3/payments
  method: GET
  scopes: []
  tags:
    - payments
    - payables
  input_schema:
    type: object
    description: Parameters for listing payments
    properties:
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Payments per page"
        default: 20
    required: []

- slug: bill_sandbox_get_payment
  name: Get Payment
  description: |
    Get details for a specific payment including amount, date, and vendor reference.
    Returns the complete payment record for sandbox reconciliation testing.
  provider: bill-sandbox
  endpoint: /v3/payments/{paymentId}
  method: GET
  scopes: []
  tags:
    - payments
    - read
  input_schema:
    type: object
    description: Parameters for getting a payment
    properties:
      paymentId:
        type: string
        description: "Payment ID"
    required:
      - paymentId

- slug: bill_sandbox_list_accounts
  name: List bill-sandbox Accounts
  description: |
    List all chart of accounts in the sandbox and return account names, types, and balances.
    Use this to discover accounts for testing general ledger workflows.
  provider: bill-sandbox
  endpoint: /v3/accounts
  method: GET
  scopes: []
  tags:
    - accounts
    - accounting
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      type:
        type: string
        description: "Filter by account type"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: bill_sandbox_get_account
  name: Get bill-sandbox Account
  description: |
    Get details for a specific account including type, balance, and transaction history.
    Returns the complete account data for sandbox accounting testing.
  provider: bill-sandbox
  endpoint: /v3/accounts/{accountId}
  method: GET
  scopes: []
  tags:
    - accounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      accountId:
        type: string
        description: "Account ID"
    required:
      - accountId

- slug: bill_sandbox_list_organizations
  name: List Organizations
  description: |
    List all organizations in the Bill sandbox account and return organization names and IDs.
    Use this to discover available organizations for multi-entity sandbox testing.
  provider: bill-sandbox
  endpoint: /v3/organizations
  method: GET
  scopes: []
  tags:
    - organizations
    - account
  input_schema:
    type: object
    description: Parameters for listing organizations
    properties: {}
    required: []
