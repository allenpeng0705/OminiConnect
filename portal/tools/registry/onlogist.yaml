- slug: onlogist_track_shipment
  name: Track Shipment
  description: |
    Track a shipment by tracking number.
  provider: onlogist
  endpoint: /api/shipments/{trackingNumber}/track
  method: GET
  scopes:
    - tracking:read
  tags:
    - logistics
    - tracking
    - shipments
  input_schema:
    type: object
    description: Parameters for tracking a shipment
    properties:
      trackingNumber:
        type: string
        description: "Tracking number"
    required:
      - trackingNumber
