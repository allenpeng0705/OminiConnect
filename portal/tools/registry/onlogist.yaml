# Onlogist Tools - Allowlist
# Curated subset of Onlogist API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. onlogist_list_orders             - List orders
# 2. onlogist_get_order              - Get order details
# 3. onlogist_create_order           - Create order
# 4. onlogist_update_order           - Update order
# 5. onlogist_list_bookings         - List bookings
# 6. onlogist_get_booking            - Get booking details
# 7. onlogist_create_booking         - Create booking
# 8. onlogist_list_carriers         - List carriers
# 9. onlogist_get_quote              - Get shipping quote
# 10. onlogist_track_shipment        - Track shipment

- slug: onlogist_list_orders
  name: List Orders
  description: |
    List all orders in Onlogist.
  provider: onlogist
  endpoint: /api/orders
  method: GET
  scopes:
    - orders:read
  tags:
    - logistics
    - orders
    - list
  input_schema:
    type: object
    description: Parameters for listing orders
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: onlogist_get_order
  name: Get Order
  description: |
    Get detailed information for a specific order.
  provider: onlogist
  endpoint: /api/orders/{id}
  method: GET
  scopes:
    - orders:read
  tags:
    - logistics
    - orders
    - read
  input_schema:
    type: object
    description: Parameters for getting an order
    properties:
      id:
        type: string
        description: "Order ID"
    required:
      - id

- slug: onlogist_create_order
  name: Create Order
  description: |
    Create a new order in Onlogist.
  provider: onlogist
  endpoint: /api/orders
  method: POST
  scopes:
    - orders:write
  tags:
    - logistics
    - orders
    - create
  input_schema:
    type: object
    description: Parameters for creating an order
    properties:
      origin_address:
        type: string
        description: "Origin address"
      destination_address:
        type: string
        description: "Destination address"
      weight:
        type: number
        description: "Package weight"
    required:
      - origin_address
      - destination_address

- slug: onlogist_update_order
  name: Update Order
  description: |
    Update an existing order.
  provider: onlogist
  endpoint: /api/orders/{id}
  method: PUT
  scopes:
    - orders:write
  tags:
    - logistics
    - orders
    - update
  input_schema:
    type: object
    description: Parameters for updating an order
    properties:
      id:
        type: string
        description: "Order ID"
      status:
        type: string
        description: "Order status"
    required:
      - id

