# PingOne Client Credentials Tools - Allowlist
# Curated subset of PingOne API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.
# NOTE: pingone-cc uses the same API endpoints as pingone - only auth is different.

# === TOOL LIST ===
# 1. pingone_cc_list_users              - List users
# 2. pingone_cc_get_user                - Get user details
# 3. pingone_cc_list_groups             - List groups
# 4. pingone_cc_get_group              - Get group details
# 5. pingone_cc_list_applications       - List applications
# 6. pingone_cc_get_application        - Get application details
# 7. pingone_cc_list_populations        - List populations
# 8. pingone_cc_get_population         - Get population details
# 9. pingone_cc_list_events            - List audit events
# 10. pingone_cc_get_environment       - Get environment info

- slug: pingone_cc_list_users
  name: List pingone-cc Users
  description: |
    List all users in the PingOne environment, including names, email addresses, population assignments, and account status values.
  provider: pingone-cc
  endpoint: /v1/users
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - list
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      populationId:
        type: string
        description: "Filter by population ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: pingone_cc_get_user
  name: Get pingone-cc User
  description: |
    Retrieve detailed information about a specific user, including their profile, email, population, group memberships, and authentication status.
  provider: pingone-cc
  endpoint: /v1/users/{userId}
  method: GET
  scopes: []
  tags:
    - users
    - identity
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID"
    required:
      - userId

