# Linear MCP Tools - Allowlist
# Curated subset of Linear MCP API for AI agent use.
# MCP_OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. linear_mcp_list_issues          - List issues
# 2. linear_mcp_get_issue           - Get issue details
# 3. linear_mcp_create_issue       - Create an issue
# 4. linear_mcp_update_issue       - Update an issue
# 5. linear_mcp_list_teams         - List teams
# 6. linear_mcp_get_team           - Get team details
# 7. linear_mcp_list_projects      - List projects
# 8. linear_mcp_get_project       - Get project details
# 9. linear_mcp_list_users        - List users
# 10. linear_mcp_get_user         - Get user details

- slug: linear_mcp_list_issues
  name: List Issues
  description: |
    List all issues in your Linear workspace with optional filtering by team, status, or assignee. Returns issue titles, IDs, states, assignees, and due dates for each issue.
  provider: linear-mcp
  endpoint: /issues
  method: GET
  scopes: []
  tags:
    - issues
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing issues
    properties:
      team_id:
        type: string
        description: "Filter by team ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: linear_mcp_get_issue
  name: Get Issue
  description: |
    Get detailed information about a specific Linear issue by its ID. Returns the issue title, description, state, priority, assignee, and timestamps.
  provider: linear-mcp
  endpoint: /issues/{issue_id}
  method: GET
  scopes: []
  tags:
    - issues
    - read
  input_schema:
    type: object
    description: Parameters for getting an issue
    properties:
      issue_id:
        type: string
        description: "Issue ID"
    required:
      - issue_id

- slug: linear_mcp_create_issue
  name: Create Issue
  description: |
    Create a new issue in a Linear team. Specify the team, title, and optional description. Creates the issue and returns it with its unique ID and URL.
  provider: linear-mcp
  endpoint: /issues
  method: POST
  scopes: []
  tags:
    - issues
    - create
    - write
  input_schema:
    type: object
    description: Parameters for creating an issue
    properties:
      team_id:
        type: string
        description: "Team ID"
      title:
        type: string
        description: "Issue title"
      description:
        type: string
        description: "Issue description"
    required:
      - team_id
      - title

- slug: linear_mcp_update_issue
  name: Update Issue
  description: |
    Update an existing Linear issue. Modify the title, description, or other properties. Returns the updated issue confirming all changes were applied.
  provider: linear-mcp
  endpoint: /issues/{issue_id}
  method: PUT
  scopes: []
  tags:
    - issues
    - update
    - write
  input_schema:
    type: object
    description: Parameters for updating an issue
    properties:
      issue_id:
        type: string
        description: "Issue ID"
      title:
        type: string
        description: "Issue title"
      description:
        type: string
        description: "Issue description"
    required:
      - issue_id

