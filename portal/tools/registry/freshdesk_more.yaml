- slug: freshdesk_get_forum_settings
  name: Get Forum Settings
  description: |
    Get the global forum settings for your Freshdesk community portal.
    Includes moderation settings and display preferences.
  provider: freshdesk_more
  endpoint: /forum_settings
  method: GET
  scopes:
    - solutions
  tags:
    - forum
    - settings
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []
