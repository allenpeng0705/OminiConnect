# Terraform Cloud Tools - Allowlist
# Curated subset of Terraform Cloud API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. terraform_list_workspaces           - List all workspaces in Terraform Cloud
# # 2. terraform_get_workspace           - Get details of a workspace
# # 3. terraform_list_runs           - List runs in a workspace
# # 4. terraform_create_run           - Create a new run in a workspace
# # 5. terraform_get_run           - Get details of a run
# # 6. terraform_apply_run           - Apply a pending run
# # 7. terraform_discard_run           - Discard a run
# # 8. terraform_list_state_versions           - List state versions for a workspace
# # 9. terraform_get_current_state           - Get the current state of a workspace
# # 10. terraform_list_organizations           - List all organizations

- slug: terraform_list_workspaces
  name: List terraform Workspaces
  description: |
    List all workspaces in Terraform Cloud
  provider: terraform
  endpoint: /api/v2/workspaces
  method: GET
  scopes:
    - 
  tags:
    - terraform
  input_schema:
    type: object
    description: Parameters for list workspaces
    properties: {}
    required: []

