- slug: dixa_list_routing_rules
  name: List Routing Rules
  description: |
    List all conversation routing rules in Dixa that determine how customer inquiries are distributed to agents. Returns rule names, conditions, and target assignments.
  provider: dixa
  endpoint: /v1/routing-rules
  method: GET
  scopes:
    - read
  tags:
    - routing
  input_schema:
    type: object
    description: Parameters for listing routing rules
    properties:
      channel:
        type: string
        description: "Filter by channel type"
