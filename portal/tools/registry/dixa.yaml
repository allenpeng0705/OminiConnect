- slug: dixa_list_conversations
  name: List Conversations
  description: |
    List all customer conversations in Dixa with optional filtering by status or date range. Returns conversation IDs, participant names, message counts, and timestamps.
  provider: dixa
  endpoint: /v1/conversations
  method: GET
  scopes:
    - read
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for listing conversations
    properties:
      status:
        type: string
        description: "Filter by status: open, closed, pending"
      from_date:
        type: string
        description: "Filter from date (ISO 8601)"
      to_date:
        type: string
        description: "Filter to date (ISO 8601)"
      page_size:
        type: integer
        description: "Number of results per page"
        default: 50
      page_token:
        type: string
        description: "Pagination token"

- slug: dixa_get_conversation
  name: Get Conversation
  description: |
    Retrieve detailed information about a specific Dixa conversation including all messages, participant details, and conversation status.
  provider: dixa
  endpoint: /v1/conversations/{id}
  method: GET
  scopes:
    - read
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for getting a conversation
    properties:
      id:
        type: string
        description: "The conversation ID"
    required:
      - id

- slug: dixa_create_conversation
  name: Create Conversation
  description: |
    Create a new customer conversation in Dixa with specified channel, contact, and initial message content. Returns the created conversation with its unique identifier.
  provider: dixa
  endpoint: /v1/conversations
  method: POST
  scopes:
    - write
  tags:
    - conversations
  input_schema:
    type: object
    description: Parameters for creating a conversation
    properties:
      channel:
        type: string
        description: "Channel type: email, chat, facebook, twitter"
      contact_id:
        type: string
        description: "The contact ID"
      message:
        type: object
        description: "Initial message object"
      priority:
        type: string
        description: "Priority: normal, high"
    required:
      - channel
      - contact_id

- slug: dixa_list_contacts
  name: List Contacts
  description: |
    List all customer contacts in Dixa with optional search filtering. Returns contact names, email addresses, phone numbers, and last interaction timestamps.
  provider: dixa
  endpoint: /v1/contacts
  method: GET
  scopes:
    - read
  tags:
    - contacts
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      search:
        type: string
        description: "Search by name or email"
      page_size:
        type: integer
        description: "Number of results per page"
        default: 50
      page_token:
        type: string
        description: "Pagination token"

- slug: dixa_get_contact
  name: Get Contact
  description: |
    Retrieve detailed information about a specific Dixa contact including their profile data, conversation history, and custom attributes.
  provider: dixa
  endpoint: /v1/contacts/{id}
