# Jobadder Tools - Allowlist
# Curated subset of Jobadder API for AI agent use.
# OAUTH2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. jobadder_list_candidates    - List candidates
# 2. jobadder_get_candidate      - Get candidate details
# 3. jobadder_list_jobs         - List job postings
# 4. jobadder_get_job           - Get job details
# 5. jobadder_list_users        - List users
# 6. jobadder_get_user          - Get user details
# 7. jobadder_list_contacts     - List contacts
# 8. jobadder_get_contact       - Get contact details
# 9. jobadder_list_placements   - List placements
# 10. jobadder_get_placement    - Get placement details

- slug: jobadder_list_candidates
  name: List Candidates
  description: |
    List all candidates in Jobadder. Returns candidate names, contact information, and application status.
  provider: jobadder
  endpoint: /v2/candidates
  method: GET
  scopes: []
  tags:
    - candidates
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing candidates
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
      pageSize:
        type: integer
        description: "Results per page"
        default: 20
    required: []

- slug: jobadder_get_candidate
  name: Get Candidate
  description: |
    Retrieve details about a specific candidate by their ID. Includes contact details, work history, and application information.
  provider: jobadder
  endpoint: /v2/candidates/{candidate_id}
  method: GET
  scopes: []
  tags:
    - candidates
    - read
  input_schema:
    type: object
    description: Parameters for getting a candidate
    properties:
      candidate_id:
        type: integer
        description: "Candidate ID"
    required:
      - candidate_id

- slug: jobadder_list_jobs
  name: List Jobs
  description: |
    List all job postings in Jobadder. Filter by status (active, closed) and return job titles and posting information.
  provider: jobadder
  endpoint: /v2/jobs
  method: GET
  scopes: []
  tags:
    - jobs
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing jobs
    properties:
      status:
        type: string
        description: "Job status (active, closed, all)"
        default: active
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: jobadder_get_job
  name: Get Job
  description: |
    Retrieve details about a specific job posting by its ID. Includes job description, requirements, and hiring status.
  provider: jobadder
  endpoint: /v2/jobs/{job_id}
  method: GET
  scopes: []
  tags:
    - jobs
    - read
  input_schema:
    type: object
    description: Parameters for getting a job
    properties:
      job_id:
        type: integer
        description: "Job ID"
    required:
      - job_id

