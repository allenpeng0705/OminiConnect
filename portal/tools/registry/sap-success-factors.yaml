- slug: sap-success-factors_list_time_off
  name: List Time Off
  description: |
    List all time off requests and balances with optional status filtering. Returns leave type, dates, hours, approval status, and remaining balances for each record.
  provider: sap-success-factors
  endpoint: /v1/timeOff
  method: GET
  scopes:
    - timeOff:read
  tags:
    - time-off
    - hr
    - sap
  input_schema:
    type: object
    description: Parameters for listing time off
    properties:
      limit:
        type: integer
        description: "Number of records"
        default: 50
      status:
        type: string
        description: "Filter by status"
    required: []

- slug: sap-success-factors_approve_time_off
  name: Approve Time Off
  description: |
    Approve a pending time off request. Updates the request status to approved and notifies the employee of the decision.
  provider: sap-success-factors
  endpoint: /v1/timeOff/{timeOffId}/approve
  method: POST
  scopes:
    - timeOff:write
  tags:
    - time-off
    - hr
    - approval
    - sap
  input_schema:
    type: object
    description: Parameters for approving time off
    properties:
      timeOffId:
        type: string
        description: "The time off ID"
    required:
      - timeOffId

