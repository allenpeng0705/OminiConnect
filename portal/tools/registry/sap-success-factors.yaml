# Sap-success-factors Tools - Allowlist
# Curated subset of SAP SuccessFactors API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. sap-success-factors_list_employees         - List all employees
# 2. sap-success-factors_get_employee          - Get employee details
# 3. sap-success-factors_list_departments      - List all departments
# 4. sap-success-factors_get_department        - Get department details
# 5. sap-success-factors_list_positions        - List all positions
# 6. sap-success-factors_get_position          - Get position details
# 7. sap-success-factors_list_time_off        - List time off records
# 8. sap-success-factors_approve_time_off     - Approve time off request
# 9. sap-success-factors_list_performance      - List performance reviews
# 10. sap-success-factors_get_employee_profile - Get employee profile

- slug: sap-success-factors_list_employees
  name: List Employees
  description: |
    List all employees in the organization with optional filtering by department. Returns employee IDs, names, job titles, and employment status for each record.
  provider: sap-success-factors
  endpoint: /v1/employees
  method: GET
  scopes:
    - employees:read
  tags:
    - employees
    - hr
    - sap
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      limit:
        type: integer
        description: "Number of employees"
        default: 50
      department:
        type: string
        description: "Filter by department"
    required: []

- slug: sap-success-factors_get_employee
  name: Get Employee
  description: |
    Retrieve comprehensive details for a specific employee including contact information, job assignment, compensation details, and employment history.
  provider: sap-success-factors
  endpoint: /v1/employees/{employeeId}
  method: GET
  scopes:
    - employees:read
  tags:
    - employees
    - hr
    - sap
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "The employee ID"
    required:
      - employeeId

