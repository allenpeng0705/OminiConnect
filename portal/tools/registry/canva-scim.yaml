# Canva SCIM Tools - Allowlist
# Curated subset of the Canva SCIM API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. canva_scim_list_users            - List users
# 2. canva_scim_get_user              - Get user details
# 3. canva_scim_create_user           - Create a user
# 4. canva_scim_update_user           - Update a user
# 5. canva_scim_delete_user           - Delete a user
# 6. canva_scim_list_groups           - List groups
# 7. canva_scim_get_group             - Get group details
# 8. canva_scim_create_group          - Create a group
# 9. canva_scim_update_group          - Update a group
# 10. canva_scim_list_service_provider - List service provider config

- slug: canva_scim_list_users
  name: List canva-scim Users
  description: |
    Retrieve all users in the Canva organization with pagination support. Returns user names, emails, active status, and organization roles.
  provider: canva-scim
  endpoint: /v2/Users
  method: GET
  scopes: []
  tags:
    - users
    - scim
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      filter:
        type: string
        description: "SCIM filter expression"
      startIndex:
        type: integer
        description: "Pagination start index"
        default: 1
      count:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: canva_scim_get_user
  name: Get canva-scim User
  description: |
    Retrieve detailed information about a specific user by their unique ID. Returns the user name, email, active status, and organization role.
  provider: canva-scim
  endpoint: /v2/Users/{id}
  method: GET
  scopes: []
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: canva_scim_create_user
  name: Create canva-scim User
  description: |
    Create a new user in the Canva organization with name, email, and active status. Returns the created user with their unique ID.
  provider: canva-scim
  endpoint: /v2/Users
  method: POST
  scopes: []
  tags:
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      userName:
        type: string
        description: "Username (email)"
      name:
        type: object
        description: "Name object with givenName and familyName"
      emails:
        type: array
        items:
          type: object
        description: "Email addresses"
      active:
        type: boolean
        description: "Whether user is active"
        default: true
    required:
      - userName

- slug: canva_scim_update_user
  name: Update canva-scim User
  description: |
    Modify an existing user's name or active status in the Canva organization. Returns the updated user information.
  provider: canva-scim
  endpoint: /v2/Users/{id}
  method: PUT
  scopes: []
  tags:
    - users
    - update
  input_schema:
    type: object
    description: Parameters for updating a user
    properties:
      id:
        type: string
        description: "User ID"
      name:
        type: object
        description: "Name object"
      active:
        type: boolean
        description: "Whether user is active"
    required:
      - id

- slug: canva_scim_delete_user
  name: Delete User
  description: |
    Permanently remove a user from the Canva organization by their unique ID, deleting their account and access. Returns confirmation of deletion.
  provider: canva-scim
  endpoint: /v2/Users/{id}
  method: DELETE
  scopes: []
  tags:
    - users
    - delete
  input_schema:
    type: object
    description: Parameters for deleting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: canva_scim_list_groups
  name: List canva-scim Groups
  description: |
    Retrieve all groups in the Canva organization with pagination support. Returns group names, IDs, and member counts.
  provider: canva-scim
  endpoint: /v2/Groups
  method: GET
  scopes: []
  tags:
    - groups
    - scim
  input_schema:
    type: object
    description: Parameters for listing groups
    properties:
      startIndex:
        type: integer
        description: "Pagination start index"
        default: 1
      count:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: canva_scim_get_group
  name: Get canva-scim Group
  description: |
    Retrieve detailed information about a specific group by its unique ID. Returns the group name, description, and member list.
  provider: canva-scim
  endpoint: /v2/Groups/{id}
  method: GET
  scopes: []
  tags:
    - groups
    - read
  input_schema:
    type: object
    description: Parameters for getting a group
    properties:
      id:
        type: string
        description: "Group ID"
    required:
      - id

- slug: canva_scim_create_group
  name: Create Group
  description: |
    Create a new group in the Canva organization with a name and optional members. Returns the created group with its unique ID.
  provider: canva-scim
  endpoint: /v2/Groups
  method: POST
  scopes: []
  tags:
    - groups
    - create
  input_schema:
    type: object
    description: Parameters for creating a group
    properties:
      displayName:
        type: string
        description: "Group name"
      members:
        type: array
        items:
          type: object
        description: "Group members"
    required:
      - displayName

- slug: canva_scim_update_group
  name: Update Group
  description: |
    Modify an existing group's name or member list in the Canva organization. Returns the updated group information.
  provider: canva-scim
  endpoint: /v2/Groups/{id}
  method: PUT
  scopes: []
  tags:
    - groups
    - update
  input_schema:
    type: object
    description: Parameters for updating a group
    properties:
      id:
        type: string
        description: "Group ID"
      displayName:
        type: string
        description: "New group name"
      members:
        type: array
        items:
          type: object
        description: "Updated member list"
    required:
      - id

- slug: canva_scim_list_service_provider
  name: List Service Provider
  description: |
    Retrieve the SCIM service provider configuration for Canva. Returns supported user and group attributes, authentication methods, and feature settings.
  provider: canva-scim
  endpoint: /v2/ServiceProviderConfig
  method: GET
  scopes: []
  tags:
    - configuration
    - scim
  input_schema:
    type: object
    description: No parameters
    properties: {}
    required: []
