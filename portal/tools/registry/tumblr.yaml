# Tumblr Tools - Allowlist
# Curated subset of Tumblr API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. tumblr_get_user_info           - Get authenticated user information
# # 2. tumblr_list_blogs           - List all blogs for the user
# # 3. tumblr_get_blog_info           - Get blog details
# # 4. tumblr_list_posts           - List posts on a blog
# # 5. tumblr_create_post           - Create a new blog post
# # 6. tumblr_edit_post           - Edit an existing post
# # 7. tumblr_delete_post           - Delete a post
# # 8. tumblr_like_post           - Like a post
# # 9. tumblr_unlike_post           - Unlike a post
# # 10. tumblr_follow_blog           - Follow a blog

- slug: tumblr_get_user_info
  name: Get User Info
  description: |
    Get authenticated user information
  provider: tumblr
  endpoint: /v2/user/info
  method: GET
  scopes:
    - read
  tags:
    - tumblr
  input_schema:
    type: object
    description: Parameters for get user info
    properties: {}
    required: []

- slug: tumblr_list_blogs
  name: List Blogs
  description: |
    List all blogs for the user
  provider: tumblr
  endpoint: /v2/user/following
  method: GET
  scopes:
    - read
  tags:
    - tumblr
  input_schema:
    type: object
    description: Parameters for list blogs
    properties: {}
    required: []

- slug: tumblr_get_blog_info
