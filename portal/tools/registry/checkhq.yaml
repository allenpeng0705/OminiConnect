# CheckHQ Tools - Allowlist
# Curated subset of the CheckHQ API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. checkhq_list_accounts              - List accounts
# 2. checkhq_get_account                 - Get account details
# 3. checkhq_list_transactions          - List transactions
# 4. checkhq_get_transaction            - Get transaction details
# 5. checkhq_list_invoices              - List invoices
# 6. checkhq_get_invoice                - Get invoice details
# 7. checkhq_create_invoice             - Create an invoice
# 8. checkhq_list_payments              - List payments
# 9. checkhq_get_payment                - Get payment details
# 10. checkhq_list_contacts            - List contacts

- slug: checkhq_list_accounts
  name: List Accounts
  description: |
    Retrieve all financial accounts in the CheckHQ organization with pagination support. Returns account names, types, and current balances.
  provider: checkhq
  endpoint: /api/v1/accounts
  method: GET
  scopes: []
  tags:
    - accounts
    - finance
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: checkhq_get_account
  name: Get Account
  description: |
    Retrieve detailed information about a specific account by its unique ID. Returns the account balance, type, and recent transaction history.
  provider: checkhq
  endpoint: /api/v1/accounts/{id}
  method: GET
  scopes: []
  tags:
    - accounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      id:
        type: integer
        description: "Account ID"
    required:
      - id

- slug: checkhq_list_transactions
  name: List Transactions
  description: |
    Retrieve all financial transactions with optional filtering by account. Returns transaction amounts, dates, categories, and statuses.
  provider: checkhq
  endpoint: /api/v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - finance
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      account_id:
        type: integer
        description: "Filter by account ID"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: checkhq_get_transaction
  name: Get Transaction
  description: |
    Retrieve detailed information about a specific transaction by its unique ID. Returns the amount, date, category, and description.
  provider: checkhq
  endpoint: /api/v1/transactions/{id}
  method: GET
  scopes: []
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      id:
        type: integer
        description: "Transaction ID"
    required:
      - id

- slug: checkhq_list_invoices
  name: List Invoices
  description: |
    Retrieve all invoices with optional filtering by status. Returns invoice IDs, amounts, due dates, and payment status.
  provider: checkhq
  endpoint: /api/v1/invoices
  method: GET
  scopes: []
  tags:
    - invoices
    - finance
  input_schema:
    type: object
    description: Parameters for listing invoices
    properties:
      status:
        type: string
        description: "Filter by status"
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: checkhq_get_invoice
  name: Get Invoice
  description: |
    Retrieve detailed information about a specific invoice by its unique ID. Returns line items, total amount, due date, and payment status.
  provider: checkhq
  endpoint: /api/v1/invoices/{id}
  method: GET
  scopes: []
  tags:
    - invoices
    - read
  input_schema:
    type: object
    description: Parameters for getting an invoice
    properties:
      id:
        type: integer
        description: "Invoice ID"
    required:
      - id

- slug: checkhq_create_invoice
  name: Create Invoice
  description: |
    Create a new invoice with line items for a specific contact and due date. Returns the created invoice with its unique ID.
  provider: checkhq
  endpoint: /api/v1/invoices
  method: POST
  scopes: []
  tags:
    - invoices
    - create
  input_schema:
    type: object
    description: Parameters for creating an invoice
    properties:
      contact_id:
        type: integer
        description: "Contact ID"
      items:
        type: array
        items:
          type: object
        description: "Invoice line items"
      due_date:
        type: string
        description: "Due date"
    required:
      - contact_id
      - items

- slug: checkhq_list_payments
  name: List Payments
  description: |
    Retrieve all payments received with pagination support. Returns payment IDs, methods, amounts, and dates.
  provider: checkhq
  endpoint: /api/v1/payments
  method: GET
  scopes: []
  tags:
    - payments
    - finance
  input_schema:
    type: object
    description: Parameters for listing payments
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []

- slug: checkhq_get_payment
  name: Get Payment
  description: |
    Retrieve detailed information about a specific payment by its unique ID. Returns the payment method, amount, date, and associated invoice.
  provider: checkhq
  endpoint: /api/v1/payments/{id}
  method: GET
  scopes: []
  tags:
    - payments
    - read
  input_schema:
    type: object
    description: Parameters for getting a payment
    properties:
      id:
        type: integer
        description: "Payment ID"
    required:
      - id

- slug: checkhq_list_contacts
  name: List Contacts
  description: |
    Retrieve all contacts with pagination support. Returns contact names, email addresses, and company associations.
  provider: checkhq
  endpoint: /api/v1/contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Max results"
        default: 20
    required: []
