- slug: guidaki_get_analytics
  name: Get Analytics
  description: |
    Retrieve onboarding analytics showing tour completion rates and user progress.
    Returns metrics filtered by date range and specific tours.
  provider: guidaki
  endpoint: /api/v1/analytics
  method: GET
  scopes:
    - analytics:read
  tags:
    - analytics
    - read
  input_schema:
    type: object
    description: Parameters for getting analytics
    properties:
      date_from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      date_to:
        type: string
        description: "End date (YYYY-MM-DD)"
      tour_id:
        type: string
        description: "Filter by tour ID"
    required: []

