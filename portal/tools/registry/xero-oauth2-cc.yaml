# Xero (OAuth2 CC) Tools - Allowlist
# Curated subset of Xero (OAuth2 CC) API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. xero_list_tenants           - List all connected tenants
# # 2. xero_list_invoices           - List all invoices
# # 3. xero_create_invoice           - Create a new invoice
# # 4. xero_list_contacts           - List all contacts
# # 5. xero_get_contact           - Get contact details
# # 6. xero_list_bank_transactions           - List all bank transactions
# # 7. xero_list_bank_transfers           - List all bank transfers
# # 8. xero_list_accounts           - List all accounts
# # 9. xero_list_tracking_categories           - List tracking categories
# # 10. xero_get_organisations           - Get organisation details

- slug: xero_list_tenants
  name: List Tenants
  description: |
    List all connected tenants
  provider: xero-oauth2-cc
  endpoint: /connections
  method: GET
  scopes:
    - read
  tags:
    - xero-oauth2-cc
  input_schema:
    type: object
    description: Parameters for list tenants
    properties: {}
    required: []

