- slug: sparkpost_list_messages
  name: List Messages
  description: |
    Retrieve all transmission messages from your SparkPost account with pagination.
    Returns message IDs, subjects, statuses, and timestamps for each transmission.
    Use this to discover email campaigns and track message delivery status.
  provider: sparkpost
  endpoint: /v1/transmissions
  method: GET
  scopes:
    - transmissions
  tags:
    - messages
  input_schema:
    type: object
    description: Parameters for listing messages
    properties:
      limit:
        type: integer
        description: "Maximum number of transmissions to return"
      offset:
        type: integer
        description: "Offset for pagination"
      campaign_id:
        type: string
        description: "Filter by campaign ID"
    required: []

- slug: sparkpost_get_message
  name: Get Message
  description: |
    Retrieve details of a specific transmission message by ID.
    Returns the complete message data with all associated information.
    This provides full message data for email tracking and analytics.
  provider: sparkpost
  endpoint: /v1/transmissions/{id}
  method: GET
  scopes:
    - transmissions
  tags:
    - messages
  input_schema:
    type: object
    description: Parameters for getting a message
    properties:
      id:
        type: string
        description: "Transmission ID to retrieve"
    required:
      - id

- slug: sparkpost_send_message
  name: Send Message
  description: |
    Send an email message via SparkPost transmission API to specified recipients.
    Returns the sent message confirmation with delivery tracking ID.
    This creates and dispatches a new email transmission.
  provider: sparkpost
  endpoint: /v1/transmissions
  method: POST
  scopes:
    - transmissions
  tags:
    - messages
  input_schema:
    type: object
    description: Parameters for sending a message
    properties:
      recipients:
        type: array
        description: "List of recipient email addresses"
      from:
        type: string
        description: "Sender email address"
      subject:
        type: string
        description: "Email subject line"
      html:
        type: string
        description: "HTML email body"
      text:
        type: string
        description: "Plain text email body"
      campaign_id:
        type: string
        description: "Campaign ID for tracking"
      metadata:
        type: object
        description: "Custom metadata key-value pairs"
    required:
      - recipients
      - from
      - subject

- slug: sparkpost_list_templates
  name: List Templates
  description: |
    Retrieve all email templates from your SparkPost account with pagination.
    Returns template IDs, names, and descriptions for each template.
    Use this to discover email templates and manage campaign content.
  provider: sparkpost
  endpoint: /v1/templates
  method: GET
  scopes:
    - templates
  tags:
    - templates
  input_schema:
    type: object
    description: Parameters for listing templates
    properties:
      limit:
        type: integer
        description: "Maximum number of templates to return"
      offset:
        type: integer
        description: "Offset for pagination"
    required: []

- slug: sparkpost_get_template
  name: Get Template
  description: |
    Retrieve a specific email template by ID with full content and structure.
    Returns the complete template data with all associated information.
    This provides full template data for email campaign management.
  provider: sparkpost
  endpoint: /v1/templates/{id}
  method: GET
  scopes:
    - templates
  tags:
    - templates
  input_schema:
    type: object
    description: Parameters for getting a template
    properties:
      id:
        type: string
        description: "Template ID to retrieve"
    required:
      - id

- slug: sparkpost_create_template
  name: Create Template
  description: |
    Create a new email template in SparkPost with HTML and plain text versions.
    Returns the created template with its unique ID and confirmation.
    This provisions a new email template for campaign usage.
  provider: sparkpost
  endpoint: /v1/templates
  method: POST
  scopes:
    - templates
  tags:
    - templates
  input_schema:
    type: object
    description: Parameters for creating a template
    properties:
      id:
        type: string
        description: "Unique ID for the template"
      name:
        type: string
        description: "Template name"
      description:
        type: string
        description: "Template description"
      html:
        type: string
        description: "HTML body with handlebar syntax"
      text:
        type: string
        description: "Plain text body"
      subject:
        type: string
        description: "Default subject line"
    required:
      - id
      - name
      - html

- slug: sparkpost_list_webhooks
  name: List Webhooks
  description: |
    Retrieve all configured webhooks for event streaming with pagination.
    Returns webhook IDs, names, and target URLs for each webhook.
    Use this to discover webhook integrations and manage event notifications.
  provider: sparkpost
  endpoint: /v1/webhooks
  method: GET
  scopes:
    - webhooks
  tags:
    - webhooks
  input_schema:
    type: object
    description: Parameters for listing webhooks
    properties:
      limit:
        type: integer
        description: "Maximum number of webhooks to return"
    required: []

- slug: sparkpost_create_webhook
  name: Create Webhook
  description: |
    Create a new webhook for receiving SparkPost event notifications at a target URL.
    Returns the created webhook with its unique ID and confirmation.
    This enables real-time integration with your applications for email events.
  provider: sparkpost
  endpoint: /v1/webhooks
  method: POST
  scopes:
    - webhooks
  tags:
    - webhooks
  input_schema:
    type: object
    description: Parameters for creating a webhook
    properties:
      name:
        type: string
        description: "Webhook name"
      target:
        type: string
        description: "URL to receive webhook events"
      events:
        type: array
        description: "List of event types to subscribe to"
      auth_token:
        type: string
        description: "Bearer token for webhook verification"
    required:
      - name
      - target
      - events

- slug: sparkpost_get_metrics
  name: Get Metrics
  description: |
    Retrieve aggregate metrics for your SparkPost transmissions within a date range.
    Returns delivery statistics, open rates, and click rates for each metric.
    Use this to discover email performance and track campaign analytics.
  provider: sparkpost
  endpoint: /v1/metrics
  method: GET
  scopes:
    - metrics
  tags:
    - metrics
  input_schema:
    type: object
    description: Parameters for getting metrics
    properties:
      metrics:
        type: array
        description: "List of metric types to retrieve"
      from:
        type: string
        description: "Start date (YYYY-MM-DD)"
      to:
        type: string
        description: "End date (YYYY-MM-DD)"
      timezone:
        type: string
        description: "Timezone for results (e.g., America/New_York)"
    required: []

- slug: sparkpost_list_domains
  name: List Domains
  description: |
    Retrieve all verified sending domains in your SparkPost account with pagination.
    Returns domain names, verification status, and DKIM keys for each domain.
    Use this to discover sending domains and manage email deliverability.
  provider: sparkpost
  endpoint: /v1/sending-domains
  method: GET
  scopes:
    - sending-domains
  tags:
    - domains
  input_schema:
    type: object
    description: Parameters for listing domains
    properties:
      limit:
        type: integer
        description: "Maximum number of domains to return"
      offset:
        type: integer
        description: "Offset for pagination"
    required: []
