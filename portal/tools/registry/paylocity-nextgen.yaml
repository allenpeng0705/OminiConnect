# Paylocity NextGen Tools - Allowlist
# Curated subset of Paylocity NextGen API for AI agent use.
# OAuth2 Client Credentials via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.
# NOTE: paylocity-nextgen uses the same API endpoints as paylocity - only auth flow variant.

# === TOOL LIST ===
# 1. paylocity_nextgen_list_employees        - List employees
# 2. paylocity_nextgen_get_employee          - Get employee details
# 3. paylocity_nextgen_list_payroll_runs     - List payroll runs
# 4. paylocity_nextgen_get_payroll_run       - Get payroll run details
# 5. paylocity_nextgen_list_time_entries     - List time entries
# 6. paylocity_nextgen_list_departments      - List departments
# 7. paylocity_nextgen_list_jobs            - List jobs/positions
# 8. paylocity_nextgen_list_benefits         - List benefit plans
# 9. paylocity_nextgen_list_pay_groups      - List pay groups
# 10. paylocity_nextgen_get_company_info    - Get company information

- slug: paylocity_nextgen_list_employees
  name: List Employees
  description: |
    Retrieve all employees in the organization with their employment details, department assignments, and work locations.
    Returns employee profiles including contact information and employment status.
  provider: paylocity-nextgen
  endpoint: /v1/employees
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - list
  input_schema:
    type: object
    description: Parameters for listing employees
    properties:
      departmentId:
        type: string
        description: "Filter by department ID"
      status:
        type: string
        description: "Filter by status (active, inactive)"
    required: []

- slug: paylocity_nextgen_get_employee
  name: Get Employee
  description: |
    Retrieve detailed information for a specific employee including their personal details, employment terms, and department.
    Returns the complete employee profile with compensation and benefits information.
  provider: paylocity-nextgen
  endpoint: /v1/employees/{employeeId}
  method: GET
  scopes: []
  tags:
    - employees
    - hr
    - read
  input_schema:
    type: object
    description: Parameters for getting an employee
    properties:
      employeeId:
        type: string
        description: "Employee ID"
    required:
      - employeeId

- slug: paylocity_nextgen_list_payroll_runs
  name: List Payroll Runs
  description: |
    Retrieve all payroll runs for the organization with their processing status, period dates, and total amounts.
    Returns payroll summary including worker counts and payment details.
  provider: paylocity-nextgen
  endpoint: /v1/payroll/runs
  method: GET
  scopes: []
  tags:
    - payroll
    - finance
    - list
  input_schema:
    type: object
    description: Parameters for listing payroll runs
    properties:
      status:
        type: string
        description: "Filter by status"
      startDate:
        type: string
        description: "Start date filter (YYYY-MM-DD)"
      endDate:
        type: string
        description: "End date filter (YYYY-MM-DD)"
    required: []

- slug: paylocity_nextgen_get_payroll_run
  name: Get Payroll Run
  description: |
    Retrieve detailed information for a specific payroll run including the period, amounts, and employee breakdown.
    Returns payroll run status and any associated payment records.
  provider: paylocity-nextgen
  endpoint: /v1/payroll/runs/{runId}
  method: GET
  scopes: []
  tags:
    - payroll
    - finance
    - read
  input_schema:
    type: object
    description: Parameters for getting a payroll run
    properties:
      runId:
        type: string
        description: "Payroll run ID"
    required:
      - runId

