- slug: brex_list_accounts
  name: List Accounts
  description: |
    List all Brex accounts and return account IDs, types, and currency information.
    Use this to discover available accounts for transaction routing and balance management.
  provider: brex-api-key
  endpoint: /v1/accounts
  method: GET
  scopes: []
  tags:
    - accounts
    - banking
  input_schema:
    type: object
    description: Parameters for listing accounts
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: brex_get_balance
  name: Get Balance
  description: |
    Get balance for a specific account including available balance and currency type.
    Returns the current account balance for cash flow management and reconciliation.
  provider: brex-api-key
  endpoint: /v1/accounts/{accountId}/balance
  method: GET
  scopes: []
  tags:
    - accounts
    - balance
  input_schema:
    type: object
    description: Parameters for getting balance
    properties:
      accountId:
        type: string
        description: "Account ID"
