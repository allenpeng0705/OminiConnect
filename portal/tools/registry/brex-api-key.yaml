- slug: brex_get_user
  name: Get User
  description: |
    Get details for a specific user including name, email, role, and spending permissions.
    Returns the complete user profile for access management and expense tracking.
  provider: brex-api-key
  endpoint: /v1/users/{userId}
  method: GET
