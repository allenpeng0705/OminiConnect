# Brex (API Key) Tools - Allowlist
# Curated subset of Brex API for AI agent use.
# API_KEY auth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. brex_get_account_info       - Get account info
# 2. brex_list_transactions     - List transactions
# 3. brex_get_transaction       - Get transaction details
# 4. brex_list_cards            - List cards
# 5. brex_get_card              - Get card details
# 6. brex_list_users           - List team members
# 7. brex_get_user             - Get user details
# 8. brex_list_accounts        - List accounts
# 9. brex_get_balance          - Get account balance
# 10. brex_get_limits          - Get card limits

- slug: brex_get_account_info
  name: Get Account Info
  description: |
    Get Brex account information including company name, region, and account settings.
    Returns the complete account configuration for financial management setup.
  provider: brex-api-key
  endpoint: /v1/account_info
  method: GET
  scopes: []
  tags:
    - account
    - info
  input_schema:
    type: object
    description: No parameters required
    properties: {}
    required: []

- slug: brex_list_transactions
  name: List Transactions
  description: |
    List all transactions in Brex and return transaction IDs, amounts, dates, and status.
    Filter by account or status to find specific payment records for reconciliation.
  provider: brex-api-key
  endpoint: /v1/transactions
  method: GET
  scopes: []
  tags:
    - transactions
    - payments
  input_schema:
    type: object
    description: Parameters for listing transactions
    properties:
      accountId:
        type: string
        description: "Filter by account ID"
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: brex_get_transaction
  name: Get Transaction
  description: |
    Get details for a specific transaction including amount, date, merchant, and category.
    Returns the complete transaction data for expense tracking and reconciliation.
  provider: brex-api-key
  endpoint: /v1/transactions/{transactionId}
  method: GET
  scopes: []
  tags:
    - transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a transaction
    properties:
      transactionId:
        type: string
        description: "Transaction ID"
    required:
      - transactionId

- slug: brex_list_cards
  name: List Cards
  description: |
    List all Brex cards and return card IDs, statuses, and associated user information.
    Filter by user or status to find specific cards for expense management.
  provider: brex-api-key
  endpoint: /v1/cards
  method: GET
  scopes: []
  tags:
    - cards
    - payments
  input_schema:
    type: object
    description: Parameters for listing cards
    properties:
      userId:
        type: string
        description: "Filter by user ID"
      status:
        type: string
        description: "Filter by status"
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: brex_get_card
  name: Get Card
  description: |
    Get details for a specific card including status, type, spending limits, and holder info.
    Returns the complete card data for expense management and policy enforcement.
  provider: brex-api-key
  endpoint: /v1/cards/{cardId}
  method: GET
  scopes: []
  tags:
    - cards
    - read
  input_schema:
    type: object
    description: Parameters for getting a card
    properties:
      cardId:
        type: string
        description: "Card ID"
    required:
      - cardId

- slug: brex_list_users
  name: List Users
  description: |
    List all team members in Brex and return user names, emails, and roles.
