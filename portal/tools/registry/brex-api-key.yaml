- slug: brex_get_limits
  name: Get Limits
  description: |
    Get spending limits for a card including daily limit, monthly limit, and category restrictions.
    Returns the complete limit configuration for policy enforcement and expense control.
  provider: brex-api-key
  endpoint: /v1/cards/{cardId}/limits
  method: GET
  scopes: []
  tags:
    - cards
    - limits
  input_schema:
    type: object
    description: Parameters for getting limits
    properties:
      cardId:
        type: string
        description: "Card ID"
    required:
      - cardId
