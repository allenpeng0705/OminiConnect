# Scrape.do Tools - Allowlist
# Curated subset of Scrape.do API for AI agent use.
# Auth mode: API_KEY.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. scrape_url                               - Scrape content from a URL
# 2. scrape_batch                             - Scrape multiple URLs in batch
# 3. get_scraped_data                         - Retrieve previously scraped data
# 4. list_projects                            - List all scraping projects
# 5. create_project                           - Create a new scraping project
# 6. get_project                              - Get project details
# 7. update_project                           - Update project settings
# 8. delete_project                           - Delete a project
# 9. get_usage                                - Get API usage statistics
# 10. get_status                               - Check service status

- slug: scrape_url
  name: Scrape URL
  description: |
    Scrape content from a URL
  provider: scrapedo
  endpoint: /scrape
  method: POST
  scopes: []
  tags:
    - scraping
    - data
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

