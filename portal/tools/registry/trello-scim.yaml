# Trello (SCIM) Tools - Allowlist
# Curated subset of Trello (SCIM) API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. trello_list_users           - List all users in the organization
# # 2. trello_get_user           - Get user details
# # 3. trello_create_user           - Create a new user
# # 4. trello_update_user           - Update user attributes
# # 5. trello_delete_user           - Deactivate a user
# # 6. trello_list_groups           - List all groups/organizations
# # 7. trello_get_group           - Get group details
# # 8. trello_list_org_members           - List members in an organization
# # 9. trello_add_user_to_group           - Add a user to a group
# # 10. trello_remove_user_from_group           - Remove a user from a group

- slug: trello_list_users
  name: List trello-scim Users
  description: |
    List all users in the organization
  provider: trello-scim
  endpoint: /Users
  method: GET
  scopes:
    - 
  tags:
    - trello-scim
  input_schema:
    type: object
    description: Parameters for list users
    properties: {}
    required: []

