- slug: health_gorilla_list_patients
  name: List Patients
  description: |
    Retrieve all patients in the Health Gorilla system with pagination and search.
    Returns patient records with demographics and identifiers.
  provider: health-gorilla
  endpoint: /patients
  method: GET
  scopes:
    - read
  tags:
    - patients
  input_schema:
    type: object
    description: Filter and pagination options for listing patients
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      page_size:
        type: integer
        description: "Number of patients per page (default: 30, max: 100)"
      search:
        type: string
        description: "Search by patient name or ID"
    required: []

- slug: health_gorilla_get_patient
  name: Get Patient
  description: |
    Retrieve a specific patient by their unique identifier.
    Returns full patient demographics and medical identifiers.
  provider: health-gorilla
  endpoint: /patients/{id}
  method: GET
  scopes:
    - read
  tags:
    - patients
  input_schema:
    type: object
    description: Parameters for getting a specific patient
    properties:
      id:
        type: string
        description: "Patient ID"
    required:
      - id

- slug: health_gorilla_create_patient
  name: Create Patient
  description: |
    Register a new patient in the Health Gorilla system with demographics.
    Returns the created patient record with assigned ID.
  provider: health-gorilla
  endpoint: /patients
  method: POST
  scopes:
    - write
  tags:
    - patients
  input_schema:
    type: object
    description: Patient creation parameters
    properties:
      first_name:
        type: string
        description: "Patient first name"
      last_name:
        type: string
        description: "Patient last name"
      date_of_birth:
        type: string
        format: date
        description: "Date of birth (YYYY-MM-DD)"
      gender:
        type: string
        description: "Gender: male, female, other"
      email:
        type: string
        description: "Patient email address"
      phone:
        type: string
        description: "Patient phone number"
      address:
        type: object
        description: "Patient address object"
    required:
      - first_name
      - last_name
      - date_of_birth

- slug: health_gorilla_list_appointments
  name: List Appointments
  description: |
    Retrieve all appointments with optional patient, practitioner, or status filtering.
    Returns appointment details including scheduled times and types.
  provider: health-gorilla
  endpoint: /appointments
  method: GET
  scopes:
    - read
  tags:
    - appointments
  input_schema:
    type: object
    description: Filter and pagination options for listing appointments
    properties:
      page:
        type: integer
        description: "Page number for pagination (default: 1)"
      page_size:
        type: integer
        description: "Number of appointments per page (default: 30, max: 100)"
      patient_id:
        type: string
        description: "Filter by patient ID"
      practitioner_id:
        type: string
        description: "Filter by practitioner ID"
      status:
        type: string
        description: "Filter by status: scheduled, completed, cancelled"
    required: []

- slug: health_gorilla_get_appointment
  name: Get Appointment
  description: |
    Retrieve a specific appointment by its unique identifier.
    Returns full appointment details including participants and location.
  provider: health-gorilla
  endpoint: /appointments/{id}
  method: GET
  scopes:
    - read
  tags:
    - appointments
  input_schema:
    type: object
    description: Parameters for getting a specific appointment
    properties:
      id:
        type: string
        description: "Appointment ID"
    required:
      - id

- slug: health_gorilla_create_appointment
  name: Create Appointment
  description: |
    Schedule a new appointment with patient, practitioner, and time details.
    Returns the created appointment with confirmation details.
  provider: health-gorilla
  endpoint: /appointments
  method: POST
  scopes:
    - write
  tags:
    - appointments
  input_schema:
    type: object
    description: Appointment creation parameters
    properties:
      patient_id:
        type: string
        description: "Patient ID"
      practitioner_id:
        type: string
        description: "Practitioner ID"
      scheduled_time:
        type: string
        format: date-time
        description: "Appointment date and time (ISO 8601)"
      duration_minutes:
        type: integer
        description: "Duration in minutes"
      appointment_type:
        type: string
        description: "Type of appointment: consultation, follow-up, procedure"
      notes:
        type: string
        description: "Optional notes for the appointment"
    required:
      - patient_id
      - practitioner_id
      - scheduled_time

