- slug: roller_cancel_booking
  name: Cancel Booking
  description: |
    Cancel an existing booking.
  provider: roller
  endpoint: /v1/bookings/{bookingId}/cancel
  method: POST
  scopes:
    - bookings:write
  tags:
    - bookings
    - appointments
    - cancel
  input_schema:
    type: object
    description: Parameters for cancelling a booking
    properties:
      bookingId:
        type: string
        description: "The booking ID to cancel"
      reason:
        type: string
        description: "Cancellation reason"
    required:
      - bookingId
