# Roller Tools - Allowlist
# Curated subset of Roller Software API for AI agent use.
# OAuth2 via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. roller_list_bookings           - List all bookings
# 2. roller_get_booking             - Get booking details
# 3. roller_create_booking          - Create a booking
# 4. roller_list_customers          - List all customers
# 5. roller_get_customer           - Get customer details
# 6. roller_create_customer        - Create a customer
# 7. roller_list_services          - List services offered
# 8. roller_list_staff             - List staff members
# 9. roller_get_availability       - Get availability slots
# 10. roller_cancel_booking        - Cancel a booking

- slug: roller_list_bookings
  name: List Bookings
  description: |
    Retrieve a list of all bookings in Roller.
  provider: roller
  endpoint: /v1/bookings
  method: GET
  scopes:
    - bookings:read
  tags:
    - bookings
    - appointments
    - scheduling
  input_schema:
    type: object
    description: Parameters for listing bookings
    properties:
      limit:
        type: integer
        description: "Number of bookings"
        default: 50
      status:
        type: string
        description: "Filter by status: confirmed, cancelled, completed"
      date:
        type: string
        description: "Filter by date"
    required: []

- slug: roller_get_booking
  name: Get Booking
  description: |
    Get details of a specific booking.
  provider: roller
  endpoint: /v1/bookings/{bookingId}
  method: GET
  scopes:
    - bookings:read
  tags:
    - bookings
    - appointments
    - scheduling
  input_schema:
    type: object
    description: Parameters for getting a booking
    properties:
      bookingId:
        type: string
        description: "The booking ID"
    required:
      - bookingId

- slug: roller_create_booking
  name: Create Booking
  description: |
    Create a new booking for a customer.
  provider: roller
  endpoint: /v1/bookings
  method: POST
  scopes:
    - bookings:write
  tags:
    - bookings
    - appointments
    - scheduling
    - create
  input_schema:
    type: object
    description: Parameters for creating a booking
    properties:
      customerId:
        type: string
        description: "Customer ID"
      serviceId:
        type: string
        description: "Service ID"
      staffId:
        type: string
        description: "Staff ID"
      startTime:
        type: string
        description: "Booking start time (ISO 8601)"
    required:
      - customerId
      - serviceId
      - startTime

