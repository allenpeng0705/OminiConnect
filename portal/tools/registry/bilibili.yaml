# Bilibili Tools - Allowlist
# Curated subset of Bilibili API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. bilibili_list_videos           - List user's videos
# 2. bilibili_get_video            - Get video details
# 3. bilibili_search_videos         - Search for videos
# 4. bilibili_list_users            - List users
# 5. bilibili_get_user             - Get user profile
# 6. bilibili_list_subtitles       - List video subtitles
# 7. bilibili_update_subtitle       - Update subtitle status
# 8. bilibili_list_favorites        - List favorite videos
# 9. bilibili_get_favorite_folder   - Get favorite folder details
# 10. bilibili_get_video_stats      - Get video statistics

- slug: bilibili_list_videos
  name: List Videos
  description: |
    List videos for the authenticated user and return titles, descriptions, view counts, and publish dates.
    Use this to discover your uploaded content for management.
  provider: bilibili
  endpoint: /video/get_my_videos
  method: GET
  scopes:
    - video_read
  tags:
    - videos
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing videos
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      page_size:
        type: integer
        description: "Videos per page (default 30, max 50)"
        default: 30
    required: []

- slug: bilibili_get_video
  name: Get Video
  description: |
    Get detailed information about a specific video including title, description, duration, and view statistics.
    Returns the complete video metadata for content management.
  provider: bilibili
  endpoint: /video/{avid}
  method: GET
  scopes:
    - video_read
  tags:
    - videos
    - read
  input_schema:
    type: object
    description: Parameters for getting a video
    properties:
      avid:
        type: string
        description: "Video av ID (required)"
    required:
      - avid

- slug: bilibili_search_videos
  name: Search Videos
  description: |
    Search for videos by keyword and return matching results with titles, authors, and view counts.
    Use this to discover content on Bilibili for research or analytics.
  provider: bilibili
  endpoint: /video/search
  method: GET
  scopes:
    - video_read
  tags:
    - search
    - videos
    - discovery
  input_schema:
    type: object
    description: Parameters for searching videos
    properties:
      keyword:
        type: string
        description: "Search keyword (required)"
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      page_size:
        type: integer
        description: "Videos per page (default 30, max 50)"
        default: 30
    required:
      - keyword

- slug: bilibili_list_users
  name: List bilibili Users
  description: |
    List users by keyword search and return user profiles with follower counts and bio information.
    Use this to discover creators and influencers on Bilibili.
  provider: bilibili
  endpoint: /user/search
  method: GET
  scopes:
    - user_info
  tags:
    - users
    - list
    - search
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      keyword:
        type: string
        description: "Search keyword (required for search)"
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      page_size:
        type: integer
        description: "Users per page (default 30)"
        default: 30
    required:
      - keyword

- slug: bilibili_get_user
  name: Get bilibili User
  description: |
    Get detailed user profile information including nickname, avatar URL, follower count, and bio.
    Returns the complete user profile for creator analysis.
  provider: bilibili
  endpoint: /user/{mid}
  method: GET
  scopes:
    - user_info
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      mid:
        type: string
        description: "User mid (required)"
    required:
      - mid

- slug: bilibili_list_subtitles
  name: List Subtitles
  description: |
    List subtitles for a video and return subtitle tracks with language codes and timing information.
    Returns available subtitle options for video accessibility.
  provider: bilibili
  endpoint: /video/{avid}/subtitles
  method: GET
  scopes:
    - video_read
  tags:
    - subtitles
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing subtitles
    properties:
      avid:
        type: string
        description: "Video av ID (required)"
    required:
      - avid

- slug: bilibili_update_subtitle
  name: Update Subtitle
  description: |
    Update subtitle status or settings for a video including visibility and default track selection.
    Modifies subtitle configuration for video accessibility.
  provider: bilibili
  endpoint: /video/{avid}/subtitles/{subtitle_id}
  method: PUT
  scopes:
    - video_write
  tags:
    - subtitles
    - update
  input_schema:
    type: object
    description: Parameters for updating subtitle
    properties:
      avid:
        type: string
        description: "Video av ID (required)"
      subtitle_id:
        type: string
        description: "Subtitle ID (required)"
      is_default:
        type: boolean
        description: "Set as default subtitle"
        default: false
      status:
        type: string
        description: "Subtitle status: active, disabled"
    required:
      - avid
      - subtitle_id

- slug: bilibili_list_favorites
  name: List Favorites
  description: |
    List videos in the user's favorite folder and return video titles, thumbnails, and add timestamps.
    Use this to discover saved content for viewing or analysis.
  provider: bilibili
  endpoint: /favorite/get
  method: GET
  scopes:
    - video_read
  tags:
    - favorites
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing favorites
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      page_size:
        type: integer
        description: "Videos per page (default 30)"
        default: 30
    required: []

- slug: bilibili_get_favorite_folder
  name: Get Favorite Folder
  description: |
    Get detailed information about a favorite folder including name, description, and video count.
    Returns the complete folder metadata for collection management.
  provider: bilibili
  endpoint: /favorite/{folder_id}
  method: GET
  scopes:
    - video_read
  tags:
    - favorites
    - read
  input_schema:
    type: object
    description: Parameters for getting favorite folder
    properties:
      folder_id:
        type: string
        description: "Folder ID (required)"
    required:
      - folder_id

- slug: bilibili_get_video_stats
  name: Get Video Stats
  description: |
    Get detailed statistics for a video including view count, likes, coins, favorites, and shares.
    Returns the complete engagement metrics for performance analysis.
  provider: bilibili
  endpoint: /video/{avid}/stats
  method: GET
  scopes:
    - video_read
  tags:
    - videos
    - stats
    - read
  input_schema:
    type: object
    description: Parameters for getting video stats
    properties:
      avid:
        type: string
        description: "Video av ID (required)"
    required:
      - avid