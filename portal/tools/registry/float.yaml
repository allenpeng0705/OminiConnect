# Float Tools - Allowlist
# Curated subset of Float API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. float_list_projects         - List projects
# 2. float_get_project          - Get project details
# 3. float_list_tasks           - List tasks
# 4. float_get_task             - Get task details
# 5. float_list_people          - List team members
# 6. float_get_person           - Get person details
# 7. float_list_clients         - List clients
# 8. float_get_client          - Get client details
# 9. float_list_holidays       - List holidays
# 10. float_get_schedule       - Get project schedule

- slug: float_list_projects
  name: List float Projects
  description: |
    List all projects in the Float resource management system. Returns project IDs, names, client associations, status, and budget information for each project with pagination.
  provider: float
  endpoint: /api/v3/projects
  method: GET
  scopes: []
  tags:
    - projects
    - resource
    - read
  input_schema:
    type: object
    description: Parameters for listing projects
    properties:
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: float_get_project
  name: Get float Project
  description: |
    Get detailed information about a specific project including its name, client, budget, team members assigned, and timeline with milestone dates.
  provider: float
  endpoint: /api/v3/projects/{id}
  method: GET
  scopes: []
  tags:
    - projects
    - resource
    - read
  input_schema:
    type: object
    description: Parameters for getting project
    properties:
      id:
        type: string
        description: "Project ID"
    required:
      - id

- slug: float_list_tasks
  name: List float Tasks
  description: |
    List all tasks in Float with optional project filtering. Returns task IDs, names, project associations, assignees, hours logged, and completion status for each task.
  provider: float
  endpoint: /api/v3/tasks
  method: GET
  scopes: []
  tags:
    - tasks
    - project
    - read
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      project_id:
        type: string
        description: "Filter by project ID"
    required: []

- slug: float_get_task
  name: Get float Task
  description: |
    Get detailed information about a specific task including its name, project, assigned team member, hours budgeted vs logged, and completion status.
  provider: float
  endpoint: /api/v3/tasks/{id}
  method: GET
  scopes: []
  tags:
    - tasks
    - project
    - read
  input_schema:
    type: object
    description: Parameters for getting task
    properties:
      id:
        type: string
        description: "Task ID"
    required:
      - id

