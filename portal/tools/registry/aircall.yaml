# Aircall Tools - Allowlist
# Curated subset of Aircall API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. aircall_list_users          - List users
# 2. aircall_get_user            - Get user details
# 3. aircall_list_calls          - List calls
# 4. aircall_get_call           - Get call details
# 5. aircall_list_contacts       - List contacts
# 6. aircall_get_contact        - Get contact details
# 7. aircall_create_contact     - Create a contact
# 8. aircall_list_teams         - List teams
# 9. aircall_get_team           - Get team details
# 10. aircall_create_call       - Create a call

- slug: aircall_list_users
  name: List aircall Users
  description: |
    List all users in Aircall with pagination. Returns user details including name, email, and availability status.
  provider: aircall
  endpoint: /users
  method: GET
  scopes:
    - read
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Users per page (default 25)"
        default: 25
    required: []

- slug: aircall_get_user
  name: Get aircall User
  description: |
    Get detailed information about a specific user including availability, direct numbers, and coaching status.
  provider: aircall
  endpoint: /users/{user_id}
  method: GET
  scopes:
    - read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      user_id:
        type: string
        description: "User ID"
    required:
      - user_id

- slug: aircall_list_calls
  name: List Calls
  description: |
    List calls in Aircall with pagination and optional direction and status filters.
  provider: aircall
  endpoint: /calls
  method: GET
  scopes:
    - read
  tags:
    - calls
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing calls
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Calls per page (default 25)"
        default: 25
      direction:
        type: string
        description: "Filter by direction: inbound, outbound"
      status:
        type: string
        description: "Filter by status: queued, ringing, answered, on_hold, completed, voicemail, no_answer"
    required: []

- slug: aircall_get_call
  name: Get Call
  description: |
    Get detailed information about a specific call including recording, transcription, and call steps.
  provider: aircall
  endpoint: /calls/{call_id}
  method: GET
  scopes:
    - read
  tags:
    - calls
    - read
  input_schema:
    type: object
    description: Parameters for getting a call
    properties:
      call_id:
        type: string
        description: "Call ID"
    required:
      - call_id

- slug: aircall_list_contacts
  name: List aircall Contacts
  description: |
    List contacts in Aircall with pagination. Returns contact details including name, phone, and email.
  provider: aircall
  endpoint: /contacts
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Contacts per page (default 25)"
        default: 25
    required: []

- slug: aircall_get_contact
  name: Get aircall Contact
  description: |
    Get detailed information about a specific contact including company, notes, and call history.
  provider: aircall
  endpoint: /contacts/{contact_id}
  method: GET
  scopes:
    - read
  tags:
    - contacts
    - read
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contact_id:
        type: string
        description: "Contact ID"
    required:
      - contact_id

- slug: aircall_create_contact
  name: Create Contact
  description: |
    Create a new contact in Aircall with name, phone, email, and company information.
  provider: aircall
  endpoint: /contacts
  method: POST
  scopes:
    - write
  tags:
    - contacts
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      first_name:
        type: string
        description: "Contact first name"
      last_name:
        type: string
        description: "Contact last name"
      phone_number:
        type: string
        description: "Phone number"
      email:
        type: string
        description: "Email address"
      company_id:
        type: string
        description: "Company ID"
    required:
      - first_name
      - last_name

- slug: aircall_list_teams
  name: List aircall Teams
  description: |
    List teams in Aircall with pagination. Returns team details including name and user count.
  provider: aircall
  endpoint: /teams
  method: GET
  scopes:
    - read
  tags:
    - teams
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing teams
    properties:
      page:
        type: integer
        description: "Page number (default 1)"
        default: 1
      per_page:
        type: integer
        description: "Teams per page (default 25)"
        default: 25
    required: []

- slug: aircall_get_team
  name: Get aircall Team
  description: |
    Get detailed information about a specific team including members, routing rules, and queue settings.
  provider: aircall
  endpoint: /teams/{team_id}
  method: GET
  scopes:
    - read
  tags:
    - teams
    - read
  input_schema:
    type: object
    description: Parameters for getting a team
    properties:
      team_id:
        type: string
        description: "Team ID"
    required:
      - team_id

- slug: aircall_create_call
  name: Create Call
  description: |
    Initiate a new outbound call from a user or number to a destination.
  provider: aircall
  endpoint: /calls
  method: POST
  scopes:
    - write
  tags:
    - calls
    - create
  input_schema:
    type: object
    description: Parameters for creating a call
    properties:
      from:
        type: string
        description: "Source (user ID or phone number)"
      to:
        type: string
        description: "Destination phone number"
      user_id:
        type: string
        description: "User ID to use for the call"
    required:
      - from
      - to
