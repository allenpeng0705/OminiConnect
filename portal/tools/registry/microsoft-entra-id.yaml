  description: |
    List all available directory roles in Entra ID.
  provider: microsoft-entra-id
  endpoint: /v1.0/directoryRoles
  method: GET
  scopes:
    - RoleManagement.Read.Directory
  tags:
    - roles
    - directory
    - list
  input_schema:
    type: object
    description: Parameters for listing directory roles
    properties: {}
    required: []

- slug: entra_assign_user_to_role
  name: Assign User to Role
  description: |
    Assign a user to a directory role.
  provider: microsoft-entra-id
  endpoint: /v1.0/directoryRoles/{roleId}/members/$ref
  method: POST
  scopes:
    - RoleManagement.ReadWrite.Directory
  tags:
    - roles
    - users
    - assign
  input_schema:
    type: object
    description: Parameters for assigning a user to a role
    properties:
      roleId:
        type: string
        description: "Directory Role ID"
      userId:
        type: string
        description: "User ID to assign"
    required:
      - roleId
      - userId
