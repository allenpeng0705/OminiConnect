# Microsoft Entra ID Tools - Allowlist
# Curated subset of Microsoft Entra ID API for AI agent use.
# OAuth2 via Nango (alias: microsoft).
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. entra_list_users              - List all users
# 2. entra_get_user                - Get user details
# 3. entra_list_groups             - List groups
# 4. entra_get_group               - Get group details
# 5. entra_list_applications       - List applications
# 6. entra_get_application         - Get application details
# 7. entra_list_service_principals - List service principals
# 8. entra_get_service_principal   - Get service principal details
# 9. entra_list_directory_roles   - List directory roles
# 10. entra_assign_user_to_role   - Assign user to directory role

- slug: entra_list_users
  name: List Users
  description: |
    List all users in Entra ID.
    Filter by department, title, or search.
  provider: microsoft-entra-id
  endpoint: /v1.0/users
  method: GET
  scopes:
    - User.Read.All
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      $filter:
        type: string
        description: "OData filter expression"
      $search:
        type: string
        description: "Search query"
      $top:
        type: integer
        description: "Max results"
        default: 50
    required: []

- slug: entra_get_user
  name: Get User
  description: |
    Get detailed information about a specific user.
  provider: microsoft-entra-id
  endpoint: /v1.0/users/{userId}
  method: GET
  scopes:
    - User.Read.All
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      userId:
        type: string
        description: "User ID or email"
    required:
      - userId

