# SuiteDash Tools - Allowlist
# Curated subset of SuiteDash API for AI agent use.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. suitedash_list_users      - List all users
# 2. suitedash_get_user       - Get user details
# 3. suitedash_create_user    - Create a new user
# 4. suitedash_list_teams     - List all teams
# 5. suitedash_get_team       - Get team details
# 6. suitedash_list_projects  - List all projects
# 7. suitedash_get_project    - Get project details
# 8. suitedash_list_tasks     - List all tasks
# 9. suitedash_get_task       - Get task details
# 10. suitedash_list_invoices - List all invoices

- slug: suitedash_list_users
  name: List suitedash Users
  description: |
    List all users in SuiteDash with optional filtering by role, status, or team. Returns user names, email addresses, and role assignments.
  provider: suitedash
  endpoint: /users
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing users
    properties:
      role:
        type: string
        description: "Filter by role"
      status:
        type: string
        description: "Filter by status (active, inactive)"
      team_id:
        type: string
        description: "Filter by team ID"
      limit:
        type: integer
        description: "Max results (default 50)"
        default: 50
      offset:
        type: integer
        description: "Pagination offset"
    required: []

- slug: suitedash_get_user
  name: Get suitedash User
  description: |
    Retrieve detailed information for a specific user including their profile, role, and permissions within the SuiteDash workspace.
  provider: suitedash
  endpoint: /users/{id}
  method: GET
  scopes:
    - users:read
  tags:
    - users
    - read
  input_schema:
    type: object
    description: Parameters for getting a user
    properties:
      id:
        type: string
        description: "User ID"
    required:
      - id

- slug: suitedash_create_user
  name: Create suitedash User
  description: |
    Create a new user in SuiteDash with the specified name, email, role, and team assignments.
  provider: suitedash
  endpoint: /users
  method: POST
  scopes:
    - users:write
  tags:
    - users
    - create
  input_schema:
    type: object
    description: Parameters for creating a user
    properties:
      first_name:
        type: string
        description: "First name"
      last_name:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      role:
        type: string
        description: "User role (admin, member, guest)"
      team_ids:
        type: array
        description: "Team IDs to assign"
    required:
      - first_name
      - last_name
      - email

