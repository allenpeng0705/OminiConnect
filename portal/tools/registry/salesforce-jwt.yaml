# Salesforce-jwt Tools - Allowlist
# Curated subset of Salesforce API for AI agent use.
# JWT Bearer Token OAuth via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. salesforce-jwt_list_contacts       - List all contacts
# 2. salesforce-jwt_get_contact         - Get contact details
# 3. salesforce-jwt_create_contact       - Create a contact
# 4. salesforce-jwt_list_leads          - List all leads
# 5. salesforce-jwt_get_lead           - Get lead details
# 6. salesforce-jwt_create_lead        - Create a lead
# 7. salesforce-jwt_list_opportunities - List opportunities
# 8. salesforce-jwt_get_opportunity    - Get opportunity details
# 9. salesforce-jwt_list_accounts       - List all accounts
# 10. salesforce-jwt_get_account        - Get account details

- slug: salesforce-jwt_list_contacts
  name: List salesforce-jwt Contacts
  description: |
    Retrieve a list of all contacts.
  provider: salesforce-jwt
  endpoint: /v1/contacts
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
    - crm
    - salesforce
  input_schema:
    type: object
    description: Parameters for listing contacts
    properties:
      limit:
        type: integer
        description: "Number of contacts"
        default: 50
    required: []

- slug: salesforce-jwt_get_contact
  name: Get salesforce-jwt Contact
  description: |
    Get details of a specific contact.
  provider: salesforce-jwt
  endpoint: /v1/contacts/{contactId}
  method: GET
  scopes:
    - contacts:read
  tags:
    - contacts
    - crm
    - salesforce
  input_schema:
    type: object
    description: Parameters for getting a contact
    properties:
      contactId:
        type: string
        description: "The contact ID"
    required:
      - contactId

- slug: salesforce-jwt_create_contact
  name: Create Contact
  description: |
    Create a new contact in Salesforce.
  provider: salesforce-jwt
  endpoint: /v1/contacts
  method: POST
  scopes:
    - contacts:write
  tags:
    - contacts
    - crm
    - salesforce
    - create
  input_schema:
    type: object
    description: Parameters for creating a contact
    properties:
      firstName:
        type: string
        description: "First name"
      lastName:
        type: string
        description: "Last name"
      email:
        type: string
        description: "Email address"
      accountId:
        type: string
        description: "Related account ID"
    required:
      - firstName
      - lastName

