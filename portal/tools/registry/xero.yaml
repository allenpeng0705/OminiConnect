- slug: xero_list_bank_transactions
  name: List Bank Transactions
  description: |
    List all bank transactions in the Xero organization with optional filtering by status, type, and modification date.
    Returns transaction records including dates, amounts, and associated account information.
  provider: xero
  endpoint: /api.xro/2.0/BankTransactions
  method: GET
  scopes:
    - accounting
  tags:
    - bank_transactions
    - accounting
  input_schema:
    type: object
    description: Parameters for listing bank transactions
    properties:
      if_modified_since:
        type: string
        description: "Filter by date modified after this date (YYYY-MM-DD)"
      status:
        type: string
        description: "Filter by status: DRAFT, AUTHORISED, PAID"
      type:
        type: string
        description: "Transaction type: RECEIVE, SPEND, RECEIVE-PREPAYMENT, etc."
      page:
        type: integer
        description: "Page number for pagination"
        default: 1
    required: []

- slug: xero_get_bank_transaction
  name: Get Bank Transaction
  description: |
    Get details of a specific bank transaction by its ID including amount, date, and line items for reconciliation.
    Returns transaction data for bank feed matching and financial auditing.
  provider: xero
  endpoint: /api.xro/2.0/BankTransactions/{bank_transaction_id}
  method: GET
  scopes:
    - accounting
  tags:
    - bank_transactions
    - read
  input_schema:
    type: object
    description: Parameters for getting a bank transaction
    properties:
      bank_transaction_id:
        type: string
        description: "Bank Transaction ID (GUID)"
    required:
      - bank_transaction_id
