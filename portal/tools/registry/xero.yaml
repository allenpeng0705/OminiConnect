- slug: xero_get_account
  name: Get Account
  description: |
    Get details of a specific account by its ID including type, balance, and metadata for financial reporting.
    Returns account data for bookkeeping and reconciliation.
  provider: xero
  endpoint: /api.xro/2.0/Accounts/{account_id}
  method: GET
  scopes:
    - accounting
  tags:
    - accounts
    - read
  input_schema:
    type: object
    description: Parameters for getting an account
    properties:
      account_id:
        type: string
        description: "Account ID (GUID)"
    required:
