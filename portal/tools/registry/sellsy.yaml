# Sellsy Tools - Allowlist
# Curated subset of Sellsy API for AI agent use.
# Auth mode: OAUTH2.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. list_contacts                            - List all contacts
# 2. get_contact                              - Get contact details
# 3. list_invoices                            - List all invoices
# 4. get_invoice                              - Get invoice details
# 5. list_tasks                               - List all tasks
# 6. get_task                                 - Get task details
# 7. list_estimates                           - List all estimates
# 8. get_estimate                             - Get estimate details
# 9. list_payments                            - List all payments
# 10. get_company                              - Get company profile

- slug: list_contacts
  name: List Contacts
  description: |
    List all contacts
  provider: sellsy
  endpoint: /contacts
  method: GET
  scopes: []
  tags:
    - contacts
    - crm
  input_schema:
    type: object
    description: Parameters for this tool
    properties: {}
    required: []

