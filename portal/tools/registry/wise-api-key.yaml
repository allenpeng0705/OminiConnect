# Wise (API Key) Tools - Allowlist
# Curated subset of Wise (API Key) API for AI agent use.
# API Key via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# # 1. wise_list_profiles           - List all user profiles
# # 2. wise_get_profile           - Get profile details
# # 3. wise_list_balances           - List all account balances
# # 4. wise_list_accounts           - List all accounts
# # 5. wise_create_account           - Create a new account
# # 6. wise_list_transfers           - List all transfers
# # 7. wise_create_transfer           - Create a new transfer
# # 8. wise_get_quote           - Get a transfer quote
# # 9. wise_list_recipients           - List all recipients
# # 10. wise_create_recipient           - Create a new recipient

- slug: wise_list_profiles
  name: List Profiles
  description: |
    List all user profiles
  provider: wise-api-key
  endpoint: /v1/profiles
  method: GET
  scopes:
    - read
  tags:
    - wise-api-key
  input_schema:
    type: object
    description: Parameters for list profiles
    properties: {}
    required: []

- slug: wise_get_profile
  name: Get Profile
  description: |
    Get profile details
  provider: wise-api-key
  endpoint: /v1/profiles/{id}
  method: GET
  scopes:
    - read
  tags:
    - wise-api-key
  input_schema:
    type: object
    description: Parameters for get profile
    properties: {}
    required: []

