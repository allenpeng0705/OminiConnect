# MIP On-Premise Tools - Allowlist
# Curated subset of MIP On-Premise API for AI agent use.
# TWO_STEP via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. mip_on_premise_list_companies       - List companies
# 2. mip_on_premise_get_company         - Get company details
# 3. mip_on_premise_list_users          - List users
# 4. mip_on_premise_get_user            - Get user details
# 5. mip_on_premise_list_accounts       - List accounts
# 6. mip_on_premise_get_account         - Get account details
# 7. mip_on_premise_list_journals       - List journals
# 8. mip_on_premise_get_journal         - Get journal details
# 9. mip_on_premise_list_reports       - List reports
# 10. mip_on_premise_get_report        - Get report details

- slug: mip_on_premise_list_companies
  name: List Companies
  description: |
    List all companies in the MIP On-Premise installation. Returns company names, IDs, and registration status.
  provider: mip-on-premise
  endpoint: /api/v1/companies
  method: GET
  scopes: []
  tags:
    - companies
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing companies
    properties: {}
    required: []

- slug: mip_on_premise_get_company
  name: Get Company
  description: |
    Get details about a specific MIP On-Premise company, including financial settings and configuration.
  provider: mip-on-premise
  endpoint: /api/v1/companies/{companyId}
  method: GET
  scopes: []
  tags:
    - companies
    - read
  input_schema:
    type: object
    description: Parameters for getting a company
    properties:
      companyId:
        type: string
        description: "Company ID"
    required:
      - companyId

