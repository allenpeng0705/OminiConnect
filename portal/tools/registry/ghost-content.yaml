# Ghost Content API Tools - Allowlist
# Curated subset of Ghost Content API for AI agent use.
# API_KEY via Nango.
# Each tool is an allowlist entry: only listed tools are exposed to LLMs.

# === TOOL LIST ===
# 1. ghost_content_list_posts       - List published posts
# 2. ghost_content_get_post        - Get post by slug
# 3. ghost_content_list_pages      - List published pages
# 4. ghost_content_get_page        - Get page by slug
# 5. ghost_content_list_tags       - List tags
# 6. ghost_content_get_tag         - Get tag by slug
# 7. ghost_content_list_authors    - List authors
# 8. ghost_content_get_author      - Get author by slug
# 9. ghost_content_list_settings   - Get site settings
# 10. ghost_content_list_tiers    - List membership tiers

- slug: ghost_content_list_posts
  name: List Posts
  description: |
    List all published posts from Ghost.
  provider: ghost-content
  endpoint: /posts
  method: GET
  scopes:
    - read
  tags:
    - posts
    - list
    - content
  input_schema:
    type: object
    description: Parameters for listing posts
    properties:
      limit:
        type: integer
        description: "Number of results"
        default: 20
      page:
        type: integer
        description: "Page number"
        default: 1
    required: []

- slug: ghost_content_get_post
  name: Get Post
  description: |
    Get a specific post by its slug.
  provider: ghost-content
  endpoint: /posts/{slug}
  method: GET
  scopes:
    - read
  tags:
    - posts
    - read
  input_schema:
    type: object
    description: Parameters for getting a post
    properties:
      slug:
        type: string
        description: "Post slug"
    required:
      - slug

