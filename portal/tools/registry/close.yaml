- slug: close_list_tasks
  name: List close Tasks
  description: |
    List all tasks in Close CRM with optional filtering by lead, assigned user, or status, returning task IDs, titles, due dates, assignees, and current status.
  provider: close
  endpoint: /api/v1/task
  method: GET
  scopes:
    - task:read
  tags:
    - tasks
    - list
    - read
  input_schema:
    type: object
    description: Parameters for listing tasks
    properties:
      lead_id:
        type: string
        description: "Filter by lead ID"
      user_id:
        type: string
        description: "Filter by assigned user ID"
      status:
        type: string
        description: "Filter by status (open, completed)"
      limit:
        type: integer
        description: "Max results (default 100)"
        default: 100
      skip:
        type: integer
        description: "Number of results to skip"
