# Shopify Tool Selection Queries

provider: shopify
queries:
  - query: "list all orders"
    expected_tool: shopify_list_orders
    category: list
    variations:
      - "show my shopify orders"
      - "find orders"
      - "what orders exist"
    description_notes: null

  - query: "create an order"
    expected_tool: shopify_create_order
    category: create
    variations:
      - "add an order"
      - "create a new order"
      - "open an order"
    description_notes: null

  - query: "get order details"
    expected_tool: shopify_get_order
    category: read
    variations:
      - "show me order details"
      - "what is this order about"
      - "lookup order"
    description_notes: null

  - query: "list all products"
    expected_tool: shopify_list_products
    category: list
    variations:
      - "show me all products"
      - "find products"
      - "what products exist"
    description_notes: null

  - query: "create a product"
    expected_tool: shopify_create_product
    category: create
    variations:
      - "add a product"
      - "create a new product"
      - "add to inventory"
    description_notes: null

  - query: "list all customers"
    expected_tool: shopify_list_customers
    category: list
    variations:
      - "show me all customers"
      - "find customers"
      - "what customers exist"
    description_notes: null