# Algolia Tool Selection Queries

provider: algolia
queries:
  - query: "list all indices"
    expected_tool: algolia_list_indices
    category: list
    variations:
      - "show my indices"
      - "find indices"
      - "what indices exist"
    description_notes: null

  - query: "create an index"
    expected_tool: algolia_create_index
    category: create
    variations:
      - "add an index"
      - "create an index"
      - "make an index"
    description_notes: null

  - query: "add an object"
    expected_tool: algolia_add_object
    category: create
    variations:
      - "add a record"
      - "add to index"
      - "insert object"
    description_notes: null

  - query: "search for objects"
    expected_tool: algolia_search
    category: search
    variations:
      - "find objects"
      - "lookup objects"
      - "search"
    description_notes: null

  - query: "delete an object"
    expected_tool: algolia_delete_object
    category: delete
    variations:
      - "remove an object"
      - "delete record"
      - "erase object"
    description_notes: null

  - query: "list all API keys"
    expected_tool: algolia_list_api_keys
    category: list
    variations:
      - "show me API keys"
      - "find keys"
      - "what keys exist"
    description_notes: null