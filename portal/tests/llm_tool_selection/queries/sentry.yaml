# Sentry Tool Selection Queries

provider: sentry
queries:
  - query: "list all projects"
    expected_tool: sentry_list_projects
    category: list
    variations:
      - "show my projects"
      - "find projects"
      - "what projects exist"
    description_notes: null

  - query: "create a project"
    expected_tool: sentry_create_project
    category: create
    variations:
      - "add a project"
      - "create a project"
      - "make a project"
    description_notes: null

  - query: "list all issues"
    expected_tool: sentry_list_issues
    category: list
    variations:
      - "show my issues"
      - "find issues"
      - "what issues exist"
    description_notes: null

  - query: "get issue details"
    expected_tool: sentry_get_issue
    category: read
    variations:
      - "show me issue details"
      - "what is this issue about"
      - "lookup issue"
    description_notes: null

  - query: "list all events"
    expected_tool: sentry_list_events
    category: list
    variations:
      - "show me events"
      - "find events"
      - "what events exist"
    description_notes: null

  - query: "get event details"
    expected_tool: sentry_get_event
    category: read
    variations:
      - "show me event details"
      - "what is this event about"
      - "lookup event"
    description_notes: null