# Okta Tool Selection Queries

provider: okta
queries:
  - query: "list all users"
    expected_tool: okta_list_users
    category: list
    variations:
      - "show my users"
      - "find users"
      - "what users exist"
    description_notes: null

  - query: "create a user"
    expected_tool: okta_create_user
    category: create
    variations:
      - "add a user"
      - "create a new user"
      - "invite user"
    description_notes: null

  - query: "get user details"
    expected_tool: okta_get_user
    category: read
    variations:
      - "show me user details"
      - "what is this user about"
      - "lookup user"
    description_notes: null

  - query: "update a user"
    expected_tool: okta_update_user
    category: update
    variations:
      - "modify the user"
      - "change user info"
      - "edit user"
    description_notes: null

  - query: "deactivate a user"
    expected_tool: okta_deactivate_user
    category: update
    variations:
      - "disable user"
      - "deprovision user"
      - "remove user"
    description_notes: null

  - query: "list all applications"
    expected_tool: okta_list_applications
    category: list
    variations:
      - "show me applications"
      - "find apps"
      - "what applications exist"
    description_notes: null