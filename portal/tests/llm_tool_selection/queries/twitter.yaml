# Twitter Tool Selection Queries

provider: twitter
queries:
  - query: "post a tweet"
    expected_tool: twitter_create_tweet
    category: create
    variations:
      - "send a tweet"
      - "post to twitter"
      - "tweet something"
    description_notes: null

  - query: "list my tweets"
    expected_tool: twitter_list_tweets
    category: list
    variations:
      - "show my tweets"
      - "find my tweets"
      - "what tweets did I post"
    description_notes: null

  - query: "search for tweets"
    expected_tool: twitter_search_tweets
    category: search
    variations:
      - "find tweets matching query"
      - "lookup tweets"
      - "search twitter"
    description_notes: null

  - query: "get user profile"
    expected_tool: twitter_get_user
    category: read
    variations:
      - "show user profile"
      - "what is this user about"
      - "lookup user"
    description_notes: null

  - query: "list followers"
    expected_tool: twitter_list_followers
    category: list
    variations:
      - "show my followers"
      - "find followers"
      - "who follows me"
    description_notes: null

  - query: "list following"
    expected_tool: twitter_list_following
    category: list
    variations:
      - "show who I follow"
      - "find following"
      - "my following list"
    description_notes: null