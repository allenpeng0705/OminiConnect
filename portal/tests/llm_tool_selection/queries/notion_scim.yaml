# Notion SCIM Tool Selection Queries

provider: notion-scim
queries:
  - query: "list all users"
    expected_tool: notion_scim_list_users
    category: list
    variations:
      - "show me all users"
      - "find users"
      - "what users exist"
    description_notes: null

  - query: "create a user"
    expected_tool: notion_scim_create_user
    category: create
    variations:
      - "add a user"
      - "create a new user"
      - "invite user"
    description_notes: null

  - query: "get user details"
    expected_tool: notion_scim_get_user
    category: read
    variations:
      - "show me user details"
      - "what is this user about"
      - "lookup user"
    description_notes: null

  - query: "update a user"
    expected_tool: notion_scim_update_user
    category: update
    variations:
      - "modify the user"
      - "change user info"
      - "edit user"
    description_notes: null

  - query: "deactivate a user"
    expected_tool: notion_scim_deactivate_user
    category: update
    variations:
      - "disable user"
      - "deprovision user"
      - "remove user"
    description_notes: null

  - query: "list all groups"
    expected_tool: notion_scim_list_groups
    category: list
    variations:
      - "show me groups"
      - "find groups"
      - "what groups exist"
    description_notes: null