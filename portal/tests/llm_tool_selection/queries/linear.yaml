# Linear Tool Selection Queries

provider: linear
queries:
  - query: "list all my issues"
    expected_tool: linear_list_issues
    category: list
    variations:
      - "show my linear tasks"
      - "find issues assigned to me"
      - "what issues do I have"
    description_notes: null

  - query: "create a new issue"
    expected_tool: linear_create_issue
    category: create
    variations:
      - "open a new issue"
      - "create a task"
      - "add a new issue"
    description_notes: null

  - query: "get details of an issue"
    expected_tool: linear_get_issue
    category: read
    variations:
      - "show me issue details"
      - "what is this issue about"
      - "open issue"
    description_notes: null

  - query: "update an issue status"
    expected_tool: linear_update_issue
    category: update
    variations:
      - "change issue status"
      - "mark as done"
      - "update the issue"
    description_notes: null

  - query: "list all teams"
    expected_tool: linear_list_teams
    category: list
    variations:
      - "show me all teams"
      - "find linear teams"
      - "what teams exist"
    description_notes: null

  - query: "list all projects"
    expected_tool: linear_list_projects
    category: list
    variations:
      - "show me all projects"
      - "find projects"
      - "what projects exist"
    description_notes: null