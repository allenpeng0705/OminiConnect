# Mixpanel Tool Selection Queries

provider: mixpanel
queries:
  - query: "list all events"
    expected_tool: mixpanel_list_events
    category: list
    variations:
      - "show my events"
      - "find events"
      - "what events exist"
    description_notes: null

  - query: "track an event"
    expected_tool: mixpanel_track_event
    category: create
    variations:
      - "send event"
      - "record event"
      - "capture event"
    description_notes: null

  - query: "list all funnels"
    expected_tool: mixpanel_list_funnels
    category: list
    variations:
      - "show me funnels"
      - "find funnels"
      - "what funnels exist"
    description_notes: null

  - query: "get user profile"
    expected_tool: mixpanel_get_user_profile
    category: read
    variations:
      - "show me user profile"
      - "what is this user about"
      - "lookup user"
    description_notes: null

  - query: "list all cohorts"
    expected_tool: mixpanel_list_cohorts
    category: list
    variations:
      - "show me cohorts"
      - "find cohorts"
      - "what cohorts exist"
    description_notes: null

  - query: "list all annotations"
    expected_tool: mixpanel_list_annotations
    category: list
    variations:
      - "show me annotations"
      - "find annotations"
      - "what annotations exist"
    description_notes: null