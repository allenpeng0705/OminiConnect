# Freshdesk Tool Selection Queries

provider: freshdesk
queries:
  - query: "list all tickets"
    expected_tool: freshdesk_list_tickets
    category: list
    variations:
      - "show my tickets"
      - "find tickets"
      - "what tickets exist"
    description_notes: null

  - query: "create a new ticket"
    expected_tool: freshdesk_create_ticket
    category: create
    variations:
      - "add a ticket"
      - "create a new ticket"
      - "open a ticket"
    description_notes: null

  - query: "get ticket details"
    expected_tool: freshdesk_get_ticket
    category: read
    variations:
      - "show me ticket details"
      - "what is this ticket about"
      - "lookup ticket"
    description_notes: null

  - query: "list all contacts"
    expected_tool: freshdesk_list_contacts
    category: list
    variations:
      - "show me all contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null

  - query: "create a new contact"
    expected_tool: freshdesk_create_contact
    category: create
    variations:
      - "add a contact"
      - "register a new contact"
      - "create contact"
    description_notes: null

  - query: "search for tickets"
    expected_tool: freshdesk_search_tickets
    category: search
    variations:
      - "find tickets matching query"
      - "lookup tickets"
      - "search tickets"
    description_notes: null