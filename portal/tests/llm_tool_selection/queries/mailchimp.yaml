# Mailchimp Tool Selection Queries

provider: mailchimp
queries:
  - query: "list all lists"
    expected_tool: mailchimp_list_lists
    category: list
    variations:
      - "show my lists"
      - "find lists"
      - "what lists exist"
    description_notes: null

  - query: "create a new list"
    expected_tool: mailchimp_create_list
    category: create
    variations:
      - "add a list"
      - "create a list"
      - "make a list"
    description_notes: null

  - query: "list all subscribers"
    expected_tool: mailchimp_list_subscribers
    category: list
    variations:
      - "show me subscribers"
      - "find subscribers"
      - "what subscribers exist"
    description_notes: null

  - query: "add a subscriber"
    expected_tool: mailchimp_add_subscriber
    category: create
    variations:
      - "add a contact"
      - "subscribe"
      - "create subscriber"
    description_notes: null

  - query: "send a campaign"
    expected_tool: mailchimp_send_campaign
    category: create
    variations:
      - "send email"
      - "send campaign"
      - "dispatch email"
    description_notes: null

  - query: "list all campaigns"
    expected_tool: mailchimp_list_campaigns
    category: list
    variations:
      - "show me campaigns"
      - "find campaigns"
      - "what campaigns exist"
    description_notes: null