# GitLab Tool Selection Queries

provider: gitlab
queries:
  - query: "list my projects"
    expected_tool: gitlab_list_projects
    category: list
    variations:
      - "show my gitlab repos"
      - "what projects do I have"
      - "list all my gitlab repositories"
    description_notes: null

  - query: "get details of a project"
    expected_tool: gitlab_get_project
    category: read
    variations:
      - "show me project details"
      - "what is this project about"
    description_notes: null

  - query: "list issues in a project"
    expected_tool: gitlab_list_issues
    category: list
    variations:
      - "show me the issues"
      - "what issues are there"
      - "list project issues"
    description_notes: null

  - query: "create a new issue"
    expected_tool: gitlab_create_issue
    category: create
    variations:
      - "open a new issue"
      - "create a ticket"
      - "add an issue"
    description_notes: null

  - query: "list merge requests"
    expected_tool: gitlab_list_merge_requests
    category: list
    variations:
      - "show me open MRs"
      - "what merge requests exist"
      - "list all MRs"
    description_notes: null

  - query: "get MR details"
    expected_tool: gitlab_get_merge_request
    category: read
    variations:
      - "show me merge request details"
      - "what is this MR about"
    description_notes: null