# Todoist Tool Selection Queries

provider: todoist
queries:
  - query: "list all tasks"
    expected_tool: todoist_list_tasks
    category: list
    variations:
      - "show my tasks"
      - "find tasks"
      - "what tasks exist"
    description_notes: null

  - query: "create a new task"
    expected_tool: todoist_create_task
    category: create
    variations:
      - "add a task"
      - "create a new task"
      - "open a task"
    description_notes: null

  - query: "get task details"
    expected_tool: todoist_get_task
    category: read
    variations:
      - "show me task details"
      - "what is this task about"
      - "lookup task"
    description_notes: null

  - query: "update a task"
    expected_tool: todoist_update_task
    category: update
    variations:
      - "modify the task"
      - "change task status"
      - "mark task as complete"
    description_notes: null

  - query: "list all projects"
    expected_tool: todoist_list_projects
    category: list
    variations:
      - "show me all projects"
      - "find projects"
      - "what projects exist"
    description_notes: null

  - query: "close a task"
    expected_tool: todoist_close_task
    category: update
    variations:
      - "complete the task"
      - "mark as done"
      - "finish task"
    description_notes: null