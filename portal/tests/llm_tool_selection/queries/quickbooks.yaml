# QuickBooks Tool Selection Queries

provider: quickbooks
queries:
  - query: "list all invoices"
    expected_tool: quickbooks_list_invoices
    category: list
    variations:
      - "show my invoices"
      - "find invoices"
      - "what invoices exist"
    description_notes: null

  - query: "create an invoice"
    expected_tool: quickbooks_create_invoice
    category: create
    variations:
      - "add an invoice"
      - "create a new invoice"
      - "make an invoice"
    description_notes: null

  - query: "get invoice details"
    expected_tool: quickbooks_get_invoice
    category: read
    variations:
      - "show me invoice details"
      - "what is this invoice about"
      - "lookup invoice"
    description_notes: null

  - query: "list all customers"
    expected_tool: quickbooks_list_customers
    category: list
    variations:
      - "show me all customers"
      - "find customers"
      - "what customers exist"
    description_notes: null

  - query: "create a customer"
    expected_tool: quickbooks_create_customer
    category: create
    variations:
      - "add a customer"
      - "register a new customer"
      - "create customer"
    description_notes: null

  - query: "list all accounts"
    expected_tool: quickbooks_list_accounts
    category: list
    variations:
      - "show me all accounts"
      - "find accounts"
      - "what accounts exist"
    description_notes: null