# Notion MCP Tool Selection Queries

provider: notion-mcp
queries:
  - query: "search for pages"
    expected_tool: notion_mcp_search_pages
    category: search
    variations:
      - "find pages"
      - "lookup pages"
      - "search pages"
    description_notes: null

  - query: "get page details"
    expected_tool: notion_mcp_get_page
    category: read
    variations:
      - "show me page details"
      - "what is this page about"
      - "lookup page"
    description_notes: null

  - query: "create a page"
    expected_tool: notion_mcp_create_page
    category: create
    variations:
      - "add a page"
      - "create a new page"
      - "make a page"
    description_notes: null

  - query: "update a page"
    expected_tool: notion_mcp_update_page
    category: update
    variations:
      - "modify the page"
      - "change page content"
      - "edit page"
    description_notes: null

  - query: "query a database"
    expected_tool: notion_mcp_query_database
    category: list
    variations:
      - "search the database"
      - "find entries"
      - "list database items"
    description_notes: null

  - query: "create a database"
    expected_tool: notion_mcp_create_database
    category: create
    variations:
      - "add a database"
      - "create a new database"
      - "make a database"
    description_notes: null