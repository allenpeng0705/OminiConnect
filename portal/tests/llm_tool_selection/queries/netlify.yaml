# Netlify Tool Selection Queries

provider: netlify
queries:
  - query: "list all sites"
    expected_tool: netlify_list_sites
    category: list
    variations:
      - "show my sites"
      - "find sites"
      - "what sites exist"
    description_notes: null

  - query: "create a new site"
    expected_tool: netlify_create_site
    category: create
    variations:
      - "add a site"
      - "create a site"
      - "make a site"
    description_notes: null

  - query: "get site details"
    expected_tool: netlify_get_site
    category: read
    variations:
      - "show me site details"
      - "what is this site about"
      - "lookup site"
    description_notes: null

  - query: "list all deploys"
    expected_tool: netlify_list_deploys
    category: list
    variations:
      - "show me deploys"
      - "find deploys"
      - "what deploys exist"
    description_notes: null

  - query: "create a deploy"
    expected_tool: netlify_create_deploy
    category: create
    variations:
      - "add a deploy"
      - "start a deploy"
      - "deploy"
    description_notes: null

  - query: "list all builds"
    expected_tool: netlify_list_builds
    category: list
    variations:
      - "show me builds"
      - "find builds"
      - "what builds exist"
    description_notes: null