# Pipedrive Tool Selection Queries

provider: pipedrive
queries:
  - query: "list all deals"
    expected_tool: pipedrive_list_deals
    category: list
    variations:
      - "show my deals"
      - "find deals"
      - "what deals exist"
    description_notes: null

  - query: "create a new deal"
    expected_tool: pipedrive_create_deal
    category: create
    variations:
      - "add a deal"
      - "create a deal"
      - "open a new deal"
    description_notes: null

  - query: "get deal details"
    expected_tool: pipedrive_get_deal
    category: read
    variations:
      - "show me deal details"
      - "what is this deal about"
      - "lookup deal"
    description_notes: null

  - query: "list all persons"
    expected_tool: pipedrive_list_persons
    category: list
    variations:
      - "show me all persons"
      - "find persons"
      - "what persons exist"
    description_notes: null

  - query: "create a person"
    expected_tool: pipedrive_create_person
    category: create
    variations:
      - "add a person"
      - "register a new person"
      - "create person"
    description_notes: null

  - query: "list all activities"
    expected_tool: pipedrive_list_activities
    category: list
    variations:
      - "show me all activities"
      - "find activities"
      - "what activities exist"
    description_notes: null