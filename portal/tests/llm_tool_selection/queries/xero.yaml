# Xero Tool Selection Queries

provider: xero
queries:
  - query: "list all invoices"
    expected_tool: xero_list_invoices
    category: list
    variations:
      - "show my invoices"
      - "find invoices"
      - "what invoices exist"
    description_notes: null

  - query: "create an invoice"
    expected_tool: xero_create_invoice
    category: create
    variations:
      - "add an invoice"
      - "create a new invoice"
      - "make an invoice"
    description_notes: null

  - query: "get invoice details"
    expected_tool: xero_get_invoice
    category: read
    variations:
      - "show me invoice details"
      - "what is this invoice about"
      - "lookup invoice"
    description_notes: null

  - query: "list all contacts"
    expected_tool: xero_list_contacts
    category: list
    variations:
      - "show me all contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null

  - query: "create a contact"
    expected_tool: xero_create_contact
    category: create
    variations:
      - "add a contact"
      - "register a new contact"
      - "create contact"
    description_notes: null

  - query: "list all bills"
    expected_tool: xero_list_bills
    category: list
    variations:
      - "show me all bills"
      - "find bills"
      - "what bills exist"
    description_notes: null