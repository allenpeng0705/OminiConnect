# GitHub Tool Selection Queries
# Each query should map to exactly one tool in the registry

provider: github
queries:
  - query: "list my repositories"
    expected_tool: github_list_repos
    category: list
    variations:
      - "show me my github repos"
      - "what repositories do I have"
      - "list all my repos on github"
    description_notes: null

  - query: "list my repositories sorted by recently updated"
    expected_tool: github_list_repos
    category: list
    variations:
      - "show my repos ordered by last update"
      - "list github repos by updated date"
    description_notes: null

  - query: "get details of repository owner/repo"
    expected_tool: github_get_repo
    category: read
    variations:
      - "show me the details of a repo"
      - "what is the status of owner/repo"
      - "give me info about this repository"
    description_notes: null

  - query: "create a new repository called my-new-repo"
    expected_tool: github_create_repo
    category: create
    variations:
      - "make a new github repo"
      - "add a repository named my-new-repo"
      - "create a repo"
    description_notes: null

  - query: "list issues in my repository"
    expected_tool: github_list_issues
    category: list
    variations:
      - "show me the open issues"
      - "what issues are there in this repo"
      - "list all github issues"
    description_notes: null

  - query: "show me issue number 42"
    expected_tool: github_get_issue
    category: read
    variations:
      - "get details of issue 42"
      - "what is issue #42 about"
      - "open issue 42"
    description_notes: null

  - query: "create an issue titled Bug found in login"
    expected_tool: github_create_issue
    category: create
    variations:
      - "open a new issue"
      - "file a bug report"
      - "create issue"
    description_notes: null

  - query: "list pull requests in this repo"
    expected_tool: github_list_pull_requests
    category: list
    variations:
      - "show me the open PRs"
      - "what pull requests are there"
      - "list all PRs"
    description_notes: null

  - query: "get details of pull request #15"
    expected_tool: github_get_pull_request
    category: read
    variations:
      - "show me PR 15"
      - "what is pull request #15"
    description_notes: null

  - query: "list branches in my repository"
    expected_tool: github_list_branches
    category: list
    variations:
      - "show me all branches"
      - "what branches exist"
      - "list github branches"
    description_notes: null

  - query: "get information about the main branch"
    expected_tool: github_get_branch
    category: read
    variations:
      - "show me the main branch details"
      - "what is on the master branch"
    description_notes: null
