# Intercom Tool Selection Queries

provider: intercom
queries:
  - query: "list all conversations"
    expected_tool: intercom_list_conversations
    category: list
    variations:
      - "show my conversations"
      - "find conversations"
      - "what conversations exist"
    description_notes: null

  - query: "create a new conversation"
    expected_tool: intercom_create_conversation
    category: create
    variations:
      - "add a conversation"
      - "start a conversation"
      - "open a conversation"
    description_notes: null

  - query: "get conversation details"
    expected_tool: intercom_get_conversation
    category: read
    variations:
      - "show me conversation details"
      - "what is this conversation about"
      - "lookup conversation"
    description_notes: null

  - query: "list all contacts"
    expected_tool: intercom_list_contacts
    category: list
    variations:
      - "show me all contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null

  - query: "create a new contact"
    expected_tool: intercom_create_contact
    category: create
    variations:
      - "add a contact"
      - "register a new contact"
      - "create contact"
    description_notes: null

  - query: "search for conversations"
    expected_tool: intercom_search_conversations
    category: search
    variations:
      - "find conversations matching query"
      - "lookup conversations"
      - "search conversations"
    description_notes: null