# Google Workspace Tool Selection Queries

provider: google_workspace
queries:
  - query: "list all calendar events"
    expected_tool: google_calendar_list_events
    category: list
    variations:
      - "show my calendar"
      - "find events"
      - "what meetings do I have"
    description_notes: null

  - query: "create a calendar event"
    expected_tool: google_calendar_create_event
    category: create
    variations:
      - "add a meeting"
      - "schedule an event"
      - "create event"
    description_notes: null

  - query: "get calendar event details"
    expected_tool: google_calendar_get_event
    category: read
    variations:
      - "show event details"
      - "what is this meeting about"
      - "lookup event"
    description_notes: null

  - query: "list all emails"
    expected_tool: google_gmail_list_messages
    category: list
    variations:
      - "show my emails"
      - "find emails"
      - "list messages"
    description_notes: null

  - query: "send an email"
    expected_tool: google_gmail_send_message
    category: create
    variations:
      - "send a message"
      - "compose email"
      - "send mail"
    description_notes: null

  - query: "search for emails"
    expected_tool: google_gmail_search_messages
    category: search
    variations:
      - "find emails matching query"
      - "lookup emails"
      - "search mail"
    description_notes: null