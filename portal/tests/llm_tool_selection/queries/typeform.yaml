# Typeform Tool Selection Queries

provider: typeform
queries:
  - query: "list all forms"
    expected_tool: typeform_list_forms
    category: list
    variations:
      - "show my forms"
      - "find forms"
      - "what forms exist"
    description_notes: null

  - query: "create a form"
    expected_tool: typeform_create_form
    category: create
    variations:
      - "add a form"
      - "create a new form"
      - "make a form"
    description_notes: null

  - query: "get form details"
    expected_tool: typeform_get_form
    category: read
    variations:
      - "show me form details"
      - "what is this form about"
      - "lookup form"
    description_notes: null

  - query: "list responses"
    expected_tool: typeform_list_responses
    category: list
    variations:
      - "show me responses"
      - "find responses"
      - "what responses exist"
    description_notes: null

  - query: "get response details"
    expected_tool: typeform_get_response
    category: read
    variations:
      - "show me response details"
      - "what is this response about"
      - "lookup response"
    description_notes: null

  - query: "list all workspaces"
    expected_tool: typeform_list_workspaces
    category: list
    variations:
      - "show me workspaces"
      - "find workspaces"
      - "what workspaces exist"
    description_notes: null