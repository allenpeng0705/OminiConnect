# Vercel Tool Selection Queries

provider: vercel
queries:
  - query: "list all deployments"
    expected_tool: vercel_list_deployments
    category: list
    variations:
      - "show my deployments"
      - "find deployments"
      - "what deployments exist"
    description_notes: null

  - query: "create a new deployment"
    expected_tool: vercel_create_deployment
    category: create
    variations:
      - "add a deployment"
      - "deploy project"
      - "start deployment"
    description_notes: null

  - query: "get deployment details"
    expected_tool: vercel_get_deployment
    category: read
    variations:
      - "show me deployment details"
      - "what is this deployment about"
      - "lookup deployment"
    description_notes: null

  - query: "list all projects"
    expected_tool: vercel_list_projects
    category: list
    variations:
      - "show me all projects"
      - "find projects"
      - "what projects exist"
    description_notes: null

  - query: "get project details"
    expected_tool: vercel_get_project
    category: read
    variations:
      - "show project info"
      - "what is this project about"
      - "lookup project"
    description_notes: null

  - query: "list all domains"
    expected_tool: vercel_list_domains
    category: list
    variations:
      - "show me domains"
      - "find domains"
      - "what domains exist"
    description_notes: null