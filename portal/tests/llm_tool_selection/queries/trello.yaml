# Trello Tool Selection Queries

provider: trello
queries:
  - query: "list all boards"
    expected_tool: trello_list_boards
    category: list
    variations:
      - "show my trello boards"
      - "find boards"
      - "what boards do I have"
    description_notes: null

  - query: "list cards on a board"
    expected_tool: trello_list_cards
    category: list
    variations:
      - "show cards on the board"
      - "find cards"
      - "what cards exist"
    description_notes: null

  - query: "create a new card"
    expected_tool: trello_create_card
    category: create
    variations:
      - "add a card"
      - "create a new card"
      - "open a card"
    description_notes: null

  - query: "get card details"
    expected_tool: trello_get_card
    category: read
    variations:
      - "show me card details"
      - "what is this card about"
      - "lookup card"
    description_notes: null

  - query: "update a card"
    expected_tool: trello_update_card
    category: update
    variations:
      - "modify the card"
      - "change card status"
      - "move the card"
    description_notes: null

  - query: "list all lists on a board"
    expected_tool: trello_list_lists
    category: list
    variations:
      - "show me all lists"
      - "find lists"
      - "what lists exist"
    description_notes: null