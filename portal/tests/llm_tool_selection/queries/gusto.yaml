# Gusto Tool Selection Queries

provider: gusto
queries:
  - query: "list all employees"
    expected_tool: gusto_list_employees
    category: list
    variations:
      - "show my employees"
      - "find employees"
      - "what employees exist"
    description_notes: null

  - query: "create an employee"
    expected_tool: gusto_create_employee
    category: create
    variations:
      - "add an employee"
      - "create a new employee"
      - "hire employee"
    description_notes: null

  - query: "get employee details"
    expected_tool: gusto_get_employee
    category: read
    variations:
      - "show me employee details"
      - "what is this employee about"
      - "lookup employee"
    description_notes: null

  - query: "list all time off requests"
    expected_tool: gusto_list_time_off
    category: list
    variations:
      - "show me time off requests"
      - "find time off"
      - "what time off exists"
    description_notes: null

  - query: "create a time off request"
    expected_tool: gusto_create_time_off
    category: create
    variations:
      - "add time off"
      - "request time off"
      - "submit time off"
    description_notes: null

  - query: "list all payrolls"
    expected_tool: gusto_list_payrolls
    category: list
    variations:
      - "show me payrolls"
      - "find payrolls"
      - "what payrolls exist"
    description_notes: null