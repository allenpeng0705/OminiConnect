# Slack MCP Tool Selection Queries

provider: slack-mcp
queries:
  - query: "send a message to a channel"
    expected_tool: slack_mcp_chat_post_message
    category: create
    variations:
      - "post a message"
      - "send a slack message"
      - "message to channel"
    description_notes: null

  - query: "list all channels"
    expected_tool: slack_mcp_conversations_list
    category: list
    variations:
      - "show my channels"
      - "find channels"
      - "what channels exist"
    description_notes: null

  - query: "search for messages"
    expected_tool: slack_mcp_search_messages
    category: search
    variations:
      - "find messages"
      - "lookup messages"
      - "search slack"
    description_notes: null

  - query: "get user information"
    expected_tool: slack_mcp_users_info
    category: read
    variations:
      - "show user details"
      - "what is this user about"
      - "lookup user"
    description_notes: null

  - query: "list all users"
    expected_tool: slack_mcp_users_list
    category: list
    variations:
      - "show me all users"
      - "find users"
      - "what users exist"
    description_notes: null

  - query: "upload a file"
    expected_tool: slack_mcp_files_upload
    category: create
    variations:
      - "share a file"
      - "post a file"
      - "upload file to slack"
    description_notes: null