# Zendesk Tool Selection Queries

provider: zendesk
queries:
  - query: "list all tickets"
    expected_tool: zendesk_list_tickets
    category: list
    variations:
      - "show my zendesk tickets"
      - "find tickets"
      - "what tickets exist"
    description_notes: null

  - query: "create a new ticket"
    expected_tool: zendesk_create_ticket
    category: create
    variations:
      - "add a ticket"
      - "create a new ticket"
      - "open a ticket"
    description_notes: null

  - query: "get ticket details"
    expected_tool: zendesk_get_ticket
    category: read
    variations:
      - "show me ticket details"
      - "what is this ticket about"
      - "lookup ticket"
    description_notes: null

  - query: "update a ticket"
    expected_tool: zendesk_update_ticket
    category: update
    variations:
      - "modify the ticket"
      - "change ticket status"
      - "close the ticket"
    description_notes: null

  - query: "list all users"
    expected_tool: zendesk_list_users
    category: list
    variations:
      - "show me all users"
      - "find users"
      - "what users exist"
    description_notes: null

  - query: "search for tickets"
    expected_tool: zendesk_search_tickets
    category: search
    variations:
      - "find tickets matching query"
      - "lookup tickets"
      - "search tickets"
    description_notes: null