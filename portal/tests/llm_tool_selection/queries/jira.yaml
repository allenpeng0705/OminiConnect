# Jira Tool Selection Queries

provider: jira
queries:
  - query: "list all my assigned issues"
    expected_tool: jira_list_issues
    category: search
    variations:
      - "find issues assigned to me"
      - "show my jira tasks"
      - "what issues am I working on"
    description_notes: null

  - query: "get details of issue TEST-123"
    expected_tool: jira_get_issue
    category: read
    variations:
      - "show me issue TEST-123"
      - "what is issue TEST-123 about"
      - "open issue TEST-123"
    description_notes: null

  - query: "create a new issue in project MYPROJ"
    expected_tool: jira_create_issue
    category: create
    variations:
      - "open a new jira ticket"
      - "create a bug report"
      - "add an issue to MYPROJ"
    description_notes: null

  - query: "update the status of issue TEST-456 to done"
    expected_tool: jira_update_issue
    category: update
    variations:
      - "mark TEST-456 as completed"
      - "change issue TEST-456 status"
      - "close issue TEST-456"
    description_notes: null

  - query: "list all projects I have access to"
    expected_tool: jira_list_projects
    category: list
    variations:
      - "show me all jira projects"
      - "what projects exist"
      - "find my jira projects"
    description_notes: null

  - query: "get details of a project"
    expected_tool: jira_get_project
    category: read
    variations:
      - "show me project details"
      - "what is project MYPROJ about"
    description_notes: null

  - query: "list sprints in the board"
    expected_tool: jira_list_sprints
    category: list
    variations:
      - "show me the sprints"
      - "what sprints exist"
      - "list agile sprints"
    description_notes: null