# ClickUp Tool Selection Queries

provider: clickup
queries:
  - query: "list all tasks"
    expected_tool: clickup_list_tasks
    category: list
    variations:
      - "show my tasks"
      - "find tasks"
      - "what tasks exist"
    description_notes: null

  - query: "create a new task"
    expected_tool: clickup_create_task
    category: create
    variations:
      - "add a task"
      - "create a new task"
      - "open a task"
    description_notes: null

  - query: "get task details"
    expected_tool: clickup_get_task
    category: read
    variations:
      - "show me task details"
      - "what is this task about"
      - "lookup task"
    description_notes: null

  - query: "update a task"
    expected_tool: clickup_update_task
    category: update
    variations:
      - "modify the task"
      - "change task status"
      - "mark task as complete"
    description_notes: null

  - query: "list all spaces"
    expected_tool: clickup_list_spaces
    category: list
    variations:
      - "show me all spaces"
      - "find spaces"
      - "what spaces exist"
    description_notes: null

  - query: "list all folders"
    expected_tool: clickup_list_folders
    category: list
    variations:
      - "show me all folders"
      - "find folders"
      - "what folders exist"
    description_notes: null