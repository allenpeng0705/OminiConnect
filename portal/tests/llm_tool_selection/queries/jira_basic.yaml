# Jira Basic Tool Selection Queries

provider: jira-basic
queries:
  - query: "list all issues"
    expected_tool: jira_basic_list_issues
    category: list
    variations:
      - "show my issues"
      - "find issues"
      - "what issues exist"
    description_notes: null

  - query: "create an issue"
    expected_tool: jira_basic_create_issue
    category: create
    variations:
      - "add an issue"
      - "create a new issue"
      - "open an issue"
    description_notes: null

  - query: "get issue details"
    expected_tool: jira_basic_get_issue
    category: read
    variations:
      - "show me issue details"
      - "what is this issue about"
      - "lookup issue"
    description_notes: null

  - query: "update an issue"
    expected_tool: jira_basic_update_issue
    category: update
    variations:
      - "modify the issue"
      - "change issue status"
      - "edit issue"
    description_notes: null

  - query: "list all projects"
    expected_tool: jira_basic_list_projects
    category: list
    variations:
      - "show me projects"
      - "find projects"
      - "what projects exist"
    description_notes: null

  - query: "search for issues"
    expected_tool: jira_basic_search_issues
    category: search
    variations:
      - "find issues"
      - "lookup issues"
      - "search issues"
    description_notes: null