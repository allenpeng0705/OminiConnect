# Dropbox Tool Selection Queries

provider: dropbox
queries:
  - query: "list all files"
    expected_tool: dropbox_list_files
    category: list
    variations:
      - "show my files"
      - "find files"
      - "what files exist"
    description_notes: null

  - query: "upload a file"
    expected_tool: dropbox_upload_file
    category: create
    variations:
      - "add a file"
      - "create a file"
      - "upload to dropbox"
    description_notes: null

  - query: "get file details"
    expected_tool: dropbox_get_file
    category: read
    variations:
      - "show me file details"
      - "what is this file about"
      - "lookup file"
    description_notes: null

  - query: "search for files"
    expected_tool: dropbox_search_files
    category: search
    variations:
      - "find files"
      - "lookup files"
      - "search dropbox"
    description_notes: null

  - query: "list shared folders"
    expected_tool: dropbox_list_shared_folders
    category: list
    variations:
      - "show shared folders"
      - "find shared"
      - "what shared folders exist"
    description_notes: null

  - query: "create a folder"
    expected_tool: dropbox_create_folder
    category: create
    variations:
      - "add a folder"
      - "create a folder"
      - "make a folder"
    description_notes: null