# Stripe Tool Selection Queries

provider: stripe
queries:
  - query: "list all customers"
    expected_tool: stripe_list_customers
    category: list
    variations:
      - "show me all stripe customers"
      - "find customers"
      - "list customers"
    description_notes: null

  - query: "create a new customer"
    expected_tool: stripe_create_customer
    category: create
    variations:
      - "add a customer"
      - "register a new customer"
      - "create customer"
    description_notes: null

  - query: "retrieve a customer by ID"
    expected_tool: stripe_get_customer
    category: read
    variations:
      - "get customer details"
      - "show me customercus_xxx"
      - "what is customer info"
    description_notes: null

  - query: "list all invoices"
    expected_tool: stripe_list_invoices
    category: list
    variations:
      - "show me all invoices"
      - "find invoices"
      - "list invoices"
    description_notes: null

  - query: "create an invoice"
    expected_tool: stripe_create_invoice
    category: create
    variations:
      - "make a new invoice"
      - "add an invoice"
      - "create invoice for customer"
    description_notes: null

  - query: "list all payment intents"
    expected_tool: stripe_list_payment_intents
    category: list
    variations:
      - "show payment history"
      - "find payments"
      - "list all payments"
    description_notes: null

  - query: "create a payment intent"
    expected_tool: stripe_create_payment_intent
    category: create
    variations:
      - "start a payment"
      - "create payment"
      - "setup payment"
    description_notes: null