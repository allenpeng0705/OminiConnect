# Spotify Tool Selection Queries

provider: spotify
queries:
  - query: "list my playlists"
    expected_tool: spotify_list_playlists
    category: list
    variations:
      - "show my playlists"
      - "find playlists"
      - "what playlists exist"
    description_notes: null

  - query: "create a playlist"
    expected_tool: spotify_create_playlist
    category: create
    variations:
      - "add a playlist"
      - "create a new playlist"
      - "make a playlist"
    description_notes: null

  - query: "get playlist details"
    expected_tool: spotify_get_playlist
    category: read
    variations:
      - "show me playlist details"
      - "what is this playlist about"
      - "lookup playlist"
    description_notes: null

  - query: "add track to playlist"
    expected_tool: spotify_add_track
    category: create
    variations:
      - "add a song"
      - "add to playlist"
      - "insert track"
    description_notes: null

  - query: "search for tracks"
    expected_tool: spotify_search
    category: search
    variations:
      - "find tracks"
      - "lookup songs"
      - "search spotify"
    description_notes: null

  - query: "get current user profile"
    expected_tool: spotify_get_current_user
    category: read
    variations:
      - "show my profile"
      - "what is my spotify info"
      - "lookup me"
    description_notes: null