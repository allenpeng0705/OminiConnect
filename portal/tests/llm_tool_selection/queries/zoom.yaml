# Zoom Tool Selection Queries

provider: zoom
queries:
  - query: "list all meetings"
    expected_tool: zoom_list_meetings
    category: list
    variations:
      - "show my meetings"
      - "find meetings"
      - "what meetings exist"
    description_notes: null

  - query: "create a new meeting"
    expected_tool: zoom_create_meeting
    category: create
    variations:
      - "schedule a meeting"
      - "add a meeting"
      - "create meeting"
    description_notes: null

  - query: "get meeting details"
    expected_tool: zoom_get_meeting
    category: read
    variations:
      - "show me meeting details"
      - "what is this meeting about"
      - "lookup meeting"
    description_notes: null

  - query: "list all users"
    expected_tool: zoom_list_users
    category: list
    variations:
      - "show me all users"
      - "find users"
      - "what users exist"
    description_notes: null

  - query: "list recordings"
    expected_tool: zoom_list_recordings
    category: list
    variations:
      - "show my recordings"
      - "find recordings"
      - "what recordings exist"
    description_notes: null

  - query: "update a meeting"
    expected_tool: zoom_update_meeting
    category: update
    variations:
      - "modify the meeting"
      - "change meeting details"
      - "edit meeting"
    description_notes: null