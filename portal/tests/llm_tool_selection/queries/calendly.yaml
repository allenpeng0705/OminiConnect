# Calendly Tool Selection Queries

provider: calendly
queries:
  - query: "list all event types"
    expected_tool: calendly_list_event_types
    category: list
    variations:
      - "show my event types"
      - "find event types"
      - "what events can I schedule"
    description_notes: null

  - query: "create an event type"
    expected_tool: calendly_create_event_type
    category: create
    variations:
      - "add an event type"
      - "create a new event"
      - "make an event type"
    description_notes: null

  - query: "list scheduled events"
    expected_tool: calendly_list_scheduled_events
    category: list
    variations:
      - "show my scheduled events"
      - "find events"
      - "what events are scheduled"
    description_notes: null

  - query: "get event details"
    expected_tool: calendly_get_event
    category: read
    variations:
      - "show me event details"
      - "what is this event about"
      - "lookup event"
    description_notes: null

  - query: "cancel an event"
    expected_tool: calendly_cancel_event
    category: update
    variations:
      - "cancel the event"
      - "remove event"
      - "delete event"
    description_notes: null

  - query: "list all users"
    expected_tool: calendly_list_users
    category: list
    variations:
      - "show me users"
      - "find users"
      - "what users exist"
    description_notes: null