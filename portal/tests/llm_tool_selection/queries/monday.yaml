# Monday.com Tool Selection Queries

provider: monday
queries:
  - query: "list all boards"
    expected_tool: monday_list_boards
    category: list
    variations:
      - "show my boards"
      - "find boards"
      - "what boards exist"
    description_notes: null

  - query: "list items on a board"
    expected_tool: monday_list_items
    category: list
    variations:
      - "show items on the board"
      - "find items"
      - "what items exist"
    description_notes: null

  - query: "create a new item"
    expected_tool: monday_create_item
    category: create
    variations:
      - "add an item"
      - "create a new item"
      - "open an item"
    description_notes: null

  - query: "get item details"
    expected_tool: monday_get_item
    category: read
    variations:
      - "show me item details"
      - "what is this item about"
      - "lookup item"
    description_notes: null

  - query: "update an item"
    expected_tool: monday_update_item
    category: update
    variations:
      - "modify the item"
      - "change item status"
      - "update item"
    description_notes: null

  - query: "list all workspaces"
    expected_tool: monday_list_workspaces
    category: list
    variations:
      - "show me workspaces"
      - "find workspaces"
      - "what workspaces exist"
    description_notes: null