# Timeular Tool Selection Queries

provider: timeular
queries:
  - query: "list all time entries"
    expected_tool: timeular_list_time_entries
    category: list
    variations:
      - "show my time entries"
      - "find time entries"
      - "what time have I tracked"
    description_notes: null

  - query: "create a time entry"
    expected_tool: timeular_create_time_entry
    category: create
    variations:
      - "add a time entry"
      - "track time"
      - "log time"
    description_notes: null

  - query: "get time entry details"
    expected_tool: timeular_get_time_entry
    category: read
    variations:
      - "show me entry details"
      - "what is this entry about"
      - "lookup entry"
    description_notes: null

  - query: "list all activities"
    expected_tool: timeular_list_activities
    category: list
    variations:
      - "show me activities"
      - "find activities"
      - "what activities exist"
    description_notes: null

  - query: "list all tags"
    expected_tool: timeular_list_tags
    category: list
    variations:
      - "show me all tags"
      - "find tags"
      - "what tags exist"
    description_notes: null

  - query: "stop current tracking"
    expected_tool: timeular_stop_tracking
    category: update
    variations:
      - "stop timer"
      - "stop tracking"
      - "end time entry"
    description_notes: null