# Salesforce JWT Tool Selection Queries

provider: salesforce-jwt
queries:
  - query: "list all accounts"
    expected_tool: salesforce_jwt_list_accounts
    category: list
    variations:
      - "show my accounts"
      - "find accounts"
      - "what accounts exist"
    description_notes: null

  - query: "create an account"
    expected_tool: salesforce_jwt_create_account
    category: create
    variations:
      - "add an account"
      - "create an account"
      - "make an account"
    description_notes: null

  - query: "get account details"
    expected_tool: salesforce_jwt_get_account
    category: read
    variations:
      - "show me account details"
      - "what is this account about"
      - "lookup account"
    description_notes: null

  - query: "list all contacts"
    expected_tool: salesforce_jwt_list_contacts
    category: list
    variations:
      - "show me contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null

  - query: "create a contact"
    expected_tool: salesforce_jwt_create_contact
    category: create
    variations:
      - "add a contact"
      - "create a contact"
      - "register contact"
    description_notes: null

  - query: "list all opportunities"
    expected_tool: salesforce_jwt_list_opportunities
    category: list
    variations:
      - "show me opportunities"
      - "find opportunities"
      - "what opportunities exist"
    description_notes: null