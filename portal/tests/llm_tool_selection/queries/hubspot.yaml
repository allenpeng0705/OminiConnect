# HubSpot Tool Selection Queries

provider: hubspot
queries:
  - query: "list all contacts"
    expected_tool: hubspot_list_contacts
    category: list
    variations:
      - "show me all contacts"
      - "find contacts"
      - "list contacts"
    description_notes: null

  - query: "create a new contact"
    expected_tool: hubspot_create_contact
    category: create
    variations:
      - "add a contact"
      - "register a new contact"
      - "create contact"
    description_notes: null

  - query: "get contact details"
    expected_tool: hubspot_get_contact
    category: read
    variations:
      - "show contact info"
      - "what is the contact details"
      - "lookup contact"
    description_notes: null

  - query: "search for companies"
    expected_tool: hubspot_search_companies
    category: search
    variations:
      - "find companies"
      - "lookup companies"
      - "search companies"
    description_notes: null

  - query: "list all deals"
    expected_tool: hubspot_list_deals
    category: list
    variations:
      - "show me all deals"
      - "find deals"
      - "what deals exist"
    description_notes: null

  - query: "create a new deal"
    expected_tool: hubspot_create_deal
    category: create
    variations:
      - "add a deal"
      - "create a deal"
      - "open a new deal"
    description_notes: null