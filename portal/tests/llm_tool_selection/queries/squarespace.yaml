# Squarespace Tool Selection Queries

provider: squarespace
queries:
  - query: "list all products"
    expected_tool: squarespace_list_products
    category: list
    variations:
      - "show my products"
      - "find products"
      - "what products exist"
    description_notes: null

  - query: "create a product"
    expected_tool: squarespace_create_product
    category: create
    variations:
      - "add a product"
      - "create a new product"
      - "make a product"
    description_notes: null

  - query: "get product details"
    expected_tool: squarespace_get_product
    category: read
    variations:
      - "show me product details"
      - "what is this product about"
      - "lookup product"
    description_notes: null

  - query: "list all orders"
    expected_tool: squarespace_list_orders
    category: list
    variations:
      - "show me orders"
      - "find orders"
      - "what orders exist"
    description_notes: null

  - query: "get order details"
    expected_tool: squarespace_get_order
    category: read
    variations:
      - "show me order details"
      - "what is this order about"
      - "lookup order"
    description_notes: null

  - query: "list all customers"
    expected_tool: squarespace_list_customers
    category: list
    variations:
      - "show me customers"
      - "find customers"
      - "what customers exist"
    description_notes: null