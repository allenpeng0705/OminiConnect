# Trello More Tool Selection Queries

provider: trello_more
queries:
  - query: "list all boards"
    expected_tool: trello_more_list_boards
    category: list
    variations:
      - "show my boards"
      - "find boards"
      - "what boards exist"
    description_notes: null

  - query: "list all organizations"
    expected_tool: trello_more_list_organizations
    category: list
    variations:
      - "show my organizations"
      - "find orgs"
      - "what orgs exist"
    description_notes: null

  - query: "get board details"
    expected_tool: trello_more_get_board
    category: read
    variations:
      - "show me board details"
      - "what is this board about"
      - "lookup board"
    description_notes: null

  - query: "search for boards"
    expected_tool: trello_more_search_boards
    category: search
    variations:
      - "find boards"
      - "lookup boards"
      - "search boards"
    description_notes: null

  - query: "get member details"
    expected_tool: trello_more_get_member
    category: read
    variations:
      - "show me member details"
      - "what is this member about"
      - "lookup member"
    description_notes: null

  - query: "list power-ups"
    expected_tool: trello_more_list_power_ups
    category: list
    variations:
      - "show power-ups"
      - "find integrations"
      - "what plugins exist"
    description_notes: null