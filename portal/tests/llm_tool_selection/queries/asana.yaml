# Asana Tool Selection Queries

provider: asana
queries:
  - query: "list all my tasks"
    expected_tool: asana_list_tasks
    category: list
    variations:
      - "show my asana tasks"
      - "find my tasks"
      - "what tasks do I have"
    description_notes: null

  - query: "create a new task"
    expected_tool: asana_create_task
    category: create
    variations:
      - "add a task"
      - "create a new task"
      - "open a task"
    description_notes: null

  - query: "get task details"
    expected_tool: asana_get_task
    category: read
    variations:
      - "show me task details"
      - "what is this task about"
      - "lookup task"
    description_notes: null

  - query: "update a task"
    expected_tool: asana_update_task
    category: update
    variations:
      - "modify the task"
      - "change task status"
      - "mark task as complete"
    description_notes: null

  - query: "list all projects"
    expected_tool: asana_list_projects
    category: list
    variations:
      - "show me all projects"
      - "find projects"
      - "what projects exist"
    description_notes: null

  - query: "list all workspaces"
    expected_tool: asana_list_workspaces
    category: list
    variations:
      - "show me workspaces"
      - "find workspaces"
      - "what workspaces exist"
    description_notes: null