# SendGrid Tool Selection Queries

provider: sendgrid
queries:
  - query: "list all emails"
    expected_tool: sendgrid_list_emails
    category: list
    variations:
      - "show my emails"
      - "find emails"
      - "what emails exist"
    description_notes: null

  - query: "send an email"
    expected_tool: sendgrid_send_email
    category: create
    variations:
      - "send a message"
      - "compose email"
      - "send mail"
    description_notes: null

  - query: "get email details"
    expected_tool: sendgrid_get_email
    category: read
    variations:
      - "show me email details"
      - "what is this email about"
      - "lookup email"
    description_notes: null

  - query: "list all contacts"
    expected_tool: sendgrid_list_contacts
    category: list
    variations:
      - "show me all contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null

  - query: "add a contact"
    expected_tool: sendgrid_add_contact
    category: create
    variations:
      - "add a recipient"
      - "create contact"
      - "subscribe"
    description_notes: null

  - query: "list all templates"
    expected_tool: sendgrid_list_templates
    category: list
    variations:
      - "show me templates"
      - "find templates"
      - "what templates exist"
    description_notes: null