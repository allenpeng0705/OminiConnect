# Airtable Tool Selection Queries

provider: airtable
queries:
  - query: "list all bases"
    expected_tool: airtable_list_bases
    category: list
    variations:
      - "show my bases"
      - "find bases"
      - "what bases exist"
    description_notes: null

  - query: "list records in a table"
    expected_tool: airtable_list_records
    category: list
    variations:
      - "show records in table"
      - "find records"
      - "list items"
    description_notes: null

  - query: "create a new record"
    expected_tool: airtable_create_record
    category: create
    variations:
      - "add a record"
      - "create a new record"
      - "insert record"
    description_notes: null

  - query: "get record details"
    expected_tool: airtable_get_record
    category: read
    variations:
      - "show me record details"
      - "what is this record about"
      - "lookup record"
    description_notes: null

  - query: "update a record"
    expected_tool: airtable_update_record
    category: update
    variations:
      - "modify the record"
      - "change record"
      - "edit record"
    description_notes: null

  - query: "list all tables in a base"
    expected_tool: airtable_list_tables
    category: list
    variations:
      - "show me tables"
      - "find tables"
      - "what tables exist"
    description_notes: null