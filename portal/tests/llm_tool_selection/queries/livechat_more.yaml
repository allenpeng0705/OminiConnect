# Livechat More Tool Selection Queries

provider: livechat_more
queries:
  - query: "list all chats"
    expected_tool: livechat_more_list_chats
    category: list
    variations:
      - "show my chats"
      - "find chats"
      - "what chats exist"
    description_notes: null

  - query: "create a chat"
    expected_tool: livechat_more_create_chat
    category: create
    variations:
      - "add a chat"
      - "start a chat"
      - "open a chat"
    description_notes: null

  - query: "get chat details"
    expected_tool: livechat_more_get_chat
    category: read
    variations:
      - "show me chat details"
      - "what is this chat about"
      - "lookup chat"
    description_notes: null

  - query: "send a message"
    expected_tool: livechat_more_send_message
    category: create
    variations:
      - "send a message"
      - "reply"
      - "message"
    description_notes: null

  - query: "list all agents"
    expected_tool: livechat_more_list_agents
    category: list
    variations:
      - "show me agents"
      - "find agents"
      - "what agents exist"
    description_notes: null

  - query: "list all tags"
    expected_tool: livechat_more_list_tags
    category: list
    variations:
      - "show me tags"
      - "find tags"
      - "what tags exist"
    description_notes: null