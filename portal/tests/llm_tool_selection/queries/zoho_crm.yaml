# Zoho CRM Tool Selection Queries

provider: zoho-crm
queries:
  - query: "list all leads"
    expected_tool: zohocrm_list_leads
    category: list
    variations:
      - "show my leads"
      - "find leads"
      - "what leads exist"
    description_notes: null

  - query: "create a new lead"
    expected_tool: zohocrm_create_lead
    category: create
    variations:
      - "add a lead"
      - "create a new lead"
      - "register lead"
    description_notes: null

  - query: "get lead details"
    expected_tool: zohocrm_get_lead
    category: read
    variations:
      - "show me lead details"
      - "what is this lead about"
      - "lookup lead"
    description_notes: null

  - query: "list all deals"
    expected_tool: zohocrm_list_deals
    category: list
    variations:
      - "show me all deals"
      - "find deals"
      - "what deals exist"
    description_notes: null

  - query: "create a new deal"
    expected_tool: zohocrm_create_deal
    category: create
    variations:
      - "add a deal"
      - "create a deal"
      - "open a new deal"
    description_notes: null

  - query: "list all contacts"
    expected_tool: zohocrm_list_contacts
    category: list
    variations:
      - "show me all contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null