# RingCentral Tool Selection Queries

provider: ringcentral
queries:
  - query: "list all messages"
    expected_tool: ringcentral_list_messages
    category: list
    variations:
      - "show my messages"
      - "find messages"
      - "what messages exist"
    description_notes: null

  - query: "get message details"
    expected_tool: ringcentral_get_message
    category: read
    variations:
      - "show me message details"
      - "what is this message about"
      - "lookup message"
    description_notes: null

  - query: "send an SMS"
    expected_tool: ringcentral_send_sms
    category: create
    variations:
      - "send a text"
      - "send text message"
      - "text someone"
    description_notes: null

  - query: "list call logs"
    expected_tool: ringcentral_list_call_logs
    category: list
    variations:
      - "show my call history"
      - "find calls"
      - "what calls were made"
    description_notes: null

  - query: "get call log details"
    expected_tool: ringcentral_get_call_log
    category: read
    variations:
      - "show me call details"
      - "what is this call about"
      - "lookup call"
    description_notes: null

  - query: "list meetings"
    expected_tool: ringcentral_list_meetings
    category: list
    variations:
      - "show my meetings"
      - "find meetings"
      - "what meetings are scheduled"
    description_notes: null