# Freshdesk More Tool Selection Queries

provider: freshdesk_more
queries:
  - query: "list all tickets"
    expected_tool: freshdesk_more_list_tickets
    category: list
    variations:
      - "show my tickets"
      - "find tickets"
      - "what tickets exist"
    description_notes: null

  - query: "create a ticket"
    expected_tool: freshdesk_more_create_ticket
    category: create
    variations:
      - "add a ticket"
      - "create a new ticket"
      - "open a ticket"
    description_notes: null

  - query: "get ticket details"
    expected_tool: freshdesk_more_get_ticket
    category: read
    variations:
      - "show me ticket details"
      - "what is this ticket about"
      - "lookup ticket"
    description_notes: null

  - query: "update a ticket"
    expected_tool: freshdesk_more_update_ticket
    category: update
    variations:
      - "modify the ticket"
      - "change ticket status"
      - "edit ticket"
    description_notes: null

  - query: "list all agents"
    expected_tool: freshdesk_more_list_agents
    category: list
    variations:
      - "show me agents"
      - "find agents"
      - "what agents exist"
    description_notes: null

  - query: "list all groups"
    expected_tool: freshdesk_more_list_groups
    category: list
    variations:
      - "show me groups"
      - "find groups"
      - "what groups exist"
    description_notes: null