# Datadog Tool Selection Queries

provider: datadog
queries:
  - query: "list all hosts"
    expected_tool: datadog_list_hosts
    category: list
    variations:
      - "show my hosts"
      - "find hosts"
      - "what hosts exist"
    description_notes: null

  - query: "search logs"
    expected_tool: datadog_search_logs
    category: search
    variations:
      - "find logs"
      - "lookup logs"
      - "search logs"
    description_notes: null

  - query: "get log details"
    expected_tool: datadog_get_log
    category: read
    variations:
      - "show me log details"
      - "what is this log about"
      - "lookup log"
    description_notes: null

  - query: "list all monitors"
    expected_tool: datadog_list_monitors
    category: list
    variations:
      - "show me monitors"
      - "find monitors"
      - "what monitors exist"
    description_notes: null

  - query: "create a monitor"
    expected_tool: datadog_create_monitor
    category: create
    variations:
      - "add a monitor"
      - "create a monitor"
      - "make a monitor"
    description_notes: null

  - query: "list all dashboards"
    expected_tool: datadog_list_dashboards
    category: list
    variations:
      - "show me dashboards"
      - "find dashboards"
      - "what dashboards exist"
    description_notes: null