# Linear MCP Tool Selection Queries

provider: linear-mcp
queries:
  - query: "list all issues"
    expected_tool: linear_mcp_list_issues
    category: list
    variations:
      - "show my issues"
      - "find issues"
      - "what issues exist"
    description_notes: null

  - query: "create an issue"
    expected_tool: linear_mcp_create_issue
    category: create
    variations:
      - "add an issue"
      - "create a new issue"
      - "open an issue"
    description_notes: null

  - query: "get issue details"
    expected_tool: linear_mcp_get_issue
    category: read
    variations:
      - "show me issue details"
      - "what is this issue about"
      - "lookup issue"
    description_notes: null

  - query: "update an issue"
    expected_tool: linear_mcp_update_issue
    category: update
    variations:
      - "modify the issue"
      - "change issue status"
      - "edit issue"
    description_notes: null

  - query: "list all teams"
    expected_tool: linear_mcp_list_teams
    category: list
    variations:
      - "show me teams"
      - "find teams"
      - "what teams exist"
    description_notes: null

  - query: "list all projects"
    expected_tool: linear_mcp_list_projects
    category: list
    variations:
      - "show me projects"
      - "find projects"
      - "what projects exist"
    description_notes: null