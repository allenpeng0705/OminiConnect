# Salesforce Tool Selection Queries

provider: salesforce
queries:
  - query: "list all accounts"
    expected_tool: salesforce_list_accounts
    category: list
    variations:
      - "show me all accounts"
      - "find accounts"
      - "list accounts"
    description_notes: null

  - query: "create a new account"
    expected_tool: salesforce_create_account
    category: create
    variations:
      - "add an account"
      - "register a new account"
      - "create account"
    description_notes: null

  - query: "get account details"
    expected_tool: salesforce_get_account
    category: read
    variations:
      - "show account info"
      - "what is the account details"
      - "lookup account"
    description_notes: null

  - query: "list all contacts"
