      - "find contacts"
      - "list contacts"
    description_notes: null

  - query: "create a new contact"
    expected_tool: salesforce_create_contact
    category: create
    variations:
      - "add a contact"
      - "register a new contact"
      - "create contact"
    description_notes: null

  - query: "list all opportunities"
    expected_tool: salesforce_list_opportunities
    category: list
    variations:
      - "show me all opportunities"
      - "find deals"
      - "what opportunities exist"
    description_notes: null

  - query: "create a new opportunity"
    expected_tool: salesforce_create_opportunity
    category: create
    variations:
      - "add an opportunity"
      - "create a deal"
      - "open a new opportunity"
    description_notes: null