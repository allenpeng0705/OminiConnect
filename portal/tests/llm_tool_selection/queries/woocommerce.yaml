# WooCommerce Tool Selection Queries

provider: woocommerce
queries:
  - query: "list all orders"
    expected_tool: woocommerce_list_orders
    category: list
    variations:
      - "show my orders"
      - "find orders"
      - "what orders exist"
    description_notes: null

  - query: "create an order"
    expected_tool: woocommerce_create_order
    category: create
    variations:
      - "add an order"
      - "create a new order"
      - "make an order"
    description_notes: null

  - query: "get order details"
    expected_tool: woocommerce_get_order
    category: read
    variations:
      - "show me order details"
      - "what is this order about"
      - "lookup order"
    description_notes: null

  - query: "list all products"
    expected_tool: woocommerce_list_products
    category: list
    variations:
      - "show me products"
      - "find products"
      - "what products exist"
    description_notes: null

  - query: "create a product"
    expected_tool: woocommerce_create_product
    category: create
    variations:
      - "add a product"
      - "create a new product"
      - "make a product"
    description_notes: null

  - query: "list all customers"
    expected_tool: woocommerce_list_customers
    category: list
    variations:
      - "show me customers"
      - "find customers"
      - "what customers exist"
    description_notes: null