# Confluence Tool Selection Queries

provider: confluence
queries:
  - query: "search for pages"
    expected_tool: confluence_search_pages
    category: search
    variations:
      - "find pages"
      - "lookup pages"
      - "search confluence"
    description_notes: null

  - query: "get page content"
    expected_tool: confluence_get_page
    category: read
    variations:
      - "show me page details"
      - "what is this page about"
      - "open page"
    description_notes: null

  - query: "list spaces"
    expected_tool: confluence_list_spaces
    category: list
    variations:
      - "show me all spaces"
      - "find spaces"
      - "what spaces exist"
    description_notes: null

  - query: "create a page"
    expected_tool: confluence_create_page
    category: create
    variations:
      - "add a page"
      - "create a new page"
      - "make a page"
    description_notes: null

  - query: "list blog posts"
    expected_tool: confluence_list_blog_posts
    category: list
    variations:
      - "show blog posts"
      - "find posts"
      - "list articles"
    description_notes: null

  - query: "get space details"
    expected_tool: confluence_get_space
    category: read
    variations:
      - "show space info"
      - "what is this space about"
      - "lookup space"
    description_notes: null