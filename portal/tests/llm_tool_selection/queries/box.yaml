# Box Tool Selection Queries

provider: box
queries:
  - query: "list all files"
    expected_tool: box_list_files
    category: list
    variations:
      - "show my files"
      - "find files"
      - "what files exist"
    description_notes: null

  - query: "upload a file"
    expected_tool: box_upload_file
    category: create
    variations:
      - "add a file"
      - "create a file"
      - "upload to box"
    description_notes: null

  - query: "get file details"
    expected_tool: box_get_file
    category: read
    variations:
      - "show me file details"
      - "what is this file about"
      - "lookup file"
    description_notes: null

  - query: "search for files"
    expected_tool: box_search_files
    category: search
    variations:
      - "find files"
      - "lookup files"
      - "search box"
    description_notes: null

  - query: "list all folders"
    expected_tool: box_list_folders
    category: list
    variations:
      - "show folders"
      - "find folders"
      - "what folders exist"
    description_notes: null

  - query: "create a folder"
    expected_tool: box_create_folder
    category: create
    variations:
      - "add a folder"
      - "create a folder"
      - "make a folder"
    description_notes: null