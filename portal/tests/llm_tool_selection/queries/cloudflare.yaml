# Cloudflare Tool Selection Queries

provider: cloudflare
queries:
  - query: "list all zones"
    expected_tool: cloudflare_list_zones
    category: list
    variations:
      - "show my zones"
      - "find zones"
      - "what zones exist"
    description_notes: null

  - query: "create a zone"
    expected_tool: cloudflare_create_zone
    category: create
    variations:
      - "add a zone"
      - "create a zone"
      - "make a zone"
    description_notes: null

  - query: "list DNS records"
    expected_tool: cloudflare_list_dns_records
    category: list
    variations:
      - "show me DNS records"
      - "find DNS"
      - "what DNS records exist"
    description_notes: null

  - query: "create a DNS record"
    expected_tool: cloudflare_create_dns_record
    category: create
    variations:
      - "add a DNS record"
      - "create a DNS record"
      - "make a DNS record"
    description_notes: null

  - query: "list all workers"
    expected_tool: cloudflare_list_workers
    category: list
    variations:
      - "show me workers"
      - "find workers"
      - "what workers exist"
    description_notes: null

  - query: "deploy a worker"
    expected_tool: cloudflare_deploy_worker
    category: create
    variations:
      - "add a worker"
      - "create a worker"
      - "deploy worker"
    description_notes: null