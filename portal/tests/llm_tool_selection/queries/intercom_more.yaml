# Intercom More Tool Selection Queries

provider: intercom_more
queries:
  - query: "list all conversations"
    expected_tool: intercom_more_list_conversations
    category: list
    variations:
      - "show my conversations"
      - "find conversations"
      - "what conversations exist"
    description_notes: null

  - query: "create a conversation"
    expected_tool: intercom_more_create_conversation
    category: create
    variations:
      - "add a conversation"
      - "start a conversation"
      - "open a conversation"
    description_notes: null

  - query: "get conversation details"
    expected_tool: intercom_more_get_conversation
    category: read
    variations:
      - "show me conversation details"
      - "what is this conversation about"
      - "lookup conversation"
    description_notes: null

  - query: "reply to a conversation"
    expected_tool: intercom_more_reply_conversation
    category: create
    variations:
      - "send a reply"
      - "respond"
      - "reply"
    description_notes: null

  - query: "list all contacts"
    expected_tool: intercom_more_list_contacts
    category: list
    variations:
      - "show me contacts"
      - "find contacts"
      - "what contacts exist"
    description_notes: null

  - query: "create a contact"
    expected_tool: intercom_more_create_contact
    category: create
    variations:
      - "add a contact"
      - "create a contact"
      - "register contact"
    description_notes: null