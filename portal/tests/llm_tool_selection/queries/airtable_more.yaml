# Airtable (More) Tool Selection Queries

provider: airtable_more
queries:
  - query: "list all bases"
    expected_tool: airtable_more_list_bases
    category: list
    variations:
      - "show my bases"
      - "find bases"
      - "what bases exist"
    description_notes: null

  - query: "list records in a table"
    expected_tool: airtable_more_list_records
    category: list
    variations:
      - "show records in table"
      - "find records"
      - "list items"
    description_notes: null

  - query: "create a new record"
    expected_tool: airtable_more_create_record
    category: create
    variations:
      - "add a record"
      - "create a new record"
      - "insert record"
    description_notes: null

  - query: "update a record"
    expected_tool: airtable_more_update_record
    category: update
    variations:
      - "modify the record"
      - "change record"
      - "edit record"
    description_notes: null

  - query: "delete a record"
    expected_tool: airtable_more_delete_record
    category: delete
    variations:
      - "remove a record"
      - "delete entry"
      - "erase record"
    description_notes: null

  - query: "list field metadata"
    expected_tool: airtable_more_list_fields
    category: list
    variations:
      - "show table fields"
      - "find field names"
      - "what fields exist"
    description_notes: null