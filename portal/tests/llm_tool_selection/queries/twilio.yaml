# Twilio Tool Selection Queries

provider: twilio
queries:
  - query: "list all messages"
    expected_tool: twilio_list_messages
    category: list
    variations:
      - "show my messages"
      - "find messages"
      - "what messages exist"
    description_notes: null

  - query: "send an SMS"
    expected_tool: twilio_send_message
    category: create
    variations:
      - "send a text"
      - "send SMS"
      - "send a message"
    description_notes: null

  - query: "get message details"
    expected_tool: twilio_get_message
    category: read
    variations:
      - "show me message details"
      - "what is this message about"
      - "lookup message"
    description_notes: null

  - query: "list all calls"
    expected_tool: twilio_list_calls
    category: list
    variations:
      - "show my calls"
      - "find calls"
      - "what calls exist"
    description_notes: null

  - query: "make a call"
    expected_tool: twilio_make_call
    category: create
    variations:
      - "start a call"
      - "initiate call"
      - "call someone"
    description_notes: null

  - query: "get call details"
    expected_tool: twilio_get_call
    category: read
    variations:
      - "show me call details"
      - "what is this call about"
      - "lookup call"
    description_notes: null