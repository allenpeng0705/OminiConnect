# Notion Tool Selection Queries

provider: notion
queries:
  - query: "search for pages containing 'project'"
    expected_tool: notion_search
    category: search
    variations:
      - "find notion pages about project"
      - "lookup pages with project in title"
    description_notes: null

  - query: "get details of a page"
    expected_tool: notion_retrieve_page
    category: read
    variations:
      - "show me the page content"
      - "what is on this notion page"
    description_notes: null

  - query: "create a new database"
    expected_tool: notion_create_database
    category: create
    variations:
      - "add a new database in notion"
      - "make a database"
    description_notes: null

  - query: "query a database"
    expected_tool: notion_query_database
    category: list
    variations:
      - "search the database"
      - "find entries in the database"
      - "list all items in this database"
    description_notes: null

  - query: "create a comment on a page"
    expected_tool: notion_create_comment
    category: create
    variations:
      - "add a comment to the page"
      - "post a note on this page"
    description_notes: null
