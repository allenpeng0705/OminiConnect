# Jira Data Center Tool Selection Queries

provider: jira-data-center
queries:
  - query: "list all issues"
    expected_tool: jira_data_center_list_issues
    category: list
    variations:
      - "show my issues"
      - "find issues"
      - "what issues exist"
    description_notes: null

  - query: "create an issue"
    expected_tool: jira_data_center_create_issue
    category: create
    variations:
      - "add an issue"
      - "create a new issue"
      - "open an issue"
    description_notes: null

  - query: "get issue details"
    expected_tool: jira_data_center_get_issue
    category: read
    variations:
      - "show me issue details"
      - "what is this issue about"
      - "lookup issue"
    description_notes: null

  - query: "list all projects"
    expected_tool: jira_data_center_list_projects
    category: list
    variations:
      - "show me projects"
      - "find projects"
      - "what projects exist"
    description_notes: null

  - query: "get project details"
    expected_tool: jira_data_center_get_project
    category: read
    variations:
      - "show me project details"
      - "what is this project about"
      - "lookup project"
    description_notes: null

  - query: "list all users"
    expected_tool: jira_data_center_list_users
    category: list
    variations:
      - "show me users"
      - "find users"
      - "what users exist"
    description_notes: null