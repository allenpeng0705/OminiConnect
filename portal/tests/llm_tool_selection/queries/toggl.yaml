# Toggl Tool Selection Queries

provider: toggl
queries:
  - query: "list all time entries"
    expected_tool: toggl_list_time_entries
    category: list
    variations:
      - "show my time entries"
      - "find time entries"
      - "what time have I tracked"
    description_notes: null

  - query: "create a time entry"
    expected_tool: toggl_create_time_entry
    category: create
    variations:
      - "add a time entry"
      - "track time"
      - "log time"
    description_notes: null

  - query: "get time entry details"
    expected_tool: toggl_get_time_entry
    category: read
    variations:
      - "show me entry details"
      - "what is this entry about"
      - "lookup entry"
    description_notes: null

  - query: "update a time entry"
    expected_tool: toggl_update_time_entry
    category: update
    variations:
      - "modify the entry"
      - "change entry"
      - "edit time entry"
    description_notes: null

  - query: "list all clients"
    expected_tool: toggl_list_clients
    category: list
    variations:
      - "show me all clients"
      - "find clients"
      - "what clients exist"
    description_notes: null

  - query: "list all projects"
    expected_tool: toggl_list_projects
    category: list
    variations:
      - "show me all projects"
      - "find projects"
      - "what projects exist"
    description_notes: null