# Salesforce More Tool Selection Queries

provider: salesforce_more
queries:
  - query: "list all cases"
    expected_tool: salesforce_more_list_cases
    category: list
    variations:
      - "show my cases"
      - "find cases"
      - "what cases exist"
    description_notes: null

  - query: "create a case"
    expected_tool: salesforce_more_create_case
    category: create
    variations:
      - "add a case"
      - "create a new case"
      - "open a case"
    description_notes: null

  - query: "get case details"
    expected_tool: salesforce_more_get_case
    category: read
    variations:
      - "show me case details"
      - "what is this case about"
      - "lookup case"
    description_notes: null

  - query: "update a case"
    expected_tool: salesforce_more_update_case
    category: update
    variations:
      - "modify the case"
      - "change case status"
      - "edit case"
    description_notes: null

  - query: "list all leads"
    expected_tool: salesforce_more_list_leads
    category: list
    variations:
      - "show me leads"
      - "find leads"
      - "what leads exist"
    description_notes: null

  - query: "create a lead"
    expected_tool: salesforce_more_create_lead
    category: create
    variations:
      - "add a lead"
      - "create a lead"
      - "register lead"
    description_notes: null