# LiteLLM Configuration for OminiConnect
# Usage: litellm --port 4000 --config litellm_config.yaml
#
# Docs: https://docs.litellm.ai/docs/providers
# MiniMax OpenAI compatible API: https://platform.minimaxi.com/docs/

model_list:
  # MiniMax via OpenAI compatible API (recommended)
  - model_name: minimax:latest
    litellm_params:
      model: openai/MiniMax-M2.7
      api_base: https://api.minimaxi.com/v1
      api_key: os.environ/MINIMAX_API_KEY
